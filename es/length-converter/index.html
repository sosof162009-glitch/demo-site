;
        
        const diff = Math.abs(date2 - date1);
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        return { value: days.toString(), unit: 'days' };
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initCalculator('length');
    });
  </script>
