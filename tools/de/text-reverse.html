<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Umkehren - 205 Tools</title>
  <meta name="description" content="Kehrt Text Zeichen für Zeichen um.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🔄 Text Umkehren</h1>
      <p>Kehrt Text Zeichen für Zeichen um.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Optionen</h2>
        <div class="lang-selector">
          <a href="../en/text-reverse.html" class="lang-btn ">EN</a><a href="../es/text-reverse.html" class="lang-btn ">ES</a><a href="../fr/text-reverse.html" class="lang-btn ">FR</a><a href="../de/text-reverse.html" class="lang-btn active">DE</a><a href="../ar/text-reverse.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>Text</label>
        <textarea id="inputText" rows="10" placeholder="Enter your text here..."></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="processText()">Umrechnen</button>
        <button class="btn btn-secondary" onclick="resetText()">Zurücksetzen</button>
      </div>
      <div class="form-group" style="margin-top: 20px;">
        <label>Ergebnis</label>
        <textarea id="outputText" rows="10" readonly></textarea>
      </div>
      <button class="btn btn-success" data-success="Kopiert!" onclick="copyToClipboard(document.getElementById('outputText').value, this)">Kopieren</button>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
  
  <script>
    
      function processText() {
        const text = document.getElementById('inputText').value;
        document.getElementById('outputText').value = text;
      }
      function resetText() {
        document.getElementById('inputText').value = '';
        document.getElementById('outputText').value = '';
      }
    
  </script>
</body>
</html>
