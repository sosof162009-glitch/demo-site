<!DOCTYPE html>
<html lang="de" dir="ltr"><head><meta charset="UTF-8">
<title>Wochennummer Rechner - 205 Tools</title>
<link rel="stylesheet" href="../assets/css/tools.css">
<style>
.week-result{text-align:center;padding:40px;background:linear-gradient(135deg,rgba(79,142,247,.1) 0%,transparent 100%);border-radius:12px;border:1px solid var(--border);margin-top:20px}
.week-number{font-size:96px;font-weight:700;color:var(--primary);line-height:1}
.week-label{font-size:24px;color:var(--text-secondary);margin-top:10px}
.week-details{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:15px;margin-top:30px}
.week-box{background:var(--bg-card);padding:20px;border-radius:8px;text-align:center}
.week-box .number{font-size:28px;font-weight:700;color:var(--primary)}
.week-box .label{font-size:12px;color:var(--text-secondary);margin-top:5px;text-transform:uppercase}
.date-range{margin-top:20px;padding:20px;background:var(--bg-card);border-radius:8px}
.mini-calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:5px;margin-top:15px}
.mini-day{text-align:center;padding:8px;border-radius:4px;font-size:12px}
.mini-day.header{color:var(--primary);font-weight:600}
.mini-day.in-week{background:var(--primary);color:white;font-weight:700}
.weeks-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;margin-top:20px}
.week-item{padding:15px;background:var(--bg-card);border-radius:8px;text-align:center;cursor:pointer;border:2px solid transparent}
.week-item:hover{border-color:var(--primary)}
.week-item.current{background:var(--primary);color:white}
.week-item .num{font-size:20px;font-weight:700}
.week-item .range{font-size:10px;opacity:.8;margin-top:5px}
.year-overview{margin-top:30px}
</style></head>
<body><div class="container">
<a href="/" class="back-link">← Startseite</a>
<header><h1>📊 Wochennummer Rechner</h1><p>Berechnen Sie ISO-Kalenderwochen</p></header>
<div class="tool-container">
<div class="tool-header">
<h2>Kalenderwoche Finden</h2>
<div class="lang-selector">
<a href="../en/week-number-calculator.html" class="lang-btn">EN</a>
<a href="../es/week-number-calculator.html" class="lang-btn">ES</a>
<a href="../fr/week-number-calculator.html" class="lang-btn">FR</a>
<a href="./week-number-calculator.html" class="lang-btn active">DE</a>
<a href="../ar/week-number-calculator.html" class="lang-btn">AR</a>
</div></div>
<div class="form-group"><label>Datum Auswählen</label><input type="date" id="dateInput" class="tool-input"></div>
<div class="btn-group">
<button class="btn btn-primary" onclick="calculateWeek()">Berechnen</button>
<button class="btn btn-secondary" onclick="useToday()">Heute</button>
<button class="btn btn-secondary" onclick="showYearOverview()">Jahresübersicht</button>
</div>
<div id="result" class="week-result" style="display:none">
<div class="week-number" id="weekNum"></div>
<div class="week-label">Kalenderwoche (ISO)</div>
<div class="week-details">
<div class="week-box"><div class="number" id="dayOfYear"></div><div class="label">Tag des Jahres</div></div>
<div class="week-box"><div class="number" id="dayOfWeek"></div><div class="label">Wochentag</div></div>
<div class="week-box"><div class="number" id="quarter"></div><div class="label">Quartal</div></div>
<div class="week-box"><div class="number" id="daysLeft"></div><div class="label">Tage Übrig</div></div>
</div>
<div class="date-range"><h4>📅 Wochenbereich</h4><div id="weekRange"></div><div class="mini-calendar" id="weekCalendar"></div></div>
</div>
<div id="yearOverview" class="year-overview" style="display:none"><h3>Jahresübersicht</h3><div class="weeks-list" id="weeksList"></div></div>
</div>
<footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
</div>
<script>
const dayNames=['So','Mo','Di','Mi','Do','Fr','Sa'];
const fullDayNames=['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
function useToday(){document.getElementById('dateInput').value=new Date().toISOString().split('T')[0];calculateWeek();}
function calculateWeek(){
const dateValue=document.getElementById('dateInput').value;
if(!dateValue){alert('Bitte wählen Sie ein Datum');return;}
const date=new Date(dateValue+'T00:00:00');const year=date.getFullYear();
const weekNum=getISOWeek(date);const weekInfo=getWeekRange(year,weekNum);
document.getElementById('weekNum').textContent=weekNum;
const start=new Date(year,0,1);const dayOfYear=Math.floor((date-start)/(1000*60*60*24))+1;
document.getElementById('dayOfYear').textContent=dayOfYear;
document.getElementById('dayOfWeek').textContent=fullDayNames[date.getDay()];
document.getElementById('quarter').textContent='Q'+Math.ceil((date.getMonth()+1)/3);
const endOfYear=new Date(year,11,31);const daysLeft=Math.ceil((endOfYear-date)/(1000*60*60*24));
document.getElementById('daysLeft').textContent=daysLeft;
document.getElementById('weekRange').innerHTML=`<strong>${weekInfo.start.toLocaleDateString('de-DE',{month:'short',day:'numeric'})}</strong> - <strong>${weekInfo.end.toLocaleDateString('de-DE',{month:'short',day:'numeric',year:'numeric'})}</strong>`;
renderWeekCalendar(weekInfo);document.getElementById('result').style.display='block';document.getElementById('yearOverview').style.display='none';
}
function getISOWeek(date){const d=new Date(Date.UTC(date.getFullYear(),date.getMonth(),date.getDate()));const dayNum=d.getUTCDay()||7;d.setUTCDate(d.getUTCDate()+4-dayNum);const yearStart=new Date(Date.UTC(d.getUTCFullYear(),0,1));return Math.ceil((((d-yearStart)/86400000)+1)/7);}
function getWeekRange(year,weekNum){const simple=new Date(year,0,1+(weekNum-1)*7);const dow=simple.getDay();const ISOweekStart=simple;if(dow<=4){ISOweekStart.setDate(simple.getDate()-simple.getDay()+1);}else{ISOweekStart.setDate(simple.getDate()+8-simple.getDay());}const ISOweekEnd=new Date(ISOweekStart);ISOweekEnd.setDate(ISOweekStart.getDate()+6);return{start:ISOweekStart,end:ISOweekEnd};}
function renderWeekCalendar(weekInfo){const container=document.getElementById('weekCalendar');let html='';dayNames.forEach(day=>html+=`<div class="mini-day header">${day}</div>`);const weekStart=new Date(weekInfo.start);const selectedDate=document.getElementById('dateInput').value;for(let i=0;i<7;i++){const day=new Date(weekStart);day.setDate(weekStart.getDate()+i);const isSelected=day.toISOString().split('T')[0]===selectedDate;const cls=isSelected?'mini-day in-week':'mini-day';html+=`<div class="${cls}">${day.getDate()}</div>`;}container.innerHTML=html;}
function showYearOverview(){const dateValue=document.getElementById('dateInput').value;const year=dateValue?new Date(dateValue).getFullYear():new Date().getFullYear();const container=document.getElementById('weeksList');let html='';for(let w=1;w<=53;w++){const weekInfo=getWeekRange(year,w);const isCurrent=dateValue&&getISOWeek(new Date(dateValue))===w;const cls=isCurrent?'week-item current':'week-item';html+=`<div class="${cls}" onclick="selectWeek(${year},${w})"><div class="num">KW${w}</div><div class="range">${weekInfo.start.getMonth()+1}/${weekInfo.start.getDate()}</div></div>`;}container.innerHTML=html;document.getElementById('yearOverview').style.display='block';}
function selectWeek(year,week){const weekInfo=getWeekRange(year,week);document.getElementById('dateInput').value=weekInfo.start.toISOString().split('T')[0];calculateWeek();}
useToday();
</script></body></html>
