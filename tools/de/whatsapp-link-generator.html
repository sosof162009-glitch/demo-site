<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Link Generator | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tools.css">
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="../en/whatsapp-link-generator.html">English</option>
      <option value="../ar/whatsapp-link-generator.html">العربية</option>
      <option value="../fr/whatsapp-link-generator.html">Français</option>
      <option value="../es/whatsapp-link-generator.html">Español</option>
      <option value="whatsapp-link-generator.html" selected>Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>WhatsApp Link Generator</h1>
      <p>Erstellen Sie klickbare WhatsApp-Links mit vorab ausgefüllten Nachrichten</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="phone-input">Telefonnummer (mit Ländervorwahl):</label>
        <input type="text" id="phone-input" class="tool-input" placeholder="z.B., +491234567890">
        <small class="help-text">Ländervorwahl ohne Leerzeichen oder Bindestriche eingeben</small>
      </div>

      <div class="input-group">
        <label for="message-input">Vorab ausgefüllte Nachricht (optional):</label>
        <textarea id="message-input" class="tool-textarea" placeholder="Geben Sie Ihre Nachricht ein..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateLink()">Link Erstellen</button>
        <button class="btn btn-secondary" onclick="clearAll()">Löschen</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="link-output">Erstellter Link:</label>
        <textarea id="link-output" class="tool-textarea" placeholder="Ihr WhatsApp-Link wird hier angezeigt..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyLink()">Link Kopieren</button>
        <button class="btn btn-primary" onclick="openLink()">Link Öffnen</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Kopiert!</span>
  </div>

  <script>
    function generateLink() {
      const phone = document.getElementById('phone-input').value.trim();
      const message = document.getElementById('message-input').value.trim();
      
      if (!phone) {
        alert('Bitte geben Sie eine Telefonnummer ein');
        return;
      }
      
      // Remove non-digit characters from phone
      const cleanPhone = phone.replace(/\D/g, '');
      
      let link = `https://wa.me/${cleanPhone}`;
      if (message) {
        link += `?text=${encodeURIComponent(message)}`;
      }
      
      document.getElementById('link-output').value = link;
    }

    function copyLink() {
      const output = document.getElementById('link-output');
      if (!output.value) {
        alert('Kein Link zum Kopieren. Erstellen Sie zuerst einen Link.');
        return;
      }
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function openLink() {
      const link = document.getElementById('link-output').value;
      if (!link) {
        alert('Kein Link zum Öffnen. Erstellen Sie zuerst einen Link.');
        return;
      }
      window.open(link, '_blank');
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('phone-input').value = '';
      document.getElementById('message-input').value = '';
      document.getElementById('link-output').value = '';
    }
  </script>
</body>
</html>
