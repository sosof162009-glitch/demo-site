<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Upside Down Text | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="upside-down.html" >English</option>
      <option value="../ar/upside-down.html" >العربية</option>
      <option value="../fr/upside-down.html" >Français</option>
      <option value="../es/upside-down.html" >Español</option>
      <option value="../de/upside-down.html" selected>Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Upside Down Text</h1>
      <p>Flip your text upside down using Unicode characters</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">Original Text:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Enter text to flip..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="flipText()">Flip</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Upside Down:</label>
        <textarea id="text-output" class="tool-textarea" style="font-size: 1.2em;" placeholder="Flipped text will appear here..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copied!</span>
  </div>

  <script>
    const flipMap = {"0":"0","1":"ɩ","2":"ƨ","3":"Ɛ","4":"μ","5":"ϛ","6":"9","7":"ㄥ","8":"8","9":"6","a":"ɐ","b":"q","c":"ɔ","d":"p","e":"ǝ","f":"ɟ","g":"ƃ","h":"ɥ","i":"ᴉ","j":"ɿ","k":"ʞ","l":"l","m":"ɯ","n":"u","o":"o","p":"d","q":"b","r":"ɹ","s":"s","t":"ʇ","u":"n","v":"ʌ","w":"ʍ","x":"x","y":"ʎ","z":"z","A":"ɐ","B":"q","C":"ɔ","D":"p","E":"ǝ","F":"ɟ","G":"ƃ","H":"ɥ","I":"ᴉ","J":"ɿ","K":"ʞ","L":"l","M":"ɯ","N":"u","O":"o","P":"d","Q":"b","R":"ɹ","S":"s","T":"ʇ","U":"n","V":"ʌ","W":"ʍ","X":"x","Y":"ʎ","Z":"z",".":"˙",",":"'","'":",","\"":",,","?":"¿","!":"¡","(":")",")":"(","[":"]","]":"[","{":"}","}":"{","<":">",">":"<","&":"⅋","_":"‾","-":"-",";":"؛",":":"˕"};

    function flipText() {
      const text = document.getElementById('text-input').value;
      
      if (text === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      const flipped = text.split('').reverse().map(char => flipMap[char] || char).join('');
      document.getElementById('text-output').value = flipped;
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
