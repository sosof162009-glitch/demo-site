<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeilen Sortieren - 205 Tools</title>
  <meta name="description" content="Sortieren Sie Zeilen alphabetisch oder numerisch.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>📋 Zeilen Sortieren</h1>
      <p>Sortieren Sie Zeilen alphabetisch, numerisch oder nach Länge</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Eingabetext</h2>
        <div class="lang-selector">
          <a href="../en/sort-lines.html" class="lang-btn">EN</a>
          <a href="../es/sort-lines.html" class="lang-btn">ES</a>
          <a href="../fr/sort-lines.html" class="lang-btn">FR</a>
          <a href="./sort-lines.html" class="lang-btn active">DE</a>
          <a href="../ar/sort-lines.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Zu sortierende Zeilen hier einfügen..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="sortLines('asc')">A-Z</button>
        <button class="btn btn-primary" onclick="sortLines('desc')">Z-A</button>
        <button class="btn btn-primary" onclick="sortLines('length')">Nach Länge</button>
        <button class="btn btn-primary" onclick="sortLines('reverse')">Umgekehrte Reihenfolge</button>
        <button class="btn btn-secondary" onclick="clearAll()">Löschen</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Ergebnis</label>
        <textarea id="output" rows="8" readonly placeholder="Sortiertes Ergebnis erscheint hier..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Ergebnis Kopieren</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
  </div>
  
  <script>
    function sortLines(order) {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      let lines = input.split('\n');
      
      switch(order) {
        case 'asc':
          lines.sort((a, b) => a.localeCompare(b));
          break;
        case 'desc':
          lines.sort((a, b) => b.localeCompare(a));
          break;
        case 'length':
          lines.sort((a, b) => a.length - b.length);
          break;
        case 'reverse':
          lines.reverse();
          break;
      }
      
      document.getElementById('output').value = lines.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('In die Zwischenablage kopiert!');
    }
  </script>
</body>
</html>
