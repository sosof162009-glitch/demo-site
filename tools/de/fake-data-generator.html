<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fake-Datengenerator - 205 Tools</title>
  <meta name="description" content="Generieren Sie realistische Fake-Daten für Tests und Entwicklung.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .output-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; }
    .option-item { display: flex; align-items: center; gap: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    <header><h1>🎲 Fake-Datengenerator</h1><p>Generieren Sie realistische Fake-Daten für Tests und Entwicklung</p></header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generator</h2>
        <div class="lang-selector">
          <a href="../en/fake-data-generator.html" class="lang-btn">EN</a>
          <a href="../es/fake-data-generator.html" class="lang-btn">ES</a>
          <a href="../fr/fake-data-generator.html" class="lang-btn">FR</a>
          <a href="./fake-data-generator.html" class="lang-btn active">DE</a>
          <a href="../ar/fake-data-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Anzahl der Datensätze</label><input type="number" id="recordCount" value="10" min="1" max="100"></div>
        <div class="form-group"><label>Format</label><select id="outputFormat"><option value="json">JSON</option><option value="csv">CSV</option><option value="sql">SQL INSERT</option></select></div>
      </div>
      <label>Felder auswählen:</label>
      <div class="options-grid">
        <div class="option-item"><label><input type="checkbox" class="field-check" value="id" checked> ID</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="name" checked> Name</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="email" checked> E-Mail</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="phone"> Telefon</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="address"> Adresse</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="city"> Stadt</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="country"> Land</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="company"> Unternehmen</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="jobTitle"> Berufsbezeichnung</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="age"> Alter</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="date"> Datum</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="boolean"> Boolean</label></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateData()">🎲 Generieren</button>
        <button class="btn btn-success" onclick="copyOutput()">📋 Kopieren</button>
        <button class="btn btn-secondary" onclick="downloadData()">💾 Herunterladen</button>
      </div>
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <label>Generierte Daten</label>
        <pre id="dataOutput" class="output-box"></pre>
      </div>
    </div>
    <footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
  </div>
  <script>
    const firstNames = ['Hans','Maria','Peter','Anna','Michael','Susanne','Wolfgang','Ursula','Klaus','Monika','Stefan','Brigitte','Thomas','Ingrid','Andreas','Gabriele','Martin','Petra','Christian','Elisabeth'];
    const lastNames = ['Müller','Schmidt','Schneider','Fischer','Weber','Meyer','Wagner','Becker','Schulz','Hoffmann','Koch','Bauer','Richter','Klein','Wolf','Schröder','Neumann','Schwarz','Zimmermann','Braun'];
    const domains = ['gmail.com','yahoo.de','hotmail.de','outlook.de','web.de','firma.de'];
    const cities = ['Berlin','Hamburg','München','Köln','Frankfurt','Stuttgart','Düsseldorf','Dortmund','Essen','Leipzig','Bremen','Dresden'];
    const countries = ['Deutschland','Österreich','Schweiz','Niederlande','Belgien','Dänemark','Polen','Tschechien','Frankreich','Italien'];
    const companies = ['TechCorp','GlobalTech','DataSystems','CloudNine','Innovate Inc','Future Systems','Digital Dynamics','Smart Solutions','NextGen Tech','Cyber Systems'];
    const jobTitles = ['Ingenieur','Manager','Analyst','Designer','Direktor','Entwickler','Tester','CTO','CEO','Berater'];
    const streets = ['Hauptstraße','Bahnhofstraße','Berliner Straße','Schulstraße','Gartenstraße','Bergstraße','Dorfstraße','Wiesenweg','Birkenweg','Lindenstraße'];
    function generateData() {
      const count = parseInt(document.getElementById('recordCount').value) || 10;
      const format = document.getElementById('outputFormat').value;
      const fields = Array.from(document.querySelectorAll('.field-check:checked')).map(cb => cb.value);
      if (fields.length === 0) { alert('Bitte wählen Sie mindestens ein Feld aus'); return; }
      const records = [];
      for (let i = 0; i < count; i++) records.push(generateRecord(i + 1, fields));
      let output;
      switch(format) {
        case 'csv': output = toCSV(records, fields); break;
        case 'sql': output = toSQL(records, fields); break;
        default: output = JSON.stringify(records, null, 2);
      }
      document.getElementById('dataOutput').textContent = output;
      document.getElementById('outputSection').style.display = 'block';
    }
    function generateRecord(id, fields) {
      const record = {};
      const firstName = firstNames[Math.floor(Math.random() * firstNames.length)];
      const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
      fields.forEach(field => {
        switch(field) {
          case 'id': record.id = id; break;
          case 'name': record.name = firstName + ' ' + lastName; break;
          case 'email': record.email = firstName.toLowerCase() + '.' + lastName.toLowerCase() + '@' + domains[Math.floor(Math.random() * domains.length)]; break;
          case 'phone': record.telefon = '+49 ' + (Math.floor(Math.random() * 900) + 100) + ' ' + (Math.floor(Math.random() * 90000000) + 10000000); break;
          case 'address': record.adresse = streets[Math.floor(Math.random() * streets.length)] + ' ' + (Math.floor(Math.random() * 999) + 1); break;
          case 'city': record.stadt = cities[Math.floor(Math.random() * cities.length)]; break;
          case 'country': record.land = countries[Math.floor(Math.random() * countries.length)]; break;
          case 'company': record.unternehmen = companies[Math.floor(Math.random() * companies.length)]; break;
          case 'jobTitle': record.position = jobTitles[Math.floor(Math.random() * jobTitles.length)]; break;
          case 'age': record.alter = Math.floor(Math.random() * 43) + 22; break;
          case 'date': record.datum = new Date(Date.now() - Math.floor(Math.random() * 31536000000)).toISOString().split('T')[0]; break;
          case 'boolean': record.aktiv = Math.random() > 0.5; break;
        }
      });
      return record;
    }
    function toCSV(records, fields) {
      const header = fields.map(f => ({id:'ID',name:'Name',email:'Email',phone:'Telefon',address:'Adresse',city:'Stadt',country:'Land',company:'Unternehmen',jobTitle:'Position',age:'Alter',date:'Datum',boolean:'Aktiv'}[f]||f)).join(',');
      const rows = records.map(r => fields.map(f => { const val = r[f]||r[{id:'id',name:'name',email:'email',phone:'telefon',address:'adresse',city:'stadt',country:'land',company:'unternehmen',jobTitle:'position',age:'alter',date:'datum',boolean:'aktiv'}[f]]; if (typeof val === 'string' && (val.includes(',') || val.includes('"'))) return '"' + val.replace(/"/g, '""') + '"'; return val; }).join(','));
      return [header, ...rows].join('\n');
    }
    function toSQL(records, fields) {
      return records.map(r => { const cols = fields.map(f => ({id:'id',name:'name',email:'email',phone:'telefon',address:'adresse',city:'stadt',country:'land',company:'unternehmen',jobTitle:'position',age:'alter',date:'datum',boolean:'aktiv'}[f]||f)).join(', '); const vals = fields.map(f => { const val = r[f]||r[{id:'id',name:'name',email:'email',phone:'telefon',address:'adresse',city:'stadt',country:'land',company:'unternehmen',jobTitle:'position',age:'alter',date:'datum',boolean:'aktiv'}[f]]; if (typeof val === 'string') return "'" + val.replace(/'/g, "''") + "'"; if (typeof val === 'boolean') return val ? 1 : 0; return val; }).join(', '); return 'INSERT INTO benutzer (' + cols + ') VALUES (' + vals + ');'; }).join('\n');
    }
    function copyOutput() { navigator.clipboard.writeText(document.getElementById('dataOutput').textContent); alert('Kopiert!'); }
    function downloadData() { const text = document.getElementById('dataOutput').textContent; const format = document.getElementById('outputFormat').value; const blob = new Blob([text], { type: 'text/plain' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'fake-daten.' + format; a.click(); URL.revokeObjectURL(url); }
  </script>
</body>
</html>
