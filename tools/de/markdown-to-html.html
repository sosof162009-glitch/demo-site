<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown zu HTML - 205 Tools</title>
  <meta name="description" content="Markdown-Syntax in HTML konvertieren.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .editor-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .editor-box { display: flex; flex-direction: column; }
    .editor-box label { margin-bottom: 8px; font-size: 14px; color: var(--text-secondary); }
    .editor-box textarea, .editor-box .preview { flex: 1; min-height: 300px; background: var(--bg-card); border: 1px solid var(--border); border-radius: 8px; padding: 15px; font-family: monospace; }
    .editor-box .preview { background: white; color: #333; overflow: auto; }
    .editor-box .preview h1, .editor-box .preview h2, .editor-box .preview h3 { color: #333; margin: 10px 0; }
    .editor-box .preview code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
    .editor-box .preview pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
    .editor-box .preview blockquote { border-left: 4px solid #ddd; padding-left: 15px; color: #666; }
    @media (max-width: 768px) { .editor-split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>📝 Markdown zu HTML</h1>
      <p>Markdown-Syntax in HTML konvertieren</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Konverter</h2>
        <div class="lang-selector">
          <a href="../en/markdown-to-html.html" class="lang-btn">EN</a>
          <a href="../es/markdown-to-html.html" class="lang-btn">ES</a>
          <a href="../fr/markdown-to-html.html" class="lang-btn">FR</a>
          <a href="./markdown-to-html.html" class="lang-btn active">DE</a>
          <a href="../ar/markdown-to-html.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="btn-group" style="margin-bottom: 15px;">
        <button class="btn btn-secondary" onclick="loadExample()">Beispiel Laden</button>
        <button class="btn btn-success" onclick="copyHTML()">📋 HTML Kopieren</button>
      </div>
      
      <div class="editor-split">
        <div class="editor-box">
          <label>Markdown Eingabe</label>
          <textarea id="markdownInput" placeholder="# Überschrift&#10;&#10;**Fetter Text** und *kursiv*&#10;&#10;- Element 1&#10;- Element 2" oninput="convert()"></textarea>
        </div>
        
        <div class="editor-box">
          <label>HTML Ausgabe</label>
          <div class="preview" id="htmlOutput"></div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Kostenlose Tools</p></footer>
  </div>
  
  <script>
    function convert() {
      let md = document.getElementById('markdownInput').value;
      
      md = md.replace(/^###### (.*$)/gim, '<h6>$1</h6>');
      md = md.replace(/^##### (.*$)/gim, '<h5>$1</h5>');
      md = md.replace(/^#### (.*$)/gim, '<h4>$1</h4>');
      md = md.replace(/^### (.*$)/gim, '<h3>$1</h3>');
      md = md.replace(/^## (.*$)/gim, '<h2>$1</h2>');
      md = md.replace(/^# (.*$)/gim, '<h1>$1</h1>');
      md = md.replace(/\*\*\*(.*?)\*\*\*/g, '<em><strong>$1</strong></em>');
      md = md.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      md = md.replace(/\*(.*?)\*/g, '<em>$1</em>');
      md = md.replace(/__(.*?)__/g, '<strong>$1</strong>');
      md = md.replace(/_(.*?)_/g, '<em>$1</em>');
      md = md.replace(/`([^`]+)`/g, '<code>$1</code>');
      md = md.replace(/```([\s\S]*?)```/g, '<pre><code>$1</code></pre>');
      md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2">$1</a>');
      md = md.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" />');
      md = md.replace(/^\> (.*$)/gim, '<blockquote>$1</blockquote>');
      md = md.replace(/^\- (.*$)/gim, '<ul><li>$1</li></ul>');
      md = md.replace(/^\d+\. (.*$)/gim, '<ol><li>$1</li></ol>');
      md = md.replace(/\n/g, '<br>');
      
      document.getElementById('htmlOutput').innerHTML = md;
    }
    
    function loadExample() {
      document.getElementById('markdownInput').value = `# Hallo Welt

Dies ist **fett** und *kursiv*.

## Funktionen

- Einfach zu verwenden
- Schnelle Konvertierung
- Kostenlos für immer

### Codebeispiel

\`\`\`javascript
function hallo() {
  console.log("Hallo!");
}
\`\`\`

> Dies ist ein Zitat

[Besuchen Sie unsere Website](https://205tools.com)`;
      convert();
    }
    
    function copyHTML() {
      const html = document.getElementById('htmlOutput').innerHTML;
      navigator.clipboard.writeText(html);
      alert('HTML kopiert!');
    }
  </script>
</body>
</html>
