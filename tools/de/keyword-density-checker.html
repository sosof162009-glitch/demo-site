<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyword-Dichte-Checker - 205 Tools</title>
  <meta name="description" content="Analysiert die Keyword-Dichte in Ihrem Inhalt für SEO.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>📈 Keyword-Dichte-Checker</h1>
      <p>Analysiert die Keyword-Dichte in Ihrem Inhalt für bessere SEO-Optimierung.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Analysieren</h2>
        <div class="lang-selector">
          <a href="../en/keyword-density-checker.html" class="lang-btn ">EN</a><a href="../es/keyword-density-checker.html" class="lang-btn ">ES</a><a href="../fr/keyword-density-checker.html" class="lang-btn ">FR</a><a href="../de/keyword-density-checker.html" class="lang-btn active">DE</a><a href="../ar/keyword-density-checker.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Inhaltstext</label>
        <textarea id="content" rows="10" placeholder="Fügen Sie Ihren Artikel oder Inhalt hier ein..."></textarea>
        <small id="wordCount">0 Wörter</small>
      </div>
      <div class="form-group">
        <label>Ziel-Keyword (optional)</label>
        <input type="text" id="targetKeyword" placeholder="Keyword zur Dichte-Prüfung eingeben">
      </div>
      <div class="form-group">
        <label>Minimale Wortlänge</label>
        <input type="number" id="minLength" value="3" min="1" max="10">
      </div>
      <div class="form-group">
        <label>Häufige Stoppwörter ausschließen</label>
        <input type="checkbox" id="excludeStopWords" checked>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="analyzeDensity()">Analysieren</button>
        <button class="btn btn-secondary" onclick="clearFields()">Zurücksetzen</button>
      </div>
      
      <div id="results" style="display:none; margin-top:20px;">
        <h3>Analyseergebnisse</h3>
        <div id="targetResult" style="display:none; padding:15px; background:#f0f7ff; border-radius:8px; margin-bottom:15px;">
          <strong>Ziel-Keyword:</strong> <span id="targetWord"></span><br>
          <strong>Vorkommen:</strong> <span id="targetCount"></span><br>
          <strong>Dichte:</strong> <span id="targetDensity"></span>%<br>
          <small id="targetAdvice"></small>
        </div>
        <table class="data-table" style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="background:#f5f5f5;">
              <th style="padding:10px; text-align:left; border-bottom:2px solid #ddd;">Keyword</th>
              <th style="padding:10px; text-align:center; border-bottom:2px solid #ddd;">Anzahl</th>
              <th style="padding:10px; text-align:center; border-bottom:2px solid #ddd;">Dichte</th>
            </tr>
          </thead>
          <tbody id="resultsTable"></tbody>
        </table>
      </div>
      
      <script>
        const stopWords = new Set(['der', 'die', 'das', 'den', 'dem', 'des', 'ein', 'eine', 'einer', 'eines', 'einem', 'einen', 'und', 'oder', 'aber', 'von', 'vom', 'zu', 'zum', 'zur', 'bei', 'beim', 'mit', 'ohne', 'über', 'unter', 'durch', 'für', 'gegen', 'um', 'an', 'am', 'auf', 'aus', 'nach', 'während', 'ist', 'sind', 'war', 'waren', 'sein', 'worden', 'dieser', 'diese', 'dieses', 'diesem', 'diesen', 'jener', 'jene', 'jenes', 'als', 'wie', 'sehr', 'schon', 'noch', 'auch', 'nur', 'noch', 'alle', 'anderer', 'andere', 'anderes', 'jeder', 'jede', 'jedes', 'welcher', 'welche', 'welches', 'wer', 'was', 'wo', 'wann', 'warum', 'wenn', 'ja', 'nein', 'doch', 'da', 'hier', 'dort', 'bis', 'ab', 'seit', 'trotz', 'wegen', 'während', 'dank', 'statt', 'anstatt', 'trotz', 'entlang', 'gegenüber']);
        
        document.getElementById('content').addEventListener('input', function() {
          const words = this.value.trim().split(/\s+/).filter(w => w.length > 0);
          document.getElementById('wordCount').textContent = words.length + ' Wörter';
        });
        
        function analyzeDensity() {
          const content = document.getElementById('content').value.trim();
          const targetKeyword = document.getElementById('targetKeyword').value.trim().toLowerCase();
          const minLength = parseInt(document.getElementById('minLength').value) || 3;
          const excludeStop = document.getElementById('excludeStopWords').checked;
          
          if (!content) {
            alert('Bitte geben Sie Inhalt zur Analyse ein');
            return;
          }
          
          const cleanContent = content.toLowerCase().replace(/[^a-zäöüß0-9\s]/g, ' ');
          const words = cleanContent.split(/\s+/).filter(w => w.length >= minLength);
          const totalWords = content.trim().split(/\s+/).filter(w => w.length > 0).length;
          
          if (totalWords === 0) {
            alert('Keine Wörter im Inhalt gefunden');
            return;
          }
          
          const wordCounts = {};
          words.forEach(word => {
            if (excludeStop && stopWords.has(word)) return;
            wordCounts[word] = (wordCounts[word] || 0) + 1;
          });
          
          const sortedWords = Object.entries(wordCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 20);
          
          const tbody = document.getElementById('resultsTable');
          tbody.innerHTML = '';
          
          sortedWords.forEach(([word, count], index) => {
            const density = ((count / totalWords) * 100).toFixed(2);
            const row = document.createElement('tr');
            row.style.background = index % 2 === 0 ? '#fff' : '#f9f9f9';
            row.innerHTML = `
              <td style="padding:10px; border-bottom:1px solid #eee;">${word}</td>
              <td style="padding:10px; text-align:center; border-bottom:1px solid #eee;">${count}</td>
              <td style="padding:10px; text-align:center; border-bottom:1px solid #eee;">${density}%</td>
            `;
            tbody.appendChild(row);
          });
          
          if (targetKeyword) {
            const targetRegex = new RegExp('\\b' + targetKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
            const targetMatches = content.match(targetRegex) || [];
            const targetCount = targetMatches.length;
            const targetDensity = ((targetCount / totalWords) * 100).toFixed(2);
            
            document.getElementById('targetWord').textContent = targetKeyword;
            document.getElementById('targetCount').textContent = targetCount;
            document.getElementById('targetDensity').textContent = targetDensity;
            
            let advice = '';
            if (targetDensity < 0.5) {
              advice = '⚠️ Die Dichte ist niedrig. Erwägen Sie, das Keyword natürlicher in Ihren Inhalt einzubinden.';
            } else if (targetDensity > 3) {
              advice = '⚠️ Die Dichte ist hoch. Vermeiden Sie Keyword-Stuffing.';
            } else {
              advice = '✅ Gute Keyword-Dichte (0,5% - 3%).';
            }
            document.getElementById('targetAdvice').textContent = advice;
            document.getElementById('targetResult').style.display = 'block';
          } else {
            document.getElementById('targetResult').style.display = 'none';
          }
          
          document.getElementById('results').style.display = 'block';
        }
        
        function clearFields() {
          document.getElementById('content').value = '';
          document.getElementById('targetKeyword').value = '';
          document.getElementById('wordCount').textContent = '0 Wörter';
          document.getElementById('results').style.display = 'none';
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
</body>
</html>
