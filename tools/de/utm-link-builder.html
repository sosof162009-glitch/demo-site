<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM-Link-Builder - 205 Tools</title>
  <meta name="description" content="Erstellt UTM-Tracking-URLs für Marketing-Kampagnen.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>📊 UTM-Link-Builder</h1>
      <p>Erstellt UTM-Tracking-URLs für Ihre Marketing-Kampagnen.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>URL erstellen</h2>
        <div class="lang-selector">
          <a href="../en/utm-link-builder.html" class="lang-btn ">EN</a><a href="../es/utm-link-builder.html" class="lang-btn ">ES</a><a href="../fr/utm-link-builder.html" class="lang-btn ">FR</a><a href="../de/utm-link-builder.html" class="lang-btn active">DE</a><a href="../ar/utm-link-builder.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Website-URL *</label>
        <input type="url" id="baseUrl" placeholder="https://beispiel.com/landing">
      </div>
      <div class="form-group">
        <label>UTM-Quelle * (z.B.: google, facebook, newsletter)</label>
        <input type="text" id="utmSource" placeholder="google">
      </div>
      <div class="form-group">
        <label>UTM-Medium * (z.B.: cpc, email, social)</label>
        <select id="utmMedium">
          <option value="">Medium auswählen...</option>
          <option value="cpc">CPC (Kosten pro Klick)</option>
          <option value="email">E-Mail</option>
          <option value="social">Social</option>
          <option value="organic">Organisch</option>
          <option value="referral">Referral</option>
          <option value="display">Display</option>
          <option value="affiliate">Affiliate</option>
          <option value="custom">Benutzerdefiniert</option>
        </select>
        <input type="text" id="utmMediumCustom" placeholder="Benutzerdefiniertes Medium eingeben" style="display:none; margin-top:8px;">
      </div>
      <div class="form-group">
        <label>UTM-Kampagne * (z.B.: sommer_sale, produktlaunch)</label>
        <input type="text" id="utmCampaign" placeholder="sommer_sale_2025">
      </div>
      <div class="form-group">
        <label>UTM-Begriff (optional - für bezahlte Suchbegriffe)</label>
        <input type="text" id="utmTerm" placeholder="laufschuhe">
      </div>
      <div class="form-group">
        <label>UTM-Inhalt (optional - für A/B-Tests)</label>
        <input type="text" id="utmContent" placeholder="banner_a">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="buildUTM()">URL erstellen</button>
        <button class="btn btn-secondary" onclick="clearFields()">Zurücksetzen</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="Kopiert!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Kopieren</button>
      </div>
      
      <script>
        document.getElementById('utmMedium').addEventListener('change', function() {
          const customInput = document.getElementById('utmMediumCustom');
          if (this.value === 'custom') {
            customInput.style.display = 'block';
            customInput.focus();
          } else {
            customInput.style.display = 'none';
          }
        });
        
        function buildUTM() {
          const baseUrl = document.getElementById('baseUrl').value.trim();
          const source = document.getElementById('utmSource').value.trim();
          let medium = document.getElementById('utmMedium').value;
          const campaign = document.getElementById('utmCampaign').value.trim();
          const term = document.getElementById('utmTerm').value.trim();
          const content = document.getElementById('utmContent').value.trim();
          
          if (!baseUrl) {
            alert('Bitte geben Sie eine URL ein');
            return;
          }
          if (!source) {
            alert('Bitte geben Sie die UTM-Quelle ein');
            return;
          }
          if (!medium) {
            alert('Bitte wählen Sie das UTM-Medium aus');
            return;
          }
          if (!campaign) {
            alert('Bitte geben Sie die UTM-Kampagne ein');
            return;
          }
          
          if (medium === 'custom') {
            medium = document.getElementById('utmMediumCustom').value.trim();
          }
          
          let url = baseUrl;
          if (!url.includes('?')) {
            url += '?';
          } else {
            url += '&';
          }
          
          const params = [];
          params.push('utm_source=' + encodeURIComponent(source));
          params.push('utm_medium=' + encodeURIComponent(medium));
          params.push('utm_campaign=' + encodeURIComponent(campaign));
          if (term) params.push('utm_term=' + encodeURIComponent(term));
          if (content) params.push('utm_content=' + encodeURIComponent(content));
          
          url += params.join('&');
          
          document.getElementById('codeContent').textContent = url;
          document.getElementById('output').style.display = 'block';
        }
        
        function clearFields() {
          document.getElementById('baseUrl').value = '';
          document.getElementById('utmSource').value = '';
          document.getElementById('utmMedium').value = '';
          document.getElementById('utmMediumCustom').value = '';
          document.getElementById('utmMediumCustom').style.display = 'none';
          document.getElementById('utmCampaign').value = '';
          document.getElementById('utmTerm').value = '';
          document.getElementById('utmContent').value = '';
          document.getElementById('output').style.display = 'none';
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
</body>
</html>
