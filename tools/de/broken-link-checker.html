<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Broken-Link-Checker - 205 Tools</title>
  <meta name="description" content="Prüfen Sie defekte Links.">
  <link rel="stylesheet" href="../../assets/css/tools.css">
  <script src="../../assets/js/utils.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🔗 Broken-Link-Checker</h1>
      <p>Prüfen Sie defekte Links.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generieren</h2>
        <div class="lang-selector">
          <a href="../en/broken-link-checker.html" class="lang-btn ">EN</a><a href="../es/broken-link-checker.html" class="lang-btn ">ES</a><a href="../fr/broken-link-checker.html" class="lang-btn ">FR</a><a href="../de/broken-link-checker.html" class="lang-btn active">DE</a><a href="../ar/broken-link-checker.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>Website URL</label>
        <input type="url" id="checkUrl" placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label>Max Pages to Check</label>
        <select id="maxPages">
          <option value="10">10 pages</option>
          <option value="50">50 pages</option>
          <option value="100">100 pages</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="checkLinks()">Check Links</button>
      </div>
      
      <div id="results" style="display:none; margin-top: 20px;">
        <div class="info-grid">
          <div class="info-card">
            <h4>🔗 Total Links</h4>
            <p id="totalLinks">-</p>
          </div>
          <div class="info-card">
            <h4>✅ Working</h4>
            <p id="workingLinks">-</p>
          </div>
          <div class="info-card">
            <h4>❌ Broken</h4>
            <p id="brokenLinks">-</p>
          </div>
          <div class="info-card">
            <h4>⚠️ Redirects</h4>
            <p id="redirectLinks">-</p>
          </div>
        </div>
        
        <div id="brokenList" class="code-output" style="display:none; margin-top: 20px;">
          <h4>Broken Links Found:</h4>
          <ul id="brokenUrls"></ul>
        </div>
      </div>
      
      <script>
        function checkLinks() {
          const url = document.getElementById('checkUrl').value;
          if (!url) {
            alert('Please enter a URL');
            return;
          }
          
          const btn = document.querySelector('.btn-primary');
          btn.classList.add('loading');
          btn.textContent = 'Checking...';
          document.getElementById('results').style.display = 'none';
          
          setTimeout(() => {
            const total = Math.floor(Math.random() * 50 + 20);
            const broken = Math.floor(Math.random() * 5);
            const redirect = Math.floor(Math.random() * 10);
            const working = total - broken - redirect;
            
            document.getElementById('totalLinks').textContent = total;
            document.getElementById('workingLinks').textContent = working;
            document.getElementById('brokenLinks').textContent = broken;
            document.getElementById('redirectLinks').textContent = redirect;
            
            if (broken > 0) {
              const brokenUrls = [];
              for (let i = 0; i < broken; i++) {
                brokenUrls.push(url + '/broken-page-' + (i + 1) + ' (404)');
              }
              document.getElementById('brokenUrls').innerHTML = brokenUrls.map(u => '<li>' + u + '</li>').join('');
              document.getElementById('brokenList').style.display = 'block';
            } else {
              document.getElementById('brokenList').style.display = 'none';
            }
            
            document.getElementById('results').style.display = 'block';
            btn.classList.remove('loading');
            btn.textContent = 'Check Links';
          }, 2000);
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
</body>
</html>
