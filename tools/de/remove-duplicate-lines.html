<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doppelte Zeilen Entfernen - 205 Tools</title>
  <meta name="description" content="Entfernen Sie doppelte Zeilen aus Ihrem Text.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🔄 Doppelte Zeilen Entfernen</h1>
      <p>Entfernen Sie doppelte Zeilen aus Ihrem Text und behalten Sie die Reihenfolge bei</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Eingabetext</h2>
        <div class="lang-selector">
          <a href="../en/remove-duplicate-lines.html" class="lang-btn">EN</a>
          <a href="../es/remove-duplicate-lines.html" class="lang-btn">ES</a>
          <a href="../fr/remove-duplicate-lines.html" class="lang-btn">FR</a>
          <a href="./remove-duplicate-lines.html" class="lang-btn active">DE</a>
          <a href="../ar/remove-duplicate-lines.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Text mit doppelten Zeilen hier einfügen..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="removeDuplicates()">Duplikate Entfernen</button>
        <button class="btn btn-secondary" onclick="clearAll()">Löschen</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Ergebnis</label>
        <textarea id="output" rows="8" readonly placeholder="Ergebnis erscheint hier..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Ergebnis Kopieren</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
  </div>
  
  <script>
    function removeDuplicates() {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      const lines = input.split('\n');
      const seen = new Set();
      const unique = [];
      
      for (const line of lines) {
        if (!seen.has(line)) {
          seen.add(line);
          unique.push(line);
        }
      }
      
      document.getElementById('output').value = unique.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('In die Zwischenablage kopiert!');
    }
  </script>
</body>
</html>
