<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64-Encoder - 205 Tools</title>
  <meta name="description" content="Text in Base64-Format kodieren.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🔒 Base64-Encoder</h1>
      <p>Text in Base64-Format umwandeln</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Encoder</h2>
        <div class="lang-selector">
          <a href="../en/base64-encoder.html" class="lang-btn">EN</a>
          <a href="../es/base64-encoder.html" class="lang-btn">ES</a>
          <a href="../fr/base64-encoder.html" class="lang-btn">FR</a>
          <a href="./base64-encoder.html" class="lang-btn active">DE</a>
          <a href="../ar/base64-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Zu Kodierender Text</label>
        <textarea id="input" rows="8" placeholder="Text zum Kodieren eingeben...">Hallo, Welt! 👋</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encode()">🔒 Kodieren</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Kopieren</button>
        <button class="btn btn-secondary" onclick="clearAll()">Löschen</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Base64-Ergebnis</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
  </div>
  
  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) { alert('Bitte Text eingeben'); return; }
      
      try {
        const result = btoa(unescape(encodeURIComponent(text)));
        document.getElementById('output').value = result;
      } catch (e) {
        alert('Fehler beim Kodieren');
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Kopiert!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
