<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IP-Adressen-Suche - 205 Tools</title>
  <meta name="description" content="Suchen Sie Informationen zu einer IP-Adresse.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🌐 IP-Adressen-Suche</h1>
      <p>Suchen Sie Informationen zu einer IP-Adresse.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Input</h2>
        <div class="lang-selector">
          <a href="../en/ip-address-lookup.html" class="lang-btn ">EN</a><a href="../es/ip-address-lookup.html" class="lang-btn ">ES</a><a href="../fr/ip-address-lookup.html" class="lang-btn ">FR</a><a href="../de/ip-address-lookup.html" class="lang-btn ">DE</a><a href="../ar/ip-address-lookup.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>IP Address</label>
        <input type="text" id="ipInput" placeholder="192.168.1.1 or 2001:db8::1">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="lookupIP()">Lookup</button>
        <button class="btn btn-secondary" onclick="getMyIP()">Get My IP</button>
        <button class="btn btn-secondary" onclick="clearIP()">Clear</button>
      </div>
      <div id="resultSection" style="margin-top: 20px; display: none;">
        <div id="ipResults" class="info-grid"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function lookupIP() {
      const ip = document.getElementById('ipInput').value.trim();
      if (!ip) {
        alert('Please enter an IP address');
        return;
      }
      
      if (!isValidIP(ip)) {
        alert('Invalid IP address format');
        return;
      }
      
      displayIPInfo(ip);
    }
    
    function isValidIP(ip) {
      // IPv4 regex
      const ipv4Regex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
      // IPv6 regex (simplified)
      const ipv6Regex = /^(?:[0-9a-fA-F]{1,4}:){7}[0-9a-fA-F]{1,4}$|^::1$|^::$/;
      
      return ipv4Regex.test(ip) || ipv6Regex.test(ip);
    }
    
    function displayIPInfo(ip) {
      const results = [];
      
      // Determine IP type
      const isIPv4 = ip.includes('.');
      const isIPv6 = ip.includes(':');
      
      results.push({ label: 'IP Address', value: ip });
      results.push({ label: 'Version', value: isIPv4 ? 'IPv4' : 'IPv6' });
      
      if (isIPv4) {
        const parts = ip.split('.');
        const firstOctet = parseInt(parts[0]);
        
        // IP Class
        let ipClass = 'Unknown';
        if (firstOctet >= 1 && firstOctet <= 126) ipClass = 'A (Public)';
        else if (firstOctet >= 128 && firstOctet <= 191) ipClass = 'B (Public)';
        else if (firstOctet >= 192 && firstOctet <= 223) ipClass = 'C (Public)';
        else if (firstOctet >= 224 && firstOctet <= 239) ipClass = 'D (Multicast)';
        else if (firstOctet >= 240 && firstOctet <= 255) ipClass = 'E (Reserved)';
        
        results.push({ label: 'Class', value: ipClass });
        
        // Check for special ranges
        if (firstOctet === 10) results.push({ label: 'Type', value: 'Private (RFC 1918)' });
        else if (firstOctet === 172 && parseInt(parts[1]) >= 16 && parseInt(parts[1]) <= 31) results.push({ label: 'Type', value: 'Private (RFC 1918)' });
        else if (firstOctet === 192 && parseInt(parts[1]) === 168) results.push({ label: 'Type', value: 'Private (RFC 1918)' });
        else if (firstOctet === 127) results.push({ label: 'Type', value: 'Loopback' });
        else if (firstOctet === 169 && parseInt(parts[1]) === 254) results.push({ label: 'Type', value: 'Link-local (APIPA)' });
        else if (firstOctet >= 224 && firstOctet <= 239) results.push({ label: 'Type', value: 'Multicast' });
        else results.push({ label: 'Type', value: 'Public' });
        
        // Binary representation
        const binary = parts.map(p => parseInt(p).toString(2).padStart(8, '0')).join('.');
        results.push({ label: 'Binary', value: binary });
        
        // Integer representation
        const integer = parts.reduce((acc, part, i) => acc + (parseInt(part) << (8 * (3 - i))), 0);
        results.push({ label: 'Integer', value: integer >>> 0 });
      } else {
        // IPv6 checks
        if (ip === '::1') results.push({ label: 'Type', value: 'Loopback' });
        else if (ip.startsWith('fe80:')) results.push({ label: 'Type', value: 'Link-local' });
        else if (ip.startsWith('fc') || ip.startsWith('fd')) results.push({ label: 'Type', value: 'Unique Local (Private)' });
        else if (ip.startsWith('ff')) results.push({ label: 'Type', value: 'Multicast' });
        else results.push({ label: 'Type', value: 'Global Unicast' });
      }
      
      displayResults(results);
    }
    
    function displayResults(results) {
      const container = document.getElementById('ipResults');
      container.innerHTML = '';
      
      results.forEach(result => {
        const div = document.createElement('div');
        div.className = 'info-item';
        div.style.cssText = 'padding: 12px; background: var(--bg-secondary); margin: 8px 0; border-radius: 8px;';
        div.innerHTML = '<strong style="color: var(--primary); display: block; margin-bottom: 4px;">' + result.label + '</strong><span style="font-family: monospace;">' + result.value + '</span>';
        container.appendChild(div);
      });
      
      document.getElementById('resultSection').style.display = 'block';
    }
    
    async function getMyIP() {
      try {
        const response = await fetch('https://api.ipify.org?format=json');
        const data = await response.json();
        document.getElementById('ipInput').value = data.ip;
        displayIPInfo(data.ip);
      } catch (error) {
        alert('Could not fetch your IP address. Please enter it manually.');
      }
    }
    
    function clearIP() {
      document.getElementById('ipInput').value = '';
      document.getElementById('resultSection').style.display = 'none';
    }
  </script>
</body>
</html>
