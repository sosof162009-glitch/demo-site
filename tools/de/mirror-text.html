<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spiegeltext - 205 Tools</title>
  <meta name="description" content="Erstellen Sie Spiegel-/Reflexionstexteffekte.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .mirror-output { text-align: center; font-size: 24px; line-height: 1.5; }
    .mirror-line { display: block; }
    .mirror-reflected { transform: scaleY(-1); opacity: 0.5; filter: blur(1px); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🪞 Spiegeltext</h1>
      <p>Erstellen Sie Spiegel-/Reflexionstexteffekte</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Eingabe</h2>
        <div class="lang-selector">
          <a href="../en/mirror-text.html" class="lang-btn">EN</a>
          <a href="../es/mirror-text.html" class="lang-btn">ES</a>
          <a href="../fr/mirror-text.html" class="lang-btn">FR</a>
          <a href="./mirror-text.html" class="lang-btn active">DE</a>
          <a href="../ar/mirror-text.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="textInput" rows="4" placeholder="Text für Spiegel eingeben..."></textarea>
      </div>
      
      <div class="form-group">
        <label>Spiegelstil</label>
        <select id="mirrorStyle">
          <option value="reverse">Umgekehrt (Horizontal)</option>
          <option value="vertical">Vertikal Drehen</option>
          <option value="both">Beide Richtungen</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="mirrorText()">Spiegeln</button>
        <button class="btn btn-secondary" onclick="clearAll()">Löschen</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Ergebnis</label>
        <textarea id="output" rows="4" readonly placeholder="Spiegeltext erscheint hier..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Ergebnis Kopieren</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
  </div>
  
  <script>
    function mirrorText() {
      const text = document.getElementById('textInput').value;
      const style = document.getElementById('mirrorStyle').value;
      let result = '';
      
      if (!text) return;
      
      switch(style) {
        case 'reverse':
          result = text.split('').reverse().join('');
          break;
        case 'vertical':
          result = text.split('\n').reverse().join('\n');
          break;
        case 'both':
          result = text.split('').reverse().join('').split('\n').reverse().join('\n');
          break;
      }
      
      document.getElementById('output').value = result;
    }
    
    function clearAll() {
      document.getElementById('textInput').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('In die Zwischenablage kopiert!');
    }
  </script>
</body>
</html>
