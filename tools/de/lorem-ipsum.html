<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorem Ipsum Generator | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="lorem-ipsum.html" >English</option>
      <option value="../ar/lorem-ipsum.html" >العربية</option>
      <option value="../fr/lorem-ipsum.html" >Français</option>
      <option value="../es/lorem-ipsum.html" >Español</option>
      <option value="../de/lorem-ipsum.html" selected>Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Lorem Ipsum Generator</h1>
      <p>Generate placeholder text for your designs and layouts</p>
    </header>

    <div class="tool-card">
      <div class="options-group">
        <div class="option-item">
          <label for="amount">Amount:</label>
          <input type="number" id="amount" value="3" min="1" max="100" style="width: 80px; margin-left: 8px;">
        </div>
        <div class="option-item">
          <label for="type">Type:</label>
          <select id="type" class="tool-select" style="margin-left: 8px;">
            <option value="paragraphs">Paragraphs</option>
            <option value="sentences">Sentences</option>
            <option value="words">Words</option>
          </select>
        </div>
        <div class="option-item">
          <input type="checkbox" id="start-lorem" checked>
          <label for="start-lorem">Start with "Lorem ipsum..."</label>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="generate()">Generate</button>
        <button class="btn btn-secondary" onclick="clearOutput()">Clear</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Generated Text:</label>
        <textarea id="text-output" class="tool-textarea" placeholder="Generated text will appear here..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copied!</span>
  </div>

  <script>
    const words = ["lorem","ipsum","dolor","sit","amet","consectetur","adipiscing","elit","sed","do","eiusmod","tempor","incididunt","ut","labore","et","dolore","magna","aliqua","ut","enim","ad","minim","veniam","quis","nostrud","exercitation","ullamco","laboris","nisi","ut","aliquip","ex","ea","commodo","consequat","duis","aute","irure","in","reprehenderit","voluptate","velit","esse","cillum","fugiat","nulla","pariatur","excepteur","sint","occaecat","cupidatat","non","proident","sunt","culpa","qui","officia","deserunt","mollit","anim","id","est","laborum"];

    function generate() {
      const amount = parseInt(document.getElementById('amount').value);
      const type = document.getElementById('type').value;
      const startLorem = document.getElementById('start-lorem').checked;
      
      let result = '';
      
      if (type === 'words') {
        result = generateWords(amount, startLorem);
      } else if (type === 'sentences') {
        result = generateSentences(amount, startLorem);
      } else {
        result = generateParagraphs(amount, startLorem);
      }
      
      document.getElementById('text-output').value = result;
    }
    
    function generateWords(count, startLorem) {
      let result = [];
      if (startLorem) {
        result = ['lorem', 'ipsum'];
        count -= 2;
      }
      for (let i = 0; i < count; i++) {
        result.push(words[Math.floor(Math.random() * words.length)]);
      }
      return result.join(' ') + '.';
    }
    
    function generateSentences(count, startLorem) {
      const sentences = [];
      for (let i = 0; i < count; i++) {
        const wordCount = Math.floor(Math.random() * 10) + 8;
        let sentence;
        if (startLorem && i === 0) {
          sentence = generateWords(wordCount, true);
        } else {
          sentence = generateWords(wordCount, false);
        }
        sentences.push(sentence.charAt(0).toUpperCase() + sentence.slice(1));
      }
      return sentences.join(' ');
    }
    
    function generateParagraphs(count, startLorem) {
      const paragraphs = [];
      for (let i = 0; i < count; i++) {
        const sentenceCount = Math.floor(Math.random() * 5) + 3;
        paragraphs.push(generateSentences(sentenceCount, startLorem && i === 0));
      }
      return paragraphs.join('\n\n');
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearOutput() {
      document.getElementById('text-output').value = '';
    }
    
    // Generate on load
    generate();
  </script>
</body>
</html>
