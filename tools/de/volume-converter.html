<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Volumenumrechner - 205 Tools</title>
  <meta name="description" content="Rechnen Sie zwischen Litern, Millilitern, Gallonen, Tassen und mehr um.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>💧 Volumenumrechner</h1>
      <p>Rechnen Sie zwischen Litern, Millilitern, Gallonen, Tassen und mehr um.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Umrechnen</h2>
        <div class="lang-selector">
          <a href="../en/volume-converter.html" class="lang-btn ">EN</a><a href="../es/volume-converter.html" class="lang-btn ">ES</a><a href="../fr/volume-converter.html" class="lang-btn ">FR</a><a href="../de/volume-converter.html" class="lang-btn active">DE</a><a href="../ar/volume-converter.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="converter-grid">
        <div class="converter-box">
          <div class="form-group">
            <label for="fromUnit">Von</label>
            <select id="fromUnit">
              <option value="L">Liters</option><option value="mL">Milliliters</option><option value="gal">Gallons (US)</option><option value="qt">Quarts</option><option value="pt">Pints</option><option value="cup">Cups</option><option value="floz">Fluid Ounces</option>
            </select>
          </div>
          <div class="form-group">
            <label for="inputValue">Wert</label>
            <input type="number" id="inputValue" placeholder="0" step="any">
          </div>
        </div>
        
        <button class="swap-btn" onclick="swapUnits()" title="Swap">⇄</button>
        
        <div class="converter-box">
          <div class="form-group">
            <label for="toUnit">Zu</label>
            <select id="toUnit">
              <option value="L">Liters</option><option value="mL">Milliliters</option><option value="gal">Gallons (US)</option><option value="qt">Quarts</option><option value="pt">Pints</option><option value="cup">Cups</option><option value="floz">Fluid Ounces</option>
            </select>
          </div>
          <div class="form-group">
            <label>Ergebnis</label>
            <div class="result-value" id="resultValue">-</div>
          </div>
        </div>
      </div>
      
      <div class="result-box" id="resultBox" style="display:none;">
        <div class="result-value" id="finalResult">-</div>
        <div class="result-label" id="resultLabel"></div>
      </div>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
  
  <script>
    const inputEl = document.getElementById('inputValue');
    const fromEl = document.getElementById('fromUnit');
    const toEl = document.getElementById('toUnit');
    const resultValueEl = document.getElementById('resultValue');
    const resultBoxEl = document.getElementById('resultBox');
    const finalResultEl = document.getElementById('finalResult');
    const resultLabelEl = document.getElementById('resultLabel');
    
    function calculate() {
      const value = parseFloat(inputEl.value);
      const from = fromEl.value;
      const to = toEl.value;
      
      if (isNaN(value)) {
        resultValueEl.textContent = '-';
        resultBoxEl.style.display = 'none';
        return;
      }
      
      try {
        const result = convertVolume(value, from, to);
        const formatted = formatNumber(result, 6);
        
        resultValueEl.textContent = formatted;
        finalResultEl.textContent = formatted;
        resultLabelEl.textContent = value + ' ' + fromEl.options[fromEl.selectedIndex].text + ' = ' + formatted + ' ' + toEl.options[toEl.selectedIndex].text;
        resultBoxEl.style.display = 'block';
      } catch (e) {
        resultValueEl.textContent = 'Error';
      }
    }
    
    function swapUnits() {
      const temp = fromEl.value;
      fromEl.value = toEl.value;
      toEl.value = temp;
      calculate();
    }
    
    inputEl.addEventListener('input', calculate);
    fromEl.addEventListener('change', calculate);
    toEl.addEventListener('change', calculate);
  </script>
</body>
</html>
