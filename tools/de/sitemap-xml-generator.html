<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sitemap-XML-Generator - 205 Tools</title>
  <meta name="description" content="Generiert XML-Sitemaps für Ihre Website.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🗺️ Sitemap-XML-Generator</h1>
      <p>Generiert XML-Sitemaps für besseres SEO und Indexierung durch Suchmaschinen.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generieren</h2>
        <div class="lang-selector">
          <a href="../en/sitemap-xml-generator.html" class="lang-btn ">EN</a><a href="../es/sitemap-xml-generator.html" class="lang-btn ">ES</a><a href="../fr/sitemap-xml-generator.html" class="lang-btn ">FR</a><a href="../de/sitemap-xml-generator.html" class="lang-btn active">DE</a><a href="../ar/sitemap-xml-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>URLs (eine pro Zeile)</label>
        <textarea id="urls" rows="8" placeholder="https://beispiel.com/&#10;https://beispiel.com/ueber-uns&#10;https://beispiel.com/kontakt"></textarea>
      </div>
      <div class="form-group">
        <label>Standard-Priorität (0,0 - 1,0)</label>
        <input type="number" id="priority" value="0,5" min="0" max="1" step="0,1">
      </div>
      <div class="form-group">
        <label>Änderungshäufigkeit</label>
        <select id="changefreq">
          <option value="always">Immer</option>
          <option value="hourly">Stündlich</option>
          <option value="daily">Täglich</option>
          <option value="weekly">Wöchentlich</option>
          <option value="monthly" selected>Monatlich</option>
          <option value="yearly">Jährlich</option>
          <option value="never">Nie</option>
        </select>
      </div>
      <div class="form-group">
        <label>Letzte Änderung</label>
        <input type="date" id="lastmod">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateSitemap()">Generieren</button>
        <button class="btn btn-secondary" onclick="clearFields()">Zurücksetzen</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="Kopiert!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Kopieren</button>
        <button class="btn btn-primary" onclick="downloadSitemap()">sitemap.xml herunterladen</button>
      </div>
      
      <script>
        let currentSitemap = '';
        
        function generateSitemap() {
          const urlsInput = document.getElementById('urls').value.trim();
          const priority = document.getElementById('priority').value.replace(',', '.');
          const changefreq = document.getElementById('changefreq').value;
          const lastmodInput = document.getElementById('lastmod').value;
          
          if (!urlsInput) {
            alert('Bitte geben Sie mindestens eine URL ein');
            return;
          }
          
          const urls = urlsInput.split('\n').map(u => u.trim()).filter(u => u);
          const lastmod = lastmodInput || new Date().toISOString().split('T')[0];
          
          let sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n';
          sitemap += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
          
          urls.forEach(url => {
            sitemap += '  <url>\n';
            sitemap += '    <loc>' + escapeXml(url) + '</loc>\n';
            sitemap += '    <lastmod>' + lastmod + '</lastmod>\n';
            sitemap += '    <changefreq>' + changefreq + '</changefreq>\n';
            sitemap += '    <priority>' + priority + '</priority>\n';
            sitemap += '  </url>\n';
          });
          
          sitemap += '</urlset>';
          
          currentSitemap = sitemap;
          document.getElementById('codeContent').textContent = sitemap;
          document.getElementById('output').style.display = 'block';
        }
        
        function escapeXml(text) {
          return text.replace(/&/g, '&amp;')
                     .replace(/</g, '&lt;')
                     .replace(/>/g, '&gt;')
                     .replace(/"/g, '&quot;')
                     .replace(/'/g, '&apos;');
        }
        
        function downloadSitemap() {
          if (!currentSitemap) return;
          const blob = new Blob([currentSitemap], { type: 'application/xml' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'sitemap.xml';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
        
        function clearFields() {
          document.getElementById('urls').value = '';
          document.getElementById('priority').value = '0,5';
          document.getElementById('changefreq').value = 'monthly';
          document.getElementById('lastmod').value = '';
          document.getElementById('output').style.display = 'none';
        }
        
        document.getElementById('lastmod').value = new Date().toISOString().split('T')[0];
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
</body>
</html>
