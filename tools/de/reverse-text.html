<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reverse Text | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="reverse-text.html" >English</option>
      <option value="../ar/reverse-text.html" >العربية</option>
      <option value="../fr/reverse-text.html" >Français</option>
      <option value="../es/reverse-text.html" >Español</option>
      <option value="../de/reverse-text.html" selected>Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Reverse Text</h1>
      <p>Reverse your text character by character or word by word</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">Eingabetext:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Enter text to reverse..."></textarea>
      </div>

      <div class="options-group">
        <div class="option-item">
          <input type="radio" name="reverse-type" id="reverse-chars" value="chars" checked>
          <label for="reverse-chars">Reverse characters</label>
        </div>
        <div class="option-item">
          <input type="radio" name="reverse-type" id="reverse-words" value="words">
          <label for="reverse-words">Reverse words</label>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="reverseText()">Umkehren</button>
        <button class="btn btn-secondary" onclick="clearAll()">Löschen</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Ergebnis:</label>
        <textarea id="text-output" class="tool-textarea" placeholder="Reversed text will appear here..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Kopieren</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Kopiert!</span>
  </div>

  <script>
    function reverseText() {
      const text = document.getElementById('text-input').value;
      const reverseType = document.querySelector('input[name="reverse-type"]:checked').value;
      
      if (text === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      let result;
      if (reverseType === 'chars') {
        result = text.split('').reverse().join('');
      } else {
        result = text.split(/\s+/).reverse().join(' ');
      }
      
      document.getElementById('text-output').value = result;
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
