<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeichen ZĂ¤hler | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="character-counter.html" selected>Deutsch</option>
      <option value="../en/character-counter.html">English</option>
      <option value="../ar/character-counter.html">Ř§Ů„ŘąŘ±Ř¨ŮŠŘ©</option>
      <option value="../fr/character-counter.html">FranĂ§ais</option>
      <option value="../es/character-counter.html">EspaĂ±ol</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Zeichen ZĂ¤hler</h1>
      <p>ZĂ¤hlen Sie Zeichen mit detaillierter AufschlĂĽsselung inklusive Leerzeichen, Buchstaben, Zahlen und Symbolen</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">Geben Sie Ihren Text ein:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Tippen oder fĂĽgen Sie Ihren Text hier ein..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="countCharacters()">ZĂ¤hlen</button>
        <button class="btn btn-secondary" onclick="clearText()">LĂ¶schen</button>
      </div>

      <div class="stats-display">
        <div class="stat-box">
          <span class="number" id="total-chars">0</span>
          <span class="label">Gesamt</span>
        </div>
        <div class="stat-box">
          <span class="number" id="with-spaces">0</span>
          <span class="label">Mit Leerzeichen</span>
        </div>
        <div class="stat-box">
          <span class="number" id="no-spaces">0</span>
          <span class="label">Ohne Leerzeichen</span>
        </div>
        <div class="stat-box">
          <span class="number" id="letters">0</span>
          <span class="label">Buchstaben</span>
        </div>
        <div class="stat-box">
          <span class="number" id="numbers">0</span>
          <span class="label">Zahlen</span>
        </div>
        <div class="stat-box">
          <span class="number" id="symbols">0</span>
          <span class="label">Symbole</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('text-input').addEventListener('input', countCharacters);

    function countCharacters() {
      const text = document.getElementById('text-input').value;
      const total = text.length;
      const withSpaces = text.length;
      const noSpaces = text.replace(/\s/g, '').length;
      const letters = (text.match(/[a-zA-ZĂ¤Ă¶ĂĽĂ„Ă–ĂśĂź]/g) || []).length;
      const numbers = (text.match(/[0-9]/g) || []).length;
      const symbols = total - letters - numbers - (text.match(/\s/g) || []).length;
      
      document.getElementById('total-chars').textContent = total;
      document.getElementById('with-spaces').textContent = withSpaces;
      document.getElementById('no-spaces').textContent = noSpaces;
      document.getElementById('letters').textContent = letters;
      document.getElementById('numbers').textContent = numbers;
      document.getElementById('symbols').textContent = symbols;
    }

    function clearText() {
      document.getElementById('text-input').value = '';
      countCharacters();
    }
  </script>
</body>
</html>
