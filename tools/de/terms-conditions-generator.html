<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AGB-Generator - 205 Tools</title>
  <meta name="description" content="Generieren Sie Allgemeine Geschäftsbedingungen für Ihre Website.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>📋 AGB-Generator</h1>
      <p>Generieren Sie Allgemeine Geschäftsbedingungen für Ihre Website.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Details</h2>
        <div class="lang-selector">
          <a href="../en/terms-conditions-generator.html" class="lang-btn ">EN</a><a href="../es/terms-conditions-generator.html" class="lang-btn ">ES</a><a href="../fr/terms-conditions-generator.html" class="lang-btn ">FR</a><a href="../de/terms-conditions-generator.html" class="lang-btn ">DE</a><a href="../ar/terms-conditions-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Company/Website Name</label>
        <input type="text" id="companyName" placeholder="Your Company Name">
      </div>
      <div class="form-group">
        <label>Website URL</label>
        <input type="text" id="websiteUrl" placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label>Contact Email</label>
        <input type="email" id="contactEmail" placeholder="contact@example.com">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateTerms()">Generieren</button>
      </div>
      <div class="result-box" style="margin-top: 20px;">
        <textarea id="termsResult" style="width: 100%; height: 400px; font-family: inherit;" readonly></textarea>
      </div>
      <div class="btn-group" style="margin-top: 15px;">
        <button class="btn btn-success" onclick="copyToClipboard(document.getElementById('termsResult').value)">Kopieren</button>
        <button class="btn btn-secondary" onclick="downloadTerms()">Download</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function generateTerms() {
      const company = document.getElementById('companyName').value || 'Your Company';
      const url = document.getElementById('websiteUrl').value || 'https://example.com';
      const email = document.getElementById('contactEmail').value || 'contact@example.com';
      const date = new Date().toLocaleDateString();
      
      const terms = `TERMS AND CONDITIONS

Last updated: ${date}

1. AGREEMENT TO TERMS
By accessing or using ${url}, you agree to be bound by these Terms and Conditions.

2. INTELLECTUAL PROPERTY RIGHTS
All content on this website is the property of ${company} and is protected by copyright and other intellectual property laws.

3. USER REPRESENTATIONS
By using our website, you represent and warrant that:
- You have the legal capacity to agree to these Terms
- You will use the website in accordance with these Terms
- All information you provide is accurate and complete

4. PROHIBITED ACTIVITIES
You may not:
- Use the website for any illegal purpose
- Attempt to gain unauthorized access to any part of the website
- Interfere with other users' access to the website
- Transmit any harmful code or malware

5. LIMITATION OF LIABILITY
${company} shall not be liable for any indirect, incidental, special, or consequential damages arising from your use of the website.

6. INDEMNIFICATION
You agree to indemnify and hold harmless ${company} from any claims arising from your use of the website.

7. GOVERNING LAW
These Terms shall be governed by and construed in accordance with applicable laws.

8. CHANGES TO TERMS
We reserve the right to modify these Terms at any time. Continued use of the website constitutes acceptance of the modified Terms.

9. CONTACT INFORMATION
For any questions about these Terms, please contact us at:
Email: ${email}
Website: ${url}
`;
      
      document.getElementById('termsResult').value = terms;
    }
    
    function downloadTerms() {
      const terms = document.getElementById('termsResult').value;
      if (!terms) return;
      const blob = new Blob([terms], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'terms-and-conditions.txt';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
