<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YAML zu JSON - 205 Tools</title>
  <meta name="description" content="Konvertieren Sie YAML in JSON-Format.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .editor-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .editor-box { display: flex; flex-direction: column; }
    .editor-box label { margin-bottom: 8px; }
    .editor-box textarea { flex: 1; min-height: 300px; }
    @media (max-width: 768px) { .editor-split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>📝 YAML zu JSON</h1>
      <p>Konvertieren Sie YAML in JSON-Format</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Konverter</h2>
        <div class="lang-selector">
          <a href="../en/yaml-to-json.html" class="lang-btn">EN</a>
          <a href="../es/yaml-to-json.html" class="lang-btn">ES</a>
          <a href="../fr/yaml-to-json.html" class="lang-btn">FR</a>
          <a href="./yaml-to-json.html" class="lang-btn active">DE</a>
          <a href="../ar/yaml-to-json.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="editor-split">
        <div class="editor-box">
          <label>YAML-Eingabe</label>
          <textarea id="yamlInput">name: Max Mustermann
alter: 30
stadt: Berlin
hobbys:
  - lesen
  - spiele
  - programmierung
adresse:
  strasse: Hauptstraße 123
  plz: 10115</textarea>
        </div>
        
        <div class="editor-box">
          <label>JSON-Ausgabe</label>
          <textarea id="jsonOutput" readonly></textarea>
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="convert()">🔄 Konvertieren</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Kopieren</button>
        <button class="btn btn-secondary" onclick="clearAll()">Löschen</button>
      </div>
      
      <div id="errorMsg" style="color: #ef4444; margin-top: 10px;"></div>
    </div>
    
    <footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
  </div>
  
  <script>
    function parseYAML(yaml) {
      const lines = yaml.split('\n');
      const result = {};
      let current = result;
      const stack = [result];
      let lastIndent = 0;
      let currentKey = null;
      
      for (let line of lines) {
        if (!line.trim() || line.trim().startsWith('#')) continue;
        
        const indent = line.search(/\S/);
        const content = line.trim();
        
        if (content.startsWith('- ')) {
          const value = content.substring(2).trim();
          if (!current[currentKey]) current[currentKey] = [];
          
          if (value.includes(':')) {
            const obj = {};
            const [k, v] = value.split(':').map(s => s.trim());
            obj[k] = v;
            current[currentKey].push(obj);
          } else {
            current[currentKey].push(value);
          }
        } else if (content.includes(':')) {
          const [key, ...valueParts] = content.split(':');
          const value = valueParts.join(':').trim();
          
          if (indent > lastIndent) {
            if (currentKey) {
              if (!current[currentKey]) current[currentKey] = {};
              current = current[currentKey];
              stack.push(current);
            }
          } else if (indent < lastIndent) {
            while (stack.length > 1 && lastIndent > indent) {
              stack.pop();
              current = stack[stack.length - 1];
              lastIndent -= 2;
            }
          }
          
          currentKey = key.trim();
          if (value) {
            if (value === 'true') current[currentKey] = true;
            else if (value === 'false') current[currentKey] = false;
            else if (value === 'null' || value === '~') current[currentKey] = null;
            else if (!isNaN(value) && value !== '') current[currentKey] = Number(value);
            else current[currentKey] = value;
          }
          
          lastIndent = indent;
        }
      }
      
      return result;
    }
    
    function convert() {
      const yaml = document.getElementById('yamlInput').value;
      if (!yaml) return;
      
      try {
        const obj = parseYAML(yaml);
        document.getElementById('jsonOutput').value = JSON.stringify(obj, null, 2);
        document.getElementById('errorMsg').textContent = '';
      } catch (e) {
        document.getElementById('errorMsg').textContent = 'Fehler: ' + e.message;
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('jsonOutput').value);
      alert('Kopiert!');
    }
    
    function clearAll() {
      document.getElementById('yamlInput').value = '';
      document.getElementById('jsonOutput').value = '';
      document.getElementById('errorMsg').textContent = '';
    }
    
    convert();
  </script>
</body>
</html>
