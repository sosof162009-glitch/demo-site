<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Minifier - 205 Tools</title>
  <meta name="description" content="Minify and compress JSON data by removing whitespace.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .json-output { background: #1e1e2e; color: #cdd6f4; padding: 15px; border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; word-break: break-all; }
    .stats-bar { display: flex; gap: 20px; padding: 15px; background: var(--bg-secondary); border-radius: 8px; margin: 15px 0; flex-wrap: wrap; }
    .stats-bar span { color: var(--text-secondary); }
    .stats-bar strong { color: var(--primary); }
    .savings { color: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🗜️ JSON-Minifizierer</h1>
      <p>JSON-Daten komprimieren und minimieren</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Minifizierer</h2>
        <div class="lang-selector">
          <a href="../en/json-minifier.html" class="lang-btn">EN</a>
          <a href="../es/json-minifier.html" class="lang-btn">ES</a>
          <a href="../fr/json-minifier.html" class="lang-btn">FR</a>
          <a href="./json-minifier.html" class="lang-btn active">DE</a>
          <a href="../ar/json-minifier.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>JSON-Eingabe</label>
        <textarea id="jsonInput" rows="8" placeholder="Fügen Sie Ihr JSON hier ein..."></textarea>
      </div>
      
      <div class="stats-bar">
        <span>Original: <strong id="originalSize">0</strong> Bytes</span>
        <span>Minifiziert: <strong id="minifiedSize">0</strong> Bytes</span>
        <span>Einsparung: <strong id="savings" class="savings">0%</strong></span>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="minifyJSON()">🗜️ Minifizieren</button>
        <button class="btn btn-success" onclick="copyOutput()">📋 Kopieren</button>
        <button class="btn btn-secondary" onclick="clearAll()">Löschen</button>
      </div>
      
      <div id="outputContainer" style="margin-top: 20px; display: none;">
        <label>Minifiziertes JSON</label>
        <div id="jsonOutput" class="json-output"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
  </div>
  
  <script>
    function minifyJSON() {
      const input = document.getElementById('jsonInput').value.trim();
      if (!input) { alert('Bitte JSON eingeben'); return; }
      
      const originalSize = new Blob([input]).size;
      
      try {
        const parsed = JSON.parse(input);
        const minified = JSON.stringify(parsed);
        const minifiedSize = new Blob([minified]).size;
        const savings = originalSize > 0 ? ((originalSize - minifiedSize) / originalSize * 100).toFixed(1) : 0;
        
        document.getElementById('jsonOutput').textContent = minified;
        document.getElementById('outputContainer').style.display = 'block';
        document.getElementById('originalSize').textContent = originalSize;
        document.getElementById('minifiedSize').textContent = minifiedSize;
        document.getElementById('savings').textContent = savings + '%';
      } catch (e) {
        document.getElementById('jsonOutput').innerHTML = '<div style="color: #ef4444;">❌ Fehler: ' + e.message + '</div>';
        document.getElementById('outputContainer').style.display = 'block';
      }
    }
    
    function copyOutput() {
      const text = document.getElementById('jsonOutput').textContent;
      navigator.clipboard.writeText(text);
      alert('Kopiert!');
    }
    
    function clearAll() {
      document.getElementById('jsonInput').value = '';
      document.getElementById('outputContainer').style.display = 'none';
      document.getElementById('originalSize').textContent = '0';
      document.getElementById('minifiedSize').textContent = '0';
      document.getElementById('savings').textContent = '0%';
    }
  </script>
</body>
</html>
