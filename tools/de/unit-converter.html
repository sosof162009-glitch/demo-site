<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einheiten-Umrechner - 205 Tools</title>
  <meta name="description" content="Konvertieren Sie zwischen verschiedenen Maßeinheiten: Länge, Gewicht, Temperatur, Volumen, Fläche, Geschwindigkeit und Zeit.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    <header>
      <h1>📐 Einheiten-Umrechner</h1>
      <p>Konvertieren Sie zwischen verschiedenen Maßeinheiten</p>
    </header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>Umrechner</h2>
        <div class="lang-selector">
          <a href="../en/unit-converter.html" class="lang-btn">EN</a>
          <a href="../es/unit-converter.html" class="lang-btn">ES</a>
          <a href="../fr/unit-converter.html" class="lang-btn">FR</a>
          <a href="./unit-converter.html" class="lang-btn active">DE</a>
          <a href="../ar/unit-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      <div class="form-group">
        <label>Kategorie</label>
        <select id="category" onchange="updateUnits()">
          <option value="length">Länge</option>
          <option value="weight">Gewicht</option>
          <option value="temperature">Temperatur</option>
          <option value="volume">Volumen</option>
          <option value="area">Fläche</option>
          <option value="speed">Geschwindigkeit</option>
          <option value="time">Zeit</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>Von</label>
          <input type="number" id="inputValue" placeholder="Wert eingeben" oninput="convert()">
          <select id="fromUnit" onchange="convert()">
            <option value="m">Meter (m)</option>
            <option value="km">Kilometer (km)</option>
            <option value="cm">Zentimeter (cm)</option>
            <option value="mm">Millimeter (mm)</option>
            <option value="ft">Fuß (ft)</option>
            <option value="in">Zoll (in)</option>
            <option value="yd">Yards (yd)</option>
            <option value="mi">Meilen (mi)</option>
          </select>
        </div>
        <div class="form-group">
          <label>Zu</label>
          <input type="number" id="outputValue" placeholder="Ergebnis" readonly>
          <select id="toUnit" onchange="convert()">
            <option value="m">Meter (m)</option>
            <option value="km" selected>Kilometer (km)</option>
            <option value="cm">Zentimeter (cm)</option>
            <option value="mm">Millimeter (mm)</option>
            <option value="ft">Fuß (ft)</option>
            <option value="in">Zoll (in)</option>
            <option value="yd">Yards (yd)</option>
            <option value="mi">Meilen (mi)</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="swapUnits()">⇄ Tauschen</button>
      <button class="btn btn-secondary" onclick="reset()">Zurücksetzen</button>
      <div id="formula" class="formula-display"></div>
    </div>
    <footer><p>205 Tools © 2025 - Kostenlose Tools</p></footer>
  </div>
  <script>
    const units = {
      length: {
        m: { name: 'Meter', factor: 1 },
        km: { name: 'Kilometer', factor: 1000 },
        cm: { name: 'Zentimeter', factor: 0.01 },
        mm: { name: 'Millimeter', factor: 0.001 },
        ft: { name: 'Fuß', factor: 0.3048 },
        in: { name: 'Zoll', factor: 0.0254 },
        yd: { name: 'Yards', factor: 0.9144 },
        mi: { name: 'Meilen', factor: 1609.34 }
      },
      weight: {
        kg: { name: 'Kilogramm', factor: 1 },
        g: { name: 'Gramm', factor: 0.001 },
        mg: { name: 'Milligramm', factor: 0.000001 },
        lb: { name: 'Pfund', factor: 0.453592 },
        oz: { name: 'Unzen', factor: 0.0283495 },
        t: { name: 'Tonnen', factor: 1000 }
      },
      temperature: { c: { name: 'Celsius' }, f: { name: 'Fahrenheit' }, k: { name: 'Kelvin' } },
      volume: {
        l: { name: 'Liter', factor: 1 },
        ml: { name: 'Milliliter', factor: 0.001 },
        gal: { name: 'Gallonen (US)', factor: 3.78541 },
        qt: { name: 'Quarts (US)', factor: 0.946353 },
        pt: { name: 'Pints (US)', factor: 0.473176 },
        cup: { name: 'Tassen (US)', factor: 0.236588 },
        floz: { name: 'Flüssigunzen (US)', factor: 0.0295735 }
      },
      area: {
        m2: { name: 'Quadratmeter', factor: 1 },
        km2: { name: 'Quadratkilometer', factor: 1000000 },
        ft2: { name: 'Quadratfuß', factor: 0.092903 },
        ac: { name: 'Acres', factor: 4046.86 },
        ha: { name: 'Hektar', factor: 10000 }
      },
      speed: {
        ms: { name: 'Meter/Sekunde', factor: 1 },
        kmh: { name: 'Km/Stunde', factor: 0.277778 },
        mph: { name: 'Meilen/Stunde', factor: 0.44704 },
        kn: { name: 'Knoten', factor: 0.514444 }
      },
      time: {
        s: { name: 'Sekunden', factor: 1 },
        min: { name: 'Minuten', factor: 60 },
        h: { name: 'Stunden', factor: 3600 },
        d: { name: 'Tage', factor: 86400 },
        wk: { name: 'Wochen', factor: 604800 },
        mo: { name: 'Monate (Durchschnitt)', factor: 2628000 },
        y: { name: 'Jahre', factor: 31536000 }
      }
    };
    function updateUnits() {
      const category = document.getElementById('category').value;
      const fromSelect = document.getElementById('fromUnit');
      const toSelect = document.getElementById('toUnit');
      const categoryUnits = units[category];
      const options = Object.keys(categoryUnits).map(key => `<option value="${key}">${categoryUnits[key].name} (${key})</option>`).join('');
      fromSelect.innerHTML = options;
      toSelect.innerHTML = options;
      if (toSelect.options.length > 1) { toSelect.selectedIndex = 1; }
      convert();
    }
    function convert() {
      const category = document.getElementById('category').value;
      const input = parseFloat(document.getElementById('inputValue').value);
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      if (isNaN(input)) { document.getElementById('outputValue').value = ''; return; }
      let result;
      if (category === 'temperature') { result = convertTemperature(input, from, to); }
      else { const fromFactor = units[category][from].factor; const toFactor = units[category][to].factor; result = input * fromFactor / toFactor; }
      document.getElementById('outputValue').value = Math.round(result * 100000) / 100000;
      const fromName = units[category][from].name;
      const toName = units[category][to].name;
      document.getElementById('formula').textContent = `${input} ${fromName} = ${result.toFixed(6)} ${toName}`;
    }
    function convertTemperature(value, from, to) {
      if (from === to) return value;
      let celsius;
      if (from === 'c') celsius = value;
      else if (from === 'f') celsius = (value - 32) * 5/9;
      else if (from === 'k') celsius = value - 273.15;
      if (to === 'c') return celsius;
      else if (to === 'f') return celsius * 9/5 + 32;
      else if (to === 'k') return celsius + 273.15;
    }
    function swapUnits() {
      const from = document.getElementById('fromUnit');
      const to = document.getElementById('toUnit');
      const temp = from.value; from.value = to.value; to.value = temp;
      convert();
    }
    function reset() {
      document.getElementById('inputValue').value = '';
      document.getElementById('outputValue').value = '';
      document.getElementById('formula').textContent = '';
    }
  </script>
</body>
</html>
