<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Zeitzonen Konverter - 205 Tools</title>
  <meta name="description" content="Konvertieren Sie Zeiten zwischen verschiedenen Zeitzonen.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <style>
    .timezone-section { margin-bottom: 30px; padding: 20px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
    .timezone-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    @media (max-width: 768px) { .timezone-row { grid-template-columns: 1fr; } }
    .timezone-display { background: var(--bg-input); padding: 20px; border-radius: 8px; text-align: center; border: 2px solid var(--primary); }
    .timezone-display h4 { color: var(--text-secondary); margin-bottom: 10px; font-size: 14px; }
    .time-display { font-size: 32px; font-weight: 700; color: var(--primary); font-family: 'JetBrains Mono', monospace; }
    .date-display { font-size: 16px; color: var(--text-secondary); margin-top: 5px; }
    .zone-name { font-size: 12px; color: var(--text-muted); margin-top: 5px; }
    .time-difference { text-align: center; padding: 15px; background: rgba(79, 142, 247, 0.1); border-radius: 8px; margin: 20px 0; }
    .time-difference h4 { color: var(--primary); margin-bottom: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Startseite</a>
    
    <header>
      <h1>🌍 Zeitzonen Konverter</h1>
      <p>Konvertieren Sie Zeiten zwischen verschiedenen Zeitzonen weltweit</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Konverter</h2>
        <div class="lang-selector">
          <a href="../en/time-zone-converter.html" class="lang-btn">EN</a>
          <a href="../es/time-zone-converter.html" class="lang-btn">ES</a>
          <a href="../fr/time-zone-converter.html" class="lang-btn">FR</a>
          <a href="./time-zone-converter.html" class="lang-btn active">DE</a>
          <a href="../ar/time-zone-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="timezone-section">
        <div class="form-group">
          <label>Datum und Uhrzeit</label>
          <input type="datetime-local" id="dateTimeInput" class="tool-input">
        </div>
        
        <div class="timezone-row">
          <div class="form-group">
            <label>Von Zeitzone</label>
            <select id="fromTimezone" class="tool-select" style="width: 100%; padding: 12px;"></select>
          </div>
          <div class="form-group">
            <label>Zu Zeitzone</label>
            <select id="toTimezone" class="tool-select" style="width: 100%; padding: 12px;"></select>
          </div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-primary" onclick="convertTimezone()">Konvertieren</button>
          <button class="btn btn-secondary" onclick="swapTimezones()">Tauschen</button>
          <button class="btn btn-secondary" onclick="useCurrentTime()">Aktuelle Zeit</button>
        </div>
        
        <div class="time-difference" id="timeDiff" style="display: none;">
          <h4>Zeitunterschied</h4>
          <div id="diffText"></div>
        </div>
        
        <div class="timezone-row" id="resultRow" style="display: none; margin-top: 20px;">
          <div class="timezone-display">
            <h4>VON</h4>
            <div class="time-display" id="fromTime"></div>
            <div class="date-display" id="fromDate"></div>
            <div class="zone-name" id="fromZone"></div>
          </div>
          <div class="timezone-display" style="border-color: var(--success);">
            <h4>ZU</h4>
            <div class="time-display" id="toTime" style="color: var(--success);"></div>
            <div class="date-display" id="toDate"></div>
            <div class="zone-name" id="toZone"></div>
          </div>
        </div>
      </div>
      
      <div class="timezone-section">
        <h3>Häufige Zeitzonen</h3>
        <div id="commonZones" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px;"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Kostenlose Online-Tools</p></footer>
  </div>
  
  <script>
    const timezones = [
      { name: 'UTC', label: 'UTC (Koordinierte Weltzeit)' },
      { name: 'America/New_York', label: 'New York (EST/EDT)' },
      { name: 'America/Chicago', label: 'Chicago (CST/CDT)' },
      { name: 'America/Denver', label: 'Denver (MST/MDT)' },
      { name: 'America/Los_Angeles', label: 'Los Angeles (PST/PDT)' },
      { name: 'Europe/London', label: 'London (GMT/BST)' },
      { name: 'Europe/Paris', label: 'Paris (CET/CEST)' },
      { name: 'Europe/Berlin', label: 'Berlin (CET/CEST)' },
      { name: 'Europe/Moscow', label: 'Moskau (MSK)' },
      { name: 'Asia/Dubai', label: 'Dubai (GST)' },
      { name: 'Asia/Kolkata', label: 'Mumbai (IST)' },
      { name: 'Asia/Bangkok', label: 'Bangkok (ICT)' },
      { name: 'Asia/Shanghai', label: 'Shanghai (CST)' },
      { name: 'Asia/Tokyo', label: 'Tokio (JST)' },
      { name: 'Asia/Seoul', label: 'Seoul (KST)' },
      { name: 'Australia/Sydney', label: 'Sydney (AEST/AEDT)' },
      { name: 'Pacific/Auckland', label: 'Auckland (NZST/NZDT)' },
      { name: 'Pacific/Honolulu', label: 'Honolulu (HST)' }
    ];
    
    function populateTimezones() {
      const fromSelect = document.getElementById('fromTimezone');
      const toSelect = document.getElementById('toTimezone');
      
      timezones.forEach(tz => {
        fromSelect.add(new Option(tz.label, tz.name));
        toSelect.add(new Option(tz.label, tz.name));
      });
      
      const userTimezone = Intl.DateTimeFormat().resolvedOptions().timeZone;
      fromSelect.value = userTimezone;
      toSelect.value = 'UTC';
    }
    
    function useCurrentTime() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('dateTimeInput').value = now.toISOString().slice(0, 16);
    }
    
    function convertTimezone() {
      const dateTimeValue = document.getElementById('dateTimeInput').value;
      if (!dateTimeValue) {
        alert('Bitte wählen Sie Datum und Uhrzeit');
        return;
      }
      
      const fromZone = document.getElementById('fromTimezone').value;
      const toZone = document.getElementById('toTimezone').value;
      
      const date = new Date(dateTimeValue);
      
      const fromOptions = { timeZone: fromZone, hour12: false, hour: '2-digit', minute: '2-digit' };
      const toOptions = { timeZone: toZone, hour12: false, hour: '2-digit', minute: '2-digit' };
      
      const fromTimeStr = date.toLocaleTimeString('de-DE', fromOptions);
      const toTimeStr = date.toLocaleTimeString('de-DE', toOptions);
      
      document.getElementById('fromTime').textContent = fromTimeStr;
      document.getElementById('toTime').textContent = toTimeStr;
      
      const dateOptions = { timeZone: fromZone, weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' };
      document.getElementById('fromDate').textContent = date.toLocaleDateString('de-DE', dateOptions);
      document.getElementById('toDate').textContent = date.toLocaleDateString('de-DE', { ...dateOptions, timeZone: toZone });
      
      document.getElementById('fromZone').textContent = fromZone;
      document.getElementById('toZone').textContent = toZone;
      
      document.getElementById('resultRow').style.display = 'grid';
      
      const offsetDiff = getOffsetDiff(date, fromZone, toZone);
      document.getElementById('diffText').textContent = offsetDiff;
      document.getElementById('timeDiff').style.display = 'block';
    }
    
    function getOffsetDiff(date, fromZone, toZone) {
      const fromOffset = getTimezoneOffset(date, fromZone);
      const toOffset = getTimezoneOffset(date, toZone);
      const diffHours = (toOffset - fromOffset) / 60;
      
      if (diffHours === 0) return 'Gleiche Zeitzone';
      const sign = diffHours > 0 ? '+' : '';
      return `${sign}${diffHours} Stunden (${diffHours > 0 ? 'voraus' : 'zurück'})`;
    }
    
    function getTimezoneOffset(date, timeZone) {
      const utcDate = new Date(date.toLocaleString('en-US', { timeZone: 'UTC' }));
      const tzDate = new Date(date.toLocaleString('en-US', { timeZone }));
      return (utcDate - tzDate) / 60000;
    }
    
    function swapTimezones() {
      const fromSelect = document.getElementById('fromTimezone');
      const toSelect = document.getElementById('toTimezone');
      const temp = fromSelect.value;
      fromSelect.value = toSelect.value;
      toSelect.value = temp;
    }
    
    function updateCommonZones() {
      const container = document.getElementById('commonZones');
      const now = new Date();
      
      timezones.slice(0, 8).forEach(tz => {
        const timeStr = now.toLocaleTimeString('de-DE', { timeZone: tz.name, hour: '2-digit', minute: '2-digit', hour12: false });
        const dateStr = now.toLocaleDateString('de-DE', { timeZone: tz.name, month: 'short', day: 'numeric' });
        
        const div = document.createElement('div');
        div.style.cssText = 'background: var(--bg-input); padding: 15px; border-radius: 8px; text-align: center;';
        div.innerHTML = `
          <div style="font-size: 12px; color: var(--text-muted); margin-bottom: 5px;">${tz.label.split('(')[0]}</div>
          <div style="font-size: 24px; font-weight: 700; color: var(--primary); font-family: monospace;">${timeStr}</div>
          <div style="font-size: 12px; color: var(--text-secondary);">${dateStr}</div>
        `;
        container.appendChild(div);
      });
    }
    
    populateTimezones();
    useCurrentTime();
    updateCommonZones();
    setInterval(updateCommonZones, 60000);
  </script>
</body>
</html>
