<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Pile ou Face</title>
<style>:root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}.container{width:100%;max-width:400px;text-align:center}h1{color:var(--primary);margin-bottom:1.5rem}.coin{width:150px;height:150px;margin:2rem auto;border-radius:50%;background:linear-gradient(145deg,#ffd700,#ffed4e);display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:bold;color:#333;box-shadow:0 10px 30px rgba(255,215,0,0.3)}.coin.flipping{animation:flip 1s ease-in-out}@keyframes flip{0%{transform:rotateY(0)}100%{transform:rotateY(1800deg)}}button{background:var(--primary);color:#fff;border:none;padding:1rem 2rem;border-radius:8px;cursor:pointer;font-size:1.1rem;width:100%;margin-top:1rem}#result{font-size:1.5rem;margin-top:1rem;font-weight:bold}.lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}.lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem}.lang-switch a.active{color:var(--primary)}</style>
</head>
<body>
<div class="lang-switch"><a href="en/flip-coin.html">EN</a><a href="zh/flip-coin.html">中文</a><a href="es/flip-coin.html">ES</a><a href="fr/flip-coin.html">FR</a><a href="de/flip-coin.html">DE</a></div>
<div class="container">
<h1>🪙 Pile ou Face</h1>
<div id="coin" class="coin">?</div>
<div id="result">Cliquez pour lancer</div>
<button onclick="flipCoin()">Lancer</button>
</div>
<script>function flipCoin(){const coin=document.getElementById('coin');const result=document.getElementById('result');coin.classList.add('flipping');result.textContent='Lancement...';setTimeout(()=>{coin.classList.remove('flipping');const heads=Math.random()<0.5;coin.style.background=heads?'linear-gradient(145deg,#ffd700,#ffed4e)':'linear-gradient(145deg,#c0c0c0,#e8e8e8)';coin.textContent=heads?'H':'T';result.textContent=heads?'Pile!':'Face!';},1000);}</script>
</body>
</html>
