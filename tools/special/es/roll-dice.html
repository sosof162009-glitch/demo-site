<!DOCTYPE html>
<html lang="es">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Lanzar Dados</title>
<style>:root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}.container{width:100%;max-width:500px;text-align:center}h1{color:var(--primary);margin-bottom:1.5rem}.dice-container{display:flex;justify-content:center;gap:1.5rem;margin:2rem 0;flex-wrap:wrap}.dice{width:80px;height:80px;background:var(--surface);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:2.5rem;border:2px solid var(--primary)}.options{display:flex;justify-content:center;gap:1rem;margin-bottom:1rem}select{background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.5rem;border-radius:8px}button{background:var(--primary);color:#fff;border:none;padding:1rem 2rem;border-radius:8px;cursor:pointer;font-size:1.1rem}#result{font-size:1.25rem;margin-top:1rem;font-weight:bold}.lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}.lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}.lang-switch a.active{color:var(--primary)}</style>
</head>
<body>
<div class="lang-switch"><a href="en/roll-dice.html">EN</a><a href="zh/roll-dice.html">中文</a><a href="es/roll-dice.html">ES</a><a href="fr/roll-dice.html">FR</a><a href="de/roll-dice.html">DE</a></div>
<div class="container">
<h1>🎲 Lanzar Dados</h1>
<div class="options">
<label>Número de dados: <select id="diceCount"><option value="1">1</option><option value="2" selected>2</option><option value="3">3</option><option value="4">4</option></select></label>
<label>Caras: <select id="sides"><option value="6" selected>6</option><option value="4">4</option><option value="8">8</option><option value="20">20</option></select></label>
</div>
<div id="diceContainer" class="dice-container"></div>
<div id="result">Total: -</div>
<button onclick="rollDice()">Lanzar</button>
</div>
<script>function rollDice(){const count=parseInt(document.getElementById('diceCount').value);const sides=parseInt(document.getElementById('sides').value);const container=document.getElementById('diceContainer');container.innerHTML='';let total=0;for(let i=0;i<count;i++){const dice=document.createElement('div');dice.className='dice';dice.textContent='?';container.appendChild(dice);}setTimeout(()=>{const dices=container.querySelectorAll('.dice');dices.forEach(d=>{const roll=Math.floor(Math.random()*sides)+1;d.textContent=roll;total+=roll;});document.getElementById('result').textContent='Total: '+total;},300);}rollDice();</script>
</body>
</html>
