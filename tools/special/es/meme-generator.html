<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Generador Meme</title>
<style>:root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}.container{width:100%;max-width:700px}h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}.card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}input{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;margin-bottom:1rem}.dropzone{border:2px dashed var(--primary);border-radius:8px;padding:1.5rem;text-align:center;cursor:pointer;margin-bottom:1rem}input[type="file"]{display:none}canvas{max-width:100%;border-radius:8px;display:block;margin:1rem auto;background:#fff}button{background:var(--primary);color:#fff;border:none;padding:0.75rem;border-radius:8px;cursor:pointer;width:100%}.lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}.lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}.lang-switch a.active{color:var(--primary)}</style>
</head><body>
<div class="lang-switch"><a href="en/meme-generator.html">EN</a><a href="zh/meme-generator.html">中文</a><a href="es/meme-generator.html">ES</a><a href="fr/meme-generator.html">FR</a><a href="de/meme-generator.html">DE</a></div>
<div class="container"><h1>🎭 Generador Meme</h1><div class="card">
<div class="dropzone" onclick="document.getElementById('file').click()"><p>📁 Click para subir imagen</p><input type="file" id="file" accept="image/*" onchange="loadImage(event)"></div>
<input type="text" id="topText" placeholder="Texto arriba">
<input type="text" id="bottomText" placeholder="Texto abajo">
<button onclick="generateMeme()">Generar Meme</button>
<canvas id="canvas"></canvas>
<button onclick="downloadMeme()" id="downloadBtn" style="display:none;margin-top:1rem">Descargar Meme</button>
</div></div>
<script>let img=null;function loadImage(e){const file=e.target.files[0];if(!file)return;const reader=new FileReader();reader.onload=function(event){img=new Image();img.onload=function(){drawMeme()};img.src=event.target.result};reader.readAsDataURL(file)}function generateMeme(){drawMeme();document.getElementById('downloadBtn').style.display='block'}function drawMeme(){if(!img)return;const canvas=document.getElementById('canvas');const ctx=canvas.getContext('2d');canvas.width=img.width;canvas.height=img.height;ctx.drawImage(img,0,0);const fontSize=Math.floor(canvas.width/10);ctx.font=`bold ${fontSize}px Impact,sans-serif`;ctx.fillStyle='white';ctx.strokeStyle='black';ctx.lineWidth=fontSize/15;ctx.textAlign='center';const topText=document.getElementById('topText').value.toUpperCase();const bottomText=document.getElementById('bottomText').value.toUpperCase();ctx.strokeText(topText,canvas.width/2,fontSize*1.2);ctx.fillText(topText,canvas.width/2,fontSize*1.2);ctx.strokeText(bottomText,canvas.width/2,canvas.height-fontSize*0.3);ctx.fillText(bottomText,canvas.width/2,canvas.height-fontSize*0.3)}function downloadMeme(){const canvas=document.getElementById('canvas');const link=document.createElement('a');link.download='meme.png';link.href=canvas.toDataURL();link.click()}</script>
</body></html>
