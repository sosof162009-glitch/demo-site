<!DOCTYPE html>
<html lang="es"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Generador Nombres</title>
<style>:root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}.container{width:100%;max-width:600px}h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}.card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}.options{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1rem;margin-bottom:1rem}.option label{display:block;margin-bottom:0.25rem;color:var(--text2);font-size:0.875rem}select,.option input{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.5rem;border-radius:8px}#namesList{list-style:none;margin:1rem 0}#namesList li{padding:0.75rem;border-bottom:1px solid var(--bg);display:flex;justify-content:space-between;align-items:center}.copy-btn{background:none;border:none;color:var(--primary);cursor:pointer;font-size:0.875rem}button{background:var(--primary);color:#fff;border:none;padding:0.75rem;border-radius:8px;cursor:pointer;width:100%}.lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}.lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}.lang-switch a.active{color:var(--primary)}</style>
</head><body>
<div class="lang-switch"><a href="en/name-generator.html">EN</a><a href="zh/name-generator.html">中文</a><a href="es/name-generator.html">ES</a><a href="fr/name-generator.html">FR</a><a href="de/name-generator.html">DE</a></div>
<div class="container"><h1>👤 Generador Nombres</h1><div class="card">
<div class="options">
<div class="option"><label>Género</label><select id="gender"><option value="any">Cualquiera</option><option value="male">Hombre</option><option value="female">Mujer</option></select></div>
<div class="option"><label>Estilo</label><select id="style"><option value="english">Inglés</option><option value="fantasy">Fantasía</option><option value="scifi">Sci-Fi</option></select></div>
<div class="option"><label>Cantidad</label><input type="number" id="count" value="5" min="1" max="20"></div>
</div>
<button onclick="generateNames()">Generar Nombres</button>
<ul id="namesList"></ul>
</div></div>
<script>const firstNames={{male:['James','John','Robert','Michael','William'],female:['Mary','Patricia','Jennifer','Linda','Elizabeth'],fantasy:['Aldric','Elowen','Thorne','Seraphina','Drakon'],scifi:['Zara','Kael','Nova','Orion','Luna']}};const lastNames={{english:['Smith','Johnson','Williams','Brown','Jones'],fantasy:['Shadowbane','Starwhisper','Ironheart','Moonshadow'],scifi:['Starwalker','Nebula','Quantum','Stellar']}};function generateNames(){{const gender=document.getElementById('gender').value;const style=document.getElementById('style').value;const count=parseInt(document.getElementById('count').value);const list=document.getElementById('namesList');list.innerHTML='';for(let i=0;i<count;i++){{let firstPool=[];if(style==='english'){{firstPool=gender==='male'?firstNames.male:gender==='female'?firstNames.female:[...firstNames.male,...firstNames.female]}}else{{firstPool=firstNames[style]||firstNames.male}}const lastPool=lastNames[style]||lastNames.english;const first=firstPool[Math.floor(Math.random()*firstPool.length)];const last=lastPool[Math.floor(Math.random()*lastPool.length)];const li=document.createElement('li');li.innerHTML=`<span>${{first}} ${{last}}</span><button class="copy-btn" onclick="copyName('${{first}} ${{last}}')">Copiado</button>`;list.appendChild(li);}}}function copyName(name){{navigator.clipboard.writeText(name).then(()=>alert(name))}}generateNames();</script>
</body></html>
