<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Decision Maker</title>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:600px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;font-size:1rem;min-height:120px;resize:vertical;margin-bottom:1rem}
        .options-list{display:flex;flex-wrap:wrap;gap:0.5rem;margin-bottom:1rem}
        .option-tag{background:var(--bg);border:1px solid var(--primary);padding:0.5rem 1rem;border-radius:20px;display:flex;align-items:center;gap:0.5rem}
        .option-tag button{background:none;border:none;color:var(--text2);cursor:pointer;font-size:1.2rem;padding:0;line-height:1}
        #result{text-align:center;font-size:2rem;font-weight:bold;color:var(--primary);margin:1.5rem 0;min-height:3rem;display:flex;align-items:center;justify-content:center}
        #result.spinning{animation:pulse 0.2s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
        .btn-group{display:flex;gap:0.5rem}
        button{flex:1;background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s}
        button:hover{opacity:0.9}
        button.secondary{background:transparent;border:1px solid var(--primary)}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="en/decision-maker.html" class="active">EN</a>
        <a href="zh/decision-maker.html">中文</a>
        <a href="es/decision-maker.html">ES</a>
        <a href="fr/decision-maker.html">FR</a>
        <a href="de/decision-maker.html">DE>/a>
    </div>
    <div class="container">
        <h1>🎯 Random Decision Maker</h1>
        <div class="card">
            <textarea id="input" placeholder="Enter options (one per line)...">Pizza
Burger
Sushi
Tacos
Salad</textarea>
            <div id="optionsList" class="options-list"></div>
            <div id="result">Ready to decide?</div>
            <div class="btn-group">
                <button onclick="decide()">Decide!</button>
                <button class="secondary" onclick="clearOptions()">Clear</button>
            </div>
        </div>
    </div>
    <script>
        let options=[];
        document.getElementById('input').addEventListener('input',updateOptions);
        function updateOptions(){const text=document.getElementById('input').value;options=text.split('\n').map(o=>o.trim()).filter(o=>o);renderOptions()}
        function renderOptions(){const container=document.getElementById('optionsList');container.innerHTML=options.map((opt,i)=>`\u003cspan class="option-tag"\u003e${opt}\u003cbutton onclick="removeOption(${i})"\u003e×\u003c/button\u003e\u003c/span\u003e`).join('')}
        function removeOption(index){options.splice(index,1);document.getElementById('input').value=options.join('\n');renderOptions()}
        function clearOptions(){document.getElementById('input').value='';options=[];renderOptions();document.getElementById('result').textContent='Ready to decide?'}
        function decide(){if(options.length<2){alert('Please enter at least 2 options');return}const resultEl=document.getElementById('result');resultEl.classList.add('spinning');let iterations=0;const interval=setInterval(()=>{resultEl.textContent=options[Math.floor(Math.random()*options.length)];iterations++;if(iterations>20){clearInterval(interval);resultEl.classList.remove('spinning');resultEl.textContent=`✓ ${options[Math.floor(Math.random()*options.length)]}`}},100)}
        updateOptions();
    </script>
</body>
</html>
