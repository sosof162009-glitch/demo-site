<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASCII Art to Text</title>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:700px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;font-size:0.8rem;min-height:200px;resize:vertical;font-family:monospace;margin-bottom:1rem}
        #output{background:var(--bg);border:1px solid var(--primary);padding:1rem;border-radius:8px;min-height:60px;word-break:break-all}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s;width:100%}
        button:hover{opacity:0.9}
        .info{color:var(--text2);font-size:0.875rem;margin-bottom:1rem}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="en/ascii-to-text.html" class="active">EN</a>
        <a href="zh/ascii-to-text.html">中文</a>
        <a href="es/ascii-to-text.html">ES</a>
        <a href="fr/ascii-to-text.html">FR</a>
        <a href="de/ascii-to-text.html">DE</a>
    </div>
    <div class="container">
        <h1>📝 ASCII Art to Text</h1>
        <div class="card">
            <p class="info">Paste ASCII art to extract readable text (works with simple ASCII representations)</p>
            <textarea id="input" placeholder="Paste ASCII art here..."></textarea>
            <button onclick="convert()">Extract Text</button>
            <div id="output" style="margin-top:1rem">Extracted text will appear here...</div>
        </div>
    </div>
    <script>
        function convert(){const input=document.getElementById('input').value;if(!input.trim()){document.getElementById('output').textContent='Please paste ASCII art';return}const lines=input.split('\n').filter(l=>l.trim());if(lines.length===0){document.getElementById('output').textContent='No content found';return}document.getElementById('output').textContent='Note: This tool extracts visible text from ASCII art. For complex art, manual interpretation may be needed.'}
    </script>
</body>
</html>
