<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to Excel Converter</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:800px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;font-size:0.9rem;min-height:250px;resize:vertical;font-family:monospace;margin-bottom:1rem}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s}
        button:hover{opacity:0.9}
        .btn-full{width:100%}
        .options{margin-bottom:1rem}
        .options label{display:flex;align-items:center;gap:0.5rem;color:var(--text2)}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="en/csv-to-excel.html" class="active">EN</a>
        <a href="zh/csv-to-excel.html">中文</a>
        <a href="es/csv-to-excel.html">ES</a>
        <a href="fr/csv-to-excel.html">FR</a>
        <a href="de/csv-to-excel.html">DE</a>
    </div>
    <div class="container">
        <h1>📈 CSV to Excel Converter</h1>
        <div class="card">
            <div class="options">
                <label><input type="checkbox" id="header" checked> First row is header</label>
            </div>
            <textarea id="input" placeholder="name,age,city&#10;John,30,NYC&#10;Jane,25,LA"></textarea>
            <button onclick="downloadExcel()" class="btn-full">Download Excel (.xlsx)</button>
        </div>
    </div>
    <script>
        function downloadExcel(){
            const csv=document.getElementById('input').value.trim();
            if(!csv){alert('Please enter CSV data');return}
            const hasHeader=document.getElementById('header').checked;
            const rows=csv.split('\n').filter(l=>l.trim());
            const data=rows.map(row=>row.split(',').map(c=>c.trim()));
            const ws=XLSX.utils.aoa_to_sheet(data,{header:hasHeader?1:0});
            const wb=XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb,ws,"Sheet1");
            XLSX.writeFile(wb,"converted.xlsx");
        }
    </script>
</body>
</html>
