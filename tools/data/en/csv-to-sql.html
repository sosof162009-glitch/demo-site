<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to SQL Converter</title>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:900px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .card{background:var(--surface);border-radius:12px;padding:1rem}
        .card h3{margin-bottom:0.5rem;color:var(--primary)}
        textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;font-size:0.85rem;min-height:280px;resize:vertical;font-family:monospace}
        input[type="text"]{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.5rem;border-radius:8px;margin-bottom:0.5rem}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s;width:100%;margin-top:0.5rem}
        button:hover{opacity:0.9}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
        @media(max-width:768px){.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="en/csv-to-sql.html" class="active">EN</a>
        <a href="zh/csv-to-sql.html">中文</a>
        <a href="es/csv-to-sql.html">ES</a>
        <a href="fr/csv-to-sql.html">FR</a>
        <a href="de/csv-to-sql.html">DE</a>
    </div>
    <div class="container">
        <h1>💾 CSV to SQL Converter</h1>
        <div class="grid">
            <div class="card">
                <h3>Input CSV</h3>
                <input type="text" id="tableName" placeholder="Table name" value="my_table">
                <textarea id="input" placeholder="id,name,age&#10;1,John,30&#10;2,Jane,25"></textarea>
                <button onclick="convert()">Convert to SQL →</button>
            </div>
            <div class="card">
                <h3>Output SQL</h3>
                <textarea id="output" readonly placeholder="SQL output..."></textarea>
                <button onclick="copyOutput()">Copy SQL</button>
            </div>
        </div>
    </div>
    <script>
        function convert(){
            const csv=document.getElementById('input').value.trim();
            const table=document.getElementById('tableName').value||'my_table';
            if(!csv){document.getElementById('output').value='';return}
            const lines=csv.split('\n').filter(l=>l.trim());
            if(lines.length<2){document.getElementById('output').value='CSV needs header and at least one data row';return}
            const headers=lines[0].split(',').map(h=>h.trim());
            const sql=[];
            for(let i=1;i<lines.length;i++){
                const values=lines[i].split(',').map(v=>`'${v.trim().replace(/'/g,"''")}'`);
                sql.push(`INSERT INTO ${table} (${headers.join(',')}) VALUES (${values.join(',')});`);
            }
            document.getElementById('output').value=sql.join('\n');
        }
        function copyOutput(){const el=document.getElementById('output');if(el.value){el.select();document.execCommand('copy');alert('Copied!')}}
    </script>
</body>
</html>
