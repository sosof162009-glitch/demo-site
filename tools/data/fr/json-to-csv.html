<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON vers CSV</title>
    <style>:root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}.container{width:100%;max-width:900px}h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.card{background:var(--surface);border-radius:12px;padding:1rem}.card h3{margin-bottom:0.5rem;color:var(--primary)}textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;font-size:0.9rem;min-height:300px;resize:vertical;font-family:monospace}button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s;width:100%;margin-top:0.5rem}button:hover{opacity:0.9}.lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}.lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}.lang-switch a.active{color:var(--primary)}@media(max-width:768px){.grid{grid-template-columns:1fr}}</style>
</head>
<body>
    <div class="lang-switch"><a href="en/json-to-csv.html">EN</a><a href="zh/json-to-csv.html">中文</a><a href="es/json-to-csv.html">ES</a><a href="fr/json-to-csv.html" class="active">FR</a><a href="de/json-to-csv.html">DE</a></div>
    <div class="container">
        <h1>📄 JSON vers CSV</h1>
        <div class="grid">
            <div class="card">
                <h3>JSON Entr\u00e9e</h3>
                <textarea id="input" placeholder='[{"nom":"Jean","age":30},{"nom":"Marie","age":25}]'></textarea>
                <button onclick="convert()">Convertir vers CSV →</button>
            </div>
            <div class="card">
                <h3>CSV Sortie</h3>
                <textarea id="output" readonly placeholder="CSV sortie..."></textarea>
                <button onclick="copyOutput()">Copier CSV</button>
            </div>
        </div>
    </div>
    <script>
        function convert(){const input=document.getElementById('input').value.trim();if(!input){document.getElementById('output').value='';return}try{const data=JSON.parse(input);if(!Array.isArray(data)||data.length===0){document.getElementById('output').value='Tableau JSON invalide';return}const headers=Object.keys(data[0]);const csvRows=[headers.join(',')];data.forEach(row=>{const values=headers.map(h=>{const val=row[h]==null?'':String(row[h]);return val.includes(',')||val.includes('"')?`"${val.replace(/"/g,'""')}"`:val});csvRows.push(values.join(','))});document.getElementById('output').value=csvRows.join('\n')}catch(e){document.getElementById('output').value='JSON invalide: '+e.message}}
        function copyOutput(){const el=document.getElementById('output');if(el.value){el.select();document.execCommand('copy');alert('Copi\u00e9!')}}
    </script>
</body>
</html>
