<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SQL vers CSV</title>
    <style>:root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}.container{width:100%;max-width:900px}h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}.grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}.card{background:var(--surface);border-radius:12px;padding:1rem}.card h3{margin-bottom:0.5rem;color:var(--primary)}textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;font-size:0.85rem;min-height:300px;resize:vertical;font-family:monospace}button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s;width:100%;margin-top:0.5rem}button:hover{opacity:0.9}.lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}.lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}.lang-switch a.active{color:var(--primary)}@media(max-width:768px){.grid{grid-template-columns:1fr}}</style>
</head>
<body>
    <div class="lang-switch"><a href="en/sql-to-csv.html">EN</a><a href="zh/sql-to-csv.html">中文</a><a href="es/sql-to-csv.html">ES</a><a href="fr/sql-to-csv.html" class="active">FR</a><a href="de/sql-to-csv.html">DE</a></div>
    <div class="container">
        <h1>🗄️ SQL vers CSV</h1>
        <div class="grid">
            <div class="card">
                <h3>Instructions SQL INSERT</h3>
                <textarea id="input" placeholder="INSERT INTO utilisateurs (id,nom,age) VALUES (1,'Jean',30);\nINSERT INTO utilisateurs (id,nom,age) VALUES (2,'Marie',25);"></textarea>
                <button onclick="convert()">Convertir vers CSV →</button>
            </div>
            <div class="card">
                <h3>CSV Sortie</h3>
                <textarea id="output" readonly placeholder="CSV sortie..."></textarea>
                <button onclick="copyOutput()">Copier CSV</button>
            </div>
        </div>
    </div>
    <script>
        function convert(){const sql=document.getElementById('input').value;if(!sql.trim()){document.getElementById('output').value='';return}const rows=[];let headers=null;const insertRegex=/INSERT\s+INTO\s+\w+\s*\(([^)]+)\)\s*VALUES\s*\(([^)]+)\)/gi;let match;while((match=insertRegex.exec(sql))!==null){const cols=match[1].split(',').map(c=>c.trim());const vals=parseValues(match[2]);if(!headers)headers=cols;const row={};cols.forEach((c,i)=>row[c]=vals[i]||'');rows.push(row)}if(rows.length===0){document.getElementById('output').value='Aucune instruction INSERT trouv\u00e9e';return}const csvRows=[headers.join(',')];rows.forEach(row=>{csvRows.push(headers.map(h=>row[h]||'').join(','))});document.getElementById('output').value=csvRows.join('\n')}function parseValues(valStr){const vals=[];let current='';let inString=false;let stringChar='';for(let i=0;i<valStr.length;i++){const char=valStr[i];if(!inString&&(char==="'"||char==='"')){inString=true;stringChar=char}else if(inString&&char===stringChar){inString=false;vals.push(current);current=''}else if(!inString&&char===','){if(current.trim()){vals.push(current.trim());current=''}}else{current+=char}}if(current.trim())vals.push(current.trim());return vals.map(v=>v.replace(/^['"]|['"]$/g,''))}function copyOutput(){const el=document.getElementById('output');if(el.value){el.select();document.execCommand('copy');alert('Copi\u00e9!')}}
    </script>
</body>
</html>
