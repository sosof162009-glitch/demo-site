<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trier Lignes - 205 Tools</title>
  <meta name="description" content="Trier les lignes par ordre alphabétique ou numérique.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>📋 Trier Lignes</h1>
      <p>Trier les lignes alphabétiquement, numériquement ou par longueur</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Texte d'Entrée</h2>
        <div class="lang-selector">
          <a href="../en/sort-lines.html" class="lang-btn">EN</a>
          <a href="../es/sort-lines.html" class="lang-btn">ES</a>
          <a href="./sort-lines.html" class="lang-btn active">FR</a>
          <a href="../de/sort-lines.html" class="lang-btn">DE</a>
          <a href="../ar/sort-lines.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Collez les lignes à trier ici..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="sortLines('asc')">A-Z</button>
        <button class="btn btn-primary" onclick="sortLines('desc')">Z-A</button>
        <button class="btn btn-primary" onclick="sortLines('length')">Par Longueur</button>
        <button class="btn btn-primary" onclick="sortLines('reverse')">Ordre Inverse</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Résultat</label>
        <textarea id="output" rows="8" readonly placeholder="Le résultat trié apparaîtra ici..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copier Résultat</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils en Ligne Gratuits</p></footer>
  </div>
  
  <script>
    function sortLines(order) {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      let lines = input.split('\n');
      
      switch(order) {
        case 'asc':
          lines.sort((a, b) => a.localeCompare(b));
          break;
        case 'desc':
          lines.sort((a, b) => b.localeCompare(a));
          break;
        case 'length':
          lines.sort((a, b) => a.length - b.length);
          break;
        case 'reverse':
          lines.reverse();
          break;
      }
      
      document.getElementById('output').value = lines.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('Copié dans le presse-papiers!');
    }
  </script>
</body>
</html>
