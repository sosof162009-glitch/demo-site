<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trieur de Texte | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tools.css">
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="./text-sorter.html" selected>Français</option>
      <option value="../en/text-sorter.html">English</option>
      <option value="../ar/text-sorter.html">العربية</option>
      <option value="../es/text-sorter.html">Español</option>
      <option value="../de/text-sorter.html">Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Trieur de Texte</h1>
      <p>Triez les lignes par ordre alphabétique, numérique ou par longueur</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">Texte d'entrée (un élément par ligne):</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Entrez les lignes à trier..."></textarea>
      </div>

      <div class="options-group">
        <div class="option-item">
          <input type="radio" name="sort-type" id="alpha" value="alpha" checked>
          <label for="alpha">Alphabétique</label>
        </div>
        <div class="option-item">
          <input type="radio" name="sort-type" id="numeric" value="numeric">
          <label for="numeric">Numérique</label>
        </div>
        <div class="option-item">
          <input type="radio" name="sort-type" id="length" value="length">
          <label for="length">Par Longueur</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="reverse" checked>
          <label for="reverse">Ordre inverse (Z-A)</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="remove-dupes">
          <label for="remove-dupes">Supprimer doublons</label>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="sortText()">Trier</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Résultat:</label>
        <textarea id="text-output" class="tool-textarea" placeholder="Le texte trié apparaîtra ici..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copier</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copié!</span>
  </div>

  <script>
    function sortText() {
      const text = document.getElementById('text-input').value;
      const sortType = document.querySelector('input[name="sort-type"]:checked').value;
      const reverse = document.getElementById('reverse').checked;
      const removeDupes = document.getElementById('remove-dupes').checked;
      
      if (text === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      let lines = text.split('\\n').filter(l => l.trim() !== '');
      
      if (removeDupes) {
        lines = [...new Set(lines)];
      }
      
      if (sortType === 'alpha') {
        lines.sort((a, b) => a.localeCompare(b));
      } else if (sortType === 'numeric') {
        lines.sort((a, b) => parseFloat(a) - parseFloat(b));
      } else if (sortType === 'length') {
        lines.sort((a, b) => a.length - b.length);
      }
      
      if (reverse) lines.reverse();
      
      document.getElementById('text-output').value = lines.join('\\n');
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
