<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Décodeur d'Entités HTML - 205 Tools</title>
  <meta name="description" content="Décoder les entités HTML en caractères spéciaux.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>🔓 Décodeur d'Entités HTML</h1>
      <p>Convertir les entités HTML en caractères spéciaux</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Décodeur</h2>
        <div class="lang-selector">
          <a href="../en/html-entities-decoder.html" class="lang-btn">EN</a>
          <a href="../es/html-entities-decoder.html" class="lang-btn">ES</a>
          <a href="./html-entities-decoder.html" class="lang-btn active">FR</a>
          <a href="../de/html-entities-decoder.html" class="lang-btn">DE</a>
          <a href="../ar/html-entities-decoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Entités HTML à Décoder</label>
        <textarea id="input" rows="8" placeholder="Entrez HTML avec entités...">&lt;div&gt;Bonjour &amp; Bienvenue!&lt;/div&gt;
&lt;p&gt;5 &lt; 10 &amp; 10 &gt; 5&lt;/p&gt;
&quot;Guillemets&quot; et &#39;apostrophes&#39;
Copyright &copy; 2025</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="decode()">🔓 Décoder</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copier</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Texte Décodé</label>
        <textarea id="output" rows="8" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  
  <script>
    function decode() {
      let html = document.getElementById('input').value;
      if (!html) return;
      
      const textarea = document.createElement('textarea');
      textarea.innerHTML = html;
      document.getElementById('output').value = textarea.value;
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copié!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
