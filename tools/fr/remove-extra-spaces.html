<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supprimer Espaces Supplémentaires - 205 Tools</title>
  <meta name="description" content="Supprimer les espaces supplémentaires de votre texte.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>✂️ Supprimer Espaces Supplémentaires</h1>
      <p>Supprimer les espaces supplémentaires, les tabulations et nettoyer le texte</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Texte d'Entrée</h2>
        <div class="lang-selector">
          <a href="../en/remove-extra-spaces.html" class="lang-btn">EN</a>
          <a href="../es/remove-extra-spaces.html" class="lang-btn">ES</a>
          <a href="./remove-extra-spaces.html" class="lang-btn active">FR</a>
          <a href="../de/remove-extra-spaces.html" class="lang-btn">DE</a>
          <a href="../ar/remove-extra-spaces.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Collez le texte avec espaces supplémentaires ici..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="removeExtraSpaces()">Supprimer Espaces</button>
        <button class="btn btn-primary" onclick="removeAllSpaces()">Supprimer TOUS les Espaces</button>
        <button class="btn btn-primary" onclick="trimLines()">Couper Chaque Ligne</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Résultat</label>
        <textarea id="output" rows="8" readonly placeholder="Le texte nettoyé apparaîtra ici..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copier Résultat</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils en Ligne Gratuits</p></footer>
  </div>
  
  <script>
    function removeExtraSpaces() {
      let text = document.getElementById('input').value;
      text = text.replace(/\s+/g, ' ').replace(/^\s+|\s+$/gm, '');
      document.getElementById('output').value = text;
    }
    
    function removeAllSpaces() {
      let text = document.getElementById('input').value;
      text = text.replace(/\s/g, '');
      document.getElementById('output').value = text;
    }
    
    function trimLines() {
      let text = document.getElementById('input').value;
      text = text.split('\n').map(line => line.trim()).join('\n');
      document.getElementById('output').value = text;
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('Copié dans le presse-papiers!');
    }
  </script>
</body>
</html>
