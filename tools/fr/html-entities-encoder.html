<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encodeur d'Entités HTML - 205 Tools</title>
  <meta name="description" content="Encoder les caractères spéciaux en entités HTML.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>🔤 Encodeur d'Entités HTML</h1>
      <p>Convertir les caractères spéciaux en entités HTML</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Encodeur</h2>
        <div class="lang-selector">
          <a href="../en/html-entities-encoder.html" class="lang-btn">EN</a>
          <a href="../es/html-entities-encoder.html" class="lang-btn">ES</a>
          <a href="./html-entities-encoder.html" class="lang-btn active">FR</a>
          <a href="../de/html-entities-encoder.html" class="lang-btn">DE</a>
          <a href="../ar/html-entities-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Texte à Encoder</label>
        <textarea id="input" rows="8" placeholder="Entrez du texte avec des caractères spéciaux..."><div>Bonjour & Bienvenue!</div>
<p>5 < 10 & 10 > 5</p>
"Guillemets" et 'apostrophes'
Copyright © 2025</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encode()">🔒 Encoder</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copier</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>HTML Encodé</label>
        <textarea id="output" rows="8" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  
  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) return;
      
      const entities = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
        '©': '&copy;',
        '®': '&reg;',
        '™': '&trade;',
        '€': '&euro;',
        '£': '&pound;',
        '¥': '&yen;',
        ' ': '&nbsp;'
      };
      
      let encoded = text;
      for (const [char, entity] of Object.entries(entities)) {
        encoded = encoded.split(char).join(entity);
      }
      
      document.getElementById('output').value = encoded;
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copié!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
