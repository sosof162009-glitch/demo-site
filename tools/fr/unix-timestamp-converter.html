<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertisseur Timestamp Unix - 205 Tools</title>
  <meta name="description" content="Convertissez entre timestamps Unix et dates lisibles.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <style>
    .converter-section { margin-bottom: 30px; padding: 20px; background: var(--bg-card); border-radius: 12px; border: 1px solid var(--border); }
    .converter-section h3 { color: var(--primary); margin-bottom: 15px; font-size: 18px; }
    .timestamp-display { font-family: 'JetBrains Mono', monospace; font-size: 24px; color: var(--primary); background: var(--bg-input); padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; }
    .date-display { font-size: 18px; color: var(--text-primary); background: var(--bg-input); padding: 15px; border-radius: 8px; text-align: center; margin: 10px 0; }
    .current-time { text-align: center; padding: 20px; background: linear-gradient(135deg, rgba(79, 142, 247, 0.1) 0%, transparent 100%); border-radius: 12px; margin-bottom: 20px; border: 1px solid var(--border); }
    .current-time h3 { margin-bottom: 10px; color: var(--text-secondary); }
    .current-timestamp { font-size: 32px; font-weight: 700; color: var(--primary); font-family: 'JetBrains Mono', monospace; }
    .current-date { font-size: 18px; color: var(--text-secondary); margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>⏱️ Convertisseur Timestamp Unix</h1>
      <p>Convertissez entre timestamps Unix et dates lisibles</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Convertisseur</h2>
        <div class="lang-selector">
          <a href="../en/unix-timestamp-converter.html" class="lang-btn">EN</a>
          <a href="../es/unix-timestamp-converter.html" class="lang-btn">ES</a>
          <a href="./unix-timestamp-converter.html" class="lang-btn active">FR</a>
          <a href="../de/unix-timestamp-converter.html" class="lang-btn">DE</a>
          <a href="../ar/unix-timestamp-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="current-time">
        <h3>Timestamp Unix Actuel</h3>
        <div class="current-timestamp" id="currentTimestamp">--</div>
        <div class="current-date" id="currentDate">--</div>
      </div>
      
      <div class="converter-section">
        <h3>🔢 Timestamp vers Date</h3>
        <div class="form-group">
          <label>Timestamp Unix (secondes)</label>
          <input type="number" id="timestampInput" class="tool-input" placeholder="ex., 1700000000">
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="timestampToDate()">Convertir en Date</button>
          <button class="btn btn-secondary" onclick="useCurrentTimestamp()">Utiliser Actuel</button>
        </div>
        <div class="date-display" id="dateResult" style="display: none;"></div>
      </div>
      
      <div class="converter-section">
        <h3>📅 Date vers Timestamp</h3>
        <div class="form-group">
          <label>Sélectionnez Date et Heure</label>
          <input type="datetime-local" id="dateInput" class="tool-input">
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="dateToTimestamp()">Convertir en Timestamp</button>
          <button class="btn btn-secondary" onclick="useCurrentDate()">Utiliser Actuel</button>
        </div>
        <div class="timestamp-display" id="timestampResult" style="display: none;"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  
  <script>
    function updateCurrentTime() {
      const now = new Date();
      const timestamp = Math.floor(now.getTime() / 1000);
      document.getElementById('currentTimestamp').textContent = timestamp;
      document.getElementById('currentDate').textContent = now.toLocaleString('fr-FR', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric',
        hour: '2-digit', minute: '2-digit', second: '2-digit'
      });
    }
    
    setInterval(updateCurrentTime, 1000);
    updateCurrentTime();
    
    function timestampToDate() {
      const timestamp = parseInt(document.getElementById('timestampInput').value);
      if (isNaN(timestamp)) {
        alert('Veuillez entrer un timestamp valide');
        return;
      }
      const date = new Date(timestamp * 1000);
      const resultDiv = document.getElementById('dateResult');
      resultDiv.innerHTML = `
        <strong>Local:</strong> ${date.toLocaleString('fr-FR')}<br>
        <strong>UTC:</strong> ${date.toUTCString()}<br>
        <strong>ISO:</strong> ${date.toISOString()}
      `;
      resultDiv.style.display = 'block';
    }
    
    function useCurrentTimestamp() {
      document.getElementById('timestampInput').value = Math.floor(Date.now() / 1000);
      timestampToDate();
    }
    
    function dateToTimestamp() {
      const dateValue = document.getElementById('dateInput').value;
      if (!dateValue) {
        alert('Veuillez sélectionner une date et heure');
        return;
      }
      const date = new Date(dateValue);
      const timestamp = Math.floor(date.getTime() / 1000);
      const resultDiv = document.getElementById('timestampResult');
      resultDiv.innerHTML = `
        <strong>Timestamp Unix:</strong> ${timestamp}<br>
        <strong>Millisecondes:</strong> ${date.getTime()}
      `;
      resultDiv.style.display = 'block';
    }
    
    function useCurrentDate() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('dateInput').value = now.toISOString().slice(0, 16);
      dateToTimestamp();
    }
  </script>
</body>
</html>
