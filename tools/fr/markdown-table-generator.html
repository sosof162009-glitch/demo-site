<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de Tableaux Markdown - 205 Tools</title>
  <meta name="description" content="Générez des tableaux Markdown à partir de données CSV ou JSON.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .preview-table { width: 100%; border-collapse: collapse; margin: 15px 0; }
    .preview-table th, .preview-table td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
    .preview-table th { background: var(--bg-secondary); }
    .output-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre; }
    .align-options { display: flex; gap: 15px; margin: 10px 0; flex-wrap: wrap; }
    .align-options label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>📝 Générateur de Tableaux Markdown</h1>
      <p>Générez des tableaux Markdown à partir de données CSV ou tabulaires</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Générateur</h2>
        <div class="lang-selector">
          <a href="../en/markdown-table-generator.html" class="lang-btn">EN</a>
          <a href="../es/markdown-table-generator.html" class="lang-btn">ES</a>
          <a href="./markdown-table-generator.html" class="lang-btn active">FR</a>
          <a href="../de/markdown-table-generator.html" class="lang-btn">DE</a>
          <a href="../ar/markdown-table-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="align-options">
        <label><input type="radio" name="align" value="left" checked> Gauche</label>
        <label><input type="radio" name="align" value="center"> Centre</label>
        <label><input type="radio" name="align" value="right"> Droite</label>
      </div>
      
      <div class="form-group">
        <label>Données d'entrée (CSV, TSV ou séparées par des espaces)</label>
        <textarea id="inputData" rows="8" placeholder="Nom,Âge,Ville&#10;Jean,30,Paris&#10;Marie,25,Lyon"></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateTable()">🔄 Générer</button>
        <button class="btn btn-secondary" onclick="loadExample()">Exemple</button>
        <button class="btn btn-success" onclick="copyOutput()">📋 Copier</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <label>Sortie Markdown</label>
        <pre id="mdOutput" class="output-box"></pre>
        
        <label style="margin-top: 20px; display: block;">Aperçu</label>
        <div id="previewContainer"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  
  <script>
    function generateTable() {
      const input = document.getElementById('inputData').value.trim();
      if (!input) { alert('Veuillez entrer des données'); return; }
      
      const align = document.querySelector('input[name="align"]:checked').value;
      const delimiter = input.includes('\t') ? '\t' : (input.includes(',') ? ',' : '\\s+');
      
      const lines = input.split('\n').filter(l => l.trim());
      if (lines.length === 0) { alert('Aucune donnée trouvée'); return; }
      
      let rows;
      if (delimiter === '\\s+') {
        rows = lines.map(l => l.trim().split(/\\s+/));
      } else {
        rows = lines.map(l => parseLine(l, delimiter));
      }
      
      if (rows.length === 0) { alert('Pas de données valides'); return; }
      
      const colCount = Math.max(...rows.map(r => r.length));
      rows = rows.map(r => [...r, ...Array(colCount - r.length).fill('')]);
      
      const widths = Array(colCount).fill(0);
      rows.forEach(row => {
        row.forEach((cell, i) => {
          widths[i] = Math.max(widths[i], cell.length);
        });
      });
      
      let md = '';
      rows.forEach((row, idx) => {
        const cells = row.map((cell, i) => cell.padEnd(widths[i], ' '));
        md += '| ' + cells.join(' | ') + ' |\n';
        
        if (idx === 0) {
          const separators = widths.map(w => {
            if (align === 'center') return ':' + '-'.repeat(w) + ':';
            if (align === 'right') return '-'.repeat(w) + ':';
            return '-'.repeat(w + 2);
          });
          md += '|' + separators.map(s => s.padEnd(s.length + 2, '-')).join('|') + '|\n';
        }
      });
      
      document.getElementById('mdOutput').textContent = md;
      document.getElementById('previewContainer').innerHTML = generatePreview(rows);
      document.getElementById('outputSection').style.display = 'block';
    }
    
    function parseLine(line, delimiter) {
      const values = [];
      let current = '';
      let inQuotes = false;
      
      for (let char of line) {
        if (char === '"') { inQuotes = !inQuotes; }
        else if (char === delimiter && !inQuotes) { values.push(current.trim()); current = ''; }
        else { current += char; }
      }
      values.push(current.trim());
      return values;
    }
    
    function generatePreview(rows) {
      if (rows.length === 0) return '';
      
      let html = '<table class="preview-table"><thead><tr>';
      rows[0].forEach(cell => {
        html += `<th>${escapeHtml(cell)}</th>`;
      });
      html += '</tr></thead><tbody>';
      
      for (let i = 1; i < rows.length; i++) {
        html += '<tr>';
        rows[i].forEach(cell => {
          html += `<td>${escapeHtml(cell)}</td>`;
        });
        html += '</tr>';
      }
      html += '</tbody></table>';
      
      return html;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function loadExample() {
      document.getElementById('inputData').value = `Produit,Prix,Quantité,Total
Ordinateur portable,999.99,2,1999.98
Souris,29.99,5,149.95
Clavier,79.99,3,239.97
Écran,349.99,2,699.98`;
      generateTable();
    }
    
    function copyOutput() {
      const text = document.getElementById('mdOutput').textContent;
      navigator.clipboard.writeText(text);
      alert('Copié !');
    }
    
    function clearAll() {
      document.getElementById('inputData').value = '';
      document.getElementById('outputSection').style.display = 'none';
    }
  </script>
</body>
</html>
