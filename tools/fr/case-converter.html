<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Case Converter - 205 Tools</title>
  <meta name="description" content="Convert text between UPPERCASE, lowercase, Title Case, and more.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .case-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 20px 0; }
    .case-result { background: var(--bg-secondary); padding: 15px; border-radius: 8px; margin-top: 10px; font-family: monospace; min-height: 50px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>🔤 Case Converter</h1>
      <p>Convert text between different cases</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="../fr/case-converter.html" class="lang-btn">EN</a>
          <a href="../es/case-converter.html" class="lang-btn">ES</a>
          <a href="../fr/case-converter.html" class="lang-btn active">FR</a>
          <a href="../de/case-converter.html" class="lang-btn">DE</a>
          <a href="../ar/case-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Enter Text</label>
        <textarea id="inputText" rows="4" placeholder="Type text to convert...">Hello World Example</textarea>
      </div>
      
      <div class="case-options">
        <button class="btn btn-secondary" onclick="toUpper()">UPPERCASE</button>
        <button class="btn btn-secondary" onclick="toLower()">lowercase</button>
        <button class="btn btn-secondary" onclick="toTitle()">Title Case</button>
        <button class="btn btn-secondary" onclick="toSentence()">Sentence case</button>
        <button class="btn btn-secondary" onclick="toCamel()">camelCase</button>
        <button class="btn btn-secondary" onclick="toSnake()">snake_case</button>
        <button class="btn btn-secondary" onclick="toKebab()">kebab-case</button>
        <button class="btn btn-secondary" onclick="toAlternating()">AlTeRnAtInG</button>
      </div>
      
      <div id="resultContainer" style="display: none;">
        <label>Result</label>
        <div class="case-result" id="resultText"></div>
        <div class="btn-group" style="margin-top: 10px;">
          <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function getText() { return document.getElementById('inputText').value; }
    function showResult(text) {
      document.getElementById('resultText').textContent = text;
      document.getElementById('resultContainer').style.display = 'block';
    }
    
    function toUpper() { showResult(getText().toUpperCase()); }
    function toLower() { showResult(getText().toLowerCase()); }
    
    function toTitle() {
      showResult(getText().toLowerCase().replace(/\b\w/g, c => c.toUpperCase()));
    }
    
    function toSentence() {
      showResult(getText().toLowerCase().replace(/(^")|(\.\s+\w)/g, c => c.toUpperCase()));
    }
    
    function toCamel() {
      const text = getText().toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (m, c) => c.toUpperCase());
      showResult(text.charAt(0).toLowerCase() + text.slice(1));
    }
    
    function toSnake() {
      showResult(getText().toLowerCase().replace(/\s+/g, '_').replace(/[^a-z0-9_]/g, ''));
    }
    
    function toKebab() {
      showResult(getText().toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, ''));
    }
    
    function toAlternating() {
      showResult(getText().split('').map((c, i) => i % 2 === 0 ? c.toLowerCase() : c.toUpperCase()).join(''));
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('resultText').textContent);
      alert('Copied!');
    }
  </script>
</body>
</html>
