<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Encodeur Base64 - 205 Tools</title>
  <meta name="description" content="Encoder le texte au format Base64.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>🔒 Encodeur Base64</h1>
      <p>Convertir le texte au format Base64</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Encodeur</h2>
        <div class="lang-selector">
          <a href="../en/base64-encoder.html" class="lang-btn">EN</a>
          <a href="../es/base64-encoder.html" class="lang-btn">ES</a>
          <a href="./base64-encoder.html" class="lang-btn active">FR</a>
          <a href="../de/base64-encoder.html" class="lang-btn">DE</a>
          <a href="../ar/base64-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Texte à Encoder</label>
        <textarea id="input" rows="8" placeholder="Entrez le texte à encoder...">Bonjour, Monde! 👋</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encode()">🔒 Encoder</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copier</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Résultat Base64</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  
  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) { alert('Veuillez entrer du texte'); return; }
      
      try {
        const result = btoa(unescape(encodeURIComponent(text)));
        document.getElementById('output').value = result;
      } catch (e) {
        alert('Erreur lors de l\'encodage');
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copié!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
