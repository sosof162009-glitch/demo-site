<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Supprimer Lignes Dupliquées - 205 Tools</title>
  <meta name="description" content="Supprimer les lignes dupliquées de votre texte.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>🔄 Supprimer Lignes Dupliquées</h1>
      <p>Supprimer les lignes dupliquées de votre texte en conservant l'ordre</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Texte d'Entrée</h2>
        <div class="lang-selector">
          <a href="../en/remove-duplicate-lines.html" class="lang-btn">EN</a>
          <a href="../es/remove-duplicate-lines.html" class="lang-btn">ES</a>
          <a href="./remove-duplicate-lines.html" class="lang-btn active">FR</a>
          <a href="../de/remove-duplicate-lines.html" class="lang-btn">DE</a>
          <a href="../ar/remove-duplicate-lines.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Collez le texte avec lignes dupliquées ici..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="removeDuplicates()">Supprimer Doublons</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Résultat</label>
        <textarea id="output" rows="8" readonly placeholder="Le résultat apparaîtra ici..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copier Résultat</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils en Ligne Gratuits</p></footer>
  </div>
  
  <script>
    function removeDuplicates() {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      const lines = input.split('\n');
      const seen = new Set();
      const unique = [];
      
      for (const line of lines) {
        if (!seen.has(line)) {
          seen.add(line);
          unique.push(line);
        }
      }
      
      document.getElementById('output').value = unique.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('Copié dans le presse-papiers!');
    }
  </script>
</body>
</html>
