<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertisseur de Surface - 205 Tools</title>
  <meta name="description" content="Convertissez entre m², pieds carrés, acres et plus.">
  <link rel="stylesheet" href="../../assets/css/tools.css">
  <script src="../../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>📐 Convertisseur de Surface</h1>
      <p>Convertissez entre m², pieds carrés, acres et plus.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Convertir</h2>
        <div class="lang-selector">
          <a href="../en/area-converter.html" class="lang-btn ">EN</a><a href="../es/area-converter.html" class="lang-btn ">ES</a><a href="../fr/area-converter.html" class="lang-btn active">FR</a><a href="../de/area-converter.html" class="lang-btn ">DE</a><a href="../ar/area-converter.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="converter-grid">
        <div class="converter-box">
          <div class="form-group">
            <label for="fromUnit">De</label>
            <select id="fromUnit">
              <option value="m2">Square Meters</option><option value="km2">Square Kilometers</option><option value="ft2">Square Feet</option><option value="acre">Acres</option><option value="ha">Hectares</option><option value="mi2">Square Miles</option>
            </select>
          </div>
          <div class="form-group">
            <label for="inputValue">Valeur</label>
            <input type="number" id="inputValue" placeholder="0" step="any">
          </div>
        </div>
        
        <button class="swap-btn" onclick="swapUnits()" title="Swap">⇄</button>
        
        <div class="converter-box">
          <div class="form-group">
            <label for="toUnit">À</label>
            <select id="toUnit">
              <option value="m2">Square Meters</option><option value="km2">Square Kilometers</option><option value="ft2">Square Feet</option><option value="acre">Acres</option><option value="ha">Hectares</option><option value="mi2">Square Miles</option>
            </select>
          </div>
          <div class="form-group">
            <label>Résultat</label>
            <div class="result-value" id="resultValue">-</div>
          </div>
        </div>
      </div>
      
      <div class="result-box" id="resultBox" style="display:none;">
        <div class="result-value" id="finalResult">-</div>
        <div class="result-label" id="resultLabel"></div>
      </div>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Outils</p>
    </footer>
  </div>
  
  <script>
    const inputEl = document.getElementById('inputValue');
    const fromEl = document.getElementById('fromUnit');
    const toEl = document.getElementById('toUnit');
    const resultValueEl = document.getElementById('resultValue');
    const resultBoxEl = document.getElementById('resultBox');
    const finalResultEl = document.getElementById('finalResult');
    const resultLabelEl = document.getElementById('resultLabel');
    
    function calculate() {
      const value = parseFloat(inputEl.value);
      const from = fromEl.value;
      const to = toEl.value;
      
      if (isNaN(value)) {
        resultValueEl.textContent = '-';
        resultBoxEl.style.display = 'none';
        return;
      }
      
      try {
        const result = convertArea(value, from, to);
        const formatted = formatNumber(result, 6);
        
        resultValueEl.textContent = formatted;
        finalResultEl.textContent = formatted;
        resultLabelEl.textContent = value + ' ' + fromEl.options[fromEl.selectedIndex].text + ' = ' + formatted + ' ' + toEl.options[toEl.selectedIndex].text;
        resultBoxEl.style.display = 'block';
      } catch (e) {
        resultValueEl.textContent = 'Error';
      }
    }
    
    function swapUnits() {
      const temp = fromEl.value;
      fromEl.value = toEl.value;
      toEl.value = temp;
      calculate();
    }
    
    inputEl.addEventListener('input', calculate);
    fromEl.addEventListener('change', calculate);
    toEl.addEventListener('change', calculate);
  </script>
</body>
</html>
