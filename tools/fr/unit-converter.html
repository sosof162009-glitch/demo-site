<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertisseur d'Unités - 205 Tools</title>
  <meta name="description" content="Convertissez entre différentes unités de mesure: longueur, poids, température, volume, superficie, vitesse et temps.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    <header>
      <h1>📐 Convertisseur d'Unités</h1>
      <p>Convertissez entre différentes unités de mesure</p>
    </header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>Convertisseur</h2>
        <div class="lang-selector">
          <a href="../en/unit-converter.html" class="lang-btn">EN</a>
          <a href="../es/unit-converter.html" class="lang-btn">ES</a>
          <a href="./unit-converter.html" class="lang-btn active">FR</a>
          <a href="../de/unit-converter.html" class="lang-btn">DE</a>
          <a href="../ar/unit-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      <div class="form-group">
        <label>Catégorie</label>
        <select id="category" onchange="updateUnits()">
          <option value="length">Longueur</option>
          <option value="weight">Poids</option>
          <option value="temperature">Température</option>
          <option value="volume">Volume</option>
          <option value="area">Superficie</option>
          <option value="speed">Vitesse</option>
          <option value="time">Temps</option>
        </select>
      </div>
      <div class="form-row">
        <div class="form-group">
          <label>De</label>
          <input type="number" id="inputValue" placeholder="Entrez valeur" oninput="convert()">
          <select id="fromUnit" onchange="convert()">
            <option value="m">Mètres (m)</option>
            <option value="km">Kilomètres (km)</option>
            <option value="cm">Centimètres (cm)</option>
            <option value="mm">Millimètres (mm)</option>
            <option value="ft">Pieds (ft)</option>
            <option value="in">Pouces (in)</option>
            <option value="yd">Yards (yd)</option>
            <option value="mi">Miles (mi)</option>
          </select>
        </div>
        <div class="form-group">
          <label>À</label>
          <input type="number" id="outputValue" placeholder="Résultat" readonly>
          <select id="toUnit" onchange="convert()">
            <option value="m">Mètres (m)</option>
            <option value="km" selected>Kilomètres (km)</option>
            <option value="cm">Centimètres (cm)</option>
            <option value="mm">Millimètres (mm)</option>
            <option value="ft">Pieds (ft)</option>
            <option value="in">Pouces (in)</option>
            <option value="yd">Yards (yd)</option>
            <option value="mi">Miles (mi)</option>
          </select>
        </div>
      </div>
      <button class="btn btn-primary" onclick="swapUnits()">⇄ Échanger</button>
      <button class="btn btn-secondary" onclick="reset()">Réinitialiser</button>
      <div id="formula" class="formula-display"></div>
    </div>
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  <script>
    const units = {
      length: {
        m: { name: 'Mètres', factor: 1 },
        km: { name: 'Kilomètres', factor: 1000 },
        cm: { name: 'Centimètres', factor: 0.01 },
        mm: { name: 'Millimètres', factor: 0.001 },
        ft: { name: 'Pieds', factor: 0.3048 },
        in: { name: 'Pouces', factor: 0.0254 },
        yd: { name: 'Yards', factor: 0.9144 },
        mi: { name: 'Miles', factor: 1609.34 }
      },
      weight: {
        kg: { name: 'Kilogrammes', factor: 1 },
        g: { name: 'Grammes', factor: 0.001 },
        mg: { name: 'Milligrammes', factor: 0.000001 },
        lb: { name: 'Livres', factor: 0.453592 },
        oz: { name: 'Onces', factor: 0.0283495 },
        t: { name: 'Tonnes métriques', factor: 1000 }
      },
      temperature: { c: { name: 'Celsius' }, f: { name: 'Fahrenheit' }, k: { name: 'Kelvin' } },
      volume: {
        l: { name: 'Litres', factor: 1 },
        ml: { name: 'Millilitres', factor: 0.001 },
        gal: { name: 'Gallons (US)', factor: 3.78541 },
        qt: { name: 'Quarts (US)', factor: 0.946353 },
        pt: { name: 'Pintes (US)', factor: 0.473176 },
        cup: { name: 'Tasses (US)', factor: 0.236588 },
        floz: { name: 'Onces liquides (US)', factor: 0.0295735 }
      },
      area: {
        m2: { name: 'Mètres carrés', factor: 1 },
        km2: { name: 'Kilomètres carrés', factor: 1000000 },
        ft2: { name: 'Pieds carrés', factor: 0.092903 },
        ac: { name: 'Acres', factor: 4046.86 },
        ha: { name: 'Hectares', factor: 10000 }
      },
      speed: {
        ms: { name: 'Mètres/Seconde', factor: 1 },
        kmh: { name: 'Km/Heure', factor: 0.277778 },
        mph: { name: 'Miles/Heure', factor: 0.44704 },
        kn: { name: 'Nœuds', factor: 0.514444 }
      },
      time: {
        s: { name: 'Secondes', factor: 1 },
        min: { name: 'Minutes', factor: 60 },
        h: { name: 'Heures', factor: 3600 },
        d: { name: 'Jours', factor: 86400 },
        wk: { name: 'Semaines', factor: 604800 },
        mo: { name: 'Mois (moy)', factor: 2628000 },
        y: { name: 'Années', factor: 31536000 }
      }
    };
    function updateUnits() {
      const category = document.getElementById('category').value;
      const fromSelect = document.getElementById('fromUnit');
      const toSelect = document.getElementById('toUnit');
      const categoryUnits = units[category];
      const options = Object.keys(categoryUnits).map(key => `<option value="${key}">${categoryUnits[key].name} (${key})</option>`).join('');
      fromSelect.innerHTML = options;
      toSelect.innerHTML = options;
      if (toSelect.options.length > 1) { toSelect.selectedIndex = 1; }
      convert();
    }
    function convert() {
      const category = document.getElementById('category').value;
      const input = parseFloat(document.getElementById('inputValue').value);
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      if (isNaN(input)) { document.getElementById('outputValue').value = ''; return; }
      let result;
      if (category === 'temperature') { result = convertTemperature(input, from, to); }
      else { const fromFactor = units[category][from].factor; const toFactor = units[category][to].factor; result = input * fromFactor / toFactor; }
      document.getElementById('outputValue').value = Math.round(result * 100000) / 100000;
      const fromName = units[category][from].name;
      const toName = units[category][to].name;
      document.getElementById('formula').textContent = `${input} ${fromName} = ${result.toFixed(6)} ${toName}`;
    }
    function convertTemperature(value, from, to) {
      if (from === to) return value;
      let celsius;
      if (from === 'c') celsius = value;
      else if (from === 'f') celsius = (value - 32) * 5/9;
      else if (from === 'k') celsius = value - 273.15;
      if (to === 'c') return celsius;
      else if (to === 'f') return celsius * 9/5 + 32;
      else if (to === 'k') return celsius + 273.15;
    }
    function swapUnits() {
      const from = document.getElementById('fromUnit');
      const to = document.getElementById('toUnit');
      const temp = from.value; from.value = to.value; to.value = temp;
      convert();
    }
    function reset() {
      document.getElementById('inputValue').value = '';
      document.getElementById('outputValue').value = '';
      document.getElementById('formula').textContent = '';
    }
  </script>
</body>
</html>
