<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Comparateur de Différences - 205 Tools</title>
  <meta name="description" content="Comparez deux textes et mettez en évidence les différences. Trouvez les changements, ajouts et suppressions.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .diff-panel { border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .diff-header { background: var(--bg-secondary); padding: 10px 15px; font-weight: 600; border-bottom: 1px solid var(--border); }
    .diff-content { padding: 15px; min-height: 200px; font-family: monospace; font-size: 14px; line-height: 1.5; white-space: pre-wrap; word-wrap: break-word; max-height: 400px; overflow-y: auto; }
    .diff-content textarea { width: 100%; min-height: 200px; border: none; background: transparent; font-family: monospace; font-size: 14px; resize: vertical; }
    .diff-added { background-color: rgba(34, 197, 94, 0.2); color: #22c55e; padding: 2px 4px; border-radius: 3px; }
    .diff-removed { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; text-decoration: line-through; padding: 2px 4px; border-radius: 3px; }
    .diff-stats { display: flex; gap: 20px; margin: 15px 0; padding: 10px; background: var(--bg-secondary); border-radius: 8px; }
    .diff-stat { display: flex; align-items: center; gap: 8px; }
    .diff-stat .label { color: var(--text-secondary); }
    .diff-stat .value { font-weight: 600; }
    @media (max-width: 768px) { .diff-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    <header>
      <h1>📝 Comparateur de Différences</h1>
      <p>Comparez deux textes et mettez en évidence les différences</p>
    </header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>Comparer les Textes</h2>
        <div class="lang-selector">
          <a href="../en/diff-checker.html" class="lang-btn">EN</a>
          <a href="../es/diff-checker.html" class="lang-btn">ES</a>
          <a href="./diff-checker.html" class="lang-btn active">FR</a>
          <a href="../de/diff-checker.html" class="lang-btn">DE</a>
          <a href="../ar/diff-checker.html" class="lang-btn">AR</a>
        </div>
      </div>
      <div class="diff-container">
        <div class="diff-panel">
          <div class="diff-header">Texte Original</div>
          <div class="diff-content"><textarea id="text1" placeholder="Collez le texte original ici..."></textarea></div>
        </div>
        <div class="diff-panel">
          <div class="diff-header">Texte Modifié</div>
          <div class="diff-content"><textarea id="text2" placeholder="Collez le texte modifié ici..."></textarea></div>
        </div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="compareTexts()">Comparer</button>
        <button class="btn btn-secondary" onclick="clearAll()">Tout Effacer</button>
        <button class="btn btn-secondary" onclick="loadExample()">Charger Exemple</button>
      </div>
      <div id="diffStats" class="diff-stats" style="display: none;">
        <div class="diff-stat"><span class="label">Ajouté:</span><span class="value diff-added" id="addedCount">0</span></div>
        <div class="diff-stat"><span class="label">Supprimé:</span><span class="value diff-removed" id="removedCount">0</span></div>
        <div class="diff-stat"><span class="label">Modifié:</span><span class="value diff-changed" id="changedCount">0</span></div>
      </div>
      <div id="result" style="margin-top: 20px;"></div>
    </div>
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  <script>
    function compareTexts() {
      const text1 = document.getElementById('text1').value;
      const text2 = document.getElementById('text2').value;
      if (!text1 || !text2) { alert('Veuillez entrer les deux textes à comparer'); return; }
      const lines1 = text1.split('\n');
      const lines2 = text2.split('\n');
      let added = 0, removed = 0, changed = 0;
      let html = '<div class="diff-panel" style="margin-top: 20px;"><div class="diff-header">Résultat</div><div class="diff-content" id="diffResult">';
      const maxLines = Math.max(lines1.length, lines2.length);
      for (let i = 0; i < maxLines; i++) {
        const line1 = lines1[i] || '';
        const line2 = lines2[i] || '';
        if (line1 === line2) { html += escapeHtml(line1) + '\n'; }
        else if (!line1) { html += '<span class="diff-added">+ ' + escapeHtml(line2) + '</span>\n'; added++; }
        else if (!line2) { html += '<span class="diff-removed">- ' + escapeHtml(line1) + '</span>\n'; removed++; }
        else { html += '<span class="diff-removed">- ' + escapeHtml(line1) + '</span>\n'; html += '<span class="diff-added">+ ' + escapeHtml(line2) + '</span>\n'; changed++; }
      }
      html += '</div></div>';
      document.getElementById('result').innerHTML = html;
      document.getElementById('addedCount').textContent = added;
      document.getElementById('removedCount').textContent = removed;
      document.getElementById('changedCount').textContent = changed;
      document.getElementById('diffStats').style.display = 'flex';
    }
    function escapeHtml(text) { const div = document.createElement('div'); div.textContent = text; return div.innerHTML; }
    function clearAll() { document.getElementById('text1').value = ''; document.getElementById('text2').value = ''; document.getElementById('result').innerHTML = ''; document.getElementById('diffStats').style.display = 'none'; }
    function loadExample() {
      document.getElementById('text1').value = `Bonjour le Monde\nCeci est le texte original\nLa ligne 3 est ici\nAu revoir`;
      document.getElementById('text2').value = `Bonjour le Monde\nCeci est le texte modifié\nLa ligne 3 a changé\nNouvelle ligne ajoutée\nAu revoir`;
    }
  </script>
</body>
</html>
