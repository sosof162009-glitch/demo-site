<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur vCard - 205 Tools</title>
  <meta name="description" content="Générer des fichiers de contact vCard pour un partage facile.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .output-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .qr-preview { text-align: center; padding: 20px; }
    #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    <header><h1>👤 Générateur vCard</h1><p>Générer des fichiers de contact vCard et codes QR</p></header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>Générateur</h2>
        <div class="lang-selector">
          <a href="../en/vcard-generator.html" class="lang-btn">EN</a>
          <a href="../es/vcard-generator.html" class="lang-btn">ES</a>
          <a href="./vcard-generator.html" class="lang-btn active">FR</a>
          <a href="../de/vcard-generator.html" class="lang-btn">DE</a>
          <a href="../ar/vcard-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Prénom</label><input type="text" id="firstName" placeholder="Jean"></div>
        <div class="form-group"><label>Nom</label><input type="text" id="lastName" placeholder="Dupont"></div>
        <div class="form-group"><label>Téléphone</label><input type="tel" id="phone" placeholder="+33 1 23 45 67 89"></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="jean@exemple.com"></div>
        <div class="form-group"><label>Organisation</label><input type="text" id="org" placeholder="Entreprise SARL"></div>
        <div class="form-group"><label>Poste</label><input type="text" id="title" placeholder="Directeur"></div>
        <div class="form-group"><label>Site Web</label><input type="url" id="url" placeholder="https://exemple.com"></div>
        <div class="form-group"><label>Adresse</label><input type="text" id="address" placeholder="123 Rue Principale, Paris"></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateVCard()">🔄 Générer</button>
        <button class="btn btn-secondary" onclick="loadExample()">Exemple</button>
        <button class="btn btn-success" onclick="copyVCard()">📋 Copier</button>
        <button class="btn btn-secondary" onclick="downloadVCard()">💾 Télécharger</button>
      </div>
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <div class="qr-preview"><label>Code QR</label><div id="qrcode"></div></div>
        <label style="margin-top: 20px; display: block;">Sortie vCard</label>
        <pre id="vcardOutput" class="output-box"></pre>
      </div>
    </div>
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    let currentVCard = '';
    function generateVCard() {
      const fn = document.getElementById('firstName').value.trim();
      const ln = document.getElementById('lastName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const org = document.getElementById('org').value.trim();
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();
      const address = document.getElementById('address').value.trim();
      if (!fn && !ln) { alert('Veuillez entrer au moins un nom'); return; }
      let vcard = 'BEGIN:VCARD\nVERSION:3.0\n';
      vcard += 'N:' + ln + ';' + fn + ';;;\n';
      vcard += 'FN:' + fn + ' ' + ln + '\n';
      if (phone) vcard += 'TEL;TYPE=CELL:' + phone + '\n';
      if (email) vcard += 'EMAIL;TYPE=WORK:' + email + '\n';
      if (org) vcard += 'ORG:' + org + '\n';
      if (title) vcard += 'TITLE:' + title + '\n';
      if (url) vcard += 'URL:' + url + '\n';
      if (address) vcard += 'ADR;TYPE=WORK:;;' + address + ';;;;\n';
      vcard += 'END:VCARD';
      currentVCard = vcard;
      document.getElementById('vcardOutput').textContent = vcard;
      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), { text: vcard, width: 200, height: 200 });
      document.getElementById('outputSection').style.display = 'block';
    }
    function loadExample() {
      document.getElementById('firstName').value = 'Jean';
      document.getElementById('lastName').value = 'Dupont';
      document.getElementById('phone').value = '+33 1 55 12 34 56';
      document.getElementById('email').value = 'jean.dupont@exemple.com';
      document.getElementById('org').value = 'Exemple SARL';
      document.getElementById('title').value = 'Directeur Senior';
      document.getElementById('url').value = 'https://exemple.com';
      document.getElementById('address').value = '123 Avenue des Champs-Élysées, Paris, 75008';
      generateVCard();
    }
    function copyVCard() { navigator.clipboard.writeText(currentVCard); alert('Copié !'); }
    function downloadVCard() {
      const fn = document.getElementById('firstName').value || 'contact';
      const ln = document.getElementById('lastName').value || '';
      const blob = new Blob([currentVCard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fn + '_' + ln + '.vcf';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
