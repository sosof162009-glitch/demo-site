<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de Liens WhatsApp | 205 Outils</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tools.css">
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="../en/whatsapp-link-generator.html">English</option>
      <option value="../ar/whatsapp-link-generator.html">العربية</option>
      <option value="whatsapp-link-generator.html" selected>Français</option>
      <option value="../es/whatsapp-link-generator.html">Español</option>
      <option value="../de/whatsapp-link-generator.html">Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Générateur de Liens WhatsApp</h1>
      <p>Créez des liens WhatsApp cliquables avec des messages pré-remplis</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="phone-input">Numéro de Téléphone (avec indicatif pays):</label>
        <input type="text" id="phone-input" class="tool-input" placeholder="ex., +33123456789">
        <small class="help-text">Incluez l'indicatif pays sans espaces ni tirets</small>
      </div>

      <div class="input-group">
        <label for="message-input">Message Pré-rempli (optionnel):</label>
        <textarea id="message-input" class="tool-textarea" placeholder="Entrez votre message..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateLink()">Générer le Lien</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="link-output">Lien Généré:</label>
        <textarea id="link-output" class="tool-textarea" placeholder="Votre lien WhatsApp apparaîtra ici..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyLink()">Copier le Lien</button>
        <button class="btn btn-primary" onclick="openLink()">Ouvrir le Lien</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copié!</span>
  </div>

  <script>
    function generateLink() {
      const phone = document.getElementById('phone-input').value.trim();
      const message = document.getElementById('message-input').value.trim();
      
      if (!phone) {
        alert('Veuillez entrer un numéro de téléphone');
        return;
      }
      
      // Remove non-digit characters from phone
      const cleanPhone = phone.replace(/\D/g, '');
      
      let link = `https://wa.me/${cleanPhone}`;
      if (message) {
        link += `?text=${encodeURIComponent(message)}`;
      }
      
      document.getElementById('link-output').value = link;
    }

    function copyLink() {
      const output = document.getElementById('link-output');
      if (!output.value) {
        alert('Aucun lien à copier. Générez un lien d\'abord.');
        return;
      }
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function openLink() {
      const link = document.getElementById('link-output').value;
      if (!link) {
        alert('Aucun lien à ouvrir. Générez un lien d\'abord.');
        return;
      }
      window.open(link, '_blank');
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('phone-input').value = '';
      document.getElementById('message-input').value = '';
      document.getElementById('link-output').value = '';
    }
  </script>
</body>
</html>
