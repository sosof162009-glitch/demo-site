<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ASCII Converter | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="ascii-converter.html" >English</option>
      <option value="../ar/ascii-converter.html" >العربية</option>
      <option value="../fr/ascii-converter.html" selected>Français</option>
      <option value="../es/ascii-converter.html" >Español</option>
      <option value="../de/ascii-converter.html" >Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>ASCII Converter</h1>
      <p>Convert between text and ASCII codes (decimal or hex)</p>
    </header>

    <div class="tool-card">
      <div class="options-group">
        <div class="option-item">
          <input type="radio" name="mode" id="to-ascii" value="to-ascii" checked onchange="switchMode()">
          <label for="to-ascii">Text → ASCII</label>
        </div>
        <div class="option-item">
          <input type="radio" name="mode" id="from-ascii" value="from-ascii" onchange="switchMode()">
          <label for="from-ascii">ASCII → Text</label>
        </div>
        <div class="option-item">
          <input type="radio" name="format" id="decimal" value="decimal" checked>
          <label for="decimal">Decimal</label>
        </div>
        <div class="option-item">
          <input type="radio" name="format" id="hex" value="hex">
          <label for="hex">Hexadecimal</label>
        </div>
      </div>

      <div class="input-group">
        <label for="text-input" id="input-label">Text:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Enter text to convert..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="convert()">Convert</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Result:</label>
        <textarea id="text-output" class="tool-textarea" placeholder="Conversion will appear here..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copied!</span>
  </div>

  <script>
    function switchMode() {
      const mode = document.querySelector('input[name="mode"]:checked').value;
      document.getElementById('input-label').textContent = mode === 'to-ascii' ? 'Text:' : 'ASCII:';
      document.getElementById('text-input').placeholder = mode === 'to-ascii' ? 'Enter text to convert...' : 'Enter ASCII codes (space-separated)...';
    }

    function convert() {
      const input = document.getElementById('text-input').value;
      const mode = document.querySelector('input[name="mode"]:checked').value;
      const format = document.querySelector('input[name="format"]:checked').value;
      
      if (input === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      let result;
      if (mode === 'to-ascii') {
        result = input.split('').map(char => {
          const code = char.charCodeAt(0);
          return format === 'hex' ? '0x' + code.toString(16).toUpperCase() : code;
        }).join(' ');
      } else {
        const codes = input.trim().split(/\s+/);
        result = codes.map(code => {
          const num = format === 'hex' ? parseInt(code.replace('0x', ''), 16) : parseInt(code);
          return String.fromCharCode(num);
        }).join('');
      }
      
      document.getElementById('text-output').value = result;
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
