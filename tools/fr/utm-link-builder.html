<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Constructeur de Liens UTM - 205 Tools</title>
  <meta name="description" content="Construisez des URLs de suivi UTM pour vos campagnes marketing.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>📊 Constructeur de Liens UTM</h1>
      <p>Construisez des URLs de suivi UTM pour vos campagnes marketing.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Construire URL</h2>
        <div class="lang-selector">
          <a href="../en/utm-link-builder.html" class="lang-btn ">EN</a><a href="../es/utm-link-builder.html" class="lang-btn ">ES</a><a href="../fr/utm-link-builder.html" class="lang-btn active">FR</a><a href="../de/utm-link-builder.html" class="lang-btn ">DE</a><a href="../ar/utm-link-builder.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>URL du Site Web *</label>
        <input type="url" id="baseUrl" placeholder="https://exemple.com/landing">
      </div>
      <div class="form-group">
        <label>Source UTM * (ex: google, facebook, newsletter)</label>
        <input type="text" id="utmSource" placeholder="google">
      </div>
      <div class="form-group">
        <label>Médium UTM * (ex: cpc, email, social)</label>
        <select id="utmMedium">
          <option value="">Sélectionner médium...</option>
          <option value="cpc">CPC (Coût Par Clic)</option>
          <option value="email">Email</option>
          <option value="social">Social</option>
          <option value="organic">Organique</option>
          <option value="referral">Référence</option>
          <option value="display">Display</option>
          <option value="affiliate">Affilié</option>
          <option value="custom">Personnalisé</option>
        </select>
        <input type="text" id="utmMediumCustom" placeholder="Entrez médium personnalisé" style="display:none; margin-top:8px;">
      </div>
      <div class="form-group">
        <label>Campagne UTM * (ex: soldes_ete, lancement)</label>
        <input type="text" id="utmCampaign" placeholder="soldes_ete_2025">
      </div>
      <div class="form-group">
        <label>Terme UTM (optionnel - pour mots-clés de recherche payante)</label>
        <input type="text" id="utmTerm" placeholder="chaussures course">
      </div>
      <div class="form-group">
        <label>Contenu UTM (optionnel - pour tests A/B)</label>
        <input type="text" id="utmContent" placeholder="banniere_a">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="buildUTM()">Construire URL</button>
        <button class="btn btn-secondary" onclick="clearFields()">Effacer</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="Copié!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Copier</button>
      </div>
      
      <script>
        document.getElementById('utmMedium').addEventListener('change', function() {
          const customInput = document.getElementById('utmMediumCustom');
          if (this.value === 'custom') {
            customInput.style.display = 'block';
            customInput.focus();
          } else {
            customInput.style.display = 'none';
          }
        });
        
        function buildUTM() {
          const baseUrl = document.getElementById('baseUrl').value.trim();
          const source = document.getElementById('utmSource').value.trim();
          let medium = document.getElementById('utmMedium').value;
          const campaign = document.getElementById('utmCampaign').value.trim();
          const term = document.getElementById('utmTerm').value.trim();
          const content = document.getElementById('utmContent').value.trim();
          
          if (!baseUrl) {
            alert('Veuillez entrer une URL');
            return;
          }
          if (!source) {
            alert('Veuillez entrer la Source UTM');
            return;
          }
          if (!medium) {
            alert('Veuillez sélectionner le Médium UTM');
            return;
          }
          if (!campaign) {
            alert('Veuillez entrer la Campagne UTM');
            return;
          }
          
          if (medium === 'custom') {
            medium = document.getElementById('utmMediumCustom').value.trim();
          }
          
          let url = baseUrl;
          if (!url.includes('?')) {
            url += '?';
          } else {
            url += '&';
          }
          
          const params = [];
          params.push('utm_source=' + encodeURIComponent(source));
          params.push('utm_medium=' + encodeURIComponent(medium));
          params.push('utm_campaign=' + encodeURIComponent(campaign));
          if (term) params.push('utm_term=' + encodeURIComponent(term));
          if (content) params.push('utm_content=' + encodeURIComponent(content));
          
          url += params.join('&');
          
          document.getElementById('codeContent').textContent = url;
          document.getElementById('output').style.display = 'block';
        }
        
        function clearFields() {
          document.getElementById('baseUrl').value = '';
          document.getElementById('utmSource').value = '';
          document.getElementById('utmMedium').value = '';
          document.getElementById('utmMediumCustom').value = '';
          document.getElementById('utmMediumCustom').style.display = 'none';
          document.getElementById('utmCampaign').value = '';
          document.getElementById('utmTerm').value = '';
          document.getElementById('utmContent').value = '';
          document.getElementById('output').style.display = 'none';
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Outils</p>
    </footer>
  </div>
</body>
</html>
