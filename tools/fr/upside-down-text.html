<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Texte à l'Envers - 205 Tools</title>
  <meta name="description" content="Retournez votre texte à l'envers.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>🙃 Texte à l'Envers</h1>
      <p>Retournez votre texte à l'envers pour des effets amusants</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Entrée</h2>
        <div class="lang-selector">
          <a href="../en/upside-down-text.html" class="lang-btn">EN</a>
          <a href="../es/upside-down-text.html" class="lang-btn">ES</a>
          <a href="./upside-down-text.html" class="lang-btn active">FR</a>
          <a href="../de/upside-down-text.html" class="lang-btn">DE</a>
          <a href="../ar/upside-down-text.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="textInput" rows="6" placeholder="Entrez le texte à retourner..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="flipText()">Retourner</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Résultat à l'Envers</label>
        <textarea id="output" rows="6" readonly placeholder="Le texte retourné apparaîtra ici..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copier Résultat</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils en Ligne Gratuits</p></footer>
  </div>
  
  <script>
    const flipMap = {
      'a': 'ɐ', 'b': 'q', 'c': 'ɔ', 'd': 'p', 'e': 'ǝ', 'f': 'ɟ', 'g': 'ƃ', 'h': 'ɥ',
      'i': 'ᴉ', 'j': 'ɾ', 'k': 'ʞ', 'l': 'l', 'm': 'ɯ', 'n': 'u', 'o': 'o', 'p': 'd',
      'q': 'b', 'r': 'ɹ', 's': 's', 't': 'ʇ', 'u': 'n', 'v': 'ʌ', 'w': 'ʍ', 'x': 'x',
      'y': 'ʎ', 'z': 'z', 'A': '∀', 'B': 'q', 'C': 'Ɔ', 'D': 'p', 'E': 'Ǝ', 'F': 'Ⅎ',
      'G': 'פ', 'H': 'H', 'I': 'I', 'J': 'ſ', 'K': 'ʞ', 'L': '˥', 'M': 'W', 'N': 'N',
      'O': 'O', 'P': 'd', 'Q': 'b', 'R': 'ɹ', 'S': 'S', 'T': '┴', 'U': '∩', 'V': 'Λ',
      'W': 'M', 'X': 'X', 'Y': '⅄', 'Z': 'Z', '0': '0', '1': 'Ɩ', '2': 'ᄅ', '3': 'Ɛ',
      '4': 'h', '5': 'ϛ', '6': '9', '7': 'L', '8': '8', '9': '6', '.': '˙', ',': "'",
      "'": ',', '?': '¿', '!': '¡', '"': '„', '(': ')', ')': '(', '[': ']', ']': '[',
      '{': '}', '}': '{', '<': '>', '>': '<', '&': '⅋', '_': '‾'
    };
    
    function flipText() {
      const text = document.getElementById('textInput').value;
      const flipped = text.split('').reverse().map(c => flipMap[c] || c).join('');
      document.getElementById('output').value = flipped;
    }
    
    function clearAll() {
      document.getElementById('textInput').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('Copié dans le presse-papiers!');
    }
  </script>
</body>
</html>
