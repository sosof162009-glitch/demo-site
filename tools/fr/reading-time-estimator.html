<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Estimateur de Temps de Lecture - 205 Tools</title>
  <meta name="description" content="Estimez le temps nécessaire pour lire votre texte.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .stat-box { background: var(--bg-secondary); padding: 20px; border-radius: 12px; text-align: center; }
    .stat-box .number { font-size: 28px; font-weight: 700; color: var(--primary); }
    .stat-box .label { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>⏱️ Estimateur de Temps de Lecture</h1>
      <p>Estimez le temps nécessaire pour lire votre texte</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Votre Texte</h2>
        <div class="lang-selector">
          <a href="../en/reading-time-estimator.html" class="lang-btn">EN</a>
          <a href="../es/reading-time-estimator.html" class="lang-btn">ES</a>
          <a href="./reading-time-estimator.html" class="lang-btn active">FR</a>
          <a href="../de/reading-time-estimator.html" class="lang-btn">DE</a>
          <a href="../ar/reading-time-estimator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="textInput" rows="10" placeholder="Collez votre texte ici..." oninput="estimateTime()"></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="clearText()">Effacer</button>
      </div>
      
      <div class="stats-grid">
        <div class="stat-box">
          <div class="number" id="wordCount">0</div>
          <div class="label">Mots</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="slowTime">0:00</div>
          <div class="label">Lent (100 mpm)</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="avgTime">0:00</div>
          <div class="label">Moyen (200 mpm)</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="fastTime">0:00</div>
          <div class="label">Rapide (300 mpm)</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="speakingTime">0:00</div>
          <div class="label">Parler (130 mpm)</div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils en Ligne Gratuits</p></footer>
  </div>
  
  <script>
    function estimateTime() {
      const text = document.getElementById('textInput').value;
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      
      document.getElementById('wordCount').textContent = words;
      document.getElementById('slowTime').textContent = formatTime(words / 100);
      document.getElementById('avgTime').textContent = formatTime(words / 200);
      document.getElementById('fastTime').textContent = formatTime(words / 300);
      document.getElementById('speakingTime').textContent = formatTime(words / 130);
    }
    
    function formatTime(minutes) {
      if (minutes < 1) {
        return Math.round(minutes * 60) + 's';
      }
      const hrs = Math.floor(minutes / 60);
      const mins = Math.round(minutes % 60);
      if (hrs > 0) {
        return `${hrs}h ${mins}m`;
      }
      return mins + ' min';
    }
    
    function clearText() {
      document.getElementById('textInput').value = '';
      estimateTime();
    }
  </script>
</body>
</html>
