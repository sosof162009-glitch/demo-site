<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertisseur de Casse | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="text-case-converter.html" selected>Français</option>
      <option value="../en/text-case-converter.html">English</option>
      <option value="../ar/text-case-converter.html">العربية</option>
      <option value="../es/text-case-converter.html">Español</option>
      <option value="../de/text-case-converter.html">Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Convertisseur de Casse</h1>
      <p>Convertissez le texte entre majuscules, minuscules, titre et phrase</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">Texte d'entrée :</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Entrez le texte à convertir..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="convertCase('upper')">MAJUSCULES</button>
        <button class="btn btn-primary" onclick="convertCase('lower')">minuscules</button>
        <button class="btn btn-primary" onclick="convertCase('title')">Titre</button>
        <button class="btn btn-primary" onclick="convertCase('sentence')">Phrase</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Résultat :</label>
        <textarea id="text-output" class="tool-textarea" placeholder="Le texte converti apparaîtra ici..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copier</button>
        <button class="btn btn-secondary" onclick="clearAll()">Tout effacer</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copié !</span>
  </div>

  <script>
    function convertCase(type) {
      const text = document.getElementById('text-input').value;
      let result = '';
      
      switch(type) {
        case 'upper':
          result = text.toUpperCase();
          break;
        case 'lower':
          result = text.toLowerCase();
          break;
        case 'title':
          result = text.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
          break;
        case 'sentence':
          result = text.toLowerCase().replace(/(^")|\.\s+([a-z])/g, (match, p1, p2) => p1 ? p1 : '. ' + p2.toUpperCase());
          result = result.charAt(0).toUpperCase() + result.slice(1);
          break;
      }
      
      document.getElementById('text-output').value = result;
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
