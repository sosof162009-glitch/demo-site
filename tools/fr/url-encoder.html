<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Encoder/Decoder | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="url-encoder.html" >English</option>
      <option value="../ar/url-encoder.html" >العربية</option>
      <option value="../fr/url-encoder.html" selected>Français</option>
      <option value="../es/url-encoder.html" >Español</option>
      <option value="../de/url-encoder.html" >Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>URL Encoder/Decoder</h1>
      <p>Encode and decode URLs and URL components</p>
    </header>

    <div class="tool-card">
      <div class="options-group">
        <div class="option-item">
          <input type="radio" name="mode" id="encode" value="encode" checked>
          <label for="encode">Encode URL</label>
        </div>
        <div class="option-item">
          <input type="radio" name="mode" id="decode" value="decode">
          <label for="decode">Decode URL</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="component">
          <label for="component">Encode as component</label>
        </div>
      </div>

      <div class="input-group">
        <label for="text-input">Input:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Enter text to encode/decode..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="convert()">Convert</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Result:</label>
        <textarea id="text-output" class="tool-textarea" placeholder="Result will appear here..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copied!</span>
  </div>

  <script>
    function convert() {
      const input = document.getElementById('text-input').value;
      const mode = document.querySelector('input[name="mode"]:checked').value;
      const isComponent = document.getElementById('component').checked;
      
      if (input === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      let result;
      try {
        if (mode === 'encode') {
          result = isComponent ? encodeURIComponent(input) : encodeURI(input);
        } else {
          result = isComponent ? decodeURIComponent(input) : decodeURI(input);
        }
      } catch (e) {
        result = 'Error: ' + e.message;
      }
      
      document.getElementById('text-output').value = result;
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
