<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tableau HTML vers CSV - 205 Tools</title>
  <meta name="description" content="Convertissez des tableaux HTML en format CSV.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .output-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; }
    .preview-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; margin: 15px 0; }
    .preview-box table { width: 100%; border-collapse: collapse; }
    .preview-box th, .preview-box td { border: 1px solid var(--border-color); padding: 8px; text-align: left; }
    .preview-box th { background: var(--bg-primary); }
    .options { display: flex; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
    .options label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>🌐 Tableau HTML vers CSV</h1>
      <p>Convertissez des tableaux HTML en format CSV</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Convertisseur</h2>
        <div class="lang-selector">
          <a href="../en/html-table-to-csv.html" class="lang-btn">EN</a>
          <a href="../es/html-table-to-csv.html" class="lang-btn">ES</a>
          <a href="./html-table-to-csv.html" class="lang-btn active">FR</a>
          <a href="../de/html-table-to-csv.html" class="lang-btn">DE</a>
          <a href="../ar/html-table-to-csv.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="options">
        <label><input type="checkbox" id="includeHeaders" checked> Inclure les en-têtes</label>
        <label><input type="checkbox" id="skipEmpty" checked> Ignorer les lignes vides</label>
      </div>
      
      <div class="form-group">
        <label>Collez le code HTML du tableau</label>
        <textarea id="htmlInput" rows="8" placeholder="&lt;table&gt;&#10;  &lt;tr&gt;&lt;th&gt;Nom&lt;/th&gt;&lt;th&gt;Âge&lt;/th&gt;&lt;/tr&gt;&#10;  &lt;tr&gt;&lt;td&gt;Jean&lt;/td&gt;&lt;td&gt;30&lt;/td&gt;&lt;/tr&gt;&#10;&lt;/table&gt;"></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="convertTable()">🔄 Convertir</button>
        <button class="btn btn-secondary" onclick="loadExample()">Exemple</button>
        <button class="btn btn-success" onclick="copyOutput()">📋 Copier</button>
        <button class="btn btn-secondary" onclick="downloadCSV()">💾 Télécharger</button>
        <button class="btn btn-secondary" onclick="clearAll()">Effacer</button>
      </div>
      
      <div id="previewSection" class="preview-box" style="display: none;">
        <label>Aperçu du tableau</label>
        <div id="tablePreview"></div>
      </div>
      
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <label>Sortie CSV</label>
        <pre id="csvOutput" class="output-box"></pre>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Outils Gratuits</p></footer>
  </div>
  
  <script>
    function convertTable() {
      const html = document.getElementById('htmlInput').value.trim();
      if (!html) { alert('Veuillez entrer le code HTML du tableau'); return; }
      
      const includeHeaders = document.getElementById('includeHeaders').checked;
      const skipEmpty = document.getElementById('skipEmpty').checked;
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const tables = doc.querySelectorAll('table');
      
      if (tables.length === 0) { alert('Aucun tableau trouvé dans le HTML'); return; }
      
      const table = tables[0];
      const rows = [];
      
      table.querySelectorAll('tr').forEach(tr => {
        const cells = [];
        tr.querySelectorAll('th, td').forEach(cell => {
          let text = cell.textContent.trim();
          if (text.includes('"')) text = text.replace(/"/g, '""');
          if (text.includes(',') || text.includes('\n') || text.includes('"')) {
            text = '"' + text + '"';
          }
          cells.push(text);
        });
        
        if (!skipEmpty || cells.some(c => c.trim())) {
          rows.push(cells);
        }
      });
      
      if (rows.length === 0) { alert('Aucune donnée trouvée dans le tableau'); return; }
      
      const csv = rows.map(r => r.join(',')).join('\n');
      
      document.getElementById('csvOutput').textContent = csv;
      document.getElementById('tablePreview').innerHTML = html;
      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('outputSection').style.display = 'block';
    }
    
    function loadExample() {
      document.getElementById('htmlInput').value = `<table>
  <thead>
    <tr>
      <th>Produit</th>
      <th>Prix</th>
      <th>Quantité</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Ordinateur portable</td>
      <td>999.99 €</td>
      <td>2</td>
    </tr>
    <tr>
      <td>Souris</td>
      <td>29.99 €</td>
      <td>5</td>
    </tr>
    <tr>
      <td>Clavier</td>
      <td>79.99 €</td>
      <td>3</td>
    </tr>
  </tbody>
</table>`;
      convertTable();
    }
    
    function copyOutput() {
      const text = document.getElementById('csvOutput').textContent;
      navigator.clipboard.writeText(text);
      alert('Copié !');
    }
    
    function downloadCSV() {
      const text = document.getElementById('csvOutput').textContent;
      const blob = new Blob([text], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'tableau.csv';
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function clearAll() {
      document.getElementById('htmlInput').value = '';
      document.getElementById('previewSection').style.display = 'none';
      document.getElementById('outputSection').style.display = 'none';
    }
  </script>
</body>
</html>
