<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Binary Text Converter | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="binary-converter.html" >English</option>
      <option value="../ar/binary-converter.html" >العربية</option>
      <option value="../fr/binary-converter.html" selected>Français</option>
      <option value="../es/binary-converter.html" >Español</option>
      <option value="../de/binary-converter.html" >Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Binary Text Converter</h1>
      <p>Convert between text and binary code</p>
    </header>

    <div class="tool-card">
      <div class="options-group">
        <div class="option-item">
          <input type="radio" name="mode" id="to-binary" value="to-binary" checked onchange="switchMode()">
          <label for="to-binary">Text → Binary</label>
        </div>
        <div class="option-item">
          <input type="radio" name="mode" id="from-binary" value="from-binary" onchange="switchMode()">
          <label for="from-binary">Binary → Text</label>
        </div>
      </div>

      <div class="input-group">
        <label for="text-input" id="input-label">Text:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Enter text to convert..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="convert()">Convert</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Result:</label>
        <textarea id="text-output" class="tool-textarea" placeholder="Conversion will appear here..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copied!</span>
  </div>

  <script>
    function switchMode() {
      const mode = document.querySelector('input[name="mode"]:checked').value;
      document.getElementById('input-label').textContent = mode === 'to-binary' ? 'Text:' : 'Binary:';
      document.getElementById('text-input').placeholder = mode === 'to-binary' ? 'Enter text to convert...' : 'Enter binary (e.g., 01001000 01100101)...';
    }

    function convert() {
      const input = document.getElementById('text-input').value;
      const mode = document.querySelector('input[name="mode"]:checked').value;
      
      if (input === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      let result;
      if (mode === 'to-binary') {
        result = input.split('').map(char => {
          return char.charCodeAt(0).toString(2).padStart(8, '0');
        }).join(' ');
      } else {
        const binaryArray = input.replace(/[^01]/g, '').match(/.{1,8}/g) || [];
        result = binaryArray.map(bin => String.fromCharCode(parseInt(bin, 2))).join('');
      }
      
      document.getElementById('text-output').value = result;
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
