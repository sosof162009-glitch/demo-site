<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test de Vitesse Web - 205 Tools</title>
  <meta name="description" content="Simulez l'analyse de vitesse web.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>⚡ Test de Vitesse Web</h1>
      <p>Simulez l'analyse de vitesse web.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Générer</h2>
        <div class="lang-selector">
          <a href="../en/website-speed-test.html" class="lang-btn ">EN</a><a href="../es/website-speed-test.html" class="lang-btn ">ES</a><a href="../fr/website-speed-test.html" class="lang-btn active">FR</a><a href="../de/website-speed-test.html" class="lang-btn ">DE</a><a href="../ar/website-speed-test.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>Website URL</label>
        <input type="url" id="testUrl" placeholder="https://example.com">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="runSpeedTest()">Test Speed</button>
      </div>
      
      <div id="results" style="display:none; margin-top: 20px;">
        <div class="info-grid">
          <div class="info-card">
            <h4>⏱️ Load Time</h4>
            <p id="loadTime">-</p>
          </div>
          <div class="info-card">
            <h4>📦 Page Size</h4>
            <p id="pageSize">-</p>
          </div>
          <div class="info-card">
            <h4>🎯 Performance Score</h4>
            <p id="perfScore">-</p>
          </div>
          <div class="info-card">
            <h4>📱 Mobile Score</h4>
            <p id="mobileScore">-</p>
          </div>
        </div>
        
        <div class="result-box" style="margin-top: 20px;">
          <h4>Recommendations</h4>
          <ul id="recommendations" style="text-align: left; margin-top: 10px;"></ul>
        </div>
      </div>
      
      <script>
        function runSpeedTest() {
          const url = document.getElementById('testUrl').value;
          if (!url) {
            alert('Please enter a URL');
            return;
          }
          
          // Simulate speed test
          document.getElementById('results').style.display = 'none';
          const btn = document.querySelector('.btn-primary');
          btn.classList.add('loading');
          btn.textContent = 'Testing...';
          
          setTimeout(() => {
            // Generate random realistic results
            const loadTime = (Math.random() * 2 + 0.5).toFixed(2);
            const size = (Math.random() * 2 + 0.1).toFixed(2);
            const score = Math.floor(Math.random() * 30 + 70);
            const mobile = Math.floor(Math.random() * 30 + 65);
            
            document.getElementById('loadTime').textContent = loadTime + 's';
            document.getElementById('pageSize').textContent = size + ' MB';
            document.getElementById('perfScore').textContent = score + '/100';
            document.getElementById('mobileScore').textContent = mobile + '/100';
            
            const recs = [
              'Enable browser caching',
              'Optimize images',
              'Minify CSS and JavaScript',
              'Enable compression',
              'Reduce server response time'
            ];
            document.getElementById('recommendations').innerHTML = recs.map(r => '<li>' + r + '</li>').join('');
            
            document.getElementById('results').style.display = 'block';
            btn.classList.remove('loading');
            btn.textContent = 'Test Speed';
          }, 2000);
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Outils</p>
    </footer>
  </div>
</body>
</html>
