<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Générateur de Sitemap - 205 Tools</title>
  <meta name="description" content="Générez des sitemaps XML.">
  <link rel="stylesheet" href="../../assets/css/tools.css">
  <script src="../../assets/js/utils.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Accueil</a>
    
    <header>
      <h1>🗺️ Générateur de Sitemap</h1>
      <p>Générez des sitemaps XML.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Générer</h2>
        <div class="lang-selector">
          <a href="../en/sitemap-generator.html" class="lang-btn ">EN</a><a href="../es/sitemap-generator.html" class="lang-btn ">ES</a><a href="../fr/sitemap-generator.html" class="lang-btn active">FR</a><a href="../de/sitemap-generator.html" class="lang-btn ">DE</a><a href="../ar/sitemap-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>URLs (one per line)</label>
        <textarea id="urls" placeholder="https://example.com/page1&#10;https://example.com/page2&#10;https://example.com/page3" rows="10"></textarea>
      </div>
      <div class="form-group">
        <label>Change Frequency</label>
        <select id="changefreq">
          <option value="weekly">Weekly</option>
          <option value="daily">Daily</option>
          <option value="monthly">Monthly</option>
          <option value="yearly">Yearly</option>
        </select>
      </div>
      <div class="form-group">
        <label>Priority</label>
        <select id="priority">
          <option value="0.5">0.5</option>
          <option value="1.0">1.0</option>
          <option value="0.8">0.8</option>
          <option value="0.3">0.3</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateSitemap()">Générer</button>
        <button class="btn btn-secondary" onclick="downloadSitemap()">Télécharger</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="Copié!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Copier</button>
      </div>
      
      <script>
        function generateSitemap() {
          const urls = document.getElementById('urls').value.trim().split('\n').filter(u => u.trim());
          const changefreq = document.getElementById('changefreq').value;
          const priority = document.getElementById('priority').value;
          const today = new Date().toISOString().split('T')[0];
          
          let sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n';
          sitemap += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
          
          urls.forEach(url => {
            sitemap += '  <url>\n';
            sitemap += '    <loc>' + url.trim() + '</loc>\n';
            sitemap += '    <lastmod>' + today + '</lastmod>\n';
            sitemap += '    <changefreq>' + changefreq + '</changefreq>\n';
            sitemap += '    <priority>' + priority + '</priority>\n';
            sitemap += '  </url>\n';
          });
          
          sitemap += '</urlset>';
          
          document.getElementById('codeContent').textContent = sitemap;
          document.getElementById('output').style.display = 'block';
          window.sitemapContent = sitemap;
        }
        
        function downloadSitemap() {
          if (window.sitemapContent) {
            downloadText(window.sitemapContent, 'sitemap.xml');
          }
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Outils</p>
    </footer>
  </div>
</body>
</html>
