<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text to Slug | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/tools.css">
  <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="../en/text-to-slug.html" >English</option>
      <option value="./text-to-slug.html" selected>العربية</option>
      <option value="../fr/text-to-slug.html" >Français</option>
      <option value="../es/text-to-slug.html" >Español</option>
      <option value="../de/text-to-slug.html" >Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Text to Slug</h1>
      <p>Convert text to URL-friendly slug format</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">Text:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Enter text to convert to slug..."></textarea>
      </div>

      <div class="options-group">
        <div class="option-item">
          <label for="separator">Separator:</label>
          <select id="separator" class="tool-select">
            <option value="-">Hyphen (-)</option>
            <option value="_">Underscore (_)</option>
            <option value=".">Dot (.)</option>
          </select>
        </div>
        <div class="option-item">
          <input type="checkbox" id="lowercase" checked>
          <label for="lowercase">Lowercase</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="remove-stopwords">
          <label for="remove-stopwords">Remove stop words (a, an, the, etc.)</label>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="convertToSlug()">Convert</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Slug:</label>
        <input type="text" id="text-output" class="tool-input" placeholder="Slug will appear here..." readonly>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copied!</span>
  </div>

  <script>
    const stopWords = ['a', 'an', 'the', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with'];

    function convertToSlug() {
      let text = document.getElementById('text-input').value;
      const separator = document.getElementById('separator').value;
      const lowercase = document.getElementById('lowercase').checked;
      const removeStop = document.getElementById('remove-stopwords').checked;
      
      if (text === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      if (lowercase) text = text.toLowerCase();
      
      if (removeStop) {
        const words = text.split(/\s+/);
        text = words.filter(w => !stopWords.includes(w.toLowerCase())).join(' ');
      }
      
      let slug = text
        .replace(/[^&\w\s-]/g, '')
        .replace(/[\s_-]+/g, separator)
        .replace(/^-+|-+$/g, '');
      
      document.getElementById('text-output').value = slug;
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
