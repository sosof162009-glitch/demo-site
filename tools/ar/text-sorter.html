<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>فرز النص | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="./text-sorter.html" selected>العربية</option>
      <option value="../en/text-sorter.html">English</option>
      <option value="../fr/text-sorter.html">Français</option>
      <option value="../es/text-sorter.html">Español</option>
      <option value="../de/text-sorter.html">Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>فرز النص</h1>
      <p>رتب الأسطر أبجدياً أو رقمياً أو حسب الطول</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">النص المدخل (عنصر لكل سطر):</label>
        <textarea id="text-input" class="tool-textarea" placeholder="أدخل الأسطر للفرز..."></textarea>
      </div>

      <div class="options-group">
        <div class="option-item">
          <input type="radio" name="sort-type" id="alpha" value="alpha" checked>
          <label for="alpha">أبجدي</label>
        </div>
        <div class="option-item">
          <input type="radio" name="sort-type" id="numeric" value="numeric">
          <label for="numeric">رقمي</label>
        </div>
        <div class="option-item">
          <input type="radio" name="sort-type" id="length" value="length">
          <label for="length">حسب الطول</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="reverse" checked>
          <label for="reverse">عكس الترتيب (ي-أ)</label>
        </div>
        <div class="option-item">
          <input type="checkbox" id="remove-dupes">
          <label for="remove-dupes">إزالة التكرارات</label>
        </div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="sortText()">فرز</button>
        <button class="btn btn-secondary" onclick="clearAll()">مسح</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">النتيجة:</label>
        <textarea id="text-output" class="tool-textarea" placeholder="سيظهر النص المفرز هنا..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">نسخ</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>تم النسخ!</span>
  </div>

  <script>
    function sortText() {
      const text = document.getElementById('text-input').value;
      const sortType = document.querySelector('input[name="sort-type"]:checked').value;
      const reverse = document.getElementById('reverse').checked;
      const removeDupes = document.getElementById('remove-dupes').checked;
      
      if (text === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      let lines = text.split('\\n').filter(l => l.trim() !== '');
      
      if (removeDupes) {
        lines = [...new Set(lines)];
      }
      
      if (sortType === 'alpha') {
        lines.sort((a, b) => a.localeCompare(b));
      } else if (sortType === 'numeric') {
        lines.sort((a, b) => parseFloat(a) - parseFloat(b));
      } else if (sortType === 'length') {
        lines.sort((a, b) => a.length - b.length);
      }
      
      if (reverse) lines.reverse();
      
      document.getElementById('text-output').value = lines.join('\\n');
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
  </script>
</body>
</html>
