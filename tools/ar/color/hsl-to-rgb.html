<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HSL إلى RGB - 205 أدوات</title>
    <link rel="stylesheet" href="../../shared.css">
</head>
<body>
    <div class="language-selector">
        <select onchange="changeLang(this.value)">
            <option value="ar" selected>العربية</option>
            <option value="en">English</option>
            <option value="zh">中文</option>
            <option value="es">Español</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
        </select>
    </div>
    
    <header>
        <div class="container">
            <h1><span>205</span> Tools</h1>
        </div>
    </header>
    
    <div class="container">
        <div class="tool-container">
            <h2 class="tool-title">محول HSL إلى RGB</h2>
            <p class="tool-description">تحويل قيم HSL إلى صيغة RGB</p>
            
<div class="card">
    <div class="grid">
        <div class="input-group">
            <label>ت (0-360)</label>
            <input type="number" id="hInput" min="0" max="360" value="214">
        </div>
        <div class="input-group">
            <label>ش (0-100)</label>
            <input type="number" id="sInput" min="0" max="100" value="91">
        </div>
        <div class="input-group">
            <label>إ (0-100)</label>
            <input type="number" id="lInput" min="0" max="100" value="64">
        </div>
    </div>
    <button class="btn" onclick="convertHslToRgb()" data-t="convert">تحويل</button>
    <div class="result-box" id="result" style="display:none;">
        <div class="result-label">RGB</div>
        <div class="result-value" id="rgbResult"></div>
    </div>
</div>
<script>
function convertHslToRgb() {
    const h = parseInt(document.getElementById('hInput').value) || 0;
    const s = parseInt(document.getElementById('sInput').value) || 0;
    const l = parseInt(document.getElementById('lInput').value) || 0;
    const rgb = hslToRgb(h, s, l);
    document.getElementById('rgbResult').textContent = `rgb(${rgb.r}, ${rgb.g}, ${rgb.b})`;
    document.getElementById('result').style.display = 'block';
}
</script>
        </div>
    </div>
    
    <div class="footer">
        <p>جزء من مجموعة أدوات 205 - <a href="../../index.html">205 أدوات</a></p>
    </div>
    
    <script src="../../shared.js"></script>
    <script>
        function changeLang(lang) {
            const path = window.location.pathname;
            const newPath = path.replace(/\/(en|zh|es|fr|de|ar)\//, '/' + lang + '/');
            window.location.href = newPath;
        }
    </script>
    <style>
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(20px); }
            20% { opacity: 1; transform: translateX(-50%) translateY(0); }
            80% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-20px); }
        }
    </style>
</body>
</html>
