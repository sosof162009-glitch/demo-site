<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مُفكك كيانات HTML - 205 Tools</title>
  <meta name="description" content="فك تشفير كيانات HTML إلى أحرف خاصة.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>🔓 مُفكك كيانات HTML</h1>
      <p>تحويل كيانات HTML إلى أحرف خاصة</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>المُفكك</h2>
        <div class="lang-selector">
          <a href="../en/html-entities-decoder.html" class="lang-btn">EN</a>
          <a href="../es/html-entities-decoder.html" class="lang-btn">ES</a>
          <a href="../fr/html-entities-decoder.html" class="lang-btn">FR</a>
          <a href="../de/html-entities-decoder.html" class="lang-btn">DE</a>
          <a href="./html-entities-decoder.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>كيانات HTML للفك</label>
        <textarea id="input" rows="8" placeholder="أدخل HTML بالكيانات...">&lt;div&gt;مرحباً &amp; أهلاً!&lt;/div&gt;
&lt;p&gt;5 &lt; 10 &amp; 10 &gt; 5&lt;/p&gt;
"علامات الاقتباس" و &#39;الفواصل&#39;
Copyright &copy; 2025</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="decode()">🔓 فك التشفير</button>
        <button class="btn btn-success" onclick="copyResult()">📋 نسخ</button>
        <button class="btn btn-secondary" onclick="clearAll()">مسح</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>النص المفكوك</label>
        <textarea id="output" rows="8" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - أدوات مجانية</p></footer>
  </div>
  
  <script>
    function decode() {
      let html = document.getElementById('input').value;
      if (!html) return;
      
      const textarea = document.createElement('textarea');
      textarea.innerHTML = html;
      document.getElementById('output').value = textarea.value;
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('تم النسخ!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
