<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مولد لقطات الشاشة - 205 Tools</title>
  <meta name="description" content="إنشاء لقطات شاشة للمواقع.">
  <link rel="stylesheet" href="../../assets/css/tools.css">
  <script src="../../assets/js/utils.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>📸 مولد لقطات الشاشة</h1>
      <p>إنشاء لقطات شاشة للمواقع.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>إنشاء</h2>
        <div class="lang-selector">
          <a href="../en/website-screenshot-generator.html" class="lang-btn ">EN</a><a href="../es/website-screenshot-generator.html" class="lang-btn ">ES</a><a href="../fr/website-screenshot-generator.html" class="lang-btn ">FR</a><a href="../de/website-screenshot-generator.html" class="lang-btn ">DE</a><a href="../ar/website-screenshot-generator.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>Website URL</label>
        <input type="url" id="screenshotUrl" placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label>Viewport Size</label>
        <select id="viewport">
          <option value="desktop">Desktop (1920x1080)</option>
          <option value="tablet">Tablet (768x1024)</option>
          <option value="mobile">Mobile (375x667)</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateScreenshot()">Generate Screenshot</button>
      </div>
      
      <div id="preview" class="preview-box" style="display:none; margin-top: 20px;">
        <img id="screenshotImg" src="" alt="Website Screenshot" style="width: 100%; border: 1px solid #ddd;">
        <div class="btn-group" style="margin-top: 15px;">
          <button class="btn btn-secondary" onclick="downloadScreenshot()">تحميل</button>
        </div>
      </div>
      
      <script>
        function generateScreenshot() {
          const url = document.getElementById('screenshotUrl').value;
          if (!url) {
            alert('Please enter a URL');
            return;
          }
          
          const btn = document.querySelector('.btn-primary');
          btn.classList.add('loading');
          btn.textContent = 'Capturing...';
          document.getElementById('preview').style.display = 'none';
          
          setTimeout(() => {
            // Use a placeholder image service
            const viewport = document.getElementById('viewport').value;
            let width = 1920, height = 1080;
            if (viewport === 'tablet') { width = 768; height = 1024; }
            if (viewport === 'mobile') { width = 375; height = 667; }
            
            document.getElementById('screenshotImg').src = 'https://placehold.co/' + width + 'x' + height + '/6366f1/ffffff?text=' + encodeURIComponent('Screenshot: ' + url);
            document.getElementById('preview').style.display = 'block';
            
            btn.classList.remove('loading');
            btn.textContent = 'Generate Screenshot';
          }, 2000);
        }
        
        function downloadScreenshot() {
          const img = document.getElementById('screenshotImg');
          const a = document.createElement('a');
          a.href = img.src;
          a.download = 'screenshot.png';
          a.click();
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - الأدوات</p>
    </footer>
  </div>
</body>
</html>
