<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مولد Robots.txt - 205 Tools</title>
  <meta name="description" content="إنشاء ملفات robots.txt.">
  <link rel="stylesheet" href="../../assets/css/tools.css">
  <script src="../../assets/js/utils.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>🤖 مولد Robots.txt</h1>
      <p>إنشاء ملفات robots.txt.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>إنشاء</h2>
        <div class="lang-selector">
          <a href="../en/robots-txt-generator.html" class="lang-btn ">EN</a><a href="../es/robots-txt-generator.html" class="lang-btn ">ES</a><a href="../fr/robots-txt-generator.html" class="lang-btn ">FR</a><a href="../de/robots-txt-generator.html" class="lang-btn ">DE</a><a href="../ar/robots-txt-generator.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>User-Agent</label>
        <select id="userAgent">
          <option value="*">All (*)</option>
          <option value="Googlebot">Googlebot</option>
          <option value="Bingbot">Bingbot</option>
        </select>
      </div>
      <div class="form-group">
        <label>Allow/Disallow Directories</label>
        <textarea id="rules" placeholder="Disallow: /admin&#10;Disallow: /private&#10;Allow: /public" rows="5"></textarea>
      </div>
      <div class="form-group">
        <label>Sitemap URL (optional)</label>
        <input type="url" id="sitemapUrl" placeholder="https://example.com/sitemap.xml">
      </div>
      <div class="form-group">
        <label>Crawl Delay (seconds)</label>
        <input type="number" id="crawlDelay" placeholder="10" min="1">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateRobots()">إنشاء</button>
        <button class="btn btn-secondary" onclick="downloadRobots()">تحميل</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="تم النسخ!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">نسخ</button>
      </div>
      
      <script>
        function generateRobots() {
          const ua = document.getElementById('userAgent').value;
          const rules = document.getElementById('rules').value.trim();
          const sitemap = document.getElementById('sitemapUrl').value;
          const delay = document.getElementById('crawlDelay').value;
          
          let content = 'User-agent: ' + ua + '\n';
          if (delay) content += 'Crawl-delay: ' + delay + '\n';
          if (rules) content += rules + '\n';
          else content += 'Disallow:\n';
          if (sitemap) content += '\nSitemap: ' + sitemap;
          
          document.getElementById('codeContent').textContent = content;
          document.getElementById('output').style.display = 'block';
          window.robotsContent = content;
        }
        
        function downloadRobots() {
          if (window.robotsContent) {
            downloadText(window.robotsContent, 'robots.txt');
          }
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - الأدوات</p>
    </footer>
  </div>
</body>
</html>
