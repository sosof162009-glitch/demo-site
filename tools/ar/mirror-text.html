<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عكس النص | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
    .mirror-output { background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-top: 20px; font-size: 18px; word-break: break-all; border: 1px solid var(--border-color); min-height: 60px; }
    .mirror-options { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin: 15px 0; }
  </style>
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="mirror-text.html" selected>العربية</option>
      <option value="../en/mirror-text.html">English</option>
      <option value="../fr/mirror-text.html">Français</option>
      <option value="../es/mirror-text.html">Español</option>
      <option value="../de/mirror-text.html">Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>🪞 عكس النص</h1>
      <p>اقلب نصك أفقيًا أو رأسيًا</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">أدخل نصك:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="اكتب أو الصق نصك هنا...">مرحبا بالعالم</textarea>
      </div>

      <div class="mirror-options">
        <button class="btn btn-secondary" onclick="mirrorHorizontal()">↔️ عكس أفقي</button>
        <button class="btn btn-secondary" onclick="mirrorVertical()">↕️ عكس رأسي</button>
        <button class="btn btn-secondary" onclick="mirrorBoth()">🔃 عكس كامل</button>
      </div>

      <div class="input-group">
        <label>النص المعكوس:</label>
        <div class="mirror-output" id="mirror-output"></div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="copyResult()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          نسخ النتيجة
        </button>
        <button class="btn btn-secondary" onclick="clearText()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          مسح
        </button>
      </div>
    </div>
  </div>

  <script>
    const mirrorMap = {
      'a': 'ɒ', 'b': 'd', 'c': 'ɔ', 'd': 'b', 'e': 'ɘ', 'f': 'Ꮈ', 'g': 'ǫ', 'h': 'ʜ',
      'i': 'i', 'j': 'ꞁ', 'k': 'ʞ', 'l': 'l', 'm': 'm', 'n': 'n', 'o': 'o', 'p': 'q',
      'q': 'p', 'r': 'ɿ', 's': 'ꙅ', 't': 'ƚ', 'u': 'u', 'v': 'v', 'w': 'w', 'x': 'x',
      'y': 'y', 'z': 'z',
      'A': 'A', 'B': 'ᙠ', 'C': 'Ɔ', 'D': 'ᗡ', 'E': 'Ǝ', 'F': 'ᖷ', 'G': 'Ⴚ', 'H': 'H',
      'I': 'I', 'J': 'Ⴑ', 'K': 'ᐴ', 'L': '⅃', 'M': 'M', 'N': 'Ͷ', 'O': 'O', 'P': 'ᑫ',
      'Q': 'Ọ', 'R': 'ᴚ', 'S': 'Ꙅ', 'T': '⊥', 'U': 'Ⴇ', 'V': 'Λ', 'W': 'M', 'X': 'X',
      'Y': '⅄', 'Z': 'Z',
      '0': '0', '1': '⥜', '2': 'ᔭ', '3': 'Ɛ', '4': 'Ꮁ', '5': 'ϛ', '6': '9', '7': '𝖫',
      '8': '8', '9': '6',
      '(': ')', ')': '(', '[': ']', ']': '[', '{': '}', '}': '{', '<': '>', '>': '<',
      '/': '\\', '\\': '/', '.': '˙', ',': "'", "'": ',', '?': '⸮', '!': '¡',
      '&': '⅋', '_': '‾', '-': '-', ' ': ' '
    };

    function mirrorHorizontal() {
      const text = document.getElementById('text-input').value;
      const mirrored = text.split('').reverse().map(c => mirrorMap[c] || c).join('');
      document.getElementById('mirror-output').textContent = mirrored;
    }

    function mirrorVertical() {
      const text = document.getElementById('text-input').value;
      const lines = text.split('\n');
      const mirrored = lines.reverse().join('\n');
      document.getElementById('mirror-output').textContent = mirrored;
    }

    function mirrorBoth() {
      const text = document.getElementById('text-input').value;
      const lines = text.split('\n');
      const mirrored = lines.reverse().map(line => 
        line.split('').reverse().map(c => mirrorMap[c] || c).join('')
      ).join('\n');
      document.getElementById('mirror-output').textContent = mirrored;
    }

    function copyResult() {
      const result = document.getElementById('mirror-output').textContent;
      navigator.clipboard.writeText(result);
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> تم النسخ!';
      setTimeout(() => btn.innerHTML = originalText, 2000);
    }

    function clearText() {
      document.getElementById('text-input').value = '';
      document.getElementById('mirror-output').textContent = '';
    }

    // Generate on load
    mirrorHorizontal();
  </script>
</body>
</html>
