<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مولد Slug للروابط | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
    .slug-output { background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-top: 20px; font-family: 'JetBrains Mono', monospace; font-size: 16px; word-break: break-all; border: 1px solid var(--border-color); direction: ltr; text-align: left; }
    .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; }
    .option-box { background: var(--bg-card); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
    .option-box label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .option-box input[type="radio"], .option-box input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }
  </style>
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="url-slug-generator.html" selected>العربية</option>
      <option value="../en/url-slug-generator.html">English</option>
      <option value="../fr/url-slug-generator.html">Français</option>
      <option value="../es/url-slug-generator.html">Español</option>
      <option value="../de/url-slug-generator.html">Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>🔗 مولد Slug للروابط</h1>
      <p>حول النص إلى روابط نظيفة وصديقة لعناوين URL</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">أدخل نصك:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="اكتب أو الصق نصك هنا...">مثال عنوان مقال عربي</textarea>
      </div>

      <div class="options">
        <div class="option-box">
          <label><input type="radio" name="separator" value="-" checked onchange="generateSlug()"> شرطة (-)</label>
        </div>
        <div class="option-box">
          <label><input type="radio" name="separator" value="_" onchange="generateSlug()"> شارطة سفلية (_)</label>
        </div>
        <div class="option-box">
          <label><input type="checkbox" id="lowercase" checked onchange="generateSlug()"> أحرف صغيرة</label>
        </div>
        <div class="option-box">
          <label><input type="checkbox" id="removeStopWords" onchange="generateSlug()"> إزالة كلمات التوقف</label>
        </div>
      </div>

      <div class="input-group">
        <label>الـ Slug المُنشأ:</label>
        <div class="slug-output" id="slug-output">mthal-wnwan-mkal-rby</div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="copySlug()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          نسخ الـ Slug
        </button>
        <button class="btn btn-secondary" onclick="clearText()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          مسح
        </button>
      </div>
    </div>
  </div>

  <script>
    function generateSlug() {
      let text = document.getElementById('text-input').value;
      const separator = document.querySelector('input[name="separator"]:checked').value;
      const lowercase = document.getElementById('lowercase').checked;

      if (!text) {
        document.getElementById('slug-output').textContent = 'your-slug-here';
        return;
      }

      // Arabic transliteration map
      const arabicMap = {
        'ا': 'a', 'أ': 'a', 'إ': 'i', 'آ': 'a', 'ب': 'b', 'ت': 't', 'ث': 'th',
        'ج': 'j', 'ح': 'h', 'خ': 'kh', 'د': 'd', 'ذ': 'dh', 'ر': 'r', 'ز': 'z',
        'س': 's', 'ش': 'sh', 'ص': 's', 'ض': 'd', 'ط': 't', 'ظ': 'z', 'ع': 'a',
        'غ': 'gh', 'ف': 'f', 'ق': 'q', 'ك': 'k', 'ل': 'l', 'م': 'm', 'ن': 'n',
        'ه': 'h', 'ة': 'h', 'و': 'w', 'ي': 'y', 'ى': 'a', 'ئ': 'e', 'ؤ': 'o',
        'ء': 'e', 'ً': '', 'ٌ': '', 'ٍ': '', 'َ': '', 'ُ': '', 'ِ': '', 'ّ': '', 'ْ': ''
      };

      // Transliterate Arabic to Latin
      let result = '';
      for (let char of text) {
        if (arabicMap[char]) {
          result += arabicMap[char];
        } else if (/[a-zA-Z0-9\s]/.test(char)) {
          result += char;
        } else {
          result += ' ';
        }
      }

      text = result;

      if (lowercase) text = text.toLowerCase();

      // Replace non-alphanumeric with separator
      text = text.replace(/[^a-z0-9\s]+/g, ' ').trim();
      text = text.replace(/\s+/g, separator);

      document.getElementById('slug-output').textContent = text || 'your-slug-here';
    }

    function copySlug() {
      const slug = document.getElementById('slug-output').textContent;
      navigator.clipboard.writeText(slug);
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> تم النسخ!';
      setTimeout(() => btn.innerHTML = originalText, 2000);
    }

    function clearText() {
      document.getElementById('text-input').value = '';
      generateSlug();
    }

    document.getElementById('text-input').addEventListener('input', generateSlug);
    generateSlug();
  </script>
</body>
</html>
