<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إزالة المسافات الزائدة - 205 Tools</title>
  <meta name="description" content="إزالة المسافات الزائدة من النص.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>✂️ إزالة المسافات الزائدة</h1>
      <p>إزالة المسافات الزائدة والمسافات البادئة وتنظيف النص</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>النص المدخل</h2>
        <div class="lang-selector">
          <a href="../en/remove-extra-spaces.html" class="lang-btn">EN</a>
          <a href="../es/remove-extra-spaces.html" class="lang-btn">ES</a>
          <a href="../fr/remove-extra-spaces.html" class="lang-btn">FR</a>
          <a href="../de/remove-extra-spaces.html" class="lang-btn">DE</a>
          <a href="./remove-extra-spaces.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="الصق النص مع المسافات الزائدة هنا..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="removeExtraSpaces()">إزالة المسافات الزائدة</button>
        <button class="btn btn-primary" onclick="removeAllSpaces()">إزالة كل المسافات</button>
        <button class="btn btn-primary" onclick="trimLines()">قص كل سطر</button>
        <button class="btn btn-secondary" onclick="clearAll()">مسح</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>النتيجة</label>
        <textarea id="output" rows="8" readonly placeholder="سيظهر النص المنظف هنا..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">نسخ النتيجة</button>
    </div>
    
    <footer><p>205 Tools © 2025 - أدوات مجانية على الإنترنت</p></footer>
  </div>
  
  <script>
    function removeExtraSpaces() {
      let text = document.getElementById('input').value;
      text = text.replace(/\s+/g, ' ').replace(/^\s+|\s+$/gm, '');
      document.getElementById('output').value = text;
    }
    
    function removeAllSpaces() {
      let text = document.getElementById('input').value;
      text = text.replace(/\s/g, '');
      document.getElementById('output').value = text;
    }
    
    function trimLines() {
      let text = document.getElementById('input').value;
      text = text.split('\n').map(line => line.trim()).join('\n');
      document.getElementById('output').value = text;
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('تم النسخ إلى الحافظة!');
    }
  </script>
</body>
</html>
