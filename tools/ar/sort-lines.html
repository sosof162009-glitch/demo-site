<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ترتيب الأسطر - 205 Tools</title>
  <meta name="description" content="ترتيب الأسطر أبجدياً أو رقمياً.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>📋 ترتيب الأسطر</h1>
      <p>ترتيب الأسطر أبجدياً، رقمياً، أو حسب الطول</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>النص المدخل</h2>
        <div class="lang-selector">
          <a href="../en/sort-lines.html" class="lang-btn">EN</a>
          <a href="../es/sort-lines.html" class="lang-btn">ES</a>
          <a href="../fr/sort-lines.html" class="lang-btn">FR</a>
          <a href="../de/sort-lines.html" class="lang-btn">DE</a>
          <a href="./sort-lines.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="الصق الأسطر للترتيب هنا..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="sortLines('asc')">أ-ي</button>
        <button class="btn btn-primary" onclick="sortLines('desc')">ي-أ</button>
        <button class="btn btn-primary" onclick="sortLines('length')">حسب الطول</button>
        <button class="btn btn-primary" onclick="sortLines('reverse')">عكس الترتيب</button>
        <button class="btn btn-secondary" onclick="clearAll()">مسح</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>النتيجة</label>
        <textarea id="output" rows="8" readonly placeholder="ستظهر النتيجة المرتبة هنا..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">نسخ النتيجة</button>
    </div>
    
    <footer><p>205 Tools © 2025 - أدوات مجانية على الإنترنت</p></footer>
  </div>
  
  <script>
    function sortLines(order) {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      let lines = input.split('\n');
      
      switch(order) {
        case 'asc':
          lines.sort((a, b) => a.localeCompare(b));
          break;
        case 'desc':
          lines.sort((a, b) => b.localeCompare(a));
          break;
        case 'length':
          lines.sort((a, b) => a.length - b.length);
          break;
        case 'reverse':
          lines.reverse();
          break;
      }
      
      document.getElementById('output').value = lines.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('تم النسخ إلى الحافظة!');
    }
  </script>
</body>
</html>
