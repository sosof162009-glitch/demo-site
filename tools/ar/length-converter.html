<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول الطول - 205 Tools</title>
  <meta name="description" content="تحويل بين الأمتار والكيلومترات والأقدام والبوصات والأميال وأكثر.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>📏 محول الطول</h1>
      <p>تحويل بين الأمتار والكيلومترات والأقدام والبوصات والأميال وأكثر.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>تحويل</h2>
        <div class="lang-selector">
          <a href="../en/length-converter.html" class="lang-btn ">EN</a><a href="../es/length-converter.html" class="lang-btn ">ES</a><a href="../fr/length-converter.html" class="lang-btn ">FR</a><a href="../de/length-converter.html" class="lang-btn ">DE</a><a href="../ar/length-converter.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="converter-grid">
        <div class="converter-box">
          <div class="form-group">
            <label for="fromUnit">من</label>
            <select id="fromUnit">
              <option value="m">Meters</option><option value="km">Kilometers</option><option value="cm">Centimeters</option><option value="mm">Millimeters</option><option value="ft">Feet</option><option value="in">Inches</option><option value="mi">Miles</option><option value="yd">Yards</option>
            </select>
          </div>
          <div class="form-group">
            <label for="inputValue">القيمة</label>
            <input type="number" id="inputValue" placeholder="0" step="any">
          </div>
        </div>
        
        <button class="swap-btn" onclick="swapUnits()" title="Swap">⇄</button>
        
        <div class="converter-box">
          <div class="form-group">
            <label for="toUnit">إلى</label>
            <select id="toUnit">
              <option value="m">Meters</option><option value="km">Kilometers</option><option value="cm">Centimeters</option><option value="mm">Millimeters</option><option value="ft">Feet</option><option value="in">Inches</option><option value="mi">Miles</option><option value="yd">Yards</option>
            </select>
          </div>
          <div class="form-group">
            <label>النتيجة</label>
            <div class="result-value" id="resultValue">-</div>
          </div>
        </div>
      </div>
      
      <div class="result-box" id="resultBox" style="display:none;">
        <div class="result-value" id="finalResult">-</div>
        <div class="result-label" id="resultLabel"></div>
      </div>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - الأدوات</p>
    </footer>
  </div>
  
  <script>
    const inputEl = document.getElementById('inputValue');
    const fromEl = document.getElementById('fromUnit');
    const toEl = document.getElementById('toUnit');
    const resultValueEl = document.getElementById('resultValue');
    const resultBoxEl = document.getElementById('resultBox');
    const finalResultEl = document.getElementById('finalResult');
    const resultLabelEl = document.getElementById('resultLabel');
    
    function calculate() {
      const value = parseFloat(inputEl.value);
      const from = fromEl.value;
      const to = toEl.value;
      
      if (isNaN(value)) {
        resultValueEl.textContent = '-';
        resultBoxEl.style.display = 'none';
        return;
      }
      
      try {
        const result = convertLength(value, from, to);
        const formatted = formatNumber(result, 6);
        
        resultValueEl.textContent = formatted;
        finalResultEl.textContent = formatted;
        resultLabelEl.textContent = value + ' ' + fromEl.options[fromEl.selectedIndex].text + ' = ' + formatted + ' ' + toEl.options[toEl.selectedIndex].text;
        resultBoxEl.style.display = 'block';
      } catch (e) {
        resultValueEl.textContent = 'Error';
      }
    }
    
    function swapUnits() {
      const temp = fromEl.value;
      fromEl.value = toEl.value;
      toEl.value = temp;
      calculate();
    }
    
    inputEl.addEventListener('input', calculate);
    fromEl.addEventListener('change', calculate);
    toEl.addEventListener('change', calculate);
  </script>
</body>
</html>
