<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إزالة الأسطر المكررة - 205 Tools</title>
  <meta name="description" content="إزالة الأسطر المكررة من النص.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>🔄 إزالة الأسطر المكررة</h1>
      <p>إزالة الأسطر المكررة من النص مع الحفاظ على الترتيب</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>النص المدخل</h2>
        <div class="lang-selector">
          <a href="../en/remove-duplicate-lines.html" class="lang-btn">EN</a>
          <a href="../es/remove-duplicate-lines.html" class="lang-btn">ES</a>
          <a href="../fr/remove-duplicate-lines.html" class="lang-btn">FR</a>
          <a href="../de/remove-duplicate-lines.html" class="lang-btn">DE</a>
          <a href="./remove-duplicate-lines.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="الصق النص مع الأسطر المكررة هنا..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="removeDuplicates()">إزالة المكررات</button>
        <button class="btn btn-secondary" onclick="clearAll()">مسح</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>النتيجة</label>
        <textarea id="output" rows="8" readonly placeholder="ستظهر النتيجة هنا..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">نسخ النتيجة</button>
    </div>
    
    <footer><p>205 Tools © 2025 - أدوات مجانية على الإنترنت</p></footer>
  </div>
  
  <script>
    function removeDuplicates() {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      const lines = input.split('\n');
      const seen = new Set();
      const unique = [];
      
      for (const line of lines) {
        if (!seen.has(line)) {
          seen.add(line);
          unique.push(line);
        }
      }
      
      document.getElementById('output').value = unique.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('تم النسخ إلى الحافظة!');
    }
  </script>
</body>
</html>
