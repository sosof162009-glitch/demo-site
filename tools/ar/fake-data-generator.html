<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مولد البيانات الوهمية - 205 Tools</title>
  <meta name="description" content="إنشاء بيانات وهمية واقعية للاختبار والتطوير.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .output-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; max-height: 400px; overflow-y: auto; text-align: left; direction: ltr; }
    .options-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; }
    .option-item { display: flex; align-items: center; gap: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    <header><h1>🎲 مولد البيانات الوهمية</h1><p>إنشاء بيانات وهمية واقعية للاختبار والتطوير</p></header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>المولد</h2>
        <div class="lang-selector">
          <a href="../en/fake-data-generator.html" class="lang-btn">EN</a>
          <a href="../es/fake-data-generator.html" class="lang-btn">ES</a>
          <a href="../fr/fake-data-generator.html" class="lang-btn">FR</a>
          <a href="../de/fake-data-generator.html" class="lang-btn">DE</a>
          <a href="./fake-data-generator.html" class="lang-btn active">AR</a>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>عدد السجلات</label><input type="number" id="recordCount" value="10" min="1" max="100"></div>
        <div class="form-group"><label>التنسيق</label><select id="outputFormat"><option value="json">JSON</option><option value="csv">CSV</option><option value="sql">SQL INSERT</option></select></div>
      </div>
      <label>اختر الحقول:</label>
      <div class="options-grid">
        <div class="option-item"><label><input type="checkbox" class="field-check" value="id" checked> المعرف</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="name" checked> الاسم الكامل</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="email" checked> البريد الإلكتروني</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="phone"> الهاتف</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="address"> العنوان</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="city"> المدينة</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="country"> الدولة</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="company"> الشركة</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="jobTitle"> المسمى الوظيفي</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="age"> العمر</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="date"> التاريخ</label></div>
        <div class="option-item"><label><input type="checkbox" class="field-check" value="boolean"> منطقي</label></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateData()">🎲 إنشاء</button>
        <button class="btn btn-success" onclick="copyOutput()">📋 نسخ</button>
        <button class="btn btn-secondary" onclick="downloadData()">💾 تحميل</button>
      </div>
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <label>البيانات المُنشأة</label>
        <pre id="dataOutput" class="output-box"></pre>
      </div>
    </div>
    <footer><p>205 Tools © 2025 - أدوات مجانية</p></footer>
  </div>
  <script>
    const firstNames = ['أحمد','فاطمة','محمد','عائشة','علي','مريم','عمر','خديجة','يوسف','نور','حسن','ليلى','إبراهيم','سارة','محمود','رانيا','عبدالله','هناء','خالد','سعاد'];
    const lastNames = ['محمد','أحمد','علي','عمر','حسن','يوسف','إبراهيم','خالد','محمود','عبدالله','فؤاد','سيد','ناصر','حسين','فاروق','جميل','عادل','سليمان','مجدي','كمال'];
    const domains = ['gmail.com','yahoo.com','hotmail.com','outlook.com','icloud.com','company.com'];
    const cities = ['الرياض','جدة','الدمام','مكة','المدينة المنورة','الطائف','الخبر','أبها','الأحساء','تبوك','حائل','بريدة'];
    const countries = ['السعودية','الإمارات','مصر','الأردن','الكويت','قطر','البحرين','عمان','العراق','المغرب'];
    const companies = ['تك كورب','جلوبال تك','داتا سيستمز','كلاود ناين','إنوفيت','فيوتشر سيستمز','ديجيتال دايناميكس','سمارت سوليوشنز','نكست جين','سايبر سيستمز'];
    const jobTitles = ['مهندس','مدير','محلل','مصمم','مدير تنفيذي','مطور','مختبر','CTO','CEO','مستشار'];
    const streets = ['شارع الملك فهد','شارع التحلية','شارع العليا','شارع الستين','طريق الملك عبدالله','شارع الأمير سلطان','شارع الأمير محمد','شارع الوليد بن طلال','شارع المطار','شارع التخصصي'];
    function generateData() {
      const count = parseInt(document.getElementById('recordCount').value) || 10;
      const format = document.getElementById('outputFormat').value;
      const fields = Array.from(document.querySelectorAll('.field-check:checked')).map(cb => cb.value);
      if (fields.length === 0) { alert('الرجاء اختيار حقل واحد على الأقل'); return; }
      const records = [];
      for (let i = 0; i < count; i++) records.push(generateRecord(i + 1, fields));
      let output;
      switch(format) {
        case 'csv': output = toCSV(records, fields); break;
        case 'sql': output = toSQL(records, fields); break;
        default: output = JSON.stringify(records, null, 2);
      }
      document.getElementById('dataOutput').textContent = output;
      document.getElementById('outputSection').style.display = 'block';
    }
    function generateRecord(id, fields) {
      const record = {};
      const firstName = firstNames[Math.floor(Math.random() * firstNames.length)];
      const lastName = lastNames[Math.floor(Math.random() * lastNames.length)];
      fields.forEach(field => {
        switch(field) {
          case 'id': record.id = id; break;
          case 'name': record.ism = firstName + ' ' + lastName; break;
          case 'email': record.bareed = firstName.toLowerCase() + '.' + lastName.toLowerCase() + '@' + domains[Math.floor(Math.random() * domains.length)]; break;
          case 'phone': record.hatif = '+966 ' + (Math.floor(Math.random() * 900000000) + 100000000); break;
          case 'address': record.alamat = streets[Math.floor(Math.random() * streets.length)] + ' ' + (Math.floor(Math.random() * 9999) + 1); break;
          case 'city': record.madina = cities[Math.floor(Math.random() * cities.length)]; break;
          case 'country': record.dawla = countries[Math.floor(Math.random() * countries.length)]; break;
          case 'company': record.sharika = companies[Math.floor(Math.random() * companies.length)]; break;
          case 'jobTitle': record.wadifa = jobTitles[Math.floor(Math.random() * jobTitles.length)]; break;
          case 'age': record.omr = Math.floor(Math.random() * 43) + 22; break;
          case 'date': record.tarikh = new Date(Date.now() - Math.floor(Math.random() * 31536000000)).toISOString().split('T')[0]; break;
          case 'boolean': record.fael = Math.random() > 0.5; break;
        }
      });
      return record;
    }
    function toCSV(records, fields) {
      const header = fields.map(f => ({id:'ID',name:'Ism',email:'Bareed',phone:'Hatif',address:'Alamat',city:'Madina',country:'Dawla',company:'Sharika',jobTitle:'Wadifa',age:'Omr',date:'Tarikh',boolean:'Fael'}[f]||f)).join(',');
      const rows = records.map(r => fields.map(f => { const val = r[f]||r[{id:'id',name:'ism',email:'bareed',phone:'hatif',address:'alamat',city:'madina',country:'dawla',company:'sharika',jobTitle:'wadifa',age:'omr',date:'tarikh',boolean:'fael'}[f]]; if (typeof val === 'string' && (val.includes(',') || val.includes('"'))) return '"' + val.replace(/"/g, '""') + '"'; return val; }).join(','));
      return [header, ...rows].join('\n');
    }
    function toSQL(records, fields) {
      return records.map(r => { const cols = fields.map(f => ({id:'id',name:'ism',email:'bareed',phone:'hatif',address:'alamat',city:'madina',country:'dawla',company:'sharika',jobTitle:'wadifa',age:'omr',date:'tarikh',boolean:'fael'}[f]||f)).join(', '); const vals = fields.map(f => { const val = r[f]||r[{id:'id',name:'ism',email:'bareed',phone:'hatif',address:'alamat',city:'madina',country:'dawla',company:'sharika',jobTitle:'wadifa',age:'omr',date:'tarikh',boolean:'fael'}[f]]; if (typeof val === 'string') return "'" + val.replace(/'/g, "''") + "'"; if (typeof val === 'boolean') return val ? 1 : 0; return val; }).join(', '); return 'INSERT INTO mustakhdimun (' + cols + ') VALUES (' + vals + ');'; }).join('\n');
    }
    function copyOutput() { navigator.clipboard.writeText(document.getElementById('dataOutput').textContent); alert('تم النسخ!'); }
    function downloadData() { const text = document.getElementById('dataOutput').textContent; const format = document.getElementById('outputFormat').value; const blob = new Blob([text], { type: 'text/plain' }); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download = 'bayanat-muwahhama.' + format; a.click(); URL.revokeObjectURL(url); }
  </script>
</body>
</html>
