<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مقارنة النصوص - 205 Tools</title>
  <meta name="description" content="قارن بين نصين واعثر على الاختلافات.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .diff-container { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    .diff-box { border: 1px solid var(--border); border-radius: 8px; padding: 15px; min-height: 200px; white-space: pre-wrap; font-family: monospace; }
    .diff-added { background: #d4edda; color: #155724; }
    .diff-removed { background: #f8d7da; color: #721c24; }
    .diff-unchanged { background: #f8f9fa; }
    @media (max-width: 768px) { .diff-container { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>🔍 مقارنة النصوص</h1>
      <p>قارن بين نصين واعرف الاختلافات</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>الأصلي vs المعدل</h2>
        <div class="lang-selector">
          <a href="../en/text-diff-checker.html" class="lang-btn">EN</a>
          <a href="../es/text-diff-checker.html" class="lang-btn">ES</a>
          <a href="../fr/text-diff-checker.html" class="lang-btn">FR</a>
          <a href="../de/text-diff-checker.html" class="lang-btn">DE</a>
          <a href="./text-diff-checker.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>النص الأصلي</label>
        <textarea id="text1" rows="6" placeholder="أدخل النص الأصلي..."></textarea>
      </div>
      
      <div class="form-group">
        <label>النص المعدل</label>
        <textarea id="text2" rows="6" placeholder="أدخل النص المعدل..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="compareTexts()">مقارنة</button>
        <button class="btn btn-secondary" onclick="clearAll()">مسح</button>
      </div>
      
      <div id="result" style="margin-top: 20px;"></div>
    </div>
    
    <footer><p>205 Tools © 2025 - أدوات مجانية على الإنترنت</p></footer>
  </div>
  
  <script>
    function compareTexts() {
      const text1 = document.getElementById('text1').value;
      const text2 = document.getElementById('text2').value;
      const resultDiv = document.getElementById('result');
      
      if (!text1 && !text2) {
        resultDiv.innerHTML = '';
        return;
      }
      
      const lines1 = text1.split('\n');
      const lines2 = text2.split('\n');
      const maxLines = Math.max(lines1.length, lines2.length);
      
      let html = '<div class="diff-container">';
      html += '<div><h3>الأصلي</h3>';
      for (let i = 0; i < maxLines; i++) {
        const line1 = lines1[i] || '';
        const line2 = lines2[i] || '';
        const cls = line1 === line2 ? 'diff-unchanged' : 'diff-removed';
        html += `<div class="diff-box ${cls}">${escapeHtml(line1) || '&nbsp;'}</div>`;
      }
      html += '</div>';
      
      html += '<div><h3>المعدل</h3>';
      for (let i = 0; i < maxLines; i++) {
        const line1 = lines1[i] || '';
        const line2 = lines2[i] || '';
        const cls = line1 === line2 ? 'diff-unchanged' : 'diff-added';
        html += `<div class="diff-box ${cls}">${escapeHtml(line2) || '&nbsp;'}</div>`;
      }
      html += '</div></div>';
      
      resultDiv.innerHTML = html;
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function clearAll() {
      document.getElementById('text1').value = '';
      document.getElementById('text2').value = '';
      document.getElementById('result').innerHTML = '';
    }
  </script>
</body>
</html>
