<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مولد vCard - 205 Tools</title>
  <meta name="description" content="إنشاء ملفات جهات اتصال vCard للمشاركة السهلة.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .output-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; text-align: left; direction: ltr; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .qr-preview { text-align: center; padding: 20px; }
    #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    <header><h1>👤 مولد vCard</h1><p>إنشاء ملفات جهات اتصال vCard ورموز QR</p></header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>المولد</h2>
        <div class="lang-selector">
          <a href="../en/vcard-generator.html" class="lang-btn">EN</a>
          <a href="../es/vcard-generator.html" class="lang-btn">ES</a>
          <a href="../fr/vcard-generator.html" class="lang-btn">FR</a>
          <a href="../de/vcard-generator.html" class="lang-btn">DE</a>
          <a href="./vcard-generator.html" class="lang-btn active">AR</a>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>الاسم الأول</label><input type="text" id="firstName" placeholder="أحمد"></div>
        <div class="form-group"><label>اسم العائلة</label><input type="text" id="lastName" placeholder="محمد"></div>
        <div class="form-group"><label>الهاتف</label><input type="tel" id="phone" placeholder="+966 50 123 4567"></div>
        <div class="form-group"><label>البريد الإلكتروني</label><input type="email" id="email" placeholder="ahmed@example.com"></div>
        <div class="form-group"><label>الشركة</label><input type="text" id="org" placeholder="شركة المثال"></div>
        <div class="form-group"><label>المسمى الوظيفي</label><input type="text" id="title" placeholder="مدير"></div>
        <div class="form-group"><label>الموقع الإلكتروني</label><input type="url" id="url" placeholder="https://example.com"></div>
        <div class="form-group"><label>العنوان</label><input type="text" id="address" placeholder="شارع الملك فهد 123، الرياض"></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateVCard()">🔄 إنشاء</button>
        <button class="btn btn-secondary" onclick="loadExample()">مثال</button>
        <button class="btn btn-success" onclick="copyVCard()">📋 نسخ</button>
        <button class="btn btn-secondary" onclick="downloadVCard()">💾 تحميل</button>
      </div>
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <div class="qr-preview"><label>رمز QR</label><div id="qrcode"></div></div>
        <label style="margin-top: 20px; display: block;">مخرجات vCard</label>
        <pre id="vcardOutput" class="output-box"></pre>
      </div>
    </div>
    <footer><p>205 Tools © 2025 - أدوات مجانية</p></footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    let currentVCard = '';
    function generateVCard() {
      const fn = document.getElementById('firstName').value.trim();
      const ln = document.getElementById('lastName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const org = document.getElementById('org').value.trim();
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();
      const address = document.getElementById('address').value.trim();
      if (!fn && !ln) { alert('الرجاء إدخال اسم على الأقل'); return; }
      let vcard = 'BEGIN:VCARD\nVERSION:3.0\n';
      vcard += 'N:' + ln + ';' + fn + ';;;\n';
      vcard += 'FN:' + fn + ' ' + ln + '\n';
      if (phone) vcard += 'TEL;TYPE=CELL:' + phone + '\n';
      if (email) vcard += 'EMAIL;TYPE=WORK:' + email + '\n';
      if (org) vcard += 'ORG:' + org + '\n';
      if (title) vcard += 'TITLE:' + title + '\n';
      if (url) vcard += 'URL:' + url + '\n';
      if (address) vcard += 'ADR;TYPE=WORK:;;' + address + ';;;;\n';
      vcard += 'END:VCARD';
      currentVCard = vcard;
      document.getElementById('vcardOutput').textContent = vcard;
      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), { text: vcard, width: 200, height: 200 });
      document.getElementById('outputSection').style.display = 'block';
    }
    function loadExample() {
      document.getElementById('firstName').value = 'أحمد';
      document.getElementById('lastName').value = 'محمد';
      document.getElementById('phone').value = '+966 50 555 1234';
      document.getElementById('email').value = 'ahmed.mohamed@example.com';
      document.getElementById('org').value = 'شركة المثال';
      document.getElementById('title').value = 'مدير تنفيذي';
      document.getElementById('url').value = 'https://example.com';
      document.getElementById('address').value = 'شارع الملك فهد 123، الرياض، 12345';
      generateVCard();
    }
    function copyVCard() { navigator.clipboard.writeText(currentVCard); alert('تم النسخ!'); }
    function downloadVCard() {
      const fn = document.getElementById('firstName').value || 'contact';
      const ln = document.getElementById('lastName').value || '';
      const blob = new Blob([currentVCard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fn + '_' + ln + '.vcf';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
