<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>عارض JSON - 205 Tools</title>
  <meta name="description" content="عرض وتنسيق بيانات JSON مع تمييز الصيغة.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .json-output { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: 'Fira Code', monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; line-height: 1.6; text-align: left; direction: ltr; }
    .json-key { color: #9cdcfe; }
    .json-string { color: #ce9178; }
    .json-number { color: #b5cea8; }
    .json-boolean { color: #569cd6; }
    .json-null { color: #569cd6; }
    .tree-item { margin-right: 20px; margin-left: 0; }
    .tree-toggle { cursor: pointer; user-select: none; color: var(--primary); }
    .tree-toggle:hover { text-decoration: underline; }
    .collapsed .tree-content { display: none; }
    .options { display: flex; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
    .options label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .stats { display: flex; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
    .stat { background: var(--bg-secondary); padding: 10px 20px; border-radius: 8px; }
    .stat-label { font-size: 12px; color: var(--text-muted); }
    .stat-value { font-size: 18px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>🗂️ عارض JSON</h1>
      <p>عرض وتنسيق والتحقق من بيانات JSON</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>العارض</h2>
        <div class="lang-selector">
          <a href="../en/json-viewer.html" class="lang-btn">EN</a>
          <a href="../es/json-viewer.html" class="lang-btn">ES</a>
          <a href="../fr/json-viewer.html" class="lang-btn">FR</a>
          <a href="../de/json-viewer.html" class="lang-btn">DE</a>
          <a href="./json-viewer.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="options">
        <label><input type="radio" name="viewMode" value="formatted" checked> منسق</label>
        <label><input type="radio" name="viewMode" value="tree"> عرض شجري</label>
        <label><input type="radio" name="viewMode" value="compact"> مضغوط</label>
      </div>
      
      <div class="form-group">
        <label>بيانات JSON</label>
        <textarea id="jsonInput" rows="8" placeholder='{"الاسم": "أحمد", "العمر": 30, "المدينة": "الرياض"}'></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="viewJSON()">👁️ عرض</button>
        <button class="btn btn-secondary" onclick="loadExample()">مثال</button>
        <button class="btn btn-success" onclick="copyOutput()">📋 نسخ</button>
        <button class="btn btn-secondary" onclick="clearAll()">مسح</button>
      </div>
      
      <div id="statsContainer" class="stats" style="display: none;">
        <div class="stat"><div class="stat-label">المفاتيح</div><div class="stat-value" id="keyCount">0</div></div>
        <div class="stat"><div class="stat-label">العناصر</div><div class="stat-value" id="arrayCount">0</div></div>
        <div class="stat"><div class="stat-label">الحجم</div><div class="stat-value" id="dataSize">0 كيلوبايت</div></div>
      </div>
      
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <label>المخرجات</label>
        <div id="jsonOutput" class="json-output"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - أدوات مجانية</p></footer>
  </div>
  
  <script>
    function viewJSON() {
      const input = document.getElementById('jsonInput').value.trim();
      if (!input) { alert('الرجاء إدخال بيانات JSON'); return; }
      
      let data;
      try {
        data = JSON.parse(input);
      } catch (e) {
        alert('JSON غير صالح: ' + e.message);
        return;
      }
      
      const viewMode = document.querySelector('input[name="viewMode"]:checked').value;
      const outputEl = document.getElementById('jsonOutput');
      
      if (viewMode === 'compact') {
        outputEl.textContent = JSON.stringify(data);
      } else if (viewMode === 'tree') {
        outputEl.innerHTML = renderTree(data);
      } else {
        outputEl.innerHTML = syntaxHighlight(JSON.stringify(data, null, 2));
      }
      
      const stats = analyzeJSON(data);
      document.getElementById('keyCount').textContent = stats.keys;
      document.getElementById('arrayCount').textContent = stats.arrays;
      document.getElementById('dataSize').textContent = (input.length / 1024).toFixed(2) + ' كيلوبايت';
      document.getElementById('statsContainer').style.display = 'flex';
      document.getElementById('outputSection').style.display = 'block';
    }
    
    function syntaxHighlight(json) {
      return json
        .replace(/"(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(?=\s*:)/g, '<span class="json-key">$&</span>')
        .replace(/"(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(?!\s*:)/g, '<span class="json-string">$&</span>')
        .replace(/\b(true|false)\b/g, '<span class="json-boolean">$&</span>')
        .replace(/\b(null)\b/g, '<span class="json-null">$1</span>')
        .replace(/\b(\d+(?:\.\d+)?)\b/g, '<span class="json-number">$1</span>');
    }
    
    function renderTree(obj, key = 'root') {
      const type = Array.isArray(obj) ? 'array' : typeof obj;
      
      if (obj === null) return `<div class="tree-item">${key}: <span class="json-null">null</span></div>`;
      if (type !== 'object' && type !== 'array') {
        const className = type === 'string' ? 'json-string' : (type === 'number' ? 'json-number' : 'json-boolean');
        const value = type === 'string' ? `"${obj}"` : String(obj);
        return `<div class="tree-item">${key}: <span class="${className}">${value}</span></div>`;
      }
      
      const isArray = Array.isArray(obj);
      const keys = Object.keys(obj);
      const count = keys.length;
      
      let html = `<div class="tree-item">`;
      html += `<span class="tree-toggle" onclick="toggleTree(this)">▶</span> `;
      html += `${key}: ${isArray ? '[' : '{'}${count} عناصر${isArray ? ']' : '}'}`;
      html += `<div class="tree-content">`;
      
      keys.forEach(k => {
        const displayKey = isArray ? `[${k}]` : k;
        html += renderTree(obj[k], displayKey);
      });
      
      html += `</div></div>`;
      return html;
    }
    
    function toggleTree(el) {
      const item = el.closest('.tree-item');
      item.classList.toggle('collapsed');
      el.textContent = item.classList.contains('collapsed') ? '▶' : '▼';
    }
    
    function analyzeJSON(data, stats = { keys: 0, arrays: 0 }) {
      if (Array.isArray(data)) {
        stats.arrays += data.length;
        data.forEach(item => {
          if (typeof item === 'object' && item !== null) analyzeJSON(item, stats);
        });
      } else if (typeof data === 'object' && data !== null) {
        stats.keys += Object.keys(data).length;
        Object.values(data).forEach(val => {
          if (typeof val === 'object' && val !== null) analyzeJSON(val, stats);
        });
      }
      return stats;
    }
    
    function loadExample() {
      document.getElementById('jsonInput').value = JSON.stringify({
        "الشركة": "تك كورب",
        "الموظفون": [
          { "الاسم": "أحمد محمد", "العمر": 32, "القسم": "الهندسة", "الراتب": 75000 },
          { "الاسم": "فاطمة علي", "العمر": 28, "القسم": "التسويق", "الراتب": 65000 },
          { "الاسم": "خالد عمر", "العمر": 45, "القسم": "المبيعات", "الراتب": 82000 }
        ],
        "الموقع": {
          "المدينة": "الرياض",
          "الدولة": "السعودية",
          "الرمز البريدي": "12345"
        },
        "سنة التأسيس": 2010,
        "نشطة": true
      }, null, 2);
      viewJSON();
    }
    
    function copyOutput() {
      const outputEl = document.getElementById('jsonOutput');
      const text = outputEl.textContent || outputEl.innerText;
      navigator.clipboard.writeText(text);
      alert('تم النسخ!');
    }
    
    function clearAll() {
      document.getElementById('jsonInput').value = '';
      document.getElementById('outputSection').style.display = 'none';
      document.getElementById('statsContainer').style.display = 'none';
    }
  </script>
</body>
</html>
