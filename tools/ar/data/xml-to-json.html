<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول XML إلى JSON</title>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:900px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem}
        .card{background:var(--surface);border-radius:12px;padding:1rem}
        .card h3{margin-bottom:0.5rem;color:var(--primary)}
        textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;font-size:0.85rem;min-height:300px;resize:vertical;font-family:monospace}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s;width:100%;margin-top:0.5rem}
        button:hover{opacity:0.9}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
        @media(max-width:768px){.grid{grid-template-columns:1fr}}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="ar/xml-to-json.html" class="active">AR</a>
        <a href="en/xml-to-json.html">EN</a>
        <a href="zh/xml-to-json.html">中文</a>
        <a href="es/xml-to-json.html">ES</a>
        <a href="fr/xml-to-json.html">FR</a>
        <a href="de/xml-to-json.html">DE</a>
    </div>
    <div class="container">
        <h1>🔄 XML to JSON Converter</h1>
        <div class="grid">
            <div class="card">
                <h3>Input XML</h3>
                <textarea id="input" placeholder='\u003croot\u003e\n  \u003cname\u003eJohn\u003c/name\u003e\n  \u003cage\u003e30\u003c/age\u003e\n\u003c/root\u003e'></textarea>
                <button onclick="convert()">تحويل to JSON →</button>
            </div>
            <div class="card">
                <h3>Output JSON</h3>
                <textarea id="output" readonly placeholder="JSON output..."></textarea>
                <button onclick="copyOutput()">نسخ JSON</button>
            </div>
        </div>
    </div>
    <script>
        function convert(){
            const xmlStr=document.getElementById('input').value.trim();
            if(!xmlStr){document.getElementById('output').value='';return}
            try{
                const parser=new DOMParser();
                const xmlDoc=parser.parseFromString(xmlStr,"text/xml");
                if(xmlDoc.getElementsByTagName("parsererror").length>0){throw new Error("Invalid XML")}
                const result=xmlToJson(xmlDoc.documentElement);
                document.getElementById('output').value=JSON.stringify(result,null,2);
            }catch(e){document.getElementById('output').value='Error: '+e.message}
        }
        function xmlToJson(xml){
            const obj={};
            if(xml.nodeType===3){return xml.nodeValue.trim()}
            if(xml.hasAttributes()){obj['@attributes']={};Array.from(xml.attributes).forEach(a=>obj['@attributes'][a.name]=a.value)}
            if(xml.hasChildNodes()){
                const children=Array.from(xml.childNodes).filter(n=>n.nodeType!==3||n.nodeValue.trim());
                if(children.length===1&&children[0].nodeType===3){return children[0].nodeValue.trim()}
                children.forEach(child=>{
                    const childJson=xmlToJson(child);
                    if(child.nodeType===3)return;
                    if(obj[child.nodeName]){if(!Array.isArray(obj[child.nodeName])){obj[child.nodeName]=[obj[child.nodeName]]}obj[child.nodeName].push(childJson)}
                    else{obj[child.nodeName]=childJson}
                });
            }
            return obj;
        }
        function copyOutput(){const el=document.getElementById('output');if(el.value){el.select();document.execCommand('copy');alert('Copied!')}}
    </script>
</body>
</html>
