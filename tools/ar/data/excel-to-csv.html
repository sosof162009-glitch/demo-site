<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول Excel إلى CSV</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:800px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        .dropzone{border:2px dashed var(--primary);border-radius:8px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:1rem}
        .dropzone:hover{background:rgba(79,142,247,0.1)}
        .dropzone.dragover{background:rgba(79,142,247,0.2)}
        input[type="file"]{display:none}
        textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem;border-radius:8px;font-size:0.9rem;min-height:200px;resize:vertical;font-family:monospace;margin-bottom:1rem}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s}
        button:hover{opacity:0.9}
        .btn-full{width:100%}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="ar/excel-to-csv.html" class="active">AR</a>
        <a href="en/excel-to-csv.html">EN</a>
        <a href="zh/excel-to-csv.html">中文</a>
        <a href="es/excel-to-csv.html">ES</a>
        <a href="fr/excel-to-csv.html">FR</a>
        <a href="de/excel-to-csv.html">DE</a>
    </div>
    <div class="container">
        <h1>📉 Excel to CSV Converter</h1>
        <div class="card">
            <div class="dropzone" onclick="document.getElementById('file').click()">
                <p>📁 Click or drop Excel file here</p>
                <input type="file" id="file" accept=".xlsx,.xls" onchange="handleFile(event)">
            </div>
            <textarea id="output" readonly placeholder="CSV output will appear here..."></textarea>
            <button onclick="downloadCSV()" class="btn-full">Download CSV</button>
        </div>
    </div>
    <script>
        let csvContent='';
        function handleFile(e){
            const file=e.target.files[0];
            if(!file)return;
            const reader=new FileReader();
            reader.onload=function(e){
                const data=new Uint8Array(e.target.result);
                const workbook=XLSX.read(data,{type:'array'});
                const firstSheet=workbook.Sheets[workbook.SheetNames[0]];
                csvContent=XLSX.utils.sheet_to_csv(firstSheet);
                document.getElementById('output').value=csvContent;
            };
            reader.readAsArrayBuffer(file);
        }
        function downloadCSV(){
            if(!csvContent){alert('Please upload an Excel file first');return}
            const blob=new Blob([csvContent],{type:'text/csv'});
            const url=URL.createObjectURL(blob);
            const a=document.createElement('a');
            a.href=url;a.download='converted.csv';a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
