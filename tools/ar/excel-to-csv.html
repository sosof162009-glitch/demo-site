<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>excel-to-csv - 205 Tools</title>
  <meta name="description" content="">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>⇄ excel-to-csv</h1>
      <p></p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>خيارات</h2>
        <div class="lang-selector">
          <a href="../en/excel-to-csv.html" class="lang-btn ">EN</a><a href="../es/excel-to-csv.html" class="lang-btn ">ES</a><a href="../fr/excel-to-csv.html" class="lang-btn ">FR</a><a href="../de/excel-to-csv.html" class="lang-btn ">DE</a><a href="../ar/excel-to-csv.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>النص</label>
        <textarea id="inputText" rows="10" placeholder="Enter your text here..."></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="processText()">تحويل</button>
        <button class="btn btn-secondary" onclick="resetText()">إعادة تعيين</button>
      </div>
      <div class="form-group" style="margin-top: 20px;">
        <label>النتيجة</label>
        <textarea id="outputText" rows="10" readonly></textarea>
      </div>
      <button class="btn btn-success" data-success="تم النسخ!" onclick="copyToClipboard(document.getElementById('outputText').value, this)">نسخ</button>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - الأدوات</p>
    </footer>
  </div>
  
  <script>
    
      function processText() {
        const text = document.getElementById('inputText').value;
        document.getElementById('outputText').value = text;
      }
      function resetText() {
        document.getElementById('inputText').value = '';
        document.getElementById('outputText').value = '';
      }
    
  </script>
</body>
</html>
