<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Markdown & HTML Converter | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../../assets/css/tools.css">
  <style>body { font-family: 'Tajawal', sans-serif; }</style>
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="../en/markdown-html.html" >English</option>
      <option value="./markdown-html.html" selected>العربية</option>
      <option value="../fr/markdown-html.html" >Français</option>
      <option value="../es/markdown-html.html" >Español</option>
      <option value="../de/markdown-html.html" >Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>Markdown & HTML Converter</h1>
      <p>Convert between Markdown and HTML formats</p>
    </header>

    <div class="tool-card">
      <div class="options-group">
        <div class="option-item">
          <input type="radio" name="mode" id="md-to-html" value="md-to-html" checked onchange="switchMode()">
          <label for="md-to-html">Markdown → HTML</label>
        </div>
        <div class="option-item">
          <input type="radio" name="mode" id="html-to-md" value="html-to-md" onchange="switchMode()">
          <label for="html-to-md">HTML → Markdown</label>
        </div>
      </div>

      <div class="input-group">
        <label for="text-input" id="input-label">Markdown:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Enter Markdown to convert..."># Hello World\n\nThis is **bold** and *italic* text.</textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="convert()">Convert</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="text-output">Result:</label>
        <textarea id="text-output" class="tool-textarea" placeholder="Conversion will appear here..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyResult()">Copy</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copied!</span>
  </div>

  <script>
    function switchMode() {
      const mode = document.querySelector('input[name="mode"]:checked').value;
      document.getElementById('input-label').textContent = mode === 'md-to-html' ? 'Markdown:' : 'HTML:';
      document.getElementById('text-input').placeholder = mode === 'md-to-html' ? 'Enter Markdown to convert...' : 'Enter HTML to convert...';
    }

    function convert() {
      let input = document.getElementById('text-input').value;
      const mode = document.querySelector('input[name="mode"]:checked').value;
      
      if (input === '') {
        document.getElementById('text-output').value = '';
        return;
      }
      
      let result;
      if (mode === 'md-to-html') {
        result = markdownToHtml(input);
      } else {
        result = htmlToMarkdown(input);
      }
      
      document.getElementById('text-output').value = result;
    }
    
    function markdownToHtml(md) {
      let html = md
        .replace(/^### (.*$)/gim, '<h3>$1</h3>')
        .replace(/^## (.*$)/gim, '<h2>$1</h2>')
        .replace(/^# (.*$)/gim, '<h1>$1</h1>')
        .replace(/\*\*(.*?)\*\*/gim, '<strong>$1</strong>')
        .replace(/\*(.*?)\*/gim, '<em>$1</em>')
        .replace(/\[([^\]]+)\]\(([^)]+)\)/gim, '<a href="$2">$1</a>')
        .replace(/^\* (.*$)/gim, '<li>$1</li>')
        .replace(/\n/gim, '<br>');
      return html;
    }
    
    function htmlToMarkdown(html) {
      let md = html
        .replace(/<h1[^\u003e]*>(.*?)</h1>/gim, '# $1')
        .replace(/<h2[^\u003e]*>(.*?)</h2>/gim, '## $1')
        .replace(/<h3[^\u003e]*>(.*?)</h3>/gim, '### $1')
        .replace(/<strong[^\u003e]*>(.*?)</strong>/gim, '**$1**')
        .replace(/<b[^\u003e]*>(.*?)</b>/gim, '**$1**')
        .replace(/<em[^\u003e]*>(.*?)</em>/gim, '*$1*')
        .replace(/<i[^\u003e]*>(.*?)</i>/gim, '*$1*')
        .replace(/<a[^\u003e]*href="([^"]+)"[^\u003e]*>(.*?)</a>/gim, '[$2]($1)')
        .replace(/<li[^\u003e]*>(.*?)</li>/gim, '* $1')
        .replace(/<br\s*/?>/gim, '\n')
        .replace(/<[^>]+>/gim, '');
      return md;
    }

    function copyResult() {
      const output = document.getElementById('text-output');
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2002);
    }

    function clearAll() {
      document.getElementById('text-input').value = '';
      document.getElementById('text-output').value = '';
    }
    
    // Auto-convert on load
    convert();
  </script>
</body>
</html>
