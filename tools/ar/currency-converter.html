<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>محول العملات - 205 Tools</title>
  <meta name="description" content="تحويل بين العملات باستخدام أسعار الصرف.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-box { background: var(--bg-secondary); padding: 30px; border-radius: 16px; text-align: center; }
    .amount-display { font-size: 48px; font-weight: 700; color: var(--primary); margin: 20px 0; }
    .rate-info { color: var(--text-secondary); margin-top: 10px; }
    .currency-select { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; margin: 20px 0; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .currency-select { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الصفحة الرئيسية</a>
    
    <header>
      <h1>💱 محول العملات</h1>
      <p>تحويل بين العملات باستخدام أسعار الصرف</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>تحويل</h2>
        <div class="lang-selector">
          <a href="../en/currency-converter.html" class="lang-btn">EN</a>
          <a href="../es/currency-converter.html" class="lang-btn">ES</a>
          <a href="../fr/currency-converter.html" class="lang-btn">FR</a>
          <a href="../de/currency-converter.html" class="lang-btn">DE</a>
          <a href="../ar/currency-converter.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>المبلغ</label>
        <input type="number" id="amount" value="100" step="0.01" oninput="convert()">
      </div>
      
      <div class="currency-select">
        <div class="form-group">
          <label>من</label>
          <select id="fromCurrency" onchange="convert()">
            <option value="USD" selected>USD - الدولار الأمريكي</option>
            <option value="EUR">EUR - اليورو</option>
            <option value="GBP">GBP - الجنيه الإسترليني</option>
            <option value="JPY">JPY - الين الياباني</option>
            <option value="AUD">AUD - الدولار الأسترالي</option>
            <option value="CAD">CAD - الدولار الكندي</option>
            <option value="CHF">CHF - الفرنك السويسري</option>
            <option value="CNY">CNY - اليوان الصيني</option>
            <option value="INR">INR - الروبية الهندية</option>
            <option value="SAR">SAR - الريال السعودي</option>
            <option value="AED">AED - الدرهم الإماراتي</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>إلى</label>
          <select id="toCurrency" onchange="convert()">
            <option value="USD">USD - الدولار الأمريكي</option>
            <option value="EUR" selected>EUR - اليورو</option>
            <option value="GBP">GBP - الجنيه الإسترليني</option>
            <option value="JPY">JPY - الين الياباني</option>
            <option value="AUD">AUD - الدولار الأسترالي</option>
            <option value="CAD">CAD - الدولار الكندي</option>
            <option value="CHF">CHF - الفرنك السويسري</option>
            <option value="CNY">CNY - اليوان الصيني</option>
            <option value="INR">INR - الروبية الهندية</option>
            <option value="SAR">SAR - الريال السعودي</option>
            <option value="AED">AED - الدرهم الإماراتي</option>
          </select>
        </div>
      </div>
      
      <div class="converter-box">
        <div class="amount-display" id="result">€92.00</div>
        <div class="rate-info" id="rateInfo">1 USD = 0.92 EUR</div>
        <div style="color: var(--text-secondary); font-size: 12px; margin-top: 15px;">*أسعار تقريبة للتوضيح</div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - أدوات مجانية على الإنترنت</p></footer>
  </div>
  
  <script>
    const rates = {
      USD: 1, EUR: 0.92, GBP: 0.79, JPY: 150.23, AUD: 1.53, CAD: 1.35,
      CHF: 0.88, CNY: 7.19, INR: 82.90, SAR: 3.75, AED: 3.67
    };
    const symbols = { USD: '$', EUR: '€', GBP: '£', JPY: '¥', AUD: 'A$', CAD: 'C$', CHF: 'Fr', CNY: '¥', INR: '₹', SAR: '﷼', AED: 'د.إ' };
    
    function convert() {
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const from = document.getElementById('fromCurrency').value;
      const to = document.getElementById('toCurrency').value;
      const usdAmount = amount / rates[from];
      const result = usdAmount * rates[to];
      const rate = rates[to] / rates[from];
      const symbol = symbols[to] || '';
      document.getElementById('result').textContent = symbol + result.toFixed(2);
      document.getElementById('rateInfo').textContent = `1 ${from} = ${rate.toFixed(4)} ${to}`;
    }
    
    function swap() {
      const from = document.getElementById('fromCurrency').value;
      const to = document.getElementById('toCurrency').value;
      document.getElementById('fromCurrency').value = to;
      document.getElementById('toCurrency').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
