<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قارئ رموز QR - 205 أدوات</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:600px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        .dropzone{border:2px dashed var(--primary);border-radius:8px;padding:2rem;text-align:center;cursor:pointer;transition:all 0.2s;margin-bottom:1rem}
        .dropzone:hover{background:rgba(79,142,247,0.1)}
        input[type="file"]{display:none}
        #preview{max-width:100%;max-height:300px;display:none;margin:1rem auto;border-radius:8px}
        #result{background:var(--bg);border:1px solid var(--primary);padding:1rem;border-radius:8px;margin-top:1rem;min-height:60px;word-break:break-all}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s;width:100%}
        button:hover{opacity:0.9}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="ar/qr-reader.html" class="active">AR</a>
        <a href="en/qr-reader.html">EN</a>
        <a href="zh/qr-reader.html">中文</a>
        <a href="es/qr-reader.html">ES</a>
        <a href="fr/qr-reader.html">FR</a>
        <a href="de/qr-reader.html">DE</a>
    </div>
    <div class="container">
        <h1>📷 QR Code Reader</h1>
        <div class="card">
            <div class="dropzone" onclick="document.getElementById('file').click()">
                <p>📁 Click or drop QR code image here</p>
                <input type="file" id="file" accept="image/*" onchange="handleFile(event)">
            </div>
            <img id="preview">
            <div id="result">Upload an image to scan...</div>
        </div>
    </div>
    <script>
        function handleFile(e){
            const file=e.target.files[0];
            if(!file)return;
            const reader=new FileReader();
            reader.onload=function(event){
                const img=document.getElementById('preview');
                img.src=event.target.result;
                img.style.display='block';
                img.onload=function(){scanQR(img)}
            };
            reader.readAsDataURL(file);
        }
        function scanQR(img){
            const canvas=document.createElement('canvas');
            const ctx=canvas.getContext('2d');
            canvas.width=img.naturalWidth;
            canvas.height=img.naturalHeight;
            ctx.drawImage(img,0,0);
            const imageData=ctx.getImageData(0,0,canvas.width,canvas.height);
            const code=jsQR(imageData.data,canvas.width,canvas.height);
            document.getElementById('result').textContent=code?code.data:'No QR code found';
        }
    </script>
</body>
</html>
