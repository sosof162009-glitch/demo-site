<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد الباركود - 205 أدوات</title>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:600px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        input[type="text"],select{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-size:1rem;margin-bottom:1rem}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
        .option label{display:block;margin-bottom:0.25rem;color:var(--text2);font-size:0.875rem}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s;width:100%}
        button:hover{opacity:0.9}
        #barcode{display:flex;justify-content:center;padding:1rem;background:#fff;border-radius:8px;margin-top:1rem;min-height:150px;align-items:center}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="ar/barcode-generator.html" class="active">AR</a>
        <a href="en/barcode-generator.html">EN</a>
        <a href="zh/barcode-generator.html">中文</a>
        <a href="es/barcode-generator.html">ES</a>
        <a href="fr/barcode-generator.html">FR</a>
        <a href="de/barcode-generator.html">DE</a>
    </div>
    <div class="container">
        <h1>📊 Barcode Generator</h1>
        <div class="card">
            <input type="text" id="text" placeholder="Enter text..." value="123456789012">
            <div class="options">
                <div class="option">
                    <label>Format</label>
                    <select id="format">
                        <option value="CODE128">CODE128</option>
                        <option value="EAN13">EAN-13</option>
                        <option value="UPC">UPC</option>
                        <option value="CODE39">CODE39</option>
                    </select>
                </div>
                <div class="option">
                    <label>Display النص</label>
                    <select id="displayValue">
                        <option value="true">Yes</option>
                        <option value="false">No</option>
                    </select>
                </div>
            </div>
            <button onclick="generateBarcode()">إنشاء Barcode</button>
            <svg id="barcode"></svg>
        </div>
    </div>
    <script>
        function generateBarcode(){
            const text=document.getElementById('text').value;
            if(!text){alert('Please enter text');return}
            try{
                JsBarcode("#barcode",text,{format:document.getElementById('format').value,displayValue:document.getElementById('displayValue').value==='true',width:2,height:100});
            }catch(e){alert('Error: '+e.message)}
        }
        generateBarcode();
    </script>
</body>
</html>
