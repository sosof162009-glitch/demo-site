<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد رموز QR - 205 أدوات</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:600px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        input[type="text"],textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-size:1rem;margin-bottom:1rem}
        textarea{min-height:100px;resize:vertical}
        .options{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
        .option label{display:block;margin-bottom:0.25rem;color:var(--text2);font-size:0.875rem}
        .option input,.option select{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.5rem;border-radius:8px}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s;width:100%}
        button:hover{opacity:0.9}
        #qrcode{display:flex;justify-content:center;padding:1rem;background:#fff;border-radius:8px;margin-top:1rem;min-height:200px;align-items:center}
        #qrcode:empty::after{content:"QR Code will appear here";color:#999}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="ar/qr-generator.html" class="active">AR</a>
        <a href="en/qr-generator.html">EN</a>
        <a href="zh/qr-generator.html">中文</a>
        <a href="es/qr-generator.html">ES</a>
        <a href="fr/qr-generator.html">FR</a>
        <a href="de/qr-generator.html">DE</a>
    </div>
    <div class="container">
        <h1>📱 QR Code Generator</h1>
        <div class="card">
            <textarea id="text" placeholder="Enter text or URL...">https://example.com</textarea>
            <div class="options">
                <div class="option">
                    <label>العرض (بكسل)</label>
                    <input type="number" id="width" value="200" min="100" max="500">
                </div>
                <div class="option">
                    <label>الارتفاع (بكسل)</label>
                    <input type="number" id="height" value="200" min="100" max="500">
                </div>
            </div>
            <button onclick="generateQR()">إنشاء QR Code</button>
            <div id="qrcode"></div>
        </div>
    </div>
    <script>
        let qrCode=null;
        function generateQR(){
            const text=document.getElementById('text').value;
            if(!text){alert('Please enter text');return}
            const container=document.getElementById('qrcode');
            container.innerHTML='';
            const width=parseInt(document.getElementById('width').value)||200;
            const height=parseInt(document.getElementById('height').value)||200;
            qrCode=new QRCode(container,{text:text,width:width,height:height,colorDark:"#000000",colorLight:"#ffffff",correctLevel:QRCode.CorrectLevel.H});
        }
        generateQR();
    </script>
</body>
</html>
