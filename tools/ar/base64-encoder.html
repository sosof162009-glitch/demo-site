<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مُشفر Base64 - 205 Tools</title>
  <meta name="description" content="ترميز النص إلى تنسيق Base64.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>🔒 مُشفر Base64</h1>
      <p>تحويل النص إلى تنسيق Base64</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>المُشفر</h2>
        <div class="lang-selector">
          <a href="../en/base64-encoder.html" class="lang-btn">EN</a>
          <a href="../es/base64-encoder.html" class="lang-btn">ES</a>
          <a href="../fr/base64-encoder.html" class="lang-btn">FR</a>
          <a href="../de/base64-encoder.html" class="lang-btn">DE</a>
          <a href="./base64-encoder.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>النص للترميز</label>
        <textarea id="input" rows="8" placeholder="أدخل النص للترميز...">مرحباً بالعالم! 👋</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encode()">🔒 ترميز</button>
        <button class="btn btn-success" onclick="copyResult()">📋 نسخ</button>
        <button class="btn btn-secondary" onclick="clearAll()">مسح</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>نتيجة Base64</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - أدوات مجانية</p></footer>
  </div>
  
  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) { alert('الرجاء إدخال نص'); return; }
      
      try {
        const result = btoa(unescape(encodeURIComponent(text)));
        document.getElementById('output').value = result;
      } catch (e) {
        alert('خطأ في ترميز النص');
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('تم النسخ!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
