<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>مولد الباركود - 205 Tools</title>
  <meta name="description" content="إنشاء باركود بتنسيقات متعددة.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← الرئيسية</a>
    
    <header>
      <h1>┃ مولد الباركود</h1>
      <p>إنشاء باركود بتنسيقات متعددة.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>إنشاء</h2>
        <div class="lang-selector">
          <a href="../en/barcode-generator.html" class="lang-btn ">EN</a><a href="../es/barcode-generator.html" class="lang-btn ">ES</a><a href="../fr/barcode-generator.html" class="lang-btn ">FR</a><a href="../de/barcode-generator.html" class="lang-btn ">DE</a><a href="../ar/barcode-generator.html" class="lang-btn active">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>Content</label>
        <input type="text" id="barcodeContent" placeholder="123456789012">
      </div>
      <div class="form-group">
        <label>Format</label>
        <select id="barcodeFormat">
          <option value="CODE128">CODE128</option>
          <option value="EAN13">EAN-13</option>
          <option value="UPC">UPC</option>
          <option value="CODE39">CODE39</option>
          <option value="ITF14">ITF-14</option>
          <option value="MSI">MSI</option>
          <option value="pharmacode">Pharmacode</option>
        </select>
      </div>
      <div class="form-group">
        <label>Width</label>
        <input type="number" id="barcodeWidth" value="2" min="1" max="4">
      </div>
      <div class="form-group">
        <label>Height</label>
        <input type="number" id="barcodeHeight" value="100" min="30" max="200">
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="showText" checked> Show Text</label>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateBarcodeCode()">إنشاء</button>
        <button class="btn btn-secondary" onclick="downloadBarcode()">تحميل</button>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <svg id="barcode"></svg>
      </div>
      
      <script>
        function generateBarcodeCode() {
          const content = document.getElementById('barcodeContent').value;
          if (!content) {
            alert('Please enter content');
            return;
          }
          
          const format = document.getElementById('barcodeFormat').value;
          const width = parseInt(document.getElementById('barcodeWidth').value);
          const height = parseInt(document.getElementById('barcodeHeight').value);
          const displayValue = document.getElementById('showText').checked;
          
          try {
            JsBarcode('#barcode', content, {
              format: format,
              width: width,
              height: height,
              displayValue: displayValue
            });
          } catch (e) {
            alert('Invalid format for content: ' + e.message);
          }
        }
        
        function downloadBarcode() {
          const svg = document.getElementById('barcode');
          const serializer = new XMLSerializer();
          const svgString = serializer.serializeToString(svg);
          const blob = new Blob([svgString], { type: 'image/svg+xml' });
          const url = URL.createObjectURL(blob);
          
          const a = document.createElement('a');
          a.href = url;
          a.download = 'barcode.svg';
          a.click();
          
          URL.revokeObjectURL(url);
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - الأدوات</p>
    </footer>
  </div>
</body>
</html>
