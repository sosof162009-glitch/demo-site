<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MAC Address Generator - 205 Tools</title>
  <meta name="description" content="Generate random MAC addresses.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .mac-display { background: var(--bg-secondary); padding: 25px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 24px; text-align: center; margin: 20px 0; color: var(--primary); letter-spacing: 2px; }
    .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 20px 0; }
    .option-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; }
    .history { margin-top: 20px; }
    .history-item { background: var(--bg-secondary); padding: 10px 15px; border-radius: 8px; margin: 5px 0; font-family: 'Fira Code', monospace; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔌 MAC Address Generator</h1>
      <p>Generate random MAC addresses</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generator</h2>
        <div class="lang-selector">
          <a href="./mac-address-generator.html" class="lang-btn active">EN</a>
          <a href="../es/mac-address-generator.html" class="lang-btn">ES</a>
          <a href="../fr/mac-address-generator.html" class="lang-btn">FR</a>
          <a href="../de/mac-address-generator.html" class="lang-btn">DE</a>
          <a href="../ar/mac-address-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="options">
        <div class="option-box">
          <label>Separator</label>
          <select id="separator" onchange="generate()">
            <option value=":" selected>Colon (:)</option>
            <option value="-">Hyphen (-)</option>
            <option value="">None</option>
          </select>
        </div>
        
        <div class="option-box">
          <label>Case</label>
          <select id="case" onchange="generate()">
            <option value="lower" selected>Lowercase</option>
            <option value="upper">Uppercase</option>
          </select>
        </div>
        
        <div class="option-box">
          <label>Quantity</label>
          <input type="number" id="quantity" value="1" min="1" max="10">
        </div>
      </div>
      
      <div class="mac-display" id="macOutput">00:1a:2b:3c:4d:5e</div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generate()">🔄 Generate</button>
        <button class="btn btn-success" onclick="copyMAC()">📋 Copy</button>
      </div>
      
      <div class="history" id="history">
        <h3>History</h3>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let historyList = [];
    
    function generate() {
      const separator = document.getElementById('separator').value;
      const caseType = document.getElementById('case').value;
      const quantity = parseInt(document.getElementById('quantity').value) || 1;
      
      const macs = [];
      for (let i = 0; i < quantity; i++) {
        let mac = '';
        for (let j = 0; j < 6; j++) {
          const byte = Math.floor(Math.random() * 256).toString(16).padStart(2, '0');
          mac += byte;
          if (j < 5) mac += separator;
        }
        macs.push(caseType === 'upper' ? mac.toUpperCase() : mac.toLowerCase());
      }
      
      const result = macs.join('\n');
      document.getElementById('macOutput').textContent = result;
      
      // Add to history
      historyList.unshift(...macs);
      if (historyList.length > 5) historyList = historyList.slice(0, 5);
      updateHistory();
    }
    
    function updateHistory() {
      const historyDiv = document.getElementById('history');
      historyDiv.innerHTML = '<h3>History</h3>';
      historyList.forEach(mac => {
        const item = document.createElement('div');
        item.className = 'history-item';
        item.innerHTML = `
          <span>${mac}</span>
          <button class="btn btn-sm btn-secondary" onclick="copyText('${mac}')">Copy</button>
        `;
        historyDiv.appendChild(item);
      });
    }
    
    function copyMAC() {
      const mac = document.getElementById('macOutput').textContent;
      navigator.clipboard.writeText(mac);
      alert('MAC address copied!');
    }
    
    function copyText(text) {
      navigator.clipboard.writeText(text);
      alert('Copied!');
    }
  </script>
</body>
</html>
