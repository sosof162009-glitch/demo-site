<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Days Until Date - 205 Tools</title>
  <meta name="description" content="Calculate how many days until a specific date or event.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <style>
    .countdown-result { text-align: center; padding: 40px; background: linear-gradient(135deg, rgba(79, 142, 247, 0.1) 0%, transparent 100%); border-radius: 12px; border: 1px solid var(--border); margin-top: 20px; }
    .countdown-number { font-size: 72px; font-weight: 700; color: var(--primary); line-height: 1; }
    .countdown-label { font-size: 24px; color: var(--text-secondary); margin-top: 10px; }
    .countdown-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 15px; margin-top: 30px; }
    .countdown-box { background: var(--bg-card); padding: 20px; border-radius: 8px; text-align: center; }
    .countdown-box .number { font-size: 32px; font-weight: 700; color: var(--primary); }
    .countdown-box .label { font-size: 12px; color: var(--text-secondary); margin-top: 5px; text-transform: uppercase; }
    .event-name { font-size: 28px; font-weight: 600; color: var(--text-primary); margin-bottom: 20px; }
    .progress-bar { background: var(--bg-input); height: 20px; border-radius: 10px; overflow: hidden; margin-top: 20px; }
    .progress-fill { background: linear-gradient(90deg, var(--primary), var(--success)); height: 100%; border-radius: 10px; transition: width 0.5s ease; }
    .progress-text { text-align: center; margin-top: 10px; color: var(--text-secondary); font-size: 14px; }
    .preset-events { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
    .preset-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-secondary); padding: 10px; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
    .preset-btn:hover { background: var(--primary); color: white; border-color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📅 Days Until Date</h1>
      <p>Calculate how many days until your special event or target date</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Calculate Days Until</h2>
        <div class="lang-selector">
          <a href="./days-until-date.html" class="lang-btn active">EN</a>
          <a href="../es/days-until-date.html" class="lang-btn">ES</a>
          <a href="../fr/days-until-date.html" class="lang-btn">FR</a>
          <a href="../de/days-until-date.html" class="lang-btn">DE</a>
          <a href="../ar/days-until-date.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Event Name (Optional)</label>
        <input type="text" id="eventName" class="tool-input" placeholder="e.g., Christmas, Vacation, Birthday...">
      </div>
      
      <div class="form-group">
        <label>Target Date</label>
        <input type="date" id="targetDate" class="tool-input">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculateDays()">Calculate</button>
        <button class="btn btn-secondary" onclick="resetDays()">Reset</button>
      </div>
      
      <div style="margin-top: 20px;">
        <h4>Quick Select:</h4>
        <div class="preset-events">
          <button class="preset-btn" onclick="setPreset('New Year', getNextNewYear())">🎉 New Year</button>
          <button class="preset-btn" onclick="setPreset('Christmas', getNextChristmas())">🎄 Christmas</button>
          <button class="preset-btn" onclick="setPreset('Halloween', getNextHalloween())">🎃 Halloween</button>
          <button class="preset-btn" onclick="setPreset('Valentine\'s Day', getNextValentines())">💝 Valentine's</button>
          <button class="preset-btn" onclick="setPreset('Summer Solstice', getNextSolstice())">☀️ Summer</button>
          <button class="preset-btn" onclick="setPreset('Next Friday', getNextFriday())">📅 Next Friday</button>
        </div>
      </div>
      
      <div id="result" class="countdown-result" style="display: none;">
        <div class="event-name" id="resultEventName"></div>
        <div class="countdown-number" id="totalDays"></div>
        <div class="countdown-label">days remaining</div>
        
        <div class="countdown-details">
          <div class="countdown-box">
            <div class="number" id="monthsLeft">0</div>
            <div class="label">Months</div>
          </div>
          <div class="countdown-box">
            <div class="number" id="weeksLeft">0</div>
            <div class="label">Weeks</div>
          </div>
          <div class="countdown-box">
            <div class="number" id="hoursLeft">0</div>
            <div class="label">Hours</div>
          </div>
          <div class="countdown-box">
            <div class="number" id="minutesLeft">0</div>
            <div class="label">Minutes</div>
          </div>
        </div>
        
        <div class="progress-bar">
          <div class="progress-fill" id="progressFill"></div>
        </div>
        <div class="progress-text" id="progressText"></div>
        
        <div id="pastEvent" style="margin-top: 20px; padding: 15px; background: var(--error); color: white; border-radius: 8px; display: none;">
          This date has already passed!
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function calculateDays() {
      const eventName = document.getElementById('eventName').value || 'Your Event';
      const targetDate = document.getElementById('targetDate').value;
      
      if (!targetDate) {
        alert('Please select a target date');
        return;
      }
      
      const target = new Date(targetDate + 'T00:00:00');
      const now = new Date();
      now.setHours(0, 0, 0, 0);
      
      const diffTime = target - now;
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      
      document.getElementById('resultEventName').textContent = eventName;
      document.getElementById('totalDays').textContent = Math.abs(diffDays);
      document.getElementById('countdown-label').textContent = diffDays >= 0 ? 'days remaining' : 'days ago';
      
      const totalHours = Math.ceil(diffTime / (1000 * 60 * 60));
      const totalMinutes = Math.ceil(diffTime / (1000 * 60));
      
      document.getElementById('monthsLeft').textContent = Math.floor(Math.abs(diffDays) / 30.44);
      document.getElementById('weeksLeft').textContent = Math.floor(Math.abs(diffDays) / 7);
      document.getElementById('hoursLeft').textContent = Math.abs(totalHours).toLocaleString();
      document.getElementById('minutesLeft').textContent = Math.abs(totalMinutes).toLocaleString();
      
      if (diffDays < 0) {
        document.getElementById('pastEvent').style.display = 'block';
        document.getElementById('progressFill').style.width = '100%';
        document.getElementById('progressText').textContent = 'Event has passed';
      } else {
        document.getElementById('pastEvent').style.display = 'none';
        const oneYear = 365;
        const progress = Math.max(0, Math.min(100, (1 - diffDays / oneYear) * 100));
        document.getElementById('progressFill').style.width = progress + '%';
        document.getElementById('progressText').textContent = `Target: ${target.toLocaleDateString('en-US', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })}`;
      }
      
      document.getElementById('result').style.display = 'block';
    }
    
    function resetDays() {
      document.getElementById('eventName').value = '';
      document.getElementById('targetDate').value = '';
      document.getElementById('result').style.display = 'none';
    }
    
    function setPreset(name, date) {
      document.getElementById('eventName').value = name;
      document.getElementById('targetDate').value = date;
      calculateDays();
    }
    
    function getNextNewYear() {
      const now = new Date();
      const nextYear = now.getFullYear() + 1;
      return `${nextYear}-01-01`;
    }
    
    function getNextChristmas() {
      const now = new Date();
      const currentYear = now.getFullYear();
      const christmas = new Date(currentYear, 11, 25);
      if (christmas < now) {
        return `${currentYear + 1}-12-25`;
      }
      return `${currentYear}-12-25`;
    }
    
    function getNextHalloween() {
      const now = new Date();
      const currentYear = now.getFullYear();
      const halloween = new Date(currentYear, 9, 31);
      if (halloween < now) {
        return `${currentYear + 1}-10-31`;
      }
      return `${currentYear}-10-31`;
    }
    
    function getNextValentines() {
      const now = new Date();
      const currentYear = now.getFullYear();
      const valentines = new Date(currentYear, 1, 14);
      if (valentines < now) {
        return `${currentYear + 1}-02-14`;
      }
      return `${currentYear}-02-14`;
    }
    
    function getNextSolstice() {
      const now = new Date();
      const currentYear = now.getFullYear();
      const solstice = new Date(currentYear, 5, 21);
      if (solstice < now) {
        return `${currentYear + 1}-06-21`;
      }
      return `${currentYear}-06-21`;
    }
    
    function getNextFriday() {
      const now = new Date();
      const day = now.getDay();
      const daysUntilFriday = (5 - day + 7) % 7 || 7;
      const nextFriday = new Date(now);
      nextFriday.setDate(now.getDate() + daysUntilFriday);
      return nextFriday.toISOString().split('T')[0];
    }
  </script>
</body>
</html>
