<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Entities Decoder - 205 Tools</title>
  <meta name="description" content="Decode HTML entities to special characters.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔓 HTML Entities Decoder</h1>
      <p>Convert HTML entities to special characters</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Decoder</h2>
        <div class="lang-selector">
          <a href="./html-entities-decoder.html" class="lang-btn active">EN</a>
          <a href="../es/html-entities-decoder.html" class="lang-btn">ES</a>
          <a href="../fr/html-entities-decoder.html" class="lang-btn">FR</a>
          <a href="../de/html-entities-decoder.html" class="lang-btn">DE</a>
          <a href="../ar/html-entities-decoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>HTML Entities to Decode</label>
        <textarea id="input" rows="8" placeholder="Enter HTML with entities...">&lt;div&gt;Hello &amp; Welcome!&lt;/div&gt;
&lt;p&gt;5 &lt; 10 &amp; 10 &gt; 5&lt;/p&gt;
&quot;Quotes&quot; and &#39;apostrophes&#39;
Copyright &copy; 2025</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="decode()">🔓 Decode</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Decoded Text</label>
        <textarea id="output" rows="8" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function decode() {
      let html = document.getElementById('input').value;
      if (!html) return;
      
      const textarea = document.createElement('textarea');
      textarea.innerHTML = html;
      document.getElementById('output').value = textarea.value;
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
