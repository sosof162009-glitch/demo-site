<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lorem Ipsum Generator - 205 Tools</title>
  <meta name="description" content="Generate Lorem Ipsum placeholder text for your designs.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .output-box { background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-top: 20px; line-height: 1.6; }
    .options-row { display: flex; gap: 20px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
    .option-item { display: flex; align-items: center; gap: 10px; }
    .option-item input[type="number"] { width: 80px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📝 Lorem Ipsum Generator</h1>
      <p>Generate placeholder text for your designs</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generator</h2>
        <div class="lang-selector">
          <a href="./lorem-ipsum-generator.html" class="lang-btn active">EN</a>
          <a href="../es/lorem-ipsum-generator.html" class="lang-btn">ES</a>
          <a href="../fr/lorem-ipsum-generator.html" class="lang-btn">FR</a>
          <a href="../de/lorem-ipsum-generator.html" class="lang-btn">DE</a>
          <a href="../ar/lorem-ipsum-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="options-row">
        <div class="option-item">
          <label>Count:</label>
          <input type="number" id="count" value="5" min="1" max="100">
        </div>
        
        <div class="option-item">
          <label>Type:</label>
          <select id="type">
            <option value="paragraphs">Paragraphs</option>
            <option value="sentences">Sentences</option>
            <option value="words">Words</option>
          </select>
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateLorem()">Generate</button>
        <button class="btn btn-success" onclick="copyText()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearText()">Clear</button>
      </div>
      
      <div class="output-box" id="output"></div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const words = [
      'lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit',
      'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore',
      'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud',
      'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo',
      'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate',
      'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint',
      'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia',
      'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum'
    ];
    
    function generateLorem() {
      const count = parseInt(document.getElementById('count').value) || 5;
      const type = document.getElementById('type').value;
      let result = '';
      
      if (type === 'paragraphs') {
        for (let i = 0; i < count; i++) {
          result += generateParagraph() + '\n\n';
        }
      } else if (type === 'sentences') {
        result = generateSentences(count);
      } else {
        result = generateWords(count);
      }
      
      document.getElementById('output').textContent = result.trim();
    }
    
    function generateParagraph() {
      const sentences = 3 + Math.floor(Math.random() * 4);
      return generateSentences(sentences);
    }
    
    function generateSentences(n) {
      const sentences = [];
      for (let i = 0; i < n; i++) {
        const wordsCount = 5 + Math.floor(Math.random() * 10);
        sentences.push(capitalize(generateWords(wordsCount)) + '.');
      }
      return sentences.join(' ');
    }
    
    function generateWords(n) {
      const result = [];
      for (let i = 0; i < n; i++) {
        result.push(words[Math.floor(Math.random() * words.length)]);
      }
      return result.join(' ');
    }
    
    function capitalize(text) {
      return text.charAt(0).toUpperCase() + text.slice(1);
    }
    
    function copyText() {
      const text = document.getElementById('output').textContent;
      navigator.clipboard.writeText(text);
      alert('Copied!');
    }
    
    function clearText() {
      document.getElementById('output').textContent = '';
    }
    
    // Generate on load
    generateLorem();
  </script>
</body>
</html>
