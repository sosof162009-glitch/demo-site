<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Size Converter - 205 Tools</title>
  <meta name="description" content="Convert between file size units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
    .size-table { margin-top: 20px; }
    .size-row { display: grid; grid-template-columns: 1fr 1fr; padding: 10px; border-bottom: 1px solid var(--border); }
    .size-row:nth-child(odd) { background: var(--bg-secondary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>💾 File Size Converter</h1>
      <p>Convert between bytes, KB, MB, GB, TB</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./file-size-converter.html" class="lang-btn active">EN</a>
          <a href="../es/file-size-converter.html" class="lang-btn">ES</a>
          <a href="../fr/file-size-converter.html" class="lang-btn">FR</a>
          <a href="../de/file-size-converter.html" class="lang-btn">DE</a>
          <a href="../ar/file-size-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Size</label>
        <input type="number" id="value" value="1024" step="any" oninput="convert()">
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <select id="fromUnit" onchange="convert()">
            <option value="b">Bytes (B)</option>
            <option value="kb">Kilobytes (KB)</option>
            <option value="mb">Megabytes (MB)</option>
            <option value="gb">Gigabytes (GB)</option>
            <option value="tb">Terabytes (TB)</option>
            <option value="pb">Petabytes (PB)</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toUnit" onchange="convert()">
            <option value="b">Bytes (B)</option>
            <option value="kb">Kilobytes (KB)</option>
            <option value="mb" selected>Megabytes (MB)</option>
            <option value="gb">Gigabytes (GB)</option>
            <option value="tb">Terabytes (TB)</option>
            <option value="pb">Petabytes (PB)</option>
          </select>
        </div>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-label">Result</div>
        <div class="result-value" id="result">1</div>
        <div class="result-formula" id="formula">1024 KB = 1 MB</div>
      </div>
      
      <div class="size-table">
        <h3>All Conversions</h3>
        <div id="allConversions"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const toBytes = {
      b: 1,
      kb: 1024,
      mb: 1024 * 1024,
      gb: 1024 * 1024 * 1024,
      tb: 1024 * 1024 * 1024 * 1024,
      pb: 1024 * 1024 * 1024 * 1024 * 1024
    };
    
    const unitNames = {
      b: 'Bytes',
      kb: 'KB',
      mb: 'MB',
      gb: 'GB',
      tb: 'TB',
      pb: 'PB'
    };
    
    function convert() {
      const value = parseFloat(document.getElementById('value').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const bytes = value * toBytes[from];
      const result = bytes / toBytes[to];
      
      document.getElementById('result').textContent = result.toLocaleString(undefined, { maximumFractionDigits: 10 });
      document.getElementById('formula').textContent = `${value} ${unitNames[from]} = ${result.toLocaleString(undefined, { maximumFractionDigits: 6 })} ${unitNames[to]}`;
      
      // Update all conversions table
      const allDiv = document.getElementById('allConversions');
      allDiv.innerHTML = '';
      Object.keys(toBytes).forEach(unit => {
        const val = bytes / toBytes[unit];
        const row = document.createElement('div');
        row.className = 'size-row';
        row.innerHTML = `<span>${unitNames[unit]}</span><span>${val.toLocaleString(undefined, { maximumFractionDigits: 4 })}</span>`;
        allDiv.appendChild(row);
      });
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
