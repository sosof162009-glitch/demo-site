<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hash Identifier - 205 Tools</title>
  <meta name="description" content="Identify the type of hash algorithm used.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔍 Hash Identifier</h1>
      <p>Identify the type of hash algorithm used.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Input</h2>
        <div class="lang-selector">
          <a href="../en/hash-identifier.html" class="lang-btn ">EN</a><a href="../es/hash-identifier.html" class="lang-btn ">ES</a><a href="../fr/hash-identifier.html" class="lang-btn ">FR</a><a href="../de/hash-identifier.html" class="lang-btn ">DE</a><a href="../ar/hash-identifier.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Enter Hash</label>
        <textarea id="hashInput" placeholder="Paste your hash here..." style="min-height: 80px; font-family: monospace;"></textarea>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="identifyHash()">Identify</button>
        <button class="btn btn-secondary" onclick="clearInput()">Clear</button>
      </div>
      <div id="resultSection" style="margin-top: 20px; display: none;">
        <h3>Possible Hash Types:</h3>
        <div id="hashResults" class="result-list"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function identifyHash() {
      const hash = document.getElementById('hashInput').value.trim().toLowerCase();
      if (!hash) {
        alert('Please enter a hash');
        return;
      }
      
      const results = [];
      const len = hash.length;
      
      // Check for common hash patterns
      if (/^[a-f0-9]{32}$/i.test(hash)) {
        results.push({ name: 'MD5', confidence: 'High' });
        results.push({ name: 'MD4', confidence: 'Medium' });
        results.push({ name: 'MD2', confidence: 'Low' });
        results.push({ name: 'NTLM', confidence: 'Medium' });
      }
      
      if (/^[a-f0-9]{40}$/i.test(hash)) {
        results.push({ name: 'SHA-1', confidence: 'High' });
        results.push({ name: 'RIPEMD-160', confidence: 'Medium' });
      }
      
      if (/^[a-f0-9]{64}$/i.test(hash)) {
        results.push({ name: 'SHA-256', confidence: 'High' });
        results.push({ name: 'SHA3-256', confidence: 'Medium' });
      }
      
      if (/^[a-f0-9]{56}$/i.test(hash)) {
        results.push({ name: 'SHA-224', confidence: 'High' });
      }
      
      if (/^[a-f0-9]{128}$/i.test(hash)) {
        results.push({ name: 'SHA-512', confidence: 'High' });
        results.push({ name: 'SHA3-512', confidence: 'Medium' });
      }
      
      if (/^[a-f0-9]{96}$/i.test(hash)) {
        results.push({ name: 'SHA-384', confidence: 'High' });
      }
      
      // MySQL hashes
      if (/^\*[a-f0-9]{40}$/i.test(hash)) {
        results.push({ name: 'MySQL5', confidence: 'High' });
      }
      
      // bcrypt
      if (/^$2[ayb]$\d{2}$[.\/a-zA-Z0-9]{53}$/.test(hash)) {
        results.push({ name: 'bcrypt', confidence: 'High' });
      }
      
      // SHA256crypt
      if (/^$5$[.\/a-zA-Z0-9]{1,16}$[.\/a-zA-Z0-9]{43}$/.test(hash)) {
        results.push({ name: 'SHA256crypt', confidence: 'High' });
      }
      
      // SHA512crypt
      if (/^$6$[.\/a-zA-Z0-9]{1,16}$[.\/a-zA-Z0-9]{86}$/.test(hash)) {
        results.push({ name: 'SHA512crypt', confidence: 'High' });
      }
      
      // MD5crypt
      if (/^$1$[.\/a-zA-Z0-9]{1,8}$[.\/a-zA-Z0-9]{22}$/.test(hash)) {
        results.push({ name: 'MD5crypt', confidence: 'High' });
      }
      
      // Base64 check
      if (/^[A-Za-z0-9+/=]+$/.test(hash) && len % 4 === 0 && len > 20) {
        results.push({ name: 'Base64 (possibly encoded)', confidence: 'Low' });
      }
      
      if (results.length === 0) {
        results.push({ name: 'Unknown/Custom Hash', confidence: 'Unknown' });
        results.push({ name: 'Possibly encoded data', confidence: 'Unknown' });
      }
      
      displayResults(results);
    }
    
    function displayResults(results) {
      const container = document.getElementById('hashResults');
      container.innerHTML = '';
      
      results.forEach(result => {
        const div = document.createElement('div');
        div.className = 'result-item';
        div.style.cssText = 'padding: 12px; background: var(--bg-secondary); margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between;';
        div.innerHTML = '<strong>' + result.name + '</strong><span style="color: var(--primary);">' + result.confidence + '</span>';
        container.appendChild(div);
      });
      
      document.getElementById('resultSection').style.display = 'block';
    }
    
    function clearInput() {
      document.getElementById('hashInput').value = '';
      document.getElementById('resultSection').style.display = 'none';
    }
  </script>
</body>
</html>
