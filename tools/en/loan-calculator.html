<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loan Calculator - 205 Tools</title>
  <meta name="description" content="Calculate loan payments, interest, and amortization schedule.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .result-summary { background: var(--bg-secondary); padding: 25px; border-radius: 16px; margin: 20px 0; }
    .result-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; text-align: center; }
    .result-item .amount { font-size: 28px; font-weight: 700; color: var(--primary); }
    .result-item .label { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
    .schedule-table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    .schedule-table th, .schedule-table td { padding: 10px; text-align: left; border-bottom: 1px solid var(--border); }
    .schedule-table th { color: var(--text-secondary); font-size: 12px; text-transform: uppercase; }
    .schedule-container { max-height: 300px; overflow-y: auto; margin-top: 20px; }
    @media (max-width: 600px) { .result-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>💰 Loan Calculator</h1>
      <p>Calculate loan payments and interest</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Loan Details</h2>
        <div class="lang-selector">
          <a href="./loan-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/loan-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/loan-calculator.html" class="lang-btn">FR</a>
          <a href="../de/loan-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/loan-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Loan Amount ($)</label>
          <input type="number" id="amount" value="10000" min="1">
        </div>
        
        <div class="form-group">
          <label>Interest Rate (%)</label>
          <input type="number" id="rate" value="5" step="0.1" min="0">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Loan Term (years)</label>
          <input type="number" id="years" value="5" min="1" max="50">
        </div>
        
        <div class="form-group">
          <label>Payment Frequency</label>
          <select id="frequency">
            <option value="12">Monthly</option>
            <option value="26">Bi-weekly</option>
            <option value="52">Weekly</option>
          </select>
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculate()">Calculate</button>
      </div>
      
      <div class="result-summary">
        <div class="result-grid">
          <div class="result-item">
            <div class="amount" id="payment">$0</div>
            <div class="label">Payment</div>
          </div>
          
          <div class="result-item">
            <div class="amount" id="totalPayment">$0</div>
            <div class="label">Total Payment</div>
          </div>
          
          <div class="result-item">
            <div class="amount" id="totalInterest">$0</div>
            <div class="label">Total Interest</div>
          </div>
        </div>
      </div>
      
      <div id="scheduleSection" style="display: none;">
        <label>Amortization Schedule (First 12 months)</label>
        <div class="schedule-container">
          <table class="schedule-table">
            <thead>
              <tr>
                <th>#</th>
                <th>Payment</th>
                <th>Principal</th>
                <th>Interest</th>
                <th>Balance</th>
              </tr>
            </thead>
            <tbody id="scheduleBody"></tbody>
          </table>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function calculate() {
      const principal = parseFloat(document.getElementById('amount').value) || 0;
      const annualRate = parseFloat(document.getElementById('rate').value) || 0;
      const years = parseFloat(document.getElementById('years').value) || 0;
      const paymentsPerYear = parseInt(document.getElementById('frequency').value) || 12;
      
      const totalPayments = years * paymentsPerYear;
      const ratePerPeriod = annualRate / 100 / paymentsPerYear;
      
      let payment;
      if (ratePerPeriod === 0) {
        payment = principal / totalPayments;
      } else {
        payment = principal * (ratePerPeriod * Math.pow(1 + ratePerPeriod, totalPayments)) / (Math.pow(1 + ratePerPeriod, totalPayments) - 1);
      }
      
      const totalPayment = payment * totalPayments;
      const totalInterest = totalPayment - principal;
      
      document.getElementById('payment').textContent = '$' + payment.toFixed(2);
      document.getElementById('totalPayment').textContent = '$' + totalPayment.toFixed(0);
      document.getElementById('totalInterest').textContent = '$' + totalInterest.toFixed(0);
      
      generateSchedule(principal, ratePerPeriod, payment, Math.min(totalPayments, 12));
    }
    
    function generateSchedule(principal, ratePerPeriod, payment, periods) {
      let balance = principal;
      let html = '';
      
      for (let i = 1; i <= periods; i++) {
        const interest = balance * ratePerPeriod;
        const principalPaid = payment - interest;
        balance -= principalPaid;
        
        html += `<tr>
          <td>${i}</td>
          <td>$${payment.toFixed(2)}</td>
          <td>$${principalPaid.toFixed(2)}</td>
          <td>$${interest.toFixed(2)}</td>
          <td>$${Math.max(0, balance).toFixed(2)}</td>
        </tr>`;
      }
      
      document.getElementById('scheduleBody').innerHTML = html;
      document.getElementById('scheduleSection').style.display = 'block';
    }
    
    // Calculate on load
    calculate();
  </script>
</body>
</html>
