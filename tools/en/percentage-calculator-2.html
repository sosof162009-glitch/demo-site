<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Percentage Calculator - 205 Tools</title>
  <meta name="description" content="Calculate percentages, percentage change, and percentage of a number.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .calc-section { background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-bottom: 20px; }
    .calc-title { font-weight: 600; margin-bottom: 15px; color: var(--primary); }
    .inline-input { display: inline-block; width: 100px; margin: 0 5px; }
    .inline-form { line-height: 2.5; }
    .result-inline { display: inline-block; font-weight: 700; color: var(--primary); margin-left: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📊 Percentage Calculator</h1>
      <p>Calculate percentages easily</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Calculator</h2>
        <div class="lang-selector">
          <a href="./percentage-calculator-2.html" class="lang-btn active">EN</a>
          <a href="../es/percentage-calculator-2.html" class="lang-btn">ES</a>
          <a href="../fr/percentage-calculator-2.html" class="lang-btn">FR</a>
          <a href="../de/percentage-calculator-2.html" class="lang-btn">DE</a>
          <a href="../ar/percentage-calculator-2.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="calc-section">
        <div class="calc-title">What is % of a number?</div>
        <div class="inline-form">
          What is <input type="number" class="inline-input" id="p1" placeholder="%">%
          of <input type="number" class="inline-input" id="n1" placeholder="number">?
          <span class="result-inline" id="r1"></span>
        </div>
        
        <button class="btn btn-primary" onclick="calc1()" style="margin-top: 10px;">Calculate</button>
      </div>
      
      <div class="calc-section">
        <div class="calc-title">% of what number?</div>
        <div class="inline-form">
          <input type="number" class="inline-input" id="p2" placeholder="number">
          is what percent of <input type="number" class="inline-input" id="n2" placeholder="number">?
          <span class="result-inline" id="r2"></span>
        </div>
        
        <button class="btn btn-primary" onclick="calc2()" style="margin-top: 10px;">Calculate</button>
      </div>
      
      <div class="calc-section">
        <div class="calc-title">Percentage Change</div>
        <div class="inline-form">
          From <input type="number" class="inline-input" id="fromVal" placeholder="old">
          to <input type="number" class="inline-input" id="toVal" placeholder="new">
          is what % change?
          <span class="result-inline" id="r3"></span>
        </div>
        
        <button class="btn btn-primary" onclick="calc3()" style="margin-top: 10px;">Calculate</button>
      </div>
      
      <div class="calc-section">
        <div class="calc-title">Percentage Difference</div>
        <div class="inline-form">
          Difference between <input type="number" class="inline-input" id="d1" placeholder="v1">
          and <input type="number" class="inline-input" id="d2" placeholder="v2">
          <span class="result-inline" id="r4"></span>
        </div>
        
        <button class="btn btn-primary" onclick="calc4()" style="margin-top: 10px;">Calculate</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function calc1() {
      const p = parseFloat(document.getElementById('p1').value) || 0;
      const n = parseFloat(document.getElementById('n1').value) || 0;
      document.getElementById('r1').textContent = '= ' + ((p / 100) * n).toFixed(2);
    }
    
    function calc2() {
      const num = parseFloat(document.getElementById('p2').value) || 0;
      const of = parseFloat(document.getElementById('n2').value) || 0;
      document.getElementById('r2').textContent = of ? '= ' + ((num / of) * 100).toFixed(2) + '%' : '';
    }
    
    function calc3() {
      const from = parseFloat(document.getElementById('fromVal').value) || 0;
      const to = parseFloat(document.getElementById('toVal').value) || 0;
      if (from === 0) { document.getElementById('r3').textContent = ''; return; }
      const change = ((to - from) / from) * 100;
      const prefix = change > 0 ? '+ ' : '';
      document.getElementById('r3').textContent = prefix + change.toFixed(2) + '%';
    }
    
    function calc4() {
      const v1 = parseFloat(document.getElementById('d1').value) || 0;
      const v2 = parseFloat(document.getElementById('d2').value) || 0;
      const avg = (Math.abs(v1) + Math.abs(v2)) / 2;
      const diff = Math.abs(v1 - v2);
      document.getElementById('r4').textContent = avg ? '= ' + ((diff / avg) * 100).toFixed(2) + '%' : '';
    }
  </script>
</body>
</html>
