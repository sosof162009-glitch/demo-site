<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Percentage Calculator - 205 Tools</title>
  <meta name="description" content="Calculate percentages, percentage change, and percentage of numbers.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📊 Percentage Calculator</h1>
      <p>Calculate percentages, percentage change, and more.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Calculators</h2>
        <div class="lang-selector">
          <a href="../en/percentage-calculator-2.html" class="lang-btn active">EN</a>
          <a href="../es/percentage-calculator-2.html" class="lang-btn">ES</a>
          <a href="../fr/percentage-calculator-2.html" class="lang-btn">FR</a>
          <a href="../de/percentage-calculator-2.html" class="lang-btn">DE</a>
          <a href="../ar/percentage-calculator-2.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <!-- Calculator 1: What is X% of Y? -->
      <div class="calc-section">
        <h3>🔢 What is % of a number?</h3>
        <div class="calc-row">
          <span>What is</span>
          <input type="number" id="p1-percent" class="tool-input calc-input" placeholder="20">
          <span>% of</span>
          <input type="number" id="p1-number" class="tool-input calc-input" placeholder="100">
          <span>?</span>
        </div>
        <button class="btn btn-primary" onclick="calcPercentageOf()">Calculate</button>
        <div class="result-box" id="p1-result" style="display: none;"></div>
      </div>
      
      <!-- Calculator 2: X is what % of Y? -->
      <div class="calc-section">
        <h3>❓ X is what percentage of Y?</h3>
        <div class="calc-row">
          <input type="number" id="p2-part" class="tool-input calc-input" placeholder="25">
          <span>is what % of</span>
          <input type="number" id="p2-whole" class="tool-input calc-input" placeholder="100">
          <span>?</span>
        </div>
        <button class="btn btn-primary" onclick="calcWhatPercentage()">Calculate</button>
        <div class="result-box" id="p2-result" style="display: none;"></div>
      </div>
      
      <!-- Calculator 3: Percentage Change -->
      <div class="calc-section">
        <h3>📈 Percentage Change</h3>
        <div class="calc-row">
          <span>From</span>
          <input type="number" id="p3-original" class="tool-input calc-input" placeholder="100">
          <span>to</span>
          <input type="number" id="p3-new" class="tool-input calc-input" placeholder="120">
        </div>
        <button class="btn btn-primary" onclick="calcPercentageChange()">Calculate Change</button>
        <div class="result-box" id="p3-result" style="display: none;"></div>
      </div>
      
      <!-- Calculator 4: Add/Subtract Percentage -->
      <div class="calc-section">
        <h3>➕ Add or Subtract Percentage</h3>
        <div class="calc-row">
          <input type="number" id="p4-number" class="tool-input calc-input" placeholder="100">
          <span>±</span>
          <input type="number" id="p4-percent" class="tool-input calc-input" placeholder="10">
          <span>%</span>
        </div>
        <div class="btn-group">
          <button class="btn btn-primary" onclick="calcAddPercentage()">Add</button>
          <button class="btn btn-secondary" onclick="calcSubtractPercentage()">Subtract</button>
        </div>
        <div class="result-box" id="p4-result" style="display: none;"></div>
      </div>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
  
  <style>
    .calc-section { background: var(--bg-card); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px; }
    .calc-section h3 { margin-bottom: 20px; color: var(--primary); font-size: 1.1rem; }
    .calc-row { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
    .calc-row span { color: var(--text-secondary); font-size: 14px; }
    .calc-input { width: 100px; text-align: center; }
    .btn-group { display: flex; gap: 12px; }
    .result-box { background: var(--bg-input); padding: 20px; border-radius: var(--radius-sm); margin-top: 16px; border: 1px solid var(--border); text-align: center; }
    .result-value { font-size: 28px; font-weight: 700; color: var(--primary); }
    .result-formula { font-size: 14px; color: var(--text-secondary); margin-top: 8px; }
    @media (max-width: 768px) { .calc-row { justify-content: center; } }
  </style>
  
  <script>
    function calcPercentageOf() {
      const percent = parseFloat(document.getElementById('p1-percent').value);
      const number = parseFloat(document.getElementById('p1-number').value);
      
      if (isNaN(percent) || isNaN(number)) {
        alert('Please enter valid numbers');
        return;
      }
      
      const result = (percent / 100) * number;
      document.getElementById('p1-result').innerHTML = `
        <div class="result-value">${result}</div>
        <div class="result-formula">${percent}% × ${number} = ${result}</div>
      `;
      document.getElementById('p1-result').style.display = 'block';
    }
    
    function calcWhatPercentage() {
      const part = parseFloat(document.getElementById('p2-part').value);
      const whole = parseFloat(document.getElementById('p2-whole').value);
      
      if (isNaN(part) || isNaN(whole) || whole === 0) {
        alert('Please enter valid numbers');
        return;
      }
      
      const result = (part / whole) * 100;
      document.getElementById('p2-result').innerHTML = `
        <div class="result-value">${result.toFixed(2)}%</div>
        <div class="result-formula">${part} ÷ ${whole} × 100 = ${result.toFixed(2)}%</div>
      `;
      document.getElementById('p2-result').style.display = 'block';
    }
    
    function calcPercentageChange() {
      const original = parseFloat(document.getElementById('p3-original').value);
      const newVal = parseFloat(document.getElementById('p3-new').value);
      
      if (isNaN(original) || isNaN(newVal) || original === 0) {
        alert('Please enter valid numbers');
        return;
      }
      
      const change = ((newVal - original) / original) * 100;
      const direction = change >= 0 ? 'increase' : 'decrease';
      const arrow = change >= 0 ? '↑' : '↓';
      const color = change >= 0 ? 'var(--success)' : 'var(--error)';
      
      document.getElementById('p3-result').innerHTML = `
        <div class="result-value" style="color: ${color}">${arrow} ${Math.abs(change).toFixed(2)}%</div>
        <div class="result-formula">(${newVal} - ${original}) ÷ ${original} × 100 = ${change.toFixed(2)}% ${direction}</div>
      `;
      document.getElementById('p3-result').style.display = 'block';
    }
    
    function calcAddPercentage() {
      const number = parseFloat(document.getElementById('p4-number').value);
      const percent = parseFloat(document.getElementById('p4-percent').value);
      
      if (isNaN(number) || isNaN(percent)) {
        alert('Please enter valid numbers');
        return;
      }
      
      const result = number + ((percent / 100) * number);
      document.getElementById('p4-result').innerHTML = `
        <div class="result-value">${result.toFixed(2)}</div>
        <div class="result-formula">${number} + ${percent}% = ${result.toFixed(2)}</div>
      `;
      document.getElementById('p4-result').style.display = 'block';
    }
    
    function calcSubtractPercentage() {
      const number = parseFloat(document.getElementById('p4-number').value);
      const percent = parseFloat(document.getElementById('p4-percent').value);
      
      if (isNaN(number) || isNaN(percent)) {
        alert('Please enter valid numbers');
        return;
      }
      
      const result = number - ((percent / 100) * number);
      document.getElementById('p4-result').innerHTML = `
        <div class="result-value">${result.toFixed(2)}</div>
        <div class="result-formula">${number} - ${percent}% = ${result.toFixed(2)}</div>
      `;
      document.getElementById('p4-result').style.display = 'block';
    }
  </script>
</body>
</html>
