<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Tax Calculator - 205 Tools</title>
  <meta name="description" content="Calculate sales tax and total price.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .result-card { background: var(--bg-secondary); padding: 30px; border-radius: 16px; text-align: center; margin-top: 20px; }
    .result-amount { font-size: 42px; font-weight: 700; color: var(--primary); }
    .result-breakdown { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
    .breakdown-box { background: var(--bg-card); padding: 15px; border-radius: 12px; }
    .breakdown-box .amount { font-size: 20px; font-weight: 600; }
    .breakdown-box .label { font-size: 12px; color: var(--text-secondary); }
    .preset-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    .preset-buttons button { flex: 1; }
    @media (max-width: 600px) { .result-breakdown { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>💰 Sales Tax Calculator</h1>
      <p>Calculate sales tax and total price</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Calculator</h2>
        <div class="lang-selector">
          <a href="./sales-tax-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/sales-tax-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/sales-tax-calculator.html" class="lang-btn">FR</a>
          <a href="../de/sales-tax-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/sales-tax-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="preset-buttons">
        <button class="btn btn-sm btn-secondary" onclick="setRate(5)">5%</button>
        <button class="btn btn-sm btn-secondary" onclick="setRate(8)">8%</button>
        <button class="btn btn-sm btn-secondary" onclick="setRate(10)">10%</button>
        <button class="btn btn-sm btn-secondary" onclick="setRate(15)">15%</button>
        <button class="btn btn-sm btn-secondary" onclick="setRate(20)">20%</button>
      </div>
      
      <div class="form-group">
        <label>Price Before Tax ($)</label>
        <input type="number" id="price" placeholder="0.00" step="0.01" oninput="calculate()">
      </div>
      
      <div class="form-group">
        <label>Tax Rate (%)</label>
        <input type="number" id="taxRate" value="8" step="0.01" min="0" oninput="calculate()">
      </div>
      
      <div class="result-card">
        <div class="result-amount" id="totalPrice">$0.00</div>
        <div style="color: var(--text-secondary); margin-top: 5px;">Total Price</div>
        
        <div class="result-breakdown">
          <div class="breakdown-box">
            <div class="amount" id="subtotal">$0.00</div>
            <div class="label">Subtotal</div>
          </div>
          
          <div class="breakdown-box">
            <div class="amount" id="taxAmount">$0.00</div>
            <div class="label">Tax</div>
          </div>
          
          <div class="breakdown-box">
            <div class="amount" id="taxRateDisplay">8%</div>
            <div class="label">Rate</div>
          </div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function setRate(rate) {
      document.getElementById('taxRate').value = rate;
      calculate();
    }
    
    function calculate() {
      const price = parseFloat(document.getElementById('price').value) || 0;
      const rate = parseFloat(document.getElementById('taxRate').value) || 0;
      
      const tax = price * (rate / 100);
      const total = price + tax;
      
      document.getElementById('subtotal').textContent = '$' + price.toFixed(2);
      document.getElementById('taxAmount').textContent = '$' + tax.toFixed(2);
      document.getElementById('totalPrice').textContent = '$' + total.toFixed(2);
      document.getElementById('taxRateDisplay').textContent = rate.toFixed(2) + '%';
    }
  </script>
</body>
</html>
