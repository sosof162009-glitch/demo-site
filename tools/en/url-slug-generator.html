<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Slug Generator | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .slug-output { background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin-top: 20px; font-family: 'JetBrains Mono', monospace; font-size: 16px; word-break: break-all; border: 1px solid var(--border-color); }
    .options { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin: 15px 0; }
    .option-box { background: var(--bg-card); padding: 15px; border-radius: 8px; border: 1px solid var(--border-color); }
    .option-box label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .option-box input[type="radio"], .option-box input[type="checkbox"] { width: 18px; height: 18px; accent-color: var(--primary); }
  </style>
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="url-slug-generator.html" selected>English</option>
      <option value="../ar/url-slug-generator.html">العربية</option>
      <option value="../fr/url-slug-generator.html">Français</option>
      <option value="../es/url-slug-generator.html">Español</option>
      <option value="../de/url-slug-generator.html">Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>🔗 URL Slug Generator</h1>
      <p>Convert text to clean, URL-friendly slugs</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="text-input">Enter your text:</label>
        <textarea id="text-input" class="tool-textarea" placeholder="Type or paste your text here...">Hello World Example Title</textarea>
      </div>

      <div class="options">
        <div class="option-box">
          <label><input type="radio" name="separator" value="-" checked onchange="generateSlug()"> Hyphen (-)</label>
        </div>
        <div class="option-box">
          <label><input type="radio" name="separator" value="_" onchange="generateSlug()"> Underscore (_)</label>
        </div>
        <div class="option-box">
          <label><input type="checkbox" id="lowercase" checked onchange="generateSlug()"> Lowercase</label>
        </div>
        <div class="option-box">
          <label><input type="checkbox" id="removeStopWords" onchange="generateSlug()"> Remove stop words</label>
        </div>
      </div>

      <div class="input-group">
        <label>Generated Slug:</label>
        <div class="slug-output" id="slug-output">hello-world-example-title</div>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="copySlug()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
            <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
          </svg>
          Copy Slug
        </button>
        <button class="btn btn-secondary" onclick="clearText()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/>
          </svg>
          Clear
        </button>
      </div>
    </div>
  </div>

  <script>
    const stopWords = ['a', 'an', 'the', 'and', 'or', 'but', 'in', 'on', 'at', 'to', 'for', 'of', 'with', 'by', 'from', 'as', 'is', 'was', 'are', 'were', 'be', 'been', 'being', 'have', 'has', 'had', 'do', 'does', 'did', 'will', 'would', 'could', 'should'];

    function generateSlug() {
      let text = document.getElementById('text-input').value;
      const separator = document.querySelector('input[name="separator"]:checked').value;
      const lowercase = document.getElementById('lowercase').checked;
      const removeStop = document.getElementById('removeStopWords').checked;

      if (!text) {
        document.getElementById('slug-output').textContent = 'your-slug-here';
        return;
      }

      if (lowercase) text = text.toLowerCase();

      // Transliterate common non-ASCII characters
      text = text.normalize('NFD').replace(/[\u0300-\u036f]/g, '');

      if (removeStop) {
        const words = text.split(/\s+/);
        text = words.filter(w => !stopWords.includes(w.toLowerCase())).join(' ');
      }

      // Replace non-alphanumeric with separator
      text = text.replace(/[^a-zA-Z0-9\s]+/g, ' ').trim();
      text = text.replace(/\s+/g, separator);

      document.getElementById('slug-output').textContent = text || 'your-slug-here';
    }

    function copySlug() {
      const slug = document.getElementById('slug-output').textContent;
      navigator.clipboard.writeText(slug);
      const btn = document.querySelector('.btn-primary');
      const originalText = btn.innerHTML;
      btn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 6L9 17l-5-5"/></svg> Copied!';
      setTimeout(() => btn.innerHTML = originalText, 2000);
    }

    function clearText() {
      document.getElementById('text-input').value = '';
      generateSlug();
    }

    document.getElementById('text-input').addEventListener('input', generateSlug);
    generateSlug();
  </script>
</body>
</html>
