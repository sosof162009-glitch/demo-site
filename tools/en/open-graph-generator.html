<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Open Graph Generator - 205 Tools</title>
  <meta name="description" content="Generate Open Graph meta tags for social sharing.">
  <link rel="stylesheet" href="../../assets/css/tools.css">
  <script src="../../assets/js/utils.js" defer></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔗 Open Graph Generator</h1>
      <p>Generate Open Graph meta tags for social sharing.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generate</h2>
        <div class="lang-selector">
          <a href="../en/open-graph-generator.html" class="lang-btn active">EN</a><a href="../es/open-graph-generator.html" class="lang-btn ">ES</a><a href="../fr/open-graph-generator.html" class="lang-btn ">FR</a><a href="../de/open-graph-generator.html" class="lang-btn ">DE</a><a href="../ar/open-graph-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>Site Title</label>
        <input type="text" id="ogTitle" placeholder="Website Title">
      </div>
      <div class="form-group">
        <label>Description</label>
        <textarea id="ogDesc" placeholder="Description for social sharing..."></textarea>
      </div>
      <div class="form-group">
        <label>Image URL</label>
        <input type="url" id="ogImage" placeholder="https://example.com/image.jpg">
      </div>
      <div class="form-group">
        <label>Site URL</label>
        <input type="url" id="ogUrl" placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label>Type</label>
        <select id="ogType">
          <option value="website">Website</option>
          <option value="article">Article</option>
          <option value="product">Product</option>
          <option value="profile">Profile</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateOG()">Generate</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="Copied!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Copy</button>
      </div>
      
      <script>
        function generateOG() {
          const title = document.getElementById('ogTitle').value;
          const desc = document.getElementById('ogDesc').value;
          const image = document.getElementById('ogImage').value;
          const url = document.getElementById('ogUrl').value;
          const type = document.getElementById('ogType').value;
          
          let meta = '<!-- Open Graph / Facebook -->\n';
          if (title) meta += '<meta property="og:title" content="' + title + '">\n';
          if (desc) meta += '<meta property="og:description" content="' + desc + '">\n';
          if (image) meta += '<meta property="og:image" content="' + image + '">\n';
          if (url) meta += '<meta property="og:url" content="' + url + '">\n';
          meta += '<meta property="og:type" content="' + type + '">';
          
          document.getElementById('codeContent').textContent = meta;
          document.getElementById('output').style.display = 'block';
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
</body>
</html>
