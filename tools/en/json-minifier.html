<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON Minifier - 205 Tools</title>
  <meta name="description" content="Minify JSON by removing whitespace.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .stats-bar { display: flex; gap: 20px; padding: 15px; background: var(--bg-secondary); border-radius: 8px; margin: 15px 0; flex-wrap: wrap; }
    .stats-bar span { color: var(--text-secondary); }
    .stats-bar strong { color: var(--primary); }
    .savings { color: #22c55e; }
    .error { color: #ef4444; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📦 JSON Minifier</h1>
      <p>Compress JSON by removing whitespace</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Input</h2>
        <div class="lang-selector">
          <a href="./json-minifier.html" class="lang-btn active">EN</a>
          <a href="../es/json-minifier.html" class="lang-btn">ES</a>
          <a href="../fr/json-minifier.html" class="lang-btn">FR</a>
          <a href="../de/json-minifier.html" class="lang-btn">DE</a>
          <a href="../ar/json-minifier.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>JSON Input</label>
        <textarea id="input" rows="10" placeholder='{"key": "value"}'>{
  "name": "John Doe",
  "age": 30,
  "email": "john@example.com",
  "address": {
    "street": "123 Main St",
    "city": "New York"
  },
  "hobbies": ["reading", "gaming", "coding"]
}</textarea>
      </div>
      
      <div class="stats-bar">
        <span>Original: <strong id="originalSize">0</strong> bytes</span>
        <span>Minified: <strong id="minifiedSize">0</strong> bytes</span>
        <span>Savings: <strong id="savings" class="savings">0%</strong></span>
      </div>
      
      <div id="errorMsg" class="error"></div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="minify()">🗜️ Minify</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Minified JSON</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function minify() {
      const input = document.getElementById('input').value.trim();
      if (!input) return;
      
      const originalSize = new Blob([input]).size;
      
      try {
        const obj = JSON.parse(input);
        const minified = JSON.stringify(obj);
        const minifiedSize = new Blob([minified]).size;
        const savings = originalSize > 0 ? ((originalSize - minifiedSize) / originalSize * 100).toFixed(1) : 0;
        
        document.getElementById('output').value = minified;
        document.getElementById('originalSize').textContent = originalSize;
        document.getElementById('minifiedSize').textContent = minifiedSize;
        document.getElementById('savings').textContent = savings + '%';
        document.getElementById('errorMsg').textContent = '';
      } catch (e) {
        document.getElementById('errorMsg').textContent = 'Invalid JSON: ' + e.message;
        document.getElementById('output').value = '';
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('originalSize').textContent = '0';
      document.getElementById('minifiedSize').textContent = '0';
      document.getElementById('savings').textContent = '0%';
      document.getElementById('errorMsg').textContent = '';
    }
  </script>
</body>
</html>
