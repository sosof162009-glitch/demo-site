<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timezone Converter - 205 Tools</title>
  <meta name="description" content="Convert time between different timezones worldwide.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🌍 Timezone Converter</h1>
      <p>Convert time between different timezones worldwide.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Convert Timezone</h2>
        <div class="lang-selector">
          <a href="../en/timezone-converter.html" class="lang-btn active">EN</a>
          <a href="../es/timezone-converter.html" class="lang-btn">ES</a>
          <a href="../fr/timezone-converter.html" class="lang-btn">FR</a>
          <a href="../de/timezone-converter.html" class="lang-btn">DE</a>
          <a href="../ar/timezone-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="converter-grid">
        <div class="converter-box">
          <div class="form-group">
            <label for="fromTimezone">From Timezone</label>
            <select id="fromTimezone" class="tool-select">
              <option value="UTC">UTC (Universal)</option>
              <option value="America/New_York">New York (EST/EDT)</option>
              <option value="America/Chicago">Chicago (CST/CDT)</option>
              <option value="America/Denver">Denver (MST/MDT)</option>
              <option value="America/Los_Angeles">Los Angeles (PST/PDT)</option>
              <option value="America/London">London (GMT/BST)</option>
              <option value="Europe/Paris">Paris (CET/CEST)</option>
              <option value="Europe/Berlin">Berlin (CET/CEST)</option>
              <option value="Europe/Moscow">Moscow (MSK)</option>
              <option value="Asia/Dubai">Dubai (GST)</option>
              <option value="Asia/Kolkata">Mumbai/New Delhi (IST)</option>
              <option value="Asia/Bangkok">Bangkok (ICT)</option>
              <option value="Asia/Shanghai">Shanghai/Beijing (CST)</option>
              <option value="Asia/Tokyo">Tokyo (JST)</option>
              <option value="Asia/Seoul">Seoul (KST)</option>
              <option value="Australia/Sydney">Sydney (AEST/AEDT)</option>
              <option value="Pacific/Auckland">Auckland (NZST/NZDT)</option>
              <option value="Pacific/Honolulu">Honolulu (HST)</option>
            </select>
          </div>
          <div class="form-group">
            <label for="inputTime">Date & Time</label>
            <input type="datetime-local" id="inputTime" class="tool-input">
          </div>
        </div>
        
        <button class="swap-btn" onclick="swapTimezones()" title="Swap">⇄</button>
        
        <div class="converter-box">
          <div class="form-group">
            <label for="toTimezone">To Timezone</label>
            <select id="toTimezone" class="tool-select">
              <option value="UTC">UTC (Universal)</option>
              <option value="America/New_York">New York (EST/EDT)</option>
              <option value="America/Chicago">Chicago (CST/CDT)</option>
              <option value="America/Denver">Denver (MST/MDT)</option>
              <option value="America/Los_Angeles" selected>Los Angeles (PST/PDT)</option>
              <option value="America/London">London (GMT/BST)</option>
              <option value="Europe/Paris">Paris (CET/CEST)</option>
              <option value="Europe/Berlin">Berlin (CET/CEST)</option>
              <option value="Europe/Moscow">Moscow (MSK)</option>
              <option value="Asia/Dubai">Dubai (GST)</option>
              <option value="Asia/Kolkata">Mumbai/New Delhi (IST)</option>
              <option value="Asia/Bangkok">Bangkok (ICT)</option>
              <option value="Asia/Shanghai">Shanghai/Beijing (CST)</option>
              <option value="Asia/Tokyo">Tokyo (JST)</option>
              <option value="Asia/Seoul">Seoul (KST)</option>
              <option value="Australia/Sydney">Sydney (AEST/AEDT)</option>
              <option value="Pacific/Auckland">Auckland (NZST/NZDT)</option>
              <option value="Pacific/Honolulu">Honolulu (HST)</option>
            </select>
          </div>
          <div class="form-group">
            <label>Converted Time</label>
            <div class="result-value" id="resultTime">-</div>
          </div>
        </div>
      </div>
      
      <div class="result-box" id="resultBox" style="display:none;">
        <div class="result-value" id="finalResult">-</div>
        <div class="result-label" id="resultLabel"></div>
        <div class="result-label" id="timeDiff"></div>
      </div>
      
      <button class="btn btn-primary" onclick="convertTimezone()" style="margin-top: 20px; width: 100%;">Convert</button>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
  
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 20px; align-items: center; }
    .converter-box { background: var(--bg-card); padding: 20px; border-radius: var(--radius); border: 1px solid var(--border); }
    .swap-btn { background: var(--primary); color: white; border: none; border-radius: 50%; width: 44px; height: 44px; font-size: 20px; cursor: pointer; transition: var(--transition); }
    .swap-btn:hover { background: var(--primary-hover); transform: rotate(180deg); }
    .form-group { margin-bottom: 15px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 500; color: var(--text-secondary); }
    .tool-select, .tool-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--text-primary); font-size: 14px; }
    .result-value { background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px; color: var(--primary); font-size: 18px; font-weight: 600; min-height: 46px; display: flex; align-items: center; }
    .result-box { background: var(--bg-card); border: 1px solid var(--primary); border-radius: var(--radius); padding: 24px; margin-top: 20px; text-align: center; }
    @media (max-width: 768px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); margin: 10px auto; } }
  </style>
  
  <script>
    // Set default time to now
    const now = new Date();
    now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
    document.getElementById('inputTime').value = now.toISOString().slice(0, 16);
    
    function convertTimezone() {
      const fromTz = document.getElementById('fromTimezone').value;
      const toTz = document.getElementById('toTimezone').value;
      const inputTime = document.getElementById('inputTime').value;
      
      if (!inputTime) {
        alert('Please select a date and time');
        return;
      }
      
      const date = new Date(inputTime);
      
      // Convert to target timezone
      const options = { 
        timeZone: toTz, 
        year: 'numeric', 
        month: 'long', 
        day: 'numeric', 
        hour: '2-digit', 
        minute: '2-digit',
        second: '2-digit',
        timeZoneName: 'short'
      };
      
      const convertedTime = date.toLocaleString('en-US', options);
      
      // Calculate time difference
      const fromDate = new Date(date.toLocaleString('en-US', { timeZone: fromTz }));
      const toDate = new Date(date.toLocaleString('en-US', { timeZone: toTz }));
      const diffHours = (toDate - fromDate) / (1000 * 60 * 60);
      const diffText = diffHours === 0 ? 'Same time' : 
                       diffHours > 0 ? `+${diffHours} hours` : `${diffHours} hours`;
      
      document.getElementById('resultTime').textContent = convertedTime;
      document.getElementById('finalResult').textContent = convertedTime;
      document.getElementById('resultLabel').textContent = `${fromTz} → ${toTz}`;
      document.getElementById('timeDiff').textContent = `Time difference: ${diffText}`;
      document.getElementById('resultBox').style.display = 'block';
    }
    
    function swapTimezones() {
      const fromEl = document.getElementById('fromTimezone');
      const toEl = document.getElementById('toTimezone');
      const temp = fromEl.value;
      fromEl.value = toEl.value;
      toEl.value = temp;
      convertTimezone();
    }
  </script>
</body>
</html>
