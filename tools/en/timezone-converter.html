<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Timezone Converter - 205 Tools</title>
  <meta name="description" content="Convert time between different timezones.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .time-display { background: var(--bg-secondary); padding: 25px; border-radius: 16px; text-align: center; margin: 20px 0; }
    .time-big { font-size: 42px; font-weight: 700; color: var(--primary); }
    .time-date { font-size: 16px; color: var(--text-secondary); margin-top: 5px; }
    .timezone-info { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
    .info-box { background: var(--bg-card); padding: 20px; border-radius: 12px; }
    .info-box .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; }
    .info-box .value { font-size: 18px; font-weight: 600; margin-top: 5px; }
    @media (max-width: 600px) { .timezone-info { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🌍 Timezone Converter</h1>
      <p>Convert time between timezones</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Convert</h2>
        <div class="lang-selector">
          <a href="./timezone-converter.html" class="lang-btn active">EN</a>
          <a href="../es/timezone-converter.html" class="lang-btn">ES</a>
          <a href="../fr/timezone-converter.html" class="lang-btn">FR</a>
          <a href="../de/timezone-converter.html" class="lang-btn">DE</a>
          <a href="../ar/timezone-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>From Timezone</label>
          <select id="fromZone" onchange="convert()">
            <option value="UTC">UTC</option>
            <option value="America/New_York">New York (ET)</option>
            <option value="America/Los_Angeles">Los Angeles (PT)</option>
            <option value="America/Chicago">Chicago (CT)</option>
            <option value="Europe/London">London (GMT)</option>
            <option value="Europe/Paris">Paris (CET)</option>
            <option value="Europe/Berlin">Berlin (CET)</option>
            <option value="Asia/Tokyo">Tokyo (JST)</option>
            <option value="Asia/Shanghai">Shanghai (CST)</option>
            <option value="Asia/Dubai">Dubai (GST)</option>
            <option value="Asia/Singapore">Singapore (SGT)</option>
            <option value="Australia/Sydney">Sydney (AEST)</option>
          </select>
        </div>
        
        <div class="form-group">
          <label>To Timezone</label>
          <select id="toZone" onchange="convert()">
            <option value="UTC">UTC</option>
            <option value="America/New_York">New York (ET)</option>
            <option value="America/Los_Angeles">Los Angeles (PT)</option>
            <option value="America/Chicago">Chicago (CT)</option>
            <option value="Europe/London">London (GMT)</option>
            <option value="Europe/Paris">Paris (CET)</option>
            <option value="Europe/Berlin">Berlin (CET)</option>
            <option value="Asia/Tokyo">Tokyo (JST)</option>
            <option value="Asia/Shanghai">Shanghai (CST)</option>
            <option value="Asia/Dubai">Dubai (GST)</option>
            <option value="Asia/Singapore">Singapore (SGT)</option>
            <option value="Australia/Sydney">Sydney (AEST)</option>
          </select>
        </div>
      </div>
      
      <div class="form-group">
        <label>Date & Time</label>
        <input type="datetime-local" id="dateTime" onchange="convert()">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="setNow()">Now</button>
        <button class="btn btn-secondary" onclick="swapZones()">Swap Timezones</button>
      </div>
      
      <div class="time-display">
        <div class="time-big" id="resultTime">--:--</div>
        <div class="time-date" id="resultDate">Select date and time</div>
        
        <div class="timezone-info">
          <div class="info-box">
            <div class="label">From</div>
            <div class="value" id="fromDisplay">--:--</div>
          </div>
          
          <div class="info-box">
            <div class="label">Time Difference</div>
            <div class="value" id="diffDisplay">--</div>
          </div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function setNow() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      document.getElementById('dateTime').value = now.toISOString().slice(0, 16);
      convert();
    }
    
    function convert() {
      const fromZone = document.getElementById('fromZone').value;
      const toZone = document.getElementById('toZone').value;
      const dateTimeVal = document.getElementById('dateTime').value;
      
      if (!dateTimeVal) return;
      
      const date = new Date(dateTimeVal);
      
      // Format options
      const timeOptions = { hour: '2-digit', minute: '2-digit', timeZone: toZone };
      const dateOptions = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', timeZone: toZone };
      
      const resultTime = date.toLocaleTimeString('en-US', timeOptions);
      const resultDate = date.toLocaleDateString('en-US', dateOptions);
      
      document.getElementById('resultTime').textContent = resultTime;
      document.getElementById('resultDate').textContent = resultDate;
      
      // Display original time
      const fromOptions = { hour: '2-digit', minute: '2-digit', timeZone: fromZone };
      document.getElementById('fromDisplay').textContent = date.toLocaleTimeString('en-US', fromOptions);
      
      // Calculate offset difference (simplified)
      const offsetDiff = getOffsetDiff(fromZone, toZone, date);
      document.getElementById('diffDisplay').textContent = offsetDiff > 0 ? `+${offsetDiff}h` : `${offsetDiff}h`;
    }
    
    function getOffsetDiff(from, to, date) {
      // Simplified offset calculation
      const offsets = {
        'UTC': 0,
        'America/New_York': -5,
        'America/Los_Angeles': -8,
        'America/Chicago': -6,
        'Europe/London': 0,
        'Europe/Paris': 1,
        'Europe/Berlin': 1,
        'Asia/Tokyo': 9,
        'Asia/Shanghai': 8,
        'Asia/Dubai': 4,
        'Asia/Singapore': 8,
        'Australia/Sydney': 11
      };
      return (offsets[to] || 0) - (offsets[from] || 0);
    }
    
    function swapZones() {
      const from = document.getElementById('fromZone').value;
      const to = document.getElementById('toZone').value;
      document.getElementById('fromZone').value = to;
      document.getElementById('toZone').value = from;
      convert();
    }
    
    // Set default
    setNow();
  </script>
</body>
</html>
