<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter (Volume) - 205 Tools</title>
  <meta name="description" content="Convert between volume units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🧪 Volume Converter</h1>
      <p>Convert between volume units</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./unit-converter-volume.html" class="lang-btn active">EN</a>
          <a href="../es/unit-converter-volume.html" class="lang-btn">ES</a>
          <a href="../fr/unit-converter-volume.html" class="lang-btn">FR</a>
          <a href="../de/unit-converter-volume.html" class="lang-btn">DE</a>
          <a href="../ar/unit-converter-volume.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Value</label>
        <input type="number" id="value" value="1" step="any" oninput="convert()">
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <select id="fromUnit" onchange="convert()">
            <option value="l">Liters (L)</option>
            <option value="ml">Milliliters (mL)</option>
            <option value="gal">Gallons (US)</option>
            <option value="qt">Quarts (US)</option>
            <option value="pt">Pints (US)</option>
            <option value="cup">Cups (US)</option>
            <option value="floz">Fluid Ounces (US)</option>
            <option value="m3">Cubic Meters (m³)</option>
            <option value="cm3">Cubic Centimeters (cm³)</option>
            <option value="ft3">Cubic Feet (ft³)</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toUnit" onchange="convert()">
            <option value="l">Liters (L)</option>
            <option value="ml">Milliliters (mL)</option>
            <option value="gal" selected>Gallons (US)</option>
            <option value="qt">Quarts (US)</option>
            <option value="pt">Pints (US)</option>
            <option value="cup">Cups (US)</option>
            <option value="floz">Fluid Ounces (US)</option>
            <option value="m3">Cubic Meters (m³)</option>
            <option value="cm3">Cubic Centimeters (cm³)</option>
            <option value="ft3">Cubic Feet (ft³)</option>
          </select>
        </div>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-label">Result</div>
        <div class="result-value" id="result">0.264172</div>
        <div class="result-formula" id="formula">1 L = 0.264172 gal</div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const toLiters = {
      l: 1,
      ml: 0.001,
      gal: 3.78541,
      qt: 0.946353,
      pt: 0.473176,
      cup: 0.24,
      floz: 0.0295735,
      m3: 1000,
      cm3: 0.001,
      ft3: 28.3168
    };
    
    function convert() {
      const value = parseFloat(document.getElementById('value').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const liters = value * toLiters[from];
      const result = liters / toLiters[to];
      
      document.getElementById('result').textContent = result.toLocaleString(undefined, { maximumFractionDigits: 10 });
      document.getElementById('formula').textContent = `1 ${from} = ${(toLiters[from] / toLiters[to]).toPrecision(6)} ${to}`;
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
