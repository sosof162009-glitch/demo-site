<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter (Pressure) - 205 Tools</title>
  <meta name="description" content="Convert between pressure units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🎈 Pressure Converter</h1>
      <p>Convert between pressure units</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./unit-converter-pressure.html" class="lang-btn active">EN</a>
          <a href="../es/unit-converter-pressure.html" class="lang-btn">ES</a>
          <a href="../fr/unit-converter-pressure.html" class="lang-btn">FR</a>
          <a href="../de/unit-converter-pressure.html" class="lang-btn">DE</a>
          <a href="../ar/unit-converter-pressure.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Value</label>
        <input type="number" id="value" value="1" step="any" oninput="convert()">
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <select id="fromUnit" onchange="convert()">
            <option value="pa">Pascals (Pa)</option>
            <option value="kpa">Kilopascals (kPa)</option>
            <option value="bar">Bar</option>
            <option value="psi" selected>PSI</option>
            <option value="atm">Atmospheres (atm)</option>
            <option value="torr">Torr (mmHg)</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toUnit" onchange="convert()">
            <option value="pa">Pascals (Pa)</option>
            <option value="kpa">Kilopascals (kPa)</option>
            <option value="bar" selected>Bar</option>
            <option value="psi">PSI</option>
            <option value="atm">Atmospheres (atm)</option>
            <option value="torr">Torr (mmHg)</option>
          </select>
        </div>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-label">Result</div>
        <div class="result-value" id="result">0.0689476</div>
        <div class="result-formula" id="formula">1 PSI = 0.0689476 bar</div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const toPascals = {
      pa: 1,
      kpa: 1000,
      bar: 100000,
      psi: 6894.76,
      atm: 101325,
      torr: 133.322
    };
    
    function convert() {
      const value = parseFloat(document.getElementById('value').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const pascals = value * toPascals[from];
      const result = pascals / toPascals[to];
      
      document.getElementById('result').textContent = result.toLocaleString(undefined, { maximumFractionDigits: 10 });
      document.getElementById('formula').textContent = `1 ${from} = ${(toPascals[from] / toPascals[to]).toPrecision(6)} ${to}`;
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
