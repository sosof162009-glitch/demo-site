<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Converter - 205 Tools</title>
  <meta name="description" content="Convert colors between HEX, RGB, HSL, and CMYK formats.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .color-preview { width: 100%; height: 120px; border-radius: 12px; margin: 20px 0; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: 18px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .converter-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
    .converter-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; }
    .converter-box label { display: block; margin-bottom: 8px; font-size: 12px; text-transform: uppercase; color: var(--text-secondary); }
    .converter-box input { width: 100%; padding: 10px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; font-family: monospace; }
    .rgb-inputs { display: flex; gap: 10px; }
    .rgb-inputs input { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🎨 Color Converter</h1>
      <p>Convert between HEX, RGB, HSL, and CMYK color formats</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Color Picker</h2>
        <div class="lang-selector">
          <a href="./color-converter.html" class="lang-btn active">EN</a>
          <a href="../es/color-converter.html" class="lang-btn">ES</a>
          <a href="../fr/color-converter.html" class="lang-btn">FR</a>
          <a href="../de/color-converter.html" class="lang-btn">DE</a>
          <a href="../ar/color-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Pick a Color</label>
        <input type="color" id="colorPicker" value="#4f8ef7" oninput="updateFromPicker()" style="width: 100%; height: 50px; cursor: pointer;">
      </div>
      
      <div class="color-preview" id="colorPreview">#4F8EF7</div>
      
      <div class="converter-grid">
        <div class="converter-box">
          <label>HEX</label>
          <input type="text" id="hexInput" value="#4F8EF7" oninput="updateFromHex()" placeholder="#RRGGBB">
        </div>
        
        <div class="converter-box">
          <label>RGB</label>
          <div class="rgb-inputs">
            <input type="number" id="rInput" value="79" min="0" max="255" oninput="updateFromRGB()" placeholder="R">
            <input type="number" id="gInput" value="142" min="0" max="255" oninput="updateFromRGB()" placeholder="G">
            <input type="number" id="bInput" value="247" min="0" max="255" oninput="updateFromRGB()" placeholder="B">
          </div>
        </div>
        
        <div class="converter-box">
          <label>HSL</label>
          <input type="text" id="hslInput" value="217, 91%, 64%" readonly placeholder="H, S%, L%">
        </div>
        
        <div class="converter-box">
          <label>CMYK</label>
          <input type="text" id="cmykInput" value="68%, 42%, 0%, 3%" readonly placeholder="C%, M%, Y%, K%">
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="randomColor()">🎲 Random Color</button>
        <button class="btn btn-success" onclick="copyHEX()">📋 Copy HEX</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function updateFromPicker() {
      const hex = document.getElementById('colorPicker').value.toUpperCase();
      updateAll(hex);
    }
    
    function updateFromHex() {
      let hex = document.getElementById('hexInput').value;
      if (!hex.startsWith('#')) hex = '#' + hex;
      if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
        updateAll(hex.toUpperCase());
      }
    }
    
    function updateFromRGB() {
      const r = parseInt(document.getElementById('rInput').value) || 0;
      const g = parseInt(document.getElementById('gInput').value) || 0;
      const b = parseInt(document.getElementById('bInput').value) || 0;
      const hex = '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('').toUpperCase();
      updateAll(hex);
    }
    
    function updateAll(hex) {
      document.getElementById('colorPicker').value = hex.toLowerCase();
      document.getElementById('hexInput').value = hex;
      document.getElementById('colorPreview').textContent = hex;
      document.getElementById('colorPreview').style.backgroundColor = hex;
      
      const r = parseInt(hex.slice(1, 3), 16);
      const g = parseInt(hex.slice(3, 5), 16);
      const b = parseInt(hex.slice(5, 7), 16);
      
      document.getElementById('rInput').value = r;
      document.getElementById('gInput').value = g;
      document.getElementById('bInput').value = b;
      
      const hsl = rgbToHsl(r, g, b);
      document.getElementById('hslInput').value = `${hsl.h}, ${hsl.s}%, ${hsl.l}%`;
      
      const cmyk = rgbToCmyk(r, g, b);
      document.getElementById('cmykInput').value = `${cmyk.c}%, ${cmyk.m}%, ${cmyk.y}%, ${cmyk.k}%`;
    }
    
    function rgbToHsl(r, g, b) {
      r /= 255; g /= 255; b /= 255;
      const max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      
      if (max === min) { h = s = 0; }
      else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      return { h: Math.round(h * 360), s: Math.round(s * 100), l: Math.round(l * 100) };
    }
    
    function rgbToCmyk(r, g, b) {
      let c = 1 - (r / 255);
      let m = 1 - (g / 255);
      let y = 1 - (b / 255);
      let k = Math.min(c, m, y);
      
      if (k === 1) return { c: 0, m: 0, y: 0, k: 100 };
      
      c = Math.round(((c - k) / (1 - k)) * 100);
      m = Math.round(((m - k) / (1 - k)) * 100);
      y = Math.round(((y - k) / (1 - k)) * 100);
      k = Math.round(k * 100);
      
      return { c, m, y, k };
    }
    
    function randomColor() {
      const hex = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0').toUpperCase();
      updateAll(hex);
    }
    
    function copyHEX() {
      const hex = document.getElementById('hexInput').value;
      navigator.clipboard.writeText(hex);
      alert('Copied: ' + hex);
    }
  </script>
</body>
</html>
