<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Encoder - 205 Tools</title>
  <meta name="description" content="Encode text to Base64 format.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔒 Base64 Encoder</h1>
      <p>Convert text to Base64 format</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Encoder</h2>
        <div class="lang-selector">
          <a href="./base64-encoder.html" class="lang-btn active">EN</a>
          <a href="../es/base64-encoder.html" class="lang-btn">ES</a>
          <a href="../fr/base64-encoder.html" class="lang-btn">FR</a>
          <a href="../de/base64-encoder.html" class="lang-btn">DE</a>
          <a href="../ar/base64-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Text to Encode</label>
        <textarea id="input" rows="8" placeholder="Enter text to encode...">Hello, World! 👋</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encode()">🔒 Encode</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Base64 Result</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) { alert('Please enter text'); return; }
      
      try {
        const result = btoa(unescape(encodeURIComponent(text)));
        document.getElementById('output').value = result;
      } catch (e) {
        alert('Error encoding text');
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
