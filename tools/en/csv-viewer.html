<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSV Viewer - 205 Tools</title>
  <meta name="description" content="View CSV files in an interactive table format.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .csv-table { width: 100%; border-collapse: collapse; margin-top: 15px; overflow-x: auto; display: block; }
    .csv-table th, .csv-table td { border: 1px solid var(--border-color); padding: 10px; text-align: left; }
    .csv-table th { background: var(--bg-secondary); font-weight: 600; }
    .csv-table tr:nth-child(even) { background: var(--bg-secondary); }
    .file-upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 30px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .file-upload-zone:hover { border-color: var(--primary); background: var(--primary-light); }
    .stats { display: flex; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
    .stat { background: var(--bg-secondary); padding: 10px 20px; border-radius: 8px; }
    .stat-label { font-size: 12px; color: var(--text-muted); }
    .stat-value { font-size: 18px; font-weight: 600; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📄 CSV Viewer</h1>
      <p>View CSV files in an interactive table format</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Viewer</h2>
        <div class="lang-selector">
          <a href="./csv-viewer.html" class="lang-btn active">EN</a>
          <a href="../es/csv-viewer.html" class="lang-btn">ES</a>
          <a href="../fr/csv-viewer.html" class="lang-btn">FR</a>
          <a href="../de/csv-viewer.html" class="lang-btn">DE</a>
          <a href="../ar/csv-viewer.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label><input type="checkbox" id="hasHeaders" checked> First row is headers</label>
      </div>
      
      <div class="file-upload-zone" onclick="document.getElementById('fileInput').click()">
        <div style="font-size: 48px; margin-bottom: 10px;">📁</div>
        <p>Click to upload CSV file or paste below</p>
        <input type="file" id="fileInput" accept=".csv,.txt" style="display: none;">
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Or paste CSV data</label>
        <textarea id="csvInput" rows="6" placeholder="name,age,city&#10;John,30,New York&#10;Jane,25,London"></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="viewCSV()">👁️ View</button>
        <button class="btn btn-secondary" onclick="loadExample()">Example</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div id="statsContainer" class="stats" style="display: none;">
        <div class="stat"><div class="stat-label">Rows</div><div class="stat-value" id="rowCount">0</div></div>
        <div class="stat"><div class="stat-label">Columns</div><div class="stat-value" id="colCount">0</div></div>
      </div>
      
      <div id="tableContainer" style="margin-top: 20px; overflow-x: auto; display: none;">
        <table class="csv-table" id="csvTable"></table>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    document.getElementById('fileInput').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (file) {
        const reader = new FileReader();
        reader.onload = function(e) {
          document.getElementById('csvInput').value = e.target.result;
          viewCSV();
        };
        reader.readAsText(file);
      }
    });
    
    function viewCSV() {
      const csv = document.getElementById('csvInput').value.trim();
      const hasHeaders = document.getElementById('hasHeaders').checked;
      
      if (!csv) { alert('Please enter CSV data'); return; }
      
      const lines = csv.split('\n').filter(l => l.trim());
      if (lines.length === 0) { alert('No data found'); return; }
      
      const delimiter = csv.includes('\t') ? '\t' : ',';
      const table = document.getElementById('csvTable');
      table.innerHTML = '';
      
      lines.forEach((line, idx) => {
        const values = parseLine(line, delimiter);
        const row = document.createElement('tr');
        
        values.forEach(val => {
          const cell = document.createElement(idx === 0 && hasHeaders ? 'th' : 'td');
          cell.textContent = val;
          row.appendChild(cell);
        });
        
        if (idx === 0 && hasHeaders) {
          const thead = document.createElement('thead');
          thead.appendChild(row);
          table.appendChild(thead);
          const tbody = document.createElement('tbody');
          table.appendChild(tbody);
        } else {
          const tbody = table.querySelector('tbody') || table;
          tbody.appendChild(row);
        }
      });
      
      document.getElementById('rowCount').textContent = hasHeaders ? lines.length - 1 : lines.length;
      document.getElementById('colCount').textContent = parseLine(lines[0], delimiter).length;
      document.getElementById('statsContainer').style.display = 'flex';
      document.getElementById('tableContainer').style.display = 'block';
    }
    
    function parseLine(line, delimiter) {
      const values = [];
      let current = '';
      let inQuotes = false;
      
      for (let char of line) {
        if (char === '"') { inQuotes = !inQuotes; }
        else if (char === delimiter && !inQuotes) { values.push(current.trim()); current = ''; }
        else { current += char; }
      }
      values.push(current.trim());
      return values;
    }
    
    function loadExample() {
      document.getElementById('csvInput').value = `Name,Age,City,Department,Salary
John Doe,32,New York,Engineering,75000
Jane Smith,28,London,Marketing,65000
Bob Johnson,45,Paris,Sales,82000
Alice Brown,34,Tokyo,Engineering,78000
Charlie Wilson,29,Sydney,HR,58000`;
      viewCSV();
    }
    
    function clearAll() {
      document.getElementById('csvInput').value = '';
      document.getElementById('tableContainer').style.display = 'none';
      document.getElementById('statsContainer').style.display = 'none';
      document.getElementById('fileInput').value = '';
    }
  </script>
</body>
</html>
