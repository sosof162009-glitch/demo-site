<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tip Calculator - 205 Tools</title>
  <meta name="description" content="Calculate tip amount and split bill among multiple people.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .result-card { background: var(--bg-secondary); padding: 30px; border-radius: 16px; text-align: center; margin-top: 20px; }
    .result-amount { font-size: 48px; font-weight: 700; color: var(--primary); }
    .result-label { color: var(--text-secondary); margin-top: 10px; }
    .split-result { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .split-box { background: var(--bg-card); padding: 15px; border-radius: 12px; }
    .split-box .amount { font-size: 24px; font-weight: 600; color: var(--primary); }
    .split-box .label { font-size: 12px; color: var(--text-secondary); }
    .tip-buttons { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 15px; }
    .tip-buttons button { flex: 1; min-width: 60px; }
    .tip-buttons button.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>💰 Tip Calculator</h1>
      <p>Calculate tip and split the bill</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Bill Details</h2>
        <div class="lang-selector">
          <a href="./tip-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/tip-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/tip-calculator.html" class="lang-btn">FR</a>
          <a href="../de/tip-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/tip-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Bill Amount ($)</label>
        <input type="number" id="billAmount" placeholder="0.00" step="0.01" oninput="calculate()">
      </div>
      
      <div class="form-group">
        <label>Tip Percentage</label>
        <div class="tip-buttons">
          <button onclick="setTip(10)">10%</button>
          <button onclick="setTip(15)">15%</button>
          <button class="active" onclick="setTip(18)">18%</button>
          <button onclick="setTip(20)">20%</button>
          <button onclick="setTip(25)">25%</button>
        </div>
        <input type="range" id="tipPercent" min="0" max="50" value="18" oninput="calculate()">
        <div style="text-align: center; margin-top: 5px;"><span id="tipValue">18</span>%</div>
      </div>
      
      <div class="form-group">
        <label>Number of People</label>
        <input type="number" id="people" value="1" min="1" oninput="calculate()">
      </div>
      
      <div class="result-card">
        <div class="result-label">Total with Tip</div>
        <div class="result-amount" id="totalAmount">$0.00</div>
        
        <div class="split-result">
          <div class="split-box">
            <div class="amount" id="tipAmount">$0.00</div>
            <div class="label">Tip Amount</div>
          </div>
          
          <div class="split-box">
            <div class="amount" id="perPerson">$0.00</div>
            <div class="label">Per Person</div>
          </div>
          
          <div class="split-box">
            <div class="amount" id="tipPerPerson">$0.00</div>
            <div class="label">Tip Per Person</div>
          </div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function setTip(percent) {
      document.getElementById('tipPercent').value = percent;
      document.querySelectorAll('.tip-buttons button').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      calculate();
    }
    
    function calculate() {
      const bill = parseFloat(document.getElementById('billAmount').value) || 0;
      const tipPercent = parseInt(document.getElementById('tipPercent').value) || 0;
      const people = parseInt(document.getElementById('people').value) || 1;
      
      document.getElementById('tipValue').textContent = tipPercent;
      
      const tipAmount = bill * (tipPercent / 100);
      const total = bill + tipAmount;
      const perPerson = total / people;
      const tipPerPerson = tipAmount / people;
      
      document.getElementById('totalAmount').textContent = '$' + total.toFixed(2);
      document.getElementById('tipAmount').textContent = '$' + tipAmount.toFixed(2);
      document.getElementById('perPerson').textContent = '$' + perPerson.toFixed(2);
      document.getElementById('tipPerPerson').textContent = '$' + tipPerPerson.toFixed(2);
    }
  </script>
</body>
</html>
