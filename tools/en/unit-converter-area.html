<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter (Area) - 205 Tools</title>
  <meta name="description" content="Convert between area units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📐 Area Converter</h1>
      <p>Convert between area units</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./unit-converter-area.html" class="lang-btn active">EN</a>
          <a href="../es/unit-converter-area.html" class="lang-btn">ES</a>
          <a href="../fr/unit-converter-area.html" class="lang-btn">FR</a>
          <a href="../de/unit-converter-area.html" class="lang-btn">DE</a>
          <a href="../ar/unit-converter-area.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Value</label>
        <input type="number" id="value" value="1" step="any" oninput="convert()">
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <select id="fromUnit" onchange="convert()">
            <option value="m2">Square Meters (m²)</option>
            <option value="km2">Square Kilometers (km²)</option>
            <option value="cm2">Square Centimeters (cm²)</option>
            <option value="ha">Hectares (ha)</option>
            <option value="acre">Acres</option>
            <option value="ft2">Square Feet (ft²)</option>
            <option value="in2">Square Inches (in²)</option>
            <option value="mi2">Square Miles (mi²)</option>
            <option value="yd2">Square Yards (yd²)</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toUnit" onchange="convert()">
            <option value="m2">Square Meters (m²)</option>
            <option value="km2">Square Kilometers (km²)</option>
            <option value="cm2">Square Centimeters (cm²)</option>
            <option value="ha">Hectares (ha)</option>
            <option value="acre">Acres</option>
            <option value="ft2" selected>Square Feet (ft²)</option>
            <option value="in2">Square Inches (in²)</option>
            <option value="mi2">Square Miles (mi²)</option>
            <option value="yd2">Square Yards (yd²)</option>
          </select>
        </div>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-label">Result</div>
        <div class="result-value" id="result">10.7639</div>
        <div class="result-formula" id="formula">1 m² = 10.7639 ft²</div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const toSqMeters = {
      m2: 1,
      km2: 1000000,
      cm2: 0.0001,
      ha: 10000,
      acre: 4046.86,
      ft2: 0.092903,
      in2: 0.00064516,
      mi2: 2589988.11,
      yd2: 0.836127
    };
    
    function convert() {
      const value = parseFloat(document.getElementById('value').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const sqMeters = value * toSqMeters[from];
      const result = sqMeters / toSqMeters[to];
      
      document.getElementById('result').textContent = result.toLocaleString(undefined, { maximumFractionDigits: 10 });
      document.getElementById('formula').textContent = `1 ${from} = ${(toSqMeters[from] / toSqMeters[to]).toPrecision(6)} ${to}`;
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
