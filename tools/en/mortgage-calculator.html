<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mortgage Calculator - 205 Tools</title>
  <meta name="description" content="Calculate mortgage payments and amortization.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .result-summary { background: var(--bg-secondary); padding: 25px; border-radius: 16px; margin: 20px 0; }
    .monthly-payment { text-align: center; }
    .payment-amount { font-size: 48px; font-weight: 700; color: var(--primary); }
    .payment-label { color: var(--text-secondary); }
    .breakdown { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
    .breakdown-item { background: var(--bg-card); padding: 15px; border-radius: 12px; text-align: center; }
    .breakdown-item .value { font-size: 20px; font-weight: 600; }
    .breakdown-item .label { font-size: 12px; color: var(--text-secondary); }
    @media (max-width: 600px) { .breakdown { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🏠 Mortgage Calculator</h1>
      <p>Calculate mortgage payments</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Details</h2>
        <div class="lang-selector">
          <a href="./mortgage-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/mortgage-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/mortgage-calculator.html" class="lang-btn">FR</a>
          <a href="../de/mortgage-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/mortgage-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Home Price ($)</label>
        <input type="number" id="price" value="300000" oninput="calculate()">
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Down Payment ($)</label>
          <input type="number" id="downPayment" value="60000" oninput="calculate()">
        </div>
        
        <div class="form-group">
          <label>Down Payment %</label>
          <input type="number" id="downPercent" value="20" oninput="updateDownPayment()">
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Interest Rate (%)</label>
          <input type="number" id="rate" value="6.5" step="0.1" oninput="calculate()">
        </div>
        
        <div class="form-group">
          <label>Loan Term (years)</label>
          <input type="number" id="years" value="30" oninput="calculate()">
        </div>
      </div>
      
      <div class="form-group">
        <label>Property Tax/Year ($)</label>
        <input type="number" id="tax" value="3600" oninput="calculate()">
      </div>
      
      <div class="result-summary">
        <div class="monthly-payment">
          <div class="payment-amount" id="monthlyPayment">$0</div>
          <div class="payment-label">Monthly Payment</div>
        </div>
        
        <div class="breakdown">
          <div class="breakdown-item">
            <div class="value" id="principalInterest">$0</div>
            <div class="label">Principal & Interest</div>
          </div>
          
          <div class="breakdown-item">
            <div class="value" id="taxMonthly">$0</div>
            <div class="label">Property Tax</div>
          </div>
          
          <div class="breakdown-item">
            <div class="value" id="totalInterest">$0</div>
            <div class="label">Total Interest</div>
          </div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function updateDownPayment() {
      const price = parseFloat(document.getElementById('price').value) || 0;
      const percent = parseFloat(document.getElementById('downPercent').value) || 0;
      document.getElementById('downPayment').value = Math.round(price * percent / 100);
      calculate();
    }
    
    function calculate() {
      const price = parseFloat(document.getElementById('price').value) || 0;
      const down = parseFloat(document.getElementById('downPayment').value) || 0;
      const rate = parseFloat(document.getElementById('rate').value) || 0;
      const years = parseFloat(document.getElementById('years').value) || 0;
      const tax = parseFloat(document.getElementById('tax').value) || 0;
      
      const principal = price - down;
      const monthlyRate = rate / 100 / 12;
      const numPayments = years * 12;
      
      let monthlyPrincipalInterest;
      if (rate === 0) {
        monthlyPrincipalInterest = principal / numPayments;
      } else {
        monthlyPrincipalInterest = principal * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / (Math.pow(1 + monthlyRate, numPayments) - 1);
      }
      
      const monthlyTax = tax / 12;
      const totalMonthly = monthlyPrincipalInterest + monthlyTax;
      const totalInterest = (monthlyPrincipalInterest * numPayments) - principal;
      
      document.getElementById('monthlyPayment').textContent = '$' + totalMonthly.toFixed(0);
      document.getElementById('principalInterest').textContent = '$' + monthlyPrincipalInterest.toFixed(0);
      document.getElementById('taxMonthly').textContent = '$' + monthlyTax.toFixed(0);
      document.getElementById('totalInterest').textContent = '$' + totalInterest.toFixed(0);
      document.getElementById('downPercent').value = price ? ((down / price) * 100).toFixed(1) : 0;
    }
    
    calculate();
  </script>
</body>
</html>
