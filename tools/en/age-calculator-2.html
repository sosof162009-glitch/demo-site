<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator - 205 Tools</title>
  <meta name="description" content="Calculate exact age in years, months, days, hours and minutes.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🎂 Age Calculator</h1>
      <p>Calculate your exact age from your birthdate.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Enter Your Birthdate</h2>
        <div class="lang-selector">
          <a href="../en/age-calculator-2.html" class="lang-btn active">EN</a>
          <a href="../es/age-calculator-2.html" class="lang-btn">ES</a>
          <a href="../fr/age-calculator-2.html" class="lang-btn">FR</a>
          <a href="../de/age-calculator-2.html" class="lang-btn">DE</a>
          <a href="../ar/age-calculator-2.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="calc-form">
        <div class="form-row">
          <div class="form-group">
            <label>Birth Date</label>
            <input type="date" id="birthdate" class="tool-input" max="">
          </div>
          <div class="form-group">
            <label>Calculate Until (Optional)</label>
            <input type="date" id="enddate" class="tool-input">
          </div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-primary" onclick="calculateAge()">Calculate Age</button>
          <button class="btn btn-secondary" onclick="resetAge()">Reset</button>
        </div>
      </div>
      
      <div class="result-section" id="resultSection" style="display: none;">
        <div class="age-main" id="ageMain">--</div>
        
        <div class="age-details">
          <div class="age-box">
            <div class="number" id="ageYears">0</div>
            <div class="label">Years</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageMonths">0</div>
            <div class="label">Months</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageDays">0</div>
            <div class="label">Days</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageHours">0</div>
            <div class="label">Hours</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageMinutes">0</div>
            <div class="label">Minutes</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageSeconds">0</div>
            <div class="label">Seconds</div>
          </div>
        </div>
        
        <div class="next-birthday" id="nextBirthdaySection">
          <strong>🎉 Next Birthday:</strong>
          <span id="nextBirthday">--</span>
        </div>
        
        <div class="zodiac-section" id="zodiacSection">
          <div class="zodiac-item">
            <span class="zodiac-icon" id="zodiacIcon">♈</span>
            <div>
              <div class="zodiac-name" id="zodiacName">Aries</div>
              <div class="zodiac-date" id="zodiacDate">Mar 21 - Apr 19</div>
            </div>
          </div>
        </div>
      </div>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
  
  <style>
    .calc-form { background: var(--bg-card); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); margin-bottom: 24px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
    .form-group { margin-bottom: 12px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--text-secondary); font-size: 14px; }
    .tool-input { width: 100%; background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 14px; color: var(--text-primary); font-size: 15px; }
    .btn-group { display: flex; gap: 12px; }
    .result-section { background: var(--bg-card); padding: 30px; border-radius: var(--radius); border: 1px solid var(--primary); text-align: center; }
    .age-main { font-size: 36px; font-weight: 700; color: var(--primary); margin-bottom: 24px; }
    .age-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(100px, 1fr)); gap: 16px; margin-bottom: 24px; }
    .age-box { background: var(--bg-input); padding: 20px; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .age-box .number { font-size: 28px; font-weight: 700; color: var(--primary); }
    .age-box .label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; text-transform: uppercase; }
    .next-birthday { margin-top: 24px; padding: 16px; background: linear-gradient(135deg, rgba(79,142,247,0.1), rgba(139,92,246,0.1)); border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .zodiac-section { margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border); }
    .zodiac-item { display: flex; align-items: center; justify-content: center; gap: 16px; }
    .zodiac-icon { font-size: 48px; }
    .zodiac-name { font-size: 20px; font-weight: 600; color: var(--text-primary); }
    .zodiac-date { font-size: 13px; color: var(--text-secondary); }
    @media (max-width: 768px) { .form-row { grid-template-columns: 1fr; } .age-main { font-size: 28px; } }
  </style>
  
  <script>
    document.getElementById('birthdate').max = new Date().toISOString().split('T')[0];
    document.getElementById('enddate').value = new Date().toISOString().split('T')[0];
    
    const zodiacSigns = [
      { name: 'Capricorn', icon: '♑', start: '12-22', end: '01-19' },
      { name: 'Aquarius', icon: '♒', start: '01-20', end: '02-18' },
      { name: 'Pisces', icon: '♓', start: '02-19', end: '03-20' },
      { name: 'Aries', icon: '♈', start: '03-21', end: '04-19' },
      { name: 'Taurus', icon: '♉', start: '04-20', end: '05-20' },
      { name: 'Gemini', icon: '♊', start: '05-21', end: '06-20' },
      { name: 'Cancer', icon: '♋', start: '06-21', end: '07-22' },
      { name: 'Leo', icon: '♌', start: '07-23', end: '08-22' },
      { name: 'Virgo', icon: '♍', start: '08-23', end: '09-22' },
      { name: 'Libra', icon: '♎', start: '09-23', end: '10-22' },
      { name: 'Scorpio', icon: '♏', start: '10-23', end: '11-21' },
      { name: 'Sagittarius', icon: '♐', start: '11-22', end: '12-21' }
    ];
    
    function getZodiacSign(date) {
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const dateStr = `${String(month).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
      
      for (const sign of zodiacSigns) {
        if (sign.name === 'Capricorn') {
          if (dateStr >= sign.start || dateStr <= sign.end) return sign;
        } else {
          if (dateStr >= sign.start && dateStr <= sign.end) return sign;
        }
      }
      return zodiacSigns[0];
    }
    
    function calculateAge() {
      const birthdate = document.getElementById('birthdate').value;
      const enddate = document.getElementById('enddate').value || new Date().toISOString().split('T')[0];
      
      if (!birthdate) {
        alert('Please enter your birth date');
        return;
      }
      
      const birth = new Date(birthdate);
      const end = new Date(enddate);
      
      if (birth > end) {
        alert('Birth date cannot be after the end date');
        return;
      }
      
      let years = end.getFullYear() - birth.getFullYear();
      let months = end.getMonth() - birth.getMonth();
      let days = end.getDate() - birth.getDate();
      
      if (days < 0) {
        months--;
        days += new Date(end.getFullYear(), end.getMonth(), 0).getDate();
      }
      if (months < 0) {
        years--;
        months += 12;
      }
      
      const diffTime = end - birth;
      const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      const totalHours = Math.floor(diffTime / (1000 * 60 * 60));
      const totalMinutes = Math.floor(diffTime / (1000 * 60));
      const totalSeconds = Math.floor(diffTime / 1000);
      
      document.getElementById('ageMain').textContent = `${years} years, ${months} months, ${days} days`;
      document.getElementById('ageYears').textContent = years;
      document.getElementById('ageMonths').textContent = months;
      document.getElementById('ageDays').textContent = days;
      document.getElementById('ageHours').textContent = totalHours.toLocaleString();
      document.getElementById('ageMinutes').textContent = totalMinutes.toLocaleString();
      document.getElementById('ageSeconds').textContent = totalSeconds.toLocaleString();
      
      // Next birthday
      const nextBirthday = new Date(birth);
      nextBirthday.setFullYear(end.getFullYear());
      if (nextBirthday < end) {
        nextBirthday.setFullYear(end.getFullYear() + 1);
      }
      const daysUntil = Math.ceil((nextBirthday - end) / (1000 * 60 * 60 * 24));
      document.getElementById('nextBirthday').textContent = `${nextBirthday.toLocaleDateString()} (${daysUntil} days away)`;
      
      // Zodiac sign
      const sign = getZodiacSign(birth);
      document.getElementById('zodiacIcon').textContent = sign.icon;
      document.getElementById('zodiacName').textContent = sign.name;
      
      document.getElementById('resultSection').style.display = 'block';
    }
    
    function resetAge() {
      document.getElementById('birthdate').value = '';
      document.getElementById('enddate').value = new Date().toISOString().split('T')[0];
      document.getElementById('resultSection').style.display = 'none';
    }
  </script>
</body>
</html>
