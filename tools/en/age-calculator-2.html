<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator 2 - 205 Tools</title>
  <meta name="description" content="Calculate exact age in years, months, and days.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .result-card { background: var(--bg-secondary); padding: 30px; border-radius: 16px; text-align: center; margin: 20px 0; }
    .result-big { font-size: 56px; font-weight: 700; color: var(--primary); }
    .result-detail { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-top: 20px; }
    .detail-box { background: var(--bg-card); padding: 20px; border-radius: 12px; }
    .detail-box .number { font-size: 32px; font-weight: 600; color: var(--primary); }
    .detail-box .label { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
    .next-birthday { margin-top: 20px; padding: 15px; background: var(--bg-card); border-radius: 12px; }
    @media (max-width: 600px) { .result-detail { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🎂 Age Calculator</h1>
      <p>Calculate your exact age</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Calculate</h2>
        <div class="lang-selector">
          <a href="./age-calculator-2.html" class="lang-btn active">EN</a>
          <a href="../es/age-calculator-2.html" class="lang-btn">ES</a>
          <a href="../fr/age-calculator-2.html" class="lang-btn">FR</a>
          <a href="../de/age-calculator-2.html" class="lang-btn">DE</a>
          <a href="../ar/age-calculator-2.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Birth Date</label>
          <input type="date" id="birthDate">
        </div>
        
        <div class="form-group">
          <label>Calculate As Of (optional)</label>
          <input type="date" id="asOfDate">
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculate()">Calculate Age</button>
        <button class="btn btn-secondary" onclick="setToday()">Today</button>
      </div>
      
      <div class="result-card" id="resultCard" style="display: none;">
        <div class="result-big" id="yearsOld">0</div>
        <div style="color: var(--text-secondary);">years old</div>
        
        <div class="result-detail">
          <div class="detail-box">
            <div class="number" id="ageYears">0</div>
            <div class="label">Years</div>
          </div>
          
          <div class="detail-box">
            <div class="number" id="ageMonths">0</div>
            <div class="label">Months</div>
          </div>
          
          <div class="detail-box">
            <div class="number" id="ageDays">0</div>
            <div class="label">Days</div>
          </div>
        </div>
        
        <div class="next-birthday">
          <strong>Next Birthday:</strong> <span id="nextBirthday">--</span>
          (<span id="daysUntil">--</span> days)
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function setToday() {
      document.getElementById('asOfDate').value = new Date().toISOString().split('T')[0];
      calculate();
    }
    
    function calculate() {
      const birthInput = document.getElementById('birthDate').value;
      if (!birthInput) { alert('Please enter birth date'); return; }
      
      const birth = new Date(birthInput);
      const asOf = document.getElementById('asOfDate').value 
        ? new Date(document.getElementById('asOfDate').value)
        : new Date();
      
      if (birth > asOf) { alert('Birth date cannot be in the future'); return; }
      
      let years = asOf.getFullYear() - birth.getFullYear();
      let months = asOf.getMonth() - birth.getMonth();
      let days = asOf.getDate() - birth.getDate();
      
      if (days < 0) {
        months--;
        const prevMonth = new Date(asOf.getFullYear(), asOf.getMonth(), 0);
        days += prevMonth.getDate();
      }
      
      if (months < 0) {
        years--;
        months += 12;
      }
      
      const totalDays = Math.floor((asOf - birth) / (1000 * 60 * 60 * 24));
      
      document.getElementById('yearsOld').textContent = years;
      document.getElementById('ageYears').textContent = years;
      document.getElementById('ageMonths').textContent = months;
      document.getElementById('ageDays').textContent = days;
      
      // Next birthday
      const nextBirthday = new Date(asOf.getFullYear(), birth.getMonth(), birth.getDate());
      if (nextBirthday <= asOf) {
        nextBirthday.setFullYear(asOf.getFullYear() + 1);
      }
      
      const daysUntil = Math.ceil((nextBirthday - asOf) / (1000 * 60 * 60 * 24));
      
      document.getElementById('nextBirthday').textContent = nextBirthday.toLocaleDateString();
      document.getElementById('daysUntil').textContent = daysUntil;
      document.getElementById('resultCard').style.display = 'block';
    }
  </script>
</body>
</html>
