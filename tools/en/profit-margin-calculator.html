<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profit Margin Calculator - 205 Tools</title>
  <meta name="description" content="Calculate profit margin, markup, and profit amount.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .result-card { background: var(--bg-secondary); padding: 30px; border-radius: 16px; text-align: center; margin-top: 20px; }
    .result-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
    .result-item { background: var(--bg-card); padding: 20px; border-radius: 12px; }
    .result-item .value { font-size: 32px; font-weight: 700; color: var(--primary); }
    .result-item .label { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
    .result-item.highlight { background: linear-gradient(135deg, var(--primary), #7baaf7); }
    .result-item.highlight .value, .result-item.highlight .label { color: white; }
    @media (max-width: 600px) { .result-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📈 Profit Margin Calculator</h1>
      <p>Calculate margin, markup, and profit</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Calculator</h2>
        <div class="lang-selector">
          <a href="./profit-margin-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/profit-margin-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/profit-margin-calculator.html" class="lang-btn">FR</a>
          <a href="../de/profit-margin-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/profit-margin-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Cost ($)</label>
          <input type="number" id="cost" placeholder="0.00" step="0.01" oninput="calculate()">
        </div>
        
        <div class="form-group">
          <label>Revenue ($)</label>
          <input type="number" id="revenue" placeholder="0.00" step="0.01" oninput="calculate()">
        </div>
      </div>
      
      <div class="result-card">
        <div class="result-grid">
          <div class="result-item highlight">
            <div class="value" id="profitMargin">0%</div>
            <div class="label">Profit Margin</div>
          </div>
          
          <div class="result-item">
            <div class="value" id="markup">0%</div>
            <div class="label">Markup</div>
          </div>
          
          <div class="result-item">
            <div class="value" id="profitAmount">$0</div>
            <div class="label">Profit Amount</div>
          </div>
          
          <div class="result-item">
            <div class="value" id="grossProfit">$0</div>
            <div class="label">Gross Profit</div>
          </div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function calculate() {
      const cost = parseFloat(document.getElementById('cost').value) || 0;
      const revenue = parseFloat(document.getElementById('revenue').value) || 0;
      
      const profit = revenue - cost;
      const margin = revenue > 0 ? (profit / revenue) * 100 : 0;
      const markup = cost > 0 ? (profit / cost) * 100 : 0;
      
      document.getElementById('profitMargin').textContent = margin.toFixed(2) + '%';
      document.getElementById('markup').textContent = markup.toFixed(2) + '%';
      document.getElementById('profitAmount').textContent = '$' + profit.toFixed(2);
      document.getElementById('grossProfit').textContent = '$' + profit.toFixed(2);
    }
  </script>
</body>
</html>
