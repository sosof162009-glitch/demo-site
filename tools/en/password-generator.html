<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Generator - 205 Tools</title>
  <meta name="description" content="Generate secure random passwords with customizable options.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .password-display { background: var(--bg-secondary); padding: 30px; border-radius: 16px; text-align: center; margin: 20px 0; position: relative; }
    .password-text { font-family: 'Fira Code', monospace; font-size: 28px; word-break: break-all; color: var(--primary); letter-spacing: 2px; }
    .password-options { background: var(--bg-secondary); padding: 20px; border-radius: 12px; margin: 20px 0; }
    .option-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid var(--border); }
    .option-row:last-child { border-bottom: none; }
    .option-row label { display: flex; align-items: center; gap: 10px; cursor: pointer; }
    .length-slider { display: flex; align-items: center; gap: 15px; }
    .length-slider input { flex: 1; }
    .length-value { min-width: 40px; text-align: center; font-weight: 600; color: var(--primary); }
    .strength-indicator { display: flex; gap: 5px; margin-top: 15px; justify-content: center; }
    .strength-bar { height: 8px; flex: 1; max-width: 60px; background: var(--bg-card); border-radius: 4px; }
    .strength-bar.weak { background: #ef4444; }
    .strength-bar.fair { background: #f59e0b; }
    .strength-bar.good { background: #eab308; }
    .strength-bar.strong { background: #22c55e; }
    .history-list { display: flex; flex-direction: column; gap: 8px; margin-top: 15px; }
    .history-item { background: var(--bg-card); padding: 10px 15px; border-radius: 8px; font-family: monospace; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔑 Password Generator</h1>
      <p>Generate secure random passwords</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generator</h2>
        <div class="lang-selector">
          <a href="./password-generator.html" class="lang-btn active">EN</a>
          <a href="../es/password-generator.html" class="lang-btn">ES</a>
          <a href="../fr/password-generator.html" class="lang-btn">FR</a>
          <a href="../de/password-generator.html" class="lang-btn">DE</a>
          <a href="../ar/password-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="password-display">
        <div class="password-text" id="password">Click Generate</div>        
        <div class="strength-indicator" id="strengthBars">
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
          <div class="strength-bar"></div>
        </div>
      </div>
      
      <div class="password-options">
        <div class="option-row">
          <label>Password Length</label>
          <div class="length-slider">
            <input type="range" id="length" min="4" max="64" value="16" oninput="updateLength()">
            <span class="length-value" id="lengthValue">16</span>
          </div>
        </div>
        
        <div class="option-row">
          <label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
        </div>
        
        <div class="option-row">
          <label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
        </div>
        
        <div class="option-row">
          <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
        </div>
        
        <div class="option-row">
          <label><input type="checkbox" id="symbols"> Symbols (!@#$...)</label>
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generate()">🔄 Generate</button>
        <button class="btn btn-success" onclick="copyPassword()">📋 Copy</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const chars = {
      uppercase: 'ABCDEFGHIJKLMNOPQRSTUVWXYZ',
      lowercase: 'abcdefghijklmnopqrstuvwxyz',
      numbers: '0123456789',
      symbols: '!@#$%^&*()_+-=[]{}|;:,.<>?'
    };
    
    function updateLength() {
      document.getElementById('lengthValue').textContent = document.getElementById('length').value;
    }
    
    function generate() {
      const length = parseInt(document.getElementById('length').value);
      const useUpper = document.getElementById('uppercase').checked;
      const useLower = document.getElementById('lowercase').checked;
      const useNumbers = document.getElementById('numbers').checked;
      const useSymbols = document.getElementById('symbols').checked;
      
      let charset = '';
      if (useUpper) charset += chars.uppercase;
      if (useLower) charset += chars.lowercase;
      if (useNumbers) charset += chars.numbers;
      if (useSymbols) charset += chars.symbols;
      
      if (!charset) { alert('Please select at least one character type'); return; }
      
      let password = '';
      for (let i = 0; i < length; i++) {
        password += charset.charAt(Math.floor(Math.random() * charset.length));
      }
      
      document.getElementById('password').textContent = password;
      updateStrength(password);
    }
    
    function updateStrength(password) {
      let score = 0;
      if (password.length >= 8) score++;
      if (password.length >= 12) score++;
      if (/[A-Z]/.test(password)) score++;
      if (/[a-z]/.test(password)) score++;
      if (/\d/.test(password)) score++;
      if (/[^A-Za-z0-9]/.test(password)) score++;
      
      const bars = document.querySelectorAll('.strength-bar');
      bars.forEach(bar => bar.className = 'strength-bar');
      
      if (score <= 2) bars[0].classList.add('weak');
      else if (score <= 3) { bars[0].classList.add('fair'); bars[1].classList.add('fair'); }
      else if (score <= 4) { bars[0].classList.add('good'); bars[1].classList.add('good'); bars[2].classList.add('good'); }
      else { bars.forEach(b => b.classList.add('strong')); }
    }
    
    function copyPassword() {
      const pwd = document.getElementById('password').textContent;
      if (pwd === 'Click Generate') return;
      navigator.clipboard.writeText(pwd);
      alert('Password copied!');
    }
    
    // Generate on load
    generate();
  </script>
</body>
</html>
