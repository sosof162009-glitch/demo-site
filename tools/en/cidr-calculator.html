<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CIDR Calculator - 205 Tools</title>
  <meta name="description" content="Calculate CIDR ranges, subnet masks, and network information.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .network-info { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
    .info-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; }
    .info-box .label { font-size: 12px; color: var(--text-secondary); text-transform: uppercase; }
    .info-box .value { font-size: 16px; font-family: monospace; color: var(--primary); margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🌐 CIDR Calculator</h1>
      <p>Calculate network ranges and subnet information</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Enter CIDR</h2>
        <div class="lang-selector">
          <a href="./cidr-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/cidr-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/cidr-calculator.html" class="lang-btn">FR</a>
          <a href="../de/cidr-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/cidr-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>CIDR Notation (e.g., 192.168.1.0/24)</label>
        <input type="text" id="cidrInput" placeholder="192.168.1.0/24">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculateCIDR()">Calculate</button>
        <button class="btn btn-secondary" onclick="clearCIDR()">Clear</button>
      </div>
      
      <div id="cidrResult" style="display: none;">
        <div class="network-info">
          <div class="info-box">
            <div class="label">Network Address</div>
            <div class="value" id="networkAddress">-</div>
          </div>
          
          <div class="info-box">
            <div class="label">Subnet Mask</div>
            <div class="value" id="subnetMask">-</div>
          </div>
          
          <div class="info-box">
            <div class="label">Wildcard Mask</div>
            <div class="value" id="wildcardMask">-</div>
          </div>
          
          <div class="info-box">
            <div class="label">First Host</div>
            <div class="value" id="firstHost">-</div>
          </div>
          
          <div class="info-box">
            <div class="label">Last Host</div>
            <div class="value" id="lastHost">-</div>
          </div>
          
          <div class="info-box">
            <div class="label">Broadcast</div>
            <div class="value" id="broadcast">-</div>
          </div>
          
          <div class="info-box">
            <div class="label">Total Hosts</div>
            <div class="value" id="totalHosts">-</div>
          </div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function calculateCIDR() {
      const input = document.getElementById('cidrInput').value.trim();
      const match = input.match(/^(\d+)\.(\d+)\.(\d+)\.(\d+)\/(\d+)$/);
      
      if (!match) { alert('Please enter valid CIDR (e.g., 192.168.1.0/24)'); return; }
      
      const [, a, b, c, d, prefix] = match.map(Number);
      if ([a,b,c,d].some(x => x > 255) || prefix > 32) { alert('Invalid IP address or prefix'); return; }
      
      const ip = (a << 24) | (b << 16) | (c << 8) | d;
      const mask = -1 << (32 - prefix);
      const network = ip & mask;
      const broadcast = network | (~mask >>> 0);
      
      document.getElementById('networkAddress').textContent = toIP(network);
      document.getElementById('subnetMask').textContent = toIP(mask);
      document.getElementById('wildcardMask').textContent = toIP(~mask >>> 0);
      document.getElementById('firstHost').textContent = prefix < 31 ? toIP(network + 1) : toIP(network);
      document.getElementById('lastHost').textContent = prefix < 31 ? toIP(broadcast - 1) : toIP(broadcast);
      document.getElementById('broadcast').textContent = toIP(broadcast);
      document.getElementById('totalHosts').textContent = prefix <= 30 ? Math.pow(2, 32 - prefix) - 2 : (prefix === 31 ? 0 : 1);
      document.getElementById('cidrResult').style.display = 'block';
    }
    
    function toIP(num) { return [(num >>> 24) & 255, (num >>> 16) & 255, (num >>> 8) & 255, num & 255].join('.'); }
    function clearCIDR() { document.getElementById('cidrInput').value = ''; document.getElementById('cidrResult').style.display = 'none'; }
  </script>
</body>
</html>
