<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Resizer - 205 Tools</title>
  <meta name="description" content="Resize images to specific dimensions while maintaining aspect ratio.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .upload-area { border: 2px dashed var(--border); padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; transition: all 0.3s; }
    .upload-area:hover { border-color: var(--primary); background: var(--primary-light); }
    .upload-area.dragover { border-color: var(--primary); background: var(--primary-light); }
    .preview-container { margin: 20px 0; text-align: center; }
    .preview-container img { max-width: 100%; max-height: 400px; border-radius: 8px; border: 1px solid var(--border); }
    .resize-options { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin: 20px 0; }
    @media (max-width: 600px) { .resize-options { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📐 Image Resizer</h1>
      <p>Resize images to specific dimensions</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Upload Image</h2>
        <div class="lang-selector">
          <a href="./image-resizer.html" class="lang-btn active">EN</a>
          <a href="../es/image-resizer.html" class="lang-btn">ES</a>
          <a href="../fr/image-resizer.html" class="lang-btn">FR</a>
          <a href="../de/image-resizer.html" class="lang-btn">DE</a>
          <a href="../ar/image-resizer.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="upload-area" id="dropZone" onclick="document.getElementById('fileInput').click()">
        <div>📁 Click or drag image here</div>
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(event)">
      </div>
      
      <div class="preview-container" id="previewContainer" style="display: none;">
        <img id="preview" src="" alt="Preview">
        <div style="margin-top: 10px; color: var(--text-secondary);">
          Original: <span id="originalSize">-</span>
        </div>
      </div>
      
      <div class="resize-options">
        <div class="form-group">
          <label>Width (px)</label>
          <input type="number" id="width" placeholder="Width">
        </div>
        
        <div class="form-group">
          <label>Height (px)</label>
          <input type="number" id="height" placeholder="Height">
        </div>
        
        <div class="form-group">
          <label><input type="checkbox" id="maintainRatio" checked> Maintain Ratio</label>
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="resizeImage()">📐 Resize</button>
        <button class="btn btn-success" onclick="downloadImage()">💾 Download</button>
      </div>
      
      <canvas id="canvas" style="display: none;"></canvas>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let originalImage = null;
    let originalWidth = 0;
    let originalHeight = 0;
    
    const dropZone = document.getElementById('dropZone');
    dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
    dropZone.addEventListener('drop', (e) => {
      e.preventDefault();
      dropZone.classList.remove('dragover');
      if (e.dataTransfer.files.length) handleFile({ target: { files: e.dataTransfer.files } });
    });
    
    function handleFile(e) {
      const file = e.target.files[0];
      if (!file || !file.type.startsWith('image/')) { alert('Please select an image'); return; }
      
      const reader = new FileReader();
      reader.onload = (event) => {
        originalImage = new Image();
        originalImage.onload = () => {
          originalWidth = originalImage.width;
          originalHeight = originalImage.height;
          document.getElementById('preview').src = event.target.result;
          document.getElementById('originalSize').textContent = originalWidth + ' × ' + originalHeight;
          document.getElementById('width').value = originalWidth;
          document.getElementById('height').value = originalHeight;
          document.getElementById('previewContainer').style.display = 'block';
        };
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    document.getElementById('width').addEventListener('input', function() {
      if (document.getElementById('maintainRatio').checked && originalWidth) {
        const ratio = this.value / originalWidth;
        document.getElementById('height').value = Math.round(originalHeight * ratio);
      }
    });
    
    document.getElementById('height').addEventListener('input', function() {
      if (document.getElementById('maintainRatio').checked && originalHeight) {
        const ratio = this.value / originalHeight;
        document.getElementById('width').value = Math.round(originalWidth * ratio);
      }
    });
    
    function resizeImage() {
      if (!originalImage) { alert('Please upload an image first'); return; }
      
      const width = parseInt(document.getElementById('width').value) || originalWidth;
      const height = parseInt(document.getElementById('height').value) || originalHeight;
      
      const canvas = document.getElementById('canvas');
      canvas.width = width;
      canvas.height = height;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(originalImage, 0, 0, width, height);
      
      document.getElementById('preview').src = canvas.toDataURL('image/png');
    }
    
    function downloadImage() {
      const canvas = document.getElementById('canvas');
      if (canvas.width === 0) { alert('Please resize the image first'); return; }
      
      const link = document.createElement('a');
      link.download = 'resized-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
