<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find and Replace - 205 Tools</title>
  <meta name="description" content="Find and replace text in your documents.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .editor-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .editor-box { display: flex; flex-direction: column; }
    .editor-box label { margin-bottom: 8px; font-size: 14px; color: var(--text-secondary); }
    .editor-box textarea { flex: 1; min-height: 250px; }
    .stats-bar { display: flex; gap: 20px; padding: 15px; background: var(--bg-secondary); border-radius: 8px; margin-bottom: 15px; }
    .stats-bar span { color: var(--text-secondary); }
    .stats-bar strong { color: var(--primary); }
    @media (max-width: 768px) { .editor-split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔍 Find and Replace</h1>
      <p>Find and replace text in your documents</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Search</h2>
        <div class="lang-selector">
          <a href="./find-replace.html" class="lang-btn active">EN</a>
          <a href="../es/find-replace.html" class="lang-btn">ES</a>
          <a href="../fr/find-replace.html" class="lang-btn">FR</a>
          <a href="../de/find-replace.html" class="lang-btn">DE</a>
          <a href="../ar/find-replace.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Find</label>
          <input type="text" id="findText" placeholder="Text to find...">
        </div>
        
        <div class="form-group">
          <label>Replace With</label>
          <input type="text" id="replaceText" placeholder="Replacement text...">
        </div>
      </div>
      
      <div class="form-group">
        <label><input type="checkbox" id="caseSensitive"> Case sensitive</label>
        <label style="margin-left: 20px;"><input type="checkbox" id="wholeWord"> Whole word only</label>
      </div>
      
      <div class="stats-bar">
        <span>Matches: <strong id="matchCount">0</strong></span>
        <span>Replaced: <strong id="replaceCount">0</strong></span>
      </div>
      
      <div class="editor-split">
        <div class="editor-box">
          <label>Original Text</label>
          <textarea id="inputText" placeholder="Paste your text here...">The quick brown fox jumps over the lazy dog.
The fox is very quick.
Dogs and foxes are animals.</textarea>
        </div>
        
        <div class="editor-box">
          <label>Result</label>
          <textarea id="outputText" readonly placeholder="Result will appear here..."></textarea>
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="find()">🔍 Find Only</button>
        <button class="btn btn-success" onclick="replace()">🔄 Replace All</button>
        <button class="btn btn-secondary" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let lastMatches = [];
    
    function find() {
      const text = document.getElementById('inputText').value;
      const find = document.getElementById('findText').value;
      
      if (!find) { document.getElementById('matchCount').textContent = '0'; return; }
      
      const caseSensitive = document.getElementById('caseSensitive').checked;
      const wholeWord = document.getElementById('wholeWord').checked;
      
      let flags = caseSensitive ? 'g' : 'gi';
      let pattern = escapeRegex(find);
      
      if (wholeWord) pattern = '\\b' + pattern + '\\b';
      
      const regex = new RegExp(pattern, flags);
      const matches = text.match(regex);
      
      document.getElementById('matchCount').textContent = matches ? matches.length : 0;
      document.getElementById('outputText').value = text;
      
      lastMatches = matches || [];
    }
    
    function replace() {
      const text = document.getElementById('inputText').value;
      const find = document.getElementById('findText').value;
      const replace = document.getElementById('replaceText').value;
      
      if (!find) return;
      
      const caseSensitive = document.getElementById('caseSensitive').checked;
      const wholeWord = document.getElementById('wholeWord').checked;
      
      let flags = caseSensitive ? 'g' : 'gi';
      let pattern = escapeRegex(find);
      
      if (wholeWord) pattern = '\\b' + pattern + '\\b';
      
      const regex = new RegExp(pattern, flags);
      const matches = text.match(regex);
      const result = text.replace(regex, replace);
      
      document.getElementById('matchCount').textContent = matches ? matches.length : 0;
      document.getElementById('replaceCount').textContent = matches ? matches.length : 0;
      document.getElementById('outputText').value = result;
    }
    
    function escapeRegex(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    }
    
    function copyResult() {
      const text = document.getElementById('outputText').value;
      navigator.clipboard.writeText(text);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('outputText').value = '';
      document.getElementById('findText').value = '';
      document.getElementById('replaceText').value = '';
      document.getElementById('matchCount').textContent = '0';
      document.getElementById('replaceCount').textContent = '0';
    }
  </script>
</body>
</html>
