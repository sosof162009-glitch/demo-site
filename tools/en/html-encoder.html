<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Encoder/Decoder - 205 Tools</title>
  <meta name="description" content="Encode and decode HTML entities.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .mode-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
    .mode-toggle button { flex: 1; padding: 12px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-secondary); border-radius: 8px; cursor: pointer; }
    .mode-toggle button.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔤 HTML Encoder/Decoder</h1>
      <p>Encode and decode HTML entities</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./html-encoder.html" class="lang-btn active">EN</a>
          <a href="../es/html-encoder.html" class="lang-btn">ES</a>
          <a href="../fr/html-encoder.html" class="lang-btn">FR</a>
          <a href="../de/html-encoder.html" class="lang-btn">DE</a>
          <a href="../ar/html-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="mode-toggle">
        <button class="active" id="encodeBtn" onclick="setMode('encode')">🔒 Encode</button>
        <button id="decodeBtn" onclick="setMode('decode')">🔓 Decode</button>
      </div>
      
      <div class="form-group">
        <label id="inputLabel">HTML to Encode</label>
        <textarea id="inputText" rows="6" placeholder="Enter text..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="convert()">Convert</button>
        <button class="btn btn-secondary" onclick="loadExample()">Example</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div id="resultBox" style="display: none; margin-top: 20px;">
        <label>Result</label>
        <div class="result-box" style="background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; word-break: break-all;">
          <pre id="outputText"></pre>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let mode = 'encode';
    
    function setMode(newMode) {
      mode = newMode;
      document.getElementById('encodeBtn').classList.toggle('active', mode === 'encode');
      document.getElementById('decodeBtn').classList.toggle('active', mode === 'decode');
      document.getElementById('inputLabel').textContent = mode === 'encode' ? 'HTML to Encode' : 'Entities to Decode';
      clearAll();
    }
    
    function convert() {
      const input = document.getElementById('inputText').value;
      if (!input) { alert('Please enter text'); return; }
      
      let result;
      if (mode === 'encode') {
        result = input.replace(/[&<>"']/g, function(match) {
          return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[match];
        });
      } else {
        result = input.replace(/(&amp;|&lt;|&gt;|&quot;|&#39;|&#x27;)/g, function(match) {
          return { '&amp;': '&', '&lt;': '<', '&gt;': '>', '&quot;': '"', '&#39;': "'", '&#x27;': "'" }[match];
        });
      }
      
      document.getElementById('outputText').textContent = result;
      document.getElementById('resultBox').style.display = 'block';
    }
    
    function loadExample() {
      if (mode === 'encode') {
        document.getElementById('inputText').value = '<div class="example">\n  <p>Hello & Welcome!</p>\n</div>';
      } else {
        document.getElementById('inputText').value = '&lt;div class=&quot;example&quot;&gt;\n  &lt;p&gt;Hello &amp; Welcome!&lt;/p&gt;\n&lt;/div&gt;';
      }
      convert();
    }
    
    function copyResult() {
      const text = document.getElementById('outputText').textContent;
      navigator.clipboard.writeText(text);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('resultBox').style.display = 'none';
    }
  </script>
</body>
</html>
