<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Date Calculator - 205 Tools</title>
  <meta name="description" content="Calculate days between dates or add/subtract days from a date.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .result-card { background: var(--bg-secondary); padding: 25px; border-radius: 16px; text-align: center; margin-top: 20px; }
    .result-big { font-size: 48px; font-weight: 700; color: var(--primary); }
    .result-label { color: var(--text-secondary); margin-top: 5px; }
    .date-result { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
    .date-box { background: var(--bg-card); padding: 15px; border-radius: 12px; }
    .date-box .value { font-size: 24px; font-weight: 600; }
    .date-box .label { font-size: 12px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📅 Date Calculator</h1>
      <p>Calculate days between dates</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Calculate</h2>
        <div class="lang-selector">
          <a href="./date-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/date-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/date-calculator.html" class="lang-btn">FR</a>
          <a href="../de/date-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/date-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>Start Date</label>
          <input type="date" id="startDate">
        </div>
        
        <div class="form-group">
          <label>End Date</label>
          <input type="date" id="endDate">
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculate()">Calculate</button>
        <button class="btn btn-secondary" onclick="setToday()">Today</button>
        <button class="btn btn-secondary" onclick="swapDates()">Swap</button>
      </div>
      
      <div class="result-card" id="resultCard" style="display: none;">
        <div class="result-big" id="daysResult">0</div>
        <div class="result-label">Days Between</div>
        
        <div class="date-result">
          <div class="date-box">
            <div class="value" id="weeksResult">0</div>
            <div class="label">Weeks</div>
          </div>
          
          <div class="date-box">
            <div class="value" id="monthsResult">0</div>
            <div class="label">Months (approx)</div>
          </div>
          
          <div class="date-box">
            <div class="value" id="yearsResult">0</div>
            <div class="label">Years (approx)</div>
          </div>
          
          <div class="date-box">
            <div class="value" id="workDaysResult">0</div>
            <div class="label">Work Days</div>
          </div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    // Set default dates
    const today = new Date();
    const nextWeek = new Date(today);
    nextWeek.setDate(today.getDate() + 7);
    
    document.getElementById('startDate').value = today.toISOString().split('T')[0];
    document.getElementById('endDate').value = nextWeek.toISOString().split('T')[0];
    
    function calculate() {
      const start = new Date(document.getElementById('startDate').value);
      const end = new Date(document.getElementById('endDate').value);
      
      if (isNaN(start.getTime()) || isNaN(end.getTime())) {
        alert('Please select valid dates');
        return;
      }
      
      const diffTime = Math.abs(end - start);
      const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
      const diffWeeks = Math.floor(diffDays / 7);
      const diffMonths = Math.floor(diffDays / 30.44);
      const diffYears = Math.floor(diffDays / 365.25);
      
      // Calculate work days (excluding weekends)
      let workDays = 0;
      const startCopy = new Date(Math.min(start, end));
      const endCopy = new Date(Math.max(start, end));
      
      while (startCopy <= endCopy) {
        const day = startCopy.getDay();
        if (day !== 0 && day !== 6) workDays++;
        startCopy.setDate(startCopy.getDate() + 1);
      }
      
      document.getElementById('daysResult').textContent = diffDays;
      document.getElementById('weeksResult').textContent = diffWeeks;
      document.getElementById('monthsResult').textContent = diffMonths;
      document.getElementById('yearsResult').textContent = diffYears;
      document.getElementById('workDaysResult').textContent = workDays;
      document.getElementById('resultCard').style.display = 'block';
    }
    
    function setToday() {
      const today = new Date().toISOString().split('T')[0];
      document.getElementById('startDate').value = today;
    }
    
    function swapDates() {
      const start = document.getElementById('startDate').value;
      const end = document.getElementById('endDate').value;
      document.getElementById('startDate').value = end;
      document.getElementById('endDate').value = start;
      calculate();
    }
    
    // Calculate on load
    calculate();
  </script>
</body>
</html>
