<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Word Counter - 205 Tools</title>
  <meta name="description" content="Count words, characters, sentences and paragraphs in your text.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
    .stat-box { background: var(--bg-secondary); padding: 20px; border-radius: 12px; text-align: center; }
    .stat-box .number { font-size: 32px; font-weight: 700; color: var(--primary); }
    .stat-box .label { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📝 Word Counter</h1>
      <p>Count words, characters, sentences and paragraphs</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Text Input</h2>
        <div class="lang-selector">
          <a href="./word-counter.html" class="lang-btn active">EN</a>
          <a href="../es/word-counter.html" class="lang-btn">ES</a>
          <a href="../fr/word-counter.html" class="lang-btn">FR</a>
          <a href="../de/word-counter.html" class="lang-btn">DE</a>
          <a href="../ar/word-counter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="textInput" rows="10" placeholder="Paste your text here..." oninput="countStats()"></textarea>
      </div>
      
      <div class="stats-grid">
        <div class="stat-box">
          <div class="number" id="wordCount">0</div>
          <div class="label">Words</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="charCount">0</div>
          <div class="label">Characters</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="charCountNoSpace">0</div>
          <div class="label">Chars (no spaces)</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="sentenceCount">0</div>
          <div class="label">Sentences</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="paragraphCount">0</div>
          <div class="label">Paragraphs</div>
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="clearText()">Clear</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function countStats() {
      const text = document.getElementById('textInput').value;
      
      // Word count
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById('wordCount').textContent = words;
      
      // Character counts
      document.getElementById('charCount').textContent = text.length;
      document.getElementById('charCountNoSpace').textContent = text.replace(/\s/g, '').length;
      
      // Sentence count (approximation)
      const sentences = text.trim() ? text.split(/[.!?]+/).filter(s => s.trim()).length : 0;
      document.getElementById('sentenceCount').textContent = sentences;
      
      // Paragraph count
      const paragraphs = text.trim() ? text.split(/\n\s*\n/).filter(p => p.trim()).length : 0;
      document.getElementById('paragraphCount').textContent = paragraphs || (text.trim() ? 1 : 0);
    }
    
    function clearText() {
      document.getElementById('textInput').value = '';
      countStats();
    }
  </script>
</body>
</html>
