<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Regex Tester - 205 Tools</title>
  <meta name="description" content="Test regular expressions with live matching and highlighting.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .regex-input { font-family: 'Fira Code', monospace; font-size: 16px; }
    .match-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; margin-top: 10px; }
    .match-item { background: var(--primary-light); padding: 8px; margin: 5px 0; border-radius: 4px; border-left: 3px solid var(--primary); }
    .no-match { color: #ef4444; padding: 10px; }
    .match-highlight { background: #fbbf24; color: #000; padding: 2px 4px; border-radius: 3px; }
    .regex-flags { display: flex; gap: 15px; margin: 10px 0; }
    .regex-flags label { display: flex; align-items: center; gap: 5px; cursor: pointer; font-size: 14px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔍 Regex Tester</h1>
      <p>Test regular expressions with live matching</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Pattern</h2>
        <div class="lang-selector">
          <a href="./regex-tester.html" class="lang-btn active">EN</a>
          <a href="../es/regex-tester.html" class="lang-btn">ES</a>
          <a href="../fr/regex-tester.html" class="lang-btn">FR</a>
          <a href="../de/regex-tester.html" class="lang-btn">DE</a>
          <a href="../ar/regex-tester.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Regular Expression</label>
        <input type="text" id="pattern" class="regex-input" placeholder="e.g., [a-z]+@\w+\.\w+" oninput="testRegex()">
      </div>
      
      <div class="regex-flags">
        <label><input type="checkbox" id="flagG" checked onchange="testRegex()"> Global (g)</label>
        <label><input type="checkbox" id="flagI" onchange="testRegex()"> Ignore Case (i)</label>
        <label><input type="checkbox" id="flagM" onchange="testRegex()"> Multiline (m)</label>
      </div>
      
      <div class="form-group">
        <label>Test String</label>
        <textarea id="testString" rows="6" placeholder="Enter text to test..." oninput="testRegex()"></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="testRegex()">Test</button>
        <button class="btn btn-secondary" onclick="loadExample()">Example</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div id="results" class="match-box" style="display: none;">
        <div id="matchCount"></div>
        <div id="matchList"></div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function testRegex() {
      const pattern = document.getElementById('pattern').value;
      const text = document.getElementById('testString').value;
      
      if (!pattern || !text) { document.getElementById('results').style.display = 'none'; return; }
      
      let flags = '';
      if (document.getElementById('flagG').checked) flags += 'g';
      if (document.getElementById('flagI').checked) flags += 'i';
      if (document.getElementById('flagM').checked) flags += 'm';
      
      try {
        const regex = new RegExp(pattern, flags);
        const matches = [];
        let match;
        
        if (flags.includes('g')) {
          while ((match = regex.exec(text)) !== null) {
            matches.push({ text: match[0], index: match.index, groups: match.slice(1) });
            if (match.index === regex.lastIndex) regex.lastIndex++;
          }
        } else {
          match = regex.exec(text);
          if (match) matches.push({ text: match[0], index: match.index, groups: match.slice(1) });
        }
        
        displayResults(matches, text);
      } catch (e) {
        document.getElementById('matchCount').innerHTML = '<span style="color: #ef4444;">Invalid regex: ' + e.message + '</span>';
        document.getElementById('matchList').innerHTML = '';
        document.getElementById('results').style.display = 'block';
      }
    }
    
    function displayResults(matches, text) {
      document.getElementById('results').style.display = 'block';
      
      if (matches.length === 0) {
        document.getElementById('matchCount').innerHTML = '<span class="no-match">No matches found</span>';
        document.getElementById('matchList').innerHTML = '';
        return;
      }
      
      document.getElementById('matchCount').innerHTML = '<strong>' + matches.length + ' match' + (matches.length > 1 ? 'es' : '') + ' found</strong>';
      
      document.getElementById('matchList').innerHTML = matches.map((m, i) => 
        `<div class="match-item">
          <strong>Match ${i+1}:</strong> "${escapeHtml(m.text)}" at position ${m.index}
          ${m.groups.length > 0 ? '<br><small>Groups: ' + m.groups.map((g, j) => `${j+1}: "${escapeHtml(g || '')}"`).join(', ') + '</small>' : ''}
        </div>`
      ).join('');
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function loadExample() {
      document.getElementById('pattern').value = '\\b[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Z|a-z]{2,}\\b';
      document.getElementById('testString').value = `Contact us at:
support@example.com
sales@company.co.uk
invalid-email
john.doe+test@domain.org`;
      testRegex();
    }
    
    function clearAll() {
      document.getElementById('pattern').value = '';
      document.getElementById('testString').value = '';
      document.getElementById('results').style.display = 'none';
    }
  </script>
</body>
</html>
