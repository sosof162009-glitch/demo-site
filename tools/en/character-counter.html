<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Character Counter - 205 Tools</title>
  <meta name="description" content="Count characters, words, and analyze text statistics.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 15px; margin-top: 20px; }
    .stat-box { background: var(--bg-secondary); padding: 20px; border-radius: 12px; text-align: center; }
    .stat-box .number { font-size: 36px; font-weight: 700; color: var(--primary); }
    .stat-box .label { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
    .char-density { margin-top: 20px; }
    .char-bar { display: flex; align-items: center; margin: 5px 0; }
    .char-bar .char { width: 30px; font-family: monospace; }
    .char-bar .bar { flex: 1; height: 20px; background: var(--primary); border-radius: 4px; margin: 0 10px; }
    .char-bar .count { width: 50px; text-align: right; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📊 Character Counter</h1>
      <p>Count characters, words, and analyze text</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Text Input</h2>
        <div class="lang-selector">
          <a href="./character-counter.html" class="lang-btn active">EN</a>
          <a href="../es/character-counter.html" class="lang-btn">ES</a>
          <a href="../fr/character-counter.html" class="lang-btn">FR</a>
          <a href="../de/character-counter.html" class="lang-btn">DE</a>
          <a href="../ar/character-counter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="textInput" rows="8" placeholder="Type or paste your text here..." oninput="countAll()"></textarea>
      </div>
      
      <div class="stats-grid">
        <div class="stat-box">
          <div class="number" id="chars">0</div>
          <div class="label">Characters</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="charsNoSpace">0</div>
          <div class="label">No Spaces</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="words">0</div>
          <div class="label">Words</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="lines">0</div>
          <div class="label">Lines</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="sentences">0</div>
          <div class="label">Sentences</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="paragraphs">0</div>
          <div class="label">Paragraphs</div>
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="clearText()">Clear</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function countAll() {
      const text = document.getElementById('textInput').value;
      
      // Characters
      document.getElementById('chars').textContent = text.length;
      document.getElementById('charsNoSpace').textContent = text.replace(/\s/g, '').length;
      
      // Words
      const words = text.trim() ? text.trim().split(/\s+/).length : 0;
      document.getElementById('words').textContent = words;
      
      // Lines
      const lines = text ? text.split('\n').length : 0;
      document.getElementById('lines').textContent = lines;
      
      // Sentences
      const sentences = text.trim() ? text.split(/[.!?]+/).filter(s => s.trim()).length : 0;
      document.getElementById('sentences').textContent = sentences;
      
      // Paragraphs
      const paragraphs = text.trim() ? text.split(/\n\s*\n/).filter(p => p.trim()).length : 0;
      document.getElementById('paragraphs').textContent = paragraphs || (text.trim() ? 1 : 0);
    }
    
    function clearText() {
      document.getElementById('textInput').value = '';
      countAll();
    }
  </script>
</body>
</html>
