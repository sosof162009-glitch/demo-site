<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter (Weight) - 205 Tools</title>
  <meta name="description" content="Convert between weight/mass units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
    .quick-conversions { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
    .quick-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; text-align: center; }
    .quick-box .value { font-size: 18px; font-weight: 600; color: var(--primary); }
    .quick-box .unit { font-size: 12px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>⚖️ Weight Converter</h1>
      <p>Convert between weight units</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./unit-converter-weight.html" class="lang-btn active">EN</a>
          <a href="../es/unit-converter-weight.html" class="lang-btn">ES</a>
          <a href="../fr/unit-converter-weight.html" class="lang-btn">FR</a>
          <a href="../de/unit-converter-weight.html" class="lang-btn">DE</a>
          <a href="../ar/unit-converter-weight.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Value</label>
        <input type="number" id="value" value="1" step="any" oninput="convert()">
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <select id="fromUnit" onchange="convert()">
            <option value="kg">Kilograms (kg)</option>
            <option value="g">Grams (g)</option>
            <option value="mg">Milligrams (mg)</option>
            <option value="lb">Pounds (lb)</option>
            <option value="oz">Ounces (oz)</option>
            <option value="st">Stone (st)</option>
            <option value="t">Metric Ton (t)</option>
            <option value="ton">US Ton</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toUnit" onchange="convert()">
            <option value="kg">Kilograms (kg)</option>
            <option value="g">Grams (g)</option>
            <option value="mg">Milligrams (mg)</option>
            <option value="lb" selected>Pounds (lb)</option>
            <option value="oz">Ounces (oz)</option>
            <option value="st">Stone (st)</option>
            <option value="t">Metric Ton (t)</option>
            <option value="ton">US Ton</option>
          </select>
        </div>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-label">Result</div>
        <div class="result-value" id="result">2.20462</div>
        <div class="result-formula" id="formula">1 kg = 2.20462 lb</div>
      </div>
      
      <div class="quick-conversions">
        <div class="quick-box">
          <div class="value" id="toKg">1</div>
          <div class="unit">Kilograms</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toG">1000</div>
          <div class="unit">Grams</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toLb">2.205</div>
          <div class="unit">Pounds</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toOz">35.274</div>
          <div class="unit">Ounces</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toSt">0.157</div>
          <div class="unit">Stone</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toT">0.001</div>
          <div class="unit">Metric Tons</div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const toKg = {
      kg: 1,
      g: 0.001,
      mg: 0.000001,
      lb: 0.453592,
      oz: 0.0283495,
      st: 6.35029,
      t: 1000,
      ton: 907.185
    };
    
    function convert() {
      const value = parseFloat(document.getElementById('value').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const kg = value * toKg[from];
      const result = kg / toKg[to];
      
      document.getElementById('result').textContent = result.toLocaleString(undefined, { maximumFractionDigits: 10 });
      document.getElementById('formula').textContent = `1 ${from} = ${(toKg[from] / toKg[to]).toPrecision(6)} ${to}`;
      
      document.getElementById('toKg').textContent = (kg).toPrecision(4);
      document.getElementById('toG').textContent = (kg * 1000).toPrecision(4);
      document.getElementById('toLb').textContent = (kg / 0.453592).toPrecision(4);
      document.getElementById('toOz').textContent = (kg / 0.0283495).toPrecision(4);
      document.getElementById('toSt').textContent = (kg / 6.35029).toPrecision(4);
      document.getElementById('toT').textContent = (kg / 1000).toPrecision(4);
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
