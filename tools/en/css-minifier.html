<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CSS Minifier - 205 Tools</title>
  <meta name="description" content="Minify CSS by removing whitespace and comments.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .stats-bar { display: flex; gap: 20px; padding: 15px; background: var(--bg-secondary); border-radius: 8px; margin: 15px 0; flex-wrap: wrap; }
    .stats-bar span { color: var(--text-secondary); }
    .stats-bar strong { color: var(--primary); }
    .savings { color: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🎨 CSS Minifier</h1>
      <p>Compress and minify CSS code</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Input</h2>
        <div class="lang-selector">
          <a href="./css-minifier.html" class="lang-btn active">EN</a>
          <a href="../es/css-minifier.html" class="lang-btn">ES</a>
          <a href="../fr/css-minifier.html" class="lang-btn">FR</a>
          <a href="../de/css-minifier.html" class="lang-btn">DE</a>
          <a href="../ar/css-minifier.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>CSS Code</label>
        <textarea id="input" rows="10" placeholder="/* Paste CSS here */">/* Sample CSS */
.container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px;
}

h1 {
  color: #333;
  font-size: 24px;
}

p {
  line-height: 1.6;
}</textarea>
      </div>
      
      <div class="stats-bar">
        <span>Original: <strong id="originalSize">0</strong> bytes</span>
        <span>Minified: <strong id="minifiedSize">0</strong> bytes</span>
        <span>Savings: <strong id="savings" class="savings">0%</strong></span>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="minify()">🗜️ Minify</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Minified CSS</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function minify() {
      let css = document.getElementById('input').value;
      if (!css) return;
      
      const originalSize = new Blob([css]).size;
      
      // Remove comments
      css = css.replace(/\/\*[\s\S]*?\*\//g, '');
      
      // Remove unnecessary whitespace
      css = css
        .replace(/\r\n/g, '\n')
        .replace(/\n/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/\s*\{\s*/g, '{')
        .replace(/\s*\}\s*/g, '}')
        .replace(/\s*;\s*/g, ';')
        .replace(/\s*:\s*/g, ':')
        .replace(/\s*,\s*/g, ',')
        .replace(/;\}/g, '}')
        .trim();
      
      const minifiedSize = new Blob([css]).size;
      const savings = originalSize > 0 ? ((originalSize - minifiedSize) / originalSize * 100).toFixed(1) : 0;
      
      document.getElementById('output').value = css;
      document.getElementById('originalSize').textContent = originalSize;
      document.getElementById('minifiedSize').textContent = minifiedSize;
      document.getElementById('savings').textContent = savings + '%';
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('originalSize').textContent = '0';
      document.getElementById('minifiedSize').textContent = '0';
      document.getElementById('savings').textContent = '0%';
    }
  </script>
</body>
</html>
