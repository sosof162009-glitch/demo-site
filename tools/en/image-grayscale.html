<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Grayscale - 205 Tools</title>
  <meta name="description" content="Convert images to grayscale/black and white.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .upload-area { border: 2px dashed var(--border); padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; }
    .upload-area:hover { border-color: var(--primary); }
    .compare { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin: 20px 0; }
    .compare-box { text-align: center; }
    .compare-box img { max-width: 100%; max-height: 300px; border-radius: 8px; border: 1px solid var(--border); }
    .compare-box label { display: block; margin-top: 10px; color: var(--text-secondary); }
    @media (max-width: 600px) { .compare { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>⚫ Image Grayscale</h1>
      <p>Convert images to black and white</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Upload Image</h2>
        <div class="lang-selector">
          <a href="./image-grayscale.html" class="lang-btn active">EN</a>
          <a href="../es/image-grayscale.html" class="lang-btn">ES</a>
          <a href="../fr/image-grayscale.html" class="lang-btn">FR</a>
          <a href="../de/image-grayscale.html" class="lang-btn">DE</a>
          <a href="../ar/image-grayscale.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        📁 Click to upload image
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(event)">
      </div>
      
      <div class="compare" id="previewArea" style="display: none;">
        <div class="compare-box">
          <img id="original" src="" alt="Original">
          <label>Original</label>
        </div>
        
        <div class="compare-box">
          <img id="grayscale" src="" alt="Grayscale">
          <label>Grayscale</label>
        </div>
      </div>
      
      <div class="btn-group" id="actions" style="display: none;">
        <button class="btn btn-primary" onclick="applyGrayscale()">⚫ Convert</button>
        <button class="btn btn-success" onclick="downloadImage()">💾 Download</button>
      </div>
      
      <canvas id="canvas" style="display: none;"></canvas>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let originalImage = null;
    
    function handleFile(e) {
      const file = e.target.files[0];
      if (!file || !file.type.startsWith('image/')) { alert('Please select an image'); return; }
      
      const reader = new FileReader();
      reader.onload = (event) => {
        originalImage = new Image();
        originalImage.onload = () => {
          document.getElementById('original').src = event.target.result;
          document.getElementById('grayscale').src = event.target.result;
          document.getElementById('previewArea').style.display = 'grid';
          document.getElementById('actions').style.display = 'flex';
        };
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    function applyGrayscale() {
      if (!originalImage) return;
      
      const canvas = document.getElementById('canvas');
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;
      
      const ctx = canvas.getContext('2d');
      ctx.drawImage(originalImage, 0, 0);
      
      const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const data = imageData.data;
      
      for (let i = 0; i < data.length; i += 4) {
        const gray = data[i] * 0.299 + data[i + 1] * 0.587 + data[i + 2] * 0.114;
        data[i] = gray;     // R
        data[i + 1] = gray; // G
        data[i + 2] = gray; // B
      }
      
      ctx.putImageData(imageData, 0, 0);
      document.getElementById('grayscale').src = canvas.toDataURL('image/png');
    }
    
    function downloadImage() {
      const canvas = document.getElementById('canvas');
      if (canvas.width === 0) { alert('Please convert first'); return; }
      
      const link = document.createElement('a');
      link.download = 'grayscale-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
