<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Entities Encoder - 205 Tools</title>
  <meta name="description" content="Encode special characters to HTML entities.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔤 HTML Entities Encoder</h1>
      <p>Convert special characters to HTML entities</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Encoder</h2>
        <div class="lang-selector">
          <a href="./html-entities-encoder.html" class="lang-btn active">EN</a>
          <a href="../es/html-entities-encoder.html" class="lang-btn">ES</a>
          <a href="../fr/html-entities-encoder.html" class="lang-btn">FR</a>
          <a href="../de/html-entities-encoder.html" class="lang-btn">DE</a>
          <a href="../ar/html-entities-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Text to Encode</label>
        <textarea id="input" rows="8" placeholder="Enter text with special characters..."><div>Hello & Welcome!</div>
<p>5 < 10 & 10 > 5</p>
"Quotes" and 'apostrophes'
Copyright © 2025</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encode()">🔒 Encode</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Encoded HTML</label>
        <textarea id="output" rows="8" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) return;
      
      const entities = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
        '©': '&copy;',
        '®': '&reg;',
        '™': '&trade;',
        '€': '&euro;',
        '£': '&pound;',
        '¥': '&yen;',
        ' ': '&nbsp;',
        '—': '&mdash;',
        '–': '&ndash;',
        '"': '&ldquo;',
        '"': '&rdquo;',
        ''': '&lsquo;',
        ''': '&rsquo;',
        '…': '&hellip;',
        '§': '&sect;',
        '¶': '&para;',
        '•': '&bull;',
        '°': '&deg;',
        '±': '&plusmn;',
        '×': '&times;',
        '÷': '&divide;',
        '½': '&frac12;',
        '¼': '&frac14;',
        '¾': '&frac34;',
        '←': '&larr;',
        '↑': '&uarr;',
        '→': '&rarr;',
        '↓': '&darr;',
        '↔': '&harr;',
        '⇐': '&lArr;',
        '⇒': '&rArr;'
      };
      
      let encoded = text;
      for (const [char, entity] of Object.entries(entities)) {
        encoded = encoded.split(char).join(entity);
      }
      
      document.getElementById('output').value = encoded;
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
