<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XML Formatter - 205 Tools</title>
  <meta name="description" content="Format and beautify XML documents.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    pre { background: var(--bg-secondary); padding: 15px; border-radius: 8px; overflow-x: auto; font-family: 'Fira Code', monospace; font-size: 14px; }
    .tag { color: #e06c75; }
    .attr { color: #d19a66; }
    .value { color: #98c379; }
    .comment { color: #5c6370; font-style: italic; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📄 XML Formatter</h1>
      <p>Format and beautify XML documents</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Input</h2>
        <div class="lang-selector">
          <a href="./xml-formatter.html" class="lang-btn active">EN</a>
          <a href="../es/xml-formatter.html" class="lang-btn">ES</a>
          <a href="../fr/xml-formatter.html" class="lang-btn">FR</a>
          <a href="../de/xml-formatter.html" class="lang-btn">DE</a>
          <a href="../ar/xml-formatter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="10" placeholder="Paste XML..."><?xml version="1.0" encoding="UTF-8"?><!-- Sample XML --><catalog><book id="1"><title>XML Guide</title><author>John Doe</author><price>29.99</price></book></catalog></textarea>
      </div>
      
      <div id="errorMsg" style="color: #ef4444; margin-bottom: 10px;"></div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="format()">✨ Format</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="minify()">🗜️ Minify</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Formatted XML</label>
        <pre id="output"></pre>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function format() {
      const xml = document.getElementById('input').value.trim();
      if (!xml) return;
      
      try {
        const parser = new DOMParser();
        const doc = parser.parseFromString(xml, 'text/xml');
        
        if (doc.getElementsByTagName('parsererror').length > 0) {
          throw new Error('Invalid XML');
        }
        
        const formatted = formatXml(doc, 0);
        const highlighted = highlightXml(formatted);
        
        document.getElementById('output').innerHTML = highlighted;
        document.getElementById('errorMsg').textContent = '';
      } catch (e) {
        document.getElementById('errorMsg').textContent = 'Error: ' + e.message;
      }
    }
    
    function formatXml(node, indent) {
      const tab = '  ';
      let xml = '';
      
      if (node.nodeType === Node.ELEMENT_NODE) {
        xml += '\n' + tab.repeat(indent) + '<' + node.nodeName;
        
        for (let i = 0; i < node.attributes.length; i++) {
          const attr = node.attributes[i];
          xml += ' ' + attr.name + '="' + attr.value + '"';
        }
        
        if (node.childNodes.length === 0) {
          xml += '/>';
        } else {
          xml += '>';
          
          let hasElementChild = false;
          for (let i = 0; i < node.childNodes.length; i++) {
            if (node.childNodes[i].nodeType === Node.ELEMENT_NODE) {
              hasElementChild = true;
              break;
            }
          }
          
          for (let i = 0; i < node.childNodes.length; i++) {
            const child = node.childNodes[i];
            if (child.nodeType === Node.TEXT_NODE) {
              const text = child.textContent.trim();
              if (text) {
                if (hasElementChild) xml += '\n' + tab.repeat(indent + 1);
                xml += text;
              }
            } else if (child.nodeType === Node.ELEMENT_NODE) {
              xml += formatXml(child, indent + 1);
            }
          }
          
          if (hasElementChild) xml += '\n' + tab.repeat(indent);
          xml += '</' + node.nodeName + '>';
        }
      } else if (node.nodeType === Node.DOCUMENT_NODE) {
        for (let i = 0; i < node.childNodes.length; i++) {
          xml += formatXml(node.childNodes[i], indent);
        }
      }
      
      return xml.trim();
    }
    
    function highlightXml(xml) {
      return xml
        .replace(/(&lt;\/?)([\w:]+)/g, '<span class="tag">$1$2</span>')
        .replace(/([\w:]+)=/g, '<span class="attr">$1</span>=')
        .replace(/"([^"]*)"/g, '<span class="value">"$1"</span>')
        .replace(/(&lt;!--[\s\S]*?--&gt;)/g, '<span class="comment">$1</span>');
    }
    
    function minify() {
      let xml = document.getElementById('input').value;
      if (!xml) return;
      
      xml = xml.replace(/\s+/g, ' ').replace(/\s*>\s*<\s*/g, '><').trim();
      document.getElementById('output').textContent = xml;
    }
    
    function copyResult() {
      const text = document.getElementById('output').innerText;
      navigator.clipboard.writeText(text);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').innerHTML = '';
      document.getElementById('errorMsg').textContent = '';
    }
  </script>
</body>
</html>
