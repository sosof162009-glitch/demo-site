<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HMAC Generator - 205 Tools</title>
  <meta name="description" content="Generate HMAC (Hash-based Message Authentication Code) with various algorithms.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔑 HMAC Generator</h1>
      <p>Generate HMAC with SHA256, SHA512, SHA1, or MD5.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Options</h2>
        <div class="lang-selector">
          <a href="../en/hmac-generator.html" class="lang-btn active">EN</a><a href="../es/hmac-generator.html" class="lang-btn ">ES</a><a href="../fr/hmac-generator.html" class="lang-btn ">FR</a><a href="../de/hmac-generator.html" class="lang-btn ">DE</a><a href="../ar/hmac-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Algorithm</label>
        <select id="algorithm">
          <option value="SHA-256" selected>SHA-256</option>
          <option value="SHA-512">SHA-512</option>
          <option value="SHA-1">SHA-1</option>
        </select>
      </div>
      <div class="form-group">
        <label>Secret Key</label>
        <input type="text" id="secretKey" placeholder="Enter secret key...">
      </div>
      <div class="form-group">
        <label>Message</label>
        <textarea id="message" rows="6" placeholder="Enter your message here..."></textarea>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="uppercase"> Output Uppercase</label>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateHMAC()">Generate HMAC</button>
        <button class="btn btn-secondary" onclick="resetForm()">Reset</button>
      </div>
      <div class="form-group" style="margin-top: 20px;">
        <label>HMAC Result</label>
        <textarea id="outputText" rows="4" readonly></textarea>
      </div>
      <button class="btn btn-success" data-success="Copied!" onclick="copyToClipboard(document.getElementById('outputText').value, this)">Copy</button>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
  
  <script>
    async function generateHMAC() {
      const algorithm = document.getElementById('algorithm').value;
      const key = document.getElementById('secretKey').value;
      const message = document.getElementById('message').value;
      const uppercase = document.getElementById('uppercase').checked;
      
      if (!key) {
        alert('Please enter a secret key');
        return;
      }
      if (!message) {
        alert('Please enter a message');
        return;
      }
      
      try {
        const encoder = new TextEncoder();
        const cryptoKey = await crypto.subtle.importKey(
          'raw',
          encoder.encode(key),
          { name: 'HMAC', hash: algorithm },
          false,
          ['sign']
        );
        const signature = await crypto.subtle.sign('HMAC', cryptoKey, encoder.encode(message));
        const hashArray = Array.from(new Uint8Array(signature));
        let hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        if (uppercase) hash = hash.toUpperCase();
        document.getElementById('outputText').value = hash;
      } catch (error) {
        alert('Error generating HMAC: ' + error.message);
      }
    }
    
    function resetForm() {
      document.getElementById('algorithm').value = 'SHA-256';
      document.getElementById('secretKey').value = '';
      document.getElementById('message').value = '';
      document.getElementById('outputText').value = '';
    }
  </script>
</body>
</html>
