<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HMAC Generator - 205 Tools</title>
  <meta name="description" content="Generate HMAC hash with secret key.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .hash-output { background: var(--bg-secondary); padding: 20px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 14px; word-break: break-all; text-align: center; margin: 20px 0; color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔐 HMAC Generator</h1>
      <p>Generate HMAC with secret key</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generator</h2>
        <div class="lang-selector">
          <a href="./hmac-generator.html" class="lang-btn active">EN</a>
          <a href="../es/hmac-generator.html" class="lang-btn">ES</a>
          <a href="../fr/hmac-generator.html" class="lang-btn">FR</a>
          <a href="../de/hmac-generator.html" class="lang-btn">DE</a>
          <a href="../ar/hmac-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Message</label>
        <textarea id="message" rows="4" placeholder="Enter message...">Hello World</textarea>
      </div>
      
      <div class="form-group">
        <label>Secret Key</label>
        <input type="text" id="secretKey" value="mysecretkey" placeholder="Enter secret key">
      </div>
      
      <div class="form-group">
        <label>Algorithm</label>
        <select id="algorithm" onchange="generateHMAC()">
          <option value="SHA-256">SHA-256</option>
          <option value="SHA-1">SHA-1</option>
          <option value="SHA-512">SHA-512</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateHMAC()">Generate HMAC</button>
        <button class="btn btn-success" onclick="copyHash()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="hash-output" id="hashOutput"></div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    async function generateHMAC() {
      const message = document.getElementById('message').value;
      const key = document.getElementById('secretKey').value;
      const algo = document.getElementById('algorithm').value;
      
      if (!message || !key) return;
      
      try {
        const encoder = new TextEncoder();
        const keyData = encoder.encode(key);
        const messageData = encoder.encode(message);
        
        const cryptoKey = await crypto.subtle.importKey(
          'raw', keyData, { name: 'HMAC', hash: algo }, false, ['sign']
        );
        
        const signature = await crypto.subtle.sign('HMAC', cryptoKey, messageData);
        const hashArray = Array.from(new Uint8Array(signature));
        const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
        
        document.getElementById('hashOutput').textContent = hashHex;
      } catch (e) {
        document.getElementById('hashOutput').textContent = 'Error: ' + e.message;
      }
    }
    
    function copyHash() {
      const hash = document.getElementById('hashOutput').textContent;
      if (hash) {
        navigator.clipboard.writeText(hash);
        alert('HMAC copied!');
      }
    }
    
    function clearAll() {
      document.getElementById('message').value = '';
      document.getElementById('secretKey').value = '';
      document.getElementById('hashOutput').textContent = '';
    }
    
    generateHMAC();
  </script>
</body>
</html>
