<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Currency Converter - 205 Tools</title>
  <meta name="description" content="Convert between currencies with exchange rates.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-box { background: var(--bg-secondary); padding: 30px; border-radius: 16px; text-align: center; }
    .amount-display { font-size: 48px; font-weight: 700; color: var(--primary); margin: 20px 0; }
    .rate-info { color: var(--text-secondary); margin-top: 10px; }
    .currency-select { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; margin: 20px 0; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .currency-select { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>💱 Currency Converter</h1>
      <p>Convert between currencies</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Convert</h2>
        <div class="lang-selector">
          <a href="./currency-converter.html" class="lang-btn active">EN</a>
          <a href="../es/currency-converter.html" class="lang-btn">ES</a>
          <a href="../fr/currency-converter.html" class="lang-btn">FR</a>
          <a href="../de/currency-converter.html" class="lang-btn">DE</a>
          <a href="../ar/currency-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Amount</label>
        <input type="number" id="amount" value="100" step="0.01" oninput="convert()">
      </div>
      
      <div class="currency-select">
        <div class="form-group">
          <label>From</label>
          <select id="fromCurrency" onchange="convert()">
            <option value="USD" selected>USD - US Dollar</option>
            <option value="EUR">EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="JPY">JPY - Japanese Yen</option>
            <option value="AUD">AUD - Australian Dollar</option>
            <option value="CAD">CAD - Canadian Dollar</option>
            <option value="CHF">CHF - Swiss Franc</option>
            <option value="CNY">CNY - Chinese Yuan</option>
            <option value="INR">INR - Indian Rupee</option>
            <option value="SAR">SAR - Saudi Riyal</option>
            <option value="AED">AED - UAE Dirham</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toCurrency" onchange="convert()">
            <option value="USD">USD - US Dollar</option>
            <option value="EUR" selected>EUR - Euro</option>
            <option value="GBP">GBP - British Pound</option>
            <option value="JPY">JPY - Japanese Yen</option>
            <option value="AUD">AUD - Australian Dollar</option>
            <option value="CAD">CAD - Canadian Dollar</option>
            <option value="CHF">CHF - Swiss Franc</option>
            <option value="CNY">CNY - Chinese Yuan</option>
            <option value="INR">INR - Indian Rupee</option>
            <option value="SAR">SAR - Saudi Riyal</option>
            <option value="AED">AED - UAE Dirham</option>
          </select>
        </div>
      </div>
      
      <div class="converter-box">
        <div class="amount-display" id="result">€92.00</div>
        <div class="rate-info" id="rateInfo">1 USD = 0.92 EUR</div>
        <div style="color: var(--text-secondary); font-size: 12px; margin-top: 15px;">*Approximate rates for demonstration</div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    // Demo rates (base: USD)
    const rates = {
      USD: 1,
      EUR: 0.92,
      GBP: 0.79,
      JPY: 150.23,
      AUD: 1.53,
      CAD: 1.35,
      CHF: 0.88,
      CNY: 7.19,
      INR: 82.90,
      SAR: 3.75,
      AED: 3.67
    };
    
    const symbols = { USD: '$', EUR: '€', GBP: '£', JPY: '¥', AUD: 'A$', CAD: 'C$', CHF: 'Fr', CNY: '¥', INR: '₹', SAR: '﷼', AED: 'د.إ' };
    
    function convert() {
      const amount = parseFloat(document.getElementById('amount').value) || 0;
      const from = document.getElementById('fromCurrency').value;
      const to = document.getElementById('toCurrency').value;
      
      const usdAmount = amount / rates[from];
      const result = usdAmount * rates[to];
      const rate = rates[to] / rates[from];
      
      const symbol = symbols[to] || '';
      document.getElementById('result').textContent = symbol + result.toFixed(2);
      document.getElementById('rateInfo').textContent = `1 ${from} = ${rate.toFixed(4)} ${to}`;
    }
    
    function swap() {
      const from = document.getElementById('fromCurrency').value;
      const to = document.getElementById('toCurrency').value;
      document.getElementById('fromCurrency').value = to;
      document.getElementById('toCurrency').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
