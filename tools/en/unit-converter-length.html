<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter (Length) - 205 Tools</title>
  <meta name="description" content="Convert between length units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
    .quick-conversions { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; margin-top: 20px; }
    .quick-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; text-align: center; }
    .quick-box .value { font-size: 18px; font-weight: 600; color: var(--primary); }
    .quick-box .unit { font-size: 12px; color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📏 Length Converter</h1>
      <p>Convert between length units</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./unit-converter-length.html" class="lang-btn active">EN</a>
          <a href="../es/unit-converter-length.html" class="lang-btn">ES</a>
          <a href="../fr/unit-converter-length.html" class="lang-btn">FR</a>
          <a href="../de/unit-converter-length.html" class="lang-btn">DE</a>
          <a href="../ar/unit-converter-length.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Value</label>
        <input type="number" id="value" value="1" step="any" oninput="convert()">
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <select id="fromUnit" onchange="convert()">
            <option value="m">Meters (m)</option>
            <option value="km">Kilometers (km)</option>
            <option value="cm">Centimeters (cm)</option>
            <option value="mm">Millimeters (mm)</option>
            <option value="mi">Miles (mi)</option>
            <option value="yd">Yards (yd)</option>
            <option value="ft">Feet (ft)</option>
            <option value="in">Inches (in)</option>
            <option value="nm">Nanometers (nm)</option>
            <option value="um">Micrometers (μm)</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toUnit" onchange="convert()">
            <option value="m">Meters (m)</option>
            <option value="km">Kilometers (km)</option>
            <option value="cm">Centimeters (cm)</option>
            <option value="mm">Millimeters (mm)</option>
            <option value="mi">Miles (mi)</option>
            <option value="yd">Yards (yd)</option>
            <option value="ft" selected>Feet (ft)</option>
            <option value="in">Inches (in)</option>
            <option value="nm">Nanometers (nm)</option>
            <option value="um">Micrometers (μm)</option>
          </select>
        </div>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-label">Result</div>
        <div class="result-value" id="result">3.28084</div>
        <div class="result-formula" id="formula">1 m = 3.28084 ft</div>
      </div>
      
      <div class="quick-conversions">
        <div class="quick-box">
          <div class="value" id="toM">1</div>
          <div class="unit">Meters</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toKm">0.001</div>
          <div class="unit">Kilometers</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toCm">100</div>
          <div class="unit">Centimeters</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toMi">0.000621</div>
          <div class="unit">Miles</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toFt">3.281</div>
          <div class="unit">Feet</div>
        </div>
        
        <div class="quick-box">
          <div class="value" id="toIn">39.37</div>
          <div class="unit">Inches</div>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const toMeters = {
      m: 1,
      km: 1000,
      cm: 0.01,
      mm: 0.001,
      mi: 1609.344,
      yd: 0.9144,
      ft: 0.3048,
      in: 0.0254,
      nm: 1e-9,
      um: 1e-6
    };
    
    function convert() {
      const value = parseFloat(document.getElementById('value').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const meters = value * toMeters[from];
      const result = meters / toMeters[to];
      
      document.getElementById('result').textContent = result.toLocaleString(undefined, { maximumFractionDigits: 10 });
      document.getElementById('formula').textContent = `1 ${from} = ${(toMeters[from] / toMeters[to]).toPrecision(6)} ${to}`;
      
      // Update quick conversions
      document.getElementById('toM').textContent = (meters).toPrecision(4);
      document.getElementById('toKm').textContent = (meters / 1000).toPrecision(4);
      document.getElementById('toCm').textContent = (meters * 100).toPrecision(4);
      document.getElementById('toMi').textContent = (meters / 1609.344).toPrecision(4);
      document.getElementById('toFt').textContent = (meters / 0.3048).toPrecision(4);
      document.getElementById('toIn').textContent = (meters / 0.0254).toPrecision(4);
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
