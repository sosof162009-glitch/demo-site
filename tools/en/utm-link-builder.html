<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UTM Link Builder - 205 Tools</title>
  <meta name="description" content="Build UTM tracking URLs for marketing campaigns.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📊 UTM Link Builder</h1>
      <p>Build UTM tracking URLs for your marketing campaigns.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Build URL</h2>
        <div class="lang-selector">
          <a href="../en/utm-link-builder.html" class="lang-btn active">EN</a><a href="../es/utm-link-builder.html" class="lang-btn ">ES</a><a href="../fr/utm-link-builder.html" class="lang-btn ">FR</a><a href="../de/utm-link-builder.html" class="lang-btn ">DE</a><a href="../ar/utm-link-builder.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Website URL *</label>
        <input type="url" id="baseUrl" placeholder="https://example.com/landing-page">
      </div>
      <div class="form-group">
        <label>UTM Source * (e.g., google, facebook, newsletter)</label>
        <input type="text" id="utmSource" placeholder="google">
      </div>
      <div class="form-group">
        <label>UTM Medium * (e.g., cpc, email, social)</label>
        <select id="utmMedium">
          <option value="">Select medium...</option>
          <option value="cpc">CPC (Cost Per Click)</option>
          <option value="email">Email</option>
          <option value="social">Social</option>
          <option value="organic">Organic</option>
          <option value="referral">Referral</option>
          <option value="display">Display</option>
          <option value="affiliate">Affiliate</option>
          <option value="custom">Custom</option>
        </select>
        <input type="text" id="utmMediumCustom" placeholder="Enter custom medium" style="display:none; margin-top:8px;">
      </div>
      <div class="form-group">
        <label>UTM Campaign * (e.g., summer_sale, product_launch)</label>
        <input type="text" id="utmCampaign" placeholder="summer_sale_2025">
      </div>
      <div class="form-group">
        <label>UTM Term (optional - for paid search keywords)</label>
        <input type="text" id="utmTerm" placeholder="running shoes">
      </div>
      <div class="form-group">
        <label>UTM Content (optional - for A/B testing)</label>
        <input type="text" id="utmContent" placeholder="banner_a">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="buildUTM()">Build URL</button>
        <button class="btn btn-secondary" onclick="clearFields()">Clear</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="Copied!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Copy</button>
      </div>
      
      <script>
        document.getElementById('utmMedium').addEventListener('change', function() {
          const customInput = document.getElementById('utmMediumCustom');
          if (this.value === 'custom') {
            customInput.style.display = 'block';
            customInput.focus();
          } else {
            customInput.style.display = 'none';
          }
        });
        
        function buildUTM() {
          const baseUrl = document.getElementById('baseUrl').value.trim();
          const source = document.getElementById('utmSource').value.trim();
          let medium = document.getElementById('utmMedium').value;
          const campaign = document.getElementById('utmCampaign').value.trim();
          const term = document.getElementById('utmTerm').value.trim();
          const content = document.getElementById('utmContent').value.trim();
          
          if (!baseUrl) {
            alert('Please enter a website URL');
            return;
          }
          if (!source) {
            alert('Please enter UTM Source');
            return;
          }
          if (!medium) {
            alert('Please select UTM Medium');
            return;
          }
          if (!campaign) {
            alert('Please enter UTM Campaign');
            return;
          }
          
          if (medium === 'custom') {
            medium = document.getElementById('utmMediumCustom').value.trim();
          }
          
          let url = baseUrl;
          if (!url.includes('?')) {
            url += '?';
          } else {
            url += '&';
          }
          
          const params = [];
          params.push('utm_source=' + encodeURIComponent(source));
          params.push('utm_medium=' + encodeURIComponent(medium));
          params.push('utm_campaign=' + encodeURIComponent(campaign));
          if (term) params.push('utm_term=' + encodeURIComponent(term));
          if (content) params.push('utm_content=' + encodeURIComponent(content));
          
          url += params.join('&');
          
          document.getElementById('codeContent').textContent = url;
          document.getElementById('output').style.display = 'block';
        }
        
        function clearFields() {
          document.getElementById('baseUrl').value = '';
          document.getElementById('utmSource').value = '';
          document.getElementById('utmMedium').value = '';
          document.getElementById('utmMediumCustom').value = '';
          document.getElementById('utmMediumCustom').style.display = 'none';
          document.getElementById('utmCampaign').value = '';
          document.getElementById('utmTerm').value = '';
          document.getElementById('utmContent').value = '';
          document.getElementById('output').style.display = 'none';
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
</body>
</html>
