<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>What Is My IP - 205 Tools</title>
  <meta name="description" content="Find your current IP address and location info.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .ip-display { background: var(--bg-secondary); padding: 30px; border-radius: 16px; text-align: center; margin: 20px 0; }
    .ip-address { font-size: 36px; font-weight: 700; color: var(--primary); font-family: 'Fira Code', monospace; }
    .info-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
    .info-card { background: var(--bg-secondary); padding: 20px; border-radius: 12px; }
    .info-card .label { color: var(--text-secondary); font-size: 12px; text-transform: uppercase; }
    .info-card .value { font-size: 18px; font-weight: 600; margin-top: 5px; }
    .loading { color: var(--text-secondary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🌐 What Is My IP</h1>
      <p>Find your IP address and location</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Your IP Info</h2>
        <div class="lang-selector">
          <a href="./what-is-my-ip.html" class="lang-btn active">EN</a>
          <a href="../es/what-is-my-ip.html" class="lang-btn">ES</a>
          <a href="../fr/what-is-my-ip.html" class="lang-btn">FR</a>
          <a href="../de/what-is-my-ip.html" class="lang-btn">DE</a>
          <a href="../ar/what-is-my-ip.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="ip-display">
        <div class="ip-address" id="ipAddress"><span class="loading">Detecting...</span></div>
        <div style="color: var(--text-secondary); margin-top: 10px;">Your Public IP Address</div>
      </div>
      
      <div class="info-grid">
        <div class="info-card">
          <div class="label">City</div>
          <div class="value" id="city">--</div>
        </div>
        
        <div class="info-card">
          <div class="label">Region</div>
          <div class="value" id="region">--</div>
        </div>
        
        <div class="info-card">
          <div class="label">Country</div>
          <div class="value" id="country">--</div>
        </div>
        
        <div class="info-card">
          <div class="label">ISP</div>
          <div class="value" id="isp">--</div>
        </div>
        
        <div class="info-card">
          <div class="label">Timezone</div>
          <div class="value" id="timezone">--</div>
        </div>
        
        <div class="info-card">
          <div class="label">User Agent</div>
          <div class="value" style="font-size: 12px;"><span id="browser">--</span></div>
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="refresh()">🔄 Refresh</button>
        <button class="btn btn-success" onclick="copyIP()">📋 Copy IP</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    async function getIPInfo() {
      try {
        const response = await fetch('https://ipapi.co/json/');
        const data = await response.json();
        
        document.getElementById('ipAddress').textContent = data.ip;
        document.getElementById('city').textContent = data.city || '--';
        document.getElementById('region').textContent = data.region || '--';
        document.getElementById('country').textContent = data.country_name || '--';
        document.getElementById('isp').textContent = data.org || '--';
        document.getElementById('timezone').textContent = data.timezone || '--';
      } catch (e) {
        // Fallback
        fetch('https://api.ipify.org?format=json')
          .then(r => r.json())
          .then(data => {
            document.getElementById('ipAddress').textContent = data.ip;
          })
          .catch(() => {
            document.getElementById('ipAddress').textContent = 'Unable to detect';
          });
      }
      
      // Browser info
      document.getElementById('browser').textContent = navigator.userAgent.split(' ').slice(-1)[0].split('/')[0];
    }
    
    function copyIP() {
      const ip = document.getElementById('ipAddress').textContent;
      if (ip && ip !== 'Detecting...' && ip !== 'Unable to detect') {
        navigator.clipboard.writeText(ip);
        alert('IP copied!');
      }
    }
    
    function refresh() {
      document.getElementById('ipAddress').innerHTML = '<span class="loading">Detecting...</span>';
      getIPInfo();
    }
    
    getIPInfo();
  </script>
</body>
</html>
