<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Table to CSV - 205 Tools</title>
  <meta name="description" content="Convert HTML tables to CSV format.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .output-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; }
    .preview-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; margin: 15px 0; }
    .preview-box table { width: 100%; border-collapse: collapse; }
    .preview-box th, .preview-box td { border: 1px solid var(--border-color); padding: 8px; text-align: left; }
    .preview-box th { background: var(--bg-primary); }
    .options { display: flex; gap: 20px; margin: 15px 0; flex-wrap: wrap; }
    .options label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🌐 HTML Table to CSV</h1>
      <p>Convert HTML tables to CSV format</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./html-table-to-csv.html" class="lang-btn active">EN</a>
          <a href="../es/html-table-to-csv.html" class="lang-btn">ES</a>
          <a href="../fr/html-table-to-csv.html" class="lang-btn">FR</a>
          <a href="../de/html-table-to-csv.html" class="lang-btn">DE</a>
          <a href="../ar/html-table-to-csv.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="options">
        <label><input type="checkbox" id="includeHeaders" checked> Include headers</label>
        <label><input type="checkbox" id="skipEmpty" checked> Skip empty rows</label>
      </div>
      
      <div class="form-group">
        <label>Paste HTML table code</label>
        <textarea id="htmlInput" rows="8" placeholder="&lt;table&gt;&#10;  &lt;tr&gt;&lt;th&gt;Name&lt;/th&gt;&lt;th&gt;Age&lt;/th&gt;&lt;/tr&gt;&#10;  &lt;tr&gt;&lt;td&gt;John&lt;/td&gt;&lt;td&gt;30&lt;/td&gt;&lt;/tr&gt;&#10;&lt;/table&gt;"></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="convertTable()">🔄 Convert</button>
        <button class="btn btn-secondary" onclick="loadExample()">Example</button>
        <button class="btn btn-success" onclick="copyOutput()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="downloadCSV()">💾 Download</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div id="previewSection" class="preview-box" style="display: none;">
        <label>Table Preview</label>
        <div id="tablePreview"></div>
      </div>
      
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <label>CSV Output</label>
        <pre id="csvOutput" class="output-box"></pre>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function convertTable() {
      const html = document.getElementById('htmlInput').value.trim();
      if (!html) { alert('Please enter HTML table code'); return; }
      
      const includeHeaders = document.getElementById('includeHeaders').checked;
      const skipEmpty = document.getElementById('skipEmpty').checked;
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(html, 'text/html');
      const tables = doc.querySelectorAll('table');
      
      if (tables.length === 0) { alert('No table found in HTML'); return; }
      
      const table = tables[0];
      const rows = [];
      
      table.querySelectorAll('tr').forEach(tr => {
        const cells = [];
        tr.querySelectorAll('th, td').forEach(cell => {
          let text = cell.textContent.trim();
          // Escape quotes and wrap in quotes if contains comma or newline
          if (text.includes('"')) text = text.replace(/"/g, '""');
          if (text.includes(',') || text.includes('\n') || text.includes('"')) {
            text = '"' + text + '"';
          }
          cells.push(text);
        });
        
        if (!skipEmpty || cells.some(c => c.trim())) {
          rows.push(cells);
        }
      });
      
      if (rows.length === 0) { alert('No data found in table'); return; }
      
      const csv = rows.map(r => r.join(',')).join('\n');
      
      document.getElementById('csvOutput').textContent = csv;
      document.getElementById('tablePreview').innerHTML = html;
      document.getElementById('previewSection').style.display = 'block';
      document.getElementById('outputSection').style.display = 'block';
    }
    
    function loadExample() {
      document.getElementById('htmlInput').value = `<table>
  <thead>
    <tr>
      <th>Product</th>
      <th>Price</th>
      <th>Quantity</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Laptop</td>
      <td>$999.99</td>
      <td>2</td>
    </tr>
    <tr>
      <td>Mouse</td>
      <td>$29.99</td>
      <td>5</td>
    </tr>
    <tr>
      <td>Keyboard</td>
      <td>$79.99</td>
      <td>3</td>
    </tr>
  </tbody>
</table>`;
      convertTable();
    }
    
    function copyOutput() {
      const text = document.getElementById('csvOutput').textContent;
      navigator.clipboard.writeText(text);
      alert('Copied!');
    }
    
    function downloadCSV() {
      const text = document.getElementById('csvOutput').textContent;
      const blob = new Blob([text], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'table.csv';
      a.click();
      URL.revokeObjectURL(url);
    }
    
    function clearAll() {
      document.getElementById('htmlInput').value = '';
      document.getElementById('previewSection').style.display = 'none';
      document.getElementById('outputSection').style.display = 'none';
    }
  </script>
</body>
</html>
