<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Base64 Decoder - 205 Tools</title>
  <meta name="description" content="Decode Base64 to text.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔓 Base64 Decoder</h1>
      <p>Convert Base64 to text</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Decoder</h2>
        <div class="lang-selector">
          <a href="./base64-decoder.html" class="lang-btn active">EN</a>
          <a href="../es/base64-decoder.html" class="lang-btn">ES</a>
          <a href="../fr/base64-decoder.html" class="lang-btn">FR</a>
          <a href="../de/base64-decoder.html" class="lang-btn">DE</a>
          <a href="../ar/base64-decoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Base64 to Decode</label>
        <textarea id="input" rows="8" placeholder="Enter Base64 to decode...">SGVsbG8sIFdvcmxkISDwn5iL</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="decode()">🔓 Decode</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Decoded Text</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function decode() {
      const text = document.getElementById('input').value.trim();
      if (!text) { alert('Please enter Base64 text'); return; }
      
      try {
        const result = decodeURIComponent(escape(atob(text)));
        document.getElementById('output').value = result;
      } catch (e) {
        alert('Error decoding Base64: ' + e.message);
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
