<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Remove Duplicate Lines - 205 Tools</title>
  <meta name="description" content="Remove duplicate lines from your text.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔄 Remove Duplicate Lines</h1>
      <p>Remove duplicate lines from your text while keeping order</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Input Text</h2>
        <div class="lang-selector">
          <a href="./remove-duplicate-lines.html" class="lang-btn active">EN</a>
          <a href="../es/remove-duplicate-lines.html" class="lang-btn">ES</a>
          <a href="../fr/remove-duplicate-lines.html" class="lang-btn">FR</a>
          <a href="../de/remove-duplicate-lines.html" class="lang-btn">DE</a>
          <a href="../ar/remove-duplicate-lines.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Paste text with duplicate lines here..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="removeDuplicates()">Remove Duplicates</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Result</label>
        <textarea id="output" rows="8" readonly placeholder="Result will appear here..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copy Result</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function removeDuplicates() {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      const lines = input.split('\n');
      const seen = new Set();
      const unique = [];
      
      for (const line of lines) {
        if (!seen.has(line)) {
          seen.add(line);
          unique.push(line);
        }
      }
      
      document.getElementById('output').value = unique.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('Copied to clipboard!');
    }
  </script>
</body>
</html>
