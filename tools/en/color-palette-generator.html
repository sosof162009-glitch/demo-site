<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Palette Generator - 205 Tools</title>
  <meta name="description" content="Generate beautiful color palettes for your projects.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .palette { display: flex; height: 120px; border-radius: 12px; overflow: hidden; margin: 20px 0; border: 2px solid var(--border); }
    .palette-color { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; padding: 10px; cursor: pointer; transition: flex 0.3s; }
    .palette-color:hover { flex: 1.5; }
    .palette-color span { font-size: 12px; font-weight: 600; text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
    .harmony-types { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
    .harmony-types button { flex: 1; min-width: 120px; }
    .harmony-types button.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🎨 Color Palette Generator</h1>
      <p>Generate beautiful color palettes for your designs</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generator</h2>
        <div class="lang-selector">
          <a href="./color-palette-generator.html" class="lang-btn active">EN</a>
          <a href="../es/color-palette-generator.html" class="lang-btn">ES</a>
          <a href="../fr/color-palette-generator.html" class="lang-btn">FR</a>
          <a href="../de/color-palette-generator.html" class="lang-btn">DE</a>
          <a href="../ar/color-palette-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Base Color</label>
        <input type="color" id="baseColor" value="#4f8ef7" oninput="generatePalette()">
      </div>
      
      <div class="harmony-types">
        <button class="btn btn-secondary active" onclick="setHarmony('analogous')">Analogous</button>
        <button class="btn btn-secondary" onclick="setHarmony('monochromatic')">Monochromatic</button>
        <button class="btn btn-secondary" onclick="setHarmony('complementary')">Complementary</button>
        <button class="btn btn-secondary" onclick="setHarmony('triadic')">Triadic</button>
        <button class="btn btn-secondary" onclick="setHarmony('random')">Random</button>
      </div>
      
      <div class="palette" id="palette"></div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generatePalette()">🎲 Generate New</button>
        <button class="btn btn-success" onclick="copyPalette()">📋 Copy Colors</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let currentHarmony = 'analogous';
    let currentPalette = [];
    
    function setHarmony(type) {
      currentHarmony = type;
      document.querySelectorAll('.harmony-types button').forEach(btn => btn.classList.remove('active'));
      event.target.classList.add('active');
      generatePalette();
    }
    
    function generatePalette() {
      const base = document.getElementById('baseColor').value;
      const h = hexToHsl(base).h;
      
      switch(currentHarmony) {
        case 'analogous':
          currentPalette = [hslToHex((h - 30 + 360) % 360, 70, 50), hslToHex((h - 15 + 360) % 360, 70, 50), base, hslToHex((h + 15) % 360, 70, 50), hslToHex((h + 30) % 360, 70, 50)];
          break;
        case 'monochromatic':
          currentPalette = [hslToHex(h, 80, 30), hslToHex(h, 70, 40), base, hslToHex(h, 60, 60), hslToHex(h, 50, 75)];
          break;
        case 'complementary':
          currentPalette = [base, hslToHex((h + 180) % 360, 70, 50), hslToHex(h, 50, 70), hslToHex((h + 180) % 360, 50, 70), hslToHex(h, 30, 85)];
          break;
        case 'triadic':
          currentPalette = [base, hslToHex((h + 120) % 360, 70, 50), hslToHex((h + 240) % 360, 70, 50), hslToHex(h, 50, 70), hslToHex((h + 120) % 360, 50, 70)];
          break;
        case 'random':
          currentPalette = Array(5).fill(0).map(() => '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'));
          break;
      }
      
      renderPalette();
    }
    
    function renderPalette() {
      const palette = document.getElementById('palette');
      palette.innerHTML = currentPalette.map(color => 
        `<div class="palette-color" style="background-color: ${color};" onclick="copyColor('${color}')">
          <span style="color: ${getContrastColor(color)}">${color.toUpperCase()}</span>
        </div>`
      ).join('');
    }
    
    function hexToHsl(hex) {
      let r = parseInt(hex.slice(1,3), 16) / 255;
      let g = parseInt(hex.slice(3,5), 16) / 255;
      let b = parseInt(hex.slice(5,7), 16) / 255;
      let max = Math.max(r, g, b), min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      if (max === min) { h = s = 0; }
      else {
        let d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch(max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h *= 60;
      }
      return { h, s: s * 100, l: l * 100 };
    }
    
    function hslToHex(h, s, l) {
      s /= 100; l /= 100;
      const a = s * Math.min(l, 1 - l);
      const f = n => {
        const k = (n + h / 30) % 12;
        const color = l - a * Math.max(Math.min(k - 3, 9 - k, 1), -1);
        return Math.round(255 * color).toString(16).padStart(2, '0');
      };
      return `#${f(0)}${f(8)}${f(4)}`;
    }
    
    function getContrastColor(hex) {
      const r = parseInt(hex.slice(1,3), 16);
      const g = parseInt(hex.slice(3,5), 16);
      const b = parseInt(hex.slice(5,7), 16);
      return (r * 0.299 + g * 0.587 + b * 0.114) > 128 ? '#000' : '#fff';
    }
    
    function copyColor(color) {
      navigator.clipboard.writeText(color);
      alert('Copied: ' + color);
    }
    
    function copyPalette() {
      navigator.clipboard.writeText(currentPalette.join(', '));
      alert('Palette copied!');
    }
    
    generatePalette();
  </script>
</body>
</html>
