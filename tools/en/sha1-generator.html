<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHA1 Generator - 205 Tools</title>
  <meta name="description" content="Generate SHA1 hash of text.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .hash-output { background: var(--bg-secondary); padding: 20px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 16px; word-break: break-all; text-align: center; margin: 20px 0; color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔐 SHA1 Generator</h1>
      <p>Generate SHA1 hash of text</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generator</h2>
        <div class="lang-selector">
          <a href="./sha1-generator.html" class="lang-btn active">EN</a>
          <a href="../es/sha1-generator.html" class="lang-btn">ES</a>
          <a href="../fr/sha1-generator.html" class="lang-btn">FR</a>
          <a href="../de/sha1-generator.html" class="lang-btn">DE</a>
          <a href="../ar/sha1-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Enter Text</label>
        <textarea id="inputText" rows="6" placeholder="Type or paste text...">Hello World</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateSHA1()">Generate SHA1</button>
        <button class="btn btn-success" onclick="copyHash()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearText()">Clear</button>
      </div>
      
      <div class="hash-output" id="hashOutput"></div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    async function generateSHA1() {
      const text = document.getElementById('inputText').value;
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-1', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      document.getElementById('hashOutput').textContent = hashHex;
    }
    
    function copyHash() {
      const hash = document.getElementById('hashOutput').textContent;
      if (hash) {
        navigator.clipboard.writeText(hash);
        alert('Hash copied!');
      }
    }
    
    function clearText() {
      document.getElementById('inputText').value = '';
      document.getElementById('hashOutput').textContent = '';
    }
    
    generateSHA1();
  </script>
</body>
</html>
