<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Reader - 205 Tools</title>
  <meta name="description" content="Scan and read QR codes from images.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    .file-upload-zone { border: 2px dashed var(--border-color); border-radius: 12px; padding: 40px; text-align: center; cursor: pointer; transition: all 0.3s; }
    .file-upload-zone:hover { border-color: var(--primary); background: var(--primary-light); }
    .result-box { background: var(--bg-secondary); padding: 20px; border-radius: 8px; margin-top: 20px; }
    .scan-type { display: flex; gap: 20px; margin: 15px 0; }
    .scan-type label { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    #reader { width: 100%; max-width: 500px; margin: 20px auto; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    <header><h1>📷 QR Code Reader</h1><p>Scan and read QR codes from images or camera</p></header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>Reader</h2>
        <div class="lang-selector">
          <a href="./qr-code-reader.html" class="lang-btn active">EN</a>
          <a href="../es/qr-code-reader.html" class="lang-btn">ES</a>
          <a href="../fr/qr-code-reader.html" class="lang-btn">FR</a>
          <a href="../de/qr-code-reader.html" class="lang-btn">DE</a>
          <a href="../ar/qr-code-reader.html" class="lang-btn">AR</a>
        </div>
      </div>
      <div class="scan-type">
        <label><input type="radio" name="scanType" value="file" checked onchange="toggleScanType()"> Upload Image</label>
        <label><input type="radio" name="scanType" value="camera" onchange="toggleScanType()"> Use Camera</label>
      </div>
      <div id="fileSection">
        <div class="file-upload-zone" onclick="document.getElementById('qrInput').click()">
          <div style="font-size: 48px; margin-bottom: 10px;">📁</div>
          <p>Click to upload QR code image</p>
          <p style="color: var(--text-muted); font-size: 13px;">Supports: JPG, PNG, GIF, WebP</p>
          <input type="file" id="qrInput" accept="image/*" style="display: none;" onchange="handleFile(this)">
        </div>
      </div>
      <div id="cameraSection" style="display: none;">
        <div id="reader"></div>
        <div class="btn-group">
          <button class="btn btn-primary" id="startBtn" onclick="startCamera()">Start Camera</button>
          <button class="btn btn-secondary" id="stopBtn" onclick="stopCamera()" style="display: none;">Stop Camera</button>
        </div>
      </div>
      <div id="resultSection" class="result-box" style="display: none;">
        <label>Scanned Result:</label>
        <p id="qrResult" style="word-break: break-all; margin: 10px 0;"></p>
        <div class="btn-group">
          <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
          <button class="btn btn-secondary" onclick="openLink()">🔗 Open Link</button>
          <button class="btn btn-secondary" onclick="clearResult()">Clear</button>
        </div>
      </div>
    </div>
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  <script>
    let html5QrCode;
    let currentResult = '';
    function toggleScanType() {
      const type = document.querySelector('input[name="scanType"]:checked').value;
      document.getElementById('fileSection').style.display = type === 'file' ? 'block' : 'none';
      document.getElementById('cameraSection').style.display = type === 'camera' ? 'block' : 'none';
      if (type === 'file') stopCamera();
    }
    function handleFile(input) {
      if (input.files && input.files[0]) {
        const file = input.files[0];
        if (!file.type.startsWith('image/')) { alert('Please upload an image file'); return; }
        html5QrCode = new Html5Qrcode("reader");
        html5QrCode.scanFile(file, true).then(decodedText => {
          showResult(decodedText);
        }).catch(err => {
          alert('Could not read QR code from image. Please try another image or use camera.');
          console.error(err);
        });
      }
    }
    function startCamera() {
      html5QrCode = new Html5Qrcode("reader");
      html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 250, height: 250 } }, decodedText => {
        showResult(decodedText);
        stopCamera();
      }, errorMessage => {}).catch(err => {
        alert('Error starting camera: ' + err);
      });
      document.getElementById('startBtn').style.display = 'none';
      document.getElementById('stopBtn').style.display = 'inline-flex';
    }
    function stopCamera() {
      if (html5QrCode) {
        html5QrCode.stop().then(() => {
          html5QrCode.clear();
        }).catch(err => console.error(err));
      }
      document.getElementById('startBtn').style.display = 'inline-flex';
      document.getElementById('stopBtn').style.display = 'none';
    }
    function showResult(text) {
      currentResult = text;
      document.getElementById('qrResult').textContent = text;
      document.getElementById('resultSection').style.display = 'block';
    }
    function copyResult() {
      navigator.clipboard.writeText(currentResult);
      alert('Copied!');
    }
    function openLink() {
      if (currentResult.match(/^https?:\/\//i)) window.open(currentResult, '_blank');
      else alert('Not a valid URL');
    }
    function clearResult() {
      document.getElementById('resultSection').style.display = 'none';
      document.getElementById('qrInput').value = '';
      currentResult = '';
    }
  </script>
</body>
</html>
