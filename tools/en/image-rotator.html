<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Rotator - 205 Tools</title>
  <meta name="description" content="Rotate images by 90, 180, 270 degrees or custom angle.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .upload-area { border: 2px dashed var(--border); padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; }
    .upload-area:hover { border-color: var(--primary); }
    .preview-container { display: none; margin: 20px 0; text-align: center; }
    .preview-container img, .preview-container canvas { max-width: 100%; max-height: 400px; border: 1px solid var(--border); border-radius: 8px; }
    .rotate-controls { display: flex; gap: 10px; justify-content: center; margin: 20px 0; flex-wrap: wrap; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔄 Image Rotator</h1>
      <p>Rotate images by any angle</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Upload Image</h2>
        <div class="lang-selector">
          <a href="./image-rotator.html" class="lang-btn active">EN</a>
          <a href="../es/image-rotator.html" class="lang-btn">ES</a>
          <a href="../fr/image-rotator.html" class="lang-btn">FR</a>
          <a href="../de/image-rotator.html" class="lang-btn">DE</a>
          <a href="../ar/image-rotator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        📁 Click to upload image
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(event)">
      </div>
      
      <div class="preview-container" id="previewContainer">
        <canvas id="canvas"></canvas>
        
        <div class="rotate-controls">
          <button class="btn btn-secondary" onclick="rotate(-90)">↺ -90°</button>
          <button class="btn btn-secondary" onclick="rotate(90)">↻ +90°</button>
          <button class="btn btn-secondary" onclick="rotate(180)">180°</button>
          <button class="btn btn-secondary" onclick="flip('h')">↔ Flip H</button>
          <button class="btn btn-secondary" onclick="flip('v')">↕ Flip V</button>
        </div>
        
        <div class="form-group" style="max-width: 200px; margin: 0 auto;">
          <label>Custom Angle</label>
          <input type="range" id="angle" min="0" max="360" value="0" oninput="rotateCustom(this.value)">
          <div style="text-align: center; margin-top: 5px;"><span id="angleValue">0</span>°</div>
        </div>
        
        <div class="btn-group" style="margin-top: 20px;">
          <button class="btn btn-primary" onclick="reset()">Reset</button>
          <button class="btn btn-success" onclick="downloadImage()">💾 Download</button>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let originalImage = null;
    let currentAngle = 0;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    
    function handleFile(e) {
      const file = e.target.files[0];
      if (!file || !file.type.startsWith('image/')) { alert('Please select an image'); return; }
      
      const reader = new FileReader();
      reader.onload = (event) => {
        originalImage = new Image();
        originalImage.onload = () => {
          canvas.width = originalImage.width;
          canvas.height = originalImage.height;
          ctx.drawImage(originalImage, 0, 0);
          document.getElementById('previewContainer').style.display = 'block';
          currentAngle = 0;
          document.getElementById('angle').value = 0;
          document.getElementById('angleValue').textContent = 0;
        };
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    function rotate(deg) {
      currentAngle = (currentAngle + deg) % 360;
      applyRotation();
      document.getElementById('angle').value = currentAngle;
      document.getElementById('angleValue').textContent = currentAngle;
    }
    
    function rotateCustom(deg) {
      currentAngle = parseInt(deg);
      document.getElementById('angleValue').textContent = currentAngle;
      applyRotation();
    }
    
    function applyRotation() {
      if (!originalImage) return;
      
      const rad = currentAngle * Math.PI / 180;
      const sin = Math.abs(Math.sin(rad));
      const cos = Math.abs(Math.cos(rad));
      
      const newWidth = originalImage.width * cos + originalImage.height * sin;
      const newHeight = originalImage.width * sin + originalImage.height * cos;
      
      canvas.width = newWidth;
      canvas.height = newHeight;
      
      ctx.save();
      ctx.translate(newWidth / 2, newHeight / 2);
      ctx.rotate(rad);
      ctx.drawImage(originalImage, -originalImage.width / 2, -originalImage.height / 2);
      ctx.restore();
    }
    
    function flip(direction) {
      if (!originalImage) return;
      
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = canvas.width;
      tempCanvas.height = canvas.height;
      const tempCtx = tempCanvas.getContext('2d');
      
      tempCtx.translate(direction === 'h' ? tempCanvas.width : 0, direction === 'v' ? tempCanvas.height : 0);
      tempCtx.scale(direction === 'h' ? -1 : 1, direction === 'v' ? -1 : 1);
      tempCtx.drawImage(canvas, 0, 0);
      
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(tempCanvas, 0, 0);
    }
    
    function reset() {
      if (!originalImage) return;
      canvas.width = originalImage.width;
      canvas.height = originalImage.height;
      ctx.drawImage(originalImage, 0, 0);
      currentAngle = 0;
      document.getElementById('angle').value = 0;
      document.getElementById('angleValue').textContent = 0;
    }
    
    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'rotated-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
