<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Privacy Policy Generator - 205 Tools</title>
  <meta name="description" content="Generate a privacy policy for your website.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📄 Privacy Policy Generator</h1>
      <p>Generate a privacy policy for your website.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Details</h2>
        <div class="lang-selector">
          <a href="../en/privacy-policy-generator.html" class="lang-btn ">EN</a><a href="../es/privacy-policy-generator.html" class="lang-btn ">ES</a><a href="../fr/privacy-policy-generator.html" class="lang-btn ">FR</a><a href="../de/privacy-policy-generator.html" class="lang-btn ">DE</a><a href="../ar/privacy-policy-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Company/Website Name</label>
        <input type="text" id="companyName" placeholder="Your Company Name">
      </div>
      <div class="form-group">
        <label>Website URL</label>
        <input type="text" id="websiteUrl" placeholder="https://example.com">
      </div>
      <div class="form-group">
        <label>Contact Email</label>
        <input type="email" id="contactEmail" placeholder="contact@example.com">
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generatePolicy()">Generate</button>
      </div>
      <div class="result-box" style="margin-top: 20px;">
        <textarea id="policyResult" style="width: 100%; height: 400px; font-family: inherit;" readonly></textarea>
      </div>
      <div class="btn-group" style="margin-top: 15px;">
        <button class="btn btn-success" onclick="copyToClipboard(document.getElementById('policyResult').value)">Copy</button>
        <button class="btn btn-secondary" onclick="downloadPolicy()">Download</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function generatePolicy() {
      const company = document.getElementById('companyName').value || 'Your Company';
      const url = document.getElementById('websiteUrl').value || 'https://example.com';
      const email = document.getElementById('contactEmail').value || 'contact@example.com';
      const date = new Date().toLocaleDateString();
      
      const policy = `PRIVACY POLICY

Last updated: ${date}

1. INTRODUCTION
${company} ("we", "our", or "us") is committed to protecting your privacy. This Privacy Policy explains how we collect, use, and safeguard your information when you visit our website ${url}.

2. INFORMATION WE COLLECT
We may collect the following types of information:
- Personal information (name, email address, etc.)
- Usage data and analytics
- Cookies and similar technologies

3. HOW WE USE YOUR INFORMATION
We use the information we collect to:
- Provide and maintain our services
- Improve user experience
- Communicate with you
- Comply with legal obligations

4. DATA SECURITY
We implement appropriate security measures to protect your personal information.

5. YOUR RIGHTS
You have the right to:
- Access your personal data
- Request correction or deletion
- Opt-out of marketing communications

6. CONTACT US
If you have any questions about this Privacy Policy, please contact us at:
Email: ${email}
Website: ${url}

7. CHANGES TO THIS POLICY
We may update this Privacy Policy from time to time. Please review it periodically.
`;
      
      document.getElementById('policyResult').value = policy;
    }
    
    function downloadPolicy() {
      const policy = document.getElementById('policyResult').value;
      if (!policy) return;
      const blob = new Blob([policy], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'privacy-policy.txt';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
