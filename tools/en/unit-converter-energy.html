<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter (Energy) - 205 Tools</title>
  <meta name="description" content="Convert between energy units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>⚡ Energy Converter</h1>
      <p>Convert between energy units</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./unit-converter-energy.html" class="lang-btn active">EN</a>
          <a href="../es/unit-converter-energy.html" class="lang-btn">ES</a>
          <a href="../fr/unit-converter-energy.html" class="lang-btn">FR</a>
          <a href="../de/unit-converter-energy.html" class="lang-btn">DE</a>
          <a href="../ar/unit-converter-energy.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Value</label>
        <input type="number" id="value" value="1" step="any" oninput="convert()">
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <select id="fromUnit" onchange="convert()">
            <option value="j">Joules (J)</option>
            <option value="kj">Kilojoules (kJ)</option>
            <option value="cal">Calories (cal)</option>
            <option value="kcal">Kilocalories (kcal)</option>
            <option value="wh">Watt-hours (Wh)</option>
            <option value="kwh" selected>Kilowatt-hours (kWh)</option>
            <option value="btu">BTU</option>
            <option value="ev">Electronvolts (eV)</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toUnit" onchange="convert()">
            <option value="j">Joules (J)</option>
            <option value="kj">Kilojoules (kJ)</option>
            <option value="cal">Calories (cal)</option>
            <option value="kcal">Kilocalories (kcal)</option>
            <option value="wh">Watt-hours (Wh)</option>
            <option value="kwh">Kilowatt-hours (kWh)</option>
            <option value="btu" selected>BTU</option>
            <option value="ev">Electronvolts (eV)</option>
          </select>
        </div>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-label">Result</div>
        <div class="result-value" id="result">3412.14</div>
        <div class="result-formula" id="formula">1 kWh = 3412.14 BTU</div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const toJoules = {
      j: 1,
      kj: 1000,
      cal: 4.184,
      kcal: 4184,
      wh: 3600,
      kwh: 3600000,
      btu: 1055.06,
      ev: 1.60218e-19
    };
    
    function convert() {
      const value = parseFloat(document.getElementById('value').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const joules = value * toJoules[from];
      const result = joules / toJoules[to];
      
      document.getElementById('result').textContent = result.toLocaleString(undefined, { maximumFractionDigits: 10 });
      document.getElementById('formula').textContent = `1 ${from} = ${(toJoules[from] / toJoules[to]).toPrecision(6)} ${to}`;
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
