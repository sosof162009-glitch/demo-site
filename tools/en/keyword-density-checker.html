<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keyword Density Checker - 205 Tools</title>
  <meta name="description" content="Analyze keyword density in your content for SEO.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📈 Keyword Density Checker</h1>
      <p>Analyze keyword density in your content for better SEO optimization.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Analyze</h2>
        <div class="lang-selector">
          <a href="../en/keyword-density-checker.html" class="lang-btn active">EN</a><a href="../es/keyword-density-checker.html" class="lang-btn ">ES</a><a href="../fr/keyword-density-checker.html" class="lang-btn ">FR</a><a href="../de/keyword-density-checker.html" class="lang-btn ">DE</a><a href="../ar/keyword-density-checker.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Content Text</label>
        <textarea id="content" rows="10" placeholder="Paste your article or content here..."></textarea>
        <small id="wordCount">0 words</small>
      </div>
      <div class="form-group">
        <label>Target Keyword (optional)</label>
        <input type="text" id="targetKeyword" placeholder="Enter keyword to check density">
      </div>
      <div class="form-group">
        <label>Minimum Word Length</label>
        <input type="number" id="minLength" value="3" min="1" max="10">
      </div>
      <div class="form-group">
        <label>Exclude Common Stop Words</label>
        <input type="checkbox" id="excludeStopWords" checked>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="analyzeDensity()">Analyze</button>
        <button class="btn btn-secondary" onclick="clearFields()">Clear</button>
      </div>
      
      <div id="results" style="display:none; margin-top:20px;">
        <h3>Analysis Results</h3>
        <div id="targetResult" style="display:none; padding:15px; background:#f0f7ff; border-radius:8px; margin-bottom:15px;">
          <strong>Target Keyword:</strong> <span id="targetWord"></span><br>
          <strong>Occurrences:</strong> <span id="targetCount"></span><br>
          <strong>Density:</strong> <span id="targetDensity"></span>%<br>
          <small id="targetAdvice"></small>
        </div>
        <table class="data-table" style="width:100%; border-collapse:collapse;">
          <thead>
            <tr style="background:#f5f5f5;">
              <th style="padding:10px; text-align:left; border-bottom:2px solid #ddd;">Keyword</th>
              <th style="padding:10px; text-align:center; border-bottom:2px solid #ddd;">Count</th>
              <th style="padding:10px; text-align:center; border-bottom:2px solid #ddd;">Density</th>
            </tr>
          </thead>
          <tbody id="resultsTable"></tbody>
        </table>
      </div>
      
      <script>
        const stopWords = new Set(['the', 'be', 'to', 'of', 'and', 'a', 'in', 'that', 'have', 'i', 'it', 'for', 'not', 'on', 'with', 'he', 'as', 'you', 'do', 'at', 'this', 'but', 'his', 'by', 'from', 'they', 'we', 'say', 'her', 'she', 'or', 'an', 'will', 'my', 'one', 'all', 'would', 'there', 'their', 'what', 'so', 'up', 'out', 'if', 'about', 'who', 'get', 'which', 'go', 'me', 'when', 'make', 'can', 'like', 'time', 'no', 'just', 'him', 'know', 'take', 'people', 'into', 'year', 'your', 'good', 'some', 'could', 'them', 'see', 'other', 'than', 'then', 'now', 'look', 'only', 'come', 'its', 'over', 'think', 'also', 'back', 'after', 'use', 'two', 'how', 'our', 'work', 'first', 'well', 'way', 'even', 'new', 'want', 'because', 'any', 'these', 'give', 'day', 'most', 'us']);
        
        document.getElementById('content').addEventListener('input', function() {
          const words = this.value.trim().split(/\s+/).filter(w => w.length > 0);
          document.getElementById('wordCount').textContent = words.length + ' words';
        });
        
        function analyzeDensity() {
          const content = document.getElementById('content').value.trim();
          const targetKeyword = document.getElementById('targetKeyword').value.trim().toLowerCase();
          const minLength = parseInt(document.getElementById('minLength').value) || 3;
          const excludeStop = document.getElementById('excludeStopWords').checked;
          
          if (!content) {
            alert('Please enter some content to analyze');
            return;
          }
          
          // Clean and tokenize
          const cleanContent = content.toLowerCase().replace(/[^a-z0-9\s]/g, ' ');
          const words = cleanContent.split(/\s+/).filter(w => w.length >= minLength);
          const totalWords = content.trim().split(/\s+/).filter(w => w.length > 0).length;
          
          if (totalWords === 0) {
            alert('No words found in content');
            return;
          }
          
          // Count word frequencies
          const wordCounts = {};
          words.forEach(word => {
            if (excludeStop && stopWords.has(word)) return;
            wordCounts[word] = (wordCounts[word] || 0) + 1;
          });
          
          // Sort by frequency
          const sortedWords = Object.entries(wordCounts)
            .sort((a, b) => b[1] - a[1])
            .slice(0, 20);
          
          // Display results
          const tbody = document.getElementById('resultsTable');
          tbody.innerHTML = '';
          
          sortedWords.forEach(([word, count], index) => {
            const density = ((count / totalWords) * 100).toFixed(2);
            const row = document.createElement('tr');
            row.style.background = index % 2 === 0 ? '#fff' : '#f9f9f9';
            row.innerHTML = `
              <td style="padding:10px; border-bottom:1px solid #eee;">${word}</td>
              <td style="padding:10px; text-align:center; border-bottom:1px solid #eee;">${count}</td>
              <td style="padding:10px; text-align:center; border-bottom:1px solid #eee;">${density}%</td>
            `;
            tbody.appendChild(row);
          });
          
          // Target keyword analysis
          if (targetKeyword) {
            const targetRegex = new RegExp('\\b' + targetKeyword.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + '\\b', 'gi');
            const targetMatches = content.match(targetRegex) || [];
            const targetCount = targetMatches.length;
            const targetDensity = ((targetCount / totalWords) * 100).toFixed(2);
            
            document.getElementById('targetWord').textContent = targetKeyword;
            document.getElementById('targetCount').textContent = targetCount;
            document.getElementById('targetDensity').textContent = targetDensity;
            
            let advice = '';
            if (targetDensity < 0.5) {
              advice = '⚠️ Density is low. Consider using the keyword more naturally in your content.';
            } else if (targetDensity > 3) {
              advice = '⚠️ Density is high. Avoid keyword stuffing.';
            } else {
              advice = '✅ Good keyword density (0.5% - 3%).';
            }
            document.getElementById('targetAdvice').textContent = advice;
            document.getElementById('targetResult').style.display = 'block';
          } else {
            document.getElementById('targetResult').style.display = 'none';
          }
          
          document.getElementById('results').style.display = 'block';
        }
        
        function clearFields() {
          document.getElementById('content').value = '';
          document.getElementById('targetKeyword').value = '';
          document.getElementById('wordCount').textContent = '0 words';
          document.getElementById('results').style.display = 'none';
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
</body>
</html>
