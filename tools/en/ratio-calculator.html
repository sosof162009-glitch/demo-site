<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ratio Calculator - 205 Tools</title>
  <meta name="description" content="Calculate ratios and proportions.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .ratio-display { display: flex; align-items: center; justify-content: center; gap: 20px; font-size: 32px; margin: 20px 0; }
    .ratio-box { background: var(--bg-secondary); padding: 20px 30px; border-radius: 12px; min-width: 80px; text-align: center; }
    .ratio-separator { color: var(--primary); font-weight: 700; }
    .simplified { text-align: center; margin-top: 15px; font-size: 18px; color: var(--text-secondary); }
    .simplified strong { color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>⚖️ Ratio Calculator</h1>
      <p>Calculate and simplify ratios</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Calculator</h2>
        <div class="lang-selector">
          <a href="./ratio-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/ratio-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/ratio-calculator.html" class="lang-btn">FR</a>
          <a href="../de/ratio-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/ratio-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-row">
        <div class="form-group">
          <label>First Value</label>
          <input type="number" id="a" value="4" oninput="calculate()">
        </div>
        
        <div class="form-group">
          <label>Second Value</label>
          <input type="number" id="b" value="6" oninput="calculate()">
        </div>
      </div>
      
      <div class="ratio-display">
        <div class="ratio-box" id="displayA">4</div>
        <div class="ratio-separator">:</div>
        <div class="ratio-box" id="displayB">6</div>
      </div>
      
      <div class="simplified">
        Simplified: <strong id="simplified">2:3</strong>
      </div>
      
      <div class="form-group" style="margin-top: 30px;">
        <label>Proportion: If <span id="propA">4</span>:<span id="propB">6</span> = <span id="propC">?</span>:<input type="number" id="propD" value="12" style="width: 80px; display: inline;" oninput="calculateProp()"></label>
        <div style="margin-top: 10px; font-size: 20px; color: var(--primary);" id="propResult">= 8</div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculate()">Simplify</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function gcd(a, b) { return b === 0 ? a : gcd(b, a % b); }
    
    function calculate() {
      const a = parseInt(document.getElementById('a').value) || 0;
      const b = parseInt(document.getElementById('b').value) || 0;
      
      document.getElementById('displayA').textContent = a;
      document.getElementById('displayB').textContent = b;
      document.getElementById('propA').textContent = a;
      document.getElementById('propB').textContent = b;
      
      if (a === 0 || b === 0) {
        document.getElementById('simplified').textContent = '0:0';
        return;
      }
      
      const divisor = gcd(Math.abs(a), Math.abs(b));
      document.getElementById('simplified').textContent = (a / divisor) + ':' + (b / divisor);
      
      calculateProp();
    }
    
    function calculateProp() {
      const a = parseFloat(document.getElementById('a').value) || 0;
      const b = parseFloat(document.getElementById('b').value) || 0;
      const d = parseFloat(document.getElementById('propD').value) || 0;
      
      if (b === 0) { document.getElementById('propResult').textContent = ''; return; }
      
      const c = (a * d) / b;
      document.getElementById('propResult').textContent = '= ' + c.toFixed(2);
    }
    
    function clearAll() {
      document.getElementById('a').value = '';
      document.getElementById('b').value = '';
      document.getElementById('propD').value = '';
      document.getElementById('displayA').textContent = '0';
      document.getElementById('displayB').textContent = '0';
      document.getElementById('simplified').textContent = '';
      document.getElementById('propResult').textContent = '';
    }
    
    calculate();
  </script>
</body>
</html>
