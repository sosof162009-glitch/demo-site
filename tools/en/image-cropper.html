<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Image Cropper - 205 Tools</title>
  <meta name="description" content="Crop images to specific dimensions or aspect ratio.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .upload-area { border: 2px dashed var(--border); padding: 40px; text-align: center; border-radius: 12px; cursor: pointer; }
    .upload-area:hover { border-color: var(--primary); }
    .crop-container { display: none; margin: 20px 0; text-align: center; }
    .crop-container img { max-width: 100%; max-height: 400px; }
    .crop-options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 15px 0; }
    @media (max-width: 600px) { .crop-options { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>✂️ Image Cropper</h1>
      <p>Crop images to specific dimensions</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Upload Image</h2>
        <div class="lang-selector">
          <a href="./image-cropper.html" class="lang-btn active">EN</a>
          <a href="../es/image-cropper.html" class="lang-btn">ES</a>
          <a href="../fr/image-cropper.html" class="lang-btn">FR</a>
          <a href="../de/image-cropper.html" class="lang-btn">DE</a>
          <a href="../ar/image-cropper.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        📁 Click to upload image
        <input type="file" id="fileInput" accept="image/*" style="display: none;" onchange="handleFile(event)">
      </div>
      
      <div class="crop-container" id="cropContainer">
        <canvas id="canvas" style="border: 2px solid var(--border); max-width: 100%;"></canvas>
        
        <div class="crop-options">
          <div class="form-group">
            <label>X</label>
            <input type="number" id="cropX" value="0" min="0">
          </div>
          
          <div class="form-group">
            <label>Y</label>
            <input type="number" id="cropY" value="0" min="0">
          </div>
          
          <div class="form-group">
            <label>Width</label>
            <input type="number" id="cropW" value="100" min="1">
          </div>
          
          <div class="form-group">
            <label>Height</label>
            <input type="number" id="cropH" value="100" min="1">
          </div>
        </div>
        
        <div class="btn-group">
          <button class="btn btn-primary" onclick="applyCrop()">✂️ Crop</button>
          <button class="btn btn-secondary" onclick="setRatio('1:1')">1:1</button>
          <button class="btn btn-secondary" onclick="setRatio('16:9')">16:9</button>
          <button class="btn btn-secondary" onclick="setRatio('4:3')">4:3</button>
          <button class="btn btn-success" onclick="downloadImage()">💾 Download</button>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let originalImage = null;
    let canvas = document.getElementById('canvas');
    let ctx = canvas.getContext('2d');
    
    function handleFile(e) {
      const file = e.target.files[0];
      if (!file || !file.type.startsWith('image/')) { alert('Please select an image'); return; }
      
      const reader = new FileReader();
      reader.onload = (event) => {
        originalImage = new Image();
        originalImage.onload = () => {
          // Scale down for display
          const maxSize = 600;
          let w = originalImage.width;
          let h = originalImage.height;
          
          if (w > maxSize || h > maxSize) {
            const ratio = Math.min(maxSize / w, maxSize / h);
            w *= ratio;
            h *= ratio;
          }
          
          canvas.width = w;
          canvas.height = h;
          ctx.drawImage(originalImage, 0, 0, w, h);
          
          document.getElementById('cropW').value = Math.floor(w / 2);
          document.getElementById('cropH').value = Math.floor(h / 2);
          document.getElementById('cropContainer').style.display = 'block';
          
          // Draw initial crop overlay
          drawCropOverlay();
        };
        originalImage.src = event.target.result;
      };
      reader.readAsDataURL(file);
    }
    
    function drawCropOverlay() {
      if (!originalImage) return;
      
      // Redraw image
      ctx.drawImage(originalImage, 0, 0, canvas.width, canvas.height);
      
      // Get crop values
      const x = parseInt(document.getElementById('cropX').value) || 0;
      const y = parseInt(document.getElementById('cropY').value) || 0;
      const w = parseInt(document.getElementById('cropW').value) || 100;
      const h = parseInt(document.getElementById('cropH').value) || 100;
      
      // Draw dark overlay
      ctx.fillStyle = 'rgba(0, 0, 0, 0.5)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      
      // Clear crop area
      ctx.clearRect(x, y, w, h);
      ctx.drawImage(originalImage, 
        x * (originalImage.width / canvas.width),
        y * (originalImage.height / canvas.height),
        w * (originalImage.width / canvas.width),
        h * (originalImage.height / canvas.height),
        x, y, w, h
      );
      
      // Draw border
      ctx.strokeStyle = '#4f8ef7';
      ctx.lineWidth = 2;
      ctx.strokeRect(x, y, w, h);
    }
    
    ['cropX', 'cropY', 'cropW', 'cropH'].forEach(id => {
      document.getElementById(id).addEventListener('input', drawCropOverlay);
    });
    
    function setRatio(ratio) {
      const w = parseInt(document.getElementById('cropW').value) || 100;
      if (ratio === '1:1') document.getElementById('cropH').value = w;
      if (ratio === '16:9') document.getElementById('cropH').value = Math.floor(w * 9 / 16);
      if (ratio === '4:3') document.getElementById('cropH').value = Math.floor(w * 3 / 4);
      drawCropOverlay();
    }
    
    function applyCrop() {
      if (!originalImage) return;
      
      const x = parseInt(document.getElementById('cropX').value) || 0;
      const y = parseInt(document.getElementById('cropY').value) || 0;
      const w = parseInt(document.getElementById('cropW').value) || 100;
      const h = parseInt(document.getElementById('cropH').value) || 100;
      
      // Create temp canvas for cropped image
      const tempCanvas = document.createElement('canvas');
      tempCanvas.width = w;
      tempCanvas.height = h;
      const tempCtx = tempCanvas.getContext('2d');
      
      tempCtx.drawImage(originalImage,
        x * (originalImage.width / canvas.width),
        y * (originalImage.height / canvas.height),
        w * (originalImage.width / canvas.width),
        h * (originalImage.height / canvas.height),
        0, 0, w, h
      );
      
      // Update main canvas
      canvas.width = w;
      canvas.height = h;
      ctx.drawImage(tempCanvas, 0, 0);
      
      // Reset crop values
      document.getElementById('cropX').value = 0;
      document.getElementById('cropY').value = 0;
      document.getElementById('cropW').value = w;
      document.getElementById('cropH').value = h;
      
      // Update original image for further crops
      originalImage.src = canvas.toDataURL();
    }
    
    function downloadImage() {
      const link = document.createElement('a');
      link.download = 'cropped-image.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
