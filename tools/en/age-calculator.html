<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Age Calculator - 205 Tools</title>
  <meta name="description" content="Calculate your exact age in years, months, days, hours, and minutes.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .age-result { text-align: center; padding: 30px; background: var(--bg-secondary); border-radius: 12px; margin-top: 20px; }
    .age-main { font-size: 36px; font-weight: 700; color: var(--primary); margin-bottom: 15px; }
    .age-details { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 15px; margin-top: 20px; }
    .age-box { background: var(--bg-card); padding: 15px; border-radius: 8px; text-align: center; }
    .age-box .number { font-size: 24px; font-weight: 700; color: var(--primary); }
    .age-box .label { font-size: 12px; color: var(--text-secondary); margin-top: 5px; }
    .next-birthday { margin-top: 20px; padding: 15px; background: var(--primary-light); border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🎂 Age Calculator</h1>
      <p>Calculate your exact age from your birthdate</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Enter Your Birthdate</h2>
        <div class="lang-selector">
          <a href="./age-calculator.html" class="lang-btn active">EN</a>
          <a href="../es/age-calculator.html" class="lang-btn">ES</a>
          <a href="../fr/age-calculator.html" class="lang-btn">FR</a>
          <a href="../de/age-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/age-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Birth Date</label>
        <input type="date" id="birthdate" max="">
      </div>
      
      <div class="form-group">
        <label>Calculate Until (Optional - defaults to today)</label>
        <input type="date" id="enddate">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculateAge()">Calculate Age</button>
        <button class="btn btn-secondary" onclick="resetAge()">Reset</button>
      </div>
      
      <div id="ageResult" class="age-result" style="display: none;">
        <div class="age-main" id="ageMain">--</div>
        
        <div class="age-details">
          <div class="age-box">
            <div class="number" id="ageYears">0</div>
            <div class="label">Years</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageMonths">0</div>
            <div class="label">Months</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageDays">0</div>
            <div class="label">Days</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageHours">0</div>
            <div class="label">Hours</div>
          </div>
          <div class="age-box">
            <div class="number" id="ageMinutes">0</div>
            <div class="label">Minutes</div>
          </div>
        </div>
        
        <div class="next-birthday">
          <strong>🎉 Next Birthday:</strong> <span id="nextBirthday">--</span>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    document.getElementById('birthdate').max = new Date().toISOString().split('T')[0];
    document.getElementById('enddate').value = new Date().toISOString().split('T')[0];
    
    function calculateAge() {
      const birthdate = document.getElementById('birthdate').value;
      const enddate = document.getElementById('enddate').value || new Date().toISOString().split('T')[0];
      
      if (!birthdate) {
        alert('Please enter your birth date');
        return;
      }
      
      const birth = new Date(birthdate);
      const end = new Date(enddate);
      
      if (birth > end) {
        alert('Birth date cannot be in the future');
        return;
      }
      
      let years = end.getFullYear() - birth.getFullYear();
      let months = end.getMonth() - birth.getMonth();
      let days = end.getDate() - birth.getDate();
      
      if (days < 0) {
        months--;
        days += new Date(end.getFullYear(), end.getMonth(), 0).getDate();
      }
      if (months < 0) {
        years--;
        months += 12;
      }
      
      const diffTime = Math.abs(end - birth);
      const totalDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
      const totalHours = Math.floor(diffTime / (1000 * 60 * 60));
      const totalMinutes = Math.floor(diffTime / (1000 * 60));
      
      document.getElementById('ageMain').textContent = `${years} years, ${months} months, ${days} days`;
      document.getElementById('ageYears').textContent = years;
      document.getElementById('ageMonths').textContent = months;
      document.getElementById('ageDays').textContent = days;
      document.getElementById('ageHours').textContent = totalHours.toLocaleString();
      document.getElementById('ageMinutes').textContent = totalMinutes.toLocaleString();
      
      const nextBirthday = new Date(birth);
      nextBirthday.setFullYear(end.getFullYear());
      if (nextBirthday < end) {
        nextBirthday.setFullYear(end.getFullYear() + 1);
      }
      const daysUntil = Math.ceil((nextBirthday - end) / (1000 * 60 * 60 * 24));
      document.getElementById('nextBirthday').textContent = `${nextBirthday.toLocaleDateString()} (${daysUntil} days)`;
      
      document.getElementById('ageResult').style.display = 'block';
    }
    
    function resetAge() {
      document.getElementById('birthdate').value = '';
      document.getElementById('enddate').value = new Date().toISOString().split('T')[0];
      document.getElementById('ageResult').style.display = 'none';
    }
  </script>
</body>
</html>
