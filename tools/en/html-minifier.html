<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML Minifier - 205 Tools</title>
  <meta name="description" content="Minify HTML by removing whitespace and comments.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .stats-bar { display: flex; gap: 20px; padding: 15px; background: var(--bg-secondary); border-radius: 8px; margin: 15px 0; flex-wrap: wrap; }
    .stats-bar span { color: var(--text-secondary); }
    .stats-bar strong { color: var(--primary); }
    .savings { color: #22c55e; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📄 HTML Minifier</h1>
      <p>Remove whitespace and compress HTML</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Input</h2>
        <div class="lang-selector">
          <a href="./html-minifier.html" class="lang-btn active">EN</a>
          <a href="../es/html-minifier.html" class="lang-btn">ES</a>
          <a href="../fr/html-minifier.html" class="lang-btn">FR</a>
          <a href="../de/html-minifier.html" class="lang-btn">DE</a>
          <a href="../ar/html-minifier.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label><input type="checkbox" id="removeComments" checked> Remove HTML comments</label>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Paste HTML code here..."><!-- Sample HTML -->
<div class="container">
  <h1>Hello World</h1>
  <p>This is a paragraph.</p>
</div></textarea>
      </div>
      
      <div class="stats-bar">
        <span>Original: <strong id="originalSize">0</strong> bytes</span>
        <span>Minified: <strong id="minifiedSize">0</strong> bytes</span>
        <span>Savings: <strong id="savings" class="savings">0%</strong></span>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="minify()">🗜️ Minify</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Minified HTML</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function minify() {
      let html = document.getElementById('input').value;
      if (!html) return;
      
      const originalSize = new Blob([html]).size;
      
      // Remove HTML comments if checked
      if (document.getElementById('removeComments').checked) {
        html = html.replace(/<!--[\s\S]*?-->/g, '');
      }
      
      // Minify: collapse whitespace, remove line breaks
      html = html
        .replace(/\r\n/g, '\n')
        .replace(/\n/g, ' ')
        .replace(/\s+/g, ' ')
        .replace(/\s*>\s*/g, '>')
        .replace(/\s*<\s*/g, '<')
        .replace(/\s{2,}/g, ' ')
        .trim();
      
      const minifiedSize = new Blob([html]).size;
      const savings = originalSize > 0 ? ((originalSize - minifiedSize) / originalSize * 100).toFixed(1) : 0;
      
      document.getElementById('output').value = html;
      document.getElementById('originalSize').textContent = originalSize;
      document.getElementById('minifiedSize').textContent = minifiedSize;
      document.getElementById('savings').textContent = savings + '%';
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
      document.getElementById('originalSize').textContent = '0';
      document.getElementById('minifiedSize').textContent = '0';
      document.getElementById('savings').textContent = '0%';
    }
  </script>
</body>
</html>
