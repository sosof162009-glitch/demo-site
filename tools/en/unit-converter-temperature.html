<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unit Converter (Temperature) - 205 Tools</title>
  <meta name="description" content="Convert between temperature units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: end; }
    .swap-btn { padding: 10px 15px; font-size: 20px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
    .temp-formula { background: var(--bg-secondary); padding: 15px; border-radius: 8px; margin-top: 20px; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🌡️ Temperature Converter</h1>
      <p>Convert between temperature units</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./unit-converter-temperature.html" class="lang-btn active">EN</a>
          <a href="../es/unit-converter-temperature.html" class="lang-btn">ES</a>
          <a href="../fr/unit-converter-temperature.html" class="lang-btn">FR</a>
          <a href="../de/unit-converter-temperature.html" class="lang-btn">DE</a>
          <a href="../ar/unit-converter-temperature.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Temperature</label>
        <input type="number" id="value" value="0" step="any" oninput="convert()">
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <select id="fromUnit" onchange="convert()">
            <option value="c">Celsius (°C)</option>
            <option value="f">Fahrenheit (°F)</option>
            <option value="k">Kelvin (K)</option>
            <option value="r">Rankine (°R)</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <select id="toUnit" onchange="convert()">
            <option value="c">Celsius (°C)</option>
            <option value="f" selected>Fahrenheit (°F)</option>
            <option value="k">Kelvin (K)</option>
            <option value="r">Rankine (°R)</option>
          </select>
        </div>
      </div>
      
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-label">Result</div>
        <div class="result-value" id="result">32</div>
        <div class="result-formula" id="formula">0°C = 32°F</div>
      </div>
      
      <div class="temp-formula">
        <strong>Formulas:</strong><br>
        °F = (°C × 9/5) + 32<br>
        °C = (°F - 32) × 5/9<br>
        K = °C + 273.15
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function toCelsius(value, from) {
      switch(from) {
        case 'c': return value;
        case 'f': return (value - 32) * 5/9;
        case 'k': return value - 273.15;
        case 'r': return (value - 491.67) * 5/9;
      }
    }
    
    function fromCelsius(celsius, to) {
      switch(to) {
        case 'c': return celsius;
        case 'f': return (celsius * 9/5) + 32;
        case 'k': return celsius + 273.15;
        case 'r': return (celsius + 273.15) * 9/5;
      }
    }
    
    function convert() {
      const value = parseFloat(document.getElementById('value').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const celsius = toCelsius(value, from);
      const result = fromCelsius(celsius, to);
      
      document.getElementById('result').textContent = result.toLocaleString(undefined, { maximumFractionDigits: 4 });
      
      const symbols = { c: '°C', f: '°F', k: 'K', r: '°R' };
      document.getElementById('formula').textContent = `${value}${symbols[from]} = ${result.toFixed(2)}${symbols[to]}`;
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      convert();
    }
    
    convert();
  </script>
</body>
</html>
