<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JSON to YAML - 205 Tools</title>
  <meta name="description" content="Convert JSON to YAML format.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .editor-split { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .editor-box { display: flex; flex-direction: column; }
    .editor-box label { margin-bottom: 8px; }
    .editor-box textarea { flex: 1; min-height: 300px; }
    @media (max-width: 768px) { .editor-split { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📝 JSON to YAML</h1>
      <p>Convert JSON to YAML format</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./json-to-yaml.html" class="lang-btn active">EN</a>
          <a href="../es/json-to-yaml.html" class="lang-btn">ES</a>
          <a href="../fr/json-to-yaml.html" class="lang-btn">FR</a>
          <a href="../de/json-to-yaml.html" class="lang-btn">DE</a>
          <a href="../ar/json-to-yaml.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="editor-split">
        <div class="editor-box">
          <label>JSON Input</label>
          <textarea id="jsonInput" placeholder='{"name": "John", "age": 30}'>{
  "name": "John Doe",
  "age": 30,
  "city": "New York",
  "hobbies": ["reading", "gaming", "coding"],
  "address": {
    "street": "123 Main St",
    "zip": "10001"
  }
}</textarea>
        </div>
        
        <div class="editor-box">
          <label>YAML Output</label>
          <textarea id="yamlOutput" readonly></textarea>
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="convert()">🔄 Convert</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div id="errorMsg" style="color: #ef4444; margin-top: 10px;"></div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function toYAML(obj, indent = 0) {
      let yaml = '';
      const spaces = '  '.repeat(indent);
      
      if (obj === null) return 'null';
      if (typeof obj === 'boolean') return obj.toString();
      if (typeof obj === 'number') return obj.toString();
      if (typeof obj === 'string') {
        if (obj.includes(':') || obj.includes('#') || obj.includes('\n')) {
          return '"' + obj.replace(/"/g, '\\"') + '"';
        }
        return obj;
      }
      
      if (Array.isArray(obj)) {
        if (obj.length === 0) return '[]';
        for (const item of obj) {
          if (typeof item === 'object' && item !== null) {
            yaml += spaces + '-\n';
            const itemYaml = toYAML(item, indent + 1);
            yaml += itemYaml.split('\n').map((line, i) => i === 0 && !line.trim().startsWith('-') ? spaces + '  ' + line : line).join('\n');
          } else {
            yaml += spaces + '- ' + toYAML(item, 0) + '\n';
          }
        }
        return yaml.trim();
      }
      
      if (typeof obj === 'object') {
        const keys = Object.keys(obj);
        if (keys.length === 0) return '{}';
        for (const key of keys) {
          const value = obj[key];
          if (typeof value === 'object' && value !== null && !Array.isArray(value)) {
            yaml += spaces + key + ':\n';
            yaml += toYAML(value, indent + 1) + '\n';
          } else if (Array.isArray(value)) {
            yaml += spaces + key + ':\n';
            yaml += toYAML(value, indent + 1) + '\n';
          } else {
            yaml += spaces + key + ': ' + toYAML(value, 0) + '\n';
          }
        }
        return yaml.trim();
      }
      
      return String(obj);
    }
    
    function convert() {
      const json = document.getElementById('jsonInput').value;
      if (!json) return;
      
      try {
        const obj = JSON.parse(json);
        document.getElementById('yamlOutput').value = toYAML(obj);
        document.getElementById('errorMsg').textContent = '';
      } catch (e) {
        document.getElementById('errorMsg').textContent = 'Invalid JSON: ' + e.message;
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('yamlOutput').value);
      alert('Copied!');
    }
    
    function clearAll() {
      document.getElementById('jsonInput').value = '';
      document.getElementById('yamlOutput').value = '';
      document.getElementById('errorMsg').textContent = '';
    }
    
    convert();
  </script>
</body>
</html>
