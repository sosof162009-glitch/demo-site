<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SHA512 Generator - 205 Tools</title>
  <meta name="description" content="Generate SHA512 hashes from text.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔒 SHA512 Generator</h1>
      <p>Generate SHA512 hashes from text.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Options</h2>
        <div class="lang-selector">
          <a href="../en/sha512-generator.html" class="lang-btn active">EN</a><a href="../es/sha512-generator.html" class="lang-btn ">ES</a><a href="../fr/sha512-generator.html" class="lang-btn ">FR</a><a href="../de/sha512-generator.html" class="lang-btn ">DE</a><a href="../ar/sha512-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Input Text</label>
        <textarea id="inputText" rows="8" placeholder="Enter your text here..."></textarea>
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="uppercase"> Output Uppercase</label>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateSHA512()">Generate SHA512</button>
        <button class="btn btn-secondary" onclick="resetText()">Reset</button>
      </div>
      <div class="form-group" style="margin-top: 20px;">
        <label>SHA512 Hash</label>
        <textarea id="outputText" rows="6" readonly></textarea>
      </div>
      <button class="btn btn-success" data-success="Copied!" onclick="copyToClipboard(document.getElementById('outputText').value, this)">Copy</button>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Tools</p>
    </footer>
  </div>
  
  <script>
    // SHA512 Implementation using Web Crypto API
    async function generateSHA512() {
      const text = document.getElementById('inputText').value;
      const uppercase = document.getElementById('uppercase').checked;
      
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-512', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      let hash = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      
      if (uppercase) hash = hash.toUpperCase();
      document.getElementById('outputText').value = hash;
    }
    
    function resetText() {
      document.getElementById('inputText').value = '';
      document.getElementById('outputText').value = '';
    }
  </script>
</body>
</html>
