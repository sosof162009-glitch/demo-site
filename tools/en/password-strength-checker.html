<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Strength Checker - 205 Tools</title>
  <meta name="description" content="Check the strength of your passwords with visual feedback.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .strength-meter { height: 8px; background: var(--bg-card); border-radius: 4px; margin: 20px 0; overflow: hidden; }
    .strength-bar { height: 100%; width: 0; transition: all 0.3s; border-radius: 4px; }
    .strength-weak { background: #ef4444; }
    .strength-fair { background: #f59e0b; }
    .strength-good { background: #eab308; }
    .strength-strong { background: #22c55e; }
    .strength-excellent { background: #16a34a; }
    .strength-text { font-size: 18px; font-weight: 600; text-align: center; margin-bottom: 10px; }
    .password-checks { display: grid; gap: 10px; margin-top: 20px; }
    .check-item { display: flex; align-items: center; gap: 10px; padding: 10px; background: var(--bg-secondary); border-radius: 8px; }
    .check-item.pass { color: #22c55e; }
    .check-item.fail { color: #6b7280; }
    .check-icon { width: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔐 Password Strength Checker</h1>
      <p>Check how strong your password is</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Check Password</h2>
        <div class="lang-selector">
          <a href="./password-strength-checker.html" class="lang-btn active">EN</a>
          <a href="../es/password-strength-checker.html" class="lang-btn">ES</a>
          <a href="../fr/password-strength-checker.html" class="lang-btn">FR</a>
          <a href="../de/password-strength-checker.html" class="lang-btn">DE</a>
          <a href="../ar/password-strength-checker.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Enter Password</label>
        <input type="password" id="password" placeholder="Type your password..." oninput="checkStrength()">
      </div>
      
      <div class="strength-text" id="strengthText">Enter a password</div>
      
      <div class="strength-meter">
        <div class="strength-bar" id="strengthBar"></div>
      </div>
      
      <div class="password-checks">
        <div class="check-item fail" id="lengthCheck">
          <span class="check-icon">○</span> At least 8 characters
        </div>
        
        <div class="check-item fail" id="upperCheck">
          <span class="check-icon">○</span> Uppercase letter (A-Z)
        </div>
        
        <div class="check-item fail" id="lowerCheck">
          <span class="check-icon">○</span> Lowercase letter (a-z)
        </div>
        
        <div class="check-item fail" id="numberCheck">
          <span class="check-icon">○</span> Number (0-9)
        </div>
        
        <div class="check-item fail" id="specialCheck">
          <span class="check-icon">○</span> Special character (!@#$...)
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function checkStrength() {
      const password = document.getElementById('password').value;
      
      const hasLength = password.length >= 8;
      const hasUpper = /[A-Z]/.test(password);
      const hasLower = /[a-z]/.test(password);
      const hasNumber = /\d/.test(password);
      const hasSpecial = /[!@#$%^&*()_+\-=\[\]{};':"\\|,.\/?]/.test(password);
      
      updateCheck('lengthCheck', hasLength);
      updateCheck('upperCheck', hasUpper);
      updateCheck('lowerCheck', hasLower);
      updateCheck('numberCheck', hasNumber);
      updateCheck('specialCheck', hasSpecial);
      
      let score = 0;
      if (hasLength) score++;
      if (hasUpper) score++;
      if (hasLower) score++;
      if (hasNumber) score++;
      if (hasSpecial) score++;
      if (password.length >= 12) score++;
      if (password.length >= 16) score++;
      
      const bar = document.getElementById('strengthBar');
      const text = document.getElementById('strengthText');
      
      let strengthClass = '';
      let strengthLabel = '';
      let width = (score / 7) * 100;
      
      if (password.length === 0) {
        width = 0;
        strengthLabel = 'Enter a password';
      } else if (score <= 2) {
        strengthClass = 'strength-weak';
        strengthLabel = 'Weak 🔴';
      } else if (score <= 3) {
        strengthClass = 'strength-fair';
        strengthLabel = 'Fair 🟡';
      } else if (score <= 4) {
        strengthClass = 'strength-good';
        strengthLabel = 'Good 🟡';
      } else if (score <= 5) {
        strengthClass = 'strength-strong';
        strengthLabel = 'Strong 🟢';
      } else {
        strengthClass = 'strength-excellent';
        strengthLabel = 'Excellent 🟢';
      }
      
      bar.className = 'strength-bar ' + strengthClass;
      bar.style.width = width + '%';
      text.textContent = strengthLabel;
    }
    
    function updateCheck(id, pass) {
      const el = document.getElementById(id);
      el.className = 'check-item ' + (pass ? 'pass' : 'fail');
      el.querySelector('.check-icon').textContent = pass ? '✓' : '○';
    }
  </script>
</body>
</html>
