<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL Encoder/Decoder - 205 Tools</title>
  <meta name="description" content="Encode and decode URLs and URL components.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .mode-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
    .mode-toggle button { flex: 1; padding: 12px; border: 2px solid var(--border); background: var(--bg-card); color: var(--text-secondary); border-radius: 8px; cursor: pointer; }
    .mode-toggle button.active { border-color: var(--primary); background: var(--primary-light); color: var(--primary); }
    .result-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; margin-top: 15px; font-family: monospace; word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔗 URL Encoder/Decoder</h1>
      <p>Encode and decode URLs and URL components</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./url-encoder.html" class="lang-btn active">EN</a>
          <a href="../es/url-encoder.html" class="lang-btn">ES</a>
          <a href="../fr/url-encoder.html" class="lang-btn">FR</a>
          <a href="../de/url-encoder.html" class="lang-btn">DE</a>
          <a href="../ar/url-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="mode-toggle">
        <button class="active" id="encodeBtn" onclick="setMode('encode')">🔒 Encode</button>
        <button id="decodeBtn" onclick="setMode('decode')">🔓 Decode</button>
      </div>
      
      <div class="form-group">
        <label id="inputLabel">Text to Encode</label>
        <textarea id="inputText" rows="4" placeholder="Enter URL or text..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="convert()">Convert</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div id="resultBox" style="display: none;">
        <label>Result</label>
        <div class="result-box" id="outputText"></div>
        <div class="btn-group" style="margin-top: 10px;">
          <button class="btn btn-success" onclick="copyResult()">📋 Copy</button>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    let mode = 'encode';
    
    function setMode(newMode) {
      mode = newMode;
      document.getElementById('encodeBtn').classList.toggle('active', mode === 'encode');
      document.getElementById('decodeBtn').classList.toggle('active', mode === 'decode');
      document.getElementById('inputLabel').textContent = mode === 'encode' ? 'Text to Encode' : 'URL to Decode';
      clearAll();
    }
    
    function convert() {
      const input = document.getElementById('inputText').value;
      if (!input) { alert('Please enter text'); return; }
      
      try {
        let result;
        if (mode === 'encode') {
          result = encodeURIComponent(input);
        } else {
          result = decodeURIComponent(input);
        }
        document.getElementById('outputText').textContent = result;
        document.getElementById('resultBox').style.display = 'block';
      } catch (e) {
        alert('Error: ' + e.message);
      }
    }
    
    function clearAll() {
      document.getElementById('inputText').value = '';
      document.getElementById('resultBox').style.display = 'none';
    }
    
    function copyResult() {
      const text = document.getElementById('outputText').textContent;
      navigator.clipboard.writeText(text);
      alert('Copied!');
    }
  </script>
</body>
</html>
