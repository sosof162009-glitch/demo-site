<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Text Repeater - 205 Tools</title>
  <meta name="description" content="Repeat text multiple times with various options.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🔄 Text Repeater</h1>
      <p>Repeat text multiple times with custom options</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Input</h2>
        <div class="lang-selector">
          <a href="./text-repeater.html" class="lang-btn active">EN</a>
          <a href="../es/text-repeater.html" class="lang-btn">ES</a>
          <a href="../fr/text-repeater.html" class="lang-btn">FR</a>
          <a href="../de/text-repeater.html" class="lang-btn">DE</a>
          <a href="../ar/text-repeater.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Text to Repeat</label>
        <input type="text" id="textInput" placeholder="Enter text to repeat...">
      </div>
      
      <div class="form-group">
        <label>Repeat Count</label>
        <input type="number" id="repeatCount" value="10" min="1" max="1000">
      </div>
      
      <div class="form-group">
        <label>Separator</label>
        <select id="separator">
          <option value="">None</option>
          <option value=" ">Space</option>
          <option value="\n">New Line</option>
          <option value=",">Comma</option>
          <option value=" - ">Dash</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="repeatText()">Repeat</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Result</label>
        <textarea id="output" rows="8" readonly placeholder="Repeated text will appear here..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copy Result</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function repeatText() {
      const text = document.getElementById('textInput').value;
      const count = parseInt(document.getElementById('repeatCount').value) || 10;
      const separator = document.getElementById('separator').value;
      
      if (!text) return;
      
      const result = Array(count).fill(text).join(separator);
      document.getElementById('output').value = result;
    }
    
    function clearAll() {
      document.getElementById('textInput').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('Copied to clipboard!');
    }
  </script>
</body>
</html>
