<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WhatsApp Link Generator | 205 Tools</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../assets/css/tools.css">
</head>
<body>
  <div class="lang-selector">
    <select onchange="window.location.href=this.value">
      <option value="whatsapp-link-generator.html" selected>English</option>
      <option value="../ar/whatsapp-link-generator.html">العربية</option>
      <option value="../fr/whatsapp-link-generator.html">Français</option>
      <option value="../es/whatsapp-link-generator.html">Español</option>
      <option value="../de/whatsapp-link-generator.html">Deutsch</option>
    </select>
  </div>

  <div class="tool-container">
    <header class="tool-header">
      <h1>WhatsApp Link Generator</h1>
      <p>Create clickable WhatsApp links with pre-filled messages</p>
    </header>

    <div class="tool-card">
      <div class="input-group">
        <label for="phone-input">Phone Number (with country code):</label>
        <input type="text" id="phone-input" class="tool-input" placeholder="e.g., +1234567890">
        <small class="help-text">Include country code without spaces or dashes</small>
      </div>

      <div class="input-group">
        <label for="message-input">Pre-filled Message (optional):</label>
        <textarea id="message-input" class="tool-textarea" placeholder="Enter your message..."></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateLink()">Generate Link</button>
        <button class="btn btn-secondary" onclick="clearAll()">Clear</button>
      </div>

      <div class="input-group" style="margin-top: 20px;">
        <label for="link-output">Generated Link:</label>
        <textarea id="link-output" class="tool-textarea" placeholder="Your WhatsApp link will appear here..." readonly></textarea>
      </div>

      <div class="btn-group">
        <button class="btn btn-success" onclick="copyLink()">Copy Link</button>
        <button class="btn btn-primary" onclick="openLink()">Open Link</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">
    <div class="toast-icon">✓</div>
    <span>Copied!</span>
  </div>

  <script>
    function generateLink() {
      const phone = document.getElementById('phone-input').value.trim();
      const message = document.getElementById('message-input').value.trim();
      
      if (!phone) {
        alert('Please enter a phone number');
        return;
      }
      
      // Remove non-digit characters from phone
      const cleanPhone = phone.replace(/\D/g, '');
      
      let link = `https://wa.me/${cleanPhone}`;
      if (message) {
        link += `?text=${encodeURIComponent(message)}`;
      }
      
      document.getElementById('link-output').value = link;
    }

    function copyLink() {
      const output = document.getElementById('link-output');
      if (!output.value) {
        alert('No link to copy. Generate a link first.');
        return;
      }
      output.select();
      document.execCommand('copy');
      showToast();
    }

    function openLink() {
      const link = document.getElementById('link-output').value;
      if (!link) {
        alert('No link to open. Generate a link first.');
        return;
      }
      window.open(link, '_blank');
    }

    function showToast() {
      const toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(() => toast.classList.remove('show'), 2000);
    }

    function clearAll() {
      document.getElementById('phone-input').value = '';
      document.getElementById('message-input').value = '';
      document.getElementById('link-output').value = '';
    }
  </script>
</body>
</html>
