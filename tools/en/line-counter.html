<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Line Counter - 205 Tools</title>
  <meta name="description" content="Count lines, empty lines, and analyze line statistics.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
    .stat-box { background: var(--bg-secondary); padding: 20px; border-radius: 12px; text-align: center; }
    .stat-box .number { font-size: 36px; font-weight: 700; color: var(--primary); }
    .stat-box .label { font-size: 13px; color: var(--text-secondary); margin-top: 5px; }
    .line-preview { background: var(--bg-secondary); padding: 15px; border-radius: 8px; margin-top: 20px; max-height: 300px; overflow-y: auto; font-family: monospace; font-size: 13px; }
    .line-item { padding: 4px 8px; border-bottom: 1px solid var(--border); }
    .line-item.empty { color: var(--text-muted); font-style: italic; }
    .line-number { color: var(--text-muted); margin-right: 10px; width: 40px; display: inline-block; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>📏 Line Counter</h1>
      <p>Count lines and analyze text structure</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Text Input</h2>
        <div class="lang-selector">
          <a href="./line-counter.html" class="lang-btn active">EN</a>
          <a href="../es/line-counter.html" class="lang-btn">ES</a>
          <a href="../fr/line-counter.html" class="lang-btn">FR</a>
          <a href="../de/line-counter.html" class="lang-btn">DE</a>
          <a href="../ar/line-counter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="textInput" rows="8" placeholder="Paste your text here..." oninput="countLines()"></textarea>
      </div>
      
      <div class="stats-grid">
        <div class="stat-box">
          <div class="number" id="totalLines">0</div>
          <div class="label">Total Lines</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="nonEmptyLines">0</div>
          <div class="label">Non-Empty</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="emptyLines">0</div>
          <div class="label">Empty Lines</div>
        </div>
        
        <div class="stat-box">
          <div class="number" id="avgLength">0</div>
          <div class="label">Avg Length</div>
        </div>
      </div>
      
      <div id="previewBox" style="display: none;">
        <label>Line Preview</label>
        <div class="line-preview" id="linePreview"></div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="clearText()">Clear</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    function countLines() {
      const text = document.getElementById('textInput').value;
      
      if (!text) {
        document.getElementById('totalLines').textContent = '0';
        document.getElementById('nonEmptyLines').textContent = '0';
        document.getElementById('emptyLines').textContent = '0';
        document.getElementById('avgLength').textContent = '0';
        document.getElementById('previewBox').style.display = 'none';
        return;
      }
      
      const lines = text.split('\n');
      const total = lines.length;
      const empty = lines.filter(l => !l.trim()).length;
      const nonEmpty = total - empty;
      const avg = nonEmpty > 0 ? Math.round(lines.filter(l => l.trim()).reduce((a, b) => a + b.length, 0) / nonEmpty) : 0;
      
      document.getElementById('totalLines').textContent = total;
      document.getElementById('nonEmptyLines').textContent = nonEmpty;
      document.getElementById('emptyLines').textContent = empty;
      document.getElementById('avgLength').textContent = avg;
      
      // Preview
      const preview = lines.slice(0, 50).map((line, i) => {
        const isEmpty = !line.trim();
        const display = isEmpty ? '(empty)' : line.substring(0, 80) + (line.length > 80 ? '...' : '');
        return `<div class="line-item ${isEmpty ? 'empty' : ''}"><span class="line-number">${i + 1}</span>${escapeHtml(display)}</div>`;
      }).join('');
      
      document.getElementById('linePreview').innerHTML = preview + (lines.length > 50 ? '<div class="line-item">... and ' + (lines.length - 50) + ' more lines</div>' : '');
      document.getElementById('previewBox').style.display = 'block';
    }
    
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }
    
    function clearText() {
      document.getElementById('textInput').value = '';
      countLines();
    }
  </script>
</body>
</html>
