<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>vCard Generator - 205 Tools</title>
  <meta name="description" content="Generate vCard contact files for easy sharing.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .output-box { background: var(--bg-secondary); padding: 15px; border-radius: 8px; font-family: monospace; font-size: 13px; overflow-x: auto; white-space: pre-wrap; }
    .form-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 15px; }
    .qr-preview { text-align: center; padding: 20px; }
    #qrcode { display: inline-block; padding: 10px; background: white; border-radius: 8px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    <header><h1>👤 vCard Generator</h1><p>Generate vCard contact files and QR codes</p></header>
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generator</h2>
        <div class="lang-selector">
          <a href="./vcard-generator.html" class="lang-btn active">EN</a>
          <a href="../es/vcard-generator.html" class="lang-btn">ES</a>
          <a href="../fr/vcard-generator.html" class="lang-btn">FR</a>
          <a href="../de/vcard-generator.html" class="lang-btn">DE</a>
          <a href="../ar/vcard-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>First Name</label><input type="text" id="firstName" placeholder="John"></div>
        <div class="form-group"><label>Last Name</label><input type="text" id="lastName" placeholder="Doe"></div>
        <div class="form-group"><label>Phone</label><input type="tel" id="phone" placeholder="+1 234 567 890"></div>
        <div class="form-group"><label>Email</label><input type="email" id="email" placeholder="john@example.com"></div>
        <div class="form-group"><label>Organization</label><input type="text" id="org" placeholder="Company Inc."></div>
        <div class="form-group"><label>Job Title</label><input type="text" id="title" placeholder="Manager"></div>
        <div class="form-group"><label>Website</label><input type="url" id="url" placeholder="https://example.com"></div>
        <div class="form-group"><label>Address</label><input type="text" id="address" placeholder="123 Main St, City"></div>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateVCard()">🔄 Generate</button>
        <button class="btn btn-secondary" onclick="loadExample()">Example</button>
        <button class="btn btn-success" onclick="copyVCard()">📋 Copy</button>
        <button class="btn btn-secondary" onclick="downloadVCard()">💾 Download</button>
      </div>
      <div id="outputSection" style="margin-top: 20px; display: none;">
        <div class="qr-preview">
          <label>QR Code</label>
          <div id="qrcode"></div>
        </div>
        <label style="margin-top: 20px; display: block;">vCard Output</label>
        <pre id="vcardOutput" class="output-box"></pre>
      </div>
    </div>
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <script>
    let currentVCard = '';
    function generateVCard() {
      const fn = document.getElementById('firstName').value.trim();
      const ln = document.getElementById('lastName').value.trim();
      const phone = document.getElementById('phone').value.trim();
      const email = document.getElementById('email').value.trim();
      const org = document.getElementById('org').value.trim();
      const title = document.getElementById('title').value.trim();
      const url = document.getElementById('url').value.trim();
      const address = document.getElementById('address').value.trim();
      if (!fn && !ln) { alert('Please enter at least a name'); return; }
      let vcard = 'BEGIN:VCARD\nVERSION:3.0\n';
      vcard += 'N:' + ln + ';' + fn + ';;;\n';
      vcard += 'FN:' + fn + ' ' + ln + '\n';
      if (phone) vcard += 'TEL;TYPE=CELL:' + phone + '\n';
      if (email) vcard += 'EMAIL;TYPE=WORK:' + email + '\n';
      if (org) vcard += 'ORG:' + org + '\n';
      if (title) vcard += 'TITLE:' + title + '\n';
      if (url) vcard += 'URL:' + url + '\n';
      if (address) vcard += 'ADR;TYPE=WORK:;;' + address + ';;;;\n';
      vcard += 'END:VCARD';
      currentVCard = vcard;
      document.getElementById('vcardOutput').textContent = vcard;
      document.getElementById('qrcode').innerHTML = '';
      new QRCode(document.getElementById('qrcode'), { text: vcard, width: 200, height: 200 });
      document.getElementById('outputSection').style.display = 'block';
    }
    function loadExample() {
      document.getElementById('firstName').value = 'John';
      document.getElementById('lastName').value = 'Doe';
      document.getElementById('phone').value = '+1 555 123 4567';
      document.getElementById('email').value = 'john.doe@example.com';
      document.getElementById('org').value = 'Example Corp';
      document.getElementById('title').value = 'Senior Manager';
      document.getElementById('url').value = 'https://example.com';
      document.getElementById('address').value = '123 Business Ave, New York, NY 10001';
      generateVCard();
    }
    function copyVCard() { navigator.clipboard.writeText(currentVCard); alert('Copied!'); }
    function downloadVCard() {
      const fn = document.getElementById('firstName').value || 'contact';
      const ln = document.getElementById('lastName').value || '';
      const blob = new Blob([currentVCard], { type: 'text/vcard' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = fn + '_' + ln + '.vcf';
      a.click();
      URL.revokeObjectURL(url);
    }
  </script>
</body>
</html>
