<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Time Converter - 205 Tools</title>
  <meta name="description" content="Convert time between different units.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-grid { display: grid; grid-template-columns: 1fr auto 1fr; gap: 15px; align-items: center; margin: 20px 0; }
    .swap-btn { font-size: 24px; padding: 10px; }
    @media (max-width: 600px) { .converter-grid { grid-template-columns: 1fr; } .swap-btn { transform: rotate(90deg); } }
    .presets { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 15px; }
    .presets button { flex: 1; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>⏰ Time Converter</h1>
      <p>Convert between time units</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./time-converter.html" class="lang-btn active">EN</a>
          <a href="../es/time-converter.html" class="lang-btn">ES</a>
          <a href="../fr/time-converter.html" class="lang-btn">FR</a>
          <a href="../de/time-converter.html" class="lang-btn">DE</a>
          <a href="../ar/time-converter.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="converter-grid">
        <div class="form-group">
          <label>From</label>
          <input type="number" id="fromValue" value="1" step="any" oninput="convert()">
          <select id="fromUnit" onchange="convert()">
            <option value="ms">Milliseconds</option>
            <option value="s">Seconds</option>
            <option value="m">Minutes</option>
            <option value="h" selected>Hours</option>
            <option value="d">Days</option>
            <option value="w">Weeks</option>
            <option value="mo">Months (30d)</option>
            <option value="y">Years (365d)</option>
          </select>
        </div>
        
        <button class="btn btn-secondary swap-btn" onclick="swap()">⇄</button>
        
        <div class="form-group">
          <label>To</label>
          <input type="number" id="toValue" readonly>
          <select id="toUnit" onchange="convert()">
            <option value="ms">Milliseconds</option>
            <option value="s">Seconds</option>
            <option value="m">Minutes</option>
            <option value="h">Hours</option>
            <option value="d">Days</option>
            <option value="w">Weeks</option>
            <option value="mo">Months (30d)</option>
            <option value="y" selected>Years (365d)</option>
          </select>
        </div>
      </div>
      
      <div class="presets">
        <button class="btn btn-sm btn-secondary" onclick="setPreset(1, 'h', 'm')">1 hour = ? min</button>
        <button class="btn btn-sm btn-secondary" onclick="setPreset(24, 'h', 'd')">24 hours = ? days</button>
        <button class="btn btn-sm btn-secondary" onclick="setPreset(7, 'd', 'w')">7 days = ? weeks</button>
        <button class="btn btn-sm btn-secondary" onclick="setPreset(365, 'd', 'y')">365 days = ? years</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Free Online Tools</p></footer>
  </div>
  
  <script>
    const toSeconds = {
      ms: 0.001,
      s: 1,
      m: 60,
      h: 3600,
      d: 86400,
      w: 604800,
      mo: 2592000,
      y: 31536000
    };
    
    function convert() {
      const value = parseFloat(document.getElementById('fromValue').value) || 0;
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      
      const seconds = value * toSeconds[from];
      const result = seconds / toSeconds[to];
      
      document.getElementById('toValue').value = result.toLocaleString(undefined, { maximumFractionDigits: 10 });
    }
    
    function swap() {
      const from = document.getElementById('fromUnit').value;
      const to = document.getElementById('toUnit').value;
      const value = document.getElementById('toValue').value;
      
      document.getElementById('fromUnit').value = to;
      document.getElementById('toUnit').value = from;
      document.getElementById('fromValue').value = value;
      
      convert();
    }
    
    function setPreset(value, from, to) {
      document.getElementById('fromValue').value = value;
      document.getElementById('fromUnit').value = from;
      document.getElementById('toUnit').value = to;
      convert();
    }
    
    // Initial conversion
    convert();
  </script>
</body>
</html>
