<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Passwort Generator - Sicheres Tool</title>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:600px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        .output{display:flex;gap:0.5rem;margin-bottom:1.5rem}
        #password{flex:1;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-size:1.1rem;font-family:monospace}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s}
        button:hover{opacity:0.9}
        .options{display:grid;grid-template-columns:repeat(2,1fr);gap:1rem;margin-bottom:1.5rem}
        .option{display:flex;align-items:center;gap:0.5rem}
        .option input{width:18px;height:18px;accent-color:var(--primary)}
        .slider-container{margin-bottom:1.5rem}
        .slider-container label{display:block;margin-bottom:0.5rem;color:var(--text2)}
        input[type=range]{width:100%;accent-color:var(--primary)}
        .strength{text-align:center;padding:0.75rem;border-radius:8px;margin-top:1rem;font-weight:bold}
        .strength-weak{background:#ff4444}
        .strength-medium{background:#ffaa00}
        .strength-strong{background:#00ff88;color:#000}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="en/password-generator.html">EN</a>
        <a href="zh/password-generator.html">中文</a>
        <a href="es/password-generator.html">ES</a>
        <a href="fr/password-generator.html">FR</a>
        <a href="de/password-generator.html" class="active">DE</a>
    </div>
    <div class="container">
        <h1>🔐 Passwort Generator</h1>
        <div class="card">
            <div class="output">
                <input type="text" id="password" readonly placeholder="Klicke auf Generieren">
                <button onclick="copyPassword()">Kopieren</button>
            </div>
            <div class="slider-container">
                <label>Länge: <span id="lengthVal">16</span></label>
                <input type="range" id="length" min="4" max="64" value="16">
            </div>
            <div class="options">
                <label class="option"><input type="checkbox" id="uppercase" checked> Großbuchstaben (A-Z)</label>
                <label class="option"><input type="checkbox" id="lowercase" checked> Kleinbuchstaben (a-z)</label>
                <label class="option"><input type="checkbox" id="numbers" checked> Zahlen (0-9)</label>
                <label class="option"><input type="checkbox" id="symbols" checked> Symbole (!@#$%)</label>
            </div>
            <button onclick="generate()" style="width:100%">Passwort Generieren</button>
            <div id="strength" class="strength" style="display:none"></div>
        </div>
    </div>
    <script>
        const lengthSlider=document.getElementById('length');
        const lengthVal=document.getElementById('lengthVal');
        lengthSlider.oninput=()=>{lengthVal.textContent=lengthSlider.value;generate()};
        function generate(){
            const len=parseInt(lengthSlider.value);
            const useUpper=document.getElementById('uppercase').checked;
            const useLower=document.getElementById('lowercase').checked;
            const useNum=document.getElementById('numbers').checked;
            const useSym=document.getElementById('symbols').checked;
            let chars='';
            if(useUpper)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if(useLower)chars+='abcdefghijklmnopqrstuvwxyz';
            if(useNum)chars+='0123456789';
            if(useSym)chars+='!@#$%^&*()_+-=[]{}|;:,.<>?';
            if(!chars){document.getElementById('password').value='Optionen wählen';return}
            let pwd='';
            const arr=new Uint32Array(len);
            crypto.getRandomValues(arr);
            for(let i=0;i<len;i++)pwd+=chars[arr[i]%chars.length];
            document.getElementById('password').value=pwd;
            checkStrength(pwd);
        }
        function checkStrength(pwd){
            let score=0;
            if(pwd.length>=12)score++;
            if(pwd.length>=16)score++;
            if(/[A-Z]/.test(pwd))score++;
            if(/[a-z]/.test(pwd))score++;
            if(/[0-9]/.test(pwd))score++;
            if(/[^A-Za-z0-9]/.test(pwd))score++;
            const el=document.getElementById('strength');
            el.style.display='block';
            if(score<=2){el.className='strength strength-weak';el.textContent='Schwaches Passwort'}
            else if(score<=4){el.className='strength strength-medium';el.textContent='Mittlere Stärke'}
            else{el.className='strength strength-strong';el.textContent='Starkes Passwort'}
        }
        function copyPassword(){
            const pwd=document.getElementById('password');
            if(pwd.value){pwd.select();document.execCommand('copy');alert('Kopiert!')}
        }
        generate();
    </script>
</body>
</html>
