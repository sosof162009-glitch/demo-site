<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HTML实体编码/解码</title>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:700px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-size:1rem;min-height:120px;resize:vertical;margin-bottom:1rem;font-family:monospace}
        .buttons{display:flex;gap:0.5rem;margin-bottom:1rem}
        button{flex:1;background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s}
        button:hover{opacity:0.9}
        .output{display:flex;gap:0.5rem}
        #result{flex:1;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-family:monospace;word-break:break-all}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="en/html-entity.html">EN</a>
        <a href="zh/html-entity.html" class="active">中文</a>
        <a href="es/html-entity.html">ES</a>
        <a href="fr/html-entity.html">FR</a>
        <a href="de/html-entity.html">DE</a>
    </div>
    <div class="container">
        <h1>🌐 HTML实体编码/解码</h1>
        <div class="card">
            <textarea id="input" placeholder="输入要编码的文本或HTML实体..."></textarea>
            <div class="buttons">
                <button onclick="encode()">编码实体</button>
                <button onclick="decode()">解码实体</button>
            </div>
            <div class="output">
                <input type="text" id="result" readonly placeholder="结果将显示在这里...">
                <button onclick="copyResult()">复制</button>
            </div>
        </div>
    </div>
    <script>
        function encode(){const textarea=document.createElement('textarea');textarea.textContent=document.getElementById('input').value;document.getElementById('result').value=textarea.innerHTML}
        function decode(){const textarea=document.createElement('textarea');textarea.innerHTML=document.getElementById('input').value;document.getElementById('result').value=textarea.textContent}
        function copyResult(){const el=document.getElementById('result');if(el.value){el.select();document.execCommand('copy');alert('已复制!')}}
    </script>
</body>
</html>
