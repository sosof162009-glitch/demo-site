<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Strength Checker</title>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:600px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        input[type="password"],input[type="text"]{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-size:1rem;margin-bottom:1rem}
        .meter{height:8px;background:var(--bg);border-radius:4px;overflow:hidden;margin-bottom:1rem}
        .meter-fill{height:100%;width:0%;transition:all 0.3s}
        .meter-weak{background:#ff4444}
        .meter-medium{background:#ffaa00}
        .meter-strong{background:#00ff88}
        .score{text-align:center;font-size:1.5rem;font-weight:bold;margin-bottom:1rem}
        .checks{list-style:none}
        .checks li{display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;color:var(--text2)}
        .checks li.pass{color:#00ff88}
        .checks li::before{content:"✗";font-weight:bold}
        .checks li.pass::before{content:"✓"}
        .toggle{display:flex;align-items:center;gap:0.5rem;margin-bottom:1rem;cursor:pointer}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="en/password-strength.html" class="active">EN</a>
        <a href="zh/password-strength.html">中文</a>
        <a href="es/password-strength.html">ES</a>
        <a href="fr/password-strength.html">FR</a>
        <a href="de/password-strength.html">DE</a>
    </div>
    <div class="container">
        <h1>🔍 Password Strength Checker</h1>
        <div class="card">
            <input type="password" id="password" placeholder="Enter password to check">
            <label class="toggle"><input type="checkbox" id="showPwd"> Show Password</label>
            <div class="meter"><div id="meterFill" class="meter-fill"></div></div>
            <div id="score" class="score">Enter a password</div>
            <ul class="checks">
                <li id="len8">At least 8 characters</li>
                <li id="len12">At least 12 characters</li>
                <li id="upper">Uppercase letter (A-Z)</li>
                <li id="lower">Lowercase letter (a-z)</li>
                <li id="number">Number (0-9)</li>
                <li id="symbol">Special character (!@#$%)</li>
            </ul>
        </div>
    </div>
    <script>
        const pwdInput=document.getElementById('password');
        const showPwd=document.getElementById('showPwd');
        showPwd.onchange=()=>pwdInput.type=showPwd.checked?'text':'password';
        pwdInput.oninput=()=>checkStrength(pwdInput.value);
        function checkStrength(pwd){
            let score=0;
            const checks={len8:pwd.length>=8,len12:pwd.length>=12,upper:/[A-Z]/.test(pwd),lower:/[a-z]/.test(pwd),number:/[0-9]/.test(pwd),symbol:/[^A-Za-z0-9]/.test(pwd)};
            for(let k in checks){document.getElementById(k).className=checks[k]?'pass':'';if(checks[k])score++}
            const meter=document.getElementById('meterFill');
            const scoreEl=document.getElementById('score');
            meter.className='meter-fill';
            if(pwd.length===0){meter.style.width='0%';scoreEl.textContent='Enter a password';return}
            if(score<=2){meter.classList.add('meter-weak');meter.style.width='33%';scoreEl.textContent='Weak'}
            else if(score<=4){meter.classList.add('meter-medium');meter.style.width='66%';scoreEl.textContent='Medium'}
            else{meter.classList.add('meter-strong');meter.style.width='100%';scoreEl.textContent='Strong'}
        }
    </script>
</body>
</html>
