<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur MD5</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <style>
        :root{--bg:#0a0a0f;--surface:#14141f;--primary:#4f8ef7;--text:#e0e0ff;--text2:#a0a0bf}
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:2rem}
        .container{width:100%;max-width:700px}
        h1{color:var(--primary);margin-bottom:1.5rem;text-align:center}
        .card{background:var(--surface);border-radius:12px;padding:1.5rem;margin-bottom:1rem}
        textarea{width:100%;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-size:1rem;min-height:120px;resize:vertical;margin-bottom:1rem;font-family:monospace}
        .output{display:flex;gap:0.5rem;margin-top:1rem}
        #hashResult{flex:1;background:var(--bg);border:1px solid var(--primary);color:var(--text);padding:0.75rem 1rem;border-radius:8px;font-family:monospace;word-break:break-all}
        button{background:var(--primary);color:#fff;border:none;padding:0.75rem 1.5rem;border-radius:8px;cursor:pointer;font-size:1rem;transition:opacity 0.2s}
        button:hover{opacity:0.9}
        .btn-full{width:100%}
        .lang-switch{position:fixed;top:1rem;right:1rem;display:flex;gap:0.5rem}
        .lang-switch a{color:var(--text2);text-decoration:none;padding:0.25rem 0.5rem;font-size:0.875rem}
        .lang-switch a.active{color:var(--primary)}
    </style>
</head>
<body>
    <div class="lang-switch">
        <a href="en/md5-generator.html">EN</a>
        <a href="zh/md5-generator.html">中文</a>
        <a href="es/md5-generator.html">ES</a>
        <a href="fr/md5-generator.html" class="active">FR</a>
        <a href="de/md5-generator.html">DE</a>
    </div>
    <div class="container">
        <h1>🔢 Générateur MD5</h1>
        <div class="card">
            <textarea id="input" placeholder="Entrez le texte à hasher..."></textarea>
            <button onclick="generateMD5()" class="btn-full">Générer le Hash MD5</button>
            <div class="output">
                <input type="text" id="hashResult" readonly placeholder="Le hash MD5 apparaîtra ici...">
                <button onclick="copyHash()">Copier</button>
            </div>
        </div>
    </div>
    <script>
        function generateMD5(){
            const input=document.getElementById('input').value;
            if(!input){document.getElementById('hashResult').value='';return}
            const hash=CryptoJS.MD5(input).toString();
            document.getElementById('hashResult').value=hash;
        }
        function copyHash(){
            const el=document.getElementById('hashResult');
            if(el.value){el.select();document.execCommand('copy');alert('Copié!')}
        }
    </script>
</body>
</html>
