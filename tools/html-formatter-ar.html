<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مُنسق HTML - 205 Tools</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            color: #e0e0e0;
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; padding: 40px 0; border-bottom: 1px solid rgba(79, 142, 247, 0.3); margin-bottom: 30px; }
        h1 { font-size: 2.5rem; background: linear-gradient(90deg, #4f8ef7, #6b5ce7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 10px; }
        .subtitle { color: #888; font-size: 1.1rem; }
        .lang-selector { display: flex; justify-content: center; gap: 10px; margin: 20px 0; flex-wrap: wrap; }
        .lang-btn { padding: 8px 16px; border: 1px solid rgba(79, 142, 247, 0.5); background: rgba(79, 142, 247, 0.1); color: #4f8ef7; border-radius: 6px; cursor: pointer; text-decoration: none; transition: all 0.3s ease; }
        .lang-btn:hover, .lang-btn.active { background: #4f8ef7; color: #fff; }
        .tool-card { background: rgba(255, 255, 255, 0.03); border: 1px solid rgba(79, 142, 247, 0.2); border-radius: 12px; padding: 30px; margin-bottom: 20px; }
        .input-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; color: #4f8ef7; font-weight: 500; }
        textarea, input[type="text"], input[type="number"] { width: 100%; padding: 12px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(79, 142, 247, 0.3); border-radius: 8px; color: #e0e0e0; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; resize: vertical; }
        textarea { min-height: 150px; }
        textarea:focus, input:focus { outline: none; border-color: #4f8ef7; box-shadow: 0 0 10px rgba(79, 142, 247, 0.3); }
        .btn-primary { background: linear-gradient(90deg, #4f8ef7, #6b5ce7); color: white; border: none; padding: 12px 32px; border-radius: 8px; font-size: 16px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; }
        .btn-primary:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(79, 142, 247, 0.4); }
        .output-area { background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(79, 142, 247, 0.3); border-radius: 8px; padding: 15px; min-height: 150px; white-space: pre-wrap; word-break: break-word; font-family: 'Consolas', 'Monaco', monospace; font-size: 14px; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
        .options-row { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        select { padding: 10px; background: rgba(0, 0, 0, 0.3); border: 1px solid rgba(79, 142, 247, 0.3); border-radius: 6px; color: #e0e0e0; }
        .copy-btn { background: rgba(79, 142, 247, 0.2); border: 1px solid #4f8ef7; color: #4f8ef7; padding: 6px 12px; border-radius: 4px; cursor: pointer; margin-top: 10px; }
        .copy-btn:hover { background: #4f8ef7; color: white; }
        footer { text-align: center; padding: 30px 0; color: #666; border-top: 1px solid rgba(79, 142, 247, 0.2); margin-top: 30px; }
        .home-link { color: #4f8ef7; text-decoration: none; }
        .home-link:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>مُنسق HTML</h1>
            <p class="subtitle">تنسيق وتجميل كود HTML</p>
            <div class="lang-selector">
                <a href="html-formatter-en.html" class="lang-btn">🇺🇸 English</a><a href="html-formatter-ar.html" class="lang-btn active">🇸🇦 العربية</a><a href="html-formatter-es.html" class="lang-btn">🇪🇸 Español</a><a href="html-formatter-fr.html" class="lang-btn">🇫🇷 Français</a><a href="html-formatter-de.html" class="lang-btn">🇩🇪 Deutsch</a>
            </div>
        </header>
        
        <div class="tool-card">
            <form id="toolForm" onsubmit="return false;">
                
                <div class="input-group"><label>أدخل HTML للتنسيق</label><textarea id="mainInput" placeholder="<div>
  <p>مرحبا بالعالم</p>
</div>"></textarea></div>
                <button type="button" class="btn-primary" onclick="processTool()">تنسيق</button>
            </form>
            
            <div class="input-group" style="margin-top: 20px;">
                <label>HTML المنسق</label>
                <div id="outputArea" class="output-area"></div>
                <button class="copy-btn" onclick="copyOutput()">📋 Copy</button>
            </div>
        </div>
        
        <footer>
            <a href="index.html" class="home-link">← Back to Tools</a>
            <p>205 Tools - Developer Utilities</p>
        </footer>
    </div>
    
    <script>
        function processTool() { const input = document.getElementById("mainInput").value; document.getElementById("outputArea").textContent = formatHtml(input); } function formatHtml(html) { let formatted = ""; let indent = 0; const lines = html.replace(/>\s*</g, "><").split("><"); for (let i = 0; i < lines.length; i++) { let line = lines[i]; if (i > 0) line = "<" + line; if (i < lines.length - 1) line = line + ">"; if (line.match(/^\s*<\//)) indent = Math.max(0, indent - 1); formatted += "  ".repeat(indent) + line.trim() + "\n"; if (line.match(/^\s*<[^!?\/][^>]*[^\/]>$/) && !line.match(/<\/(script|style)/i)) indent++; } return formatted.trim(); } function copyOutput() { const text = document.getElementById("outputArea").textContent; navigator.clipboard.writeText(text).then(() => { const btn = document.querySelector(".copy-btn"); const old = btn.textContent; btn.textContent = "✅ Copied!"; setTimeout(() => btn.textContent = old, 1500); }); }
    </script>
</body>
</html>
