      'Ancho Completo': 'Ａｎｃｈｏ Ｃｏｍｐｌｅｔｏ',
      'Versalitas': 'Vᴇʀsᴀʟɪᴛᴀs',
      'Burbuja': 'Ⓑⓤⓡⓑⓤⓙⓐ',
      'Burbuja Negra': '🅑🅤🅡🅑🅤🅙🅐 🅝🅔🅖🅡🅐',
      'Tachado': 'T̶a̶c̶h̶a̶d̶o̶',
      'Subrayado': 'S̲u̲b̲r̲a̲y̲a̲d̲o̲',

    const charMaps = {
      'Negrita': '𝗔𝗕𝗖𝗗𝗘𝗙𝗚𝗛𝗜𝗝𝗞𝗟𝗠𝗡𝗢𝗣𝗤𝗥𝗦𝗧𝗨𝗩𝗪𝗫𝗬𝗭𝗮𝗯𝗰𝗱𝗲𝗳𝗴𝗵𝗶𝗷𝗸𝗹𝗺𝗻𝗼𝗽𝗾𝗿𝘀𝘁𝘂𝘃𝘄𝘅𝘆𝘇𝟬𝟭𝟮𝟯𝟰𝟱𝟲𝟳𝟴𝟵',
      'Cursiva': '𝘈𝘉𝘊𝘋𝘌𝘍𝘎𝘏𝘐𝘑𝘒𝘓𝘔𝘕𝘖𝘗𝘘𝘙𝘚𝘛𝘜𝘝𝘞𝘟𝘠𝘡𝘢𝘣𝘤𝘥𝘦𝘧𝘨𝘩𝘪𝘫𝘬𝘭𝘮𝘯𝘰𝘱𝘲𝘳𝘴𝘵𝘶𝘷𝘸𝘹𝘺𝘻0123456789',
      'Negrita Cursiva': '𝘼𝘽𝘾𝘿𝙀𝙁𝙂𝙃𝙄𝙅𝙆𝙇𝙈𝙉𝙊𝙋𝙌𝙍𝙎𝙏𝙐𝙑𝙒𝙓𝙔𝙕𝙖𝙗𝙘𝙙𝙚𝙛𝙜𝙝𝙞𝙟𝙠𝙡𝙢𝙣𝙤𝙥𝙦𝙧𝙨𝙩𝙪𝙫𝙬𝙭𝙮𝙯0123456789',
      'Script': '𝓐𝓑𝓒𝓓𝓔𝓕𝓖𝓗𝓘𝓙𝓚𝓛𝓜𝓝𝓞𝓟𝓠𝓡𝓢𝓣𝓤𝓥𝓦𝓧𝓨𝓩𝓪𝓫𝓬𝓭𝓮𝓯𝓰𝓱𝓲𝓳𝓴𝓵𝓶𝓷𝓸𝓹𝓺𝓻𝓼𝓽𝓾𝓿𝔀𝔁𝔂𝔃0123456789',
      'Fraktur': '𝕬𝕭𝕮𝕯𝕰𝕱𝕲𝕳𝕴𝕵𝕶𝕷𝕸𝕹𝕺𝕻𝕼𝕽𝕾𝕿𝖀𝖁𝖂𝖃𝖄𝖅𝖆𝖇𝖈𝖉𝖊𝖋𝖌𝖍𝖎𝖏𝖐𝖑𝖒𝖓𝖔𝖕𝖖𝖗𝖘𝖙𝖚𝖛𝖜𝖝𝖞𝖟0123456789',
      'Doble Trazo': '𝔸𝔹ℂ𝔻𝔼𝔽𝔾ℍ𝕀𝕁𝕂𝕃𝕄ℕ𝕆ℙℚℝ𝕊𝕋𝕌𝕍𝕎𝕏𝕐ℤ𝕒𝕓𝕔𝕕𝕖𝕗𝕘𝕙𝕚𝕛𝕜𝕝𝕞𝕟𝕠𝕡𝕢𝕣𝕤𝕥𝕦𝕧𝕨𝕩𝕪𝕫𝟘𝟙𝟚𝟛𝟜𝟝𝟞𝟟𝟠𝟡',
      'Monoespaciado': '𝙰𝙱𝙲𝙳𝙴𝙵𝙶𝙷𝙸𝙹𝙺𝙻𝙼𝙽𝙾𝙿𝚀𝚁𝚂𝚃𝚄𝚅𝚆𝚇𝚈𝚉𝚊𝚋𝚌𝚍𝚎𝚏𝚐𝚑𝚒𝚓𝚔𝚕𝚖𝚗𝚘𝚙𝚚𝚛𝚜𝚝𝚞𝚟𝚠𝚡𝚢𝚣𝟶𝟷𝟸𝟹𝟺𝟻𝟼𝟽𝟾𝟿',
      'Ancho Completo': 'ＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺａｂｃｄｅｆｇｈｉｊｋｌｍｎｏｐｑｒｓｔｕｖｗｘｙｚ０１２３４５６７８９'
    };
    
    function generateFancy() {
      const input = document.getElementById('textInput').value;
      const output = document.getElementById('output');
      
      if (!input) {
        output.innerHTML = '';
        return;
      }
      
      const normal = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      let html = '';
      
      for (const [name, sample] of Object.entries(styles)) {
        let converted = input;
        if (charMaps[name]) {
          converted = input.split('').map(c => {
            const idx = normal.indexOf(c);
            return idx >= 0 ? charMaps[name][idx] : c;
          }).join('');
        } else if (name === 'Versalitas') {
          converted = toSmallCaps(input);
        } else if (name === 'Encerrado') {
          converted = toCircled(input);
        } else if (name === 'Cuadrado') {
          converted = toSquared(input);
        } else if (name === 'Burbuja') {
          converted = toBubble(input);
        } else if (name === 'Burbuja Negra') {
          converted = toBlackBubble(input);
        } else if (name === 'Tachado') {
          converted = input + '\u0336'.repeat(input.length);
        } else if (name === 'Subrayado') {
          converted = input + '\u0332'.repeat(input.length);
        } else if (name === 'Vaporwave') {
          converted = toFullwidth(input);
        }
        
        html += `
          <div class="form-group" style="margin-bottom: 15px;">
            <label>${name}</label>
            <div style="display: flex; gap: 10px;">
              <input type="text" value="${converted}" readonly style="flex: 1;">
              <button class="btn btn-primary" onclick="copyText('${converted.replace(/'/g, "\\'")}')">Copiar</button>
            </div>
          </div>
        `;
      }
      
      output.innerHTML = html;
    }
    
    function toSmallCaps(text) {
      const small = 'ᴀʙᴄᴅᴇғɢʜɪᴊᴋʟᴍɴᴏᴘǫʀsᴛᴜᴠᴡxʏᴢ';
      const normal = 'abcdefghijklmnopqrstuvwxyz';
      return text.toLowerCase().split('').map(c => {
        const idx = normal.indexOf(c);
        return idx >= 0 ? small[idx] : c;
      }).join('');
    }
    
    function toCircled(text) {
      const circled = 'ⒶⒷⒸⒹⒺⒻⒼⒽⒾⒿⓀⓁⓂⓃⓄⓅⓆⓇⓈⓉⓊⓋⓌⓍⓎⓏⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ⓪①②③④⑤⑥⑦⑧⑨';
      const normal = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      return text.split('').map(c => {
        const idx = normal.indexOf(c);
        return idx >= 0 ? circled[idx] : c;
      }).join('');
    }
    
    function toSquared(text) {
      const squared = '🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉🄰🄱🄲🄳🄴🄵🄶🄷🄸🄹🄺🄻🄼🄽🄾🄿🅀🅁🅂🅃🅄🅅🅆🅇🅈🅉0123456789';
      const normal = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      return text.split('').map(c => {
        const idx = normal.indexOf(c);
        return idx >= 0 ? squared[idx] : c;
      }).join('');
    }
    
    function toBubble(text) {
      const bubble = 'ⓐⓑⓒⓓⓔⓕⓖⓗⓘⓙⓚⓛⓜⓝⓞⓟⓠⓡⓢⓣⓤⓥⓦⓧⓨⓩ';
      const normal = 'abcdefghijklmnopqrstuvwxyz';
      return text.toLowerCase().split('').map(c => {
        const idx = normal.indexOf(c);
        return idx >= 0 ? bubble[idx] : c;
      }).join('');
    }
    
    function toBlackBubble(text) {
      const black = '🅐🅑🅒🅓🅔🅕🅖🅗🅘🅙🅚🅛🅜🅝🅞🅟🅠🅡🅢🅣🅤🅥🅦🅧🅨🅩';
      const normal = 'abcdefghijklmnopqrstuvwxyz';
      return text.toLowerCase().split('').map(c => {
        const idx = normal.indexOf(c);
        return idx >= 0 ? black[idx] : c;
      }).join('');
    }
    
    function toFullwidth(text) {
      const fullwidth = 'ＡＢＣＤＥＦＧＨＩＪＫＬＭＮＯＰＱＲＳＴＵＶＷＸＹＺａｂｃｄｅｆｇｈｉｊｋｌｍｎｏｐｑｒｓｔｕｖｗｘｙｚ０１２３４５６７８９';
      const normal = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
      return text.split('').map(c => {
        const idx = normal.indexOf(c);
        return idx >= 0 ? fullwidth[idx] : c;
      }).join('');
    }
    
    function copyText(text) {
      navigator.clipboard.writeText(text).then(() => {
        alert('¡Copiado!');
      });
    }
  </script>
