<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador SHA512 - 205 Tools</title>
  <meta name="description" content="Generar hash SHA512 de texto.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .hash-output { background: var(--bg-secondary); padding: 20px; border-radius: 12px; font-family: 'Fira Code', monospace; font-size: 14px; word-break: break-all; text-align: center; margin: 20px 0; color: var(--primary); }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔐 Generador SHA512</h1>
      <p>Generar hash SHA512 de texto</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generador</h2>
        <div class="lang-selector">
          <a href="../en/sha512-generator.html" class="lang-btn">EN</a>
          <a href="./sha512-generator.html" class="lang-btn active">ES</a>
          <a href="../fr/sha512-generator.html" class="lang-btn">FR</a>
          <a href="../de/sha512-generator.html" class="lang-btn">DE</a>
          <a href="../ar/sha512-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Introducir Texto</label>
        <textarea id="inputText" rows="6" placeholder="Escribe o pega texto...">Hola Mundo</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateSHA512()">Generar SHA512</button>
        <button class="btn btn-success" onclick="copyHash()">📋 Copiar</button>
        <button class="btn btn-secondary" onclick="clearText()">Limpiar</button>
      </div>
      
      <div class="hash-output" id="hashOutput"></div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Gratuitas</p></footer>
  </div>
  
  <script>
    async function generateSHA512() {
      const text = document.getElementById('inputText').value;
      const encoder = new TextEncoder();
      const data = encoder.encode(text);
      const hashBuffer = await crypto.subtle.digest('SHA-512', data);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
      document.getElementById('hashOutput').textContent = hashHex;
    }
    
    function copyHash() {
      const hash = document.getElementById('hashOutput').textContent;
      if (hash) {
        navigator.clipboard.writeText(hash);
        alert('¡Hash copiado!');
      }
    }
    
    function clearText() {
      document.getElementById('inputText').value = '';
      document.getElementById('hashOutput').textContent = '';
    }
    
    generateSHA512();
  </script>
</body>
</html>
