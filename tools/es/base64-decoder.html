<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decodificador Base64 - 205 Tools</title>
  <meta name="description" content="Decodificar Base64 a texto.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔓 Decodificador Base64</h1>
      <p>Convertir Base64 a texto</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Decodificador</h2>
        <div class="lang-selector">
          <a href="../en/base64-decoder.html" class="lang-btn">EN</a>
          <a href="./base64-decoder.html" class="lang-btn active">ES</a>
          <a href="../fr/base64-decoder.html" class="lang-btn">FR</a>
          <a href="../de/base64-decoder.html" class="lang-btn">DE</a>
          <a href="../ar/base64-decoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Base64 a Decodificar</label>
        <textarea id="input" rows="8" placeholder="Ingrese Base64 para decodificar..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="decode()">🔓 Decodificar</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copiar</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Texto Decodificado</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Gratuitas</p></footer>
  </div>
  
  <script>
    function decode() {
      const text = document.getElementById('input').value.trim();
      if (!text) { alert('Por favor ingrese texto Base64'); return; }
      
      try {
        const result = decodeURIComponent(escape(atob(text)));
        document.getElementById('output').value = result;
      } catch (e) {
        alert('Error al decodificar Base64: ' + e.message);
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('¡Copiado!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
