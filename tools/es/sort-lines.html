<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ordenar Líneas - 205 Tools</title>
  <meta name="description" content="Ordenar líneas alfabética o numéricamente.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>📋 Ordenar Líneas</h1>
      <p>Ordenar líneas alfabéticamente, numéricamente o por longitud</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Texto de Entrada</h2>
        <div class="lang-selector">
          <a href="../en/sort-lines.html" class="lang-btn">EN</a>
          <a href="./sort-lines.html" class="lang-btn active">ES</a>
          <a href="../fr/sort-lines.html" class="lang-btn">FR</a>
          <a href="../de/sort-lines.html" class="lang-btn">DE</a>
          <a href="../ar/sort-lines.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Pegue las líneas a ordenar aquí..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="sortLines('asc')">A-Z</button>
        <button class="btn btn-primary" onclick="sortLines('desc')">Z-A</button>
        <button class="btn btn-primary" onclick="sortLines('length')">Por Longitud</button>
        <button class="btn btn-primary" onclick="sortLines('reverse')">Orden Inverso</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Resultado</label>
        <textarea id="output" rows="8" readonly placeholder="El resultado ordenado aparecerá aquí..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copiar Resultado</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Online Gratis</p></footer>
  </div>
  
  <script>
    function sortLines(order) {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      let lines = input.split('\n');
      
      switch(order) {
        case 'asc':
          lines.sort((a, b) => a.localeCompare(b));
          break;
        case 'desc':
          lines.sort((a, b) => b.localeCompare(a));
          break;
        case 'length':
          lines.sort((a, b) => a.length - b.length);
          break;
        case 'reverse':
          lines.reverse();
          break;
      }
      
      document.getElementById('output').value = lines.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('¡Copiado al portapapeles!');
    }
  </script>
</body>
</html>
