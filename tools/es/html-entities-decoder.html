<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decodificador de Entidades HTML - 205 Tools</title>
  <meta name="description" content="Decodificar entidades HTML a caracteres especiales.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔓 Decodificador de Entidades HTML</h1>
      <p>Convertir entidades HTML a caracteres especiales</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Decodificador</h2>
        <div class="lang-selector">
          <a href="../en/html-entities-decoder.html" class="lang-btn">EN</a>
          <a href="./html-entities-decoder.html" class="lang-btn active">ES</a>
          <a href="../fr/html-entities-decoder.html" class="lang-btn">FR</a>
          <a href="../de/html-entities-decoder.html" class="lang-btn">DE</a>
          <a href="../ar/html-entities-decoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Entidades HTML a Decodificar</label>
        <textarea id="input" rows="8" placeholder="Ingrese HTML con entidades...">&lt;div&gt;Hola &amp; ¡Bienvenido!&lt;/div&gt;
&lt;p&gt;5 &lt; 10 &amp; 10 &gt; 5&lt;/p&gt;
&quot;Comillas&quot; y &#39;apóstrofes&#39;
Copyright &copy; 2025</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="decode()">🔓 Decodificar</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copiar</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Texto Decodificado</label>
        <textarea id="output" rows="8" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Gratuitas</p></footer>
  </div>
  
  <script>
    function decode() {
      let html = document.getElementById('input').value;
      if (!html) return;
      
      const textarea = document.createElement('textarea');
      textarea.innerHTML = html;
      document.getElementById('output').value = textarea.value;
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('¡Copiado!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
