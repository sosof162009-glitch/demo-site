<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Calendario - 205 Tools</title>
  <meta name="description" content="Genera e imprime calendarios mensuales o anuales.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <style>
    .calendar-controls { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .calendar-display { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-top: 20px; }
    .calendar-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid var(--border); }
    .calendar-title { font-size: 24px; font-weight: 700; color: var(--primary); }
    .calendar-nav { display: flex; gap: 10px; }
    .calendar-nav button { background: var(--bg-input); border: 1px solid var(--border); color: var(--text-primary); padding: 8px 15px; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
    .calendar-nav button:hover { background: var(--primary); border-color: var(--primary); }
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .day-header { background: var(--bg-input); padding: 12px; text-align: center; font-weight: 600; color: var(--primary); font-size: 14px; }
    .day-cell { background: var(--bg-primary); padding: 12px; text-align: center; min-height: 60px; display: flex; flex-direction: column; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; transition: all 0.2s; border: 1px solid transparent; }
    .day-cell:hover { background: var(--border); border-color: var(--primary); }
    .day-cell.other-month { color: var(--text-muted); background: transparent; }
    .day-cell.today { background: var(--primary); color: white; font-weight: 700; }
    .day-cell.weekend { background: rgba(79, 142, 247, 0.1); }
    .day-number { font-size: 16px; }
    .year-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; }
    .month-mini { background: var(--bg-primary); border: 1px solid var(--border); border-radius: 8px; padding: 15px; }
    .month-mini h4 { text-align: center; color: var(--primary); margin-bottom: 10px; font-size: 16px; }
    .mini-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; font-size: 12px; }
    .mini-day { text-align: center; padding: 4px; border-radius: 3px; }
    .mini-day.header { color: var(--primary); font-weight: 600; font-size: 10px; }
    .mini-day.today { background: var(--primary); color: white; font-weight: 700; }
    .mini-day.other { color: var(--text-muted); }
    .view-toggle { display: flex; gap: 10px; }
    .view-toggle button { padding: 10px 20px; border-radius: 6px; border: 1px solid var(--border); background: var(--bg-input); color: var(--text-secondary); cursor: pointer; }
    .view-toggle button.active { background: var(--primary); color: white; border-color: var(--primary); }
    .print-btn { background: var(--success) !important; }
    @media print { .calendar-controls, .back-link, .tool-header, footer { display: none; } .calendar-display { border: none; } }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>📅 Generador de Calendario</h1>
      <p>Genera e imprime calendarios mensuales o anuales</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Opciones del Calendario</h2>
        <div class="lang-selector">
          <a href="../en/calendar-generator.html" class="lang-btn">EN</a>
          <a href="./calendar-generator.html" class="lang-btn active">ES</a>
          <a href="../fr/calendar-generator.html" class="lang-btn">FR</a>
          <a href="../de/calendar-generator.html" class="lang-btn">DE</a>
          <a href="../ar/calendar-generator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="calendar-controls">
        <div class="view-toggle">
          <button id="monthView" class="active" onclick="setView('month')">Vista Mensual</button>
          <button id="yearView" onclick="setView('year')">Vista Anual</button>
        </div>
        
        <div class="form-group" style="margin: 0;">
          <select id="monthSelect" class="tool-select" onchange="updateCalendar()">
            <option value="0">Enero</option>
            <option value="1">Febrero</option>
            <option value="2">Marzo</option>
            <option value="3">Abril</option>
            <option value="4">Mayo</option>
            <option value="5">Junio</option>
            <option value="6">Julio</option>
            <option value="7">Agosto</option>
            <option value="8">Septiembre</option>
            <option value="9">Octubre</option>
            <option value="10">Noviembre</option>
            <option value="11">Diciembre</option>
          </select>
        </div>
        
        <div class="form-group" style="margin: 0;">
          <input type="number" id="yearInput" class="tool-input" style="width: 100px;" min="1900" max="2100" onchange="updateCalendar()">
        </div>
        
        <button class="btn btn-secondary print-btn" onclick="printCalendar()">🖨️ Imprimir</button>
      </div>
      
      <div id="calendarContainer" class="calendar-display"></div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Gratuitas</p></footer>
  </div>
  
  <script>
    const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio', 
                        'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
    const dayNames = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
    let currentView = 'month';
    let currentDate = new Date();
    
    function init() {
      document.getElementById('monthSelect').value = currentDate.getMonth();
      document.getElementById('yearInput').value = currentDate.getFullYear();
      updateCalendar();
    }
    
    function setView(view) {
      currentView = view;
      document.getElementById('monthView').classList.toggle('active', view === 'month');
      document.getElementById('yearView').classList.toggle('active', view === 'year');
      document.getElementById('monthSelect').disabled = view === 'year';
      updateCalendar();
    }
    
    function updateCalendar() {
      const year = parseInt(document.getElementById('yearInput').value);
      const month = parseInt(document.getElementById('monthSelect').value);
      
      if (currentView === 'month') {
        renderMonth(year, month);
      } else {
        renderYear(year);
      }
    }
    
    function renderMonth(year, month) {
      const firstDay = new Date(year, month, 1);
      const lastDay = new Date(year, month + 1, 0);
      const daysInMonth = lastDay.getDate();
      const startDayOfWeek = firstDay.getDay();
      
      const today = new Date();
      const isCurrentMonth = today.getFullYear() === year && today.getMonth() === month;
      
      let html = `
        <div class="calendar-header">
          <div class="calendar-title">${monthNames[month]} ${year}</div>
          <div class="calendar-nav">
            <button onclick="changeMonth(-1)">← Ant</button>
            <button onclick="goToToday()">Hoy</button>
            <button onclick="changeMonth(1)">Sig →</button>
          </div>
        </div>
        <div class="calendar-grid">
      `;
      
      dayNames.forEach(day => {
        html += `<div class="day-header">${day}</div>`;
      });
      
      const prevMonthDays = new Date(year, month, 0).getDate();
      for (let i = startDayOfWeek - 1; i >= 0; i--) {
        html += `<div class="day-cell other-month"><span class="day-number">${prevMonthDays - i}</span></div>`;
      }
      
      for (let day = 1; day <= daysInMonth; day++) {
        const dayOfWeek = new Date(year, month, day).getDay();
        const isWeekend = dayOfWeek === 0 || dayOfWeek === 6;
        const isToday = isCurrentMonth && today.getDate() === day;
        
        let classes = 'day-cell';
        if (isWeekend) classes += ' weekend';
        if (isToday) classes += ' today';
        
        html += `<div class="${classes}"><span class="day-number">${day}</span></div>`;
      }
      
      const remainingCells = 42 - (startDayOfWeek + daysInMonth);
      for (let i = 1; i <= remainingCells; i++) {
        html += `<div class="day-cell other-month"><span class="day-number">${i}</span></div>`;
      }
      
      html += '</div>';
      document.getElementById('calendarContainer').innerHTML = html;
    }
    
    function renderYear(year) {
      let html = `
        <div class="calendar-header">
          <div class="calendar-title">${year}</div>
          <div class="calendar-nav">
            <button onclick="changeYear(-1)">← Ant</button>
            <button onclick="goToToday()">Año Actual</button>
            <button onclick="changeYear(1)">Sig →</button>
          </div>
        </div>
        <div class="year-grid">
      `;
      
      const today = new Date();
      
      for (let m = 0; m < 12; m++) {
        const firstDay = new Date(year, m, 1);
        const daysInMonth = new Date(year, m + 1, 0).getDate();
        const startDay = firstDay.getDay();
        
        html += `
          <div class="month-mini">
            <h4>${monthNames[m]}</h4>
            <div class="mini-grid">
        `;
        
        dayNames.forEach(d => {
          html += `<div class="mini-day header">${d[0]}</div>`;
        });
        
        for (let i = 0; i < startDay; i++) {
          html += '<div class="mini-day"></div>';
        }
        
        for (let d = 1; d <= daysInMonth; d++) {
          const isToday = today.getFullYear() === year && today.getMonth() === m && today.getDate() === d;
          const cls = isToday ? 'mini-day today' : 'mini-day';
          html += `<div class="${cls}">${d}</div>`;
        }
        
        html += '</div></div>';
      }
      
      html += '</div>';
      document.getElementById('calendarContainer').innerHTML = html;
    }
    
    function changeMonth(delta) {
      let month = parseInt(document.getElementById('monthSelect').value);
      let year = parseInt(document.getElementById('yearInput').value);
      
      month += delta;
      if (month > 11) { month = 0; year++; }
      if (month < 0) { month = 11; year--; }
      
      document.getElementById('monthSelect').value = month;
      document.getElementById('yearInput').value = year;
      updateCalendar();
    }
    
    function changeYear(delta) {
      let year = parseInt(document.getElementById('yearInput').value);
      document.getElementById('yearInput').value = year + delta;
      updateCalendar();
    }
    
    function goToToday() {
      const today = new Date();
      document.getElementById('monthSelect').value = today.getMonth();
      document.getElementById('yearInput').value = today.getFullYear();
      updateCalendar();
    }
    
    function printCalendar() {
      window.print();
    }
    
    init();
  </script>
</body>
</html>
