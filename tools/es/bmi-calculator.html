<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Calculadora IMC - 205 Tools</title>
  <meta name="description" content="Calcule su Índice de Masa Corporal (IMC) y verifique su estado de salud">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .bmi-result { text-align: center; padding: 30px; background: var(--bg-secondary); border-radius: 12px; margin-top: 20px; }
    .bmi-value { font-size: 48px; font-weight: 700; margin: 10px 0; }
    .bmi-category { font-size: 24px; padding: 10px 20px; border-radius: 8px; display: inline-block; margin-top: 10px; }
    .bmi-underweight { background: #3b82f6; color: white; }
    .bmi-normal { background: #22c55e; color: white; }
    .bmi-overweight { background: #f59e0b; color: white; }
    .bmi-obese { background: #ef4444; color: white; }
    .unit-toggle { display: flex; gap: 10px; margin-bottom: 20px; }
    .unit-toggle button { flex: 1; }
    .unit-toggle button.active { background: var(--primary); color: white; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>⚖️ Calculadora IMC</h1>
      <p>Calcule su Índice de Masa Corporal y verifique su estado de salud</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Ingrese los datos</h2>
        <div class="lang-selector">
          <a href="../en/bmi-calculator.html" class="lang-btn">EN</a>
          <a href="./bmi-calculator.html" class="lang-btn active">ES</a>
          <a href="../fr/bmi-calculator.html" class="lang-btn">FR</a>
          <a href="../de/bmi-calculator.html" class="lang-btn">DE</a>
          <a href="../ar/bmi-calculator.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="unit-toggle">
        <button class="btn btn-secondary active" id="metricBtn" onclick="setUnit('metric')">Métrico (kg, cm)</button>
        <button class="btn btn-secondary" id="imperialBtn" onclick="setUnit('imperial')">Imperial (lb, ft/pulg)</button>
      </div>
      
      <div id="metricInputs">
        <div class="form-group">
          <label>Peso (kg)</label>
          <input type="number" id="weightKg" placeholder="Ingrese el peso en kg" step="0.1">
        </div>
        <div class="form-group">
          <label>Altura (cm)</label>
          <input type="number" id="heightCm" placeholder="Ingrese la altura en cm" step="0.1">
        </div>
      </div>
      
      <div id="imperialInputs" style="display: none;">
        <div class="form-group">
          <label>Peso (lb)</label>
          <input type="number" id="weightLbs" placeholder="Ingrese el peso en libras" step="0.1">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label>Altura (pies)</label>
            <input type="number" id="heightFt" placeholder="Pies" min="0" max="10">
          </div>
          <div class="form-group">
            <label>Altura (pulgadas)</label>
            <input type="number" id="heightIn" placeholder="Pulgadas" min="0" max="11">
          </div>
        </div>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="calculateBMI()">Calcular IMC</button>
        <button class="btn btn-secondary" onclick="resetBMI()">Reiniciar</button>
      </div>
      
      <div id="bmiResult" class="bmi-result" style="display: none;">
        <div>Su IMC</div>
        <div class="bmi-value" id="bmiValue">--</div>
        <div class="bmi-category" id="bmiCategory">--</div>
        <div style="margin-top: 15px; color: var(--text-secondary);">
          <small>Categorías: Bajo peso &lt; 18.5 | Normal 18.5-24.9 | Sobrepeso 25-29.9 | Obesidad ≥ 30</small>
        </div>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas gratuitas en línea</p></footer>
  </div>
  
  <script>
    let currentUnit = 'metric';
    
    function setUnit(unit) {
      currentUnit = unit;
      document.getElementById('metricBtn').classList.toggle('active', unit === 'metric');
      document.getElementById('imperialBtn').classList.toggle('active', unit === 'imperial');
      document.getElementById('metricInputs').style.display = unit === 'metric' ? 'block' : 'none';
      document.getElementById('imperialInputs').style.display = unit === 'imperial' ? 'block' : 'none';
      document.getElementById('bmiResult').style.display = 'none';
    }
    
    function calculateBMI() {
      let bmi;
      
      if (currentUnit === 'metric') {
        const weight = parseFloat(document.getElementById('weightKg').value);
        const height = parseFloat(document.getElementById('heightCm').value) / 100;
        
        if (!weight || !height || weight <= 0 || height <= 0) {
          alert('Por favor ingrese un peso y altura válidos');
          return;
        }
        
        bmi = weight / (height * height);
      } else {
        const weight = parseFloat(document.getElementById('weightLbs').value);
        const ft = parseFloat(document.getElementById('heightFt').value) || 0;
        const inches = parseFloat(document.getElementById('heightIn').value) || 0;
        const totalInches = (ft * 12) + inches;
        
        if (!weight || totalInches <= 0) {
          alert('Por favor ingrese un peso y altura válidos');
          return;
        }
        
        bmi = (weight / (totalInches * totalInches)) * 703;
      }
      
      bmi = Math.round(bmi * 10) / 10;
      
      let category, className;
      if (bmi < 18.5) { category = 'Bajo peso'; className = 'bmi-underweight'; }
      else if (bmi < 25) { category = 'Peso normal'; className = 'bmi-normal'; }
      else if (bmi < 30) { category = 'Sobrepeso'; className = 'bmi-overweight'; }
      else { category = 'Obesidad'; className = 'bmi-obese'; }
      
      document.getElementById('bmiValue').textContent = bmi;
      const catEl = document.getElementById('bmiCategory');
      catEl.textContent = category;
      catEl.className = 'bmi-category ' + className;
      document.getElementById('bmiResult').style.display = 'block';
    }
    
    function resetBMI() {
      document.getElementById('weightKg').value = '';
      document.getElementById('heightCm').value = '';
      document.getElementById('weightLbs').value = '';
      document.getElementById('heightFt').value = '';
      document.getElementById('heightIn').value = '';
      document.getElementById('bmiResult').style.display = 'none';
    }
  </script>
</body>
</html>
