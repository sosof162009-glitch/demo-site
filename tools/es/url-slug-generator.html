<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Slugs URL - 205 Tools</title>
  <meta name="description" content="Genera slugs URL amigables para SEO desde texto.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔗 Generador de Slugs URL</h1>
      <p>Genera slugs URL amigables para SEO desde cualquier texto.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generar</h2>
        <div class="lang-selector">
          <a href="../en/url-slug-generator.html" class="lang-btn ">EN</a><a href="../es/url-slug-generator.html" class="lang-btn active">ES</a><a href="../fr/url-slug-generator.html" class="lang-btn ">FR</a><a href="../de/url-slug-generator.html" class="lang-btn ">DE</a><a href="../ar/url-slug-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Texto / Título</label>
        <textarea id="inputText" rows="4" placeholder="Ingresa el título de tu página o texto aquí..."></textarea>
      </div>
      <div class="form-group">
        <label>Opciones</label>
        <div style="display:flex; gap:15px; flex-wrap:wrap;">
          <label style="display:flex; align-items:center; gap:5px;">
            <input type="checkbox" id="lowercase" checked> Minúsculas
          </label>
          <label style="display:flex; align-items:center; gap:5px;">
            <input type="checkbox" id="removeStopWords"> Eliminar palabras vacías
          </label>
          <label style="display:flex; align-items:center; gap:5px;">
            <input type="checkbox" id="maxLength"> Longitud máxima
            <input type="number" id="maxChars" value="60" min="10" max="200" style="width:60px; padding:4px;">
          </label>
        </div>
      </div>
      <div class="form-group">
        <label>Separador</label>
        <select id="separator">
          <option value="-">Guión (-)</option>
          <option value="_">Guion bajo (_)</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateSlug()">Generar Slug</button>
        <button class="btn btn-secondary" onclick="clearFields()">Limpiar</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="¡Copiado!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Copiar</button>
      </div>
      
      <script>
        const stopWords = ['el', 'la', 'los', 'las', 'un', 'una', 'unos', 'unas', 'y', 'o', 'pero', 'de', 'del', 'a', 'al', 'en', 'por', 'para', 'con', 'sin', 'sobre', 'entre', 'hacia', 'desde', 'hasta', 'es', 'son', 'fue', 'era', 'ser', 'sido'];
        
        function generateSlug() {
          let text = document.getElementById('inputText').value.trim();
          const lowercase = document.getElementById('lowercase').checked;
          const removeStop = document.getElementById('removeStopWords').checked;
          const useMaxLength = document.getElementById('maxLength').checked;
          const maxChars = parseInt(document.getElementById('maxChars').value) || 60;
          const separator = document.getElementById('separator').value;
          
          if (!text) {
            alert('Por favor ingresa algún texto');
            return;
          }
          
          if (lowercase) {
            text = text.toLowerCase();
          }
          
          if (removeStop) {
            const words = text.split(/\s+/);
            text = words.filter(w => !stopWords.includes(w.toLowerCase())).join(' ');
          }
          
          let slug = text
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .replace(/[^a-zA-Z0-9\s-]/g, '')
            .replace(/\s+/g, separator)
            .replace(new RegExp(separator + '+', 'g'), separator);
          
          slug = slug.replace(new RegExp('^' + separator + '+|' + separator + '+$', 'g'), '');
          
          if (useMaxLength && slug.length > maxChars) {
            slug = slug.substring(0, maxChars);
            const lastSepIndex = slug.lastIndexOf(separator);
            if (lastSepIndex > maxChars * 0.7) {
              slug = slug.substring(0, lastSepIndex);
            }
            slug = slug.replace(new RegExp(separator + '+$', 'g'), '');
          }
          
          document.getElementById('codeContent').textContent = slug;
          document.getElementById('output').style.display = 'block';
        }
        
        function clearFields() {
          document.getElementById('inputText').value = '';
          document.getElementById('output').style.display = 'none';
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Herramientas</p>
    </footer>
  </div>
</body>
</html>
