<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Sitemap XML - 205 Tools</title>
  <meta name="description" content="Genera sitemap XML para tu sitio web.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🗺️ Generador de Sitemap XML</h1>
      <p>Genera sitemap XML para mejor SEO e indexación en motores de búsqueda.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generar</h2>
        <div class="lang-selector">
          <a href="../en/sitemap-xml-generator.html" class="lang-btn ">EN</a><a href="../es/sitemap-xml-generator.html" class="lang-btn active">ES</a><a href="../fr/sitemap-xml-generator.html" class="lang-btn ">FR</a><a href="../de/sitemap-xml-generator.html" class="lang-btn ">DE</a><a href="../ar/sitemap-xml-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>URLs (una por línea)</label>
        <textarea id="urls" rows="8" placeholder="https://ejemplo.com/&#10;https://ejemplo.com/nosotros&#10;https://ejemplo.com/contacto"></textarea>
      </div>
      <div class="form-group">
        <label>Prioridad Predeterminada (0.0 - 1.0)</label>
        <input type="number" id="priority" value="0.5" min="0" max="1" step="0.1">
      </div>
      <div class="form-group">
        <label>Frecuencia de Cambio</label>
        <select id="changefreq">
          <option value="always">Siempre</option>
          <option value="hourly">Cada hora</option>
          <option value="daily">Diario</option>
          <option value="weekly">Semanal</option>
          <option value="monthly" selected>Mensual</option>
          <option value="yearly">Anual</option>
          <option value="never">Nunca</option>
        </select>
      </div>
      <div class="form-group">
        <label>Fecha de Última Modificación</label>
        <input type="date" id="lastmod">
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateSitemap()">Generar</button>
        <button class="btn btn-secondary" onclick="clearFields()">Limpiar</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="¡Copiado!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Copiar</button>
        <button class="btn btn-primary" onclick="downloadSitemap()">Descargar sitemap.xml</button>
      </div>
      
      <script>
        let currentSitemap = '';
        
        function generateSitemap() {
          const urlsInput = document.getElementById('urls').value.trim();
          const priority = document.getElementById('priority').value;
          const changefreq = document.getElementById('changefreq').value;
          const lastmodInput = document.getElementById('lastmod').value;
          
          if (!urlsInput) {
            alert('Por favor ingresa al menos una URL');
            return;
          }
          
          const urls = urlsInput.split('\n').map(u => u.trim()).filter(u => u);
          const lastmod = lastmodInput || new Date().toISOString().split('T')[0];
          
          let sitemap = '<?xml version="1.0" encoding="UTF-8"?>\n';
          sitemap += '<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n';
          
          urls.forEach(url => {
            sitemap += '  <url>\n';
            sitemap += '    <loc>' + escapeXml(url) + '</loc>\n';
            sitemap += '    <lastmod>' + lastmod + '</lastmod>\n';
            sitemap += '    <changefreq>' + changefreq + '</changefreq>\n';
            sitemap += '    <priority>' + priority + '</priority>\n';
            sitemap += '  </url>\n';
          });
          
          sitemap += '</urlset>';
          
          currentSitemap = sitemap;
          document.getElementById('codeContent').textContent = sitemap;
          document.getElementById('output').style.display = 'block';
        }
        
        function escapeXml(text) {
          return text.replace(/&/g, '&amp;')
                     .replace(/</g, '&lt;')
                     .replace(/>/g, '&gt;')
                     .replace(/"/g, '&quot;')
                     .replace(/'/g, '&apos;');
        }
        
        function downloadSitemap() {
          if (!currentSitemap) return;
          const blob = new Blob([currentSitemap], { type: 'application/xml' });
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'sitemap.xml';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
        
        function clearFields() {
          document.getElementById('urls').value = '';
          document.getElementById('priority').value = '0.5';
          document.getElementById('changefreq').value = 'monthly';
          document.getElementById('lastmod').value = '';
          document.getElementById('output').style.display = 'none';
        }
        
        document.getElementById('lastmod').value = new Date().toISOString().split('T')[0];
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Herramientas</p>
    </footer>
  </div>
</body>
</html>
