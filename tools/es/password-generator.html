<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Contraseñas - 205 Tools</title>
  <meta name="description" content="Genera contraseñas seguras aleatorias.">
  <link rel="stylesheet" href="../assets/tools.css">
  <script src="../assets/tools.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔐 Generador de Contraseñas</h1>
      <p>Genera contraseñas seguras aleatorias.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Opciones</h2>
        <div class="lang-selector">
          <a href="../en/password-generator.html" class="lang-btn ">EN</a><a href="../es/password-generator.html" class="lang-btn active">ES</a><a href="../fr/password-generator.html" class="lang-btn ">FR</a><a href="../de/password-generator.html" class="lang-btn ">DE</a><a href="../ar/password-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      
      <div class="form-group">
        <label>Password Length</label>
        <input type="number" id="length" value="16" min="4" max="128">
      </div>
      <div class="form-group">
        <label><input type="checkbox" id="uppercase" checked> Uppercase (A-Z)</label>
        <label><input type="checkbox" id="lowercase" checked> Lowercase (a-z)</label>
        <label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
        <label><input type="checkbox" id="symbols" checked> Symbols (!@#$%)</label>
      </div>
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generatePassword()">Generate Password</button>
      </div>
      <div class="result-box" style="margin-top: 20px;">
        <div class="result-value" id="password" style="font-family: monospace; word-break: break-all;">-</div>
      </div>
      <div class="btn-group" style="margin-top: 15px;">
        <button class="btn btn-success" data-success="¡Copiado!" onclick="copyToClipboard(document.getElementById('password').textContent, this)">Copiar</button>
      </div>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Herramientas</p>
    </footer>
  </div>
  
  <script>
    
      function generatePassword() {
        const length = parseInt(document.getElementById('length').value);
        const useUpper = document.getElementById('uppercase').checked;
        const useLower = document.getElementById('lowercase').checked;
        const useNumbers = document.getElementById('numbers').checked;
        const useSymbols = document.getElementById('symbols').checked;
        
        let chars = '';
        if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
        if (useNumbers) chars += '0123456789';
        if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
        
        if (!chars) {
          alert('Please select at least one character type');
          return;
        }
        
        let password = '';
        for (let i = 0; i < length; i++) {
          password += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        
        document.getElementById('password').textContent = password;
      }
    
  </script>
</body>
</html>
