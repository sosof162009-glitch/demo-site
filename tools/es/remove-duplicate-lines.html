<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliminar Líneas Duplicadas - 205 Tools</title>
  <meta name="description" content="Eliminar líneas duplicadas de su texto.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔄 Eliminar Líneas Duplicadas</h1>
      <p>Eliminar líneas duplicadas de su texto manteniendo el orden</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Texto de Entrada</h2>
        <div class="lang-selector">
          <a href="../en/remove-duplicate-lines.html" class="lang-btn">EN</a>
          <a href="./remove-duplicate-lines.html" class="lang-btn active">ES</a>
          <a href="../fr/remove-duplicate-lines.html" class="lang-btn">FR</a>
          <a href="../de/remove-duplicate-lines.html" class="lang-btn">DE</a>
          <a href="../ar/remove-duplicate-lines.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Pegue el texto con líneas duplicadas aquí..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="removeDuplicates()">Eliminar Duplicados</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Resultado</label>
        <textarea id="output" rows="8" readonly placeholder="El resultado aparecerá aquí..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copiar Resultado</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Online Gratis</p></footer>
  </div>
  
  <script>
    function removeDuplicates() {
      const input = document.getElementById('input').value;
      if (!input.trim()) return;
      
      const lines = input.split('\n');
      const seen = new Set();
      const unique = [];
      
      for (const line of lines) {
        if (!seen.has(line)) {
          seen.add(line);
          unique.push(line);
        }
      }
      
      document.getElementById('output').value = unique.join('\n');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('¡Copiado al portapapeles!');
    }
  </script>
</body>
</html>
