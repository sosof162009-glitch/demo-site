<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Convertidor de Octal a Decimal - 205 Tools</title>
  <meta name="description" content="Convierte números octales a formato decimal.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .converter-box { background: var(--bg-secondary); padding: 25px; border-radius: 12px; margin-top: 20px; }
    .input-group { margin-bottom: 20px; }
    .input-group label { display: block; margin-bottom: 8px; color: var(--text-secondary); font-size: 14px; text-transform: uppercase; }
    .input-group input { width: 100%; font-family: monospace; font-size: 18px; padding: 15px; background: var(--bg-card); border: 1px solid var(--border); color: var(--text-primary); border-radius: 6px; }
    .result-box { background: var(--bg-card); padding: 20px; border-radius: 8px; margin-top: 15px; border-left: 4px solid var(--primary); }
    .result-box label { color: var(--primary); font-size: 12px; text-transform: uppercase; display: block; margin-bottom: 5px; }
    .result-box .value { font-family: monospace; font-size: 24px; color: var(--text-primary); word-break: break-all; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔢 Convertidor de Octal a Decimal</h1>
      <p>Convierte números octales a formato decimal</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Convertidor</h2>
        <div class="lang-selector">
          <a href="../en/octal-to-decimal.html" class="lang-btn">EN</a>
          <a href="./octal-to-decimal.html" class="lang-btn active">ES</a>
          <a href="../fr/octal-to-decimal.html" class="lang-btn">FR</a>
          <a href="../de/octal-to-decimal.html" class="lang-btn">DE</a>
          <a href="../ar/octal-to-decimal.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="converter-box">
        <div class="input-group">
          <label>Número Octal (Base 8)</label>
          <input type="text" id="octalInput" placeholder="Ingresa un número octal (ej., 377)" oninput="convertToDecimal()">
        </div>
        
        <div class="result-box">
          <label>Resultado Decimal (Base 10)</label>
          <div class="value" id="decimalResult">-</div>
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
        <button class="btn btn-success" onclick="copyResult()">Copiar Resultado</button>
        <button class="btn btn-secondary" onclick="loadExample()">Ejemplo</button>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Gratuitas</p></footer>
  </div>
  
  <script>
    function convertToDecimal() {
      const input = document.getElementById('octalInput').value.trim();
      const resultEl = document.getElementById('decimalResult');
      
      if (!input) {
        resultEl.textContent = '-';
        return;
      }
      
      if (!/^[0-7]+$/.test(input)) {
        resultEl.textContent = 'Número octal inválido (use solo dígitos 0-7)';
        resultEl.style.color = 'var(--error)';
        return;
      }
      
      const decimal = parseInt(input, 8);
      if (isNaN(decimal)) {
        resultEl.textContent = 'Número inválido';
        resultEl.style.color = 'var(--error)';
        return;
      }
      
      resultEl.style.color = 'var(--text-primary)';
      resultEl.textContent = decimal.toString(10);
    }
    
    function clearAll() {
      document.getElementById('octalInput').value = '';
      document.getElementById('decimalResult').textContent = '-';
      document.getElementById('decimalResult').style.color = 'var(--text-primary)';
    }
    
    function copyResult() {
      const result = document.getElementById('decimalResult').textContent;
      if (result !== '-' && !result.includes('inválido')) {
        navigator.clipboard.writeText(result).then(() => {
          const btn = event.target;
          const originalText = btn.textContent;
          btn.textContent = '¡Copiado!';
          setTimeout(() => btn.textContent = originalText, 1500);
        });
      }
    }
    
    function loadExample() {
      document.getElementById('octalInput').value = '377';
      convertToDecimal();
    }
  </script>
</body>
</html>
