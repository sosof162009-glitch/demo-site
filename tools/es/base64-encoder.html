<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codificador Base64 - 205 Tools</title>
  <meta name="description" content="Codificar texto a formato Base64.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔒 Codificador Base64</h1>
      <p>Convertir texto a formato Base64</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Codificador</h2>
        <div class="lang-selector">
          <a href="../en/base64-encoder.html" class="lang-btn">EN</a>
          <a href="./base64-encoder.html" class="lang-btn active">ES</a>
          <a href="../fr/base64-encoder.html" class="lang-btn">FR</a>
          <a href="../de/base64-encoder.html" class="lang-btn">DE</a>
          <a href="../ar/base64-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Texto a Codificar</label>
        <textarea id="input" rows="8" placeholder="Ingrese texto para codificar...">¡Hola, Mundo! 👋</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encode()">🔒 Codificar</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copiar</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Resultado Base64</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Gratuitas</p></footer>
  </div>
  
  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) { alert('Por favor ingrese texto'); return; }
      
      try {
        const result = btoa(unescape(encodeURIComponent(text)));
        document.getElementById('output').value = result;
      } catch (e) {
        alert('Error al codificar texto');
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('¡Copiado!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
