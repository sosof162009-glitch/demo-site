<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Meta Tags - 205 Tools</title>
  <meta name="description" content="Genera meta tags SEO completos para tu sitio web.">
  <link rel="stylesheet" href="../assets/css/tools.css">
  <script src="../assets/js/utils.js" defer></script>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🏷️ Generador de Meta Tags</h1>
      <p>Genera meta tags SEO completos para tu sitio web.</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Generar</h2>
        <div class="lang-selector">
          <a href="../en/meta-tags-generator.html" class="lang-btn ">EN</a><a href="../es/meta-tags-generator.html" class="lang-btn active">ES</a><a href="../fr/meta-tags-generator.html" class="lang-btn ">FR</a><a href="../de/meta-tags-generator.html" class="lang-btn ">DE</a><a href="../ar/meta-tags-generator.html" class="lang-btn ">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Título de la Página</label>
        <input type="text" id="pageTitle" placeholder="Mi Página Increíble" maxlength="60">
        <small>Recomendado: 50-60 caracteres</small>
      </div>
      <div class="form-group">
        <label>Descripción Meta</label>
        <textarea id="metaDesc" placeholder="Describe el contenido de tu página..." maxlength="160"></textarea>
        <small>Recomendado: 150-160 caracteres</small>
      </div>
      <div class="form-group">
        <label>Palabras Clave (separadas por comas)</label>
        <input type="text" id="keywords" placeholder="seo, meta tags, generador">
      </div>
      <div class="form-group">
        <label>Autor</label>
        <input type="text" id="author" placeholder="Tu Nombre">
      </div>
      <div class="form-group">
        <label>URL Canónica</label>
        <input type="url" id="canonicalUrl" placeholder="https://ejemplo.com/pagina">
      </div>
      <div class="form-group">
        <label>Robots</label>
        <select id="robots">
          <option value="index, follow">Indexar, Seguir</option>
          <option value="noindex, follow">No Indexar, Seguir</option>
          <option value="index, nofollow">Indexar, No Seguir</option>
          <option value="noindex, nofollow">No Indexar, No Seguir</option>
        </select>
      </div>
      <div class="form-group">
        <label>Idioma</label>
        <select id="language">
          <option value="es">Español</option>
          <option value="en">Inglés</option>
          <option value="fr">Francés</option>
          <option value="de">Alemán</option>
          <option value="ar">Árabe</option>
        </select>
      </div>
      <div class="form-group">
        <label>Viewport (para diseño responsivo)</label>
        <input type="checkbox" id="viewport" checked> Incluir meta tag viewport
      </div>
      <div class="form-group">
        <label>Charset</label>
        <select id="charset">
          <option value="UTF-8">UTF-8</option>
          <option value="ISO-8859-1">ISO-8859-1</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="generateMetaTags()">Generar</button>
        <button class="btn btn-secondary" onclick="clearFields()">Limpiar</button>
      </div>
      
      <div class="code-output" id="output" style="display:none;">
        <pre id="codeContent"></pre>
        <button class="btn btn-success" data-success="¡Copiado!" onclick="copyToClipboard(document.getElementById('codeContent').textContent, this)">Copiar</button>
      </div>
      
      <script>
        function generateMetaTags() {
          const title = document.getElementById('pageTitle').value;
          const desc = document.getElementById('metaDesc').value;
          const keywords = document.getElementById('keywords').value;
          const author = document.getElementById('author').value;
          const canonical = document.getElementById('canonicalUrl').value;
          const robots = document.getElementById('robots').value;
          const language = document.getElementById('language').value;
          const charset = document.getElementById('charset').value;
          const viewport = document.getElementById('viewport').checked;
          
          let meta = '';
          
          meta += '<!-- Meta Tags Básicos -->\n';
          meta += '<meta charset="' + charset + '">\n';
          if (viewport) {
            meta += '<meta name="viewport" content="width=device-width, initial-scale=1.0">\n';
          }
          if (title) {
            meta += '<title>' + escapeHtml(title) + '</title>\n';
            meta += '<meta name="title" content="' + escapeHtml(title) + '">\n';
          }
          if (desc) {
            meta += '<meta name="description" content="' + escapeHtml(desc) + '">\n';
          }
          if (keywords) {
            meta += '<meta name="keywords" content="' + escapeHtml(keywords) + '">\n';
          }
          if (author) {
            meta += '<meta name="author" content="' + escapeHtml(author) + '">\n';
          }
          meta += '<meta name="language" content="' + language + '">\n';
          meta += '<meta name="robots" content="' + robots + '">\n';
          
          if (canonical) {
            meta += '\n<!-- URL Canónica -->\n';
            meta += '<link rel="canonical" href="' + escapeHtml(canonical) + '">\n';
          }
          
          document.getElementById('codeContent').textContent = meta;
          document.getElementById('output').style.display = 'block';
        }
        
        function escapeHtml(text) {
          const div = document.createElement('div');
          div.textContent = text;
          return div.innerHTML;
        }
        
        function clearFields() {
          document.getElementById('pageTitle').value = '';
          document.getElementById('metaDesc').value = '';
          document.getElementById('keywords').value = '';
          document.getElementById('author').value = '';
          document.getElementById('canonicalUrl').value = '';
          document.getElementById('output').style.display = 'none';
        }
      </script>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Herramientas</p>
    </footer>
  </div>
</body>
</html>
