<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HEX to HSL Converter - 205 Tools</title>
  <meta name="description" content="Convert HEX color codes to HSL values instantly.">
  <link rel="stylesheet" href="../assets/tools.css">
  <style>
    .color-preview {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: 3px solid var(--border);
      margin: 20px 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 600;
      text-shadow: 0 1px 2px rgba(0,0,0,0.3);
      transition: background-color 0.3s ease;
    }
    .input-group {
      display: flex;
      gap: 10px;
      margin-bottom: 20px;
    }
    .input-group input {
      flex: 1;
      padding: 15px;
      font-size: 18px;
      font-family: monospace;
      text-align: center;
      text-transform: uppercase;
    }
    .result-box {
      background: var(--bg-secondary);
      border-radius: 12px;
      padding: 20px;
      margin: 20px 0;
      border: 2px solid var(--border);
    }
    .result-value {
      font-family: monospace;
      font-size: 24px;
      color: var(--accent);
      text-align: center;
      margin: 10px 0;
    }
    .hsl-info {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 15px;
      margin-top: 20px;
    }
    .info-box {
      background: var(--bg-secondary);
      padding: 15px;
      border-radius: 8px;
      text-align: center;
    }
    .info-box label {
      display: block;
      font-size: 12px;
      color: var(--text-secondary);
      margin-bottom: 5px;
    }
    .info-box span {
      font-size: 20px;
      font-weight: 600;
    }
    .h-hint { color: #ff6b6b; }
    .s-hint { color: #4ecdc4; }
    .l-hint { color: #45b7d1; }
  </style>
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Home</a>
    
    <header>
      <h1>🎨 HEX to HSL Converter</h1>
      <p>Convert HEX color codes to HSL values</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Converter</h2>
        <div class="lang-selector">
          <a href="./hex-to-hsl.html" class="lang-btn active">EN</a>
          <a href="../es/hex-to-hsl.html" class="lang-btn">ES</a>
          <a href="../fr/hex-to-hsl.html" class="lang-btn">FR</a>
          <a href="../de/hex-to-hsl.html" class="lang-btn">DE</a>
          <a href="../ar/hex-to-hsl.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>HEX Color Code</label>
        <div class="input-group">
          <span style="font-size: 24px; padding: 15px;">#</span>
          <input type="text" id="hexInput" placeholder="4f8ef7" maxlength="6" value="4f8ef7">
        </div>
      </div>
      
      <div id="colorPreview" class="color-preview" style="background-color: #4f8ef7;">
        <span id="previewText">#4f8ef7</span>
      </div>
      
      <div class="result-box">
        <label>HSL Result</label>
        <div class="result-value" id="hslResult">hsl(217, 91%, 64%)</div>
      </div>
      
      <div class="hsl-info">
        <div class="info-box">
          <label class="h-hint">Hue (H)</label>
          <span id="hValue">217°</span>
        </div>
        <div class="info-box">
          <label class="s-hint">Saturation (S)</label>
          <span id="sValue">91%</span>
        </div>
        <div class="info-box">
          <label class="l-hint">Lightness (L)</label>
          <span id="lValue">64%</span>
        </div>
      </div>
      
      <div class="btn-group" style="margin-top: 20px;">
        <button class="btn btn-primary" onclick="copyHSL()">📋 Copy HSL</button>
        <button class="btn btn-secondary" onclick="copyCSS()">📝 Copy CSS</button>
        <button class="btn btn-success" onclick="randomColor()">🎲 Random</button>
      </div>
    </div>
    
    <footer>
      <p>205 Tools © 2025 - Free Online Tools</p>
    </footer>
  </div>
  
  <script>
    const hexInput = document.getElementById('hexInput');
    const colorPreview = document.getElementById('colorPreview');
    const previewText = document.getElementById('previewText');
    const hslResult = document.getElementById('hslResult');
    const hValue = document.getElementById('hValue');
    const sValue = document.getElementById('sValue');
    const lValue = document.getElementById('lValue');
    
    hexInput.addEventListener('input', convertHexToHSL);
    
    function convertHexToHSL() {
      let hex = hexInput.value.trim().replace('#', '');
      
      if (hex.length === 3) {
        hex = hex.split('').map(c => c + c).join('');
      }
      
      if (!/^[0-9A-Fa-f]{6}$/.test(hex)) {
        return;
      }
      
      const r = parseInt(hex.substring(0, 2), 16) / 255;
      const g = parseInt(hex.substring(2, 4), 16) / 255;
      const b = parseInt(hex.substring(4, 6), 16) / 255;
      
      const max = Math.max(r, g, b);
      const min = Math.min(r, g, b);
      let h, s, l = (max + min) / 2;
      
      if (max === min) {
        h = s = 0;
      } else {
        const d = max - min;
        s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
        switch (max) {
          case r: h = (g - b) / d + (g < b ? 6 : 0); break;
          case g: h = (b - r) / d + 2; break;
          case b: h = (r - g) / d + 4; break;
        }
        h /= 6;
      }
      
      const hDeg = Math.round(h * 360);
      const sPct = Math.round(s * 100);
      const lPct = Math.round(l * 100);
      
      const fullHex = '#' + hex;
      
      colorPreview.style.backgroundColor = fullHex;
      previewText.textContent = fullHex;
      
      const brightness = (parseInt(hex.substring(0, 2), 16) * 299 + 
                         parseInt(hex.substring(2, 4), 16) * 587 + 
                         parseInt(hex.substring(4, 6), 16) * 114) / 1000;
      previewText.style.color = brightness > 128 ? '#000' : '#fff';
      
      hslResult.textContent = `hsl(${hDeg}, ${sPct}%, ${lPct}%)`;
      hValue.textContent = hDeg + '°';
      sValue.textContent = sPct + '%';
      lValue.textContent = lPct + '%';
    }
    
    function copyHSL() {
      navigator.clipboard.writeText(hslResult.textContent).then(() => {
        alert('HSL copied: ' + hslResult.textContent);
      });
    }
    
    function copyCSS() {
      const css = `color: ${hslResult.textContent};`;
      navigator.clipboard.writeText(css).then(() => {
        alert('CSS copied: ' + css);
      });
    }
    
    function randomColor() {
      const randomHex = Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0');
      hexInput.value = randomHex;
      convertHexToHSL();
    }
    
    // Initialize
    convertHexToHSL();
  </script>
</body>
</html>
