<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eliminar Espacios Extra - 205 Tools</title>
  <meta name="description" content="Eliminar espacios extra de su texto.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>✂️ Eliminar Espacios Extra</h1>
      <p>Eliminar espacios extra, tabulaciones y limpiar el texto</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Texto de Entrada</h2>
        <div class="lang-selector">
          <a href="../en/remove-extra-spaces.html" class="lang-btn">EN</a>
          <a href="./remove-extra-spaces.html" class="lang-btn active">ES</a>
          <a href="../fr/remove-extra-spaces.html" class="lang-btn">FR</a>
          <a href="../de/remove-extra-spaces.html" class="lang-btn">DE</a>
          <a href="../ar/remove-extra-spaces.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <textarea id="input" rows="8" placeholder="Pegue el texto con espacios extra aquí..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="removeExtraSpaces()">Eliminar Espacios Extra</button>
        <button class="btn btn-primary" onclick="removeAllSpaces()">Eliminar TODOS los Espacios</button>
        <button class="btn btn-primary" onclick="trimLines()">Recortar Cada Línea</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Resultado</label>
        <textarea id="output" rows="8" readonly placeholder="El texto limpio aparecerá aquí..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copiar Resultado</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Online Gratis</p></footer>
  </div>
  
  <script>
    function removeExtraSpaces() {
      let text = document.getElementById('input').value;
      text = text.replace(/\s+/g, ' ').replace(/^\s+|\s+$/gm, '');
      document.getElementById('output').value = text;
    }
    
    function removeAllSpaces() {
      let text = document.getElementById('input').value;
      text = text.replace(/\s/g, '');
      document.getElementById('output').value = text;
    }
    
    function trimLines() {
      let text = document.getElementById('input').value;
      text = text.split('\n').map(line => line.trim()).join('\n');
      document.getElementById('output').value = text;
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('¡Copiado al portapapeles!');
    }
  </script>
</body>
</html>
