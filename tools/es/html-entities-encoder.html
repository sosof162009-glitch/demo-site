<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Codificador de Entidades HTML - 205 Tools</title>
  <meta name="description" content="Codificar caracteres especiales a entidades HTML.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔤 Codificador de Entidades HTML</h1>
      <p>Convertir caracteres especiales a entidades HTML</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Codificador</h2>
        <div class="lang-selector">
          <a href="../en/html-entities-encoder.html" class="lang-btn">EN</a>
          <a href="./html-entities-encoder.html" class="lang-btn active">ES</a>
          <a href="../fr/html-entities-encoder.html" class="lang-btn">FR</a>
          <a href="../de/html-entities-encoder.html" class="lang-btn">DE</a>
          <a href="../ar/html-entities-encoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Texto a Codificar</label>
        <textarea id="input" rows="8" placeholder="Ingrese texto con caracteres especiales..."><div>Hola & ¡Bienvenido!</div>
<p>5 < 10 & 10 > 5</p>
"Comillas" y 'apóstrofes'
Copyright © 2025</textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="encode()">🔒 Codificar</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copiar</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>HTML Codificado</label>
        <textarea id="output" rows="8" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Gratuitas</p></footer>
  </div>
  
  <script>
    function encode() {
      const text = document.getElementById('input').value;
      if (!text) return;
      
      const entities = {
        '&': '&amp;',
        '<': '&lt;',
        '>': '&gt;',
        '"': '&quot;',
        "'": '&#39;',
        '©': '&copy;',
        '®': '&reg;',
        '™': '&trade;',
        '€': '&euro;',
        '£': '&pound;',
        '¥': '&yen;',
        ' ': '&nbsp;'
      };
      
      let encoded = text;
      for (const [char, entity] of Object.entries(entities)) {
        encoded = encoded.split(char).join(entity);
      }
      
      document.getElementById('output').value = encoded;
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('¡Copiado!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
