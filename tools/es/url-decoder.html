<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Decodificador URL - 205 Tools</title>
  <meta name="description" content="Decodificar cadenas codificadas en URL.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔗 Decodificador URL</h1>
      <p>Decodificar cadenas codificadas en URL</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Decodificador</h2>
        <div class="lang-selector">
          <a href="../en/url-decoder.html" class="lang-btn">EN</a>
          <a href="./url-decoder.html" class="lang-btn active">ES</a>
          <a href="../fr/url-decoder.html" class="lang-btn">FR</a>
          <a href="../de/url-decoder.html" class="lang-btn">DE</a>
          <a href="../ar/url-decoder.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Texto Codificado en URL</label>
        <textarea id="input" rows="8" placeholder="Ingrese texto codificado en URL..."></textarea>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="decode()">🔗 Decodificar</button>
        <button class="btn btn-success" onclick="copyResult()">📋 Copiar</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Resultado Decodificado</label>
        <textarea id="output" rows="6" readonly></textarea>
      </div>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Gratuitas</p></footer>
  </div>
  
  <script>
    function decode() {
      const text = document.getElementById('input').value.trim();
      if (!text) { alert('Por favor ingrese texto codificado en URL'); return; }
      
      try {
        const result = decodeURIComponent(text);
        document.getElementById('output').value = result;
      } catch (e) {
        alert('Error al decodificar URL: ' + e.message);
      }
    }
    
    function copyResult() {
      navigator.clipboard.writeText(document.getElementById('output').value);
      alert('¡Copiado!');
    }
    
    function clearAll() {
      document.getElementById('input').value = '';
      document.getElementById('output').value = '';
    }
  </script>
</body>
</html>
