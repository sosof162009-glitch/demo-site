<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repetidor de Texto - 205 Tools</title>
  <meta name="description" content="Repita texto múltiples veces con varias opciones.">
  <link rel="stylesheet" href="../assets/tools.css">
</head>
<body>
  <div class="container">
    <a href="/" class="back-link">← Inicio</a>
    
    <header>
      <h1>🔄 Repetidor de Texto</h1>
      <p>Repita texto múltiples veces con opciones personalizadas</p>
    </header>
    
    <div class="tool-container">
      <div class="tool-header">
        <h2>Entrada</h2>
        <div class="lang-selector">
          <a href="../en/text-repeater.html" class="lang-btn">EN</a>
          <a href="./text-repeater.html" class="lang-btn active">ES</a>
          <a href="../fr/text-repeater.html" class="lang-btn">FR</a>
          <a href="../de/text-repeater.html" class="lang-btn">DE</a>
          <a href="../ar/text-repeater.html" class="lang-btn">AR</a>
        </div>
      </div>
      
      <div class="form-group">
        <label>Texto a Repetir</label>
        <input type="text" id="textInput" placeholder="Ingrese texto a repetir...">
      </div>
      
      <div class="form-group">
        <label>Cantidad de Repeticiones</label>
        <input type="number" id="repeatCount" value="10" min="1" max="1000">
      </div>
      
      <div class="form-group">
        <label>Separador</label>
        <select id="separator">
          <option value="">Ninguno</option>
          <option value=" ">Espacio</option>
          <option value="\n">Nueva Línea</option>
          <option value=",">Coma</option>
          <option value=" - ">Guión</option>
        </select>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-primary" onclick="repeatText()">Repetir</button>
        <button class="btn btn-secondary" onclick="clearAll()">Limpiar</button>
      </div>
      
      <div class="form-group" style="margin-top: 20px;">
        <label>Resultado</label>
        <textarea id="output" rows="8" readonly placeholder="El texto repetido aparecerá aquí..."></textarea>
      </div>
      
      <button class="btn btn-primary" onclick="copyResult()">Copiar Resultado</button>
    </div>
    
    <footer><p>205 Tools © 2025 - Herramientas Online Gratis</p></footer>
  </div>
  
  <script>
    function repeatText() {
      const text = document.getElementById('textInput').value;
      const count = parseInt(document.getElementById('repeatCount').value) || 10;
      const separator = document.getElementById('separator').value;
      
      if (!text) return;
      
      const result = Array(count).fill(text).join(separator);
      document.getElementById('output').value = result;
    }
    
    function clearAll() {
      document.getElementById('textInput').value = '';
      document.getElementById('output').value = '';
    }
    
    function copyResult() {
      const output = document.getElementById('output');
      output.select();
      document.execCommand('copy');
      alert('¡Copiado al portapapeles!');
    }
  </script>
</body>
</html>
