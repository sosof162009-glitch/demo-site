<!DOCTYPE html>
<html lang="{{lang}}" dir="{{dir}}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{title}} - 205-Tools</title>
    <meta name="description" content="{{description}}">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github.min.css" id="light-theme">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css" id="dark-theme" disabled>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    colors: { 
                        primary: '#6366f1',
                        secondary: '#8b5cf6',
                        accent: '#06b6d4'
                    } 
                } 
            } 
        };
    </script>
    <style>
        /* Code Editor Style */
        .code-editor {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .editor-pane {
            background: #fafafa;
            border: 2px solid #e5e7eb;
            border-radius: 12px;
            overflow: hidden;
        }
        .dark .editor-pane {
            background: #0d1117;
            border-color: #30363d;
        }
        .editor-header {
            background: #f3f4f6;
            border-bottom: 1px solid #e5e7eb;
            padding: 12px 16px;
        }
        .dark .editor-header {
            background: #161b22;
            border-color: #30363d;
        }
        .editor-textarea {
            width: 100%;
            min-height: 400px;
            padding: 16px;
            background: transparent;
            border: none;
            resize: vertical;
            outline: none;
            color: inherit;
        }
        .action-btn {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .action-btn.primary {
            background: #6366f1;
            color: white;
        }
        .action-btn.primary:hover {
            background: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }
        .action-btn.secondary {
            background: #f3f4f6;
            color: #374151;
            border: 1px solid #e5e7eb;
        }
        .dark .action-btn.secondary {
            background: #1f2937;
            color: #d1d5db;
            border-color: #374151;
        }
        .action-btn.secondary:hover {
            background: #e5e7eb;
        }
        .dark .action-btn.secondary:hover {
            background: #374151;
        }
        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
        }
        .status-badge.success {
            background: #dcfce7;
            color: #166534;
        }
        .dark .status-badge.success {
            background: #14532d;
            color: #86efac;
        }
        .status-badge.error {
            background: #fee2e2;
            color: #991b1b;
        }
        .dark .status-badge.error {
            background: #450a0a;
            color: #fca5a5;
        }
        .tool-tab {
            padding: 8px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        .tool-tab:hover {
            background: #f3f4f6;
        }
        .dark .tool-tab:hover {
            background: #1f2937;
        }
        .tool-tab.active {
            background: #6366f1;
            color: white;
        }
        .diff-added {
            background: #dcfce7;
            color: #166534;
        }
        .dark .diff-added {
            background: #14532d;
            color: #86efac;
        }
        .diff-removed {
            background: #fee2e2;
            color: #991b1b;
        }
        .dark .diff-removed {
            background: #450a0a;
            color: #fca5a5;
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/{{lang}}/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">
                    205-Tools
                </a>
                <div class="flex items-center gap-4">
                    <a href="/{{lang}}/{{category}}/" class="text-sm text-gray-600 dark:text-gray-400 hover:text-indigo-500">
                        ← {{category_name}}
                    </a>
                    <button onclick="toggleTheme()" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">
                        <span id="theme-icon">🌙</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Hero -->
    <section class="bg-gradient-to-br from-indigo-600 via-purple-600 to-cyan-500 text-white py-10">
        <div class="max-w-5xl mx-auto px-4 text-center">
            <span class="inline-block px-4 py-1 bg-white/20 rounded-full text-sm mb-3">👨‍💻 {{category_name}}</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-3">{{title}}</h1>
            <p class="text-lg text-white/90 max-w-2xl mx-auto">{{description}}</p>
        </div>
    </section>

    <!-- Main Interface -->
    <section class="py-8">
        <div class="max-w-6xl mx-auto px-4">
            
            <!-- Tool Tabs (for tools with multiple modes) -->
            <div id="toolTabs" class="flex flex-wrap gap-2 mb-6 justify-center">
                {{tool_tabs}}
            </div>

            <!-- Action Bar -->
            <div class="flex flex-wrap gap-3 mb-6 justify-center">
                <button onclick="formatCode()" class="action-btn primary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"/>
                    </svg>
                    {{format_btn}}
                </button>
                
                <button onclick="minifyCode()" class="action-btn secondary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"/>
                    </svg>
                    {{minify_btn}}
                </button>
                
                <button onclick="validateCode()" class="action-btn secondary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
                    </svg>
                    {{validate_btn}}
                </button>
                
                <button onclick="clearCode()" class="action-btn secondary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
                    </svg>
                    {{clear_btn}}
                </button>
                
                <button onclick="copyResult()" id="copyBtn" class="action-btn secondary">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/>
                    </svg>
                    {{copy_btn}}
                </button>
            </div>

            <!-- Editor Area -->
            <div class="editor-pane">
                <div class="editor-header flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <div class="flex gap-2">
                            <span class="w-3 h-3 rounded-full bg-red-500"></span>
                            <span class="w-3 h-3 rounded-full bg-yellow-500"></span>
                            <span class="w-3 h-3 rounded-full bg-green-500"></span>
                        </div>
                        <span class="text-sm text-gray-600 dark:text-gray-400">{{editor_title}}</span>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <span id="statusBadge" class="status-badge">
                            <span class="w-2 h-2 rounded-full bg-gray-400"></span>
                            {{ready_status}}
                        </span>
                        
                        <span id="charCount" class="text-sm text-gray-500">0 chars</span>
                    </div>
                </div>
                
                <textarea 
                    id="codeEditor" 
                    class="editor-textarea code-editor"
                    placeholder="{{placeholder}}"
                    spellcheck="false"
                ></textarea>
            </div>

            <!-- Result Area (if needed) -->
            <div id="resultArea" class="hidden mt-6">
                <div class="editor-pane">
                    <div class="editor-header">
                        <span class="text-sm text-gray-600 dark:text-gray-400">{{result_title}}</span>
                    </div>
                    
                    <pre><code id="resultCode" class="code-editor block p-4"></code></pre>
                </div>
            </div>

            <!-- Options Panel (if needed) -->
            <div id="optionsPanel" class="mt-6 bg-white dark:bg-gray-800 rounded-2xl shadow-lg p-6">
                <h3 class="text-lg font-semibold mb-4">{{options_title}}</h3>
                
                <div class="grid md:grid-cols-3 gap-4">
                    {{options_content}}
                </div>
            </div>

        </div>
    </section>

    <!-- Toast -->
    <div id="toast" class="fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-900 text-white rounded-xl shadow-2xl hidden items-center gap-2 z-50">
        <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span id="toastMessage"></span>
    </div>

    <script>
        const codeEditor = document.getElementById('codeEditor');
        const statusBadge = document.getElementById('statusBadge');
        const charCount = document.getElementById('charCount');
        
        // Update character count
        codeEditor.addEventListener('input', () => {
            const len = codeEditor.value.length;
            charCount.textContent = len + ' chars';
            
            if (len > 0) {
                updateStatus('typing', '{{typing_status}}');
            } else {
                updateStatus('ready', '{{ready_status}}');
            }
            
            // Auto-validate if enabled
            {{auto_validate}}
        });
        
        function updateStatus(type, message) {
            const colors = {
                ready: 'bg-gray-400',
                typing: 'bg-yellow-400',
                success: 'bg-green-400',
                error: 'bg-red-400'
            };
            
            statusBadge.innerHTML = `
                <span class="w-2 h-2 rounded-full ${colors[type] || colors.ready}"></span>
                ${message}
            `;
            statusBadge.className = 'status-badge ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
        }
        
        function formatCode() {
            try {
                const code = codeEditor.value;
                if (!code.trim()) {
                    showToast('{{empty_warning}}');
                    return;
                }
                
                {{format_logic}}
                
                updateStatus('success', '{{formatted_status}}');
                showToast('{{formatted_message}}');
            } catch (err) {
                updateStatus('error', '{{error_status}}');
                showToast('{{error_message}}: ' + err.message);
            }
        }
        
        function minifyCode() {
            try {
                const code = codeEditor.value;
                if (!code.trim()) {
                    showToast('{{empty_warning}}');
                    return;
                }
                
                {{minify_logic}}
                
                updateStatus('success', '{{minified_status}}');
                showToast('{{minified_message}}');
            } catch (err) {
                updateStatus('error', '{{error_status}}');
                showToast('{{error_message}}: ' + err.message);
            }
        }
        
        function validateCode() {
            try {
                const code = codeEditor.value;
                if (!code.trim()) {
                    showToast('{{empty_warning}}');
                    return;
                }
                
                {{validate_logic}}
                
            } catch (err) {
                updateStatus('error', '{{invalid_status}}');
                showToast('{{invalid_message}}');
            }
        }
        
        function clearCode() {
            codeEditor.value = '';
            charCount.textContent = '0 chars';
            updateStatus('ready', '{{ready_status}}');
            showToast('{{cleared_message}}');
        }
        
        async function copyResult() {
            try {
                await navigator.clipboard.writeText(codeEditor.value);
                showToast('{{copied_message}}');
            } catch (err) {
                codeEditor.select();
                document.execCommand('copy');
                showToast('{{copied_message}}');
            }
        }
        
        function showToast(message) {
            const toast = document.getElementById('toast');
            document.getElementById('toastMessage').textContent = message;
            toast.classList.remove('hidden');
            toast.classList.add('flex');
            
            setTimeout(() => {
                toast.classList.add('hidden');
                toast.classList.remove('flex');
            }, 2000);
        }
        
        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').textContent = isDark ? '☀️' : '🌙';
            document.getElementById('light-theme').disabled = isDark;
            document.getElementById('dark-theme').disabled = !isDark;
        }
        
        // Tab switching
        document.querySelectorAll('.tool-tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tool-tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                {{tab_switch_logic}}
            });
        });
        
        // Initialize highlight.js
        hljs.highlightAll();
    </script>
</body>
</html>
