<!DOCTYPE html><html lang="ar" dir="rtl"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>إدارة اللغات | لوحة التحكم</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/admin.css">
<style>body{font-family:'Tajawal',sans-serif;}
.languages-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:20px;margin-bottom:24px;}
.lang-card{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
.lang-header{display:flex;align-items:center;gap:16px;margin-bottom:20px;}
.lang-flag{font-size:48px;}
.lang-info{flex:1;}
.lang-name{font-size:18px;font-weight:600;margin-bottom:4px;}
.lang-code{color:var(--text-secondary);font-size:14px;}
.lang-status{padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500;}
.lang-status.active{background:rgba(34,197,94,.1);color:#22c55e;}
.lang-status.inactive{background:rgba(107,114,128,.1);color:var(--text-secondary);}
.progress-section{margin-bottom:20px;}
.progress-header{display:flex;justify-content:space-between;margin-bottom:8px;}
.progress-bar{height:8px;background:var(--border);border-radius:4px;overflow:hidden;}
.progress-fill{height:100%;background:var(--primary);border-radius:4px;transition:width .3s;}
.lang-stats{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
.stat-item{background:var(--bg-primary);padding:12px;border-radius:8px;text-align:center;}
.stat-value{font-size:20px;font-weight:700;}
.stat-label{font-size:12px;color:var(--text-secondary);}
.editor-container{display:grid;grid-template-columns:1fr 1fr;gap:20px;}
.editor-col{background:var(--bg-card);border:1px solid var(--border);border-radius:var(--radius);}
.editor-header{padding:16px 20px;border-bottom:1px solid var(--border);font-weight:600;}
.editor-body{max-height:400px;overflow-y:auto;padding:0;}
.translation-row{display:grid;grid-template-columns:1fr 1fr;gap:0;border-bottom:1px solid var(--border);}
.translation-row:last-child{border-bottom:none;}
.translation-cell{padding:12px 16px;border-left:1px solid var(--border);}
.translation-cell:last-child{border-left:none;background:rgba(79,142,247,.02);}
.translation-cell input{width:100%;background:transparent;border:none;color:var(--text-primary);font-size:14px;outline:none;}
.translation-cell input:focus{background:var(--bg-primary);}
</style>
</head>
<body>
<div class="admin-container">
<aside class="sidebar" id="sidebar">
<div class="sidebar-header"><div class="logo"><div class="logo-icon"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg></div><span>Tools Admin</span></div></div>
<nav class="sidebar-nav">
<div class="nav-section"><div class="nav-label">الرئيسية</div><a href="dashboard.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg><span>لوحة التحكم</span></a></div>
<div class="nav-section"><div class="nav-label">الإدارة</div><a href="tools.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg><span>الأدوات</span></a><a href="categories.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg><span>الفئات</span></a></div>
<div class="nav-section"><div class="nav-label">الإعدادات</div><a href="seo.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg><span>SEO</span></a><a href="languages.html" class="nav-item active"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/></svg><span>اللغات</span></a><a href="ads.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>الإعلانات</span></a><a href="performance.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span>الأداء</span></a></div>
<div class="nav-section"><div class="nav-label">النظام</div><a href="notifications.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/></svg><span>الإشعارات</span></a><a href="settings.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg><span>الإعدادات</span></a></div>
</nav>
<div class="sidebar-footer"><a href="#" class="nav-item" onclick="localStorage.removeItem('adminToken');window.location.href='login.html'"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/></svg><span>تسجيل الخروج</span></a></div>
</aside>
<main class="main-content">
<header class="header">
<div class="header-left"><button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open')"><svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="6" x2="21" y2="6"/></svg></button><div><h1 class="page-title">إدارة اللغات</h1><div class="breadcrumb"><a href="dashboard.html">الرئيسية</a><span>/</span><span>اللغات</span></div></div></div>
<div class="header-right"><button class="btn btn-primary" onclick="saveAllTranslations()">حفظ الكل</button></div>
</header>
<div class="page-content">
<div class="languages-grid" id="langGrid"></div>
<div class="card"><div class="card-header"><h3 class="card-title">محرر الترجمة</h3><div style="display:flex;gap:12px"><select class="form-input" id="langSelect" onchange="changeEditorLang()"><option value="ar">العربية</option><option value="fr">Français</option><option value="es">Español</option><option value="de">Deutsch</option></select><input type="text" class="form-input" placeholder="البحث..." style="width:200px" id="searchTrans" onkeyup="filterTranslations()"></div></div>
<div class="card-body" style="padding:0"><div class="editor-container" id="editorContainer"></div></div>
</div>
</div>
</main>
</div>
<script>
if(!localStorage.getItem('adminToken'))window.location.href='login.html';
const languages=[
{code:'en',name:'English',flag:'🇬🇧',progress:100,translated:205,total:205,active:true,rtl:false,default:true},
{code:'ar',name:'العربية',flag:'🇸🇦',progress:87,translated:178,total:205,active:true,rtl:true,default:false},
{code:'fr',name:'Français',flag:'🇫🇷',progress:65,translated:133,total:205,active:true,rtl:false,default:false},
{code:'es',name:'Español',flag:'🇪🇸',progress:42,translated:86,total:205,active:true,rtl:false,default:false},
{code:'de',name:'Deutsch',flag:'🇩🇪',progress:38,translated:78,total:205,active:false,rtl:false,default:false}
];
const translations=[
{key:'nav.home',en:'Home',ar:'الرئيسية',fr:'Accueil',es:'Inicio',de:'Startseite'},
{key:'nav.tools',en:'Tools',ar:'الأدوات',fr:'Outils',es:'Herramientas',de:'Tools'},
{key:'nav.categories',en:'Categories',ar:'الفئات',fr:'Catégories',es:'Categorías',de:'Kategorien'},
{key:'tool.convert',en:'Convert',ar:'تحويل',fr:'Convertir',es:'Convertir',de:'Konvertieren'},
{key:'tool.upload',en:'Upload File',ar:'رفع الملف',fr:'Télécharger',es:'Subir archivo',de:'Datei hochladen'},
{key:'tool.download',en:'Download',ar:'تحميل',fr:'Télécharger',es:'Descargar',de:'Herunterladen'},
{key:'tool.processing',en:'Processing...',ar:'جاري المعالجة...',fr:'Traitement...',es:'Procesando...',de:'Verarbeitung...'},
{key:'btn.save',en:'Save',ar:'حفظ',fr:'Enregistrer',es:'Guardar',de:'Speichern'},
{key:'btn.cancel',en:'Cancel',ar:'إلغاء',fr:'Annuler',es:'Cancelar',de:'Abbrechen'},
{key:'btn.delete',en:'Delete',ar:'حذف',fr:'Supprimer',es:'Eliminar',de:'Löschen'}
];
let currentEditLang='ar';
function renderLanguages(){
document.getElementById('langGrid').innerHTML=languages.map(l=>`
<div class="lang-card">
<div class="lang-header">
<div class="lang-flag">${l.flag}</div>
<div class="lang-info">
<div class="lang-name">${l.name}</div>
<div class="lang-code">${l.code.toUpperCase()} ${l.rtl?'• RTL':''} ${l.default?'• افتراضي':''}</div>
</div>
<span class="lang-status ${l.active?'active':'inactive'}">${l.active?'مفعّلة':'معطّلة'}</span>
</div>
<div class="progress-section">
<div class="progress-header">
<span>نسبة الترجمة</span>
<span style="color:${l.progress>=80?'#22c55e':l.progress>=50?'#f59e0b':'#ef4444'}">${l.progress}%</span>
</div>
<div class="progress-bar"><div class="progress-fill" style="width:${l.progress}%"></div></div>
</div>
<div class="lang-stats">
<div class="stat-item"><div class="stat-value" style="color:#22c55e">${l.translated}</div><div class="stat-label">مترجم</div></div>
<div class="stat-item"><div class="stat-value" style="color:#ef4444">${l.total-l.translated}</div><div class="stat-label">متبقي</div></div>
</div>
<button class="btn btn-primary" style="width:100%" onclick="openEditor('${l.code}')">فتح المحرر</button>
</div>
`).join('');
}
function openEditor(lang){currentEditLang=lang;document.getElementById('langSelect').value=lang;renderEditor();}
function renderEditor(){
const filter=document.getElementById('searchTrans').value.toLowerCase();
const filtered=translations.filter(t=>t.key.toLowerCase().includes(filter)||t.en.toLowerCase().includes(filter));
document.getElementById('editorContainer').innerHTML=`
<div class="editor-col"><div class="editor-header">English (EN)</div><div class="editor-body">${filtered.map(t=>`<div class="translation-row"><div class="translation-cell" style="font-size:12px;color:var(--text-muted)">${t.key}</div></div><div class="translation-row"><div class="translation-cell">${t.en}</div></div>`).join('')}</div></div>
<div class="editor-col"><div class="editor-header">${getLangName(currentEditLang)} (${currentEditLang.toUpperCase()})</div><div class="editor-body">${filtered.map((t,i)=>`<div class="translation-row"><div class="translation-cell" style="font-size:12px;color:var(--text-muted)">${t.key}</div></div><div class="translation-row"><div class="translation-cell"><input type="text" value="${t[currentEditLang]||''}" data-key="${t.key}" onchange="updateTranslation('${t.key}',this.value)"></div></div>`).join('')}</div></div>`;
}
function getLangName(code){const l=languages.find(x=>x.code===code);return l?l.name:code;}
function updateTranslation(key,value){const t=translations.find(x=>x.key===key);if(t)t[currentEditLang]=value;}
function changeEditorLang(){currentEditLang=document.getElementById('langSelect').value;renderEditor();}
function filterTranslations(){renderEditor();}
function saveAllTranslations(){alert('تم حفظ الترجمات بنجاح!');}
renderLanguages();renderEditor();
</script>
</body></html>
