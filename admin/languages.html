<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Languages Management - Admin - 205-Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/admin.css">
    
    <style>
        .languages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--space-lg);
            margin-bottom: var(--space-xl);
        }
        
        .language-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            transition: all 0.2s;
        }
        
        .language-card:hover {
            border-color: var(--accent);
        }
        
        .language-header {
            display: flex;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-lg);
        }
        
        .language-flag {
            width: 48px;
            height: 48px;
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            background: var(--surface);
        }
        
        .language-info h3 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: 4px;
        }
        
        .language-info p {
            font-size: 0.875rem;
            color: var(--muted);
        }
        
        .progress-section {
            margin-bottom: var(--space-lg);
        }
        
        .progress-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-sm);
        }
        
        .progress-label {
            font-size: 0.875rem;
            color: var(--muted);
        }
        
        .progress-percent {
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--accent);
        }
        
        .progress-bar {
            height: 8px;
            background: var(--surface);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 0.3s;
        }
        
        .progress-fill.high { background: var(--success); }
        .progress-fill.medium { background: var(--warning); }
        .progress-fill.low { background: var(--error); }
        
        .language-stats {
            display: flex;
            gap: var(--space-lg);
            margin-bottom: var(--space-lg);
            font-size: 0.875rem;
        }
        
        .stat-item {
            color: var(--muted);
        }
        
        .stat-item strong {
            color: var(--text);
        }
        
        .language-actions {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: var(--space-md);
            border-top: 1px solid var(--border);
        }
        
        .toggle-group {
            display: flex;
            align-items: center;
            gap: var(--space-sm);
            font-size: 0.875rem;
            color: var(--muted);
        }
        
        .toggle-switch {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--surface);
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid var(--border);
        }
        
        .toggle-switch.active {
            background: var(--success);
            border-color: var(--success);
        }
        
        .toggle-switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        
        .toggle-switch.active::after {
            transform: translateX(20px);
        }
        
        .edit-btn {
            padding: 8px 20px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: var(--radius);
            font-size: 0.875rem;
            font-weight: 500;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .edit-btn:hover {
            background: var(--accent-light);
        }
        
        /* Settings Section */
        .settings-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: var(--space-lg);
            margin-top: var(--space-xl);
        }
        
        .settings-section h2 {
            font-size: 1.125rem;
            font-weight: 600;
            margin-bottom: var(--space-lg);
        }
        
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: var(--space-lg);
        }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: var(--space-md);
            background: var(--surface);
            border-radius: var(--radius);
        }
        
        .setting-label {
            font-size: 0.9375rem;
        }
        
        .setting-label small {
            display: block;
            font-size: 0.75rem;
            color: var(--muted);
            margin-top: 4px;
        }
        
        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: var(--space-lg);
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal-large {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            display: flex;
            flex-direction: column;
        }
        
        .modal-header {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            transition: all 0.2s;
        }
        
        .modal-close:hover {
            background: var(--surface);
            color: var(--text);
        }
        
        .modal-toolbar {
            padding: var(--space-md) var(--space-lg);
            border-bottom: 1px solid var(--border);
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
        }
        
        .modal-search {
            flex: 1;
            min-width: 200px;
        }
        
        .modal-search input {
            width: 100%;
            padding: var(--space-sm) var(--space-md);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.875rem;
        }
        
        .filter-select {
            padding: var(--space-sm) var(--space-md);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.875rem;
        }
        
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 0;
        }
        
        .translation-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .translation-table th,
        .translation-table td {
            padding: var(--space-md);
            text-align: left;
            border-bottom: 1px solid var(--border);
            font-size: 0.875rem;
        }
        
        .translation-table th {
            background: var(--surface);
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
            position: sticky;
            top: 0;
        }
        
        .translation-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .source-text {
            color: var(--text);
            max-width: 300px;
        }
        
        .translation-input {
            width: 100%;
            padding: var(--space-sm);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.875rem;
        }
        
        .translation-input:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .translation-input.empty {
            border-color: var(--error);
            background: rgba(239, 68, 68, 0.05);
        }
        
        .translation-input.complete {
            border-color: var(--success);
            background: rgba(34, 197, 94, 0.05);
        }
        
        .modal-footer {
            padding: var(--space-lg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: var(--space-md);
        }
    </style>
</head>

    <!-- Translation Editor Modal -->

    <script>
        // ═══════════════════════════════════════════════════════════════
        // ═══════════════════════════════════════════════════════════════
        let languages = [
            { code: 'en', name: 'English', flag: '🇬🇧', pages: 205, progress: 100, enabled: true },
            { code: 'ar', name: 'العربية', flag: '🇸🇦', pages: 205, progress: 95, enabled: true },
            { code: 'fr', name: 'Français', flag: '🇫🇷', pages: 205, progress: 60, enabled: true },
            { code: 'es', name: 'Español', flag: '🇪🇸', pages: 205, progress: 60, enabled: true },
            { code: 'de', name: 'Deutsch', flag: '🇩🇪', pages: 205, progress: 60, enabled: true }
        ];
        
        // Mock translations data
        const translationKeys = [
            { key: 'site.title', en: '205 Free Online Tools', translation: '' },
            { key: 'site.description', en: 'Free browser-based tools for images, PDFs, text, developers, and more.', translation: '' },
            { key: 'nav.home', en: 'Home', translation: '' },
            { key: 'nav.tools', en: 'Tools', translation: '' },
            { key: 'nav.categories', en: 'Categories', translation: '' },
            { key: 'nav.about', en: 'About', translation: '' },
            { key: 'nav.contact', en: 'Contact', translation: '' },
            { key: 'search.placeholder', en: 'Search tools...', translation: '' },
            { key: 'search.button', en: 'Search', translation: '' },
            { key: 'category.image', en: 'Image Conversion', translation: '' },
            { key: 'category.pdf', en: 'PDF Tools', translation: '' },
            { key: 'category.text', en: 'Text Tools', translation: '' },
            { key: 'category.dev', en: 'Developer Tools', translation: '' },
            { key: 'tool.upload', en: 'Upload File', translation: '' },
            { key: 'tool.download', en: 'Download', translation: '' },
            { key: 'tool.convert', en: 'Convert', translation: '' },
            { key: 'footer.rights', en: 'All rights reserved.', translation: '' },
            { key: 'footer.privacy', en: 'Privacy Policy', translation: '' },
            { key: 'footer.terms', en: 'Terms of Service', translation: '' },
            { key: 'error.notFound', en: 'Page not found', translation: '' }
        ];
        
        let editingLang = null;
        let currentTranslations = [];
        let settings = {
            rtl: true,
            defaultLang: 'en'
        };
        
        // ═══════════════════════════════════════════════════════════════
        // Render Languages
        // ═══════════════════════════════════════════════════════════════
        function renderLanguages() {
            const grid = document.getElementById('languagesGrid');
            
            grid.innerHTML = languages.map(lang => {
                const progressClass = lang.progress >= 80 ? 'high' : 
                                     lang.progress >= 50 ? 'medium' : 'low';
                
                return `
                    <div class="language-card">
                        <div class="language-header">
                            <div class="language-flag">${lang.flag}</div>
                            <div class="language-info">
                                <h3>${lang.name}</h3>
                                <p>${lang.code.toUpperCase()}</p>
                            </div>
                        </div>
                        
                        <div class="progress-section">
                            <div class="progress-header">
                                <span class="progress-label">Translation Progress</span>
                                <span class="progress-percent">${lang.progress}%</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill ${progressClass}" style="width: ${lang.progress}%"></div>
                            </div>
                        </div>
                        
                        <div class="language-stats">
                            <div class="stat-item"><strong>${lang.pages}</strong> pages</div>
                        </div>
                        
                        <div class="language-actions">
                            <div class="toggle-group">
                                <span>${lang.enabled ? 'Enabled' : 'Disabled'}</span>
                                <div class="toggle-switch ${lang.enabled ? 'active' : ''}" 
                                     onclick="toggleLanguage('${lang.code}')"></div>
                            </div>
                            <button class="edit-btn" onclick="openEditor('${lang.code}')">Edit</button>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // ═══════════════════════════════════════════════════════════════
        // Language Actions
        // ═══════════════════════════════════════════════════════════════
        function toggleLanguage(code) {
            const lang = languages.find(l => l.code === code);
            if (lang) {
                lang.enabled = !lang.enabled;
                renderLanguages();
            }
        }
        
        // ═══════════════════════════════════════════════════════════════
        // Settings
        // ═══════════════════════════════════════════════════════════════
        function toggleSetting(setting) {
            if (setting === 'rtl') {
                settings.rtl = !settings.rtl;
                document.getElementById('rtlToggle').classList.toggle('active', settings.rtl);
            }
        }
        
        function setDefaultLanguage() {
            settings.defaultLang = document.getElementById('defaultLang').value;
        }
        
        // ═══════════════════════════════════════════════════════════════
        // Translation Editor
        // ═══════════════════════════════════════════════════════════════
        function openEditor(code) {
            editingLang = code;
            const lang = languages.find(l => l.code === code);
            document.getElementById('editorTitle').textContent = `Edit ${lang.name} Translations`;
            document.getElementById('targetLangHeader').textContent = lang.name;
            
            // Load translations (mock with some pre-filled)
            currentTranslations = translationKeys.map(t => ({
                ...t,
                translation: getMockTranslation(code, t.key)
            }));
            
            filterTranslations();
            document.getElementById('editorModal').classList.add('show');
        }
        
        function getMockTranslation(lang, key) {
            // Mock translations for demo
            const translations = {
                ar: {
                    'nav.home': 'الرئيسية',
                    'nav.tools': 'الأدوات',
                    'search.button': 'بحث',
                    'category.image': 'تحويل الصور',
                    'category.pdf': 'أدوات PDF'
                },
                fr: {
                    'nav.home': 'Accueil',
                    'nav.tools': 'Outils',
                    'search.button': 'Rechercher'
                },
                es: {
                    'nav.home': 'Inicio',
                    'nav.tools': 'Herramientas',
                    'search.button': 'Buscar'
                },
                de: {
                    'nav.home': 'Startseite',
                    'nav.tools': 'Werkzeuge',
                    'search.button': 'Suchen'
                }
            };
            
            return translations[lang]?.[key] || '';
        }
        
        function closeEditor() {
            document.getElementById('editorModal').classList.remove('show');
            editingLang = null;
            currentTranslations = [];
        }
        
        function filterTranslations() {
            const filter = document.getElementById('translationFilter').value;
            const search = document.getElementById('translationSearch').value.toLowerCase();
            
            let filtered = currentTranslations.filter(t => {
                const matchesSearch = t.en.toLowerCase().includes(search) ||
                                    t.key.toLowerCase().includes(search);
                
                if (filter === 'complete') return matchesSearch && t.translation;
                if (filter === 'incomplete') return matchesSearch && !t.translation;
                return matchesSearch;
            });
            
            renderTranslations(filtered);
        }
        
        function renderTranslations(data) {
            const tbody = document.getElementById('translationTableBody');
            
            tbody.innerHTML = data.map((t, index) => `
                <tr data-index="${index}">
                    <td class="source-text">
                        <div>${t.en}</div>
                        <div style="font-size: 0.75rem; color: var(--muted); margin-top: 4px;">${t.key}</div>
                    </td>
                    <td>
                        <input type="text" 
                               class="translation-input ${t.translation ? 'complete' : 'empty'}" 
                               value="${t.translation}"
                               data-key="${t.key}"
                               oninput="updateTranslation('${t.key}', this.value)"
                               placeholder="Enter translation...">
                    </td>
                </tr>
            `).join('');
        }
        
        function updateTranslation(key, value) {
            const t = currentTranslations.find(item => item.key === key);
            if (t) {
                t.translation = value;
            }
            
            // Update input class
            const input = document.querySelector(`input[data-key="${key}"]`);
            if (input) {
                input.classList.remove('empty', 'complete');
                input.classList.add(value ? 'complete' : 'empty');
            }
        }
        
        function saveTranslations() {
            // Calculate new progress
            const completed = currentTranslations.filter(t => t.translation).length;
            const progress = Math.round((completed / currentTranslations.length) * 100);
            
            // Update language progress
            const lang = languages.find(l => l.code === editingLang);
            if (lang) {
                lang.progress = progress;
            }
            
            renderLanguages();
            closeEditor();
            
            // Show success toast
            showToast('✅ Translations saved successfully');
        }
        
        // Search with debounce
        let searchTimeout;
        document.getElementById('translationSearch').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(filterTranslations, 300);
        });
        
        // Close modal on overlay click
        document.getElementById('editorModal').addEventListener('click', function(e) {
            if (e.target === this) closeEditor();
        });
        
        // ═══════════════════════════════════════════════════════════════
        // Initialize
        // ═══════════════════════════════════════════════════════════════
        renderLanguages();
    </script>
</body>
</html>
