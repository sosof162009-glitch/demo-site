<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إدارة الأدوات | لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <style>body { font-family: 'Tajawal', sans-serif; }
    .search-box { display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap; }
    .search-input { flex: 1; min-width: 200px; }
    .filter-select { width: 160px; }
    .tool-row { transition: all 0.2s; }
    .tool-row:hover { background: rgba(79, 142, 247, 0.05); }
    .category-badge { 
      padding: 4px 12px; border-radius: 20px; font-size: 12px; font-weight: 500;
      display: inline-block;
    }
    .badge-image { background: rgba(79, 142, 247, 0.1); color: #4f8ef7; }
    .badge-pdf { background: rgba(239, 68, 68, 0.1); color: #ef4444; }
    .badge-text { background: rgba(34, 197, 94, 0.1); color: #22c55e; }
    .badge-dev { background: rgba(139, 92, 246, 0.1); color: #8b5cf6; }
    .badge-color { background: rgba(236, 72, 153, 0.1); color: #ec4899; }
    .badge-math { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }
    .badge-date { background: rgba(6, 182, 212, 0.1); color: #06b6d4; }
    .badge-unit { background: rgba(132, 204, 22, 0.1); color: #84cc16; }
    .badge-seo { background: rgba(168, 85, 247, 0.1); color: #a855f7; }
    .badge-security { background: rgba(99, 102, 241, 0.1); color: #6366f1; }
    .badge-data { background: rgba(14, 165, 233, 0.1); color: #0ea5e9; }
    .badge-special { background: rgba(249, 115, 22, 0.1); color: #f97316; }
    .pagination { display: flex; justify-content: center; gap: 8px; margin-top: 20px; }
    .page-btn { 
      padding: 8px 14px; border: 1px solid var(--border); background: var(--bg-card);
      color: var(--text-secondary); border-radius: 8px; cursor: pointer; transition: all 0.2s;
    }
    .page-btn:hover, .page-btn.active { 
      background: var(--primary); color: white; border-color: var(--primary);
    }
    .action-btns { display: flex; gap: 8px; }
    .action-btn { 
      padding: 6px 10px; border: none; border-radius: 6px; cursor: pointer; font-size: 12px;
      transition: all 0.2s;
    }
    .btn-edit { background: rgba(79, 142, 247, 0.1); color: var(--primary); }
    .btn-edit:hover { background: var(--primary); color: white; }
    .btn-preview { background: rgba(34, 197, 94, 0.1); color: var(--success); }
    .btn-preview:hover { background: var(--success); color: white; }
    .btn-delete { background: rgba(239, 68, 68, 0.1); color: var(--error); }
    .btn-delete:hover { background: var(--error); color: white; }
    .modal { 
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
      background: rgba(0,0,0,0.8); z-index: 1000; align-items: center; justify-content: center;
    }
    .modal.show { display: flex; }
    .modal-content { 
      background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius);
      width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto;
    }
    .modal-header { 
      padding: 20px 24px; border-bottom: 1px solid var(--border); 
      display: flex; justify-content: space-between; align-items: center;
    }
    .modal-body { padding: 24px; }
    .modal-footer { 
      padding: 16px 24px; border-top: 1px solid var(--border); 
      display: flex; justify-content: flex-end; gap: 12px;
    }
    .close-btn { 
      background: none; border: none; color: var(--text-secondary); cursor: pointer; font-size: 24px;
    }
    .char-counter { 
      font-size: 12px; color: var(--text-secondary); margin-top: 4px; text-align: left;
    }
    .char-counter.warning { color: var(--warning); }
    .char-counter.error { color: var(--error); }
  </style>
</head>
<body>

          <a href="ads.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v20M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg><span>الإعلانات</span></a>
          <a href="performance.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 12h-4l-3 9L9 3l-3 9H2"/></svg><span>الأداء</span></a>
        </div>
        <div class="nav-section">

          <a href="notifications.html" class="nav-item"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 8a6 6 0 0 1 12 0c0 7 3 9 3 9H3s3-2 3-9"/><path d="M10.3 21a1.94 1.94 0 0 0 3.4 0"/></svg><span>الإشعارات</span></a>

        </div>

    <main class="main-content">
      <header class="header">
        <div class="header-left">

          <div><h1 class="page-title">إدارة الأدوات</h1><div class="breadcrumb"><a href="dashboard.html">الرئيسية</a><span>/</span><span>الأدوات</span></div></div>

      <div class="page-content">
        <!-- Search and Filters -->
        <div class="search-box">
          <input type="text" id="searchInput" class="form-input search-input" placeholder="البحث في الأدوات..." onkeyup="searchTools()">

  <!-- Edit/Add Modal -->

        <div class="form-group">

        <div class="form-group">

            <option value="text-tools">أدوات النصوص</option>
            <option value="developer">أدوات المطورين</option>
            <option value="color">أدوات الألوان</option>
            <option value="math">رياضيات</option>
            <option value="date">تاريخ ووقت</option>
            <option value="unit">تحويل الوحدات</option>
            <option value="seo">SEO</option>
            <option value="security">أمان</option>
            <option value="data">بيانات</option>

      </div>
      <div class="modal-footer">

        <button class="btn btn-primary" onclick="saveTool()">حفظ</button>

  <script>
    // Check auth
    if (!localStorage.getItem('adminToken')) window.location.href = 'login.html';

    function toggleSidebar() { document.getElementById('sidebar').classList.toggle('open'); }
    function logout() { localStorage.removeItem('adminToken'); window.location.href = 'login.html'; }

    // Mock data for 205 tools (first 20 shown for demo)
    const toolsData = [
      { id: 1, name: 'JPG to PNG Converter', category: 'image-conversion', slug: 'jpg-to-png', usage: 3245, active: true, featured: true, keyword: 'jpg to png', title: 'JPG to PNG Converter - Free Online Tool', desc: 'Convert JPG images to PNG format online for free.' },
      { id: 2, name: 'PNG to JPG Converter', category: 'image-conversion', slug: 'png-to-jpg', usage: 2890, active: true, featured: false, keyword: 'png to jpg', title: 'PNG to JPG Converter', desc: 'Convert PNG images to JPG format.' },
      { id: 3, name: 'WebP to JPG Converter', category: 'image-conversion', slug: 'webp-to-jpg', usage: 1567, active: true, featured: false, keyword: 'webp to jpg', title: 'WebP to JPG Converter', desc: 'Convert WebP to JPG online.' },
      { id: 4, name: 'PDF to JPG Converter', category: 'pdf-tools', slug: 'pdf-to-jpg', usage: 5243, active: true, featured: true, keyword: 'pdf to jpg', title: 'PDF to JPG Converter', desc: 'Convert PDF pages to JPG images.' },
      { id: 5, name: 'PDF to PNG Converter', category: 'pdf-tools', slug: 'pdf-to-png', usage: 4123, active: true, featured: false, keyword: 'pdf to png', title: 'PDF to PNG Converter', desc: 'Convert PDF to PNG online.' },
      { id: 6, name: 'Image Resizer', category: 'image-tools', slug: 'image-resizer', usage: 8921, active: true, featured: true, keyword: 'image resizer', title: 'Image Resizer', desc: 'Resize images online.' },
      { id: 7, name: 'Word Counter', category: 'text-tools', slug: 'word-counter', usage: 6789, active: true, featured: true, keyword: 'word counter', title: 'Word Counter', desc: 'Count words online.' },
      { id: 8, name: 'JSON Formatter', category: 'developer', slug: 'json-formatter', usage: 4567, active: true, featured: false, keyword: 'json formatter', title: 'JSON Formatter', desc: 'Format JSON online.' },
      { id: 9, name: 'Color Picker', category: 'color', slug: 'color-picker', usage: 3456, active: true, featured: false, keyword: 'color picker', title: 'Color Picker', desc: 'Pick colors online.' },
      { id: 10, name: 'Password Generator', category: 'security', slug: 'password-generator', usage: 7890, active: true, featured: true, keyword: 'password generator', title: 'Password Generator', desc: 'Generate secure passwords.' },
      { id: 11, name: 'QR Code Generator', category: 'data', slug: 'qr-code-generator', usage: 5678, active: true, featured: false, keyword: 'qr code generator', title: 'QR Code Generator', desc: 'Generate QR codes.' },
      { id: 12, name: 'BMI Calculator', category: 'math', slug: 'bmi-calculator', usage: 4321, active: true, featured: false, keyword: 'bmi calculator', title: 'BMI Calculator', desc: 'Calculate BMI online.' },
      { id: 13, name: 'Age Calculator', category: 'date', slug: 'age-calculator', usage: 6543, active: true, featured: false, keyword: 'age calculator', title: 'Age Calculator', desc: 'Calculate age online.' },
      { id: 14, name: 'Unit Converter', category: 'unit', slug: 'unit-converter', usage: 3210, active: false, featured: false, keyword: 'unit converter', title: 'Unit Converter', desc: 'Convert units online.' },
      { id: 15, name: 'Meta Tags Generator', category: 'seo', slug: 'meta-tags-generator', usage: 2345, active: true, featured: false, keyword: 'meta tags generator', title: 'Meta Tags Generator', desc: 'Generate meta tags.' },
    ];

    const categories = {
      'image-conversion': { name: 'تحويل الصور', class: 'badge-image' },
      'image-tools': { name: 'أدوات الصور', class: 'badge-image' },
      'pdf-tools': { name: 'أدوات PDF', class: 'badge-pdf' },
      'text-tools': { name: 'أدوات النصوص', class: 'badge-text' },
      'developer': { name: 'المطورين', class: 'badge-dev' },
      'color': { name: 'الألوان', class: 'badge-color' },
      'math': { name: 'رياضيات', class: 'badge-math' },
      'date': { name: 'تاريخ ووقت', class: 'badge-date' },
      'unit': { name: 'تحويل الوحدات', class: 'badge-unit' },
      'seo': { name: 'SEO', class: 'badge-seo' },
      'security': { name: 'أمان', class: 'badge-security' },
      'data': { name: 'بيانات', class: 'badge-data' },
      'special': { name: 'أدوات خاصة', class: 'badge-special' }
    };

    let currentPage = 1;
    const itemsPerPage = 10;
    let filteredTools = [...toolsData];

    function renderTools() {
      const tbody = document.getElementById('toolsTable');
      const start = (currentPage - 1) * itemsPerPage;
      const end = start + itemsPerPage;
      const pageTools = filteredTools.slice(start, end);

      tbody.innerHTML = pageTools.map(tool => {
        const cat = categories[tool.category];
        return `
          <tr class="tool-row">
            <td>${tool.id}</td>
            <td><strong>${tool.name}</strong></td>
            <td><span class="category-badge ${cat.class}">${cat.name}</span></td>
            <td>${tool.slug}</td>
            <td>${tool.usage.toLocaleString()}</td>
            <td><div class="toggle ${tool.active ? 'active' : ''}" onclick="toggleStatus(${tool.id})"></div></td>
            <td><div class="toggle ${tool.featured ? 'active' : ''}" onclick="toggleFeatured(${tool.id})"></div></td>
            <td>
              <div class="action-btns">
                <button class="action-btn btn-edit" onclick="openModal('edit', ${tool.id})">تعديل</button>
                <button class="action-btn btn-preview">معاينة</button>
                <button class="action-btn btn-delete" onclick="deleteTool(${tool.id})">حذف</button>
              </div>
            </td>
          </tr>
        `;
      }).join('');

      renderPagination();
    }

    function renderPagination() {
      const totalPages = Math.ceil(filteredTools.length / itemsPerPage);
      const pagination = document.getElementById('pagination');
      let html = '';
      
      for (let i = 1; i <= totalPages; i++) {
        html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" onclick="goToPage(${i})">${i}</button>`;
      }
      
      pagination.innerHTML = html;
    }

    function goToPage(page) { currentPage = page; renderTools(); }

    function searchTools() {
      const query = document.getElementById('searchInput').value.toLowerCase();
      filteredTools = toolsData.filter(t => t.name.toLowerCase().includes(query));
      currentPage = 1;
      renderTools();
    }

    function filterTools() {
      const cat = document.getElementById('categoryFilter').value;
      const status = document.getElementById('statusFilter').value;
      
      filteredTools = toolsData.filter(t => {
        const catMatch = !cat || t.category === cat;
        const statusMatch = !status || (status === 'active' ? t.active : !t.active);
        return catMatch && statusMatch;
      });
      
      currentPage = 1;
      renderTools();
    }

    function sortTools() {
      const sort = document.getElementById('sortFilter').value;
      
      if (sort === 'name') {
        filteredTools.sort((a, b) => a.name.localeCompare(b.name));
      } else if (sort === 'usage') {
        filteredTools.sort((a, b) => b.usage - a.usage);
      } else if (sort === 'date') {
        filteredTools.sort((a, b) => b.id - a.id);
      }
      
      renderTools();
    }

    function toggleStatus(id) {
      const tool = toolsData.find(t => t.id === id);
      if (tool) { tool.active = !tool.active; renderTools(); }
    }

    function toggleFeatured(id) {
      const tool = toolsData.find(t => t.id === id);
      if (tool) { tool.featured = !tool.featured; renderTools(); }
    }

    function deleteTool(id) {
      if (confirm('هل أنت متأكد من حذف هذه الأداة؟')) {
        const idx = toolsData.findIndex(t => t.id === id);
        if (idx > -1) { toolsData.splice(idx, 1); filterTools(); }
      }
    }

    let editingId = null;

    function openModal(mode, id = null) {
      editingId = id;
      document.getElementById('modalTitle').textContent = mode === 'add' ? 'إضافة أداة جديدة' : 'تعديل أداة';
      document.getElementById('toolModal').classList.add('show');
      
      if (id) {
        const tool = toolsData.find(t => t.id === id);
        if (tool) {
          document.getElementById('toolName').value = tool.name;
          document.getElementById('toolDesc').value = tool.desc || '';
          document.getElementById('toolSlug').value = tool.slug;
          document.getElementById('toolKeyword').value = tool.keyword || '';
          document.getElementById('metaTitle').value = tool.title || '';
          document.getElementById('metaDesc').value = tool.desc || '';
          document.getElementById('toolCategory').value = tool.category;
          updateCharCount('metaTitle', 'titleCount', 60);
          updateCharCount('metaDesc', 'descCount', 160);
        }
      } else {
        document.querySelectorAll('#toolModal input, #toolModal textarea').forEach(el => el.value = '');
      }
    }

    function closeModal() { document.getElementById('toolModal').classList.remove('show'); }

    function generateSlug() {
      const name = document.getElementById('toolName').value;
      const slug = name.toLowerCase().replace(/[^\w\s-]/g, '').replace(/\s+/g, '-');
      if (!editingId) document.getElementById('toolSlug').value = slug;
    }

    function updateCharCount(inputId, counterId, max) {
      const val = document.getElementById(inputId).value.length;
      const counter = document.getElementById(counterId);
      counter.textContent = `${val} / ${max}`;
      counter.className = 'char-counter' + (val > max ? ' error' : val > max * 0.8 ? ' warning' : '');
    }

    function saveTool() {
      const name = document.getElementById('toolName').value;
      if (!name) { alert('اسم الأداة مطلوب'); return; }
      
      if (editingId) {
        const tool = toolsData.find(t => t.id === editingId);
        if (tool) {
          tool.name = name;
          tool.slug = document.getElementById('toolSlug').value;
          tool.category = document.getElementById('toolCategory').value;
          tool.keyword = document.getElementById('toolKeyword').value;
          tool.title = document.getElementById('metaTitle').value;
          tool.desc = document.getElementById('metaDesc').value;
        }
      } else {
        const newTool = {
          id: Math.max(...toolsData.map(t => t.id)) + 1,
          name: name,
          slug: document.getElementById('toolSlug').value,
          category: document.getElementById('toolCategory').value,
          keyword: document.getElementById('toolKeyword').value,
          title: document.getElementById('metaTitle').value,
          desc: document.getElementById('metaDesc').value,
          usage: 0,
          active: true,
          featured: false
        };
        toolsData.push(newTool);
      }
      
      closeModal();
      filterTools();
    }

    // Initial render
    renderTools();
  </script>
</body>
</html>
