<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        .tools-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: var(--space-lg);
            flex-wrap: wrap;
            gap: var(--space-md);
        }
        
        .tools-filters {
            display: flex;
            gap: var(--space-md);
            flex-wrap: wrap;
            margin-bottom: var(--space-lg);
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }
        
        .filter-group label {
            font-size: 0.8125rem;
            color: var(--muted);
        }
        
        .filter-input,
        .filter-select {
            padding: var(--space-sm) var(--space-md);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.875rem;
            min-width: 180px;
        }
        
        .filter-input:focus,
        .filter-select:focus {
            outline: none;
            border-color: var(--accent);
        }
        
        .tools-table-container {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: var(--space-lg);
        }
        
        .tools-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .tools-table th,
        .tools-table td {
            padding: var(--space-md);
            text-align: left;
            font-size: 0.875rem;
            border-bottom: 1px solid var(--border);
        }
        
        .tools-table th {
            background: var(--surface);
            color: var(--muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.75rem;
            letter-spacing: 0.5px;
        }
        
        .tools-table tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }
        
        .tools-table tr:last-child td {
            border-bottom: none;
        }
        
        .tool-icon {
            width: 40px;
            height: 40px;
            background: var(--surface);
            border-radius: var(--radius);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .tool-info {
            display: flex;
            align-items: center;
            gap: var(--space-md);
        }
        
        .tool-name {
            font-weight: 500;
            color: var(--text);
        }
        
        .tool-slug {
            font-size: 0.75rem;
            color: var(--muted);
        }
        
        .category-badge {
            display: inline-flex;
            padding: 4px 12px;
            background: rgba(79, 142, 247, 0.1);
            color: var(--accent);
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 500;
        }
        
        .status-toggle,
        .featured-toggle {
            position: relative;
            width: 44px;
            height: 24px;
            background: var(--surface);
            border-radius: var(--radius-full);
            cursor: pointer;
            transition: background 0.2s;
            border: 1px solid var(--border);
        }
        
        .status-toggle.active,
        .featured-toggle.active {
            background: var(--success);
            border-color: var(--success);
        }
        
        .status-toggle::after,
        .featured-toggle::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 18px;
            height: 18px;
            background: white;
            border-radius: 50%;
            transition: transform 0.2s;
        }
        
        .status-toggle.active::after,
        .featured-toggle.active::after {
            transform: translateX(20px);
        }
        
        .action-btns {
            display: flex;
            gap: var(--space-sm);
        }
        
        .action-btn {
            padding: 6px 12px;
            border-radius: var(--radius);
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
        }
        
        .action-btn.edit {
            background: var(--accent);
            color: white;
        }
        
        .action-btn.edit:hover {
            background: var(--accent-light);
        }
        
        .action-btn.view {
            background: var(--surface);
            color: var(--text);
            border: 1px solid var(--border);
        }
        
        .action-btn.view:hover {
            background: var(--border);
        }
        
        .action-btn.delete {
            background: transparent;
            color: var(--error);
            border: 1px solid var(--error);
        }
        
        .action-btn.delete:hover {
            background: var(--error);
            color: white;
        }
        
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: var(--space-sm);
            margin-top: var(--space-lg);
        }
        
        .page-btn {
            padding: var(--space-sm) var(--space-md);
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-size: 0.875rem;
            cursor: pointer;
            transition: all 0.2s;
            min-width: 40px;
        }
        
        .page-btn:hover {
            background: var(--border);
        }
        
        .page-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: white;
        }
        
        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .page-info {
            color: var(--muted);
            font-size: 0.875rem;
        }
        
        /* Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.7);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: var(--space-lg);
        }
        
        .modal-overlay.show {
            display: flex;
        }
        
        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: var(--space-lg);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            font-size: 1.25rem;
            font-weight: 600;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius);
            transition: all 0.2s;
        }
        
        .modal-close:hover {
            background: var(--surface);
            color: var(--text);
        }
        
        .modal-body {
            padding: var(--space-lg);
        }
        
        .modal-footer {
            padding: var(--space-lg);
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: var(--space-md);
        }
        
        .tools-count {
            color: var(--muted);
            font-size: 0.875rem;
        }
    </style>
</head>

    <script>
        // ═══════════════════════════════════════════════════════════════
        // Security: Check authentication on page load
        // ═══════════════════════════════════════════════════════════════
        const session = sessionStorage.getItem('adminAuth');
        if (session !== 'true') {
            window.location.href = '/admin/login.html';
        }
        
        // Get admin email from session
        const sessionData = JSON.parse(sessionStorage.getItem('adminSession') || '{}');
        if (sessionData.email) {
            document.getElementById('adminEmail').textContent = sessionData.email;
        }
        
        // Check session expiration
        if (sessionData.expires && Date.now() > sessionData.expires) {
            logout();
        }
        
        // Logout function
        function logout() {
            sessionStorage.removeItem('adminAuth');
            sessionStorage.removeItem('adminSession');
            window.location.href = '/admin/login.html';
        }
        
        // ═══════════════════════════════════════════════════════════════
        // Mock Data - 205 Tools
        // ═══════════════════════════════════════════════════════════════
        const categories = [
            'Image Conversion', 'Image Tools', 'PDF Tools', 'Text Tools',
            'Developer Tools', 'Color Tools', 'Math & Numbers', 'Date & Time',
            'Unit Converter', 'SEO & Web', 'Security', 'Data Tools'
        ];
        
        const toolTemplates = [
            { icon: '🖼️', prefix: 'Image' },
            { icon: '📄', prefix: 'PDF' },
            { icon: '📝', prefix: 'Text' },
            { icon: '💻', prefix: 'Code' },
            { icon: '🎨', prefix: 'Color' },
            { icon: '🔢', prefix: 'Math' },
            { icon: '📅', prefix: 'Date' },
            { icon: '🔄', prefix: 'Convert' },
            { icon: '🔍', prefix: 'SEO' },
            { icon: '🔐', prefix: 'Secure' },
            { icon: '📊', prefix: 'Data' }
        ];
        
        let tools = [];
        let currentPage = 1;
        const itemsPerPage = 20;
        let editingToolId = null;
        
        // Generate 205 mock tools
        function generateTools() {
            const toolsList = [];
            let toolNum = 1;
            
            // Real tool names for first 10 (Image Conversion category)
            const realToolNames = [
                { name: 'JPG to PNG', slug: 'jpg-to-png', icon: '🖼️' },
                { name: 'PNG to JPG', slug: 'png-to-jpg', icon: '🖼️' },
                { name: 'WebP to JPG', slug: 'webp-to-jpg', icon: '🖼️' },
                { name: 'JPG to WebP', slug: 'jpg-to-webp', icon: '🖼️' },
                { name: 'PNG to WebP', slug: 'png-to-webp', icon: '🖼️' },
                { name: 'WebP to PNG', slug: 'webp-to-png', icon: '🖼️' },
                { name: 'AVIF to JPG', slug: 'avif-to-jpg', icon: '🖼️' },
                { name: 'JPG to AVIF', slug: 'jpg-to-avif', icon: '🖼️' },
                { name: 'PNG to AVIF', slug: 'png-to-avif', icon: '🖼️' },
                { name: 'AVIF to PNG', slug: 'avif-to-png', icon: '🖼️' }
            ];
            
            // Add real tool names first
            realToolNames.forEach((toolData, index) => {
                toolsList.push({
                    id: toolNum,
                    name: toolData.name,
                    slug: toolData.slug,
                    category: 'Image Conversion',
                    icon: toolData.icon,
                    description: `Convert ${toolData.name.replace(' to ', ' to ')} with ease.`,
                    active: true,
                    featured: index < 3, // First 3 are featured
                    views: Math.floor(Math.random() * 5000) + 1000
                });
                toolNum++;
            });
            
            categories.forEach((category, catIndex) => {
                const toolsInCategory = category === 'Image Conversion' ? 22 : // 32-10=22 remaining
                                       category === 'Image Tools' ? 10 :
                                       category === 'PDF Tools' ? 18 :
                                       category === 'Text Tools' ? 22 :
                                       category === 'Developer Tools' ? 28 :
                                       category === 'Color Tools' ? 15 :
                                       category === 'Math & Numbers' ? 12 :
                                       category === 'Date & Time' ? 10 :
                                       category === 'Unit Converter' ? 16 :
                                       category === 'SEO & Web' ? 14 :
                                       category === 'Security' ? 8 : 10;
                
                const template = toolTemplates[catIndex % toolTemplates.length];
                
                for (let i = 1; i <= toolsInCategory; i++) {
                    const toolName = `${template.prefix} Tool ${i}`;
                    const slug = toolName.toLowerCase().replace(/\s+/g, '-');
                    
                    toolsList.push({
                        id: toolNum,
                        name: toolName,
                        slug: slug,
                        category: category,
                        icon: template.icon,
                        description: `A powerful ${category.toLowerCase()} tool for your needs.`,
                        active: Math.random() > 0.1, // 90% active
                        featured: Math.random() > 0.9, // 10% featured
                        views: Math.floor(Math.random() * 5000) + 100
                    });
                    toolNum++;
                }
            });
            
            return toolsList;
        }
        
        // Initialize tools
        tools = generateTools();
        
        // ═══════════════════════════════════════════════════════════════
        // Filters & Search
        // ═══════════════════════════════════════════════════════════════
        let filteredTools = [...tools];
        
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const status = document.getElementById('statusFilter').value;
            
            filteredTools = tools.filter(tool => {
                const matchesSearch = tool.name.toLowerCase().includes(search) ||
                                    tool.slug.toLowerCase().includes(search);
                const matchesCategory = !category || tool.category === category;
                const matchesStatus = !status ||
                                    (status === 'active' && tool.active) ||
                                    (status === 'disabled' && !tool.active);
                
                return matchesSearch && matchesCategory && matchesStatus;
            });
            
            currentPage = 1;
            renderTable();
        }
        
        function resetFilters() {
            document.getElementById('searchInput').value = '';
            document.getElementById('categoryFilter').value = '';
            document.getElementById('statusFilter').value = '';
            filteredTools = [...tools];
            currentPage = 1;
            renderTable();
        }
        
        // Event listeners for filters
        // Debounced search (300ms delay)
        let searchTimeout;
        document.getElementById('searchInput').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(applyFilters, 300);
        });
        document.getElementById('categoryFilter').addEventListener('change', applyFilters);
        document.getElementById('statusFilter').addEventListener('change', applyFilters);
        
        // ═══════════════════════════════════════════════════════════════
        // Render Table
        // ═══════════════════════════════════════════════════════════════
        function renderTable() {
            const tbody = document.getElementById('toolsTableBody');
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            const pageTools = filteredTools.slice(start, end);
            
            tbody.innerHTML = pageTools.map(tool => `
                <tr data-id="${tool.id}">
                    <td>
                        <div class="tool-info">
                            <div class="tool-icon">${tool.icon}</div>
                            <div>
                                <div class="tool-name">${tool.name}</div>
                                <div class="tool-slug">/${tool.slug}/</div>
                            </div>
                        </div>
                    </td>
                    <td><span class="category-badge">${tool.category}</span></td>
                    <td>
                        <div class="status-toggle ${tool.active ? 'active' : ''}" 
                             onclick="toggleStatus(${tool.id})"></div>
                    </td>
                    <td>
                        <div class="featured-toggle ${tool.featured ? 'active' : ''}" 
                             onclick="toggleFeatured(${tool.id})"></div>
                    </td>
                    <td>
                        <div class="action-btns">
                            <button class="action-btn edit" onclick="openEditModal(${tool.id})">Edit</button>
                            <button class="action-btn view" onclick="previewTool('${tool.slug}')">View</button>
                            <button class="action-btn delete" onclick="deleteTool(${tool.id})">Delete</button>
                        </div>
                    </td>
                </tr>
            `).join('');
            
            // Update count
            document.getElementById('toolsCount').textContent = 
                `Showing ${filteredTools.length} of ${tools.length} tools`;
            
            renderPagination();
        }
        
        // ═══════════════════════════════════════════════════════════════
        // Pagination
        // ═══════════════════════════════════════════════════════════════
        function renderPagination() {
            const totalPages = Math.ceil(filteredTools.length / itemsPerPage);
            const pagination = document.getElementById('pagination');
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = `
                <button class="page-btn" onclick="goToPage(${currentPage - 1})" 
                        ${currentPage === 1 ? 'disabled' : ''}>← Prev</button>
            `;
            
            for (let i = 1; i <= totalPages; i++) {
                if (i === 1 || i === totalPages || (i >= currentPage - 1 && i <= currentPage + 1)) {
                    html += `<button class="page-btn ${i === currentPage ? 'active' : ''}" 
                             onclick="goToPage(${i})">${i}</button>`;
                } else if (i === currentPage - 2 || i === currentPage + 2) {
                    html += '<span class="page-info">...</span>';
                }
            }
            
            html += `
                <button class="page-btn" onclick="goToPage(${currentPage + 1})" 
                        ${currentPage === totalPages ? 'disabled' : ''}>Next →</button>
            `;
            
            pagination.innerHTML = html;
        }
        
        function goToPage(page) {
            const totalPages = Math.ceil(filteredTools.length / itemsPerPage);
            if (page >= 1 && page <= totalPages) {
                currentPage = page;
                renderTable();
            }
        }
        
        // ═══════════════════════════════════════════════════════════════
        // Tool Actions
        // ═══════════════════════════════════════════════════════════════
        function toggleStatus(id) {
            const tool = tools.find(t => t.id === id);
            if (tool) {
                tool.active = !tool.active;
                renderTable();
            }
        }
        
        function toggleFeatured(id) {
            const tool = tools.find(t => t.id === id);
            if (tool) {
                tool.featured = !tool.featured;
                renderTable();
            }
        }
        
        function deleteTool(id) {
            if (confirm('Are you sure you want to delete this tool?')) {
                tools = tools.filter(t => t.id !== id);
                applyFilters();
            }
        }
        
        function previewTool(slug) {
            window.open(`/en/${slug}/`, '_blank');
        }
        
        // ═══════════════════════════════════════════════════════════════
        // Modal Functions
        // ═══════════════════════════════════════════════════════════════
        function openEditModal(id) {
            const tool = tools.find(t => t.id === id);
            if (!tool) return;
            
            editingToolId = id;
            document.getElementById('editName').value = tool.name;
            document.getElementById('editSlug').value = tool.slug;
            document.getElementById('editCategory').value = tool.category;
            document.getElementById('editIcon').value = tool.icon;
            document.getElementById('editDescription').value = tool.description;
            
            document.getElementById('editModal').classList.add('show');
        }
        
        function openAddModal() {
            editingToolId = null;
            document.getElementById('editName').value = '';
            document.getElementById('editSlug').value = '';
            document.getElementById('editCategory').value = categories[0];
            document.getElementById('editIcon').value = '🔧';
            document.getElementById('editDescription').value = '';
            
            document.querySelector('#editModal h2').textContent = 'Add New Tool';
            document.getElementById('editModal').classList.add('show');
        }
        
        function closeModal() {
            document.getElementById('editModal').classList.remove('show');
            editingToolId = null;
        }
        
        function saveTool() {
            const name = document.getElementById('editName').value.trim();
            const category = document.getElementById('editCategory').value;
            const icon = document.getElementById('editIcon').value;
            const description = document.getElementById('editDescription').value;
            
            if (!name) {
                alert('Please enter a tool name');
                return;
            }
            
            if (editingToolId) {
                // Update existing
                const tool = tools.find(t => t.id === editingToolId);
                if (tool) {
                    tool.name = name;
                    tool.category = category;
                    tool.icon = icon;
                    tool.description = description;
                }
            } else {
                // Add new
                const newId = Math.max(...tools.map(t => t.id)) + 1;
                const slug = name.toLowerCase().replace(/\s+/g, '-');
                tools.push({
                    id: newId,
                    name: name,
                    slug: slug,
                    category: category,
                    icon: icon,
                    description: description,
                    active: true,
                    featured: false,
                    views: 0
                });
            }
            
            closeModal();
            applyFilters();
        }
        
        // Auto-generate slug from name when adding new tool
        document.getElementById('editName').addEventListener('input', function() {
            if (!editingToolId) {
                document.getElementById('editSlug').value = this.value.toLowerCase()
                    .replace(/\s+/g, '-')
                    .replace(/[^a-z0-9-]/g, '');
            }
        });
        
        // Close modal on overlay click
        document.getElementById('editModal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });
        
        // ═══════════════════════════════════════════════════════════════
        // Initialize
        // ═══════════════════════════════════════════════════════════════
        renderTable();
    </script>
</body>
</html>
