<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل دخول Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0a0c1b; color: #fff; font-family: system-ui, -apple-system, sans-serif; padding: 20px; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { width: 100%; max-width: 400px; background: #141629; padding: 40px; border-radius: 16px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
    .logo { text-align: center; margin-bottom: 30px; }
    .logo-icon { font-size: 48px; margin-bottom: 10px; }
    h1 { text-align: center; color: #fff; margin-bottom: 8px; font-size: 24px; }
    .subtitle { text-align: center; color: #6b7280; font-size: 14px; margin-bottom: 30px; }
    .input-group { margin-bottom: 20px; }
    label { display: block; color: #9ca3af; font-size: 13px; margin-bottom: 6px; font-weight: 500; }
    input { width: 100%; padding: 14px 16px; border: 2px solid #2a2d4a; border-radius: 10px; background: #1c1f35; color: #fff; font-size: 16px; transition: border-color 0.2s; }
    input:focus { outline: none; border-color: #4f8ef7; }
    button { width: 100%; padding: 16px; margin-top: 10px; background: linear-gradient(135deg, #4f8ef7, #6366f1); color: #fff; border: none; border-radius: 10px; font-size: 16px; font-weight: 600; cursor: pointer; transition: transform 0.1s, opacity 0.2s; }
    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .error { background: rgba(239,68,68,0.1); color: #ef4444; padding: 14px; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid rgba(239,68,68,0.2); font-size: 14px; }
    .success { background: rgba(34,197,94,0.1); color: #22c55e; padding: 14px; border-radius: 10px; margin-top: 20px; display: none; border: 1px solid rgba(34,197,94,0.2); font-size: 14px; }
    .secure-note { display: flex; align-items: center; justify-content: center; gap: 8px; background: rgba(79,142,247,0.1); color: #4f8ef7; padding: 12px; border-radius: 8px; margin-top: 25px; font-size: 12px; }
    .spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-left: 8px; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="box">
    <div class="logo">
      <div class="logo-icon">🔐</div>
      <h1>تسجيل دخول المشرف</h1>
      <div class="subtitle">Admin Dashboard</div>
    </div>
    
    <form id="loginForm" onsubmit="return false;">
      <div class="input-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email">
      </div>
      
      <div class="input-group">
        <label for="password">كلمة المرور</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      
      <button type="submit" id="loginBtn" onclick="login()">
        تسجيل الدخول
      </button>
    </form>
    
    <div id="error" class="error"></div>
    <div id="success" class="success">✅ تم تسجيل الدخول بنجاح! جاري التحويل...</div>
    
    <div class="secure-note">
      🔒 نظام آمن - SHA-256 Encryption
    </div>
  </div>

  <script>
    // إعدادات الأمان - Hardcoded Credentials (SHA-256 hashed)
    const VALID_EMAIL = 'wxf16@gmail.com';
    // SHA-256 hash of "Aass1122"
    const VALID_PASSWORD_HASH = '48b23908f4bdc9c66078cef9abad1277c18767db9a91c9dc90a0b923fc51cf04';
    
    // SHA-256 function
    async function sha256(message) {
      const msgBuffer = new TextEncoder().encode(message);
      const hashBuffer = await crypto.subtle.digest('SHA-256', msgBuffer);
      const hashArray = Array.from(new Uint8Array(hashBuffer));
      return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
    }
    
    // Auto-redirect if already logged in
    if (sessionStorage.getItem('adminAuth') === 'true') {
      window.location.href = '/admin/dashboard.html';
    }
    
    async function login() {
      const email = document.getElementById('email').value.trim().toLowerCase();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('loginBtn');
      const errorDiv = document.getElementById('error');
      const successDiv = document.getElementById('success');
      
      // Clear messages
      errorDiv.style.display = 'none';
      successDiv.style.display = 'none';
      
      // Validation
      if (!email || !password) {
        errorDiv.textContent = '❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور';
        errorDiv.style.display = 'block';
        return;
      }
      
      // Show loading
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span> جاري التحقق...';
      
      try {
        // Hash the entered password
        const passwordHash = await sha256(password);
        
        // Verify credentials
        if (email === VALID_EMAIL && passwordHash === VALID_PASSWORD_HASH) {
          // Success! Save session
          sessionStorage.setItem('adminAuth', 'true');
          sessionStorage.setItem('adminEmail', email);
          sessionStorage.setItem('adminLoginTime', new Date().toISOString());
          sessionStorage.setItem('adminRole', 'admin');
          
          successDiv.style.display = 'block';
          
          // Redirect to dashboard
          setTimeout(() => {
            window.location.href = '/admin/dashboard.html';
          }, 800);
          
        } else {
          throw new Error('❌ البريد الإلكتروني أو كلمة المرور غير صحيحة');
        }
        
      } catch (error) {
        errorDiv.textContent = error.message;
        errorDiv.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'تسجيل الدخول';
      }
    }
    
    // Enter key support
    document.getElementById('password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') login();
    });
    
    // Focus email on load
    document.getElementById('email').focus();
  </script>
</body>
</html>
