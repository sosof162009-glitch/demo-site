<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - 205-Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/admin.css">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="back-link">
        <a href="/en/">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Tools
        </a>
    </div>
    
    <div class="admin-login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>🔧 205-Tools</h1>
                <p>Admin Dashboard</p>
            </div>
            
            <!-- Debug Info -->
            <div id="debugInfo" style="background: #1c1f35; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-size: 12px; font-family: monospace; display: none;">
                <div id="debugText">Initializing...</div>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none !important;">
                Invalid email or password
            </div>
            
            <div id="notAdminMessage" class="error-message" style="display: none !important; background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #ef4444;">
                You don't have admin access. Please contact the administrator.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@yoursite.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="login-footer">
                <a href="#" onclick="event.preventDefault(); alert('Contact your administrator to reset password')">Forgot password?</a>
            </div>
        </div>
    </div>
    
    <script>
        // Enable debug mode
        const DEBUG = true;
        
        function log(msg) {
            console.log(msg);
            if (DEBUG) {
                const debugDiv = document.getElementById('debugInfo');
                const debugText = document.getElementById('debugText');
                debugDiv.style.display = 'block';
                debugText.innerHTML += '<br>' + msg;
            }
        }
        
        log('=== LOGIN PAGE LOADED ===');
        
        // Supabase Configuration
        const SUPABASE_URL = 'https://jgmpltmdncyrnuufe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU';
        
        log('Supabase URL: ' + SUPABASE_URL);
        
        // Initialize Supabase
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            log('✅ Supabase client created');
        } catch (e) {
            log('❌ Supabase error: ' + e.message);
        }
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const notAdminMessage = document.getElementById('notAdminMessage');
        
        log('DOM elements loaded');
        
        // Check session on load
        async function checkAdminSession() {
            log('Checking admin session...');
            try {
                const { data: { session } } = await supabase.auth.getSession();
                log('Session: ' + (session ? 'Found' : 'Not found'));
                
                if (session) {
                    log('User ID: ' + session.user.id);
                    log('Checking admin_users table...');
                    
                    const { data: adminData, error: adminError } = await supabase
                        .from('admin_users')
                        .select('*')
                        .eq('user_id', session.user.id)
                        .eq('is_active', true)
                        .single();
                    
                    log('Admin query result: ' + JSON.stringify({adminData, adminError}));
                    
                    if (adminData && !adminError) {
                        log('✅ Admin confirmed, redirecting...');
                        window.location.href = '/admin/dashboard.html';
                    } else {
                        log('❌ Not an admin: ' + (adminError ? adminError.message : 'No data'));
                    }
                }
            } catch (e) {
                log('❌ Session check error: ' + e.message);
            }
        }
        
        // Handle form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            log('=== LOGIN ATTEMPT ===');
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            log('Email: ' + email);
            log('Password length: ' + password.length);
            
            // Reset errors
            errorMessage.style.display = 'none';
            notAdminMessage.style.display = 'none';
            
            // Validation
            if (!email || !password) {
                log('❌ Validation failed: empty fields');
                errorMessage.textContent = 'Please enter both email and password';
                errorMessage.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            
            try {
                log('Calling signInWithPassword...');
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                log('Auth result: ' + JSON.stringify({error: authError ? authError.message : null}));
                
                if (authError) {
                    throw authError;
                }
                
                if (!authData.user) {
                    throw new Error('No user returned');
                }
                
                log('✅ Auth success, User ID: ' + authData.user.id);
                log('Checking admin_users...');
                
                const { data: adminData, error: adminError } = await supabase
                    .from('admin_users')
                    .select('*')
                    .eq('user_id', authData.user.id)
                    .eq('is_active', true)
                    .single();
                
                log('Admin check: ' + JSON.stringify({adminData, adminError}));
                
                if (adminError || !adminData) {
                    log('❌ Not an admin');
                    await supabase.auth.signOut();
                    notAdminMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                    return;
                }
                
                log('✅ Admin confirmed!');
                sessionStorage.setItem('adminAuth', 'true');
                window.location.href = '/admin/dashboard.html';
                
            } catch (error) {
                log('❌ Error: ' + error.message);
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                errorMessage.textContent = error.message || 'Invalid email or password';
                errorMessage.style.display = 'block';
            }
        });
        
        // Initialize
        checkAdminSession();
    </script>
</body>
</html>
