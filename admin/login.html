<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول | لوحة التحكم</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/admin.css">
  <style>
    body { font-family: 'Tajawal', sans-serif; }
    .error-message {
      background: rgba(239, 68, 68, 0.1);
      color: var(--error);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .error-message.show { display: block; }
    .lockout-message {
      background: rgba(245, 158, 11, 0.1);
      color: var(--warning);
      padding: 12px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 14px;
      display: none;
    }
    .lockout-message.show { display: block; }
  </style>
</head>
<body class="login-page">
  <div class="login-card">
    <div class="login-header">
      <div class="login-logo">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
        </svg>
      </div>
      <h1 class="login-title">لوحة التحكم</h1>
      <p class="login-subtitle">تسجيل الدخول للوصول إلى لوحة الإدارة</p>
    </div>

    <div id="errorMsg" class="error-message">
      <span>⚠️</span> البريد الإلكتروني أو كلمة المرور غير صحيحة
    </div>

    <div id="lockoutMsg" class="lockout-message">
      <span>🔒</span> تم تأمين الحساب مؤقتاً. حاول مرة أخرى بعد <span id="lockoutTimer">15:00</span>
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">البريد الإلكتروني</label>
        <input type="email" id="email" class="form-input" placeholder="admin@example.com" required>
      </div>

      <div class="form-group">
        <label class="form-label">كلمة المرور</label>
        <div class="password-field">
          <input type="password" id="password" class="form-input" placeholder="••••••••" required>
          <button type="button" class="password-toggle" onclick="togglePassword()">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <button type="submit" class="btn btn-primary login-btn">
        تسجيل الدخول
      </button>
    </form>
  </div>

  <script>
    // Check if already logged in
    if (localStorage.getItem('adminToken')) {
      const expiry = localStorage.getItem('tokenExpiry');
      if (expiry && new Date().getTime() < parseInt(expiry)) {
        window.location.href = 'dashboard.html';
      } else {
        localStorage.removeItem('adminToken');
        localStorage.removeItem('tokenExpiry');
      }
    }

    // Check lockout
    const lockoutEnd = localStorage.getItem('lockoutEnd');
    if (lockoutEnd && new Date().getTime() < parseInt(lockoutEnd)) {
      showLockout();
    }

    let failedAttempts = parseInt(localStorage.getItem('failedAttempts') || '0');

    function togglePassword() {
      const password = document.getElementById('password');
      const eyeIcon = document.getElementById('eyeIcon');
      if (password.type === 'password') {
        password.type = 'text';
        eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        password.type = 'password';
        eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    function showError(msg) {
      const errorDiv = document.getElementById('errorMsg');
      errorDiv.innerHTML = '<span>⚠️</span> ' + msg;
      errorDiv.classList.add('show');
      setTimeout(() => errorDiv.classList.remove('show'), 5000);
    }

    function showLockout() {
      const lockoutDiv = document.getElementById('lockoutMsg');
      lockoutDiv.classList.add('show');
      document.getElementById('loginForm').style.display = 'none';
      updateLockoutTimer();
    }

    function updateLockoutTimer() {
      const lockoutEnd = parseInt(localStorage.getItem('lockoutEnd'));
      const now = new Date().getTime();
      const remaining = Math.max(0, lockoutEnd - now);
      
      if (remaining <= 0) {
        localStorage.removeItem('lockoutEnd');
        localStorage.removeItem('failedAttempts');
        location.reload();
        return;
      }

      const minutes = Math.floor(remaining / 60000);
      const seconds = Math.floor((remaining % 60000) / 1000);
      document.getElementById('lockoutTimer').textContent = 
        minutes.toString().padStart(2, '0') + ':' + seconds.toString().padStart(2, '0');
      
      setTimeout(updateLockoutTimer, 1000);
    }

    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      // Check lockout
      const lockoutEnd = localStorage.getItem('lockoutEnd');
      if (lockoutEnd && new Date().getTime() < parseInt(lockoutEnd)) {
        return;
      }

      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // Demo credentials (in production, verify against backend)
      if (email === 'admin@example.com' && password === 'admin123') {
        // Generate token
        const token = btoa(email + ':' + new Date().getTime());
        const expiry = new Date().getTime() + (8 * 60 * 60 * 1000); // 8 hours
        
        localStorage.setItem('adminToken', token);
        localStorage.setItem('tokenExpiry', expiry.toString());
        localStorage.removeItem('failedAttempts');
        localStorage.removeItem('lockoutEnd');
        
        window.location.href = 'dashboard.html';
      } else {
        failedAttempts++;
        localStorage.setItem('failedAttempts', failedAttempts.toString());
        
        if (failedAttempts >= 5) {
          const lockoutDuration = 15 * 60 * 1000; // 15 minutes
          localStorage.setItem('lockoutEnd', (new Date().getTime() + lockoutDuration).toString());
          showLockout();
        } else {
          const remaining = 5 - failedAttempts;
          showError('بيانات الدخول غير صحيحة. محاولات متبقية: ' + remaining);
        }
      }
    });
  </script>
</body>
</html>
