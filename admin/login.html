<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0c1b; color: #fff; font-family: system-ui, sans-serif; padding: 10px; }
        #debug { background: #1c1f35; padding: 10px; border-radius: 8px; font-size: 10px; font-family: monospace; 
                 margin-bottom: 8px; border: 2px solid #4f8ef7; max-height: 280px; overflow-y: auto; white-space: pre-wrap; }
        .box { max-width: 360px; margin: 0 auto; background: #141629; padding: 15px; border-radius: 12px; }
        h1 { text-align: center; color: #4f8ef7; font-size: 16px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #2a2d4a; border-radius: 8px; 
                background: #1c1f35; color: #fff; font-size: 15px; }
        .btn { width: 100%; padding: 14px; margin-top: 10px; background: linear-gradient(135deg, #4f8ef7, #6366f1); 
               color: #fff; border: none; border-radius: 8px; font-size: 15px; font-weight: bold; }
        .btn:active { opacity: 0.8; }
        .err { background: rgba(239,68,68,0.15); color: #ef4444; padding: 10px; border-radius: 6px; 
               margin: 8px 0; display: none; font-size: 13px; }
    </style>
</head>
<body>
    <div id="debug">⏳...</div>
    
    <div class="box">
        <h1>🔧 تسجيل دخول Admin</h1>
        <div id="err" class="err"></div>
        
        <input type="email" id="em" placeholder="Email" value="">
        <input type="password" id="pw" placeholder="Password" value="">
        
        <button class="btn" onclick="doLogin()">تسجيل الدخول</button>
    </div>

    <script>
        var logs = [];
        function L(msg) {
            var t = new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
            logs.push('[' + t + '] ' + msg);
            document.getElementById('debug').innerText = logs.join('\n');
            console.log(msg);
        }
        
        L('✅ JS Loaded');
        
        // Supabase config
        var SUPABASE_URL = 'https://jgmpltmdncyrnuufe.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU';
        
        L('URL: ' + SUPABASE_URL.substring(0, 30) + '...');
        
        var S = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        L('✅ Supabase Client Created');
        
        // Check session on load
        S.auth.getSession().then(function(r) {
            L('Session check: ' + (r.data.session ? 'YES' : 'NO'));
        }).catch(function(e) {
            L('Session error: ' + e.message);
        });
        
        L('✅ Ready - Click login');
        
        // LOGIN FUNCTION
        window.doLogin = async function() {
            L('\n═══════ LOGIN CLICKED ═══════');
            
            var email = document.getElementById('em').value.trim();
            var pass = document.getElementById('pw').value;
            var errDiv = document.getElementById('err');
            
            L('Email: ' + email);
            
            if (!email || !pass) {
                errDiv.innerText = '❌ أكمل الحقول';
                errDiv.style.display = 'block';
                return;
            }
            
            errDiv.style.display = 'none';
            
            try {
                L('🔐 Calling signInWithPassword...');
                
                var result = await S.auth.signInWithPassword({
                    email: email,
                    password: pass
                });
                
                L('Result received:');
                L('  error object: ' + (result.error ? 'EXISTS' : 'null'));
                L('  error msg: ' + (result.error ? result.error.message : 'none'));
                L('  error name: ' + (result.error ? result.error.name : 'none'));
                L('  error status: ' + (result.error ? (result.error.status || 'N/A') : 'N/A'));
                L('  data.user: ' + (result.data.user ? 'EXISTS' : 'null'));
                
                if (result.error) {
                    L('❌ AUTH ERROR: ' + result.error.message);
                    errDiv.innerText = '❌ ' + result.error.message;
                    errDiv.style.display = 'block';
                    return;
                }
                
                if (!result.data.user) {
                    L('❌ NO USER in data');
                    errDiv.innerText = '❌ خطأ غير متوقع';
                    errDiv.style.display = 'block';
                    return;
                }
                
                L('✅ Auth success! UserID: ' + result.data.user.id.substring(0, 8) + '...');
                
                // Check admin
                L('\n🔍 Querying admin_users...');
                
                var adminRes = await S.from('admin_users')
                    .select('*')
                    .eq('user_id', result.data.user.id);
                
                L('Admin query result:');
                L('  data: ' + (adminRes.data ? ('array[' + adminRes.data.length + ']') : 'null'));
                L('  error: ' + (adminRes.error ? adminRes.error.message : 'null'));
                
                if (adminRes.error) {
                    L('❌ DB ERROR: ' + adminRes.error.message);
                    errDiv.innerText = '❌ خطأ قاعدة البيانات';
                    errDiv.style.display = 'block';
                    return;
                }
                
                if (!adminRes.data || adminRes.data.length === 0) {
                    L('❌ NOT FOUND in admin_users');
                    await S.auth.signOut();
                    errDiv.innerText = '❌ ليس لديك صلاحية Admin';
                    errDiv.style.display = 'block';
                    return;
                }
                
                // Find active
                var active = null;
                for (var i = 0; i < adminRes.data.length; i++) {
                    if (adminRes.data[i].is_active === true) active = adminRes.data[i];
                }
                
                if (!active) {
                    L('❌ FOUND but NOT ACTIVE');
                    await S.auth.signOut();
                    errDiv.innerText = '❌ الحساب غير مفعل';
                    errDiv.style.display = 'block';
                    return;
                }
                
                L('✅ ADMIN CONFIRMED!');
                L('  Role: ' + active.role);
                
                sessionStorage.setItem('adminAuth', 'true');
                L('\n➡️ Redirecting to dashboard...');
                window.location.href = '/admin/dashboard.html';
                
            } catch(e) {
                L('\n❌❌❌ EXCEPTION ❌❌❌');
                L('Type: ' + (e.constructor ? e.constructor.name : typeof e));
                L('Message: ' + e.message);
                L('Stack: ' + (e.stack ? e.stack.substring(0, 200) : 'N/A'));
                errDiv.innerText = '❌ خطأ: ' + e.message;
                errDiv.style.display = 'block';
            }
        };
    </script>
</body>
</html>
