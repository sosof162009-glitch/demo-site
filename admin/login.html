<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - 205-Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/admin.css">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="back-link">
        <a href="/en/">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Tools
        </a>
    </div>
    
    <div class="admin-login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>🔧 205-Tools</h1>
                <p>Admin Dashboard</p>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;">
                Invalid email or password
            </div>
            
            <div id="notAdminMessage" class="error-message" style="display: none; background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #ef4444;">
                You don't have admin access. Please contact the administrator.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@yoursite.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="login-footer">
                <a href="#" onclick="event.preventDefault(); alert('Contact your administrator to reset password')">Forgot password?</a>
            </div>
        </div>
    </div>
    
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://jgmpltmdncyrnuufe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const notAdminMessage = document.getElementById('notAdminMessage');
        
        // Check if already logged in as admin
        async function checkAdminSession() {
            try {
                const { data: { session } } = await supabase.auth.getSession();
                if (session) {
                    // Check if user is admin
                    const { data: adminData, error: adminError } = await supabase
                        .from('admin_users')
                        .select('*')
                        .eq('user_id', session.user.id)
                        .eq('is_active', true)
                        .single();
                    
                    if (adminData && !adminError) {
                        window.location.href = '/admin/dashboard.html';
                    }
                }
            } catch (e) {
                console.log('No admin session');
            }
        }
        
        // Handle form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            // Reset errors
            errorMessage.style.display = 'none';
            notAdminMessage.style.display = 'none';
            
            // Basic validation
            if (!email || !password) {
                errorMessage.textContent = 'Please enter both email and password';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            
            try {
                // Step 1: Authenticate with Supabase
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (authError) {
                    throw authError;
                }
                
                if (!authData.user || !authData.session) {
                    throw new Error('Authentication failed');
                }
                
                // Step 2: Check if user is admin
                const { data: adminData, error: adminError } = await supabase
                    .from('admin_users')
                    .select('*')
                    .eq('user_id', authData.user.id)
                    .eq('is_active', true)
                    .single();
                
                if (adminError || !adminData) {
                    // User is not an admin - sign them out
                    await supabase.auth.signOut();
                    notAdminMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                    return;
                }
                
                // Step 3: User is admin - store session and redirect
                sessionStorage.setItem('adminAuth', 'true');
                sessionStorage.setItem('adminSession', JSON.stringify({
                    authenticated: true,
                    email: email,
                    userId: authData.user.id,
                    role: adminData.role,
                    loginTime: new Date().toISOString()
                }));
                
                // Redirect to dashboard
                window.location.href = '/admin/dashboard.html';
                
            } catch (error) {
                console.error('Login error:', error);
                
                // Reset button state
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                
                // Show error
                errorMessage.textContent = error.message || 'Invalid email or password';
                errorMessage.style.display = 'block';
            }
        });
        
        // Initialize
        checkAdminSession();
        
        // Clear error on input
        document.getElementById('email').addEventListener('input', () => {
            errorMessage.style.display = 'none';
            notAdminMessage.style.display = 'none';
        });
        document.getElementById('password').addEventListener('input', () => {
            errorMessage.style.display = 'none';
            notAdminMessage.style.display = 'none';
        });
    </script>
</body>
</html>
