<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - 205-Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/admin.css">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="back-link">
        <a href="/en/">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Tools
        </a>
    </div>
    
    <div class="admin-login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>🔧 205-Tools</h1>
                <p>Admin Dashboard</p>
            </div>
            
            <!-- Debug Info -->
            <div id="debugInfo" style="background: #1c1f35; padding: 10px; margin-bottom: 15px; border-radius: 8px; font-size: 11px; font-family: monospace; max-height: 200px; overflow-y: auto; display: none;">
                <div id="debugText">Initializing...</div>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;">
                Invalid email or password
            </div>
            
            <div id="notAdminMessage" class="error-message" style="display: none; background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #ef4444;">
                You don't have admin access. Please contact the administrator.
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@yoursite.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="login-footer">
                <a href="#" onclick="event.preventDefault(); alert('Contact your administrator to reset password')">Forgot password?</a>
            </div>
        </div>
    </div>
    
    <script>
        const DEBUG = true;
        const debugText = document.getElementById('debugText');
        const debugInfo = document.getElementById('debugInfo');
        
        function log(msg) {
            console.log(msg);
            if (DEBUG) {
                debugInfo.style.display = 'block';
                debugText.innerHTML += '<br>> ' + msg;
            }
        }
        
        log('🚀 LOGIN PAGE LOADED');
        
        // Supabase Config
        const SUPABASE_URL = 'https://jgmpltmdncyrnuufe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU';
        
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        log('✅ Supabase initialized');
        
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const notAdminMessage = document.getElementById('notAdminMessage');
        
        // 🔍 STEP-BY-STEP DEBUG FUNCTION
        async function checkAdminAccess(userId) {
            log('🔍 STEP 1: Checking admin_users for userId: ' + userId);
            
            // Try without .single() first to see all results
            log('🔍 STEP 2: Querying admin_users (without .single)...');
            const { data: allData, error: allError } = await supabase
                .from('admin_users')
                .select('*')
                .eq('user_id', userId);
            
            log('🔍 STEP 3: Raw query result:');
            log('   - allData: ' + JSON.stringify(allData));
            log('   - allError: ' + JSON.stringify(allError));
            log('   - allData length: ' + (allData ? allData.length : 'null'));
            
            if (allError) {
                log('❌ QUERY ERROR: ' + allError.message);
                log('❌ Error code: ' + allError.code);
                return { isAdmin: false, error: allError };
            }
            
            if (!allData || allData.length === 0) {
                log('❌ NO RECORDS: User not found in admin_users table');
                return { isAdmin: false, error: 'User not in admin_users' };
            }
            
            log('✅ FOUND: ' + allData.length + ' record(s)');
            
            // Check if active
            const activeRecord = allData.find(r => r.is_active === true);
            if (!activeRecord) {
                log('❌ NOT ACTIVE: Found record but is_active=false');
                return { isAdmin: false, error: 'User exists but not active' };
            }
            
            log('✅ ACTIVE: User is active admin with role: ' + activeRecord.role);
            return { isAdmin: true, data: activeRecord };
        }
        
        // Check session on page load
        async function checkSession() {
            log('🔍 Checking existing session...');
            const { data: { session } } = await supabase.auth.getSession();
            
            if (!session) {
                log('ℹ️ No active session');
                return;
            }
            
            log('✅ Session found for: ' + session.user.email);
            log('   User ID: ' + session.user.id);
            
            const result = await checkAdminAccess(session.user.id);
            
            if (result.isAdmin) {
                log('✅ Admin verified, redirecting...');
                window.location.href = '/admin/dashboard.html';
            } else {
                log('❌ Not an admin: ' + result.error);
            }
        }
        
        // Handle login
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            log('');
            log('══════════ LOGIN ATTEMPT ══════════');
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            errorMessage.style.display = 'none';
            notAdminMessage.style.display = 'none';
            
            if (!email || !password) {
                errorMessage.textContent = 'Please enter both email and password';
                errorMessage.style.display = 'block';
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            
            try {
                log('🔐 Step 1: Authenticating with Supabase...');
                const { data: authData, error: authError } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (authError) {
                    log('❌ Auth failed: ' + authError.message);
                    throw authError;
                }
                
                log('✅ Auth successful!');
                log('   User ID: ' + authData.user.id);
                log('   Email: ' + authData.user.email);
                
                log('');
                log('🔍 Step 2: Checking admin status...');
                const result = await checkAdminAccess(authData.user.id);
                
                if (!result.isAdmin) {
                    log('❌ Step 3: Admin check FAILED');
                    log('   Reason: ' + result.error);
                    await supabase.auth.signOut();
                    notAdminMessage.style.display = 'block';
                    loginBtn.disabled = false;
                    loginBtn.textContent = 'Sign In';
                    return;
                }
                
                log('✅ Step 3: Admin check PASSED!');
                log('   Role: ' + result.data.role);
                
                // Store session
                sessionStorage.setItem('adminAuth', 'true');
                sessionStorage.setItem('adminSession', JSON.stringify({
                    authenticated: true,
                    email: email,
                    userId: authData.user.id,
                    role: result.data.role,
                    loginTime: new Date().toISOString()
                }));
                
                log('✅ Step 4: Redirecting to dashboard...');
                window.location.href = '/admin/dashboard.html';
                
            } catch (error) {
                log('❌ ERROR: ' + error.message);
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                errorMessage.textContent = error.message || 'Invalid email or password';
                errorMessage.style.display = 'block';
            }
        });
        
        // Check on load
        checkSession();
    </script>
</body>
</html>
