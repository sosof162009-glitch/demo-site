<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0c1b; color: #fff; font-family: system-ui, sans-serif; padding: 10px; }
        #debug { background: #1c1f35; padding: 12px; border-radius: 8px; font-size: 11px; font-family: monospace; 
                 margin-bottom: 10px; border: 2px solid #4f8ef7; max-height: 200px; overflow-y: auto; }
        .box { max-width: 380px; margin: 0 auto; background: #141629; padding: 20px; border-radius: 12px; }
        h1 { text-align: center; color: #4f8ef7; font-size: 18px; margin-bottom: 15px; }
        input { width: 100%; padding: 14px; margin: 6px 0; border: 1px solid #2a2d4a; border-radius: 8px; 
                background: #1c1f35; color: #fff; font-size: 16px; }
        .btn { width: 100%; padding: 16px; margin-top: 12px; background: linear-gradient(135deg, #4f8ef7, #6366f1); 
               color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: bold;
               -webkit-tap-highlight-color: transparent; touch-action: manipulation; }
        .btn:active { opacity: 0.8; transform: scale(0.98); }
        .err { background: rgba(239,68,68,0.1); color: #ef4444; padding: 10px; border-radius: 6px; margin: 8px 0; display: none; }
    </style>
</head>
<body>
    <div id="debug">⏳...</div>
    
    <div class="box">
        <h1>🔧 تسجيل دخول</h1>
        <div id="err" class="err"></div>
        
        <input type="email" id="em" placeholder="Email">
        <input type="password" id="pw" placeholder="Password">
        <!-- زر مباشر مع onclick -->
        <button class="btn" onclick="doLogin(); return false;">تسجيل الدخول</button>
        
        <p style="color:#666; font-size:11px; text-align:center; margin-top:10px;">
            إذا الزر لا يعمل، جرب انقر مطول ثم ارفع
        </p>
    </div>

    <script>
        // سجلات
        var logs = [];
        function L(msg) {
            var t = new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit'});
            var line = '[' + t + '] ' + msg;
            logs.push(line);
            document.getElementById('debug').innerText = logs.join('\n');
            console.log(line);
        }
        
        L('✅ JS loaded');
        
        // Supabase
        var S = window.supabase.createClient(
            'https://jgmpltmdncyrnuufe.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU'
        );
        L('✅ Supabase OK');
        
        // دالة تسجيل الدخول - GLOBAL
        window.doLogin = async function() {
            L('\n═══ CLICKED ═══');
            
            var email = document.getElementById('em').value.trim();
            var pass = document.getElementById('pw').value;
            var btn = document.querySelector('.btn');
            var err = document.getElementById('err');
            
            L('Email: ' + email);
            
            if (!email || !pass) {
                err.innerText = '❌ أكمل الحقول';
                err.style.display = 'block';
                L('❌ Empty fields');
                return;
            }
            
            err.style.display = 'none';
            btn.innerText = '...جاري';
            btn.disabled = true;
            
            try {
                L('🔐 Sending...');
                
                var res = await S.auth.signInWithPassword({ email: email, password: pass });
                
                L('Auth result:');
                L('  error: ' + (res.error ? res.error.message : 'none'));
                L('  user: ' + (res.data.user ? 'YES' : 'NO'));
                
                if (res.error) throw res.error;
                
                L('✅ Login OK!');
                L('UserID: ' + res.data.user.id);
                
                // Check admin
                L('\n🔍 Check admin...');
                var admin = await S.from('admin_users').select('*').eq('user_id', res.data.user.id);
                
                L('Admin query:');
                L('  rows: ' + (admin.data ? admin.data.length : 0));
                L('  error: ' + (admin.error ? admin.error.message : 'none'));
                
                if (!admin.data || admin.data.length === 0) {
                    L('❌ NOT ADMIN');
                    await S.auth.signOut();
                    err.innerText = '❌ ليس Admin';
                    err.style.display = 'block';
                    btn.innerText = 'تسجيل الدخول';
                    btn.disabled = false;
                    return;
                }
                
                var active = null;
                for (var i = 0; i < admin.data.length; i++) {
                    if (admin.data[i].is_active === true) active = admin.data[i];
                }
                
                if (!active) {
                    L('❌ NOT ACTIVE');
                    await S.auth.signOut();
                    err.innerText = '❌ غير مفعل';
                    err.style.display = 'block';
                    btn.innerText = 'تسجيل الدخول';
                    btn.disabled = false;
                    return;
                }
                
                L('✅ ADMIN: ' + active.role);
                sessionStorage.setItem('adminAuth', 'true');
                L('➡️ Redirecting...');
                window.location.href = '/admin/dashboard.html';
                
            } catch(e) {
                L('❌ ERROR: ' + e.message);
                err.innerText = '❌ ' + e.message;
                err.style.display = 'block';
                btn.innerText = 'تسجيل الدخول';
                btn.disabled = false;
            }
        };
        
        // تحقق من جلسة موجودة
        S.auth.getSession().then(function(r) {
            if (r.data.session) {
                L('✅ Session: ' + r.data.session.user.email);
            } else {
                L('ℹ️ No session');
            }
        });
        
        L('✅ Ready');
    </script>
</body>
</html>
