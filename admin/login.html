<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: #0a0c1b; 
            color: #fff; 
            font-family: system-ui, -apple-system, sans-serif;
            padding: 20px;
            min-height: 100vh;
        }
        #debug { 
            background: #1c1f35; 
            padding: 15px; 
            border-radius: 8px; 
            font-size: 13px; 
            font-family: monospace;
            margin-bottom: 20px;
            border: 2px solid #4f8ef7;
            max-height: 300px;
            overflow-y: auto;
        }
        .login-box {
            max-width: 400px;
            margin: 0 auto;
            background: #141629;
            padding: 30px;
            border-radius: 16px;
        }
        h1 { text-align: center; margin-bottom: 20px; color: #4f8ef7; }
        input {
            width: 100%;
            padding: 15px;
            margin: 10px 0;
            border: 1px solid #2a2d4a;
            border-radius: 8px;
            background: #1c1f35;
            color: #fff;
            font-size: 16px;
        }
        button {
            width: 100%;
            padding: 15px;
            margin-top: 15px;
            background: linear-gradient(135deg, #4f8ef7, #6366f1);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .error {
            background: rgba(239,68,68,0.1);
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            margin: 10px 0;
            display: none;
        }
    </style>
</head>
<body>
    <div id="debug">🔍 جاري تحميل الصفحة...</div>
    
    <div class="login-box">
        <h1>🔧 تسجيل دخول Admin</h1>
        
        <div id="errorBox" class="error"></div>
        
        <input type="email" id="email" placeholder="البريد الإلكتروني" value="">
        <input type="password" id="password" placeholder="كلمة المرور" value="">
        
        <button id="loginBtn">تسجيل الدخول</button>
    </div>

    <script>
        // دالة التسجيل
        function addLog(msg, isError) {
            const debug = document.getElementById('debug');
            const time = new Date().toLocaleTimeString('ar-SA', {hour:'2-digit', minute:'2-digit', second:'2-digit'});
            const color = isError ? '#ef4444' : '#22c55e';
            debug.innerHTML += '\n[' + time + '] ' + msg;
            debug.scrollTop = debug.scrollHeight;
            console.log(msg);
        }
        
        addLog('✅ JavaScript يعمل!');
        
        // التحقق من Supabase
        if (typeof window.supabase === 'undefined') {
            addLog('❌ Supabase غير محمل!', true);
        } else {
            addLog('✅ Supabase متوفر');
        }
        
        // تهيئة
        const SUPABASE_URL = 'https://jgmpltmdncyrnuufe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU';
        
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            addLog('✅ تم الاتصال بـ Supabase');
        } catch(e) {
            addLog('❌ خطأ في الاتصال: ' + e.message, true);
        }
        
        // الزر
        document.getElementById('loginBtn').addEventListener('click', async function() {
            addLog('\n══════════ تسجيل الدخول ══════════');
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            const errorBox = document.getElementById('errorBox');
            
            addLog('Email: ' + email);
            
            if (!email || !password) {
                errorBox.textContent = 'أكمل جميع الحقول';
                errorBox.style.display = 'block';
                addLog('❌ الحقول فارغة', true);
                return;
            }
            
            errorBox.style.display = 'none';
            btn.disabled = true;
            btn.textContent = 'جاري التحقق...';
            
            try {
                addLog('🔐 إرسال البيانات...');
                
                const result = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                addLog('نتيجة Auth:');
                addLog('  - error: ' + (result.error ? result.error.message : 'لا يوجد'));
                addLog('  - user: ' + (result.data.user ? 'موجود' : 'غير موجود'));
                
                if (result.error) {
                    throw result.error;
                }
                
                addLog('✅ تسجيل الدخول ناجح!');
                addLog('  User ID: ' + result.data.user.id);
                
                // التحقق من Admin
                addLog('\n🔍 التحقق من Admin...');
                
                const adminResult = await supabase
                    .from('admin_users')
                    .select('*')
                    .eq('user_id', result.data.user.id);
                
                addLog('نتيجة الاستعلام:');
                addLog('  - عدد السجلات: ' + (adminResult.data ? adminResult.data.length : 0));
                addLog('  - خطأ: ' + (adminResult.error ? adminResult.error.message : 'لا يوجد'));
                
                if (adminResult.error) {
                    throw new Error('خطأ في قاعدة البيانات: ' + adminResult.error.message);
                }
                
                if (!adminResult.data || adminResult.data.length === 0) {
                    addLog('❌ المستخدم غير Admin', true);
                    await supabase.auth.signOut();
                    errorBox.textContent = '❌ ليس لديك صلاحية Admin';
                    errorBox.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'تسجيل الدخول';
                    return;
                }
                
                const activeAdmin = adminResult.data.find(function(r) { return r.is_active === true; });
                
                if (!activeAdmin) {
                    addLog('❌ المستخدم غير مفعل', true);
                    await supabase.auth.signOut();
                    errorBox.textContent = '❌ الحساب غير مفعل';
                    errorBox.style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'تسجيل الدخول';
                    return;
                }
                
                addLog('✅ Admin مفعل! Role: ' + activeAdmin.role);
                
                // حفظ
                sessionStorage.setItem('adminAuth', 'true');
                sessionStorage.setItem('adminData', JSON.stringify({
                    email: email,
                    role: activeAdmin.role,
                    userId: result.data.user.id
                }));
                
                addLog('✅ جاري التحويل...');
                window.location.href = '/admin/dashboard.html';
                
            } catch(err) {
                addLog('❌ خطأ: ' + err.message, true);
                errorBox.textContent = '❌ ' + err.message;
                errorBox.style.display = 'block';
                btn.disabled = false;
                btn.textContent = 'تسجيل الدخول';
            }
        });
        
        // تحقق من جلسة موجودة
        async function checkSession() {
            addLog('\n🔍 التحقق من جلسة موجودة...');
            try {
                const { data } = await supabase.auth.getSession();
                if (data.session) {
                    addLog('✅ جلسة موجودة: ' + data.session.user.email);
                } else {
                    addLog('ℹ️ لا توجد جلسة');
                }
            } catch(e) {
                addLog('⚠️ خطأ في التحقق: ' + e.message, true);
            }
        }
        
        checkSession();
    </script>
</body>
</html>
