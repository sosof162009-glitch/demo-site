<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - 205-Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/admin.css">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="back-link">
        <a href="/en/">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Tools
        </a>
    </div>
    
    <div class="admin-login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>🔧 205-Tools</h1>
                <p>Admin Dashboard</p>
            </div>
            
            <div id="lockoutMessage" class="lockout-message">
                <div>Too many failed attempts</div>
                <div class="lockout-timer" id="lockoutTimer">15:00</div>
            </div>
            
            <div id="errorMessage" class="error-message">
                Invalid email or password
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@yoursite.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="login-footer">
                <a href="#" onclick="event.preventDefault(); alert('Contact your administrator to reset password')">Forgot password?</a>
            </div>
        </div>
    </div>
    
    <script>
        // Supabase Configuration
        const SUPABASE_URL = 'https://jgmpltmdncyrnuufe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU';
        
        // Initialize Supabase
        const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Security Settings
        const MAX_ATTEMPTS = 5;
        const LOCKOUT_DURATION = 15 * 60 * 1000; // 15 minutes
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        const lockoutMessage = document.getElementById('lockoutMessage');
        const lockoutTimer = document.getElementById('lockoutTimer');
        
        // Check if already logged in
        async function checkSession() {
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                window.location.href = '/admin/dashboard.html';
            }
        }
        
        // Check for existing lockout
        function checkLockout() {
            const lockoutEnd = localStorage.getItem('adminLockoutEnd');
            if (lockoutEnd) {
                const now = Date.now();
                if (now < parseInt(lockoutEnd)) {
                    showLockout(parseInt(lockoutEnd) - now);
                    return true;
                } else {
                    // Lockout expired
                    localStorage.removeItem('adminLockoutEnd');
                    localStorage.removeItem('adminFailedAttempts');
                }
            }
            return false;
        }
        
        // Show lockout message with countdown
        function showLockout(remainingMs) {
            lockoutMessage.classList.add('show');
            loginForm.style.display = 'none';
            
            function updateTimer() {
                const remaining = parseInt(localStorage.getItem('adminLockoutEnd')) - Date.now();
                if (remaining <= 0) {
                    lockoutMessage.classList.remove('show');
                    loginForm.style.display = 'block';
                    localStorage.removeItem('adminLockoutEnd');
                    localStorage.removeItem('adminFailedAttempts');
                    return;
                }
                
                const minutes = Math.floor(remaining / 60000);
                const seconds = Math.floor((remaining % 60000) / 1000);
                lockoutTimer.textContent = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                setTimeout(updateTimer, 1000);
            }
            
            updateTimer();
        }
        
        // Handle failed attempt
        function handleFailedAttempt() {
            let attempts = parseInt(localStorage.getItem('adminFailedAttempts') || '0');
            attempts++;
            localStorage.setItem('adminFailedAttempts', attempts.toString());
            
            if (attempts >= MAX_ATTEMPTS) {
                const lockoutEnd = Date.now() + LOCKOUT_DURATION;
                localStorage.setItem('adminLockoutEnd', lockoutEnd.toString());
                showLockout(LOCKOUT_DURATION);
                return true;
            }
            
            // Show remaining attempts
            const remaining = MAX_ATTEMPTS - attempts;
            errorMessage.textContent = `Invalid email or password. ${remaining} attempts remaining`;
            errorMessage.classList.add('show', 'shake');
            setTimeout(() => errorMessage.classList.remove('shake'), 500);
            
            return false;
        }
        
        // Handle form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            
            // Check lockout first
            if (checkLockout()) {
                return;
            }
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            // Reset error
            errorMessage.classList.remove('show');
            
            // Basic validation
            if (!email || !password) {
                errorMessage.textContent = 'Please enter both email and password';
                errorMessage.classList.add('show');
                return;
            }
            
            // Email format validation
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                errorMessage.textContent = 'Please enter a valid email address';
                errorMessage.classList.add('show');
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.classList.add('loading');
            
            try {
                // Authenticate with Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (error) {
                    throw error;
                }
                
                if (data.user && data.session) {
                    // Successful login
                    localStorage.removeItem('adminFailedAttempts');
                    localStorage.removeItem('adminLockoutEnd');
                    
                    // Store session info
                    const sessionData = {
                        authenticated: true,
                        email: email,
                        userId: data.user.id,
                        loginTime: new Date().toISOString(),
                        expires: Date.now() + (8 * 60 * 60 * 1000) // 8 hours
                    };
                    sessionStorage.setItem('adminAuth', 'true');
                    sessionStorage.setItem('adminSession', JSON.stringify(sessionData));
                    
                    // Redirect to dashboard
                    window.location.href = '/admin/dashboard.html';
                } else {
                    throw new Error('Login failed');
                }
            } catch (error) {
                console.error('Login error:', error);
                
                // Reset button state
                loginBtn.disabled = false;
                loginBtn.classList.remove('loading');
                
                // Handle different error types
                if (error.message.includes('Invalid login credentials')) {
                    handleFailedAttempt();
                } else {
                    errorMessage.textContent = error.message || 'An error occurred. Please try again.';
                    errorMessage.classList.add('show');
                }
            }
        });
        
        // Initialize on page load
        checkSession();
        checkLockout();
        
        // Clear error on input
        document.getElementById('email').addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });
        document.getElementById('password').addEventListener('input', () => {
            errorMessage.classList.remove('show');
        });
    </script>
</body>
</html>
