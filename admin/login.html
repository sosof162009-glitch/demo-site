<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - 205-Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/admin.css">
    
    <!-- Supabase JS Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <div class="back-link">
        <a href="/en/">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
            </svg>
            Back to Tools
        </a>
    </div>
    
    <div class="admin-login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>🔧 205-Tools</h1>
                <p>Admin Dashboard</p>
            </div>
            
            <div id="errorMessage" class="error-message" style="display: none;">
                Invalid email or password
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="admin@yoursite.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Enter your password"
                        required
                        autocomplete="current-password"
                    >
                </div>
                
                <button type="submit" class="login-btn" id="loginBtn">
                    Sign In
                </button>
            </form>
            
            <div class="login-footer">
                <a href="#" onclick="event.preventDefault(); alert('Contact your administrator to reset password')">Forgot password?</a>
            </div>
        </div>
    </div>
    
    <script>
        console.log('=== LOGIN DEBUG MODE ===');
        
        // Supabase Configuration
        const SUPABASE_URL = 'https://jgmpltmdncyrnuufe.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU';
        
        console.log('Supabase URL:', SUPABASE_URL);
        console.log('Supabase Key exists:', SUPABASE_KEY ? 'YES' : 'NO');
        
        // Initialize Supabase
        let supabase;
        try {
            supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
            console.log('✅ Supabase client created successfully');
        } catch (e) {
            console.error('❌ Failed to create Supabase client:', e);
        }
        
        // DOM Elements
        const loginForm = document.getElementById('loginForm');
        const loginBtn = document.getElementById('loginBtn');
        const errorMessage = document.getElementById('errorMessage');
        
        // Check if already logged in
        async function checkSession() {
            console.log('Checking existing session...');
            try {
                const { data: { session }, error } = await supabase.auth.getSession();
                console.log('Session check result:', { session: !!session, error });
                if (session) {
                    console.log('✅ Active session found, redirecting...');
                    window.location.href = '/admin/dashboard.html';
                } else {
                    console.log('ℹ️ No active session');
                }
            } catch (e) {
                console.error('❌ Error checking session:', e);
            }
        }
        
        // Handle form submission
        loginForm.addEventListener('submit', async function(e) {
            e.preventDefault();
            console.log('=== LOGIN ATTEMPT ===');
            
            const email = document.getElementById('email').value.trim().toLowerCase();
            const password = document.getElementById('password').value;
            
            console.log('Email:', email);
            console.log('Password length:', password.length);
            
            // Reset error
            errorMessage.style.display = 'none';
            
            // Basic validation
            if (!email || !password) {
                console.log('❌ Validation failed: missing email or password');
                errorMessage.textContent = 'Please enter both email and password';
                errorMessage.style.display = 'block';
                return;
            }
            
            // Show loading state
            loginBtn.disabled = true;
            loginBtn.textContent = 'Signing in...';
            
            try {
                console.log('Sending signInWithPassword request...');
                
                // Authenticate with Supabase
                const { data, error } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                console.log('Supabase response:', { data, error });
                
                if (error) {
                    console.error('❌ Supabase error:', error);
                    throw error;
                }
                
                if (data.user && data.session) {
                    console.log('✅ Login successful! User:', data.user.email);
                    console.log('✅ Session:', data.session ? 'Valid' : 'Invalid');
                    
                    // Store session info
                    const sessionData = {
                        authenticated: true,
                        email: email,
                        userId: data.user.id,
                        loginTime: new Date().toISOString(),
                        expires: Date.now() + (8 * 60 * 60 * 1000)
                    };
                    sessionStorage.setItem('adminAuth', 'true');
                    sessionStorage.setItem('adminSession', JSON.stringify(sessionData));
                    
                    // Redirect to dashboard
                    console.log('Redirecting to dashboard...');
                    window.location.href = '/admin/dashboard.html';
                } else {
                    console.error('❌ Login failed: no user or session in response');
                    throw new Error('Login failed - no session');
                }
            } catch (error) {
                console.error('=== LOGIN ERROR ===');
                console.error('Error name:', error.name);
                console.error('Error message:', error.message);
                console.error('Error details:', error);
                
                // Reset button state
                loginBtn.disabled = false;
                loginBtn.textContent = 'Sign In';
                
                // Show error
                if (error.message && error.message.includes('Invalid login credentials')) {
                    errorMessage.textContent = 'Invalid email or password';
                } else if (error.message) {
                    errorMessage.textContent = error.message;
                } else {
                    errorMessage.textContent = 'An error occurred. Please try again.';
                }
                errorMessage.style.display = 'block';
            }
        });
        
        // Initialize on page load
        console.log('Initializing...');
        checkSession();
        
        // Clear error on input
        document.getElementById('email').addEventListener('input', () => {
            errorMessage.style.display = 'none';
        });
        document.getElementById('password').addEventListener('input', () => {
            errorMessage.style.display = 'none';
        });
        
        console.log('=== INIT COMPLETE ===');
    </script>
</body>
</html>
