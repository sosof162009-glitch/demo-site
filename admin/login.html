<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Login - 205-Tools</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/admin/assets/admin.css">
    
    <style>
        #debugBox { 
            background: #1c1f35; 
            padding: 15px; 
            margin: 10px;
            border-radius: 8px; 
            font-size: 12px; 
            font-family: 'Courier New', monospace;
            max-height: 400px; 
            overflow-y: auto; 
            border: 2px solid #4f8ef7;
            color: #dde1f5;
            white-space: pre-wrap;
        }
        .log-ok { color: #22c55e; }
        .log-err { color: #ef4444; }
        .log-info { color: #4f8ef7; }
    </style>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
</head>
<body>
    <!-- DEBUG BOX -->
    <div id="debugBox">🔄 جاري التحميل...</div>

    <div class="back-link">
        <a href="/en/">< Back to Tools</a>
    </div>
    
    <div class="admin-login-container">
        <div class="login-card">
            <div class="login-logo">
                <h1>🔧 205-Tools</h1>
                <p>Admin Dashboard</p>
            </div>
            
            <div id="errorMsg" class="error-message" style="display: none;"></div>
            
            <div id="notAdminMsg" class="error-message" style="display: none; background: rgba(239,68,68,0.1); border-color: rgba(239,68,68,0.3); color: #ef4444;">
                ليس لديك صلاحية Admin
            </div>
            
            <!-- نموذج مبسط -->
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="email" placeholder="admin@yoursite.com" value="">
            </div>
            
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="********" value="">
            </div>
            
            <!-- زر مباشر -->
            <button onclick="doLogin()" class="login-btn" id="loginBtn">
                تسجيل الدخول
            </button>
            
        </div>
    </div>
    
    <script>
        const debugBox = document.getElementById('debugBox');
        
        function log(msg, type='info') {
            const time = new Date().toLocaleTimeString('ar-SA');
            const css = type === 'ok' ? 'log-ok' : type === 'err' ? 'log-err' : 'log-info';
            debugBox.innerHTML += `\n<span class="${css}">[${time}] ${msg}</span>`;
            debugBox.scrollTop = debugBox.scrollHeight;
            console.log(msg);
        }
        
        // تهيئة Supabase
        log('🔄 تهيئة Supabase...', 'info');
        const supabase = window.supabase.createClient(
            'https://jgmpltmdncyrnuufe.supabase.co',
            'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU'
        );
        log('✅ Supabase جاهز', 'ok');
        
        // دالة تسجيل الدخول المباشرة
        async function doLogin() {
            log('\n══════════ تسجيل الدخول ══════════', 'info');
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const btn = document.getElementById('loginBtn');
            
            log('Email: ' + email, 'info');
            
            if (!email || !password) {
                log('❌ أكمل جميع الحقول', 'err');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = 'جاري التحقق...';
            
            try {
                // خطوة 1: تسجيل الدخول
                log('🔐 خطوة 1: تسجيل الدخول...', 'info');
                const { data: auth, error: authErr } = await supabase.auth.signInWithPassword({
                    email: email,
                    password: password
                });
                
                if (authErr) {
                    log('❌ فشل تسجيل الدخول: ' + authErr.message, 'err');
                    btn.disabled = false;
                    btn.textContent = 'تسجيل الدخول';
                    return;
                }
                
                log('✅ تسجيل الدخول ناجح!', 'ok');
                log('   User ID: ' + auth.user.id, 'info');
                
                // خطوة 2: التحقق من Admin
                log('\n🔍 خطوة 2: التحقق من صلاحية Admin...', 'info');
                
                const { data: adminRows, error: adminErr } = await supabase
                    .from('admin_users')
                    .select('*')
                    .eq('user_id', auth.user.id);
                
                log('نتيجة الاستعلام:', 'info');
                log('   - عدد السجلات: ' + (adminRows ? adminRows.length : 'null'), 'info');
                log('   - خطأ: ' + (adminErr ? adminErr.message : 'لا يوجد'), adminErr ? 'err' : 'ok');
                
                if (adminErr) {
                    log('❌ خطأ في قاعدة البيانات', 'err');
                    await supabase.auth.signOut();
                    btn.disabled = false;
                    btn.textContent = 'تسجيل الدخول';
                    return;
                }
                
                if (!adminRows || adminRows.length === 0) {
                    log('❌ المستخدم غير موجود في جدول admin_users', 'err');
                    log('💡 الحل: شغل SQL في Supabase لإضافة المستخدم', 'info');
                    await supabase.auth.signOut();
                    document.getElementById('notAdminMsg').style.display = 'block';
                    btn.disabled = false;
                    btn.textContent = 'تسجيل الدخول';
                    return;
                }
                
                // التحقق من is_active
                const activeAdmin = adminRows.find(r => r.is_active === true);
                if (!activeAdmin) {
                    log('❌ المستخدم موجود لكنه غير مفعل (is_active=false)', 'err');
                    await supabase.auth.signOut();
                    btn.disabled = false;
                    btn.textContent = 'تسجيل الدخول';
                    return;
                }
                
                log('✅ Admin مفعل! Role: ' + activeAdmin.role, 'ok');
                
                // حفظ الجلسة
                sessionStorage.setItem('adminAuth', 'true');
                log('✅ جاري التحويل للوحة التحكم...', 'ok');
                
                window.location.href = '/admin/dashboard.html';
                
            } catch (e) {
                log('❌ خطأ غير متوقع: ' + e.message, 'err');
                btn.disabled = false;
                btn.textContent = 'تسجيل الدخول';
            }
        }
        
        // تحقق عند التحميل
        async function checkExisting() {
            log('\n🔍 التحقق من جلسة موجودة...', 'info');
            const { data: { session } } = await supabase.auth.getSession();
            if (session) {
                log('✅ جلسة موجودة: ' + session.user.email, 'ok');
                const { data: admin } = await supabase
                    .from('admin_users')
                    .select('*')
                    .eq('user_id', session.user.id)
                    .eq('is_active', true)
                    .single();
                if (admin) {
                    log('✅ Admin معرف، تحويل...', 'ok');
                    window.location.href = '/admin/dashboard.html';
                } else {
                    log('⚠️ ليس Admin، تسجيل خروج...', 'info');
                    await supabase.auth.signOut();
                }
            } else {
                log('ℹ️ لا توجد جلسة', 'info');
            }
        }
        
        checkExisting();
    </script>
</body>
</html>
