<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: #0a0c1b; color: #fff; font-family: system-ui, sans-serif; padding: 8px; font-size: 14px; }
        #debug { background: #1c1f35; padding: 10px; border-radius: 8px; font-size: 10px; font-family: monospace; 
                 margin-bottom: 8px; border: 2px solid #4f8ef7; max-height: 320px; overflow-y: auto; white-space: pre-wrap; }
        .box { max-width: 340px; margin: 0 auto; background: #141629; padding: 15px; border-radius: 12px; }
        h1 { text-align: center; color: #4f8ef7; font-size: 15px; margin-bottom: 10px; }
        input { width: 100%; padding: 12px; margin: 5px 0; border: 1px solid #2a2d4a; border-radius: 8px; 
                background: #1c1f35; color: #fff; font-size: 14px; }
        .btn { width: 100%; padding: 14px; margin-top: 10px; background: linear-gradient(135deg, #4f8ef7, #6366f1); 
               color: #fff; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; }
        .btn2 { width: 100%; padding: 10px; margin-top: 8px; background: #2a2d4a; 
               color: #fff; border: none; border-radius: 8px; font-size: 12px; }
        .err { background: rgba(239,68,68,0.15); color: #ef4444; padding: 10px; border-radius: 6px; 
               margin: 8px 0; display: none; font-size: 12px; }
        .warn { background: rgba(234,179,8,0.15); color: #eab308; padding: 10px; border-radius: 6px; 
               margin: 8px 0; display: none; font-size: 12px; }
    </style>
</head>
<body>
    <div id="debug">⏳ جاري التحميل...</div>
    
    <div class="box">
        <h1>🔧 تسجيل دخول Admin</h1>
        
        <div id="err" class="err"></div>
        <div id="warn" class="warn"></div>
        
        <input type="email" id="em" placeholder="Email">
        <input type="password" id="pw" placeholder="Password">
        
        <button class="btn" onclick="doLogin()">تسجيل الدخول</button>
        
        <button class="btn2" onclick="testConnection()">🔍 فحص الاتصال</button>
    </div>

    <script>
        var logs = [];
        function L(msg) {
            var t = new Date().toLocaleTimeString('ar-SA',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
            logs.push('[' + t + '] ' + msg);
            document.getElementById('debug').innerText = logs.join('\n');
            console.log(msg);
        }
        
        L('✅ JS Loaded');
        
        var SUPABASE_URL = 'https://jgmpltmdncyrnuufe.supabase.co';
        var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpnbXBsdG1kbmN5bGN5cm51dWZlIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNDUwNjUsImV4cCI6MjA5MDcyMTA2NX0.ejBVAvG0l_04jdIDKb6MfBKt9FndyyRkvgB1m8RCJjU';
        
        L('URL: ' + SUPABASE_URL);
        
        // TEST FETCH directly
        async function testConnection() {
            L('\n═══════ TEST CONNECTION ═══════');
            
            try {
                L('Testing fetch to Supabase...');
                var response = await fetch(SUPABASE_URL + '/auth/v1/settings', {
                    method: 'GET',
                    headers: { 'apikey': SUPABASE_KEY }
                });
                L('Fetch status: ' + response.status);
                L('Fetch OK: ' + response.ok);
                var data = await response.text();
                L('Response: ' + data.substring(0, 100));
            } catch(e) {
                L('❌ FETCH ERROR: ' + e.name);
                L('Message: ' + e.message);
                L('Type: ' + e.constructor.name);
            }
        }
        
        var S = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY, {
            auth: { persistSession: true, detectSessionInUrl: false }
        });
        L('✅ Supabase Client Created');
        
        // Check if online
        L('Online status: ' + (navigator.onLine ? 'YES' : 'NO'));
        
        // Check session
        S.auth.getSession().then(function(r) {
            L('Session: ' + (r.data.session ? 'YES' : 'NO'));
        }).catch(function(e) {
            L('Session error: ' + e.message);
        });
        
        L('✅ Ready');
        
        // LOGIN
        window.doLogin = async function() {
            L('\n═══════ LOGIN ═══════');
            
            var email = document.getElementById('em').value.trim();
            var pass = document.getElementById('pw').value;
            var errDiv = document.getElementById('err');
            var warnDiv = document.getElementById('warn');
            
            L('Email: ' + email);
            
            if (!email || !pass) {
                errDiv.innerText = '❌ أكمل الحقول';
                errDiv.style.display = 'block';
                return;
            }
            
            errDiv.style.display = 'none';
            warnDiv.style.display = 'none';
            
            // Check online
            if (!navigator.onLine) {
                warnDiv.innerText = '⚠️ أنت غير متصل بالإنترنت!';
                warnDiv.style.display = 'block';
                L('❌ Browser reports OFFLINE');
                return;
            }
            
            try {
                L('Calling signInWithPassword...');
                L('Time: ' + new Date().toISOString());
                
                var result = await S.auth.signInWithPassword({ email: email, password: pass });
                
                L('Result:');
                L('  error: ' + (result.error ? result.error.name + ' - ' + result.error.message : 'null'));
                L('  error.code: ' + (result.error ? (result.error.code || 'N/A') : 'N/A'));
                L('  user: ' + (result.data.user ? 'YES' : 'NO'));
                
                if (result.error) {
                    L('❌ Auth failed');
                    errDiv.innerText = '❌ ' + result.error.message;
                    errDiv.style.display = 'block';
                    return;
                }
                
                if (!result.data.user) {
                    L('❌ No user returned');
                    errDiv.innerText = '❌ خطأ غير متوقع';
                    errDiv.style.display = 'block';
                    return;
                }
                
                L('✅ Auth OK! ID: ' + result.data.user.id.substring(0, 8));
                
                // Check admin
                L('\nChecking admin...');
                var adminRes = await S.from('admin_users').select('*').eq('user_id', result.data.user.id);
                
                L('Admin result: rows=' + (adminRes.data ? adminRes.data.length : 'null') + 
                  ' error=' + (adminRes.error ? adminRes.error.message : 'null'));
                
                if (!adminRes.data || adminRes.data.length === 0) {
                    L('❌ Not admin');
                    await S.auth.signOut();
                    errDiv.innerText = '❌ ليس Admin';
                    errDiv.style.display = 'block';
                    return;
                }
                
                var active = adminRes.data.find(function(r) { return r.is_active === true; });
                if (!active) {
                    L('❌ Not active');
                    await S.auth.signOut();
                    errDiv.innerText = '❌ غير مفعل';
                    errDiv.style.display = 'block';
                    return;
                }
                
                L('✅ Admin OK! Role=' + active.role);
                sessionStorage.setItem('adminAuth', 'true');
                L('Redirecting...');
                window.location.href = '/admin/dashboard.html';
                
            } catch(e) {
                L('\n❌❌❌ EXCEPTION ❌❌❌');
                L('Name: ' + e.name);
                L('Message: ' + e.message);
                L('Code: ' + (e.code || 'N/A'));
                L('Status: ' + (e.status || 'N/A'));
                if (e.stack) L('Stack: ' + e.stack.substring(0, 150));
                errDiv.innerText = '❌ خطأ: ' + e.message;
                errDiv.style.display = 'block';
            }
        };
        
        // Expose test function
        window.testConnection = testConnection;
    </script>
</body>
</html>
