<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Cropper - 205-Tools</title>
    <meta name="description" content="Crop images to custom dimensions">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
    <style>
        .drop-zone { border: 2px dashed #6366f1; transition: all 0.3s; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #4f46e5; background: rgba(99, 102, 241, 0.05); }
        #canvasContainer { position: relative; display: inline-block; }
        #cropOverlay { position: absolute; border: 2px dashed #fff; background: rgba(0,0,0,0.3); cursor: move; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">✂️ Images</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Image Cropper</h1>
            <p class="text-xl text-white/90">Crop images to custom dimensions</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="drop-zone rounded-xl p-12 text-center cursor-pointer mb-8" id="dropZone">
                    <div class="text-5xl mb-4">📁</div>
                    <p class="text-lg font-medium mb-2">Drag & drop image here</p>
                    <p class="text-gray-500">or browse</p>
                    <input type="file" class="hidden" id="fileInput" accept="image/*">
                </div>

                <div id="editor" class="hidden mb-8">
                    <div id="canvasContainer" class="mx-auto">
                        <canvas id="imageCanvas"></canvas>
                    </div>
                    
                    <div class="grid grid-cols-4 gap-4 mt-4">
                        <div>
                            <label class="text-sm">X</label>
                            <input type="number" id="cropX" value="0" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="text-sm">Y</label>
                            <input type="number" id="cropY" value="0" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="text-sm">Width</label>
                            <input type="number" id="cropW" value="200" class="w-full p-2 border rounded">
                        </div>
                        <div>
                            <label class="text-sm">Height</label>
                            <input type="number" id="cropH" value="200" class="w-full p-2 border rounded">
                        </div>
                    </div>
                </div>

                <button onclick="cropImage()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Crop Image
                </button>

                <div id="result" class="hidden mt-8 p-6 bg-green-50 dark:bg-green-900/20 rounded-xl text-center">
                    <p class="text-green-600 dark:text-green-400 font-medium mb-4">✅ Image cropped!</p>
                    <a href="#" id="downloadLink" class="inline-block px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600">Download Cropped Image</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const canvas = document.getElementById('imageCanvas');
        const ctx = canvas.getContext('2d');
        let currentImage = null;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) handleFile(e.dataTransfer.files[0]);
        });
        fileInput.addEventListener('change', () => { if (fileInput.files.length) handleFile(fileInput.files[0]); });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                currentImage = new Image();
                currentImage.onload = function() {
                    canvas.width = currentImage.width;
                    canvas.height = currentImage.height;
                    ctx.drawImage(currentImage, 0, 0);
                    document.getElementById('editor').classList.remove('hidden');
                    document.getElementById('cropW').value = Math.min(200, currentImage.width);
                    document.getElementById('cropH').value = Math.min(200, currentImage.height);
                };
                currentImage.src = e.target.result;
            };
            reader.readAsDataURL(file);
        }

        function cropImage() {
            if (!currentImage) { alert('Please select an image'); return; }
            
            const x = parseInt(document.getElementById('cropX').value);
            const y = parseInt(document.getElementById('cropY').value);
            const w = parseInt(document.getElementById('cropW').value);
            const h = parseInt(document.getElementById('cropH').value);

            const cropCanvas = document.createElement('canvas');
            cropCanvas.width = w;
            cropCanvas.height = h;
            const cropCtx = cropCanvas.getContext('2d');
            cropCtx.drawImage(canvas, x, y, w, h, 0, 0, w, h);

            const link = document.getElementById('downloadLink');
            link.href = cropCanvas.toDataURL('image/png');
            link.download = 'cropped.png';
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
