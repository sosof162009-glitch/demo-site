<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fake Data Generator - 205-Tools</title>
    <meta name="description" content="Generate fake data for testing">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    // Generator Logic
function initGenerator(type, options) {
    let currentResult = '';
    let history = [];

    window.updateLength = function(value) {
        document.getElementById('lengthValue').textContent = value;
    };

    window.generate = function() {
        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.innerHTML = '⏳ Generating...';

        setTimeout(() => {
            try {
                currentResult = generateContent(type);
                
                document.getElementById('resultDisplay').textContent = currentResult;
                document.getElementById('resultDisplay').classList.add('text-gray-900', 'dark:text-white');
                document.getElementById('actionButtons').classList.remove('hidden');
                
                // Add to history
                addToHistory(currentResult);
                
                // Calculate strength for passwords
                if (type === 'password') {
                    calculateStrength(currentResult);
                }
            } catch (err) {
                alert('Error generating: ' + err.message);
            }
            
            btn.disabled = false;
            btn.innerHTML = '⚡ Generate';
        }, 300);
    };

    function generateContent(type) {
        const length = parseInt(document.getElementById('lengthSlider').value);
        
        switch(type) {
            case 'password':
                return generatePassword(length);
            case 'uuid':
                return generateUUID();
            case 'pin':
                return generatePIN(length);
            default:
                return generateRandomString(length);
        }
    }

    function generatePassword(length) {
        const useUpper = document.getElementById('useUpper')?.checked ?? true;
        const useLower = document.getElementById('useLower')?.checked ?? true;
        const useNumbers = document.getElementById('useNumbers')?.checked ?? true;
        const useSymbols = document.getElementById('useSymbols')?.checked ?? true;
        
        let chars = '';
        if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
        if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (useNumbers) chars += '0123456789';
        if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
        
        if (chars === '') chars = 'abcdefghijklmnopqrstuvwxyz';
        
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function generatePIN(length) {
        let result = '';
        for (let i = 0; i < length; i++) {
            result += Math.floor(Math.random() * 10);
        }
        return result;
    }

    function generateRandomString(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function calculateStrength(password) {
        let strength = 0;
        if (password.length >= 8) strength += 25;
        if (password.length >= 12) strength += 25;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
        if (/[0-9]/.test(password)) strength += 12;
        if (/[^a-zA-Z0-9]/.test(password)) strength += 13;
        
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        const bar = document.getElementById('strengthBar');
        
        bar.classList.remove('hidden');
        fill.style.width = strength + '%';
        
        if (strength < 40) {
            fill.className = 'strength-fill strength-weak';
            text.textContent = 'Weak';
        } else if (strength < 70) {
            fill.className = 'strength-fill strength-medium';
            text.textContent = 'Medium';
        } else {
            fill.className = 'strength-fill strength-strong';
            text.textContent = 'Strong';
        }
    }

    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(currentResult);
            showToast('Copied to clipboard!');
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = currentResult;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('Copied to clipboard!');
        }
    };

    function addToHistory(item) {
        history.unshift({ value: item, time: new Date().toLocaleTimeString() });
        if (history.length > 5) history.pop();
        
        const container = document.getElementById('historyList');
        container.innerHTML = history.map(h => `
            <div class="flex items-center justify-between p-3 bg-white dark:bg-gray-800 rounded-lg border border-gray-200 dark:border-gray-700">
                <span class="font-mono text-sm truncate flex-1">${h.value}</span>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-400">${h.time}</span>
                    <button onclick="navigator.clipboard.writeText('${h.value}')" class="p-1 text-gray-400 hover:text-pink-500">
                        📋
                    </button>
                </div>
            </div>
        `).join('');
        
        document.getElementById('historySection').classList.remove('hidden');
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-900 text-white rounded-xl shadow-2xl flex items-center gap-2 z-50';
        toast.innerHTML = `
            <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            ${message}
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initGenerator('random');
    });
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📊 Data</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Fake Data Generator</h1>
            <p class="text-xl text-white/90">Generate realistic fake data for testing</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="flex flex-wrap gap-4 mb-8">
                    <button onclick="generateData('person')" class="px-6 py-3 bg-indigo-500 text-white rounded-xl hover:bg-indigo-600 transition-all">👤 Person</button>
                    <button onclick="generateData('email')" class="px-6 py-3 bg-purple-500 text-white rounded-xl hover:bg-purple-600 transition-all">📧 Email</button>
                    <button onclick="generateData('phone')" class="px-6 py-3 bg-pink-500 text-white rounded-xl hover:bg-pink-600 transition-all">📱 Phone</button>
                    <button onclick="generateData('address')" class="px-6 py-3 bg-green-500 text-white rounded-xl hover:bg-green-600 transition-all">🏠 Address</button>
                    <button onclick="generateData('company')" class="px-6 py-3 bg-blue-500 text-white rounded-xl hover:bg-blue-600 transition-all">🏢 Company</button>
                    <button onclick="generateData('lorem')" class="px-6 py-3 bg-yellow-500 text-white rounded-xl hover:bg-yellow-600 transition-all">📝 Lorem Ipsum</button>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Generated Data</label>
                    <div id="output" class="bg-gray-50 dark:bg-gray-700 rounded-xl p-6 min-h-[200px] font-mono text-sm whitespace-pre-wrap">Click a button above to generate data...</div>
                </div>

                <button onclick="copyData()" class="w-full py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-medium hover:shadow-lg transition-all">
                    Copy to Clipboard
                </button>
            </div>
        </div>
    </section>

    <script>
        const firstNames = ['James', 'Mary', 'John', 'Patricia', 'Robert', 'Jennifer', 'Michael', 'Linda', 'William', 'Elizabeth', 'David', 'Barbara', 'Richard', 'Susan', 'Joseph', 'Jessica', 'Thomas', 'Sarah', 'Charles', 'Karen'];
        const lastNames = ['Smith', 'Johnson', 'Williams', 'Brown', 'Jones', 'Garcia', 'Miller', 'Davis', 'Rodriguez', 'Martinez', 'Hernandez', 'Lopez', 'Gonzalez', 'Wilson', 'Anderson', 'Thomas', 'Taylor', 'Moore', 'Jackson', 'Martin'];
        const domains = ['gmail.com', 'yahoo.com', 'hotmail.com', 'outlook.com', 'icloud.com', 'protonmail.com'];
        const cities = ['New York', 'Los Angeles', 'Chicago', 'Houston', 'Phoenix', 'Philadelphia', 'San Antonio', 'San Diego', 'Dallas', 'San Jose'];
        const states = ['CA', 'TX', 'FL', 'NY', 'PA', 'IL', 'OH', 'GA', 'NC', 'MI'];
        const streets = ['Main St', 'Oak Ave', 'Park Rd', 'Elm St', 'Maple Dr', 'Cedar Ln', 'Pine St', 'Washington Ave'];
        const companies = ['TechCorp', 'Global Solutions', 'Innovate Inc', 'Digital Dynamics', 'Smart Systems', 'Future Tech', 'Cloud Nine', 'Data Drive'];
        const loremWords = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua'];

        function randomItem(arr) {
            return arr[Math.floor(Math.random() * arr.length)];
        }

        function randomInt(min, max) {
            return Math.floor(Math.random() * (max - min + 1)) + min;
        }

        let currentData = '';

        function generateData(type) {
            switch(type) {
                case 'person':
                    const fname = randomItem(firstNames);
                    const lname = randomItem(lastNames);
                    currentData = `Name: ${fname} ${lname}
Username: ${fname.toLowerCase()}.${lname.toLowerCase()}
Birthday: ${randomInt(1, 12)}/${randomInt(1, 28)}/${randomInt(1970, 2000)}
Age: ${randomInt(25, 55)}
SSN: ${randomInt(100, 999)}-${randomInt(10, 99)}-${randomInt(1000, 9999)}`;
                    break;

                case 'email':
                    currentData = `${randomItem(firstNames).toLowerCase()}.${randomItem(lastNames).toLowerCase()}${randomInt(1, 999)}@${randomItem(domains)}
${randomItem(firstNames).toLowerCase()}${randomInt(1, 99)}@${randomItem(domains)}
${randomItem(lastNames).toLowerCase()}.${randomItem(firstNames).toLowerCase()}@${randomItem(domains)}
contact@${randomItem(companies).toLowerCase().replace(' ', '')}.com
info@${randomItem(companies).toLowerCase().replace(' ', '')}.com`;
                    break;

                case 'phone':
                    currentData = `(${randomInt(200, 999)}) ${randomInt(100, 999)}-${randomInt(1000, 9999)}
+1 ${randomInt(200, 999)}-${randomInt(100, 999)}-${randomInt(1000, 9999)}
${randomInt(200, 999)}-${randomInt(100, 999)}-${randomInt(1000, 9999)}`;
                    break;

                case 'address':
                    currentData = `${randomInt(100, 9999)} ${randomItem(streets)}
${randomItem(cities)}, ${randomItem(states)} ${randomInt(10000, 99999)}
USA`;
                    break;

                case 'company':
                    const company = randomItem(companies);
                    currentData = `Company: ${company}
Industry: Technology
Founded: ${randomInt(1990, 2020)}
Employees: ${randomInt(10, 10000)}
Revenue: $${randomInt(1, 100)}M
Website: www.${company.toLowerCase().replace(' ', '')}.com`;
                    break;

                case 'lorem':
                    let words = [];
                    for(let i = 0; i < 50; i++) {
                        words.push(randomItem(loremWords));
                    }
                    currentData = words.join(' ').charAt(0).toUpperCase() + words.join(' ').slice(1) + '.';
                    break;
            }

            document.getElementById('output').textContent = currentData;
        }

        function copyData() {
            if (currentData && currentData !== 'Click a button above to generate data...') {
                navigator.clipboard.writeText(currentData).then(() => {
                    alert('Data copied to clipboard!');
                });
            }
        }
    </script>
</body>
</html>
