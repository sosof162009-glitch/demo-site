<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duplicate Line Remover - 205-Tools</title>
    <meta name="description" content="Remove duplicate lines from text">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">📝 Text</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Duplicate Line Remover</h1>
            <p class="t-text-xl">Remove duplicate lines from text</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Input Text</label>
                    <textarea id="input" rows="8" placeholder="Paste text with duplicate lines..." class="t-w-full p-3 t-rounded border"></textarea>
                </div>

                <div class="t-flex t-items-center t-mb-xl">
                    <input type="checkbox" id="caseSensitive" class="mr-3">
                    <label>Case sensitive</label>
                </div>

                <button onclick="removeDuplicates()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-xl">
                    Remove Duplicates
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Result</label>
                    <textarea id="output" rows="8" readonly class="t-w-full p-3 t-rounded border"></textarea>
                </div>

                <div id="stats" class="t-hidden t-text-center t-mb-xl t-text-muted">
                    <p>Removed <span id="removed" class="t-font-bold"></span> duplicate lines</p>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="flex-1 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function removeDuplicates() {
            const input = document.getElementById('input').value;
            if (!input) return;

            const caseSensitive = document.getElementById('caseSensitive').checked;
            const lines = input.split('\n');
            const seen = new Set();
            const unique = [];

            for (const line of lines) {
                const key = caseSensitive ? line : line.toLowerCase();
                if (!seen.has(key)) {
                    seen.add(key);
                    unique.push(line);
                }
            }

            document.getElementById('output').value = unique.join('\n');
            document.getElementById('removed').textContent = lines.length - unique.length;
            document.getElementById('stats').classList.remove('hidden');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('stats').classList.add('hidden');
        }
    </script>
</body>
</html>
