<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lorem Ipsum Generator - 205-Tools</title>
    <meta name="description" content="Generate placeholder text">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📝 Text</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Lorem Ipsum Generator</h1>
            <p class="text-xl text-white/90">Generate placeholder text</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="flex gap-4 mb-8">
                    <div class="flex-1">
                        <label class="block text-sm font-medium mb-2">Paragraphs</label>
                        <input type="number" id="paragraphs" value="3" min="1" max="20" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium mb-2">Type</label>
                        <select id="type" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="paragraphs">Paragraphs</option>
                            <option value="sentences">Sentences</option>
                            <option value="words">Words</option>
                        </select>
                    </div>
                </div>

                <button onclick="generateLorem()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate Text
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Result</label>
                    <textarea id="result" rows="10" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyText()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="clearText()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const loremWords = ['lorem', 'ipsum', 'dolor', 'sit', 'amet', 'consectetur', 'adipiscing', 'elit', 'sed', 'do', 'eiusmod', 'tempor', 'incididunt', 'ut', 'labore', 'et', 'dolore', 'magna', 'aliqua', 'enim', 'ad', 'minim', 'veniam', 'quis', 'nostrud', 'exercitation', 'ullamco', 'laboris', 'nisi', 'aliquip', 'ex', 'ea', 'commodo', 'consequat', 'duis', 'aute', 'irure', 'in', 'reprehenderit', 'voluptate', 'velit', 'esse', 'cillum', 'fugiat', 'nulla', 'pariatur', 'excepteur', 'sint', 'occaecat', 'cupidatat', 'non', 'proident', 'sunt', 'culpa', 'qui', 'officia', 'deserunt', 'mollit', 'anim', 'id', 'est', 'laborum'];

        function generateLorem() {
            const count = parseInt(document.getElementById('paragraphs').value);
            const type = document.getElementById('type').value;
            let result = '';

            if (type === 'paragraphs') {
                for (let i = 0; i < count; i++) {
                    result += generateParagraph() + '\n\n';
                }
            } else if (type === 'sentences') {
                for (let i = 0; i < count; i++) {
                    result += generateSentence() + ' ';
                }
            } else {
                result = generateWords(count);
            }

            document.getElementById('result').value = result.trim();
        }

        function generateParagraph() {
            const sentences = Math.floor(Math.random() * 3) + 3;
            let para = '';
            for (let i = 0; i < sentences; i++) {
                para += generateSentence() + ' ';
            }
            return para.trim();
        }

        function generateSentence() {
            const words = Math.floor(Math.random() * 8) + 5;
            let sentence = '';
            for (let i = 0; i < words; i++) {
                sentence += loremWords[Math.floor(Math.random() * loremWords.length)] + ' ';
            }
            return sentence.trim().charAt(0).toUpperCase() + sentence.trim().slice(1) + '.';
        }

        function generateWords(count) {
            let words = '';
            for (let i = 0; i < count; i++) {
                words += loremWords[Math.floor(Math.random() * loremWords.length)] + ' ';
            }
            return words.trim();
        }

        function copyText() {
            const result = document.getElementById('result');
            result.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearText() {
            document.getElementById('result').value = '';
        }
    </script>
</body>
</html>
