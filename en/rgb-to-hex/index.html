<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB to HEX Converter - 205-Tools</title>
    <meta name="description" content="Convert RGB color to HEX format">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🎨 Colors</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">RGB to HEX Converter</h1>
            <p class="text-xl text-white/90">Convert RGB color to HEX format</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Red (0-255)</label>
                        <input type="number" id="r" value="99" min="0" max="255" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Green (0-255)</label>
                        <input type="number" id="g" value="102" min="0" max="255" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Blue (0-255)</label>
                        <input type="number" id="b" value="241" min="0" max="255" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Preview</label>
                    <div id="preview" class="w-full h-24 rounded-lg border"></div>
                </div>

                <button onclick="convert()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-6">
                    Convert to HEX
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6">
                    <label class="block text-sm font-medium mb-2">HEX</label>
                    <input type="text" id="hexOutput" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono">
                </div>
            </div>
        </div>
    </section>

    <script>
        function componentToHex(c) {
            const hex = parseInt(c).toString(16);
            return hex.length == 1 ? "0" + hex : hex;
        }

        function rgbToHex(r, g, b) {
            return "#" + componentToHex(r) + componentToHex(g) + componentToHex(b);
        }

        function convert() {
            const r = document.getElementById('r').value || 0;
            const g = document.getElementById('g').value || 0;
            const b = document.getElementById('b').value || 0;

            const hex = rgbToHex(r, g, b);
            document.getElementById('hexOutput').value = hex;
            document.getElementById('preview').style.backgroundColor = hex;
        }

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', convert);
        });

        convert();
    </script>
</body>
</html>
