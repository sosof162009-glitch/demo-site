<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">📐 Units</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Data Size Converter</h1>
            <p class="t-text-xl">Convert between data storage units</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-grid t-grid-md-2 t-gap-lg t-mb-lg">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">From</label>
                        <input type="number" id="fromValue" value="1" class="t-w-full t-p-sm t-rounded t-border t-mb-sm">
                        <select id="fromUnit" class="t-w-full t-p-sm t-rounded t-border">
                            <option value="b">Bytes (B)</option>
                            <option value="kb">Kilobytes (KB)</option>
                            <option value="mb" selected>Megabytes (MB)</option>
                            <option value="gb">Gigabytes (GB)</option>
                            <option value="tb">Terabytes (TB)</option>
                            <option value="pb">Petabytes (PB)</option>
                        </select>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">To</label>
                        <input type="number" id="toValue" readonly class="t-w-full t-p-sm t-rounded t-border t-mb-sm">
                        <select id="toUnit" class="t-w-full t-p-sm t-rounded t-border">
                            <option value="b">Bytes (B)</option>
                            <option value="kb">Kilobytes (KB)</option>
                            <option value="mb">Megabytes (MB)</option>
                            <option value="gb" selected>Gigabytes (GB)</option>
                            <option value="tb">Terabytes (TB)</option>
                            <option value="pb">Petabytes (PB)</option>
                        </select>
                    </div>
                </div>

                <button onclick="convert()" class="btn">
                    Convert
                </button>            </div>
        </div>
    </section>

    <script>
        // Conversion factors to bytes
        const toBytes = {
            'b': 1,
            'kb': 1024,
            'mb': 1048576,
            'gb': 1073741824,
            'tb': 1099511627776,
            'pb': 1125899906842624
        };

        function convert() {
            const value = parseFloat(document.getElementById('fromValue').value);
            const from = document.getElementById('fromUnit').value;
            const to = document.getElementById('toUnit').value;

            if (isNaN(value)) {
                document.getElementById('toValue').value = '';
                return;
            }

            const bytes = value * toBytes[from];
            const result = bytes / toBytes[to];

            // Format based on size
            let formatted;
            if (result >= 1000000 || result <= 0.001) {
                formatted = result.toExponential(4);
            } else {
                formatted = result.toFixed(6).replace(/\.?0+$/, '');
            }

            document.getElementById('toValue').value = formatted;
        }

        document.getElementById('fromValue').addEventListener('input', convert);
        document.getElementById('fromUnit').addEventListener('change', convert);
        document.getElementById('toUnit').addEventListener('change', convert);

        convert();
    </script>
</body>
