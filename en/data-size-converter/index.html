<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Size Converter - 205-Tools</title>
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">📐 Units</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Data Size Converter</h1>
            <p class="t-text-xl">Convert between data storage units</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-grid t-grid-md-2 gap-6 t-mb-lg">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">From</label>
                        <input type="number" id="fromValue" value="1" class="t-w-full p-3 t-rounded border t-mb-sm">
                        <select id="fromUnit" class="t-w-full p-3 t-rounded border">
                            <option value="b">Bytes (B)</option>
                            <option value="kb">Kilobytes (KB)</option>
                            <option value="mb" selected>Megabytes (MB)</option>
                            <option value="gb">Gigabytes (GB)</option>
                            <option value="tb">Terabytes (TB)</option>
                            <option value="pb">Petabytes (PB)</option>
                        </select>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">To</label>
                        <input type="number" id="toValue" readonly class="t-w-full p-3 t-rounded border t-mb-sm">
                        <select id="toUnit" class="t-w-full p-3 t-rounded border">
                            <option value="b">Bytes (B)</option>
                            <option value="kb">Kilobytes (KB)</option>
                            <option value="mb">Megabytes (MB)</option>
                            <option value="gb" selected>Gigabytes (GB)</option>
                            <option value="tb">Terabytes (TB)</option>
                            <option value="pb">Petabytes (PB)</option>
                        </select>
                    </div>
                </div>

                <button onclick="convert()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition">
                    Convert
                </button>            </div>
        </div>
    </section>

    <script>
        // Conversion factors to bytes
        const toBytes = {
            'b': 1,
            'kb': 1024,
            'mb': 1048576,
            'gb': 1073741824,
            'tb': 1099511627776,
            'pb': 1125899906842624
        };

        function convert() {
            const value = parseFloat(document.getElementById('fromValue').value);
            const from = document.getElementById('fromUnit').value;
            const to = document.getElementById('toUnit').value;

            if (isNaN(value)) {
                document.getElementById('toValue').value = '';
                return;
            }

            const bytes = value * toBytes[from];
            const result = bytes / toBytes[to];

            // Format based on size
            let formatted;
            if (result >= 1000000 || result <= 0.001) {
                formatted = result.toExponential(4);
            } else {
                formatted = result.toFixed(6).replace(/\.?0+$/, '');
            }

            document.getElementById('toValue').value = formatted;
        }

        document.getElementById('fromValue').addEventListener('input', convert);
        document.getElementById('fromUnit').addEventListener('change', convert);
        document.getElementById('toUnit').addEventListener('change', convert);

        convert();
    </script>
</body>
</html>
