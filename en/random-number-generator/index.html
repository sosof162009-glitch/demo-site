<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator - 205-Tools</title>
    <meta name="description" content="Generate random numbers">
    
    <script>
    // Calculator Logic
function initCalculator(type) {
    // Auto-calculate on input
    document.querySelectorAll('.calc-input').forEach(input => {
        input.addEventListener('input', calculate);
    });
    
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', calculate);
    });

    window.calculate = function() {
        try {
            let result = null;
            
            switch(type) {
                case 'bmi':
                    result = calculateBMI();
                    break;
                case 'loan':
                    result = calculateLoan();
                    break;
                case 'percentage':
                    result = calculatePercentage();
                    break;
                case 'binary':
                    result = convertBinary();
                    break;
                case 'hex':
                    result = convertHex();
                    break;
                case 'temperature':
                    result = convertTemperature();
                    break;
                case 'length':
                case 'weight':
                case 'area':
                case 'volume':
                    result = convertUnit(type);
                    break;
                case 'age':
                    result = calculateAge();
                    break;
                case 'time':
                    result = calculateTimeDifference();
                    break;
                default:
                    result = { value: '0', unit: '' };
            }
            
            if (result) {
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('mainResult').textContent = result.value;
                document.getElementById('resultUnit').textContent = result.unit || '';
            }
        } catch (err) {
            console.error('Calculation error:', err);
        }
    };
    
    function calculateBMI() {
        const weight = parseFloat(document.getElementById('weight')?.value || 0);
        const height = parseFloat(document.getElementById('height')?.value || 0);
        
        if (weight > 0 && height > 0) {
            const bmi = weight / ((height / 100) ** 2);
            let category = '';
            if (bmi < 18.5) category = 'Underweight';
            else if (bmi < 25) category = 'Normal';
            else if (bmi < 30) category = 'Overweight';
            else category = 'Obese';
            
            return { value: bmi.toFixed(1), unit: category };
        }
        return { value: '--', unit: '' };
    }
    
    function calculateLoan() {
        const amount = parseFloat(document.getElementById('amount')?.value || 0);
        const rate = parseFloat(document.getElementById('rate')?.value || 0);
        const years = parseFloat(document.getElementById('years')?.value || 0);
        
        if (amount > 0 && rate > 0 && years > 0) {
            const monthlyRate = rate / 100 / 12;
            const numPayments = years * 12;
            const monthlyPayment = amount * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / (Math.pow(1 + monthlyRate, numPayments) - 1);
            const totalPayment = monthlyPayment * numPayments;
            const totalInterest = totalPayment - amount;
            
            return { value: monthlyPayment.toFixed(2), unit: '/ month' };
        }
        return { value: '--', unit: '' };
    }
    
    function calculatePercentage() {
        const value = parseFloat(document.getElementById('value')?.value || 0);
        const percent = parseFloat(document.getElementById('percent')?.value || 0);
        
        if (!isNaN(value) && !isNaN(percent)) {
            const result = (value * percent) / 100;
            return { value: result.toFixed(2), unit: '' };
        }
        return { value: '--', unit: '' };
    }
    
    function convertBinary() {
        const input = document.getElementById('binaryInput')?.value || '';
        if (/^[01]+$/.test(input)) {
            return { value: parseInt(input, 2).toString(), unit: 'Decimal' };
        }
        return { value: '--', unit: '' };
    }
    
    function convertHex() {
        const input = document.getElementById('hexInput')?.value || '';
        if (/^[0-9A-Fa-f]+$/.test(input)) {
            return { value: parseInt(input, 16).toString(), unit: 'Decimal' };
        }
        return { value: '--', unit: '' };
    }
    
    function convertTemperature() {
        const temp = parseFloat(document.getElementById('temperature')?.value || 0);
        const fromUnit = document.querySelector('input[name="fromUnit"]:checked')?.value || 'C';
        const toUnit = document.querySelector('input[name="toUnit"]:checked')?.value || 'F';
        
        let celsius = temp;
        if (fromUnit === 'F') celsius = (temp - 32) * 5/9;
        else if (fromUnit === 'K') celsius = temp - 273.15;
        
        let result = celsius;
        if (toUnit === 'F') result = celsius * 9/5 + 32;
        else if (toUnit === 'K') result = celsius + 273.15;
        
        return { value: result.toFixed(2), unit: '°' + toUnit };
    }
    
    function convertUnit(type) {
        const value = parseFloat(document.getElementById('inputValue')?.value || 0);
        const fromUnit = document.getElementById('fromUnit')?.value || '';
        const toUnit = document.getElementById('toUnit')?.value || '';
        
        if (isNaN(value)) return { value: '--', unit: '' };
        
        // Conversion factors (simplified)
        const factors = {
            length: { m: 1, km: 1000, cm: 0.01, mm: 0.001, ft: 0.3048, in: 0.0254, yd: 0.9144, mi: 1609.34 },
            weight: { kg: 1, g: 0.001, mg: 0.000001, lb: 0.453592, oz: 0.0283495 },
            area: { m2: 1, km2: 1000000, cm2: 0.0001, ft2: 0.092903, ac: 4046.86, ha: 10000 },
            volume: { l: 1, ml: 0.001, m3: 1000, gal: 3.78541, qt: 0.946353, pt: 0.473176 }
        };
        
        const factor = factors[type];
        if (factor && factor[fromUnit] && factor[toUnit]) {
            const result = value * factor[fromUnit] / factor[toUnit];
            return { value: result.toFixed(4), unit: toUnit };
        }
        
        return { value: value.toString(), unit: toUnit };
    }
    
    function calculateAge() {
        const birthDate = new Date(document.getElementById('birthDate')?.value || '');
        if (isNaN(birthDate.getTime())) return { value: '--', unit: '' };
        
        const today = new Date();
        let years = today.getFullYear() - birthDate.getFullYear();
        const months = today.getMonth() - birthDate.getMonth();
        
        if (months < 0 || (months === 0 && today.getDate() < birthDate.getDate())) {
            years--;
        }
        
        return { value: years.toString(), unit: 'years' };
    }
    
    function calculateTimeDifference() {
        const date1 = new Date(document.getElementById('date1')?.value || '');
        const date2 = new Date(document.getElementById('date2')?.value || '');
        
        if (isNaN(date1.getTime()) || isNaN(date2.getTime())) return { value: '--', unit: '' };
        
        const diff = Math.abs(date2 - date1);
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        return { value: days.toString(), unit: 'days' };
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initCalculator('generic');
    });
  </script>

<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">🎲 Math</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Random Number Generator</h1>
            <p class="t-text-xl">Generate random numbers</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-grid t-grid-md-2 t-gap-lg t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Min</label>
                        <input type="number" id="min" value="1" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                    
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Max</label>
                        <input type="number" id="max" value="100" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                </div>

                <div class="t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Quantity</label>
                    <input type="number" id="qty" value="1" min="1" max="100" class="t-w-full t-p-sm t-rounded t-border">
                </div>

                <div class="t-flex t-items-center t-mb-xl">
                    <input type="checkbox" id="unique" class="t-mr-sm">
                    <label>Unique numbers (no duplicates)</label>
                </div>

                <button onclick="generate()" class="btn">
                    Generate
                </button>

                <div id="result" class="t-hidden t-mt-xl t-p-lg t-rounded-lg t-text-center">
                    <p class="t-text-5xl t-font-bold t-text-accent" id="numbers"></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const min = parseInt(document.getElementById('min').value);
            const max = parseInt(document.getElementById('max').value);
            const qty = parseInt(document.getElementById('qty').value);
            const unique = document.getElementById('unique').checked;

            if (min >= max) {
                alert('Min must be less than Max');
                return;
            }

            if (unique && qty > (max - min + 1)) {
                alert('Cannot generate that many unique numbers in this range');
                return;
            }

            let numbers = [];
            if (unique) {
                const pool = [];
                for (let i = min; i <= max; i++) pool.push(i);
                for (let i = 0; i < qty; i++) {
                    const idx = Math.floor(Math.random() * pool.length);
                    numbers.push(pool.splice(idx, 1)[0]);
                }
            } else {
                for (let i = 0; i < qty; i++) {
                    numbers.push(Math.floor(Math.random() * (max - min + 1)) + min);
                }
            }

            document.getElementById('numbers').textContent = numbers.join(', ');
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
