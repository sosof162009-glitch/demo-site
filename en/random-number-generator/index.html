<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator - 205-Tools</title>
    <meta name="description" content="Generate random numbers with custom ranges, quantities, and options.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
    <style>
        .tool-card { transition: all 0.2s; }
        .tool-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.2); }
        @keyframes pulse-number {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        .animating { animation: pulse-number 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/en/" class="text-gray-600 dark:text-gray-300 hover:text-indigo-500">Home</a>
                </div>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔢 Math</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Random Number Generator</h1>
            <p class="text-xl text-white/90">Free • Fast • Secure</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <div class="text-6xl mb-4">🎲</div>
                    <p class="text-gray-600 dark:text-gray-400">Generate random numbers with custom ranges, quantities, and options.</p>
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-2">Minimum Value</label>
                        <input type="number" id="minVal" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600" value="1">
                    </div>
                    
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-2">Maximum Value</label>
                        <input type="number" id="maxVal" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600" value="100">
                    </div>
                    
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-2">How many numbers?</label>
                        <input type="number" id="quantity" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600" value="1" min="1" max="1000">
                    </div>
                    
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-2">Number Type</label>
                        <select id="numType" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="integer">Integer (whole numbers)</option>
                            <option value="decimal">Decimal (with fractions)</option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-4 mb-6">
                    <label class="flex items-center">
                        <input type="checkbox" id="allowDuplicates" class="mr-2" checked>
                        <span class="text-sm">Allow duplicates</span>
                    </label>
                    <label class="flex items-center">
                        <input type="checkbox" id="sortResults" class="mr-2">
                        <span class="text-sm">Sort results</span>
                    </label>
                </div>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all" id="actionBtn">
                    Generate Numbers
                </button>

                <div id="result" class="hidden mt-8">
                    <div class="flex justify-between items-center mb-4">
                        <h3 class="font-semibold">Results:</h3>
                        <button onclick="copyResults()" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg text-sm hover:bg-gray-300 dark:hover:bg-gray-600">Copy All</button>
                    </div>
                    
                    <div id="resultsContainer" class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4 min-h-24 max-h-64 overflow-y-auto">
                        <div id="numbersList" class="flex flex-wrap gap-2"></div>
                    </div>
                    
                    <div class="grid grid-cols-3 gap-4 mt-4 text-center">
                        <div class="p-3 bg-blue-50 dark:bg-blue-900/20 rounded-lg">
                            <p class="text-xs text-gray-500">Sum</p>
                            <p id="statSum" class="font-bold">-</p>
                        </div>
                        <div class="p-3 bg-green-50 dark:bg-green-900/20 rounded-lg">
                            <p class="text-xs text-gray-500">Average</p>
                            <p id="statAvg" class="font-bold">-</p>
                        </div>
                        <div class="p-3 bg-purple-50 dark:bg-purple-900/20 rounded-lg">
                            <p class="text-xs text-gray-500">Range</p>
                            <p id="statRange" class="font-bold">-</p>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-12 bg-gray-100 dark:bg-gray-800/50">
        <div class="max-w-6xl mx-auto px-4">
            <h2 class="text-2xl font-bold text-center mb-8">Related Tools</h2>
            <div class="grid md:grid-cols-2 gap-4">
                <a href="/en/random-pin-generator/" class="tool-card flex items-center space-x-3 p-4 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 hover:border-primary transition-all">
                    <span class="text-2xl">🔢</span>
                    <span class="font-medium">Random PIN Generator</span>
                </a>
                <a href="/en/uuid-generator/" class="tool-card flex items-center space-x-3 p-4 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 hover:border-primary transition-all">
                    <span class="text-2xl">🆔</span>
                    <span class="font-medium">UUID Generator</span>
                </a>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400">© 2025 205-Tools - Free</p>
        </div>
    </footer>

    <script>
        let generatedNumbers = [];

        function generate() {
            const min = parseFloat(document.getElementById('minVal').value);
            const max = parseFloat(document.getElementById('maxVal').value);
            const quantity = parseInt(document.getElementById('quantity').value);
            const type = document.getElementById('numType').value;
            const allowDuplicates = document.getElementById('allowDuplicates').checked;
            const sortResults = document.getElementById('sortResults').checked;
            
            if (isNaN(min) || isNaN(max) || isNaN(quantity)) {
                alert('Please enter valid numbers');
                return;
            }
            
            if (min >= max) {
                alert('Minimum must be less than maximum');
                return;
            }
            
            if (quantity < 1 || quantity > 1000) {
                alert('Quantity must be between 1 and 1000');
                return;
            }
            
            if (!allowDuplicates && quantity > (max - min + 1) && type === 'integer') {
                alert(`Cannot generate ${quantity} unique integers in range ${min} to ${max}`);
                return;
            }
            
            const btn = document.getElementById('actionBtn');
            btn.textContent = 'Generating...';
            btn.disabled = true;
            
            setTimeout(() => {
                generatedNumbers = [];
                const used = new Set();
                
                while (generatedNumbers.length < quantity) {
                    let num;
                    if (type === 'integer') {
                        num = Math.floor(Math.random() * (max - min + 1)) + min;
                    } else {
                        num = Math.random() * (max - min) + min;
                        num = parseFloat(num.toFixed(4));
                    }
                    
                    if (!allowDuplicates) {
                        if (used.has(num)) continue;
                        used.add(num);
                    }
                    
                    generatedNumbers.push(num);
                }
                
                if (sortResults) {
                    generatedNumbers.sort((a, b) => a - b);
                }
                
                displayResults();
                updateStats();
                
                document.getElementById('result').classList.remove('hidden');
                btn.textContent = 'Generate Numbers';
                btn.disabled = false;
            }, 300);
        }

        function displayResults() {
            const container = document.getElementById('numbersList');
            container.innerHTML = generatedNumbers.map((num, i) => 
                `<span class="inline-block px-3 py-2 bg-indigo-100 dark:bg-indigo-900 rounded-lg font-mono text-lg animating" style="animation-delay: ${i * 0.05}s">${num}</span>`
            ).join('');
        }

        function updateStats() {
            const sum = generatedNumbers.reduce((a, b) => a + b, 0);
            const avg = sum / generatedNumbers.length;
            const min = Math.min(...generatedNumbers);
            const max = Math.max(...generatedNumbers);
            
            document.getElementById('statSum').textContent = sum.toFixed(2);
            document.getElementById('statAvg').textContent = avg.toFixed(2);
            document.getElementById('statRange').textContent = `${min} - ${max}`;
        }

        function copyResults() {
            const text = generatedNumbers.join('\n');
            navigator.clipboard.writeText(text).then(() => {
                alert('Results copied to clipboard!');
            });
        }

        // Enter key support
        document.querySelectorAll('input').forEach(input => {
            input.addEventListener('keypress', function(e) {
                if (e.key === 'Enter') generate();
            });
        });
    </script>
</body>
</html>
