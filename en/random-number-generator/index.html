<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Number Generator - 205-Tools</title>
    <meta name="description" content="Generate random numbers">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🎲 Math</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Random Number Generator</h1>
            <p class="text-xl text-white/90">Generate random numbers</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="grid md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Min</label>
                        <input type="number" id="min" value="1" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Max</label>
                        <input type="number" id="max" value="100" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-medium mb-2">Quantity</label>
                    <input type="number" id="qty" value="1" min="1" max="100" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                </div>

                <div class="flex items-center mb-8">
                    <input type="checkbox" id="unique" class="mr-3">
                    <label>Unique numbers (no duplicates)</label>
                </div>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Generate
                </button>

                <div id="result" class="hidden mt-8 p-6 bg-gray-50 dark:bg-gray-700 rounded-xl text-center">
                    <p class="text-5xl font-bold text-indigo-600 dark:text-indigo-400" id="numbers"></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const min = parseInt(document.getElementById('min').value);
            const max = parseInt(document.getElementById('max').value);
            const qty = parseInt(document.getElementById('qty').value);
            const unique = document.getElementById('unique').checked;

            if (min >= max) {
                alert('Min must be less than Max');
                return;
            }

            if (unique && qty > (max - min + 1)) {
                alert('Cannot generate that many unique numbers in this range');
                return;
            }

            let numbers = [];
            if (unique) {
                const pool = [];
                for (let i = min; i <= max; i++) pool.push(i);
                for (let i = 0; i < qty; i++) {
                    const idx = Math.floor(Math.random() * pool.length);
                    numbers.push(pool.splice(idx, 1)[0]);
                }
            } else {
                for (let i = 0; i < qty; i++) {
                    numbers.push(Math.floor(Math.random() * (max - min + 1)) + min);
                }
            }

            document.getElementById('numbers').textContent = numbers.join(', ');
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
