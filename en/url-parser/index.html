<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">🔧 Developer</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">URL Parser</h1>
            <p class="t-text-xl">Parse and analyze URL components</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-flex t-gap-md t-mb-xl">
                    <input type="url" id="url" placeholder="https://example.com/path?key=value#hash" class="t-flex-1 t-p-md t-rounded-lg t-border">
                    
                    <button onclick="parse()" class="t-px-xl t-py-md t-text-primary t-rounded-lg t-font-semibold t-hover-shadow t-transition">Parse</button>
                </div>

                <div id="result" class="t-hidden t-space-y-md">
                    <div class="t-grid t-grid-md-2 t-gap-md">
                        <div class="t-rounded t-p-md">
                            <p class="t-text-sm">Protocol</p>
                            <p id="protocol" class="t-text-lg t-font-medium">--</p>
                        </div>
                        
                        <div class="t-rounded t-p-md">
                            <p class="t-text-sm">Hostname</p>
                            <p id="hostname" class="t-text-lg t-font-medium">--</p>
                        </div>
                        
                        <div class="t-rounded t-p-md">
                            <p class="t-text-sm">Port</p>
                            <p id="port" class="t-text-lg t-font-medium">--</p>
                        </div>
                        
                        <div class="t-rounded t-p-md">
                            <p class="t-text-sm">Pathname</p>
                            <p id="pathname" class="t-text-lg t-font-medium">--</p>
                        </div>
                    </div>

                    <div class="t-rounded t-p-md">
                        <p class="t-text-sm">Search/Query</p>
                        <p id="search" class="t-text-lg t-font-medium">--</p>
                    </div>

                    <div class="t-rounded t-p-md">
                        <p class="t-text-sm">Hash/Fragment</p>
                        <p id="hash" class="t-text-lg t-font-medium">--</p>
                    </div>

                    <div id="paramsSection" class="t-rounded t-p-md t-hidden">
                        <p class="t-text-sm t-mb-sm">Query Parameters</p>
                        <div id="params" class="t-space-y-sm"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function parse() {
            const urlString = document.getElementById('url').value.trim();
            if (!urlString) {
                alert('Please enter a URL');
                return;
            }

            try {
                const url = new URL(urlString);

                document.getElementById('protocol').textContent = url.protocol || '--';
                document.getElementById('hostname').textContent = url.hostname || '--';
                document.getElementById('port').textContent = url.port || 'Default';
                document.getElementById('pathname').textContent = url.pathname || '/';
                document.getElementById('search').textContent = url.search || 'None';
                document.getElementById('hash').textContent = url.hash || 'None';

                // Parse query parameters
                const params = new URLSearchParams(url.search);
                const paramsDiv = document.getElementById('params');
                const paramsSection = document.getElementById('paramsSection');

                if (params.toString()) {
                    paramsDiv.innerHTML = '';
                    for (const [key, value] of params) {
                        paramsDiv.innerHTML += `
                            <div class="t-flex t-gap-sm">
                                <span class="t-font-mono">${key}</span>
                                <span class="t-text-muted-light">=</span>
                                <span class="t-font-mono">${value}</span>
                            </div>
                        `;
                    }
                    paramsSection.classList.remove('hidden');
                } else {
                    paramsSection.classList.add('hidden');
                }

                document.getElementById('result').classList.remove('hidden');
            } catch (e) {
                alert('Invalid URL: ' + e.message);
            }
        }
    </script>
