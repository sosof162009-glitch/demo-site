<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Resizer - 205-Tools</title>
    <meta name="description" content="Resize images online">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📐 Image</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Image Resizer</h1>
            <p class="text-xl text-white/90">Resize images to any dimensions</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div id="uploadArea" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-8 text-center mb-8">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <p class="text-lg mb-2">Drag & drop image here</p>
                    <p class="text-sm text-gray-500">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="mt-2 px-6 py-2 bg-indigo-500 text-white rounded-lg">Browse Files</button>
                </div>

                <div id="editor" class="hidden">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div>
                            <label class="block text-sm font-medium mb-2">Width (px)</label>
                            <input type="number" id="width" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Height (px)</label>
                            <input type="number" id="height" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                        </div>
                    </div>

                    <div class="flex items-center mb-6">
                        <input type="checkbox" id="maintainRatio" checked class="mr-3">
                        <label>Maintain aspect ratio</label>
                    </div>

                    <div class="mb-6">
                        <p class="text-sm text-gray-500 mb-2">Original size: <span id="originalSize">--</span></p>
                    </div>

                    <button onclick="resize()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-4">
                        Resize Image
                    </button>

                    <a id="downloadLink" class="hidden block w-full py-4 bg-green-500 text-white rounded-xl font-semibold text-lg text-center hover:bg-green-600 transition-all">Download Resized Image</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const fileInput = document.getElementById('fileInput');
        let originalImage = null;
        let aspectRatio = 1;

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    aspectRatio = originalImage.width / originalImage.height;
                    
                    document.getElementById('width').value = originalImage.width;
                    document.getElementById('height').value = originalImage.height;
                    document.getElementById('originalSize').textContent = `${originalImage.width} x ${originalImage.height}`;
                    
                    document.getElementById('uploadArea').classList.add('hidden');
                    document.getElementById('editor').classList.remove('hidden');
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        document.getElementById('width').addEventListener('input', function() {
            if (document.getElementById('maintainRatio').checked) {
                document.getElementById('height').value = Math.round(this.value / aspectRatio);
            }
        });

        document.getElementById('height').addEventListener('input', function() {
            if (document.getElementById('maintainRatio').checked) {
                document.getElementById('width').value = Math.round(this.value * aspectRatio);
            }
        });

        function resize() {
            const width = parseInt(document.getElementById('width').value);
            const height = parseInt(document.getElementById('height').value);

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(originalImage, 0, 0, width, height);
            
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.getElementById('downloadLink');
                link.href = url;
                link.download = `resized_${width}x${height}.png`;
                link.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
