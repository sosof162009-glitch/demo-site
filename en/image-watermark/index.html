<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Watermark - 205-Tools</title>
    <meta name="description" content="Add watermark to images">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">💧 Image</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Image Watermark</h1>
            <p class="t-text-xl">Add text watermark to images</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div id="uploadArea" class="border-2 border-dashed t-rounded-lg t-p-xl t-text-center t-mb-xl">
                    <input type="file" id="fileInput" accept="image/*" class="t-hidden">
                    <p class="t-text-lg t-mb-sm">Drag & drop image here</p>
                    <p class="t-text-sm">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="t-mt-sm px-6 py-2 bg-indigo-500 t-text-primary t-rounded">Browse Files</button>
                </div>

                <div id="editor" class="t-hidden space-y-6">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Watermark Text</label>
                        <input type="text" id="watermarkText" value="© My Website" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div class="t-grid t-grid-2 t-gap-md">
                        <div>
                            <label class="t-block t-text-sm t-font-medium t-mb-sm">Font Size</label>
                            <input type="range" id="fontSize" min="12" max="120" value="48" class="t-w-full" oninput="document.getElementById('fontSizeVal').textContent = this.value + 'px'">
                            <p id="fontSizeVal" class="t-text-center t-text-sm">48px</p>
                        </div>
                        
                        <div>
                            <label class="t-block t-text-sm t-font-medium t-mb-sm">Opacity</label>
                            <input type="range" id="opacity" min="10" max="100" value="50" class="t-w-full" oninput="document.getElementById('opacityVal').textContent = this.value + '%'">
                            <p id="opacityVal" class="t-text-center t-text-sm">50%</p>
                        </div>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Position</label>
                        <select id="position" class="t-w-full p-3 t-rounded border">
                            <option value="center">Center</option>
                            <option value="top-left">Top Left</option>
                            <option value="top-right">Top Right</option>
                            <option value="bottom-left">Bottom Left</option>
                            <option value="bottom-right" selected>Bottom Right</option>
                        </select>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Text Color</label>
                        <div class="t-flex t-gap-sm">
                            <button onclick="setColor('#ffffff')" class="w-10 h-10 t-rounded-full border-2"></button>
                            
                            <button onclick="setColor('#000000')" class="w-10 h-10 t-rounded-full bg-black border-2"></button>
                            
                            <button onclick="setColor('#ff0000')" class="w-10 h-10 t-rounded-full bg-red-500 border-2"></button>
                            
                            <input type="color" id="colorPicker" value="#ffffff" class="w-10 h-10 t-rounded-full">
                        </div>
                    </div>

                    <button onclick="applyWatermark()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition">
                        Apply Watermark
                    </button>

                    <a id="downloadLink" class="t-hidden t-block t-w-full t-py-md bg-green-500 t-text-primary t-rounded-lg t-font-semibold t-text-lg t-text-center t-transition">Download Watermarked Image</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const fileInput = document.getElementById('fileInput');
        let originalImage = null;
        let textColor = '#ffffff';

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    document.getElementById('uploadArea').classList.add('hidden');
                    document.getElementById('editor').classList.remove('hidden');
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setColor(color) {
            textColor = color;
            document.getElementById('colorPicker').value = color;
        }

        document.getElementById('colorPicker').addEventListener('input', function() {
            textColor = this.value;
        });

        function applyWatermark() {
            const text = document.getElementById('watermarkText').value;
            const fontSize = document.getElementById('fontSize').value;
            const opacity = document.getElementById('opacity').value / 100;
            const position = document.getElementById('position').value;

            const canvas = document.createElement('canvas');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(originalImage, 0, 0);
            
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.fillStyle = textColor;
            ctx.globalAlpha = opacity;
            
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;
            const textHeight = parseInt(fontSize);
            
            let x, y;
            const padding = 20;
            
            switch(position) {
                case 'top-left':
                    x = padding;
                    y = textHeight + padding;
                    break;
                case 'top-right':
                    x = canvas.width - textWidth - padding;
                    y = textHeight + padding;
                    break;
                case 'bottom-left':
                    x = padding;
                    y = canvas.height - padding;
                    break;
                case 'bottom-right':
                    x = canvas.width - textWidth - padding;
                    y = canvas.height - padding;
                    break;
                default:
                    x = (canvas.width - textWidth) / 2;
                    y = (canvas.height + textHeight) / 2;
            }
            
            ctx.fillText(text, x, y);
            
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.getElementById('downloadLink');
                link.href = url;
                link.download = 'watermarked.png';
                link.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
