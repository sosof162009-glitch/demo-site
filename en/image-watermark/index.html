<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Watermark - 205-Tools</title>
    <meta name="description" content="Add watermark to images">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">💧 Image</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Image Watermark</h1>
            <p class="text-xl text-white/90">Add text watermark to images</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div id="uploadArea" class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-8 text-center mb-8">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <p class="text-lg mb-2">Drag & drop image here</p>
                    <p class="text-sm text-gray-500">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="mt-2 px-6 py-2 bg-indigo-500 text-white rounded-lg">Browse Files</button>
                </div>

                <div id="editor" class="hidden space-y-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Watermark Text</label>
                        <input type="text" id="watermarkText" value="© My Website" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>

                    <div class="grid grid-cols-2 gap-4">
                        <div>
                            <label class="block text-sm font-medium mb-2">Font Size</label>
                            <input type="range" id="fontSize" min="12" max="120" value="48" class="w-full" oninput="document.getElementById('fontSizeVal').textContent = this.value + 'px'">
                            <p id="fontSizeVal" class="text-center text-sm">48px</p>
                        </div>
                        
                        <div>
                            <label class="block text-sm font-medium mb-2">Opacity</label>
                            <input type="range" id="opacity" min="10" max="100" value="50" class="w-full" oninput="document.getElementById('opacityVal').textContent = this.value + '%'">
                            <p id="opacityVal" class="text-center text-sm">50%</p>
                        </div>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Position</label>
                        <select id="position" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="center">Center</option>
                            <option value="top-left">Top Left</option>
                            <option value="top-right">Top Right</option>
                            <option value="bottom-left">Bottom Left</option>
                            <option value="bottom-right" selected>Bottom Right</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Text Color</label>
                        <div class="flex gap-2">
                            <button onclick="setColor('#ffffff')" class="w-10 h-10 rounded-full bg-white border-2"></button>
                            
                            <button onclick="setColor('#000000')" class="w-10 h-10 rounded-full bg-black border-2"></button>
                            
                            <button onclick="setColor('#ff0000')" class="w-10 h-10 rounded-full bg-red-500 border-2"></button>
                            
                            <input type="color" id="colorPicker" value="#ffffff" class="w-10 h-10 rounded-full">
                        </div>
                    </div>

                    <button onclick="applyWatermark()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                        Apply Watermark
                    </button>

                    <a id="downloadLink" class="hidden block w-full py-4 bg-green-500 text-white rounded-xl font-semibold text-lg text-center hover:bg-green-600 transition-all">Download Watermarked Image</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const fileInput = document.getElementById('fileInput');
        let originalImage = null;
        let textColor = '#ffffff';

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file || !file.type.startsWith('image/')) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                originalImage = new Image();
                originalImage.onload = function() {
                    document.getElementById('uploadArea').classList.add('hidden');
                    document.getElementById('editor').classList.remove('hidden');
                };
                originalImage.src = event.target.result;
            };
            reader.readAsDataURL(file);
        }

        function setColor(color) {
            textColor = color;
            document.getElementById('colorPicker').value = color;
        }

        document.getElementById('colorPicker').addEventListener('input', function() {
            textColor = this.value;
        });

        function applyWatermark() {
            const text = document.getElementById('watermarkText').value;
            const fontSize = document.getElementById('fontSize').value;
            const opacity = document.getElementById('opacity').value / 100;
            const position = document.getElementById('position').value;

            const canvas = document.createElement('canvas');
            canvas.width = originalImage.width;
            canvas.height = originalImage.height;
            const ctx = canvas.getContext('2d');
            
            ctx.drawImage(originalImage, 0, 0);
            
            ctx.font = `bold ${fontSize}px Arial`;
            ctx.fillStyle = textColor;
            ctx.globalAlpha = opacity;
            
            const metrics = ctx.measureText(text);
            const textWidth = metrics.width;
            const textHeight = parseInt(fontSize);
            
            let x, y;
            const padding = 20;
            
            switch(position) {
                case 'top-left':
                    x = padding;
                    y = textHeight + padding;
                    break;
                case 'top-right':
                    x = canvas.width - textWidth - padding;
                    y = textHeight + padding;
                    break;
                case 'bottom-left':
                    x = padding;
                    y = canvas.height - padding;
                    break;
                case 'bottom-right':
                    x = canvas.width - textWidth - padding;
                    y = canvas.height - padding;
                    break;
                default:
                    x = (canvas.width - textWidth) / 2;
                    y = (canvas.height + textHeight) / 2;
            }
            
            ctx.fillText(text, x, y);
            
            canvas.toBlob(function(blob) {
                const url = URL.createObjectURL(blob);
                const link = document.getElementById('downloadLink');
                link.href = url;
                link.download = 'watermarked.png';
                link.classList.remove('hidden');
            });
        }
    </script>
</body>
</html>
