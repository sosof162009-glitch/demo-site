<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Open Graph Generator - 205-Tools</title>
    <meta name="description" content="Generate Open Graph meta tags">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔍 SEO</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Open Graph Generator</h1>
            <p class="text-xl text-white/90">Generate Open Graph meta tags for social sharing</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="space-y-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">OG Title</label>
                        <input type="text" id="ogTitle" placeholder="Title for social sharing" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">OG Description</label>
                        <textarea id="ogDescription" rows="3" placeholder="Description shown on social media..." class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">OG Image URL</label>
                        <input type="url" id="ogImage" placeholder="https://example.com/image.jpg" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">OG URL</label>
                        <input type="url" id="ogUrl" placeholder="https://example.com/page" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">OG Type</label>
                        <select id="ogType" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="website">Website</option>
                            <option value="article">Article</option>
                            <option value="profile">Profile</option>
                            <option value="book">Book</option>
                            <option value="music.song">Music - Song</option>
                            <option value="video.movie">Video - Movie</option>
                            <option value="product">Product</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Site Name</label>
                        <input type="text" id="siteName" placeholder="My Website" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                </div>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate OG Tags
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Generated Open Graph Tags</label>
                    <textarea id="output" rows="12" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-xs"></textarea>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="clearAll()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const title = document.getElementById('ogTitle').value;
            const description = document.getElementById('ogDescription').value;
            const image = document.getElementById('ogImage').value;
            const url = document.getElementById('ogUrl').value;
            const type = document.getElementById('ogType').value;
            const siteName = document.getElementById('siteName').value;

            let ogTags = `<!-- Open Graph / Facebook -->\n`;

            if (title) {
                ogTags += `<meta property="og:title" content="${escapeHtml(title)}">\n`;
            }

            if (description) {
                ogTags += `<meta property="og:description" content="${escapeHtml(description)}">\n`;
            }

            ogTags += `<meta property="og:type" content="${type}">\n`;

            if (url) {
                ogTags += `<meta property="og:url" content="${escapeHtml(url)}">\n`;
            }

            if (image) {
                ogTags += `<meta property="og:image" content="${escapeHtml(image)}">\n`;
            }

            if (siteName) {
                ogTags += `<meta property="og:site_name" content="${escapeHtml(siteName)}">\n`;
            }

            ogTags += `\n<!-- Twitter -->\n`;
            ogTags += `<meta property="twitter:card" content="summary_large_image">\n`;

            if (url) {
                ogTags += `<meta property="twitter:url" content="${escapeHtml(url)}">\n`;
            }

            if (title) {
                ogTags += `<meta property="twitter:title" content="${escapeHtml(title)}">\n`;
            }

            if (description) {
                ogTags += `<meta property="twitter:description" content="${escapeHtml(description)}">\n`;
            }

            if (image) {
                ogTags += `<meta property="twitter:image" content="${escapeHtml(image)}">\n`;
            }

            document.getElementById('output').value = ogTags;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('ogTitle').value = '';
            document.getElementById('ogDescription').value = '';
            document.getElementById('ogImage').value = '';
            document.getElementById('ogUrl').value = '';
            document.getElementById('ogType').value = 'website';
            document.getElementById('siteName').value = '';
            document.getElementById('output').value = '';
        }
    </script>
</body>
</html>
