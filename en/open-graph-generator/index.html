    <script>
    // Text Analyzer Logic
function initTextAnalyzer() {
    const textInput = document.getElementById('textInput');
    
    textInput.addEventListener('input', analyzeText);
    
    function analyzeText() {
        const text = textInput.value;
        
        // Word count
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        animateNumber('wordCount', words);
        
        // Character count
        animateNumber('charCount', text.length);
        
        // Characters without spaces
        animateNumber('charCountNoSpaces', text.replace(/\s/g, '').length);
        
        // Sentences
        const sentences = text.trim() === '' ? 0 : text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
        animateNumber('sentenceCount', sentences);
        
        // Paragraphs
        const paragraphs = text.trim() === '' ? 0 : text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;
        animateNumber('paragraphCount', paragraphs || (text.trim() ? 1 : 0));
        
        // Reading time (avg 200 wpm)
        const readingMinutes = words / 200;
        document.getElementById('readingTime').textContent = formatTime(readingMinutes);
        
        // Speaking time (avg 130 wpm)
        const speakingMinutes = words / 130;
        document.getElementById('speakingTime').textContent = formatTime(speakingMinutes);
        
        // Update timestamp
        const now = new Date();
        document.getElementById('lastUpdated').textContent = 'Updated ' + now.toLocaleTimeString();
    }
    
    function animateNumber(id, target) {
        const element = document.getElementById(id);
        element.textContent = target;
        element.style.transform = 'scale(1.2)';
        setTimeout(() => element.style.transform = 'scale(1)', 150);
    }
    
    function formatTime(minutes) {
        if (minutes < 1) return Math.round(minutes * 60) + 's';
        if (minutes < 60) return Math.round(minutes) + 'm';
        const hours = Math.floor(minutes / 60);
        const mins = Math.round(minutes % 60);
        return hours + 'h ' + mins + 'm';
    }
    
    window.pasteText = async function() {
        try {
            const text = await navigator.clipboard.readText();
            textInput.value = text;
            analyzeText();
            showToast('Text pasted!');
        } catch (err) {
            showToast('Could not paste from clipboard');
        }
    };
    
    window.clearText = function() {
        textInput.value = '';
        analyzeText();
        showToast('Text cleared!');
    };
    
    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(textInput.value);
            showToast('Copied to clipboard!');
        } catch (err) {
            textInput.select();
            document.execCommand('copy');
            showToast('Copied to clipboard!');
        }
    };
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.classList.remove('hidden');
        toast.classList.add('flex');
        setTimeout(() => {
            toast.classList.add('hidden');
            toast.classList.remove('flex');
        }, 2000);
    }
    
    // Initialize
    analyzeText();
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initTextAnalyzer();
    });
  </script>

<body>
    <header class="card t-shadow-sm t-site-header">
        <div class="t-container t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-container-sm t-container t-px-md t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">🔍 SEO</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Open Graph Generator</h1>
            <p class="t-text-xl">Generate Open Graph meta tags for social sharing</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm t-container t-px-md">
            <div class="card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="space-y-6 t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">OG Title</label>
                        <input type="text" id="ogTitle" placeholder="Title for social sharing" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">OG Description</label>
                        <textarea id="ogDescription" rows="3" placeholder="Description shown on social media..." class="t-w-full p-3 t-rounded border"></textarea>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">OG Image URL</label>
                        <input type="url" id="ogImage" placeholder="https://example.com/image.jpg" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">OG URL</label>
                        <input type="url" id="ogUrl" placeholder="https://example.com/page" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">OG Type</label>
                        <select id="ogType" class="t-w-full p-3 t-rounded border">
                            <option value="website">Website</option>
                            <option value="article">Article</option>
                            <option value="profile">Profile</option>
                            <option value="book">Book</option>
                            <option value="music.song">Music - Song</option>
                            <option value="video.movie">Video - Movie</option>
                            <option value="product">Product</option>
                        </select>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Site Name</label>
                        <input type="text" id="siteName" placeholder="My Website" class="t-w-full p-3 t-rounded border">
                    </div>
                </div>

                <button onclick="generate()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-xl">
                    Generate OG Tags
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Generated Open Graph Tags</label>
                    <textarea id="output" rows="12" readonly class="t-w-full p-3 t-rounded border t-font-mono t-text-xs"></textarea>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="flex-1 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const title = document.getElementById('ogTitle').value;
            const description = document.getElementById('ogDescription').value;
            const image = document.getElementById('ogImage').value;
            const url = document.getElementById('ogUrl').value;
            const type = document.getElementById('ogType').value;
            const siteName = document.getElementById('siteName').value;

            let ogTags = `<!-- Open Graph / Facebook -->\n`;

            if (title) {
                ogTags += `<meta property="og:title" content="${escapeHtml(title)}">\n`;
            }

            if (description) {
                ogTags += `<meta property="og:description" content="${escapeHtml(description)}">\n`;
            }

            ogTags += `<meta property="og:type" content="${type}">\n`;

            if (url) {
                ogTags += `<meta property="og:url" content="${escapeHtml(url)}">\n`;
            }

            if (image) {
                ogTags += `<meta property="og:image" content="${escapeHtml(image)}">\n`;
            }

            if (siteName) {
                ogTags += `<meta property="og:site_name" content="${escapeHtml(siteName)}">\n`;
            }

            ogTags += `\n<!-- Twitter -->\n`;
            ogTags += `<meta property="twitter:card" content="summary_large_image">\n`;

            if (url) {
                ogTags += `<meta property="twitter:url" content="${escapeHtml(url)}">\n`;
            }

            if (title) {
                ogTags += `<meta property="twitter:title" content="${escapeHtml(title)}">\n`;
            }

            if (description) {
                ogTags += `<meta property="twitter:description" content="${escapeHtml(description)}">\n`;
            }

            if (image) {
                ogTags += `<meta property="twitter:image" content="${escapeHtml(image)}">\n`;
            }

            document.getElementById('output').value = ogTags;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('ogTitle').value = '';
            document.getElementById('ogDescription').value = '';
            document.getElementById('ogImage').value = '';
            document.getElementById('ogUrl').value = '';
            document.getElementById('ogType').value = 'website';
            document.getElementById('siteName').value = '';
            document.getElementById('output').value = '';
        }
    </script>
