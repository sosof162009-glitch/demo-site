<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer - 205-Tools</title>
    <meta name="description" content="Productivity timer for work sessions">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    // Calculator Logic
function initCalculator(type) {
    // Auto-calculate on input
    document.querySelectorAll('.calc-input').forEach(input => {
        input.addEventListener('input', calculate);
    });
    
    document.querySelectorAll('input[type="radio"]').forEach(radio => {
        radio.addEventListener('change', calculate);
    });

    window.calculate = function() {
        try {
            let result = null;
            
            switch(type) {
                case 'bmi':
                    result = calculateBMI();
                    break;
                case 'loan':
                    result = calculateLoan();
                    break;
                case 'percentage':
                    result = calculatePercentage();
                    break;
                case 'binary':
                    result = convertBinary();
                    break;
                case 'hex':
                    result = convertHex();
                    break;
                case 'temperature':
                    result = convertTemperature();
                    break;
                case 'length':
                case 'weight':
                case 'area':
                case 'volume':
                    result = convertUnit(type);
                    break;
                case 'age':
                    result = calculateAge();
                    break;
                case 'time':
                    result = calculateTimeDifference();
                    break;
                default:
                    result = { value: '0', unit: '' };
            }
            
            if (result) {
                document.getElementById('resultSection').classList.remove('hidden');
                document.getElementById('mainResult').textContent = result.value;
                document.getElementById('resultUnit').textContent = result.unit || '';
            }
        } catch (err) {
            console.error('Calculation error:', err);
        }
    };
    
    function calculateBMI() {
        const weight = parseFloat(document.getElementById('weight')?.value || 0);
        const height = parseFloat(document.getElementById('height')?.value || 0);
        
        if (weight > 0 && height > 0) {
            const bmi = weight / ((height / 100) ** 2);
            let category = '';
            if (bmi < 18.5) category = 'Underweight';
            else if (bmi < 25) category = 'Normal';
            else if (bmi < 30) category = 'Overweight';
            else category = 'Obese';
            
            return { value: bmi.toFixed(1), unit: category };
        }
        return { value: '--', unit: '' };
    }
    
    function calculateLoan() {
        const amount = parseFloat(document.getElementById('amount')?.value || 0);
        const rate = parseFloat(document.getElementById('rate')?.value || 0);
        const years = parseFloat(document.getElementById('years')?.value || 0);
        
        if (amount > 0 && rate > 0 && years > 0) {
            const monthlyRate = rate / 100 / 12;
            const numPayments = years * 12;
            const monthlyPayment = amount * (monthlyRate * Math.pow(1 + monthlyRate, numPayments)) / (Math.pow(1 + monthlyRate, numPayments) - 1);
            const totalPayment = monthlyPayment * numPayments;
            const totalInterest = totalPayment - amount;
            
            return { value: monthlyPayment.toFixed(2), unit: '/ month' };
        }
        return { value: '--', unit: '' };
    }
    
    function calculatePercentage() {
        const value = parseFloat(document.getElementById('value')?.value || 0);
        const percent = parseFloat(document.getElementById('percent')?.value || 0);
        
        if (!isNaN(value) && !isNaN(percent)) {
            const result = (value * percent) / 100;
            return { value: result.toFixed(2), unit: '' };
        }
        return { value: '--', unit: '' };
    }
    
    function convertBinary() {
        const input = document.getElementById('binaryInput')?.value || '';
        if (/^[01]+$/.test(input)) {
            return { value: parseInt(input, 2).toString(), unit: 'Decimal' };
        }
        return { value: '--', unit: '' };
    }
    
    function convertHex() {
        const input = document.getElementById('hexInput')?.value || '';
        if (/^[0-9A-Fa-f]+$/.test(input)) {
            return { value: parseInt(input, 16).toString(), unit: 'Decimal' };
        }
        return { value: '--', unit: '' };
    }
    
    function convertTemperature() {
        const temp = parseFloat(document.getElementById('temperature')?.value || 0);
        const fromUnit = document.querySelector('input[name="fromUnit"]:checked')?.value || 'C';
        const toUnit = document.querySelector('input[name="toUnit"]:checked')?.value || 'F';
        
        let celsius = temp;
        if (fromUnit === 'F') celsius = (temp - 32) * 5/9;
        else if (fromUnit === 'K') celsius = temp - 273.15;
        
        let result = celsius;
        if (toUnit === 'F') result = celsius * 9/5 + 32;
        else if (toUnit === 'K') result = celsius + 273.15;
        
        return { value: result.toFixed(2), unit: '°' + toUnit };
    }
    
    function convertUnit(type) {
        const value = parseFloat(document.getElementById('inputValue')?.value || 0);
        const fromUnit = document.getElementById('fromUnit')?.value || '';
        const toUnit = document.getElementById('toUnit')?.value || '';
        
        if (isNaN(value)) return { value: '--', unit: '' };
        
        // Conversion factors (simplified)
        const factors = {
            length: { m: 1, km: 1000, cm: 0.01, mm: 0.001, ft: 0.3048, in: 0.0254, yd: 0.9144, mi: 1609.34 },
            weight: { kg: 1, g: 0.001, mg: 0.000001, lb: 0.453592, oz: 0.0283495 },
            area: { m2: 1, km2: 1000000, cm2: 0.0001, ft2: 0.092903, ac: 4046.86, ha: 10000 },
            volume: { l: 1, ml: 0.001, m3: 1000, gal: 3.78541, qt: 0.946353, pt: 0.473176 }
        };
        
        const factor = factors[type];
        if (factor && factor[fromUnit] && factor[toUnit]) {
            const result = value * factor[fromUnit] / factor[toUnit];
            return { value: result.toFixed(4), unit: toUnit };
        }
        
        return { value: value.toString(), unit: toUnit };
    }
    
    function calculateAge() {
        const birthDate = new Date(document.getElementById('birthDate')?.value || '');
        if (isNaN(birthDate.getTime())) return { value: '--', unit: '' };
        
        const today = new Date();
        let years = today.getFullYear() - birthDate.getFullYear();
        const months = today.getMonth() - birthDate.getMonth();
        
        if (months < 0 || (months === 0 && today.getDate() < birthDate.getDate())) {
            years--;
        }
        
        return { value: years.toString(), unit: 'years' };
    }
    
    function calculateTimeDifference() {
        const date1 = new Date(document.getElementById('date1')?.value || '');
        const date2 = new Date(document.getElementById('date2')?.value || '');
        
        if (isNaN(date1.getTime()) || isNaN(date2.getTime())) return { value: '--', unit: '' };
        
        const diff = Math.abs(date2 - date1);
        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        
        return { value: days.toString(), unit: 'days' };
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initCalculator('time');
    });
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">⏱️ Productivity</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Pomodoro Timer</h1>
            <p class="text-xl text-white/90">Productivity timer for work sessions</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="flex justify-center gap-4 mb-8">
                    <button onclick="setMode(25)" id="btn25" class="px-4 py-2 bg-indigo-500 text-white rounded-lg">Pomodoro (25m)</button>
                    <button onclick="setMode(5)" id="btn5" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg">Short Break (5m)</button>
                    <button onclick="setMode(15)" id="btn15" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg">Long Break (15m)</button>
                </div>

                <div class="text-center mb-8">
                    <p class="text-8xl font-bold text-indigo-600 dark:text-indigo-400 font-mono" id="display">25:00</p>
                </div>

                <div class="w-full bg-gray-200 dark:bg-gray-700 rounded-full h-4 mb-8">
                    <div id="progress" class="bg-indigo-500 h-4 rounded-full transition-all duration-1000" style="width: 100%"></div>
                </div>

                <div class="flex justify-center gap-4 mb-8">
                    <button onclick="start()" id="startBtn" class="px-8 py-3 bg-green-500 text-white rounded-xl font-semibold text-lg">Start</button>
                    <button onclick="pause()" id="pauseBtn" class="px-8 py-3 bg-yellow-500 text-white rounded-xl font-semibold text-lg hidden">Pause</button>
                    <button onclick="reset()" class="px-8 py-3 bg-red-500 text-white rounded-xl font-semibold text-lg">Reset</button>
                </div>

                <div class="text-center">
                    <p class="text-gray-600 dark:text-gray-400">Sessions completed: <span id="sessions" class="font-bold">0</span></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        let timeLeft = 25 * 60;
        let totalTime = 25 * 60;
        let timer = null;
        let isRunning = false;
        let sessions = 0;

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            document.getElementById('display').textContent = `${mins}:${secs}`;
            
            const progress = (timeLeft / totalTime) * 100;
            document.getElementById('progress').style.width = progress + '%';
        }

        function setMode(minutes) {
            pause();
            totalTime = minutes * 60;
            timeLeft = totalTime;
            updateDisplay();
            
            document.getElementById('btn25').className = minutes === 25 ? 'px-4 py-2 bg-indigo-500 text-white rounded-lg' : 'px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg';
            document.getElementById('btn5').className = minutes === 5 ? 'px-4 py-2 bg-indigo-500 text-white rounded-lg' : 'px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg';
            document.getElementById('btn15').className = minutes === 15 ? 'px-4 py-2 bg-indigo-500 text-white rounded-lg' : 'px-4 py-2 bg-gray-200 dark:bg-gray-700 rounded-lg';
        }

        function start() {
            if (isRunning) return;
            isRunning = true;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('pauseBtn').classList.remove('hidden');
            
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    complete();
                }
            }, 1000);
        }

        function pause() {
            isRunning = false;
            clearInterval(timer);
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('pauseBtn').classList.add('hidden');
        }

        function reset() {
            pause();
            timeLeft = totalTime;
            updateDisplay();
        }

        function complete() {
            pause();
            sessions++;
            document.getElementById('sessions').textContent = sessions;
            alert('Timer complete!');
        }

        updateDisplay();
    </script>
</body>
</html>
