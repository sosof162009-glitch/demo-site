<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator - 205-Tools</title>
    <meta name="description" content="Advanced scientific calculator">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
    <style>
        .calc-btn { @apply p-4 text-xl font-semibold rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-indigo-500 hover:text-white transition-all; }
        .calc-btn.op { @apply bg-indigo-100 dark:bg-indigo-900 text-indigo-600 dark:text-indigo-400; }
        .calc-btn.eq { @apply bg-indigo-500 text-white col-span-2; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔢 Math</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Scientific Calculator</h1>
            <p class="text-xl text-white/90">Advanced scientific calculator</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-md mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6">
                <div class="bg-gray-100 dark:bg-gray-700 rounded-lg p-4 mb-4 text-right">
                    <div class="text-sm text-gray-500 h-6" id="history"></div>
                    <div class="text-3xl font-mono overflow-x-auto" id="display">0</div>
                </div>

                <div class="grid grid-cols-5 gap-2">
                    <button onclick="clearAll()" class="calc-btn text-red-500">AC</button>
                    <button onclick="clearEntry()" class="calc-btn">CE</button>
                    <button onclick="insert('(')" class="calc-btn op">(</button>
                    <button onclick="insert(')')" class="calc-btn op">)</button>
                    <button onclick="insert('/')" class="calc-btn op">÷</button>

                    <button onclick="insert('sin(')" class="calc-btn text-sm">sin</button>
                    <button onclick="insert('7')" class="calc-btn">7</button>
                    <button onclick="insert('8')" class="calc-btn">8</button>
                    <button onclick="insert('9')" class="calc-btn">9</button>
                    <button onclick="insert('*')" class="calc-btn op">×</button>

                    <button onclick="insert('cos(')" class="calc-btn text-sm">cos</button>
                    <button onclick="insert('4')" class="calc-btn">4</button>
                    <button onclick="insert('5')" class="calc-btn">5</button>
                    <button onclick="insert('6')" class="calc-btn">6</button>
                    <button onclick="insert('-')" class="calc-btn op">−</button>

                    <button onclick="insert('tan(')" class="calc-btn text-sm">tan</button>
                    <button onclick="insert('1')" class="calc-btn">1</button>
                    <button onclick="insert('2')" class="calc-btn">2</button>
                    <button onclick="insert('3')" class="calc-btn">3</button>
                    <button onclick="insert('+')" class="calc-btn op">+</button>

                    <button onclick="insert('sqrt(')" class="calc-btn text-sm">√</button>
                    <button onclick="insert('0')" class="calc-btn">0</button>
                    <button onclick="insert('.')" class="calc-btn">.</button>
                    <button onclick="insert('^')" class="calc-btn op">^</button>
                    <button onclick="calculate()" class="calc-btn eq">=</button>
                </div>

                <div class="grid grid-cols-4 gap-2 mt-2">
                    <button onclick="insert('log(')" class="calc-btn text-sm">log</button>
                    <button onclick="insert('ln(')" class="calc-btn text-sm">ln</button>
                    <button onclick="insert('PI')" class="calc-btn text-sm">π</button>
                    <button onclick="insert('E')" class="calc-btn text-sm">e</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let current = '';
        let history = '';

        function insert(val) {
            if (current === '0' && !isNaN(val)) current = '';
            current += val;
            updateDisplay();
        }

        function updateDisplay() {
            document.getElementById('display').textContent = current || '0';
            document.getElementById('history').textContent = history;
        }

        function clearAll() {
            current = '';
            history = '';
            updateDisplay();
        }

        function clearEntry() {
            current = current.slice(0, -1);
            updateDisplay();
        }

        function calculate() {
            try {
                let expr = current
                    .replace(/sin\(/g, 'Math.sin(Math.PI/180*')
                    .replace(/cos\(/g, 'Math.cos(Math.PI/180*')
                    .replace(/tan\(/g, 'Math.tan(Math.PI/180*')
                    .replace(/sqrt\(/g, 'Math.sqrt(')
                    .replace(/log\(/g, 'Math.log10(')
                    .replace(/ln\(/g, 'Math.log(')
                    .replace(/\^/g, '**')
                    .replace(/PI/g, 'Math.PI')
                    .replace(/E/g, 'Math.E');
                
                history = current;
                current = String(eval(expr));
                if (current.length > 12) current = parseFloat(current).toExponential(6);
                updateDisplay();
            } catch (e) {
                current = 'Error';
                updateDisplay();
                setTimeout(() => { current = ''; updateDisplay(); }, 1500);
            }
        }
    </script>
</body>
</html>
