<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scientific Calculator - 205-Tools</title>
    <meta name="description" content="Full browser-based scientific calculator with trig, log, and algebra functions.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
    <style>
        .calc-btn { @apply p-4 text-lg font-semibold rounded-lg transition-all; }
        .calc-btn:hover { transform: translateY(-1px); }
        .display { font-family: 'Courier New', monospace; }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/en/" class="text-gray-600 dark:text-gray-300 hover:text-indigo-500">Home</a>
                </div>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🧮 Math</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Scientific Calculator</h1>
            <p class="text-xl text-white/90">Free • Fast • Secure</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-2xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-6">
                <!-- Display -->
                <div class="bg-gray-100 dark:bg-gray-700 rounded-xl p-4 mb-4">
                    <div id="expression" class="text-sm text-gray-500 dark:text-gray-400 h-6 text-right"></div>
                    <input type="text" id="display" class="w-full bg-transparent text-right text-3xl font-bold display outline-none" value="0" readonly>
                </div>

                <!-- Calculator Buttons -->
                <div class="grid grid-cols-5 gap-2">
                    <!-- Row 1 -->
                    <button onclick="clearAll()" class="p-3 bg-red-500 text-white rounded-lg hover:bg-red-600 font-semibold">AC</button>
                    <button onclick="clearEntry()" class="p-3 bg-orange-500 text-white rounded-lg hover:bg-orange-600 font-semibold">CE</button>
                    <button onclick="insert('(')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300">(</button>
                    <button onclick="insert(')')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300">)</button>
                    <button onclick="insert('/')" class="p-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">÷</button>
                    
                    <!-- Row 2 -->
                    <button onclick="insertFunction('sin')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300 text-sm">sin</button>
                    <button onclick="insert('7')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">7</button>
                    <button onclick="insert('8')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">8</button>
                    <button onclick="insert('9')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">9</button>
                    <button onclick="insert('*')" class="p-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">×</button>
                    
                    <!-- Row 3 -->
                    <button onclick="insertFunction('cos')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300 text-sm">cos</button>
                    <button onclick="insert('4')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">4</button>
                    <button onclick="insert('5')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">5</button>
                    <button onclick="insert('6')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">6</button>
                    <button onclick="insert('-')" class="p-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">−</button>
                    
                    <!-- Row 4 -->
                    <button onclick="insertFunction('tan')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300 text-sm">tan</button>
                    <button onclick="insert('1')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">1</button>
                    <button onclick="insert('2')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">2</button>
                    <button onclick="insert('3')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">3</button>
                    <button onclick="insert('+')" class="p-3 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">+</button>
                    
                    <!-- Row 5 -->
                    <button onclick="insertFunction('log')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300 text-sm">log</button>
                    <button onclick="insert('0')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">0</button>
                    <button onclick="insert('.')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-gray-200">.</button>
                    <button onclick="backspace()" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300">⌫</button>
                    <button onclick="calculate()" class="p-3 bg-green-500 text-white rounded-lg hover:bg-green-600 font-bold">=</button>
                    
                    <!-- Row 6 -->
                    <button onclick="insertFunction('sqrt')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300 text-sm">√</button>
                    <button onclick="insert('^')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300">xʸ</button>
                    <button onclick="insert('PI')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300">π</button>
                    <button onclick="insert('E')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300">e</button>
                    <button onclick="insertFunction('ln')" class="p-3 bg-gray-200 dark:bg-gray-600 rounded-lg hover:bg-gray-300 text-sm">ln</button>
                </div>

                <!-- History -->
                <div class="mt-6 p-4 bg-gray-50 dark:bg-gray-700 rounded-lg">
                    <h3 class="text-sm font-semibold mb-2">History</h3>
                    <div id="history" class="text-sm text-gray-600 dark:text-gray-400 max-h-24 overflow-y-auto">
                        <p class="italic">No calculations yet</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-12 bg-gray-100 dark:bg-gray-800/50">
        <div class="max-w-6xl mx-auto px-4">
            <h2 class="text-2xl font-bold text-center mb-8">Related Tools</h2>
            <div class="grid md:grid-cols-2 gap-4">
            <a href="/en/percentage-calculator/" class="tool-card flex items-center space-x-3 p-4 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 hover:border-primary transition-all">
                <span class="text-2xl">📊</span>
                <span class="font-medium">Percentage Calculator</span>
            </a>
            <a href="/en/compound-interest-calculator/" class="tool-card flex items-center space-x-3 p-4 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 hover:border-primary transition-all">
                <span class="text-2xl">💰</span>
                <span class="font-medium">Compound Interest</span>
            </a>
            <a href="/en/average-calculator/" class="tool-card flex items-center space-x-3 p-4 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 hover:border-primary transition-all">
                <span class="text-2xl">📈</span>
                <span class="font-medium">Average Calculator</span>
            </a>
            <a href="/en/random-number-generator/" class="tool-card flex items-center space-x-3 p-4 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 hover:border-primary transition-all">
                <span class="text-2xl">🎲</span>
                <span class="font-medium">Random Number Generator</span>
            </a></div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400">© 2025 205-Tools - Free</p>
        </div>
    </footer>

    <script>
        let currentInput = '';
        let history = [];
        
        function insert(val) {
            const display = document.getElementById('display');
            if (display.value === '0' || display.value === 'Error') {
                display.value = val;
            } else {
                display.value += val;
            }
            currentInput = display.value;
        }
        
        function insertFunction(func) {
            const display = document.getElementById('display');
            display.value = func + '(';
            currentInput = display.value;
        }
        
        function clearAll() {
            document.getElementById('display').value = '0';
            document.getElementById('expression').textContent = '';
            currentInput = '';
        }
        
        function clearEntry() {
            document.getElementById('display').value = '0';
        }
        
        function backspace() {
            const display = document.getElementById('display');
            display.value = display.value.slice(0, -1);
            if (display.value === '') display.value = '0';
            currentInput = display.value;
        }
        
        function calculate() {
            const display = document.getElementById('display');
            const expression = document.getElementById('expression');
            let expr = display.value;
            
            try {
                // Replace display symbols with JS operators
                expr = expr.replace(/×/g, '*').replace(/÷/g, '/').replace(/−/g, '-');
                
                // Handle scientific functions
                expr = expr.replace(/sin\(/g, 'Math.sin(');
                expr = expr.replace(/cos\(/g, 'Math.cos(');
                expr = expr.replace(/tan\(/g, 'Math.tan(');
                expr = expr.replace(/log\(/g, 'Math.log10(');
                expr = expr.replace(/ln\(/g, 'Math.log(');
                expr = expr.replace(/sqrt\(/g, 'Math.sqrt(');
                expr = expr.replace(/\^/g, '**');
                expr = expr.replace(/PI/g, 'Math.PI');
                expr = expr.replace(/E/g, 'Math.E');
                
                // Evaluate
                const result = eval(expr);
                
                if (isNaN(result) || !isFinite(result)) {
                    throw new Error('Invalid result');
                }
                
                // Add to history
                addToHistory(display.value + ' = ' + result);
                
                expression.textContent = display.value + ' =';
                display.value = parseFloat(result.toFixed(10)).toString();
            } catch (e) {
                display.value = 'Error';
            }
        }
        
        function addToHistory(calculation) {
            history.unshift(calculation);
            if (history.length > 10) history.pop();
            
            const historyDiv = document.getElementById('history');
            if (history.length === 0) {
                historyDiv.innerHTML = '<p class="italic">No calculations yet</p>';
            } else {
                historyDiv.innerHTML = history.map(h => `<p class="mb-1">${h}</p>`).join('');
            }
        }
        
        // Keyboard support
        document.addEventListener('keydown', function(e) {
            const key = e.key;
            if (/[0-9\.+\-*/()^]/.test(key)) {
                e.preventDefault();
                insert(key);
            } else if (key === 'Enter') {
                e.preventDefault();
                calculate();
            } else if (key === 'Escape') {
                clearAll();
            } else if (key === 'Backspace') {
                backspace();
            }
        });
    </script>
</body>
</html>
