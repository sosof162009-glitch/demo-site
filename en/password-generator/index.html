<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - 205-Tools</title>
    <meta name="description" content="Generate secure random passwords">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔒 Security</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Password Generator</h1>
            <p class="text-xl text-white/90">Generate secure random passwords</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Length: <span id="lengthValue">16</span></label>
                    <input type="range" id="length" min="6" max="64" value="16" class="w-full" oninput="document.getElementById('lengthValue').textContent = this.value">
                </div>

                <div class="space-y-4 mb-8">
                    <label class="flex items-center"><input type="checkbox" id="uppercase" checked class="mr-3"> Uppercase (A-Z)</label>
                    <label class="flex items-center"><input type="checkbox" id="lowercase" checked class="mr-3"> Lowercase (a-z)</label>
                    <label class="flex items-center"><input type="checkbox" id="numbers" checked class="mr-3"> Numbers (0-9)</label>
                    <label class="flex items-center"><input type="checkbox" id="symbols" checked class="mr-3"> Symbols (!@#$%)</label>
                </div>

                <button onclick="generatePassword()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate Password
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Generated Password</label>
                    <div class="flex gap-4">
                        <input type="text" id="result" readonly class="flex-1 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono">
                        <button onclick="copyPassword()" class="px-6 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">Copy</button>
                    </div>
                </div>

                <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div id="strengthBar" class="h-full bg-red-500 transition-all duration-300" style="width: 0%"></div>
                </div>
                <p class="text-center mt-2 text-sm" id="strengthText">Strength: -</p>
            </div>
        </div>
    </section>

    <script>
        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;

            let chars = '';
            if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (chars === '') {
                alert('Please select at least one character type');
                return;
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            document.getElementById('result').value = password;
            checkStrength(password);
        }

        function copyPassword() {
            const result = document.getElementById('result');
            if (!result.value) return;
            result.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function checkStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500', 'bg-green-600'];
            const labels = ['Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];

            bar.className = `h-full transition-all duration-300 ${colors[strength - 1] || 'bg-red-500'}`;
            bar.style.width = `${(strength / 5) * 100}%`;
            text.textContent = `Strength: ${labels[strength - 1] || 'Very Weak'}`;
        }
    </script>
</body>
</html>
