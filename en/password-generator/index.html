<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator - 205-Tools</title>
    <meta name="description" content="Generate secure random passwords">
    
    <script>
    // Generator Logic
function initGenerator(type, options) {
    let currentResult = '';
    let history = [];

    window.updateLength = function(value) {
        document.getElementById('lengthValue').textContent = value;
    };

    window.generate = function() {
        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.innerHTML = '⏳ Generating...';

        setTimeout(() => {
            try {
                currentResult = generateContent(type);
                
                document.getElementById('resultDisplay').textContent = currentResult;
                document.getElementById('resultDisplay').classList.add('text-gray-900', 'dark:text-white');
                document.getElementById('actionButtons').classList.remove('hidden');
                
                // Add to history
                addToHistory(currentResult);
                
                // Calculate strength for passwords
                if (type === 'password') {
                    calculateStrength(currentResult);
                }
            } catch (err) {
                alert('Error generating: ' + err.message);
            }
            
            btn.disabled = false;
            btn.innerHTML = '⚡ Generate';
        }, 300);
    };

    function generateContent(type) {
        const length = parseInt(document.getElementById('lengthSlider').value);
        
        switch(type) {
            case 'password':
                return generatePassword(length);
            case 'uuid':
                return generateUUID();
            case 'pin':
                return generatePIN(length);
            default:
                return generateRandomString(length);
        }
    }

    function generatePassword(length) {
        const useUpper = document.getElementById('useUpper')?.checked ?? true;
        const useLower = document.getElementById('useLower')?.checked ?? true;
        const useNumbers = document.getElementById('useNumbers')?.checked ?? true;
        const useSymbols = document.getElementById('useSymbols')?.checked ?? true;
        
        let chars = '';
        if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
        if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (useNumbers) chars += '0123456789';
        if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
        
        if (chars === '') chars = 'abcdefghijklmnopqrstuvwxyz';
        
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function generatePIN(length) {
        let result = '';
        for (let i = 0; i < length; i++) {
            result += Math.floor(Math.random() * 10);
        }
        return result;
    }

    function generateRandomString(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function calculateStrength(password) {
        let strength = 0;
        if (password.length >= 8) strength += 25;
        if (password.length >= 12) strength += 25;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
        if (/[0-9]/.test(password)) strength += 12;
        if (/[^a-zA-Z0-9]/.test(password)) strength += 13;
        
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        const bar = document.getElementById('strengthBar');
        
        bar.classList.remove('hidden');
        fill.style.width = strength + '%';
        
        if (strength < 40) {
            fill.className = 'strength-fill strength-weak';
            text.textContent = 'Weak';
        } else if (strength < 70) {
            fill.className = 'strength-fill strength-medium';
            text.textContent = 'Medium';
        } else {
            fill.className = 'strength-fill strength-strong';
            text.textContent = 'Strong';
        }
    }

    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(currentResult);
            showToast('Copied to clipboard!');
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = currentResult;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('Copied to clipboard!');
        }
    };

    function addToHistory(item) {
        history.unshift({ value: item, time: new Date().toLocaleTimeString() });
        if (history.length > 5) history.pop();
        
        const container = document.getElementById('historyList');
        container.innerHTML = history.map(h => `
            <div class="flex items-center justify-between p-3 card rounded-lg border border-gray-200 dark:border-gray-700">
                <span class="font-mono text-sm truncate flex-1">${h.value}</span>
                <div class="flex items-center gap-2">
                    <span class="text-xs text-gray-400">${h.time}</span>
                    <button onclick="navigator.clipboard.writeText('${h.value}')" class="p-1 text-gray-400 hover:text-pink-500">
                        📋
                    </button>
                </div>
            </div>
        `).join('');
        
        document.getElementById('historySection').classList.remove('hidden');
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-900 text-white rounded-xl shadow-2xl flex items-center gap-2 z-50';
        toast.innerHTML = `
            <svg class="w-5 h-5 text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            ${message}
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initGenerator('password');
    });
  </script>

<body class="  min-h-screen">
    <header class="card shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔒 Security</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Password Generator</h1>
            <p class="text-xl text-white/90">Generate secure random passwords</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="card rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Length: <span id="lengthValue">16</span></label>
                    <input type="range" id="length" min="6" max="64" value="16" class="w-full" oninput="document.getElementById('lengthValue').textContent = this.value">
                </div>

                <div class="space-y-4 mb-8">
                    <label class="flex items-center"><input type="checkbox" id="uppercase" checked class="mr-3"> Uppercase (A-Z)</label>
                    <label class="flex items-center"><input type="checkbox" id="lowercase" checked class="mr-3"> Lowercase (a-z)</label>
                    <label class="flex items-center"><input type="checkbox" id="numbers" checked class="mr-3"> Numbers (0-9)</label>
                    <label class="flex items-center"><input type="checkbox" id="symbols" checked class="mr-3"> Symbols (!@#$%)</label>
                </div>

                <button onclick="generatePassword()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate Password
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Generated Password</label>
                    <div class="flex gap-4">
                        <input type="text" id="result" readonly class="flex-1 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono">
                        <button onclick="copyPassword()" class="px-6 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600">Copy</button>
                    </div>
                </div>

                <div class="h-2 bg-gray-200 dark:bg-gray-700 rounded-full overflow-hidden">
                    <div id="strengthBar" class="h-full bg-red-500 transition-all duration-300" style="width: 0%"></div>
                </div>
                <p class="text-center mt-2 text-sm" id="strengthText">Strength: -</p>
            </div>
        </div>
    </section>

    <script>
        function generatePassword() {
            const length = parseInt(document.getElementById('length').value);
            const useUpper = document.getElementById('uppercase').checked;
            const useLower = document.getElementById('lowercase').checked;
            const useNumbers = document.getElementById('numbers').checked;
            const useSymbols = document.getElementById('symbols').checked;

            let chars = '';
            if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
            if (useNumbers) chars += '0123456789';
            if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';

            if (chars === '') {
                alert('Please select at least one character type');
                return;
            }

            let password = '';
            for (let i = 0; i < length; i++) {
                password += chars.charAt(Math.floor(Math.random() * chars.length));
            }

            document.getElementById('result').value = password;
            checkStrength(password);
        }

        function copyPassword() {
            const result = document.getElementById('result');
            if (!result.value) return;
            result.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function checkStrength(password) {
            let strength = 0;
            if (password.length >= 8) strength++;
            if (password.length >= 12) strength++;
            if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
            if (/[0-9]/.test(password)) strength++;
            if (/[^a-zA-Z0-9]/.test(password)) strength++;

            const bar = document.getElementById('strengthBar');
            const text = document.getElementById('strengthText');

            const colors = ['bg-red-500', 'bg-orange-500', 'bg-yellow-500', 'bg-green-500', 'bg-green-600'];
            const labels = ['Very Weak', 'Weak', 'Fair', 'Strong', 'Very Strong'];

            bar.className = `h-full transition-all duration-300 ${colors[strength - 1] || 'bg-red-500'}`;
            bar.style.width = `${(strength / 5) * 100}%`;
            text.textContent = `Strength: ${labels[strength - 1] || 'Very Weak'}`;
        }
    </script>
