<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What Is My IP - 205-Tools</title>
    <meta name="description" content="Find your IP address">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">🌐 Network</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">What Is My IP</h1>
            <p class="t-text-xl">Find your public IP address</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl t-text-center">
                <div id="loading">
                    <div class="t-inline-block animate-spin t-rounded-full h-12 w-12 border-b-2 border-indigo-500"></div>
                    <p class="t-mt-md">Detecting your IP address...</p>
                </div>

                <div id="result" class="t-hidden">
                    <p class="t-text-lg t-mb-md">Your Public IP Address</p>
                    
                    <div class="t-text-primary t-rounded-xl t-p-xl t-mb-xl">
                        <p id="ipAddress" class="t-text-4xl t-text-md-5xl t-font-bold t-font-mono">--.--.--.--</p>
                    </div>

                    <div class="t-grid t-grid-md-2 t-gap-md t-mb-xl">
                        <div class="t-rounded t-p-md">
                            <p class="t-text-sm">City</p>
                            <p id="city" class="t-text-lg t-font-medium">--</p>
                        </div>
                        
                        <div class="t-rounded t-p-md">
                            <p class="t-text-sm">Region</p>
                            <p id="region" class="t-text-lg t-font-medium">--</p>
                        </div>
                        
                        <div class="t-rounded t-p-md">
                            <p class="t-text-sm">Country</p>
                            <p id="country" class="t-text-lg t-font-medium">--</p>
                        </div>
                        
                        <div class="t-rounded t-p-md">
                            <p class="t-text-sm">ISP</p>
                            <p id="isp" class="t-text-lg t-font-medium">--</p>
                        </div>
                    </div>

                    <button onclick="copyIP()" class="px-8 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-medium t-transition">Copy IP</button>
                </div>

                <div id="error" class="t-hidden">
                    <p class="text-red-500">Unable to detect IP address. Please check your connection.</p>
                </div>
            </div>
        </div>
    </section>

    <script>
        async function getIP() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                
                document.getElementById('ipAddress').textContent = data.ip;
                document.getElementById('city').textContent = data.city || 'Unknown';
                document.getElementById('region').textContent = data.region || 'Unknown';
                document.getElementById('country').textContent = data.country_name || data.country || 'Unknown';
                document.getElementById('isp').textContent = data.org || 'Unknown';
                
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('result').classList.remove('hidden');
            } catch (error) {
                document.getElementById('loading').classList.add('hidden');
                document.getElementById('error').classList.remove('hidden');
            }
        }

        function copyIP() {
            const ip = document.getElementById('ipAddress').textContent;
            navigator.clipboard.writeText(ip).then(() => {
                alert('IP copied!');
            });
        }

        getIP();
    </script>
</body>
</html>
