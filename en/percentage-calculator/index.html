<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Percentage Calculator - 205-Tools</title>
    <meta name="description" content="Calculate percentages easily">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📊 Math</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Percentage Calculator</h1>
            <p class="text-xl text-white/90">Calculate percentages easily</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4 space-y-8">
            <!-- Calculate percentage of a number -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <h2 class="text-xl font-bold mb-6">What is % of a number?</h2>
                
                <div class="flex items-center gap-4 flex-wrap">
                    <input type="number" id="p1" placeholder="%" class="w-24 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    <span>% of</span>
                    <input type="number" id="n1" placeholder="number" class="w-32 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    
                    <button onclick="calc1()" class="px-6 py-3 bg-indigo-500 text-white rounded-lg">=</button>
                    
                    <span id="r1" class="text-xl font-bold"></span>
                </div>
            </div>

            <!-- Percentage of one number to another -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <h2 class="text-xl font-bold mb-6">What percentage is a number of another?</h2>
                
                <div class="flex items-center gap-4 flex-wrap">
                    <input type="number" id="n2a" placeholder="number" class="w-32 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    
                    <span>is what % of</span>
                    
                    <input type="number" id="n2b" placeholder="number" class="w-32 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    
                    <button onclick="calc2()" class="px-6 py-3 bg-purple-500 text-white rounded-lg">=</button>
                    
                    <span id="r2" class="text-xl font-bold"></span>
                </div>
            </div>

            <!-- Percentage change -->
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <h2 class="text-xl font-bold mb-6">Percentage Change</h2>
                
                <div class="flex items-center gap-4 flex-wrap">
                    <span>From</span>
                    
                    <input type="number" id="n3a" placeholder="original" class="w-32 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    
                    <span>to</span>
                    
                    <input type="number" id="n3b" placeholder="new" class="w-32 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    
                    <button onclick="calc3()" class="px-6 py-3 bg-pink-500 text-white rounded-lg">=</button>
                    
                    <span id="r3" class="text-xl font-bold"></span>
                </div>
            </div>
        </div>
    </section>

    <script>
        function calc1() {
            const p = parseFloat(document.getElementById('p1').value);
            const n = parseFloat(document.getElementById('n1').value);
            if (!isNaN(p) && !isNaN(n)) {
                document.getElementById('r1').textContent = (p / 100 * n).toFixed(2);
            }
        }

        function calc2() {
            const a = parseFloat(document.getElementById('n2a').value);
            const b = parseFloat(document.getElementById('n2b').value);
            if (!isNaN(a) && !isNaN(b) && b !== 0) {
                document.getElementById('r2').textContent = ((a / b) * 100).toFixed(2) + '%';
            }
        }

        function calc3() {
            const a = parseFloat(document.getElementById('n3a').value);
            const b = parseFloat(document.getElementById('n3b').value);
            if (!isNaN(a) && !isNaN(b) && a !== 0) {
                const change = ((b - a) / a) * 100;
                const sign = change >= 0 ? '+' : '';
                document.getElementById('r3').textContent = sign + change.toFixed(2) + '%';
            }
        }
    </script>
</body>
</html>
