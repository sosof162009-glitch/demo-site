<body class="  min-h-screen">
    <header class="card shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📄 PDF</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">PDF to PowerPoint</h1>
            <p class="text-xl text-white/90">Convert PDF to PowerPoint presentation</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="card rounded-2xl shadow-xl p-8">
                <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-8 text-center mb-8" id="dropZone">
                    <input type="file" id="fileInput" accept=".pdf" class="hidden">
                    <p class="text-lg mb-2">Drag & drop PDF here</p>
                    <p class="text-sm text-gray-500">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="mt-2 px-6 py-2 bg-indigo-500 text-white rounded-lg">Browse Files</button>
                </div>

                <div id="preview" class="hidden mb-8 text-center">
                    <p class="text-lg" id="fileName"></p>
                    <p class="text-sm text-gray-500" id="fileSize"></p>
                </div>

                <button id="convertBtn" onclick="convert()" class="hidden w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Convert to PowerPoint
                </button>

                <div id="result" class="hidden mt-8">
                    <div class="bg-yellow-50 dark:bg-yellow-900/20 p-4 rounded-lg">
                        <p class="text-yellow-700 dark:text-yellow-400">⚠️ PDF to PowerPoint conversion requires server-side processing. This is a client-side demo.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const fileInput = document.getElementById('fileInput');
        let pdfFile = null;

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file || !file.name.endsWith('.pdf')) {
                alert('Please select a PDF file');
                return;
            }

            pdfFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('convertBtn').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function convert() {
            if (!pdfFile) return;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
