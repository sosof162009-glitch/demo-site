<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">

            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">📄 PDF</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">PDF to PowerPoint</h1>
            <p class="t-text-xl">Convert PDF to PowerPoint presentation</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-border-2 t-border-dashed t-rounded-lg t-p-xl t-text-center t-mb-xl" id="dropZone">
                    <input type="file" id="fileInput" accept=".pdf" class="t-hidden">
                    <p class="t-text-lg t-mb-sm">Drag & drop PDF here</p>
                    <p class="t-text-sm">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="t-mt-sm t-px-lg t-py-xs t-text-primary t-rounded">Browse Files</button>
                </div>

                <div id="preview" class="t-hidden t-mb-xl t-text-center">
                    <p class="t-text-lg" id="fileName"></p>
                    <p class="t-text-sm" id="fileSize"></p>
                </div>

                <button id="convertBtn" onclick="convert()" class="btn t-hidden">
                    Convert to PowerPoint
                </button>

                <div id="result" class="t-hidden t-mt-xl">
                    <div class="t-state-warning-light t-p-md t-rounded">
                        <p>⚠️ PDF to PowerPoint conversion requires server-side processing. This is a client-side demo.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const fileInput = document.getElementById('fileInput');
        let pdfFile = null;

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file || !file.name.endsWith('.pdf')) {
                alert('Please select a PDF file');
                return;
            }

            pdfFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('convertBtn').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function convert() {
            if (!pdfFile) return;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
