<body>
    <header class="card t-shadow-sm t-site-header">
        <div class="t-container t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-container-sm t-container t-px-md t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">📄 PDF</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">PDF to Excel</h1>
            <p class="t-text-xl">Convert PDF tables to Excel format</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm t-container t-px-md">
            <div class="card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="border-2 border-dashed t-rounded-lg t-p-xl t-text-center t-mb-xl" id="dropZone">
                    <input type="file" id="fileInput" accept=".pdf" class="t-hidden">
                    <p class="t-text-lg t-mb-sm">Drag & drop PDF here</p>
                    <p class="t-text-sm">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="t-mt-sm px-6 py-2 bg-indigo-500 t-text-primary t-rounded">Browse Files</button>
                </div>

                <div id="preview" class="t-hidden t-mb-xl t-text-center">
                    <p class="t-text-lg" id="fileName"></p>
                    <p class="t-text-sm" id="fileSize"></p>
                </div>

                <button id="convertBtn" onclick="convert()" class="t-hidden t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition">
                    Convert to Excel
                </button>

                <div id="result" class="t-hidden mt-8">
                    <div class="bg-yellow-50 t-p-md t-rounded t-mb-md">
                        <p class="text-yellow-700">⚠️ PDF table extraction requires server-side processing with OCR capabilities. This is a client-side demo.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const fileInput = document.getElementById('fileInput');
        let pdfFile = null;

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file || !file.name.endsWith('.pdf')) {
                alert('Please select a PDF file');
                return;
            }

            pdfFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('convertBtn').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function convert() {
            if (!pdfFile) return;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
