<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Excel - 205-Tools</title>
    <meta name="description" content="Convert PDF tables to Excel">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📄 PDF</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">PDF to Excel</h1>
            <p class="text-xl text-white/90">Convert PDF tables to Excel format</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-8 text-center mb-8" id="dropZone">
                    <input type="file" id="fileInput" accept=".pdf" class="hidden">
                    <p class="text-lg mb-2">Drag & drop PDF here</p>
                    <p class="text-sm text-gray-500">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="mt-2 px-6 py-2 bg-indigo-500 text-white rounded-lg">Browse Files</button>
                </div>

                <div id="preview" class="hidden mb-8 text-center">
                    <p class="text-lg" id="fileName"></p>
                    <p class="text-sm text-gray-500" id="fileSize"></p>
                </div>

                <button id="convertBtn" onclick="convert()" class="hidden w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Convert to Excel
                </button>

                <div id="result" class="hidden mt-8">
                    <div class="bg-yellow-50 dark:bg-yellow-900/20 p-4 rounded-lg mb-4">
                        <p class="text-yellow-700 dark:text-yellow-400">⚠️ PDF table extraction requires server-side processing with OCR capabilities. This is a client-side demo.</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const fileInput = document.getElementById('fileInput');
        let pdfFile = null;

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file || !file.name.endsWith('.pdf')) {
                alert('Please select a PDF file');
                return;
            }

            pdfFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('convertBtn').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function convert() {
            if (!pdfFile) return;
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
