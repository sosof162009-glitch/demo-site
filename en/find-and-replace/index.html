<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Find and Replace - 205-Tools</title>
    <meta name="description" content="Find and replace text">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📝 Text</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Find and Replace</h1>
            <p class="text-xl text-white/90">Find and replace text</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Input Text</label>
                    <textarea id="input" rows="6" placeholder="Enter your text..." class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Find</label>
                        <input type="text" id="find" placeholder="Text to find" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Replace With</label>
                        <input type="text" id="replace" placeholder="Replacement text" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                </div>

                <div class="flex items-center mb-8">
                    <input type="checkbox" id="caseSensitive" class="mr-3">
                    <label class="mr-6">Case sensitive</label>
                    
                    <input type="checkbox" id="regex" class="mr-3">
                    <label>Use regex</label>
                </div>

                <button onclick="findReplace()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Replace All
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Result</label>
                    <textarea id="output" rows="6" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div id="stats" class="hidden text-center mb-8">
                    <p class="text-green-600">Replaced <span id="count" class="font-bold"></span> occurrences</p>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="clearAll()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function findReplace() {
            let input = document.getElementById('input').value;
            const find = document.getElementById('find').value;
            const replace = document.getElementById('replace').value;
            const caseSensitive = document.getElementById('caseSensitive').checked;
            const useRegex = document.getElementById('regex').checked;

            if (!find) {
                alert('Please enter text to find');
                return;
            }

            let result, count;
            
            if (useRegex) {
                try {
                    const flags = caseSensitive ? 'g' : 'gi';
                    const regex = new RegExp(find, flags);
                    count = (input.match(regex) || []).length;
                    result = input.replace(regex, replace);
                } catch (e) {
                    alert('Invalid regex: ' + e.message);
                    return;
                }
            } else {
                if (caseSensitive) {
                    const regex = new RegExp(find.replace(/[.*+?^${}()|[\]\\]/g, '\\$\u0026'), 'g');
                    count = (input.match(regex) || []).length;
                    result = input.replace(regex, replace);
                } else {
                    let temp = input;
                    count = 0;
                    const lowerFind = find.toLowerCase();
                    let idx = temp.toLowerCase().indexOf(lowerFind);
                    while (idx !== -1) {
                        count++;
                        temp = temp.substring(0, idx) + replace + temp.substring(idx + find.length);
                        idx = temp.toLowerCase().indexOf(lowerFind, idx + replace.length);
                    }
                    result = temp;
                }
            }

            document.getElementById('output').value = result;
            document.getElementById('count').textContent = count;
            document.getElementById('stats').classList.remove('hidden');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('find').value = '';
            document.getElementById('replace').value = '';
            document.getElementById('output').value = '';
            document.getElementById('stats').classList.add('hidden');
        }
    </script>
</body>
</html>
