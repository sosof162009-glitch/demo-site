<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Htaccess Generator - 205-Tools</title>
    <meta name="description" content="Generate Apache .htaccess rules">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">⚙️ Web</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Htaccess Generator</h1>
            <p class="text-xl text-white/90">Generate Apache .htaccess rules</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <h3 class="font-semibold mb-4">Select Options</h3>
                
                <div class="space-y-4 mb-8">
                    <div class="flex items-center">
                        <input type="checkbox" id="rewriteEngine" checked class="mr-3">
                        <label>Enable RewriteEngine</label>
                    </div>
                    
                    <div class="flex items-center">
                        <input type="checkbox" id="wwwRedirect" class="mr-3">
                        <label>Redirect www to non-www (or vice versa)</label>
                    </div>
                    
                    <div class="flex items-center">
                        <input type="checkbox" id="httpsRedirect" class="mr-3">
                        <label>Force HTTPS</label>
                    </div>
                    
                    <div class="flex items-center">
                        <input type="checkbox" id="gzip" checked class="mr-3">
                        <label>Enable Gzip Compression</label>
                    </div>
                    
                    <div class="flex items-center">
                        <input type="checkbox" id="browserCache" checked class="mr-3">
                        <label>Enable Browser Caching</label>
                    </div>
                    
                    <div class="flex items-center">
                        <input type="checkbox" id="disableIndexes" checked class="mr-3">
                        <label>Disable Directory Indexing</label>
                    </div>
                </div>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate Htaccess
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Generated .htaccess</label>
                    <textarea id="output" rows="20" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-xs"></textarea>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="downloadFile()" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-medium hover:bg-green-600 transition-all">Download .htaccess</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            let htaccess = '';
            
            htaccess += '# Generated .htaccess file\n';
            htaccess += '# Generated by 205-Tools\n\n';

            if (document.getElementById('disableIndexes').checked) {
                htaccess += '# Disable directory browsing\n';
                htaccess += 'Options -Indexes\n\n';
            }

            if (document.getElementById('rewriteEngine').checked) {
                htaccess += '# Enable rewrite engine\n';
                htaccess += '<IfModule mod_rewrite.c>\n';
                htaccess += 'RewriteEngine On\n\n';

                if (document.getElementById('httpsRedirect').checked) {
                    htaccess += '  # Force HTTPS\n';
                    htaccess += '  RewriteCond %{HTTPS} off\n';
                    htaccess += '  RewriteRule ^(.*)$ https://%{HTTP_HOST}/$1 [R=301,L]\n\n';
                }

                if (document.getElementById('wwwRedirect').checked) {
                    htaccess += '  # Redirect www to non-www\n';
                    htaccess += '  RewriteCond %{HTTP_HOST} ^www\\.(.*)$ [NC]\n';
                    htaccess += '  RewriteRule ^(.*)$ https://%1/$1 [R=301,L]\n\n';
                }

                htaccess += '</IfModule>\n\n';
            }

            if (document.getElementById('gzip').checked) {
                htaccess += '# Enable gzip compression\n';
                htaccess += '<IfModule mod_deflate.c>\n';
                htaccess += 'AddOutputFilterByType DEFLATE text/plain\n';
                htaccess += 'AddOutputFilterByType DEFLATE text/html\n';
                htaccess += 'AddOutputFilterByType DEFLATE text/xml\n';
                htaccess += 'AddOutputFilterByType DEFLATE text/css\n';
                htaccess += 'AddOutputFilterByType DEFLATE application/xml\n';
                htaccess += 'AddOutputFilterByType DEFLATE application/xhtml+xml\n';
                htaccess += 'AddOutputFilterByType DEFLATE application/rss+xml\n';
                htaccess += 'AddOutputFilterByType DEFLATE application/javascript\n';
                htaccess += 'AddOutputFilterByType DEFLATE application/x-javascript\n';
                htaccess += '</IfModule>\n\n';
            }

            if (document.getElementById('browserCache').checked) {
                htaccess += '# Enable browser caching\n';
                htaccess += '<IfModule mod_expires.c>\n';
                htaccess += 'ExpiresActive On\n';
                htaccess += 'ExpiresByType image/jpg "access plus 1 year"\n';
                htaccess += 'ExpiresByType image/jpeg "access plus 1 year"\n';
                htaccess += 'ExpiresByType image/gif "access plus 1 year"\n';
                htaccess += 'ExpiresByType image/png "access plus 1 year"\n';
                htaccess += 'ExpiresByType text/css "access plus 1 month"\n';
                htaccess += 'ExpiresByType application/pdf "access plus 1 month"\n';
                htaccess += 'ExpiresByType application/javascript "access plus 1 month"\n';
                htaccess += '</IfModule>\n';
            }

            document.getElementById('output').value = htaccess;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function downloadFile() {
            const output = document.getElementById('output').value;
            if (!output) return;
            
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = '.htaccess';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
