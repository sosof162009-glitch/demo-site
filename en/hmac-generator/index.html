<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMAC Generator - 205-Tools</title>
    <meta name="description" content="Generate HMAC signatures">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔒 Security</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">HMAC Generator</h1>
            <p class="text-xl text-white/90">Generate HMAC signatures with secret key</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="space-y-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Message</label>
                        <textarea id="message" rows="4" placeholder="Enter message..." class="w-full p-4 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Secret Key</label>
                        <input type="text" id="key" placeholder="Enter secret key..." class="w-full p-4 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Algorithm</label>
                        <select id="algorithm" class="w-full p-4 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="SHA256">HMAC-SHA256</option>
                            <option value="SHA1">HMAC-SHA1</option>
                            <option value="MD5">HMAC-MD5</option>
                            <option value="SHA512">HMAC-SHA512</option>
                        </select>
                    </div>
                </div>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate HMAC
                </button>

                <div id="result" class="hidden bg-gray-50 dark:bg-gray-700 rounded-lg p-6">
                    <div class="flex items-center justify-between mb-2">
                        <span class="font-medium">HMAC Signature</span>
                        
                        <button onclick="copy()" class="text-sm text-indigo-500 hover:text-indigo-600">Copy</button>
                    </div>
                    
                    <p id="hmac" class="font-mono text-sm break-all"></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const message = document.getElementById('message').value;
            const key = document.getElementById('key').value;
            const algorithm = document.getElementById('algorithm').value;

            if (!message || !key) {
                alert('Please enter both message and key');
                return;
            }

            let hmac;
            switch(algorithm) {
                case 'SHA256':
                    hmac = CryptoJS.HmacSHA256(message, key);
                    break;
                case 'SHA1':
                    hmac = CryptoJS.HmacSHA1(message, key);
                    break;
                case 'MD5':
                    hmac = CryptoJS.HmacMD5(message, key);
                    break;
                case 'SHA512':
                    hmac = CryptoJS.HmacSHA512(message, key);
                    break;
                default:
                    hmac = CryptoJS.HmacSHA256(message, key);
            }

            document.getElementById('hmac').textContent = hmac.toString();
            document.getElementById('result').classList.remove('hidden');
        }

        function copy() {
            const text = document.getElementById('hmac').textContent;
            navigator.clipboard.writeText(text).then(() => alert('Copied!'));
        }
    </script>
</body>
</html>
