<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HMAC Generator - 205-Tools</title>
    <meta name="description" content="Generate HMAC signatures">
        <script src="https://cdnjs.cloudflare.com/ajax/libs/crypto-js/4.1.1/crypto-js.min.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">🔒 Security</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">HMAC Generator</h1>
            <p class="t-text-xl">Generate HMAC signatures with secret key</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="space-y-6 t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Message</label>
                        <textarea id="message" rows="4" placeholder="Enter message..." class="t-w-full t-p-md t-rounded border"></textarea>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Secret Key</label>
                        <input type="text" id="key" placeholder="Enter secret key..." class="t-w-full t-p-md t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Algorithm</label>
                        <select id="algorithm" class="t-w-full t-p-md t-rounded border">
                            <option value="SHA256">HMAC-SHA256</option>
                            <option value="SHA1">HMAC-SHA1</option>
                            <option value="MD5">HMAC-MD5</option>
                            <option value="SHA512">HMAC-SHA512</option>
                        </select>
                    </div>
                </div>

                <button onclick="generate()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-xl">
                    Generate HMAC
                </button>

                <div id="result" class="t-hidden t-rounded t-p-lg">
                    <div class="t-flex t-items-center t-justify-between t-mb-sm">
                        <span class="t-font-medium">HMAC Signature</span>
                        
                        <button onclick="copy()" class="t-text-sm text-indigo-500">Copy</button>
                    </div>
                    
                    <p id="hmac" class="t-font-mono t-text-sm break-all"></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const message = document.getElementById('message').value;
            const key = document.getElementById('key').value;
            const algorithm = document.getElementById('algorithm').value;

            if (!message || !key) {
                alert('Please enter both message and key');
                return;
            }

            let hmac;
            switch(algorithm) {
                case 'SHA256':
                    hmac = CryptoJS.HmacSHA256(message, key);
                    break;
                case 'SHA1':
                    hmac = CryptoJS.HmacSHA1(message, key);
                    break;
                case 'MD5':
                    hmac = CryptoJS.HmacMD5(message, key);
                    break;
                case 'SHA512':
                    hmac = CryptoJS.HmacSHA512(message, key);
                    break;
                default:
                    hmac = CryptoJS.HmacSHA256(message, key);
            }

            document.getElementById('hmac').textContent = hmac.toString();
            document.getElementById('result').classList.remove('hidden');
        }

        function copy() {
            const text = document.getElementById('hmac').textContent;
            navigator.clipboard.writeText(text).then(() => alert('Copied!'));
        }
    </script>
</body>
</html>
