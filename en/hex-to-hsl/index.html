<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HEX to HSL Converter - 205-Tools</title>
    <meta name="description" content="Convert HEX color to HSL format.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</span>
                </a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🎨 Colors</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">HEX to HSL Converter</h1>
            <p class="text-xl text-white/90">Convert HEX color code to HSL format</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <!-- Input -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">HEX Color</label>
                    <div class="flex gap-2">
                        <input type="text" id="hexInput" value="#6366f1" placeholder="#RRGGBB" class="flex-1 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                        <input type="color" id="colorPicker" value="#6366f1" class="w-16 h-12 rounded-lg border">
                    </div>
                </div>

                <!-- Preview -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Preview</label>
                    <div id="preview" class="w-full h-24 rounded-lg border" style="background-color: #6366f1;"></div>
                </div>

                <!-- Convert Button -->
                <button onclick="convert()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-6">
                    Convert to HSL
                </button>

                <!-- HSL Output -->
                <div id="result" class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6">
                    <label class="block text-sm font-medium mb-2">HSL</label>
                    <input type="text" id="hslOutput" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono">
                    
                    <div class="grid grid-cols-3 gap-4 mt-4">
                        <div>
                            <label class="text-xs text-gray-500">Hue</label>
                            <input type="text" id="hValue" readonly class="w-full p-2 rounded border dark:border-gray-600 dark:bg-gray-600 text-center">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500">Saturation</label>
                            <input type="text" id="sValue" readonly class="w-full p-2 rounded border dark:border-gray-600 dark:bg-gray-600 text-center">
                        </div>
                        <div>
                            <label class="text-xs text-gray-500">Lightness</label>
                            <input type="text" id="lValue" readonly class="w-full p-2 rounded border dark:border-gray-600 dark:bg-gray-600 text-center">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Sync color picker with text input
        document.getElementById('colorPicker').addEventListener('input', function() {
            document.getElementById('hexInput').value = this.value;
            document.getElementById('preview').style.backgroundColor = this.value;
        });

        document.getElementById('hexInput').addEventListener('input', function() {
            const hex = this.value;
            if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                document.getElementById('colorPicker').value = hex;
                document.getElementById('preview').style.backgroundColor = hex;
            }
        });

        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        function convert() {
            const hex = document.getElementById('hexInput').value;
            if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                alert('Please enter a valid HEX color (e.g., #6366f1)');
                return;
            }

            const hsl = hexToHSL(hex);
            document.getElementById('hslOutput').value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
            document.getElementById('hValue').value = hsl.h + '°';
            document.getElementById('sValue').value = hsl.s + '%';
            document.getElementById('lValue').value = hsl.l + '%';
        }

        // Initial conversion
        convert();
    </script>
</body>
</html>
