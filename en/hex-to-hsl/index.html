        <script>
    // Generator Logic
function initGenerator(type, options) {
    let currentResult = '';
    let history = [];

    window.updateLength = function(value) {
        document.getElementById('lengthValue').textContent = value;
    };

    window.generate = function() {
        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.innerHTML = '⏳ Generating...';

        setTimeout(() => {
            try {
                currentResult = generateContent(type);
                
                document.getElementById('resultDisplay').textContent = currentResult;
                document.getElementById('resultDisplay').classList.add('text-gray-900', 'dark:text-white');
                document.getElementById('actionButtons').classList.remove('hidden');
                
                // Add to history
                addToHistory(currentResult);
                
                // Calculate strength for passwords
                if (type === 'password') {
                    calculateStrength(currentResult);
                }
            } catch (err) {
                alert('Error generating: ' + err.message);
            }
            
            btn.disabled = false;
            btn.innerHTML = '⚡ Generate';
        }, 300);
    };

    function generateContent(type) {
        const length = parseInt(document.getElementById('lengthSlider').value);
        
        switch(type) {
            case 'password':
                return generatePassword(length);
            case 'uuid':
                return generateUUID();
            case 'pin':
                return generatePIN(length);
            default:
                return generateRandomString(length);
        }
    }

    function generatePassword(length) {
        const useUpper = document.getElementById('useUpper')?.checked ?? true;
        const useLower = document.getElementById('useLower')?.checked ?? true;
        const useNumbers = document.getElementById('useNumbers')?.checked ?? true;
        const useSymbols = document.getElementById('useSymbols')?.checked ?? true;
        
        let chars = '';
        if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
        if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (useNumbers) chars += '0123456789';
        if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
        
        if (chars === '') chars = 'abcdefghijklmnopqrstuvwxyz';
        
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function generatePIN(length) {
        let result = '';
        for (let i = 0; i < length; i++) {
            result += Math.floor(Math.random() * 10);
        }
        return result;
    }

    function generateRandomString(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function calculateStrength(password) {
        let strength = 0;
        if (password.length >= 8) strength += 25;
        if (password.length >= 12) strength += 25;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
        if (/[0-9]/.test(password)) strength += 12;
        if (/[^a-zA-Z0-9]/.test(password)) strength += 13;
        
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        const bar = document.getElementById('strengthBar');
        
        bar.classList.remove('hidden');
        fill.style.width = strength + '%';
        
        if (strength < 40) {
            fill.className = 'strength-fill strength-weak';
            text.textContent = 'Weak';
        } else if (strength < 70) {
            fill.className = 'strength-fill strength-medium';
            text.textContent = 'Medium';
        } else {
            fill.className = 'strength-fill strength-strong';
            text.textContent = 'Strong';
        }
    }

    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(currentResult);
            showToast('Copied to clipboard!');
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = currentResult;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('Copied to clipboard!');
        }
    };

    function addToHistory(item) {
        history.unshift({ value: item, time: new Date().toLocaleTimeString() });
        if (history.length > 5) history.pop();
        
        const container = document.getElementById('historyList');
        container.innerHTML = history.map(h => `
            <div class="t-flex t-items-center t-justify-between p-3 t-rounded border">
                <span class="t-font-mono t-text-sm truncate flex-1">${h.value}</span>
                <div class="t-flex t-items-center t-gap-sm">
                    <span class="t-text-xs t-text-muted-light">${h.time}</span>
                    <button onclick="navigator.clipboard.writeText('${h.value}')" class="p-1 t-text-muted-light">
                        📋
                    </button>
                </div>
            </div>
        `).join('');
        
        document.getElementById('historySection').classList.remove('hidden');
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-900 text-white rounded-xl shadow-2xl flex items-center gap-2 z-50';
        toast.innerHTML = `
            <svg class="text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            ${message}
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initGenerator('random');
    });
  </script>

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-flex t-items-center t-space-x-sm">
                    <span class="t-text-2xl t-font-bold">205-Tools</span>
                </a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">🎨 Colors</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">HEX to HSL Converter</h1>
            <p class="t-text-xl">Convert HEX color code to HSL format</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <!-- Input -->
                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">HEX Color</label>
                    <div class="t-flex t-gap-sm">
                        <input type="text" id="hexInput" value="#6366f1" placeholder="#RRGGBB" class="flex-1 p-3 t-rounded border">
                        <input type="color" id="colorPicker" value="#6366f1" class="h-12 t-rounded border">
                    </div>
                </div>

                <!-- Preview -->
                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Preview</label>
                    <div id="preview" class="t-w-full h-24 t-rounded border" style="background-color: #6366f1;"></div>
                </div>

                <!-- Convert Button -->
                <button onclick="convert()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-lg">
                    Convert to HSL
                </button>

                <!-- HSL Output -->
                <div id="result" class="t-rounded t-p-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">HSL</label>
                    <input type="text" id="hslOutput" readonly class="t-w-full p-3 t-rounded border t-font-mono">
                    
                    <div class="t-grid t-grid-3 t-gap-md t-mt-md">
                        <div>
                            <label class="t-text-xs">Hue</label>
                            <input type="text" id="hValue" readonly class="t-w-full t-p-xs t-rounded-sm border t-text-center">
                        </div>
                        <div>
                            <label class="t-text-xs">Saturation</label>
                            <input type="text" id="sValue" readonly class="t-w-full t-p-xs t-rounded-sm border t-text-center">
                        </div>
                        <div>
                            <label class="t-text-xs">Lightness</label>
                            <input type="text" id="lValue" readonly class="t-w-full t-p-xs t-rounded-sm border t-text-center">
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        // Sync color picker with text input
        document.getElementById('colorPicker').addEventListener('input', function() {
            document.getElementById('hexInput').value = this.value;
            document.getElementById('preview').style.backgroundColor = this.value;
        });

        document.getElementById('hexInput').addEventListener('input', function() {
            const hex = this.value;
            if (/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                document.getElementById('colorPicker').value = hex;
                document.getElementById('preview').style.backgroundColor = hex;
            }
        });

        function hexToHSL(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return {
                h: Math.round(h * 360),
                s: Math.round(s * 100),
                l: Math.round(l * 100)
            };
        }

        function convert() {
            const hex = document.getElementById('hexInput').value;
            if (!/^#[0-9A-Fa-f]{6}$/.test(hex)) {
                alert('Please enter a valid HEX color (e.g., #6366f1)');
                return;
            }

            const hsl = hexToHSL(hex);
            document.getElementById('hslOutput').value = `hsl(${hsl.h}, ${hsl.s}%, ${hsl.l}%)`;
            document.getElementById('hValue').value = hsl.h + '°';
            document.getElementById('sValue').value = hsl.s + '%';
            document.getElementById('lValue').value = hsl.l + '%';
        }

        // Initial conversion
        convert();
    </script>
