<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loan Calculator - 205-Tools</title>
    <meta name="description" content="Calculate loan payments and interest">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">💰 Finance</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Loan Calculator</h1>
            <p class="text-xl text-white/90">Calculate loan payments and interest</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="space-y-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Loan Amount ($)</label>
                        <input type="number" id="amount" value="10000" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Annual Interest Rate (%)</label>
                        <input type="number" id="rate" value="5" step="0.1" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Loan Term (years)</label>
                        <input type="number" id="years" value="5" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                </div>

                <button onclick="calculateLoan()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Calculate
                </button>

                <div id="result" class="hidden mt-8">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-indigo-50 dark:bg-indigo-900/20 p-6 rounded-xl text-center">
                            <p class="text-3xl font-bold text-indigo-600 dark:text-indigo-400" id="monthly">$0</p>
                            <p class="text-gray-600 dark:text-gray-400">Monthly Payment</p>
                        </div>
                        
                        <div class="bg-green-50 dark:bg-green-900/20 p-6 rounded-xl text-center">
                            <p class="text-3xl font-bold text-green-600 dark:text-green-400" id="total">$0</p>
                            <p class="text-gray-600 dark:text-gray-400">Total Payment</p>
                        </div>
                    </div>

                    <div class="bg-gray-50 dark:bg-gray-700 p-6 rounded-xl">
                        <p class="flex justify-between">
                            <span>Total Interest</span>
                            <span class="font-bold" id="interest">$0</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function calculateLoan() {
            const amount = parseFloat(document.getElementById('amount').value);
            const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
            const months = parseFloat(document.getElementById('years').value) * 12;

            if (amount <= 0 || rate < 0 || months <= 0) {
                alert('Please enter valid values');
                return;
            }

            const monthlyPayment = (amount * rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
            const totalPayment = monthlyPayment * months;
            const totalInterest = totalPayment - amount;

            document.getElementById('monthly').textContent = '$' + monthlyPayment.toFixed(2);
            document.getElementById('total').textContent = '$' + totalPayment.toFixed(2);
            document.getElementById('interest').textContent = '$' + totalInterest.toFixed(2);

            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
