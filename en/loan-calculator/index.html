<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">💰 Finance</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Loan Calculator</h1>
            <p class="t-text-xl">Calculate loan payments and interest</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-space-y-lg t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Loan Amount ($)</label>
                        <input type="number" id="amount" value="10000" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                    
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Annual Interest Rate (%)</label>
                        <input type="number" id="rate" value="5" step="0.1" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                    
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Loan Term (years)</label>
                        <input type="number" id="years" value="5" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                </div>

                <button onclick="calculateLoan()" class="btn">
                    Calculate
                </button>

                <div id="result" class="t-hidden t-mt-xl">
                    <div class="t-grid t-grid-2 t-gap-md t-mb-lg">
                        <div class="t-state-info-light t-p-lg t-rounded-lg t-text-center">
                            <p class="t-text-3xl t-font-bold t-text-accent" id="monthly">$0</p>
                            <p class="t-text-muted">Monthly Payment</p>
                        </div>
                        
                        <div class="t-state-success-light t-p-lg t-rounded-lg t-text-center">
                            <p class="t-text-3xl t-font-bold t-text-success" id="total">$0</p>
                            <p class="t-text-muted">Total Payment</p>
                        </div>
                    </div>

                    <div class="t-p-lg t-rounded-lg">
                        <p class="t-flex t-justify-between">
                            <span>Total Interest</span>
                            <span class="t-font-bold" id="interest">$0</span>
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function calculateLoan() {
            const amount = parseFloat(document.getElementById('amount').value);
            const rate = parseFloat(document.getElementById('rate').value) / 100 / 12;
            const months = parseFloat(document.getElementById('years').value) * 12;

            if (amount <= 0 || rate < 0 || months <= 0) {
                alert('Please enter valid values');
                return;
            }

            const monthlyPayment = (amount * rate * Math.pow(1 + rate, months)) / (Math.pow(1 + rate, months) - 1);
            const totalPayment = monthlyPayment * months;
            const totalInterest = totalPayment - amount;

            document.getElementById('monthly').textContent = '$' + monthlyPayment.toFixed(2);
            document.getElementById('total').textContent = '$' + totalPayment.toFixed(2);
            document.getElementById('interest').textContent = '$' + totalInterest.toFixed(2);

            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
