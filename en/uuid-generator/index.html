<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UUID Generator - 205-Tools</title>
    <meta name="description" content="Generate random UUIDs/GUIDs">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔢 Data</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">UUID Generator</h1>
            <p class="text-xl text-white/90">Generate random UUIDs/GUIDs</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="flex gap-4 mb-8">
                    <div class="flex-1">
                        <label class="block text-sm font-medium mb-2">Quantity</label>
                        <input type="number" id="quantity" value="1" min="1" max="100" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-medium mb-2">Format</label>
                        <select id="format" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="standard">xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx</option>
                            <option value="uppercase">UPPERCASE</option>
                            <option value="nospace">NoDashes</option>
                        </select>
                    </div>
                </div>

                <button onclick="generateUUIDs()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate UUID(s)
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Result</label>
                    <textarea id="result" rows="10" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-sm"></textarea>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="clearResult()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generateUUID() {
            return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
                const r = Math.random() * 16 | 0;
                const v = c === 'x' ? r : (r & 0x3 | 0x8);
                return v.toString(16);
            });
        }

        function generateUUIDs() {
            const qty = parseInt(document.getElementById('quantity').value);
            const format = document.getElementById('format').value;
            let uuids = [];

            for (let i = 0; i < qty; i++) {
                let uuid = generateUUID();
                if (format === 'uppercase') uuid = uuid.toUpperCase();
                if (format === 'nospace') uuid = uuid.replace(/-/g, '');
                uuids.push(uuid);
            }

            document.getElementById('result').value = uuids.join('\n');
        }

        function copyResult() {
            const result = document.getElementById('result');
            if (!result.value) return;
            result.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearResult() {
            document.getElementById('result').value = '';
        }
    </script>
</body>
</html>
