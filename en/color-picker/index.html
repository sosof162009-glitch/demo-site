<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker - 205-Tools</title>
    <meta name="description" content="Pick colors and get HEX, RGB, HSL values">
    
    <script>
    // Generator Logic
function initGenerator(type, options) {
    let currentResult = '';
    let history = [];

    window.updateLength = function(value) {
        document.getElementById('lengthValue').textContent = value;
    };

    window.generate = function() {
        const btn = document.getElementById('generateBtn');
        btn.disabled = true;
        btn.innerHTML = '⏳ Generating...';

        setTimeout(() => {
            try {
                currentResult = generateContent(type);
                
                document.getElementById('resultDisplay').textContent = currentResult;
                document.getElementById('resultDisplay').classList.add('text-gray-900', 'dark:text-white');
                document.getElementById('actionButtons').classList.remove('hidden');
                
                // Add to history
                addToHistory(currentResult);
                
                // Calculate strength for passwords
                if (type === 'password') {
                    calculateStrength(currentResult);
                }
            } catch (err) {
                alert('Error generating: ' + err.message);
            }
            
            btn.disabled = false;
            btn.innerHTML = '⚡ Generate';
        }, 300);
    };

    function generateContent(type) {
        const length = parseInt(document.getElementById('lengthSlider').value);
        
        switch(type) {
            case 'password':
                return generatePassword(length);
            case 'uuid':
                return generateUUID();
            case 'pin':
                return generatePIN(length);
            default:
                return generateRandomString(length);
        }
    }

    function generatePassword(length) {
        const useUpper = document.getElementById('useUpper')?.checked ?? true;
        const useLower = document.getElementById('useLower')?.checked ?? true;
        const useNumbers = document.getElementById('useNumbers')?.checked ?? true;
        const useSymbols = document.getElementById('useSymbols')?.checked ?? true;
        
        let chars = '';
        if (useLower) chars += 'abcdefghijklmnopqrstuvwxyz';
        if (useUpper) chars += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        if (useNumbers) chars += '0123456789';
        if (useSymbols) chars += '!@#$%^&*()_+-=[]{}|;:,.<>?';
        
        if (chars === '') chars = 'abcdefghijklmnopqrstuvwxyz';
        
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            const r = Math.random() * 16 | 0;
            const v = c === 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    function generatePIN(length) {
        let result = '';
        for (let i = 0; i < length; i++) {
            result += Math.floor(Math.random() * 10);
        }
        return result;
    }

    function generateRandomString(length) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function calculateStrength(password) {
        let strength = 0;
        if (password.length >= 8) strength += 25;
        if (password.length >= 12) strength += 25;
        if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength += 25;
        if (/[0-9]/.test(password)) strength += 12;
        if (/[^a-zA-Z0-9]/.test(password)) strength += 13;
        
        const fill = document.getElementById('strengthFill');
        const text = document.getElementById('strengthText');
        const bar = document.getElementById('strengthBar');
        
        bar.classList.remove('hidden');
        fill.style.width = strength + '%';
        
        if (strength < 40) {
            fill.className = 'strength-fill strength-weak';
            text.textContent = 'Weak';
        } else if (strength < 70) {
            fill.className = 'strength-fill strength-medium';
            text.textContent = 'Medium';
        } else {
            fill.className = 'strength-fill strength-strong';
            text.textContent = 'Strong';
        }
    }

    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(currentResult);
            showToast('Copied to clipboard!');
        } catch (err) {
            const textarea = document.createElement('textarea');
            textarea.value = currentResult;
            document.body.appendChild(textarea);
            textarea.select();
            document.execCommand('copy');
            document.body.removeChild(textarea);
            showToast('Copied to clipboard!');
        }
    };

    function addToHistory(item) {
        history.unshift({ value: item, time: new Date().toLocaleTimeString() });
        if (history.length > 5) history.pop();
        
        const container = document.getElementById('historyList');
        container.innerHTML = history.map(h => `
            <div class="t-flex t-items-center t-justify-between p-3 card t-rounded border">
                <span class="t-font-mono t-text-sm truncate flex-1">${h.value}</span>
                <div class="t-flex t-items-center t-gap-sm">
                    <span class="t-text-xs t-text-muted-light">${h.time}</span>
                    <button onclick="navigator.clipboard.writeText('${h.value}')" class="p-1 t-text-muted-light">
                        📋
                    </button>
                </div>
            </div>
        `).join('');
        
        document.getElementById('historySection').classList.remove('hidden');
    }

    function showToast(message) {
        const toast = document.createElement('div');
        toast.className = 'fixed bottom-8 left-1/2 -translate-x-1/2 px-6 py-3 bg-gray-900 text-white rounded-xl shadow-2xl flex items-center gap-2 z-50';
        toast.innerHTML = `
            <svg class="text-green-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
            </svg>
            ${message}
        `;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 2000);
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initGenerator('random');
    });
  </script>

<body>
    <header class="card t-shadow-sm t-site-header">
        <div class="t-container t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-container-sm t-container t-px-md t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">🎨 Colors</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Color Picker</h1>
            <p class="t-text-xl">Pick colors and get HEX, RGB, HSL values</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm t-container t-px-md">
            <div class="card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-flex t-justify-center t-mb-xl">
                    <input type="color" id="colorPicker" value="#6366f1" class="w-32 h-32 t-rounded-lg cursor-pointer">
                </div>

                <div class="h-24 t-rounded-lg t-mb-xl" id="colorPreview" style="background-color: #6366f1"></div>

                <div class="space-y-4">
                    <div class="t-flex t-items-center t-gap-md">
                        <label class="t-font-medium">HEX</label>
                        <input type="text" id="hex" readonly class="flex-1 p-3 t-rounded border t-font-mono">
                        <button onclick="copyValue('hex')" class="t-px-md py-2 bg-indigo-500 t-text-primary t-rounded">Copy</button>
                    </div>
                    
                    <div class="t-flex t-items-center t-gap-md">
                        <label class="t-font-medium">RGB</label>
                        <input type="text" id="rgb" readonly class="flex-1 p-3 t-rounded border t-font-mono">
                        <button onclick="copyValue('rgb')" class="t-px-md py-2 bg-indigo-500 t-text-primary t-rounded">Copy</button>
                    </div>
                    
                    <div class="t-flex t-items-center t-gap-md">
                        <label class="t-font-medium">HSL</label>
                        <input type="text" id="hsl" readonly class="flex-1 p-3 t-rounded border t-font-mono">
                        <button onclick="copyValue('hsl')" class="t-px-md py-2 bg-indigo-500 t-text-primary t-rounded">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const picker = document.getElementById('colorPicker');
        
        picker.addEventListener('input', updateColor);
        
        function updateColor() {
            const hex = picker.value;
            document.getElementById('colorPreview').style.backgroundColor = hex;
            document.getElementById('hex').value = hex.toUpperCase();
            document.getElementById('rgb').value = hexToRgb(hex);
            document.getElementById('hsl').value = hexToHsl(hex);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
        }

        function copyValue(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        updateColor();
    </script>
