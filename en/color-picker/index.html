<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Color Picker - 205-Tools</title>
    <meta name="description" content="Pick colors and get HEX, RGB, HSL values">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🎨 Colors</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Color Picker</h1>
            <p class="text-xl text-white/90">Pick colors and get HEX, RGB, HSL values</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="flex justify-center mb-8">
                    <input type="color" id="colorPicker" value="#6366f1" class="w-32 h-32 rounded-xl cursor-pointer">
                </div>

                <div class="h-24 rounded-xl mb-8" id="colorPreview" style="background-color: #6366f1"></div>

                <div class="space-y-4">
                    <div class="flex items-center gap-4">
                        <label class="w-16 font-medium">HEX</label>
                        <input type="text" id="hex" readonly class="flex-1 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono">
                        <button onclick="copyValue('hex')" class="px-4 py-2 bg-indigo-500 text-white rounded-lg">Copy</button>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <label class="w-16 font-medium">RGB</label>
                        <input type="text" id="rgb" readonly class="flex-1 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono">
                        <button onclick="copyValue('rgb')" class="px-4 py-2 bg-indigo-500 text-white rounded-lg">Copy</button>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <label class="w-16 font-medium">HSL</label>
                        <input type="text" id="hsl" readonly class="flex-1 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono">
                        <button onclick="copyValue('hsl')" class="px-4 py-2 bg-indigo-500 text-white rounded-lg">Copy</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const picker = document.getElementById('colorPicker');
        
        picker.addEventListener('input', updateColor);
        
        function updateColor() {
            const hex = picker.value;
            document.getElementById('colorPreview').style.backgroundColor = hex;
            document.getElementById('hex').value = hex.toUpperCase();
            document.getElementById('rgb').value = hexToRgb(hex);
            document.getElementById('hsl').value = hexToHsl(hex);
        }

        function hexToRgb(hex) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function hexToHsl(hex) {
            let r = parseInt(hex.slice(1, 3), 16) / 255;
            let g = parseInt(hex.slice(3, 5), 16) / 255;
            let b = parseInt(hex.slice(5, 7), 16) / 255;

            const max = Math.max(r, g, b);
            const min = Math.min(r, g, b);
            let h, s, l = (max + min) / 2;

            if (max === min) {
                h = s = 0;
            } else {
                const d = max - min;
                s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
                switch (max) {
                    case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
                    case g: h = ((b - r) / d + 2) / 6; break;
                    case b: h = ((r - g) / d + 4) / 6; break;
                }
            }

            return `hsl(${Math.round(h * 360)}, ${Math.round(s * 100)}%, ${Math.round(l * 100)}%)`;
        }

        function copyValue(id) {
            const el = document.getElementById(id);
            el.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        updateColor();
    </script>
</body>
</html>
