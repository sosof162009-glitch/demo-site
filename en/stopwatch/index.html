<body>
    <header class="card t-shadow-sm t-site-header">
        <div class="t-container t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-container-sm t-container t-px-md t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">⏱️ Time</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Stopwatch</h1>
            <p class="t-text-xl">Simple stopwatch with lap times</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm t-container t-px-md">
            <div class="card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-text-center t-mb-xl">
                    <p class="text-7xl t-font-bold text-indigo-600 t-font-mono" id="display">00:00:00</p>
                    <p class="t-text-2xl t-font-mono t-mt-sm" id="ms">.00</p>
                </div>

                <div class="t-flex t-justify-center t-gap-md t-mb-xl">
                    <button onclick="start()" id="startBtn" class="px-8 t-py-sm bg-green-500 t-text-primary t-rounded-lg t-font-semibold t-text-lg">Start</button>
                    <button onclick="stop()" id="stopBtn" class="px-8 t-py-sm bg-red-500 t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hidden">Stop</button>
                    <button onclick="lap()" id="lapBtn" class="px-8 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hidden">Lap</button>
                    <button onclick="reset()" class="px-8 t-py-sm bg-gray-500 t-text-primary t-rounded-lg t-font-semibold t-text-lg">Reset</button>
                </div>

                <div id="laps" class="t-rounded t-p-md max-h-64 overflow-y-auto t-hidden">
                    <h3 class="t-font-semibold t-mb-md">Lap Times</h3>
                    <div id="lapList"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let startTime = 0;
        let elapsedTime = 0;
        let timerInterval = null;
        let running = false;
        let lapCount = 0;

        function formatTime(ms) {
            const date = new Date(ms);
            const m = date.getUTCMinutes().toString().padStart(2, '0');
            const s = date.getUTCSeconds().toString().padStart(2, '0');
            const h = date.getUTCHours().toString().padStart(2, '0');
            const milli = Math.floor(date.getUTCMilliseconds() / 10).toString().padStart(2, '0');
            return { time: `${h}:${m}:${s}`, ms: `.${milli}` };
        }

        function updateDisplay() {
            const currentTime = Date.now();
            const time = elapsedTime + (running ? currentTime - startTime : 0);
            const formatted = formatTime(time);
            document.getElementById('display').textContent = formatted.time;
            document.getElementById('ms').textContent = formatted.ms;
        }

        function start() {
            if (!running) {
                running = true;
                startTime = Date.now();
                timerInterval = setInterval(updateDisplay, 10);
                document.getElementById('startBtn').classList.add('hidden');
                document.getElementById('stopBtn').classList.remove('hidden');
                document.getElementById('lapBtn').classList.remove('hidden');
            }
        }

        function stop() {
            if (running) {
                running = false;
                elapsedTime += Date.now() - startTime;
                clearInterval(timerInterval);
                document.getElementById('startBtn').classList.remove('hidden');
                document.getElementById('stopBtn').classList.add('hidden');
                document.getElementById('lapBtn').classList.add('hidden');
            }
        }

        function lap() {
            if (running) {
                lapCount++;
                const currentTime = elapsedTime + (Date.now() - startTime);
                const formatted = formatTime(currentTime);
                const lapItem = document.createElement('div');
                lapItem.className = 'flex justify-between py-2 border-b dark:border-gray-600 last:border-0';
                lapItem.innerHTML = `<span>Lap ${lapCount}</span><span class="t-font-mono">${formatted.time}${formatted.ms}</span>`;
                document.getElementById('lapList').appendChild(lapItem);
                document.getElementById('laps').classList.remove('hidden');
            }
        }

        function reset() {
            stop();
            elapsedTime = 0;
            lapCount = 0;
            document.getElementById('display').textContent = '00:00:00';
            document.getElementById('ms').textContent = '.00';
            document.getElementById('lapList').innerHTML = '';
            document.getElementById('laps').classList.add('hidden');
        }
    </script>
</body>
