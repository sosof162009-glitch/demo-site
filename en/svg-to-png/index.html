<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SVG to PNG - 205-Tools</title>
    <meta name="description" content="Convert SVG to PNG format">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🖼️ Image</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">SVG to PNG</h1>
            <p class="text-xl text-white/90">Convert SVG to PNG format</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="flex gap-4 mb-8">
                    <button onclick="showUpload()" id="btnUpload" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium">Upload SVG</button>
                    <button onclick="showCode()" id="btnCode" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium">Paste Code</button>
                </div>

                <!-- Upload Section -->
                <div id="uploadSection">
                    <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-8 text-center mb-8" id="dropZone">
                        <input type="file" id="fileInput" accept=".svg" class="hidden">
                        <p class="text-lg mb-2">Drag & drop SVG here</p>
                        <p class="text-sm text-gray-500">or</p>
                        <button onclick="document.getElementById('fileInput').click()" class="mt-2 px-6 py-2 bg-indigo-500 text-white rounded-lg">Browse Files</button>
                    </div>
                </div>

                <!-- Code Section -->
                <div id="codeSection" class="hidden">
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                        <label class="block text-sm font-medium mb-2">SVG Code</label>
                        <textarea id="svgCode" rows="6" placeholder="<svg xmlns='http://www.w3.org/2000/svg'...>" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-xs"></textarea>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Width (px)</label>
                        <input type="number" id="width" value="512" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Height (px)</label>
                        <input type="number" id="height" value="512" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                </div>

                <button onclick="convertToPNG()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Convert to PNG
                </button>

                <div id="preview" class="hidden mt-8 text-center">
                    <img id="previewImg" class="max-h-64 mx-auto rounded-lg border dark:border-gray-600">
                </div>

                <div id="result" class="hidden mt-8">
                    <a id="downloadLink" class="block w-full py-4 bg-green-500 text-white rounded-xl font-semibold text-lg text-center hover:bg-green-600 transition-all">Download PNG</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        function showUpload() {
            document.getElementById('uploadSection').classList.remove('hidden');
            document.getElementById('codeSection').classList.add('hidden');
            document.getElementById('btnUpload').classList.add('bg-indigo-500', 'text-white');
            document.getElementById('btnUpload').classList.remove('bg-gray-200', 'dark:bg-gray-700');
            document.getElementById('btnCode').classList.remove('bg-indigo-500', 'text-white');
            document.getElementById('btnCode').classList.add('bg-gray-200', 'dark:bg-gray-700');
        }

        function showCode() {
            document.getElementById('uploadSection').classList.add('hidden');
            document.getElementById('codeSection').classList.remove('hidden');
            document.getElementById('btnCode').classList.add('bg-indigo-500', 'text-white');
            document.getElementById('btnCode').classList.remove('bg-gray-200', 'dark:bg-gray-700');
            document.getElementById('btnUpload').classList.remove('bg-indigo-500', 'text-white');
            document.getElementById('btnUpload').classList.add('bg-gray-200', 'dark:bg-gray-700');
        }

        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let svgContent = null;

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-indigo-50', 'dark:bg-indigo-900/20');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/20');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/20');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                svgContent = e.target.result;
            };
            reader.readAsText(file);
        }

        function convertToPNG() {
            const width = parseInt(document.getElementById('width').value) || 512;
            const height = parseInt(document.getElementById('height').value) || 512;
            
            let svg = svgContent || document.getElementById('svgCode').value;
            
            if (!svg) {
                alert('Please upload an SVG file or paste SVG code');
                return;
            }

            // Create canvas
            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // Create image from SVG
            const img = new Image();
            const svgBlob = new Blob([svg], { type: 'image/svg+xml;charset=utf-8' });
            const url = URL.createObjectURL(svgBlob);

            img.onload = function() {
                ctx.drawImage(img, 0, 0, width, height);
                URL.revokeObjectURL(url);

                // Show preview
                document.getElementById('previewImg').src = canvas.toDataURL('image/png');
                document.getElementById('preview').classList.remove('hidden');

                // Create download link
                canvas.toBlob(function(blob) {
                    const downloadUrl = URL.createObjectURL(blob);
                    const link = document.getElementById('downloadLink');
                    link.href = downloadUrl;
                    link.download = 'converted.png';
                    document.getElementById('result').classList.remove('hidden');
                });
            };

            img.src = url;
        }
    </script>
</body>
</html>
