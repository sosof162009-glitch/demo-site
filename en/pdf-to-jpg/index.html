<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to JPG Converter - 205-Tools</title>
    <meta name="description" content="Convert PDF pages to JPG images">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
        pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    </script>
    <style>
        .drop-zone { border: 2px dashed #6366f1; transition: all 0.3s; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #4f46e5; background: rgba(99, 102, 241, 0.05); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📄 PDF</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">PDF to JPG Converter</h1>
            <p class="text-xl text-white/90">Convert PDF pages to JPG images</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="drop-zone rounded-xl p-12 text-center cursor-pointer mb-8" id="dropZone">
                    <div class="text-5xl mb-4">📁</div>
                    <p class="text-lg font-medium mb-2">Drag & drop your PDF here</p>
                    <p class="text-gray-500">or browse</p>
                    <input type="file" class="hidden" id="fileInput" accept=".pdf">
                </div>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Quality (DPI)</label>
                    <select id="quality" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                        <option value="1.0">Low (72 DPI) - Smaller file</option>
                        <option value="1.5" selected>Medium (150 DPI) - Balanced</option>
                        <option value="2.0">High (200 DPI) - Better quality</option>
                    </select>
                </div>

                <button onclick="convertPDF()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Convert to JPG
                </button>

                <div id="result" class="hidden mt-8">
                    <p class="text-gray-600 dark:text-gray-400 mb-4" id="status"></p>
                    <div id="images" class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-6"></div>
                    
                    <button onclick="downloadAll()" class="w-full py-3 bg-green-500 text-white rounded-xl font-medium hover:bg-green-600">
                        Download All as ZIP
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let currentFile = null;
        let convertedImages = [];

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                currentFile = e.dataTransfer.files[0];
                dropZone.querySelector('p').textContent = currentFile.name;
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                currentFile = fileInput.files[0];
                dropZone.querySelector('p').textContent = currentFile.name;
            }
        });

        async function convertPDF() {
            if (!currentFile) {
                alert('Please select a PDF file');
                return;
            }

            const btn = document.querySelector('button[onclick="convertPDF()"]');
            btn.textContent = 'Converting...';
            btn.disabled = true;

            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                const scale = parseFloat(document.getElementById('quality').value);
                
                convertedImages = [];
                const imagesDiv = document.getElementById('images');
                imagesDiv.innerHTML = '';

                document.getElementById('status').textContent = `Converting ${pdf.numPages} pages...`;
                document.getElementById('result').classList.remove('hidden');

                for (let i = 1; i <= pdf.numPages; i++) {
                    const page = await pdf.getPage(i);
                    const viewport = page.getViewport({ scale });
                    
                    const canvas = document.createElement('canvas');
                    const ctx = canvas.getContext('2d');
                    canvas.width = viewport.width;
                    canvas.height = viewport.height;
                    
                    await page.render({ canvasContext: ctx, viewport }).promise;
                    
                    const dataUrl = canvas.toDataURL('image/jpeg', 0.9);
                    convertedImages.push({ name: `page_${i}.jpg`, data: dataUrl });
                    
                    const img = document.createElement('img');
                    img.src = dataUrl;
                    img.className = 'w-full rounded-lg border';
                    img.title = `Page ${i}`;
                    imagesDiv.appendChild(img);
                }

                document.getElementById('status').textContent = `Converted ${convertedImages.length} pages successfully!`;

            } catch (error) {
                alert('Error: ' + error.message);
            }

            btn.textContent = 'Convert to JPG';
            btn.disabled = false;
        }

        function downloadAll() {
            convertedImages.forEach(img => {
                const link = document.createElement('a');
                link.href = img.data;
                link.download = img.name;
                link.click();
            });
        }
    </script>
</body>
</html>
