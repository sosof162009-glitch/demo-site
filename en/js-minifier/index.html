<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JS Minifier - 205-Tools</title>
    <meta name="description" content="Minify JavaScript code">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">💻 Developers</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">JS Minifier</h1>
            <p class="text-xl text-white/90">Minify JavaScript code</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">JavaScript Input</label>
                    <textarea id="input" rows="10" placeholder="// Your JavaScript here" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-sm"></textarea>
                </div>

                <button onclick="minifyJS()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Minify JS
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Minified Output</label>
                    <textarea id="output" rows="6" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-xs"></textarea>
                </div>

                <div id="stats" class="hidden bg-green-50 dark:bg-green-900/20 p-4 rounded-xl mb-8">
                    <p class="text-green-600 dark:text-green-400 text-center">Saved <span id="saved" class="font-bold"></span> bytes (<span id="percent"></span>%)</p>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="clearAll()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function minifyJS() {
            const input = document.getElementById('input').value;
            if (!input) return;

            const originalLength = input.length;

            // Basic JS minification (safe transformations)
            let minified = input
                .replace(/\/\*[\s\S]*?\*\//g, '') // Remove block comments
                .replace(/\/\/.*$/gm, '') // Remove line comments
                .replace(/\n\s*/g, '') // Remove newlines and leading whitespace
                .replace(/;\s*}/g, '}') // Remove semicolon before }
                .replace(/{\s+/g, '{') // Remove space after {
                .replace(/}\s+/g, '}') // Remove space after }
                .replace(/;\s+/g, ';') // Remove space after ;
                .replace(/,\s+/g, ',') // Remove space after ,
                .replace(/:\s+/g, ':') // Remove space after :
                .replace(/=\s+/g, '=') // Remove space after =
                .trim();

            document.getElementById('output').value = minified;

            const saved = originalLength - minified.length;
            const percent = ((saved / originalLength) * 100).toFixed(1);

            document.getElementById('saved').textContent = saved;
            document.getElementById('percent').textContent = percent;
            document.getElementById('stats').classList.remove('hidden');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('stats').classList.add('hidden');
        }
    </script>
</body>
</html>
