<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text Reverser - 205-Tools</title>
    <meta name="description" content="Reverse text or words">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">­¤īÖ</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">­¤ōØ Text</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Text Reverser</h1>
            <p class="text-xl text-white/90">Reverse text or words</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Input Text</label>
                    <textarea id="input" rows="6" placeholder="Enter text..." class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div class="flex gap-4 mb-8">
                    <button onclick="reverseText()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium">Reverse Characters</button>
                    <button onclick="reverseWords()" class="flex-1 py-3 bg-purple-500 text-white rounded-xl font-medium">Reverse Words</button>
                    <button onclick="flipText()" class="flex-1 py-3 bg-pink-500 text-white rounded-xl font-medium">Flip Text (Ōå»)</button>
                </div>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Result</label>
                    <textarea id="output" rows="6" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="clearAll()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function reverseText() {
            const input = document.getElementById('input').value;
            document.getElementById('output').value = input.split('').reverse().join('');
        }

        function reverseWords() {
            const input = document.getElementById('input').value;
            document.getElementById('output').value = input.split(/\s+/).reverse().join(' ');
        }

        function flipText() {
            const flipMap = {
                'a': '╔É', 'b': 'q', 'c': '╔ö', 'd': 'p', 'e': 'ŪØ', 'f': '╔¤', 'g': 'Ųā', 'h': '╔ź',
                'i': 'ß┤ē', 'j': '╔Š', 'k': '╩×', 'l': 'l', 'm': '╔»', 'n': 'u', 'o': 'o', 'p': 'd',
                'q': 'b', 'r': '╔╣', 's': 's', 't': '╩ć', 'u': 'n', 'v': '╩ī', 'w': '╩Ź', 'x': 'x',
                'y': '╩Ä', 'z': 'z', 'A': 'ŌłĆ', 'B': 'q', 'C': 'Ųå', 'D': 'p', 'E': 'ŲÄ', 'F': 'Ōä▓',
                'G': 'ūż', 'H': 'H', 'I': 'I', 'J': '┼┐', 'K': '╩×', 'L': '╦ź', 'M': 'W', 'N': 'N',
                'O': 'O', 'P': 'd', 'Q': 'b', 'R': '╔╣', 'S': 'S', 'T': 'Ōö┤', 'U': 'Ōł®', 'V': '╬ø',
                'W': 'M', 'X': 'X', 'Y': 'Ōģä', 'Z': 'Z', '1': 'Ų¢', '2': 'ßäģ', '3': 'ŲÉ', '4': 'h',
                '5': 'S', '6': '9', '7': 'L', '8': '8', '9': '6', '0': '0', '.': '╦Ö', ',': "'",
                "'": ',', '?': '┬┐', '!': '┬Ī', '(': ')', ')': '(', '[': ']', ']': '[', '{': '}',
                '}': '{', '<': '>', '>': '<', '&': 'Ōģŗ', '_': 'ŌĆŠ'
            };
            
            const input = document.getElementById('input').value;
            const flipped = input.split('').map(c => flipMap[c] || c).reverse().join('');
            document.getElementById('output').value = flipped;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }
    </script>
</body>
</html>
