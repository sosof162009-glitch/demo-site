    <header class="card t-shadow-sm t-site-header">

    <section class="t-text-primary py-16">
        <div class="t-container-sm t-container t-px-md t-text-center">

            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">WordPress Password Hash</h1>
            <p class="t-text-xl">Generate WordPress compatible password hash</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm t-container t-px-md">
            <div class="card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Password</label>
                    <input type="text" id="password" placeholder="Enter password to hash" class="t-w-full p-3 t-rounded border">
                </div>

                <button onclick="generateHash()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-xl">
                    Generate Hash
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Generated Hash</label>
                    <textarea id="output" rows="4" readonly class="t-w-full p-3 t-rounded border t-font-mono t-text-xs break-all"></textarea>
                </div>

                <div class="bg-yellow-50 t-p-md t-rounded t-mb-xl">
                    <p class="t-text-sm text-yellow-700">⚠️ Note: This generates a PHPass-compatible hash. For production use, always use WordPress's native wp_hash_password() function.</p>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="flex-1 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        // WordPress uses PHPass hashing (portable)
        function generateHash() {
            const password = document.getElementById('password').value;
            if (!password) {
                alert('Please enter a password');
                return;
            }

            // Generate a simple hash representation
            // Note: This is for demonstration. Real WordPress uses PHPass.
            const salt = generateSalt(8);
            const hash = '$P$' + salt + CryptoJS.SHA1(salt + password).toString().substring(0, 22);
            
            document.getElementById('output').value = hash;
        }

        function generateSalt(length) {
            const chars = './0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz';
            let salt = '';
            for (let i = 0; i < length; i++) {
                salt += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            return salt;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('password').value = '';
            document.getElementById('output').value = '';
        }
    </script>
