<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">📝 Text</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Line Sorter</h1>
            <p class="t-text-xl">Sort lines alphabetically</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Input Text</label>
                    <textarea id="input" rows="8" placeholder="Paste lines to sort..." class="t-w-full t-p-sm t-rounded t-border"></textarea>
                </div>

                <div class="t-flex t-gap-md t-mb-xl">
                    <button onclick="sortLines('asc')" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium">A → Z</button>
                    <button onclick="sortLines('desc')" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium">Z → A</button>
                    <button onclick="sortLines('reverse')" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium">Reverse</button>
                </div>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Result</label>
                    <textarea id="output" rows="8" readonly class="t-w-full t-p-sm t-rounded t-border"></textarea>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="btn t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="t-flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function sortLines(order) {
            const input = document.getElementById('input').value;
            if (!input) return;

            let lines = input.split('\n');

            if (order === 'asc') {
                lines.sort((a, b) => a.localeCompare(b));
            } else if (order === 'desc') {
                lines.sort((a, b) => b.localeCompare(a));
            } else {
                lines.reverse();
            }

            document.getElementById('output').value = lines.join('\n');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }
    </script>
