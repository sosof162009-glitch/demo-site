<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Line Sorter - 205-Tools</title>
    <meta name="description" content="Sort lines alphabetically">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">📝 Text</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Line Sorter</h1>
            <p class="t-text-xl">Sort lines alphabetically</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Input Text</label>
                    <textarea id="input" rows="8" placeholder="Paste lines to sort..." class="t-w-full p-3 t-rounded border"></textarea>
                </div>

                <div class="t-flex t-gap-md t-mb-xl">
                    <button onclick="sortLines('asc')" class="flex-1 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-medium">A → Z</button>
                    <button onclick="sortLines('desc')" class="flex-1 t-py-sm bg-purple-500 t-text-primary t-rounded-lg t-font-medium">Z → A</button>
                    <button onclick="sortLines('reverse')" class="flex-1 t-py-sm bg-pink-500 t-text-primary t-rounded-lg t-font-medium">Reverse</button>
                </div>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Result</label>
                    <textarea id="output" rows="8" readonly class="t-w-full p-3 t-rounded border"></textarea>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="flex-1 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function sortLines(order) {
            const input = document.getElementById('input').value;
            if (!input) return;

            let lines = input.split('\n');

            if (order === 'asc') {
                lines.sort((a, b) => a.localeCompare(b));
            } else if (order === 'desc') {
                lines.sort((a, b) => b.localeCompare(a));
            } else {
                lines.reverse();
            }

            document.getElementById('output').value = lines.join('\n');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }
    </script>
</body>
</html>
