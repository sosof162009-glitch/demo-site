<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">🔗 Text</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">URL Extractor</h1>
            <p class="t-text-xl">Extract URLs from text</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Input Text</label>
                    <textarea id="input" rows="10" placeholder="Paste text containing URLs..." class="t-w-full t-p-sm t-rounded t-border"></textarea>
                </div>

                <button onclick="extract()" class="btn">
                    Extract URLs
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Extracted URLs</label>
                    <textarea id="output" rows="8" readonly class="t-w-full t-p-sm t-rounded t-border t-font-mono t-text-xs"></textarea>
                </div>

                <div id="stats" class="t-hidden t-text-center t-mb-xl t-text-accent">
                    <p>Found <span id="count" class="t-font-bold"></span> unique URLs</p>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="btn t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="t-flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function extract() {
            const input = document.getElementById('input').value;
            if (!input) return;
            
            // URL regex pattern
            const urlPattern = /https?:\/\/(www\.)?[-a-zA-Z0-9@:%._\+~#=]{1,256}\.[a-zA-Z0-9()]{1,6}\b([-a-zA-Z0-9()@:%_\+.~#?&\/\/=]*)/g;
            const matches = input.match(urlPattern) || [];
            
            // Get unique URLs
            const unique = [...new Set(matches)];
            
            document.getElementById('output').value = unique.join('\n');
            document.getElementById('count').textContent = unique.length;
            document.getElementById('stats').classList.remove('hidden');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
            document.getElementById('stats').classList.add('hidden');
        }
    </script>
</body>
