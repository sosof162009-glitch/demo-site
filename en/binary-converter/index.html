    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">💻 Developers</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Binary Converter</h1>
            <p class="t-text-xl">Convert between binary, decimal, hex, and octal</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-space-y-lg t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Decimal</label>
                        <input type="text" id="decimal" placeholder="255" class="t-w-full t-p-sm t-rounded t-border t-font-mono" oninput="fromDecimal(this.value)">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Binary</label>
                        <input type="text" id="binary" placeholder="11111111" class="t-w-full t-p-sm t-rounded t-border t-font-mono" oninput="fromBinary(this.value)">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Hexadecimal</label>
                        <input type="text" id="hex" placeholder="FF" class="t-w-full t-p-sm t-rounded t-border t-font-mono" oninput="fromHex(this.value)">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Octal</label>
                        <input type="text" id="octal" placeholder="377" class="t-w-full t-p-sm t-rounded t-border t-font-mono" oninput="fromOctal(this.value)">
                    </div>
                </div>

                <button onclick="clearAll()" class="t-w-full t-py-sm t-rounded-lg t-font-medium t-transition">
                    Clear All
                </button>
            </div>
        </div>
    </section>

    <script>
        function fromDecimal(val) {
            if (!val || isNaN(val)) return;
            const num = parseInt(val, 10);
            document.getElementById('binary').value = num.toString(2);
            document.getElementById('hex').value = num.toString(16).toUpperCase();
            document.getElementById('octal').value = num.toString(8);
        }

        function fromBinary(val) {
            if (!val || !/^[01]+$/.test(val)) return;
            const num = parseInt(val, 2);
            document.getElementById('decimal').value = num;
            document.getElementById('hex').value = num.toString(16).toUpperCase();
            document.getElementById('octal').value = num.toString(8);
        }

        function fromHex(val) {
            if (!val || !/^[0-9A-Fa-f]+$/.test(val)) return;
            const num = parseInt(val, 16);
            document.getElementById('decimal').value = num;
            document.getElementById('binary').value = num.toString(2);
            document.getElementById('octal').value = num.toString(8);
        }

        function fromOctal(val) {
            if (!val || !/^[0-7]+$/.test(val)) return;
            const num = parseInt(val, 8);
            document.getElementById('decimal').value = num;
            document.getElementById('binary').value = num.toString(2);
            document.getElementById('hex').value = num.toString(16).toUpperCase();
        }

        function clearAll() {
            document.getElementById('decimal').value = '';
            document.getElementById('binary').value = '';
            document.getElementById('hex').value = '';
            document.getElementById('octal').value = '';
        }
    </script>
