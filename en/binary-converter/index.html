<body class="  min-h-screen">
    <header class="card shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">💻 Developers</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Binary Converter</h1>
            <p class="text-xl text-white/90">Convert between binary, decimal, hex, and octal</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="card rounded-2xl shadow-xl p-8">
                <div class="space-y-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Decimal</label>
                        <input type="text" id="decimal" placeholder="255" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono" oninput="fromDecimal(this.value)">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Binary</label>
                        <input type="text" id="binary" placeholder="11111111" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono" oninput="fromBinary(this.value)">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Hexadecimal</label>
                        <input type="text" id="hex" placeholder="FF" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono" oninput="fromHex(this.value)">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Octal</label>
                        <input type="text" id="octal" placeholder="377" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono" oninput="fromOctal(this.value)">
                    </div>
                </div>

                <button onclick="clearAll()" class="w-full py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">
                    Clear All
                </button>
            </div>
        </div>
    </section>

    <script>
        function fromDecimal(val) {
            if (!val || isNaN(val)) return;
            const num = parseInt(val, 10);
            document.getElementById('binary').value = num.toString(2);
            document.getElementById('hex').value = num.toString(16).toUpperCase();
            document.getElementById('octal').value = num.toString(8);
        }

        function fromBinary(val) {
            if (!val || !/^[01]+$/.test(val)) return;
            const num = parseInt(val, 2);
            document.getElementById('decimal').value = num;
            document.getElementById('hex').value = num.toString(16).toUpperCase();
            document.getElementById('octal').value = num.toString(8);
        }

        function fromHex(val) {
            if (!val || !/^[0-9A-Fa-f]+$/.test(val)) return;
            const num = parseInt(val, 16);
            document.getElementById('decimal').value = num;
            document.getElementById('binary').value = num.toString(2);
            document.getElementById('octal').value = num.toString(8);
        }

        function fromOctal(val) {
            if (!val || !/^[0-7]+$/.test(val)) return;
            const num = parseInt(val, 8);
            document.getElementById('decimal').value = num;
            document.getElementById('binary').value = num.toString(2);
            document.getElementById('hex').value = num.toString(16).toUpperCase();
        }

        function clearAll() {
            document.getElementById('decimal').value = '';
            document.getElementById('binary').value = '';
            document.getElementById('hex').value = '';
            document.getElementById('octal').value = '';
        }
    </script>
</body>
