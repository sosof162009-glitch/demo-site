<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hex to Decimal - 205-Tools</title>
    <meta name="description" content="Converts hexadecimal (base 16) numbers to decimal with step-by-step explanation.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
    <style>
        .tool-card { transition: all 0.2s; }
        .tool-card:hover { transform: translateY(-2px); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.2); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</span>
                </a>
                <div class="hidden md:flex items-center space-x-8">
                    <a href="/en/" class="text-gray-600 dark:text-gray-300 hover:text-indigo-500">Home</a>
                </div>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔢 Math</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Hex to Decimal</h1>
            <p class="text-xl text-white/90">Free • Fast • Secure</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <div class="text-6xl mb-4">🔢</div>
                    <p class="text-gray-600 dark:text-gray-400">Converts hexadecimal (base 16) numbers to decimal with step-by-step explanation.</p>
                </div>
                
                <div class="grid md:grid-cols-1 gap-6 mb-8">
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-2">Hexadecimal Number</label>
                        <input type="text" id="hexInput" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono uppercase" placeholder="e.g. 2A or FF">
                        <p class="text-xs text-gray-500 mt-1">Enter hex digits (0-9, A-F)</p>
                    </div>
                </div>

                <button onclick="calculate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all" id="actionBtn">
                    Convert to Decimal
                </button>

                <div id="result" class="hidden mt-8">
                    <div class="p-6 bg-green-50 dark:bg-green-900/20 rounded-xl text-center mb-6">
                        <p class="text-gray-600 dark:text-gray-400 mb-2">Decimal Value</p>
                        <p class="text-3xl font-bold text-green-600 dark:text-green-400" id="resultValue">-</p>
                        <button onclick="copyResult()" class="mt-4 px-4 py-2 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 text-sm">Copy Result</button>
                    </div>
                    
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-4">
                        <h3 class="font-semibold mb-3">Conversion Breakdown</h3>
                        <div id="breakdown" class="text-sm space-y-1 font-mono"></div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="py-12 bg-gray-100 dark:bg-gray-800/50">
        <div class="max-w-6xl mx-auto px-4">
            <h2 class="text-2xl font-bold text-center mb-8">Related Tools</h2>
            <div class="grid md:grid-cols-2 gap-4">
                <a href="/en/decimal-to-hex/" class="tool-card flex items-center space-x-3 p-4 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 hover:border-primary transition-all">
                    <span class="text-2xl">🔢</span>
                    <span class="font-medium">Decimal to Hex</span>
                </a>
                <a href="/en/binary-to-decimal/" class="tool-card flex items-center space-x-3 p-4 bg-white dark:bg-gray-800 rounded-xl border dark:border-gray-700 hover:border-primary transition-all">
                    <span class="text-2xl">🔢</span>
                    <span class="font-medium">Binary to Decimal</span>
                </a>
            </div>
        </div>
    </section>

    <footer class="bg-gray-900 text-white py-8">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-400">© 2025 205-Tools - Free</p>
        </div>
    </footer>

    <script>
        function calculate() {
            const btn = document.getElementById('actionBtn');
            const result = document.getElementById('result');
            const resultValue = document.getElementById('resultValue');
            const breakdownDiv = document.getElementById('breakdown');
            const hexInput = document.getElementById('hexInput').value.trim();
            
            if (!hexInput) {
                alert('Please enter a hexadecimal number');
                return;
            }
            
            // Validate hex input
            if (!/^[0-9A-Fa-f]+$/.test(hexInput)) {
                alert('Please enter a valid hexadecimal number (0-9, A-F)');
                return;
            }
            
            btn.textContent = 'Converting...';
            btn.disabled = true;
            
            setTimeout(() => {
                // Convert to decimal
                const decimal = parseInt(hexInput, 16);
                resultValue.textContent = decimal;
                
                // Generate breakdown
                const hex = hexInput.toUpperCase();
                const hexChars = hex.split('').reverse();
                let breakdown = [];
                let total = 0;
                
                hexChars.forEach((char, index) => {
                    const value = parseInt(char, 16);
                    const power = Math.pow(16, index);
                    const contribution = value * power;
                    total += contribution;
                    breakdown.push(`${char} × 16^${index} = ${value} × ${power} = ${contribution}`);
                });
                
                breakdown.push(`<br>Sum: ${breakdown.map(b => b.match(/= (\d+)$/)[1]).join(' + ')} = ${total}`);
                breakdownDiv.innerHTML = breakdown.join('<br>');
                
                result.classList.remove('hidden');
                btn.textContent = 'Convert to Decimal';
                btn.disabled = false;
            }, 300);
        }
        
        function copyResult() {
            const resultValue = document.getElementById('resultValue').textContent;
            navigator.clipboard.writeText(resultValue).then(() => {
                alert('Copied to clipboard!');
            });
        }
        
        document.getElementById('hexInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') calculate();
        });
    </script>
</body>
</html>
