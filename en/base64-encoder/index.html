    <script>
    // Code Editor Logic
function initCodeEditor(language) {
    const codeEditor = document.getElementById('codeEditor');
    const statusBadge = document.getElementById('statusBadge');
    const charCount = document.getElementById('charCount');
    
    codeEditor.addEventListener('input', () => {
        const len = codeEditor.value.length;
        charCount.textContent = len + ' chars';
        
        if (len > 0) {
            updateStatus('typing', 'Typing...');
        } else {
            updateStatus('ready', 'Ready');
        }
    });
    
    function updateStatus(type, message) {
        const colors = {
            ready: 'bg-gray-400',
            typing: 'bg-yellow-400',
            success: 'bg-green-400',
            error: 'bg-red-400'
        };
        
        statusBadge.innerHTML = `
            <span class="w-2 h-2 rounded-full ${colors[type] || colors.ready}"></span>
            ${message}
        `;
        statusBadge.className = 'status-badge ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
    }
    
    window.formatCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                const parsed = JSON.parse(code);
                codeEditor.value = JSON.stringify(parsed, null, 2);
            } else if (language === 'html') {
                codeEditor.value = formatHTML(code);
            } else if (language === 'css') {
                codeEditor.value = formatCSS(code);
            } else if (language === 'js') {
                codeEditor.value = formatJS(code);
            } else if (language === 'sql') {
                codeEditor.value = formatSQL(code);
            } else {
                codeEditor.value = code; // No formatter available
            }
            
            updateStatus('success', 'Formatted!');
            showToast('Code formatted successfully!');
        } catch (err) {
            updateStatus('error', 'Invalid ' + language.toUpperCase());
            showToast('Error: ' + err.message);
        }
    };
    
    window.minifyCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                const parsed = JSON.parse(code);
                codeEditor.value = JSON.stringify(parsed);
            } else if (language === 'html' || language === 'css' || language === 'js') {
                codeEditor.value = code
                    .replace(/\/\*[\s\S]*?\*\//g, '')
                    .replace(/\/\/.*$/gm, '')
                    .replace(/\s+/g, ' ')
                    .trim();
            } else {
                codeEditor.value = code.replace(/\s+/g, ' ').trim();
            }
            
            updateStatus('success', 'Minified!');
            showToast('Code minified successfully!');
        } catch (err) {
            updateStatus('error', 'Error');
            showToast('Error: ' + err.message);
        }
    };
    
    window.validateCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                JSON.parse(code);
                updateStatus('success', 'Valid JSON!');
                showToast('Valid JSON!');
            } else {
                updateStatus('success', 'Validated!');
                showToast('Code looks good!');
            }
        } catch (err) {
            updateStatus('error', 'Invalid ' + language.toUpperCase());
            showToast('Invalid: ' + err.message);
        }
    };
    
    window.clearCode = function() {
        codeEditor.value = '';
        charCount.textContent = '0 chars';
        updateStatus('ready', 'Ready');
        showToast('Editor cleared!');
    };
    
    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(codeEditor.value);
            showToast('Copied to clipboard!');
        } catch (err) {
            codeEditor.select();
            document.execCommand('copy');
            showToast('Copied to clipboard!');
        }
    };
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.classList.remove('hidden');
        toast.classList.add('flex');
        setTimeout(() => {
            toast.classList.add('hidden');
            toast.classList.remove('flex');
        }, 2000);
    }
    
    function formatHTML(html) {
        // Simple HTML formatter
        return html.replace(/\u003e\s*\u003c/g, '>\n\u003c');
    }
    
    function formatCSS(css) {
        // Simple CSS formatter
        return css.replace(/;/g, ';\n').replace(/{/g, '{\n').replace(/}/g, '\n}');
    }
    
    function formatJS(js) {
        // Simple JS formatter
        return js.replace(/;/g, ';\n').replace(/{/g, '{\n').replace(/}/g, '\n}');
    }
    
    function formatSQL(sql) {
        // Simple SQL formatter
        const keywords = ['SELECT', 'FROM', 'WHERE', 'INSERT', 'UPDATE', 'DELETE', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'ON', 'GROUP', 'ORDER', 'BY', 'HAVING', 'LIMIT', 'AND', 'OR'];
        let formatted = sql;
        keywords.forEach(kw => {
            const regex = new RegExp('\\b' + kw + '\\b', 'gi');
            formatted = formatted.replace(regex, '\n' + kw);
        });
        return formatted.trim();
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initCodeEditor('text');
    });
  </script>

<body class="  min-h-screen">
    <header class="card shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">💻 Developers</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Base64 Encoder/Decoder</h1>
            <p class="text-xl text-white/90">Encode and decode Base64</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="card rounded-2xl shadow-xl p-8">
                <div class="flex gap-4 mb-8">
                    <button onclick="setMode('encode')" id="btnEncode" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium">Encode</button>
                    <button onclick="setMode('decode')" id="btnDecode" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium">Decode</button>
                </div>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2"><span id="inputLabel">Text to Encode</span></label>
                    <textarea id="input" rows="6" placeholder="Enter text..." class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <button onclick="processBase64()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Process
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Result</label>
                    <div class="flex gap-4">
                        <textarea id="output" rows="6" readonly class="flex-1 p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-sm"></textarea>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="clearAll()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let mode = 'encode';

        function setMode(m) {
            mode = m;
            document.getElementById('btnEncode').className = m === 'encode' ? 'flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium' : 'flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium';
            document.getElementById('btnDecode').className = m === 'decode' ? 'flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium' : 'flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium';
            document.getElementById('inputLabel').textContent = m === 'encode' ? 'Text to Encode' : 'Base64 to Decode';
        }

        function processBase64() {
            const input = document.getElementById('input').value;
            
            try {
                if (mode === 'encode') {
                    document.getElementById('output').value = btoa(input);
                } else {
                    document.getElementById('output').value = atob(input);
                }
            } catch (e) {
                alert('Error: ' + e.message);
            }
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }
    </script>
