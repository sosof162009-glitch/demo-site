<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sitemap Generator - 205-Tools</title>
    <meta name="description" content="Generate XML sitemap">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">🔍 SEO</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Sitemap Generator</h1>
            <p class="t-text-xl">Generate XML sitemap for your website</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Base URL</label>
                    <input type="url" id="baseUrl" placeholder="https://example.com" class="t-w-full p-3 t-rounded border t-mb-md">

                    <label class="t-block t-text-sm t-font-medium t-mb-sm">URLs (one per line)</label>
                    <textarea id="urls" rows="10" placeholder="/&#10;/about&#10;/contact&#10;/products/item1&#10;/blog/post-1" class="t-w-full p-3 t-rounded border t-font-mono t-text-sm"></textarea>
                </div>

                <button onclick="generate()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-xl">
                    Generate Sitemap
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Generated Sitemap XML</label>
                    <textarea id="output" rows="15" readonly class="t-w-full p-3 t-rounded border t-font-mono t-text-xs"></textarea>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="flex-1 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="downloadXML()" class="flex-1 t-py-sm bg-green-500 t-text-primary t-rounded-lg t-font-medium t-transition">Download XML</button>
                    <button onclick="clearAll()" class="flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const urls = document.getElementById('urls').value.trim().split('\n').filter(u => u.trim());

            if (!baseUrl) {
                alert('Please enter a base URL');
                return;
            }

            if (urls.length === 0) {
                alert('Please enter at least one URL path');
                return;
            }

            const today = new Date().toISOString().split('T')[0];

            let sitemap = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            sitemap += `<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;

            urls.forEach(url => {
                const fullUrl = baseUrl.replace(/\/$/, '') + '/' + url.replace(/^\//, '');
                sitemap += `  <url>\n`;
                sitemap += `    <loc>${escapeXml(fullUrl)}</loc>\n`;
                sitemap += `    <lastmod>${today}</lastmod>\n`;
                sitemap += `    <changefreq>weekly</changefreq>\n`;
                sitemap += `    <priority>0.8</priority>\n`;
                sitemap += `  </url>\n`;
            });

            sitemap += `</urlset>`;

            document.getElementById('output').value = sitemap;
        }

        function escapeXml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function downloadXML() {
            const output = document.getElementById('output').value;
            if (!output) return;
            
            const blob = new Blob([output], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sitemap.xml';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            document.getElementById('baseUrl').value = '';
            document.getElementById('urls').value = '';
            document.getElementById('output').value = '';
        }
    </script>
</body>
</html>
