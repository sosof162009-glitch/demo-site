<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">🔍 SEO</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Sitemap Generator</h1>
            <p class="t-text-xl">Generate XML sitemap for your website</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Base URL</label>
                    <input type="url" id="baseUrl" placeholder="https://example.com" class="t-w-full t-p-sm t-rounded t-border t-mb-md">

                    <label class="t-block t-text-sm t-font-medium t-mb-sm">URLs (one per line)</label>
                    <textarea id="urls" rows="10" placeholder="/&#10;/about&#10;/contact&#10;/products/item1&#10;/blog/post-1" class="t-w-full t-p-sm t-rounded t-border t-font-mono t-text-sm"></textarea>
                </div>

                <button onclick="generate()" class="btn">
                    Generate Sitemap
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Generated Sitemap XML</label>
                    <textarea id="output" rows="15" readonly class="t-w-full t-p-sm t-rounded t-border t-font-mono t-text-xs"></textarea>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="downloadXML()" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium t-transition">Download XML</button>
                    <button onclick="clearAll()" class="t-flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const baseUrl = document.getElementById('baseUrl').value.trim();
            const urls = document.getElementById('urls').value.trim().split('\n').filter(u => u.trim());

            if (!baseUrl) {
                alert('Please enter a base URL');
                return;
            }

            if (urls.length === 0) {
                alert('Please enter at least one URL path');
                return;
            }

            const today = new Date().toISOString().split('T')[0];

            let sitemap = `<?xml version="1.0" encoding="UTF-8"?>\n`;
            sitemap += `<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n`;

            urls.forEach(url => {
                const fullUrl = baseUrl.replace(/\/$/, '') + '/' + url.replace(/^\//, '');
                sitemap += `  <url>\n`;
                sitemap += `    <loc>${escapeXml(fullUrl)}</loc>\n`;
                sitemap += `    <lastmod>${today}</lastmod>\n`;
                sitemap += `    <changefreq>weekly</changefreq>\n`;
                sitemap += `    <priority>0.8</priority>\n`;
                sitemap += `  </url>\n`;
            });

            sitemap += `</urlset>`;

            document.getElementById('output').value = sitemap;
        }

        function escapeXml(text) {
            return text
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&apos;');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function downloadXML() {
            const output = document.getElementById('output').value;
            if (!output) return;
            
            const blob = new Blob([output], { type: 'application/xml' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'sitemap.xml';
            a.click();
            URL.revokeObjectURL(url);
        }

        function clearAll() {
            document.getElementById('baseUrl').value = '';
            document.getElementById('urls').value = '';
            document.getElementById('output').value = '';
        }
    </script>
