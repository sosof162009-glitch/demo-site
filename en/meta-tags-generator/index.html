    <script>
    // Text Analyzer Logic
function initTextAnalyzer() {
    const textInput = document.getElementById('textInput');
    
    textInput.addEventListener('input', analyzeText);
    
    function analyzeText() {
        const text = textInput.value;
        
        // Word count
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        animateNumber('wordCount', words);
        
        // Character count
        animateNumber('charCount', text.length);
        
        // Characters without spaces
        animateNumber('charCountNoSpaces', text.replace(/\s/g, '').length);
        
        // Sentences
        const sentences = text.trim() === '' ? 0 : text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
        animateNumber('sentenceCount', sentences);
        
        // Paragraphs
        const paragraphs = text.trim() === '' ? 0 : text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;
        animateNumber('paragraphCount', paragraphs || (text.trim() ? 1 : 0));
        
        // Reading time (avg 200 wpm)
        const readingMinutes = words / 200;
        document.getElementById('readingTime').textContent = formatTime(readingMinutes);
        
        // Speaking time (avg 130 wpm)
        const speakingMinutes = words / 130;
        document.getElementById('speakingTime').textContent = formatTime(speakingMinutes);
        
        // Update timestamp
        const now = new Date();
        document.getElementById('lastUpdated').textContent = 'Updated ' + now.toLocaleTimeString();
    }
    
    function animateNumber(id, target) {
        const element = document.getElementById(id);
        element.textContent = target;
        element.style.transform = 'scale(1.2)';
        setTimeout(() => element.style.transform = 'scale(1)', 150);
    }
    
    function formatTime(minutes) {
        if (minutes < 1) return Math.round(minutes * 60) + 's';
        if (minutes < 60) return Math.round(minutes) + 'm';
        const hours = Math.floor(minutes / 60);
        const mins = Math.round(minutes % 60);
        return hours + 'h ' + mins + 'm';
    }
    
    window.pasteText = async function() {
        try {
            const text = await navigator.clipboard.readText();
            textInput.value = text;
            analyzeText();
            showToast('Text pasted!');
        } catch (err) {
            showToast('Could not paste from clipboard');
        }
    };
    
    window.clearText = function() {
        textInput.value = '';
        analyzeText();
        showToast('Text cleared!');
    };
    
    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(textInput.value);
            showToast('Copied to clipboard!');
        } catch (err) {
            textInput.select();
            document.execCommand('copy');
            showToast('Copied to clipboard!');
        }
    };
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.classList.remove('hidden');
        toast.classList.add('flex');
        setTimeout(() => {
            toast.classList.add('hidden');
            toast.classList.remove('flex');
        }, 2000);
    }
    
    // Initialize
    analyzeText();
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initTextAnalyzer();
    });
  </script>

<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">🌐 SEO</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Meta Tags Generator</h1>
            <p class="t-text-xl">Generate SEO meta tags for your website</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-grid t-grid-md-2 t-gap-lg t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Page Title</label>
                        <input type="text" id="title" placeholder="My Awesome Website" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Site URL</label>
                        <input type="text" id="url" placeholder="https://example.com" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                </div>

                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Description (150-160 characters recommended)</label>
                    <textarea id="description" rows="3" placeholder="A brief description of your website..." class="t-w-full t-p-sm t-rounded t-border"></textarea>
                </div>

                <div class="t-grid t-grid-md-2 t-gap-lg t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Keywords (comma separated)</label>
                        <input type="text" id="keywords" placeholder="seo, meta, tags, generator" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Author</label>
                        <input type="text" id="author" placeholder="Your Name" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                </div>

                <div class="t-grid t-grid-md-2 t-gap-lg t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">OG Image URL</label>
                        <input type="text" id="ogImage" placeholder="https://example.com/image.jpg" class="t-w-full t-p-sm t-rounded t-border">
                    </div>
                    <div class="t-flex t-items-center">
                        <label class="t-flex t-items-center">
                            <input type="checkbox" id="robots" checked class="t-mr-sm">
                            <span>Allow Search Engines</span>
                        </label>
                    </div>
                </div>

                <button onclick="generateTags()" class="btn">
                    Generate Meta Tags
                </button>

                <div id="result" class="t-hidden">
                    <div class="t-surface t-rounded-lg t-p-lg t-mb-md">
                        <pre id="output" class="t-text-success-light t-text-sm t-overflow-x-auto t-font-mono"></pre>
                    </div>
                    
                    <button onclick="copyTags()" class="t-w-full t-py-sm t-rounded-lg t-font-medium t-transition">
                        Copy to Clipboard
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generateTags() {
            const title = document.getElementById('title').value || 'My Website';
            const description = document.getElementById('description').value || 'Welcome to my website';
            const url = document.getElementById('url').value || 'https://example.com';
            const keywords = document.getElementById('keywords').value;
            const author = document.getElementById('author').value;
            const ogImage = document.getElementById('ogImage').value;
            const robots = document.getElementById('robots').checked;

            let tags = `<!-- Primary Meta Tags -->
<title>${title}</title>
<meta name="title" content="${title}">
<meta name="description" content="${description}">`;

            if (keywords) {
                tags += `
<meta name="keywords" content="${keywords}">`;
            }

            if (author) {
                tags += `
<meta name="author" content="${author}">`;
            }

            tags += `
<meta name="robots" content="${robots ? 'index, follow' : 'noindex, nofollow'}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="${url}">
<meta property="og:title" content="${title}">
<meta property="og:description" content="${description}">`;

            if (ogImage) {
                tags += `
<meta property="og:image" content="${ogImage}">`;
            }

            tags += `

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="${url}">
<meta property="twitter:title" content="${title}">
<meta property="twitter:description" content="${description}">`;

            if (ogImage) {
                tags += `
<meta property="twitter:image" content="${ogImage}">`;
            }

            document.getElementById('output').textContent = tags.trim();
            document.getElementById('result').classList.remove('hidden');
        }

        function copyTags() {
            const text = document.getElementById('output').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Meta tags copied to clipboard!');
            });
        }
    </script>
