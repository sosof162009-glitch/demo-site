<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tags Generator - 205-Tools</title>
    <meta name="description" content="Generate SEO meta tags for your website">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
    // Text Analyzer Logic
function initTextAnalyzer() {
    const textInput = document.getElementById('textInput');
    
    textInput.addEventListener('input', analyzeText);
    
    function analyzeText() {
        const text = textInput.value;
        
        // Word count
        const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
        animateNumber('wordCount', words);
        
        // Character count
        animateNumber('charCount', text.length);
        
        // Characters without spaces
        animateNumber('charCountNoSpaces', text.replace(/\s/g, '').length);
        
        // Sentences
        const sentences = text.trim() === '' ? 0 : text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
        animateNumber('sentenceCount', sentences);
        
        // Paragraphs
        const paragraphs = text.trim() === '' ? 0 : text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;
        animateNumber('paragraphCount', paragraphs || (text.trim() ? 1 : 0));
        
        // Reading time (avg 200 wpm)
        const readingMinutes = words / 200;
        document.getElementById('readingTime').textContent = formatTime(readingMinutes);
        
        // Speaking time (avg 130 wpm)
        const speakingMinutes = words / 130;
        document.getElementById('speakingTime').textContent = formatTime(speakingMinutes);
        
        // Update timestamp
        const now = new Date();
        document.getElementById('lastUpdated').textContent = 'Updated ' + now.toLocaleTimeString();
    }
    
    function animateNumber(id, target) {
        const element = document.getElementById(id);
        element.textContent = target;
        element.style.transform = 'scale(1.2)';
        setTimeout(() => element.style.transform = 'scale(1)', 150);
    }
    
    function formatTime(minutes) {
        if (minutes < 1) return Math.round(minutes * 60) + 's';
        if (minutes < 60) return Math.round(minutes) + 'm';
        const hours = Math.floor(minutes / 60);
        const mins = Math.round(minutes % 60);
        return hours + 'h ' + mins + 'm';
    }
    
    window.pasteText = async function() {
        try {
            const text = await navigator.clipboard.readText();
            textInput.value = text;
            analyzeText();
            showToast('Text pasted!');
        } catch (err) {
            showToast('Could not paste from clipboard');
        }
    };
    
    window.clearText = function() {
        textInput.value = '';
        analyzeText();
        showToast('Text cleared!');
    };
    
    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(textInput.value);
            showToast('Copied to clipboard!');
        } catch (err) {
            textInput.select();
            document.execCommand('copy');
            showToast('Copied to clipboard!');
        }
    };
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.classList.remove('hidden');
        toast.classList.add('flex');
        setTimeout(() => {
            toast.classList.add('hidden');
            toast.classList.remove('flex');
        }, 2000);
    }
    
    // Initialize
    analyzeText();
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initTextAnalyzer();
    });
  </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🌐 SEO</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Meta Tags Generator</h1>
            <p class="text-xl text-white/90">Generate SEO meta tags for your website</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="grid md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Page Title</label>
                        <input type="text" id="title" placeholder="My Awesome Website" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Site URL</label>
                        <input type="text" id="url" placeholder="https://example.com" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Description (150-160 characters recommended)</label>
                    <textarea id="description" rows="3" placeholder="A brief description of your website..." class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700"></textarea>
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Keywords (comma separated)</label>
                        <input type="text" id="keywords" placeholder="seo, meta, tags, generator" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Author</label>
                        <input type="text" id="author" placeholder="Your Name" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                </div>

                <div class="grid md:grid-cols-2 gap-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">OG Image URL</label>
                        <input type="text" id="ogImage" placeholder="https://example.com/image.jpg" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                    <div class="flex items-center space-x-4">
                        <label class="flex items-center">
                            <input type="checkbox" id="robots" checked class="mr-2">
                            <span>Allow Search Engines</span>
                        </label>
                    </div>
                </div>

                <button onclick="generateTags()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate Meta Tags
                </button>

                <div id="result" class="hidden">
                    <div class="bg-gray-900 rounded-xl p-6 mb-4">
                        <pre id="output" class="text-green-400 text-sm overflow-x-auto font-mono"></pre>
                    </div>
                    
                    <button onclick="copyTags()" class="w-full py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">
                        Copy to Clipboard
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generateTags() {
            const title = document.getElementById('title').value || 'My Website';
            const description = document.getElementById('description').value || 'Welcome to my website';
            const url = document.getElementById('url').value || 'https://example.com';
            const keywords = document.getElementById('keywords').value;
            const author = document.getElementById('author').value;
            const ogImage = document.getElementById('ogImage').value;
            const robots = document.getElementById('robots').checked;

            let tags = `<!-- Primary Meta Tags -->
<title>${title}</title>
<meta name="title" content="${title}">
<meta name="description" content="${description}">`;

            if (keywords) {
                tags += `
<meta name="keywords" content="${keywords}">`;
            }

            if (author) {
                tags += `
<meta name="author" content="${author}">`;
            }

            tags += `
<meta name="robots" content="${robots ? 'index, follow' : 'noindex, nofollow'}">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">

<!-- Open Graph / Facebook -->
<meta property="og:type" content="website">
<meta property="og:url" content="${url}">
<meta property="og:title" content="${title}">
<meta property="og:description" content="${description}">`;

            if (ogImage) {
                tags += `
<meta property="og:image" content="${ogImage}">`;
            }

            tags += `

<!-- Twitter -->
<meta property="twitter:card" content="summary_large_image">
<meta property="twitter:url" content="${url}">
<meta property="twitter:title" content="${title}">
<meta property="twitter:description" content="${description}">`;

            if (ogImage) {
                tags += `
<meta property="twitter:image" content="${ogImage}">`;
            }

            document.getElementById('output').textContent = tags.trim();
            document.getElementById('result').classList.remove('hidden');
        }

        function copyTags() {
            const text = document.getElementById('output').textContent;
            navigator.clipboard.writeText(text).then(() => {
                alert('Meta tags copied to clipboard!');
            });
        }
    </script>
</body>
</html>
