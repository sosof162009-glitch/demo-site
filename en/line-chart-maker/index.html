<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-container t-px-md t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">📊 Data</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Line Chart Maker</h1>
            <p class="t-text-xl">Create line charts</p>
        </div>
    </section>

    <section>
        <div class="t-container-sm t-container t-px-md">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-grid t-grid-md-2 t-gap-lg">
                    <div>
                        <h3 class="t-font-semibold t-mb-md">Chart Data</h3>
                        
                        <div class="t-mb-md">
                            <label class="t-block t-text-sm t-font-medium t-mb-sm">Chart Title</label>
                            <input type="text" id="chartTitle" value="My Line Chart" class="t-w-full t-p-sm t-rounded t-border">
                        </div>

                        <div id="dataRows">
                            <div class="t-flex t-gap-sm t-mb-sm">
                                <input type="text" placeholder="X Label" class="t-flex-1 t-p-xs t-rounded t-border">
                                <input type="number" placeholder="Y Value" class="t-p-xs t-rounded t-border">
                            </div>
                            <div class="t-flex t-gap-sm t-mb-sm">
                                <input type="text" placeholder="X Label" class="t-flex-1 t-p-xs t-rounded t-border">
                                <input type="number" placeholder="Y Value" class="t-p-xs t-rounded t-border">
                            </div>
                            <div class="t-flex t-gap-sm t-mb-sm">
                                <input type="text" placeholder="X Label" class="t-flex-1 t-p-xs t-rounded t-border">
                                <input type="number" placeholder="Y Value" class="t-p-xs t-rounded t-border">
                            </div>
                            <div class="t-flex t-gap-sm t-mb-sm">
                                <input type="text" placeholder="X Label" class="t-flex-1 t-p-xs t-rounded t-border">
                                <input type="number" placeholder="Y Value" class="t-p-xs t-rounded t-border">
                            </div>
                        </div>

                        <button onclick="addRow()" class="t-mt-sm t-px-md t-py-xs t-rounded">+ Add Point</button>

                        <button onclick="createChart()" class="t-w-full t-mt-lg t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition">
                            Create Chart
                        </button>
                    </div>

                    <div>
                        <div class="t-rounded t-p-md">
                            <canvas id="myChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let chart = null;

        function addRow() {
            const div = document.createElement('div');
            div.className = 'flex gap-2 mb-2';
            div.innerHTML = `
                <input type="text" placeholder="X Label" class="t-flex-1 t-p-xs t-rounded t-border">
                <input type="number" placeholder="Y Value" class="t-p-xs t-rounded t-border">
                <button onclick="this.parentElement.remove()" class="t-px-sm t-py-xs t-text-primary t-rounded">×</button>
            `;
            document.getElementById('dataRows').appendChild(div);
        }

        function createChart() {
            const labels = [];
            const values = [];
            
            document.querySelectorAll('.data-label').forEach((input, i) => {
                const valueInput = document.querySelectorAll('.data-value')[i];
                if (input.value && valueInput.value) {
                    labels.push(input.value);
                    values.push(parseFloat(valueInput.value));
                }
            });

            if (labels.length === 0) {
                alert('Please enter at least one data point');
                return;
            }

            const ctx = document.getElementById('myChart').getContext('2d');
            
            if (chart) chart.destroy();

            const isDark = document.documentElement.classList.contains('dark');

            chart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: labels,
                    datasets: [{
                        label: document.getElementById('chartTitle').value,
                        data: values,
                        borderColor: 'rgb(99, 102, 241)',
                        backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        tension: 0.4,
                        fill: true,
                        pointBackgroundColor: 'rgb(168, 85, 247)',
                        pointBorderColor: '#fff',
                        pointRadius: 5
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        legend: {
                            labels: {
                                color: isDark ? '#fff' : '#333'
                            }
                        }
                    },
                    scales: {
                        y: {
                            beginAtZero: true,
                            ticks: {
                                color: isDark ? '#fff' : '#333'
                            },
                            grid: {
                                color: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                            }
                        },
                        x: {
                            ticks: {
                                color: isDark ? '#fff' : '#333'
                            },
                            grid: {
                                color: isDark ? 'rgba(255,255,255,0.1)' : 'rgba(0,0,0,0.1)'
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
