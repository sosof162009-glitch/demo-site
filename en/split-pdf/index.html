<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Split PDF - 205-Tools</title>
    <meta name="description" content="Split PDF pages into separate files.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
    <style>
        .drop-zone { border: 2px dashed #6366f1; transition: all 0.3s; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #4f46e5; background: rgba(99, 102, 241, 0.05); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</span>
                </a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📄 PDF</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Split PDF</h1>
            <p class="text-xl text-white/90">Split PDF pages into separate files</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <!-- Upload Zone -->
                <div class="drop-zone rounded-xl p-12 text-center cursor-pointer mb-8" id="dropZone">
                    <div class="text-5xl mb-4">📁</div>
                    <p class="text-lg font-medium mb-2">Drag & drop your PDF here</p>
                    <p class="text-gray-500">or browse</p>
                    <input type="file" class="hidden" id="fileInput" accept=".pdf">
                </div>

                <!-- Split Options -->
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Pages to Extract (e.g., "1,3,5-10")</label>
                    <input type="text" id="pageRange" placeholder="1,3,5-10" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 mb-4">
                    <p class="text-xs text-gray-500">Leave empty to split all pages individually</p>
                </div>

                <!-- Action Button -->
                <button onclick="splitPDF()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Split PDF
                </button>

                <!-- Result -->
                <div id="result" class="hidden mt-8">
                    <div id="downloadList"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let currentFile = null;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                currentFile = e.dataTransfer.files[0];
                dropZone.querySelector('p').textContent = currentFile.name;
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                currentFile = fileInput.files[0];
                dropZone.querySelector('p').textContent = currentFile.name;
            }
        });

        async function splitPDF() {
            if (!currentFile) {
                alert('Please select a PDF file');
                return;
            }

            const btn = document.querySelector('button[onclick="splitPDF()"]');
            btn.textContent = 'Processing...';
            btn.disabled = true;

            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                const totalPages = pdfDoc.getPageCount();

                const pageRange = document.getElementById('pageRange').value.trim();
                let pagesToExtract = [];

                if (pageRange) {
                    // Parse range like "1,3,5-10"
                    const parts = pageRange.split(',');
                    for (const part of parts) {
                        if (part.includes('-')) {
                            const [start, end] = part.split('-').map(Number);
                            for (let i = start; i <= end; i++) {
                                if (i >= 1 && i <= totalPages) pagesToExtract.push(i - 1);
                            }
                        } else {
                            const page = Number(part);
                            if (page >= 1 && page <= totalPages) pagesToExtract.push(page - 1);
                        }
                    }
                } else {
                    // Split all pages
                    pagesToExtract = Array.from({length: totalPages}, (_, i) => i);
                }

                const downloadList = document.getElementById('downloadList');
                downloadList.innerHTML = '';

                // Create new PDF with extracted pages
                const newPdf = await PDFLib.PDFDocument.create();
                const copiedPages = await newPdf.copyPages(pdfDoc, pagesToExtract);
                copiedPages.forEach(page => newPdf.addPage(page));

                const pdfBytes = await newPdf.save();
                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                const link = document.createElement('a');
                link.href = url;
                link.download = `split_pages_${pageRange || 'all'}.pdf`;
                link.className = 'block w-full py-3 bg-green-500 text-white rounded-xl text-center mb-4 hover:bg-green-600';
                link.textContent = `Download PDF (${pagesToExtract.length} pages)`;
                downloadList.appendChild(link);

                document.getElementById('result').classList.remove('hidden');

            } catch (error) {
                alert('Error: ' + error.message);
            }

            btn.textContent = 'Split PDF';
            btn.disabled = false;
        }
    </script>
</body>
</html>
