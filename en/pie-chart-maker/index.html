<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pie Chart Maker - 205-Tools</title>
    <meta name="description" content="Create pie charts">
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">📊 Data</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Pie Chart Maker</h1>
            <p class="t-text-xl">Create pie charts</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-grid t-grid-md-2 t-gap-lg">
                    <div>
                        <h3 class="t-font-semibold t-mb-md">Chart Data</h3>
                        
                        <div class="t-mb-md">
                            <label class="t-block t-text-sm t-font-medium t-mb-sm">Chart Title</label>
                            <input type="text" id="chartTitle" value="My Pie Chart" class="t-w-full p-3 t-rounded border">
                        </div>

                        <div id="dataRows">
                            <div class="t-flex t-gap-sm t-mb-sm">
                                <input type="text" placeholder="Label" class="data-label flex-1 t-p-xs t-rounded border">
                                <input type="number" placeholder="Value" class="data-value w-24 t-p-xs t-rounded border">
                            </div>
                            <div class="t-flex t-gap-sm t-mb-sm">
                                <input type="text" placeholder="Label" class="data-label flex-1 t-p-xs t-rounded border">
                                <input type="number" placeholder="Value" class="data-value w-24 t-p-xs t-rounded border">
                            </div>
                            <div class="t-flex t-gap-sm t-mb-sm">
                                <input type="text" placeholder="Label" class="data-label flex-1 t-p-xs t-rounded border">
                                <input type="number" placeholder="Value" class="data-value w-24 t-p-xs t-rounded border">
                            </div>
                        </div>

                        <button onclick="addRow()" class="t-mt-sm py-2 t-rounded">+ Add Slice</button>

                        <button onclick="createChart()" class="t-w-full mt-6 t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition">
                            Create Chart
                        </button>
                    </div>

                    <div>
                        <div class="t-rounded t-p-md">
                            <canvas id="myChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        let chart = null;

        const colors = [
            'rgba(99, 102, 241, 0.8)',
            'rgba(168, 85, 247, 0.8)',
            'rgba(236, 72, 153, 0.8)',
            'rgba(59, 130, 246, 0.8)',
            'rgba(16, 185, 129, 0.8)',
            'rgba(245, 158, 11, 0.8)',
            'rgba(239, 68, 68, 0.8)',
            'rgba(139, 92, 246, 0.8)'
        ];

        const borderColors = [
            'rgb(99, 102, 241)',
            'rgb(168, 85, 247)',
            'rgb(236, 72, 153)',
            'rgb(59, 130, 246)',
            'rgb(16, 185, 129)',
            'rgb(245, 158, 11)',
            'rgb(239, 68, 68)',
            'rgb(139, 92, 246)'
        ];

        function addRow() {
            const div = document.createElement('div');
            div.className = 'flex gap-2 mb-2';
            div.innerHTML = `
                <input type="text" placeholder="Label" class="data-label flex-1 t-p-xs t-rounded border">
                <input type="number" placeholder="Value" class="data-value w-24 t-p-xs t-rounded border">
                <button onclick="this.parentElement.remove()" class="px-3 py-2 bg-red-500 t-text-primary t-rounded">×</button>
            `;
            document.getElementById('dataRows').appendChild(div);
        }

        function createChart() {
            const labels = [];
            const values = [];
            
            document.querySelectorAll('.data-label').forEach((input, i) => {
                const valueInput = document.querySelectorAll('.data-value')[i];
                if (input.value && valueInput.value) {
                    labels.push(input.value);
                    values.push(parseFloat(valueInput.value));
                }
            });

            if (labels.length === 0) {
                alert('Please enter at least one data point');
                return;
            }

            const ctx = document.getElementById('myChart').getContext('2d');
            
            if (chart) chart.destroy();

            const isDark = document.documentElement.classList.contains('dark');

            chart = new Chart(ctx, {
                type: 'pie',
                data: {
                    labels: labels,
                    datasets: [{
                        data: values,
                        backgroundColor: colors.slice(0, values.length),
                        borderColor: borderColors.slice(0, values.length),
                        borderWidth: 1
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: true,
                    plugins: {
                        title: {
                            display: true,
                            text: document.getElementById('chartTitle').value,
                            color: isDark ? '#fff' : '#333'
                        },
                        legend: {
                            position: 'bottom',
                            labels: {
                                color: isDark ? '#fff' : '#333'
                            }
                        }
                    }
                }
            });
        }
    </script>
</body>
</html>
