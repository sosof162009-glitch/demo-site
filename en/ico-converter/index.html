<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">🖼️ Image</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">ICO Converter</h1>
            <p class="t-text-xl">Convert image to ICO format</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-border-2 t-border-dashed t-rounded-lg t-p-xl t-text-center t-mb-xl" id="dropZone">
                    <input type="file" id="fileInput" accept="image/*" class="t-hidden">
                    <p class="t-text-lg t-mb-sm">Drag & drop image here</p>
                    <p class="t-text-sm">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="t-mt-sm t-px-lg t-py-xs t-text-primary t-rounded">Browse Files</button>
                </div>

                <div class="t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Icon Size</label>
                    <select id="iconSize" class="t-w-full t-p-sm t-rounded t-border">
                        <option value="16">16x16</option>
                        <option value="32" selected>32x32</option>
                        <option value="48">48x48</option>
                        <option value="64">64x64</option>
                        <option value="128">128x128</option>
                        <option value="256">256x256</option>
                    </select>
                </div>

                <div id="preview" class="t-hidden t-mb-xl t-text-center">
                    <img id="previewImg" class="t-container t-rounded">
                    <p class="t-mt-sm t-text-sm" id="fileName"></p>
                </div>

                <button id="convertBtn" onclick="convertToICO()" class="btn t-hidden">
                    Convert to ICO
                </button>

                <div id="result" class="t-hidden t-mt-xl">
                    <a id="downloadLink" class="btn t-block t-text-center">Download ICO</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let originalFile = null;

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-indigo-50', 'dark:bg-indigo-900/20');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/20');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/20');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }
            originalFile = file;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('convertBtn').classList.remove('hidden');
                document.getElementById('result').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function convertToICO() {
            if (!originalFile) return;
            
            const size = parseInt(document.getElementById('iconSize').value);
            const img = new Image();
            
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);
                
                canvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.getElementById('downloadLink');
                    link.href = url;
                    link.download = originalFile.name.replace(/\.[^/.]+$/, '') + '.png';
                    document.getElementById('result').classList.remove('hidden');
                }, 'image/png');
            };
            
            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
            };
            reader.readAsDataURL(originalFile);
        }
    </script>
</body>
</html>
