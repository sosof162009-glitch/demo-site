<body class="  min-h-screen">
    <header class="card shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🖼️ Image</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">ICO Converter</h1>
            <p class="text-xl text-white/90">Convert image to ICO format</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="card rounded-2xl shadow-xl p-8">
                <div class="border-2 border-dashed border-gray-300 dark:border-gray-600 rounded-xl p-8 text-center mb-8" id="dropZone">
                    <input type="file" id="fileInput" accept="image/*" class="hidden">
                    <p class="text-lg mb-2">Drag & drop image here</p>
                    <p class="text-sm text-gray-500">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="mt-2 px-6 py-2 bg-indigo-500 text-white rounded-lg">Browse Files</button>
                </div>

                <div class="mb-8">
                    <label class="block text-sm font-medium mb-2">Icon Size</label>
                    <select id="iconSize" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                        <option value="16">16x16</option>
                        <option value="32" selected>32x32</option>
                        <option value="48">48x48</option>
                        <option value="64">64x64</option>
                        <option value="128">128x128</option>
                        <option value="256">256x256</option>
                    </select>
                </div>

                <div id="preview" class="hidden mb-8 text-center">
                    <img id="previewImg" class="max-h-48 mx-auto rounded-lg">
                    <p class="mt-2 text-sm text-gray-500" id="fileName"></p>
                </div>

                <button id="convertBtn" onclick="convertToICO()" class="hidden w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Convert to ICO
                </button>

                <div id="result" class="hidden mt-8">
                    <a id="downloadLink" class="block w-full py-4 bg-green-500 text-white rounded-xl font-semibold text-lg text-center hover:bg-green-600 transition-all">Download ICO</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let originalFile = null;

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('bg-indigo-50', 'dark:bg-indigo-900/20');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/20');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('bg-indigo-50', 'dark:bg-indigo-900/20');
            if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files[0]) handleFile(e.target.files[0]);
        });

        function handleFile(file) {
            if (!file.type.startsWith('image/')) {
                alert('Please select an image file');
                return;
            }
            originalFile = file;
            
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('previewImg').src = e.target.result;
                document.getElementById('fileName').textContent = file.name;
                document.getElementById('preview').classList.remove('hidden');
                document.getElementById('convertBtn').classList.remove('hidden');
                document.getElementById('result').classList.add('hidden');
            };
            reader.readAsDataURL(file);
        }

        function convertToICO() {
            if (!originalFile) return;
            
            const size = parseInt(document.getElementById('iconSize').value);
            const img = new Image();
            
            img.onload = function() {
                const canvas = document.createElement('canvas');
                canvas.width = size;
                canvas.height = size;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, size, size);
                
                canvas.toBlob(function(blob) {
                    const url = URL.createObjectURL(blob);
                    const link = document.getElementById('downloadLink');
                    link.href = url;
                    link.download = originalFile.name.replace(/\.[^/.]+$/, '') + '.png';
                    document.getElementById('result').classList.remove('hidden');
                }, 'image/png');
            };
            
            const reader = new FileReader();
            reader.onload = function(e) {
                img.src = e.target.result;
            };
            reader.readAsDataURL(originalFile);
        }
    </script>
</body>
