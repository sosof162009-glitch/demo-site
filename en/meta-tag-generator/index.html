<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta Tag Generator - 205-Tools</title>
    <meta name="description" content="Generate HTML meta tags for SEO">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">🔍 SEO</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Meta Tag Generator</h1>
            <p class="t-text-xl">Generate HTML meta tags for SEO</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="space-y-6 t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Page Title</label>
                        <input type="text" id="title" placeholder="My Awesome Website" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Description</label>
                        <textarea id="description" rows="3" placeholder="A brief description of your page..." class="t-w-full p-3 t-rounded border"></textarea>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Keywords (comma separated)</label>
                        <input type="text" id="keywords" placeholder="keyword1, keyword2, keyword3" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Author</label>
                        <input type="text" id="author" placeholder="John Doe" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">OG Image URL (for social sharing)</label>
                        <input type="url" id="ogImage" placeholder="https://example.com/image.jpg" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Website URL</label>
                        <input type="url" id="url" placeholder="https://example.com" class="t-w-full p-3 t-rounded border">
                    </div>
                </div>

                <button onclick="generate()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-xl">
                    Generate Meta Tags
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Generated Meta Tags</label>
                    <textarea id="output" rows="15" readonly class="t-w-full p-3 t-rounded border t-font-mono t-text-xs"></textarea>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="flex-1 t-py-sm bg-indigo-500 t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const title = document.getElementById('title').value;
            const description = document.getElementById('description').value;
            const keywords = document.getElementById('keywords').value;
            const author = document.getElementById('author').value;
            const ogImage = document.getElementById('ogImage').value;
            const url = document.getElementById('url').value;

            let metaTags = '';

            if (title) {
                metaTags += `<!-- Title -->\n`;
                metaTags += `<title>${escapeHtml(title)}</title>\n`;
                metaTags += `<meta name="title" content="${escapeHtml(title)}">\n`;
                metaTags += `<meta property="og:title" content="${escapeHtml(title)}">\n`;
                metaTags += `<meta name="twitter:title" content="${escapeHtml(title)}">\n\n`;
            }

            if (description) {
                metaTags += `<!-- Description -->\n`;
                metaTags += `<meta name="description" content="${escapeHtml(description)}">\n`;
                metaTags += `<meta property="og:description" content="${escapeHtml(description)}">\n`;
                metaTags += `<meta name="twitter:description" content="${escapeHtml(description)}">\n\n`;
            }

            if (keywords) {
                metaTags += `<!-- Keywords -->\n`;
                metaTags += `<meta name="keywords" content="${escapeHtml(keywords)}">\n\n`;
            }

            if (author) {
                metaTags += `<!-- Author -->\n`;
                metaTags += `<meta name="author" content="${escapeHtml(author)}">\n\n`;
            }

            metaTags += `<!-- Character Encoding -->\n`;
            metaTags += `<meta charset="UTF-8">\n\n`;

            metaTags += `<!-- Viewport -->\n`;
            metaTags += `<meta name="viewport" content="width=device-width, initial-scale=1.0">\n\n`;

            if (url) {
                metaTags += `<!-- Open Graph -->\n`;
                metaTags += `<meta property="og:type" content="website">\n`;
                metaTags += `<meta property="og:url" content="${escapeHtml(url)}">\n\n`;
            }

            if (ogImage) {
                metaTags += `<!-- Open Graph Image -->\n`;
                metaTags += `<meta property="og:image" content="${escapeHtml(ogImage)}">\n`;
                metaTags += `<meta name="twitter:image" content="${escapeHtml(ogImage)}">\n`;
                metaTags += `<meta name="twitter:card" content="summary_large_image">\n\n`;
            }

            metaTags += `<!-- Robots -->\n`;
            metaTags += `<meta name="robots" content="index, follow">\n`;

            document.getElementById('output').value = metaTags;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('title').value = '';
            document.getElementById('description').value = '';
            document.getElementById('keywords').value = '';
            document.getElementById('author').value = '';
            document.getElementById('ogImage').value = '';
            document.getElementById('url').value = '';
            document.getElementById('output').value = '';
        }
    </script>
</body>
</html>
