<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator - 205-Tools</title>
    <meta name="description" content="Calculate tip and split bill">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">💰 Finance</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Tip Calculator</h1>
            <p class="text-xl text-white/90">Calculate tip and split bill</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="space-y-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Bill Amount ($)</label>
                        <input type="number" id="bill" placeholder="0.00" step="0.01" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Tip Percentage (%)</label>
                        <div class="grid grid-cols-4 gap-2 mb-2">
                            <button onclick="setTip(10)" class="tip-btn py-2 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-500 hover:text-white transition-all" data-tip="10">10%</button>
                            <button onclick="setTip(15)" class="tip-btn py-2 bg-indigo-500 text-white rounded-lg" data-tip="15">15%</button>
                            <button onclick="setTip(18)" class="tip-btn py-2 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-500 hover:text-white transition-all" data-tip="18">18%</button>
                            <button onclick="setTip(20)" class="tip-btn py-2 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-500 hover:text-white transition-all" data-tip="20">20%</button>
                        </div>
                        <input type="range" id="tipSlider" min="0" max="50" value="15" class="w-full" oninput="updateTip(this.value)">
                        <p class="text-center mt-1" id="tipValue">15%</p>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Number of People</label>
                        <input type="number" id="people" value="1" min="1" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                </div>

                <button onclick="calculate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Calculate
                </button>

                <div id="result" class="hidden">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-indigo-50 dark:bg-indigo-900/20 p-6 rounded-xl text-center">
                            <p class="text-3xl font-bold text-indigo-600 dark:text-indigo-400" id="tipAmount">$0.00</p>
                            <p class="text-gray-600 dark:text-gray-400">Tip Amount</p>
                        </div>
                        <div class="bg-purple-50 dark:bg-purple-900/20 p-6 rounded-xl text-center">
                            <p class="text-3xl font-bold text-purple-600 dark:text-purple-400" id="total">$0.00</p>
                            <p class="text-gray-600 dark:text-gray-400">Total</p>
                        </div>
                    </div>
                    <div class="bg-green-50 dark:bg-green-900/20 p-6 rounded-xl text-center">
                        <p class="text-3xl font-bold text-green-600 dark:text-green-400" id="perPerson">$0.00</p>
                        <p class="text-gray-600 dark:text-gray-400">Per Person</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function setTip(percent) {
            document.getElementById('tipSlider').value = percent;
            updateTip(percent);
            document.querySelectorAll('.tip-btn').forEach(btn => {
                if (parseInt(btn.dataset.tip) === percent) {
                    btn.classList.add('bg-indigo-500', 'text-white');
                    btn.classList.remove('bg-gray-100', 'dark:bg-gray-700');
                } else {
                    btn.classList.remove('bg-indigo-500', 'text-white');
                    btn.classList.add('bg-gray-100', 'dark:bg-gray-700');
                }
            });
        }

        function updateTip(value) {
            document.getElementById('tipValue').textContent = value + '%';
        }

        function calculate() {
            const bill = parseFloat(document.getElementById('bill').value);
            const tipPercent = parseFloat(document.getElementById('tipSlider').value);
            const people = parseInt(document.getElementById('people').value);

            if (isNaN(bill) || bill <= 0) {
                alert('Please enter a valid bill amount');
                return;
            }

            const tipAmount = bill * (tipPercent / 100);
            const total = bill + tipAmount;
            const perPerson = total / people;

            document.getElementById('tipAmount').textContent = '$' + tipAmount.toFixed(2);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
            document.getElementById('perPerson').textContent = '$' + perPerson.toFixed(2);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
