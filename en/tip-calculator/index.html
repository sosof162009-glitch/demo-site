<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tip Calculator - 205-Tools</title>
    <meta name="description" content="Calculate tip and split bill">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">💰 Finance</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Tip Calculator</h1>
            <p class="t-text-xl">Calculate tip and split bill</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="space-y-6 t-mb-xl">
                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Bill Amount ($)</label>
                        <input type="number" id="bill" placeholder="0.00" step="0.01" class="t-w-full p-3 t-rounded border">
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Tip Percentage (%)</label>
                        <div class="t-grid t-grid-4 t-gap-sm t-mb-sm">
                            <button onclick="setTip(10)" class="tip-btn py-2 t-rounded t-transition" data-tip="10">10%</button>
                            <button onclick="setTip(15)" class="tip-btn py-2 bg-indigo-500 t-text-primary t-rounded" data-tip="15">15%</button>
                            <button onclick="setTip(18)" class="tip-btn py-2 t-rounded t-transition" data-tip="18">18%</button>
                            <button onclick="setTip(20)" class="tip-btn py-2 t-rounded t-transition" data-tip="20">20%</button>
                        </div>
                        <input type="range" id="tipSlider" min="0" max="50" value="15" class="t-w-full" oninput="updateTip(this.value)">
                        <p class="t-text-center t-mt-xs" id="tipValue">15%</p>
                    </div>

                    <div>
                        <label class="t-block t-text-sm t-font-medium t-mb-sm">Number of People</label>
                        <input type="number" id="people" value="1" min="1" class="t-w-full p-3 t-rounded border">
                    </div>
                </div>

                <button onclick="calculate()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-xl">
                    Calculate
                </button>

                <div id="result" class="t-hidden">
                    <div class="t-grid t-grid-2 t-gap-md t-mb-lg">
                        <div class="bg-indigo-50 t-p-lg t-rounded-lg t-text-center">
                            <p class="t-text-3xl t-font-bold text-indigo-600" id="tipAmount">$0.00</p>
                            <p class="t-text-muted">Tip Amount</p>
                        </div>
                        <div class="bg-purple-50 t-p-lg t-rounded-lg t-text-center">
                            <p class="t-text-3xl t-font-bold text-purple-600" id="total">$0.00</p>
                            <p class="t-text-muted">Total</p>
                        </div>
                    </div>
                    <div class="bg-green-50 t-p-lg t-rounded-lg t-text-center">
                        <p class="t-text-3xl t-font-bold text-green-600" id="perPerson">$0.00</p>
                        <p class="t-text-muted">Per Person</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function setTip(percent) {
            document.getElementById('tipSlider').value = percent;
            updateTip(percent);
            document.querySelectorAll('.tip-btn').forEach(btn => {
                if (parseInt(btn.dataset.tip) === percent) {
                    btn.classList.add('bg-indigo-500', 'text-white');
                    btn.classList.remove('bg-gray-100', 'dark:bg-gray-700');
                } else {
                    btn.classList.remove('bg-indigo-500', 'text-white');
                    btn.classList.add('bg-gray-100', 'dark:bg-gray-700');
                }
            });
        }

        function updateTip(value) {
            document.getElementById('tipValue').textContent = value + '%';
        }

        function calculate() {
            const bill = parseFloat(document.getElementById('bill').value);
            const tipPercent = parseFloat(document.getElementById('tipSlider').value);
            const people = parseInt(document.getElementById('people').value);

            if (isNaN(bill) || bill <= 0) {
                alert('Please enter a valid bill amount');
                return;
            }

            const tipAmount = bill * (tipPercent / 100);
            const total = bill + tipAmount;
            const perPerson = total / people;

            document.getElementById('tipAmount').textContent = '$' + tipAmount.toFixed(2);
            document.getElementById('total').textContent = '$' + total.toFixed(2);
            document.getElementById('perPerson').textContent = '$' + perPerson.toFixed(2);
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
