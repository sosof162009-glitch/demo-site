<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Counter - 205-Tools</title>
    <meta name="description" content="Count words, characters, sentences and paragraphs">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📝 Text</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Word Counter</h1>
            <p class="text-xl text-white/90">Count words, characters, sentences and paragraphs</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Your Text</label>
                    <textarea id="textInput" rows="10" placeholder="Type or paste your text here..." class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-indigo-600 dark:text-indigo-400" id="wordCount">0</p>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Words</p>
                    </div>
                    
                    <div class="bg-purple-50 dark:bg-purple-900/20 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-purple-600 dark:text-purple-400" id="charCount">0</p>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Characters</p>
                    </div>
                    
                    <div class="bg-pink-50 dark:bg-pink-900/20 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-pink-600 dark:text-pink-400" id="sentenceCount">0</p>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Sentences</p>
                    </div>
                    
                    <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-blue-600 dark:text-blue-400" id="paraCount">0</p>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Paragraphs</p>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button onclick="clearText()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">
                        Clear
                    </button>
                    
                    <button onclick="copyText()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">
                        Copy Text
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const textInput = document.getElementById('textInput');
        
        textInput.addEventListener('input', countStats);

        function countStats() {
            const text = textInput.value;
            
            // Word count
            const words = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('wordCount').textContent = words;
            
            // Character count
            document.getElementById('charCount').textContent = text.length;
            
            // Sentence count (approximate)
            const sentences = text.trim() === '' ? 0 : text.split(/[.!?]+/).filter(s => s.trim().length > 0).length;
            document.getElementById('sentenceCount').textContent = sentences;
            
            // Paragraph count
            const paragraphs = text.trim() === '' ? 0 : text.split(/\n\s*\n/).filter(p => p.trim().length > 0).length;
            document.getElementById('paraCount').textContent = paragraphs || (text.trim() ? 1 : 0);
        }

        function clearText() {
            textInput.value = '';
            countStats();
        }

        function copyText() {
            textInput.select();
            document.execCommand('copy');
            alert('Text copied!');
        }
    </script>
</body>
</html>
