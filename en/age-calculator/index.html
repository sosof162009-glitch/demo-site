<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Age Calculator - 205-Tools</title>
    <meta name="description" content="Calculate age from birth date">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📅 Time</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Age Calculator</h1>
            <p class="text-xl text-white/90">Calculate age from birth date</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Birth Date</label>
                    <input type="date" id="birthDate" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                </div>

                <button onclick="calculateAge()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Calculate Age
                </button>

                <div id="result" class="hidden mt-8">
                    <div class="grid grid-cols-3 gap-4">
                        <div class="bg-indigo-50 dark:bg-indigo-900/20 p-6 rounded-xl text-center">
                            <p class="text-4xl font-bold text-indigo-600 dark:text-indigo-400" id="years">0</p>
                            <p class="text-gray-600 dark:text-gray-400">Years</p>
                        </div>
                        
                        <div class="bg-purple-50 dark:bg-purple-900/20 p-6 rounded-xl text-center">
                            <p class="text-4xl font-bold text-purple-600 dark:text-purple-400" id="months">0</p>
                            <p class="text-gray-600 dark:text-gray-400">Months</p>
                        </div>
                        
                        <div class="bg-pink-50 dark:bg-pink-900/20 p-6 rounded-xl text-center">
                            <p class="text-4xl font-bold text-pink-600 dark:text-pink-400" id="days">0</p>
                            <p class="text-gray-600 dark:text-gray-400">Days</p>
                        </div>
                    </div>

                    <div class="mt-6 p-4 bg-gray-50 dark:bg-gray-700 rounded-xl text-center">
                        <p id="nextBirthday"></p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function calculateAge() {
            const birthDate = new Date(document.getElementById('birthDate').value);
            if (isNaN(birthDate.getTime())) {
                alert('Please select a valid date');
                return;
            }

            const today = new Date();
            let years = today.getFullYear() - birthDate.getFullYear();
            let months = today.getMonth() - birthDate.getMonth();
            let days = today.getDate() - birthDate.getDate();

            if (days < 0) {
                months--;
                days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
            }
            if (months < 0) {
                years--;
                months += 12;
            }

            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = days;

            // Next birthday
            const nextBirthday = new Date(today.getFullYear(), birthDate.getMonth(), birthDate.getDate());
            if (nextBirthday < today) {
                nextBirthday.setFullYear(today.getFullYear() + 1);
            }
            const daysUntil = Math.ceil((nextBirthday - today) / (1000 * 60 * 60 * 24));
            document.getElementById('nextBirthday').textContent = `Next birthday in ${daysUntil} days (${nextBirthday.toLocaleDateString()})`;

            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
