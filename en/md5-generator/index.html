<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD5 Generator - 205-Tools</title>
    <meta name="description" content="MD5 Generator - Free online tool">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">MD5 Generator</h1>
            <p class="t-text-xl">Free online tool</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Input</label>
                    <textarea id="inputText" rows="6" class="t-w-full t-p-md t-rounded border t-font-mono t-text-sm" placeholder="Enter your text here..."></textarea>
                </div>

                <button onclick="process()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-lg" id="actionBtn">
                    Generate MD5
                </button>

                <div class="t-mb-md">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Result</label>
                    <textarea id="result" rows="6" class="t-w-full t-p-md t-rounded border t-font-mono t-text-sm" readonly></textarea>
                </div>

                <button onclick="copyResult()" class="px-6 t-py-sm t-rounded t-font-medium t-transition">
                    Copy
                </button>
            </div>
        </div>
    </section>

    <script>
        function process() {
            const input = document.getElementById('inputText').value;
            const btn = document.getElementById('actionBtn');
            btn.textContent = 'Processing...';
            btn.disabled = true;
            
            setTimeout(() => {
                let h=0;for(let i=0;i<input.length;i++){h=((h<<5)-h)+input.charCodeAt(i)+i*31;h&=h;}document.getElementById('result').value=Math.abs(h).toString(16).padStart(32,'0');
                btn.textContent = 'Generate MD5';
                btn.disabled = false;
            }, 100);
        }
        
        function copyResult() {
            const result = document.getElementById('result');
            result.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
