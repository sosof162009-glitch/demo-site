<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron Expression Generator - 205-Tools</title>
    <meta name="description" content="Generate cron expressions">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">⏰ Developer</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Cron Expression Generator</h1>
            <p class="text-xl text-white/90">Generate cron expressions easily</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <h3 class="font-semibold mb-6">Quick Presets</h3>
                
                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                    <button onclick="setPreset('0 0 * * *')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-100 dark:hover:bg-indigo-900/30 transition-all">Every day at midnight</button>
                    
                    <button onclick="setPreset('0 */6 * * *')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-100 dark:hover:bg-indigo-900/30 transition-all">Every 6 hours</button>
                    
                    <button onclick="setPreset('0 * * * *')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-100 dark:hover:bg-indigo-900/30 transition-all">Every hour</button>
                    
                    <button onclick="setPreset('*/15 * * * *')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-100 dark:hover:bg-indigo-900/30 transition-all">Every 15 minutes</button>
                    
                    <button onclick="setPreset('0 0 * * 0')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-100 dark:hover:bg-indigo-900/30 transition-all">Every Sunday</button>
                    
                    <button onclick="setPreset('0 0 1 * *')" class="p-3 bg-gray-100 dark:bg-gray-700 rounded-lg hover:bg-indigo-100 dark:hover:bg-indigo-900/30 transition-all">First of month</button>
                </div>

                <h3 class="font-semibold mb-6">Custom Schedule</h3>
                
                <div class="grid grid-cols-5 gap-4 mb-8">
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Minute</label>
                        <select id="minute" class="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="*">*</option>
                            <option value="0">00</option>
                            <option value="15">15</option>
                            <option value="30">30</option>
                            <option value="45">45</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Hour</label>
                        <select id="hour" class="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="*">*</option>
                            <option value="0">00</option>
                            <option value="6">06</option>
                            <option value="12">12</option>
                            <option value="18">18</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Day</label>
                        <select id="day" class="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="*">*</option>
                            <option value="1">1</option>
                            <option value="15">15</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Month</label>
                        <select id="month" class="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="*">*</option>
                            <option value="1">Jan</option>
                            <option value="6">Jun</option>
                            <option value="12">Dec</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="block text-xs text-gray-500 mb-1">Weekday</label>
                        <select id="weekday" class="w-full p-2 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="*">*</option>
                            <option value="0">Sun</option>
                            <option value="1">Mon</option>
                            <option value="5">Fri</option>
                        </select>
                    </div>
                </div>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate Cron Expression
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Cron Expression</label>
                    <div class="flex gap-4">
                        <input type="text" id="output" readonly class="flex-1 p-4 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-lg text-center">
                        
                        <button onclick="copyResult()" class="px-6 bg-indigo-500 text-white rounded-lg hover:bg-indigo-600 transition-all">Copy</button>
                    </div>
                </div>

                <div id="explanation" class="bg-indigo-50 dark:bg-indigo-900/20 rounded-lg p-4">
                    <p class="text-indigo-700 dark:text-indigo-400"></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function setPreset(expr) {
            document.getElementById('output').value = expr;
            explain(expr);
        }

        function generate() {
            const minute = document.getElementById('minute').value;
            const hour = document.getElementById('hour').value;
            const day = document.getElementById('day').value;
            const month = document.getElementById('month').value;
            const weekday = document.getElementById('weekday').value;
            
            const expr = `${minute} ${hour} ${day} ${month} ${weekday}`;
            document.getElementById('output').value = expr;
            explain(expr);
        }

        function explain(expr) {
            const parts = expr.split(' ');
            if (parts.length !== 5) return;
            
            const [min, hr, day, mon, wday] = parts;
            let text = 'Runs ';
            
            if (min === '*' && hr === '*') {
                text += 'every minute';
            } else if (min === '0' && hr === '*') {
                text += 'every hour';
            } else if (min.startsWith('*/')) {
                text += `every ${min.replace('*/', '')} minutes`;
            } else {
                text += `at ${hr.padStart(2, '0')}:${min.padStart(2, '0')}`;
            }
            
            if (day !== '*') {
                text += ` on day ${day}`;
            }
            
            if (mon !== '*') {
                const months = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                text += ` in ${months[parseInt(mon)] || mon}`;
            }
            
            if (wday !== '*') {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                text += ` on ${days[parseInt(wday)] || wday}`;
            }
            
            document.getElementById('explanation').querySelector('p').textContent = text;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }
    </script>
</body>
</html>
