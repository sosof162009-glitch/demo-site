<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">⏰ Developer</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Cron Expression Generator</h1>
            <p class="t-text-xl">Generate cron expressions easily</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <h3 class="t-font-semibold t-mb-lg">Quick Presets</h3>
                
                <div class="t-grid t-grid-2 t-grid-md-3 t-gap-md t-mb-xl">
                    <button onclick="setPreset('0 0 * * *')" class="t-p-sm t-rounded t-transition">Every day at midnight</button>
                    
                    <button onclick="setPreset('0 */6 * * *')" class="t-p-sm t-rounded t-transition">Every 6 hours</button>
                    
                    <button onclick="setPreset('0 * * * *')" class="t-p-sm t-rounded t-transition">Every hour</button>
                    
                    <button onclick="setPreset('*/15 * * * *')" class="t-p-sm t-rounded t-transition">Every 15 minutes</button>
                    
                    <button onclick="setPreset('0 0 * * 0')" class="t-p-sm t-rounded t-transition">Every Sunday</button>
                    
                    <button onclick="setPreset('0 0 1 * *')" class="t-p-sm t-rounded t-transition">First of month</button>
                </div>

                <h3 class="t-font-semibold t-mb-lg">Custom Schedule</h3>
                
                <div class="t-grid t-gap-md t-mb-xl">
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Minute</label>
                        <select id="minute" class="t-w-full t-p-xs t-rounded t-border">
                            <option value="*">*</option>
                            <option value="0">00</option>
                            <option value="15">15</option>
                            <option value="30">30</option>
                            <option value="45">45</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Hour</label>
                        <select id="hour" class="t-w-full t-p-xs t-rounded t-border">
                            <option value="*">*</option>
                            <option value="0">00</option>
                            <option value="6">06</option>
                            <option value="12">12</option>
                            <option value="18">18</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Day</label>
                        <select id="day" class="t-w-full t-p-xs t-rounded t-border">
                            <option value="*">*</option>
                            <option value="1">1</option>
                            <option value="15">15</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Month</label>
                        <select id="month" class="t-w-full t-p-xs t-rounded t-border">
                            <option value="*">*</option>
                            <option value="1">Jan</option>
                            <option value="6">Jun</option>
                            <option value="12">Dec</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Weekday</label>
                        <select id="weekday" class="t-w-full t-p-xs t-rounded t-border">
                            <option value="*">*</option>
                            <option value="0">Sun</option>
                            <option value="1">Mon</option>
                            <option value="5">Fri</option>
                        </select>
                    </div>
                </div>

                <button onclick="generate()" class="btn">
                    Generate Cron Expression
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Cron Expression</label>
                    <div class="t-flex t-gap-md">
                        <input type="text" id="output" readonly class="t-flex-1 t-p-md t-rounded t-border t-font-mono t-text-lg t-text-center">
                        
                        <button onclick="copyResult()" class="btn t-px-lg t-text-primary t-rounded t-transition">Copy</button>
                    </div>
                </div>

                <div id="explanation" class="t-state-info-light t-rounded t-p-md">
                    <p></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function setPreset(expr) {
            document.getElementById('output').value = expr;
            explain(expr);
        }

        function generate() {
            const minute = document.getElementById('minute').value;
            const hour = document.getElementById('hour').value;
            const day = document.getElementById('day').value;
            const month = document.getElementById('month').value;
            const weekday = document.getElementById('weekday').value;
            
            const expr = `${minute} ${hour} ${day} ${month} ${weekday}`;
            document.getElementById('output').value = expr;
            explain(expr);
        }

        function explain(expr) {
            const parts = expr.split(' ');
            if (parts.length !== 5) return;
            
            const [min, hr, day, mon, wday] = parts;
            let text = 'Runs ';
            
            if (min === '*' && hr === '*') {
                text += 'every minute';
            } else if (min === '0' && hr === '*') {
                text += 'every hour';
            } else if (min.startsWith('*/')) {
                text += `every ${min.replace('*/', '')} minutes`;
            } else {
                text += `at ${hr.padStart(2, '0')}:${min.padStart(2, '0')}`;
            }
            
            if (day !== '*') {
                text += ` on day ${day}`;
            }
            
            if (mon !== '*') {
                const months = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                text += ` in ${months[parseInt(mon)] || mon}`;
            }
            
            if (wday !== '*') {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                text += ` on ${days[parseInt(wday)] || wday}`;
            }
            
            document.getElementById('explanation').querySelector('p').textContent = text;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }
    </script>
