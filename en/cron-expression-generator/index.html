<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cron Expression Generator - 205-Tools</title>
    <meta name="description" content="Generate cron expressions">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">⏰ Developer</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Cron Expression Generator</h1>
            <p class="t-text-xl">Generate cron expressions easily</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <h3 class="t-font-semibold t-mb-lg">Quick Presets</h3>
                
                <div class="t-grid t-grid-2 md:grid-cols-3 t-gap-md t-mb-xl">
                    <button onclick="setPreset('0 0 * * *')" class="p-3 t-rounded t-transition">Every day at midnight</button>
                    
                    <button onclick="setPreset('0 */6 * * *')" class="p-3 t-rounded t-transition">Every 6 hours</button>
                    
                    <button onclick="setPreset('0 * * * *')" class="p-3 t-rounded t-transition">Every hour</button>
                    
                    <button onclick="setPreset('*/15 * * * *')" class="p-3 t-rounded t-transition">Every 15 minutes</button>
                    
                    <button onclick="setPreset('0 0 * * 0')" class="p-3 t-rounded t-transition">Every Sunday</button>
                    
                    <button onclick="setPreset('0 0 1 * *')" class="p-3 t-rounded t-transition">First of month</button>
                </div>

                <h3 class="t-font-semibold t-mb-lg">Custom Schedule</h3>
                
                <div class="t-grid grid-cols-5 t-gap-md t-mb-xl">
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Minute</label>
                        <select id="minute" class="t-w-full t-p-xs t-rounded border">
                            <option value="*">*</option>
                            <option value="0">00</option>
                            <option value="15">15</option>
                            <option value="30">30</option>
                            <option value="45">45</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Hour</label>
                        <select id="hour" class="t-w-full t-p-xs t-rounded border">
                            <option value="*">*</option>
                            <option value="0">00</option>
                            <option value="6">06</option>
                            <option value="12">12</option>
                            <option value="18">18</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Day</label>
                        <select id="day" class="t-w-full t-p-xs t-rounded border">
                            <option value="*">*</option>
                            <option value="1">1</option>
                            <option value="15">15</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Month</label>
                        <select id="month" class="t-w-full t-p-xs t-rounded border">
                            <option value="*">*</option>
                            <option value="1">Jan</option>
                            <option value="6">Jun</option>
                            <option value="12">Dec</option>
                        </select>
                    </div>
                    
                    <div>
                        <label class="t-block t-text-xs t-mb-xs">Weekday</label>
                        <select id="weekday" class="t-w-full t-p-xs t-rounded border">
                            <option value="*">*</option>
                            <option value="0">Sun</option>
                            <option value="1">Mon</option>
                            <option value="5">Fri</option>
                        </select>
                    </div>
                </div>

                <button onclick="generate()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-xl">
                    Generate Cron Expression
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Cron Expression</label>
                    <div class="t-flex t-gap-md">
                        <input type="text" id="output" readonly class="flex-1 t-p-md t-rounded border t-font-mono t-text-lg t-text-center">
                        
                        <button onclick="copyResult()" class="px-6 bg-indigo-500 t-text-primary t-rounded t-transition">Copy</button>
                    </div>
                </div>

                <div id="explanation" class="bg-indigo-50 t-rounded t-p-md">
                    <p class="text-indigo-700"></p>
                </div>
            </div>
        </div>
    </section>

    <script>
        function setPreset(expr) {
            document.getElementById('output').value = expr;
            explain(expr);
        }

        function generate() {
            const minute = document.getElementById('minute').value;
            const hour = document.getElementById('hour').value;
            const day = document.getElementById('day').value;
            const month = document.getElementById('month').value;
            const weekday = document.getElementById('weekday').value;
            
            const expr = `${minute} ${hour} ${day} ${month} ${weekday}`;
            document.getElementById('output').value = expr;
            explain(expr);
        }

        function explain(expr) {
            const parts = expr.split(' ');
            if (parts.length !== 5) return;
            
            const [min, hr, day, mon, wday] = parts;
            let text = 'Runs ';
            
            if (min === '*' && hr === '*') {
                text += 'every minute';
            } else if (min === '0' && hr === '*') {
                text += 'every hour';
            } else if (min.startsWith('*/')) {
                text += `every ${min.replace('*/', '')} minutes`;
            } else {
                text += `at ${hr.padStart(2, '0')}:${min.padStart(2, '0')}`;
            }
            
            if (day !== '*') {
                text += ` on day ${day}`;
            }
            
            if (mon !== '*') {
                const months = ['', 'Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
                text += ` in ${months[parseInt(mon)] || mon}`;
            }
            
            if (wday !== '*') {
                const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
                text += ` on ${days[parseInt(wday)] || wday}`;
            }
            
            document.getElementById('explanation').querySelector('p').textContent = text;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }
    </script>
</body>
</html>
