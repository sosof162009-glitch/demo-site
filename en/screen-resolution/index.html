    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">

            </div>

    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">🖥️ Special</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Screen Resolution Detector</h1>
            <p class="t-text-xl">Get detailed information about your display</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-grid t-grid-md-2 t-gap-lg">
                    <div class="t-state-info-light t-rounded-lg t-p-lg">
                        <p class="t-text-sm t-mb-xs">Screen Resolution</p>
                        <p class="t-text-3xl t-font-bold t-text-accent" id="resolution">-</p>
                    </div>
                    
                    <div class="t-state-purple-light t-rounded-lg t-p-lg">
                        <p class="t-text-sm t-mb-xs">Available Screen Size</p>
                        <p class="t-text-3xl t-font-bold t-text-accent" id="availResolution">-</p>
                    </div>
                    
                    <div class="t-rounded-lg t-p-lg">
                        <p class="t-text-sm t-mb-xs">Pixel Ratio (DPR)</p>
                        <p class="t-text-3xl t-font-bold" id="pixelRatio">-</p>
                    </div>
                    
                    <div class="t-state-success-light t-rounded-lg t-p-lg">
                        <p class="t-text-sm t-mb-xs">Color Depth</p>
                        <p class="t-text-3xl t-font-bold t-text-success" id="colorDepth">-</p>
                    </div>
                    
                    <div class="t-state-warning-light t-rounded-lg t-p-lg">
                        <p class="t-text-sm t-mb-xs">Viewport Size</p>
                        <p class="t-text-3xl t-font-bold" id="viewport">-</p>
                    </div>
                    
                    <div class="t-state-info-light t-rounded-lg t-p-lg">
                        <p class="t-text-sm t-mb-xs">Orientation</p>
                        <p class="t-text-3xl t-font-bold t-text-accent" id="orientation">-</p>
                    </div>
                </div>

                <div class="t-mt-xl t-p-lg t-rounded-lg">
                    <h3 class="t-font-semibold t-mb-md">Browser Information</h3>
                    
                    <div class="t-space-y-sm t-text-sm">
                        <div class="t-flex t-justify-between">
                            <span>User Agent</span>
                            <span class="t-font-mono t-text-xs t-truncate" id="userAgent">-</span>
                        </div>
                        
                        <div class="t-flex t-justify-between">
                            <span>Platform</span>
                            <span id="platform">-</span>
                        </div>
                        
                        <div class="t-flex t-justify-between">
                            <span>Language</span>
                            <span id="language">-</span>
                        </div>
                        
                        <div class="t-flex t-justify-between">
                            <span>Touch Support</span>
                            <span id="touchSupport">-</span>
                        </div>
                    </div>
                </div>

                <button onclick="refreshInfo()" class="t-mt-lg t-w-full t-py-sm t-text-primary t-rounded-lg t-font-medium t-hover-shadow t-transition">
                    Refresh Information
                </button>
            </div>
        </div>
    </section>

    <script>
        function getInfo() {
            // Screen info
            document.getElementById('resolution').textContent = `${screen.width} × ${screen.height}`;
            document.getElementById('availResolution').textContent = `${screen.availWidth} × ${screen.availHeight}`;
            document.getElementById('pixelRatio').textContent = window.devicePixelRatio + 'x';
            document.getElementById('colorDepth').textContent = screen.colorDepth + '-bit';
            document.getElementById('viewport').textContent = `${window.innerWidth} × ${window.innerHeight}`;
            
            // Orientation
            const orient = screen.orientation ? screen.orientation.type : (window.innerWidth > window.innerHeight ? 'landscape' : 'portrait');
            document.getElementById('orientation').textContent = orient.includes('landscape') ? 'Landscape' : 'Portrait';
            
            // Browser info
            document.getElementById('userAgent').textContent = navigator.userAgent;
            document.getElementById('platform').textContent = navigator.platform;
            document.getElementById('language').textContent = navigator.language;
            document.getElementById('touchSupport').textContent = 'ontouchstart' in window || navigator.maxTouchPoints > 0 ? 'Yes' : 'No';
        }

        function refreshInfo() {
            getInfo();
        }

        // Update viewport on resize
        window.addEventListener('resize', () => {
            document.getElementById('viewport').textContent = `${window.innerWidth} × ${window.innerHeight}`;
        });

        // Initial load
        getInfo();
    </script>
