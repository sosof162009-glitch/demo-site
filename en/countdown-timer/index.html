<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Countdown Timer - 205-Tools</title>
    <meta name="description" content="Set a countdown timer">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">⏱️ Time</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Countdown Timer</h1>
            <p class="text-xl text-white/90">Set a countdown timer</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div id="setup" class="grid grid-cols-3 gap-4 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">Hours</label>
                        <input type="number" id="hours" min="0" max="99" value="0" class="w-full p-3 text-center text-2xl rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Minutes</label>
                        <input type="number" id="minutes" min="0" max="59" value="5" class="w-full p-3 text-center text-2xl rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                    
                    <div>
                        <label class="block text-sm font-medium mb-2">Seconds</label>
                        <input type="number" id="seconds" min="0" max="59" value="0" class="w-full p-3 text-center text-2xl rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                </div>

                <div class="text-center mb-8">
                    <p class="text-8xl font-bold text-indigo-600 dark:text-indigo-400 font-mono hidden" id="display">00:05:00</p>
                </div>

                <div class="flex justify-center gap-4">
                    <button onclick="start()" id="startBtn" class="px-8 py-3 bg-green-500 text-white rounded-xl font-semibold text-lg">Start</button>
                    <button onclick="pause()" id="pauseBtn" class="px-8 py-3 bg-yellow-500 text-white rounded-xl font-semibold text-lg hidden">Pause</button>
                    <button onclick="reset()" class="px-8 py-3 bg-red-500 text-white rounded-xl font-semibold text-lg">Reset</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        let timeLeft = 0;
        let timer = null;
        let isRunning = false;

        function updateDisplay() {
            const hrs = Math.floor(timeLeft / 3600).toString().padStart(2, '0');
            const mins = Math.floor((timeLeft % 3600) / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            
            if (timeLeft >= 3600) {
                document.getElementById('display').textContent = `${hrs}:${mins}:${secs}`;
            } else {
                document.getElementById('display').textContent = `${mins}:${secs}`;
            }
        }

        function start() {
            if (isRunning) return;
            
            if (!timer) {
                const h = parseInt(document.getElementById('hours').value) || 0;
                const m = parseInt(document.getElementById('minutes').value) || 0;
                const s = parseInt(document.getElementById('seconds').value) || 0;
                timeLeft = h * 3600 + m * 60 + s;
                
                if (timeLeft === 0) {
                    alert('Please set a time');
                    return;
                }
                
                document.getElementById('setup').classList.add('hidden');
                document.getElementById('display').classList.remove('hidden');
            }
            
            isRunning = true;
            document.getElementById('startBtn').classList.add('hidden');
            document.getElementById('pauseBtn').classList.remove('hidden');
            
            timer = setInterval(() => {
                if (timeLeft > 0) {
                    timeLeft--;
                    updateDisplay();
                } else {
                    complete();
                }
            }, 1000);
        }

        function pause() {
            isRunning = false;
            clearInterval(timer);
            timer = 'paused';
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('pauseBtn').classList.add('hidden');
        }

        function reset() {
            isRunning = false;
            clearInterval(timer);
            timer = null;
            document.getElementById('setup').classList.remove('hidden');
            document.getElementById('display').classList.add('hidden');
            document.getElementById('startBtn').classList.remove('hidden');
            document.getElementById('pauseBtn').classList.add('hidden');
        }

        function complete() {
            reset();
            alert('Timer complete!');
        }
    </script>
</body>
</html>
