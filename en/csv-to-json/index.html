    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSV to JSON - 205-Tools</title>
    <meta name="description" content="Convert CSV to JSON format">
    
    <script>
    // Code Editor Logic
function initCodeEditor(language) {
    const codeEditor = document.getElementById('codeEditor');
    const statusBadge = document.getElementById('statusBadge');
    const charCount = document.getElementById('charCount');
    
    codeEditor.addEventListener('input', () => {
        const len = codeEditor.value.length;
        charCount.textContent = len + ' chars';
        
        if (len > 0) {
            updateStatus('typing', 'Typing...');
        } else {
            updateStatus('ready', 'Ready');
        }
    });
    
    function updateStatus(type, message) {
        const colors = {
            ready: 'bg-gray-400',
            typing: 'bg-yellow-400',
            success: 'bg-green-400',
            error: 'bg-red-400'
        };
        
        statusBadge.innerHTML = `
            <span class="t-rounded-full ${colors[type] colors.ready}"></span>
            ${message}
        `;
        statusBadge.className = 'status-badge ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
    }
    
    window.formatCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                const parsed = JSON.parse(code);
                codeEditor.value = JSON.stringify(parsed, null, 2);
            } else if (language === 'html') {
                codeEditor.value = formatHTML(code);
            } else if (language === 'css') {
                codeEditor.value = formatCSS(code);
            } else if (language === 'js') {
                codeEditor.value = formatJS(code);
            } else if (language === 'sql') {
                codeEditor.value = formatSQL(code);
            } else {
                codeEditor.value = code; // No formatter available
            }
            
            updateStatus('success', 'Formatted!');
            showToast('Code formatted successfully!');
        } catch (err) {
            updateStatus('error', 'Invalid ' + language.toUpperCase());
            showToast('Error: ' + err.message);
        }
    };
    
    window.minifyCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                const parsed = JSON.parse(code);
                codeEditor.value = JSON.stringify(parsed);
            } else if (language === 'html' || language === 'css' || language === 'js') {
                codeEditor.value = code
                    .replace(/\/\*[\s\S]*?\*\//g, '')
                    .replace(/\/\/.*$/gm, '')
                    .replace(/\s+/g, ' ')
                    .trim();
            } else {
                codeEditor.value = code.replace(/\s+/g, ' ').trim();
            }
            
            updateStatus('success', 'Minified!');
            showToast('Code minified successfully!');
        } catch (err) {
            updateStatus('error', 'Error');
            showToast('Error: ' + err.message);
        }
    };
    
    window.validateCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                JSON.parse(code);
                updateStatus('success', 'Valid JSON!');
                showToast('Valid JSON!');
            } else {
                updateStatus('success', 'Validated!');
                showToast('Code looks good!');
            }
        } catch (err) {
            updateStatus('error', 'Invalid ' + language.toUpperCase());
            showToast('Invalid: ' + err.message);
        }
    };
    
    window.clearCode = function() {
        codeEditor.value = '';
        charCount.textContent = '0 chars';
        updateStatus('ready', 'Ready');
        showToast('Editor cleared!');
    };
    
    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(codeEditor.value);
            showToast('Copied to clipboard!');
        } catch (err) {
            codeEditor.select();
            document.execCommand('copy');
            showToast('Copied to clipboard!');
        }
    };
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.classList.remove('hidden');
        toast.classList.add('flex');
        setTimeout(() => {
            toast.classList.add('hidden');
            toast.classList.remove('flex');
        }, 2000);
    }
    
    function formatHTML(html) {
        // Simple HTML formatter
        return html.replace(/\u003e\s*\u003c/g, '>\n\u003c');
    }
    
    function formatCSS(css) {
        // Simple CSS formatter
        return css.replace(/;/g, ';\n').replace(/{/g, '{\n').replace(/}/g, '\n}');
    }
    
    function formatJS(js) {
        // Simple JS formatter
        return js.replace(/;/g, ';\n').replace(/{/g, '{\n').replace(/}/g, '\n}');
    }
    
    function formatSQL(sql) {
        // Simple SQL formatter
        const keywords = ['SELECT', 'FROM', 'WHERE', 'INSERT', 'UPDATE', 'DELETE', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'ON', 'GROUP', 'ORDER', 'BY', 'HAVING', 'LIMIT', 'AND', 'OR'];
        let formatted = sql;
        keywords.forEach(kw => {
            const regex = new RegExp('\\b' + kw + '\\b', 'gi');
            formatted = formatted.replace(regex, '\n' + kw);
        });
        return formatted.trim();
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initCodeEditor('json');
    });
  </script>

<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">📊 Data</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">CSV to JSON</h1>
            <p class="t-text-xl">Convert CSV to JSON format</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">CSV Input</label>
                    <textarea id="input" rows="10" placeholder="name,age,city&#10;John,30,NYC&#10;Jane,25,LA" class="t-w-full t-p-sm t-rounded t-border t-font-mono t-text-sm"></textarea>
                </div>

                <div class="t-flex t-items-center t-mb-xl">
                    <input type="checkbox" id="headers" checked class="t-mr-sm">
                    <label>First row is headers</label>
                </div>

                <button onclick="convert()" class="btn">
                    Convert to JSON
                </button>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">JSON Output</label>
                    <textarea id="output" rows="10" readonly class="t-w-full t-p-sm t-rounded t-border t-font-mono t-text-xs"></textarea>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="t-flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function convert() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            const lines = input.split('\n');
            const hasHeaders = document.getElementById('headers').checked;
            
            let headers = [];
            let dataLines = lines;
            
            if (hasHeaders && lines.length > 0) {
                headers = parseCSVLine(lines[0]);
                dataLines = lines.slice(1);
            } else {
                // Use column numbers as headers
                const firstRow = parseCSVLine(lines[0]);
                headers = firstRow.map((_, i) => `col${i + 1}`);
            }

            const result = dataLines.filter(line => line.trim()).map(line => {
                const values = parseCSVLine(line);
                const obj = {};
                headers.forEach((header, i) => {
                    obj[header] = values[i] || '';
                });
                return obj;
            });

            document.getElementById('output').value = JSON.stringify(result, null, 2);
        }

        function parseCSVLine(line) {
            const result = [];
            let current = '';
            let inQuotes = false;
            
            for (let i = 0; i < line.length; i++) {
                const char = line[i];
                const nextChar = line[i + 1];
                
                if (char === '"') {
                    if (inQuotes && nextChar === '"') {
                        current += '"';
                        i++;
                    } else {
                        inQuotes = !inQuotes;
                    }
                } else if (char === ',' && !inQuotes) {
                    result.push(current.trim());
                    current = '';
                } else {
                    current += char;
                }
            }
            result.push(current.trim());
            return result;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }
    </script>
