<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Character Counter - 205-Tools</title>
    <meta name="description" content="Count characters with and without spaces">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📝 Text</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Character Counter</h1>
            <p class="text-xl text-white/90">Count characters with and without spaces</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Your Text</label>
                    <textarea id="input" rows="10" placeholder="Type or paste your text..." class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                    <div class="bg-indigo-50 dark:bg-indigo-900/20 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-indigo-600 dark:text-indigo-400" id="chars">0</p>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Characters</p>
                    </div>
                    
                    <div class="bg-purple-50 dark:bg-purple-900/20 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-purple-600 dark:text-purple-400" id="charsNoSpace">0</p>
                        <p class="text-sm text-gray-600 dark:text-gray-400">No Spaces</p>
                    </div>
                    
                    <div class="bg-pink-50 dark:bg-pink-900/20 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-pink-600 dark:text-pink-400" id="words">0</p>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Words</p>
                    </div>
                    
                    <div class="bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl text-center">
                        <p class="text-2xl font-bold text-blue-600 dark:text-blue-400" id="lines">0</p>
                        <p class="text-sm text-gray-600 dark:text-gray-400">Lines</p>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyText()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy Text</button>
                    <button onclick="clearText()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        document.getElementById('input').addEventListener('input', count);

        function count() {
            const text = document.getElementById('input').value;
            document.getElementById('chars').textContent = text.length;
            document.getElementById('charsNoSpace').textContent = text.replace(/\s/g, '').length;
            document.getElementById('words').textContent = text.trim() === '' ? 0 : text.trim().split(/\s+/).length;
            document.getElementById('lines').textContent = text === '' ? 0 : text.split('\n').length;
        }

        function copyText() {
            const input = document.getElementById('input');
            input.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearText() {
            document.getElementById('input').value = '';
            count();
        }
    </script>
</body>
</html>
