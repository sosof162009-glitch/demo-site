<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-container t-px-md t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">🎲 Text</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">List Randomizer</h1>
            <p class="t-text-xl">Randomize list order</p>
        </div>
    </section>

    <section>
        <div class="t-container-sm t-container t-px-md">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Input List (one item per line)</label>
                    <textarea id="input" rows="10" placeholder="Apple&#10;Banana&#10;Cherry&#10;Date" class="t-w-full t-p-sm t-rounded t-border"></textarea>
                </div>

                <div class="t-flex t-gap-md t-mb-xl">
                    <button onclick="randomize()" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium">🎲 Randomize</button>
                    <button onclick="pickRandom()" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium">Pick One</button>
                    <button onclick="pickMultiple()" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium">Pick 3</button>
                </div>

                <div class="t-rounded t-p-lg t-mb-xl">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Result</label>
                    <textarea id="output" rows="10" readonly class="t-w-full t-p-sm t-rounded t-border"></textarea>
                </div>

                <div class="t-flex t-gap-md">
                    <button onclick="copyResult()" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium t-transition">Copy</button>
                    <button onclick="clearAll()" class="t-flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function randomize() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            
            const items = input.split('\n').filter(item => item.trim());
            
            // Fisher-Yates shuffle
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [items[i], items[j]] = [items[j], items[i]];
            }
            
            document.getElementById('output').value = items.join('\n');
        }

        function pickRandom() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            
            const items = input.split('\n').filter(item => item.trim());
            const picked = items[Math.floor(Math.random() * items.length)];
            document.getElementById('output').value = picked;
        }

        function pickMultiple() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;
            
            let items = input.split('\n').filter(item => item.trim());
            
            // Shuffle and pick first 3 (or less if fewer items)
            for (let i = items.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [items[i], items[j]] = [items[j], items[i]];
            }
            
            document.getElementById('output').value = items.slice(0, 3).join('\n');
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').value = '';
        }
    </script>
</body>
