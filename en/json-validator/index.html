<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JSON Validator - 205-Tools</title>
    <meta name="description" content="Validate JSON syntax">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">🔧 Developer</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">JSON Validator</h1>
            <p class="t-text-xl">Validate JSON syntax and format</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">JSON Input</label>
                    <textarea id="input" rows="12" placeholder='{"name": "John", "age": 30}' class="t-w-full t-p-md t-rounded border t-font-mono t-text-sm"></textarea>
                </div>

                <div class="t-flex t-gap-md t-mb-lg">
                    <button onclick="validate()" class="flex-1 t-py-sm t-text-primary t-rounded-lg t-font-semibold t-hover-shadow t-transition">Validate</button>
                    
                    <button onclick="format()" class="flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Format</button>
                    
                    <button onclick="minify()" class="flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">Minify</button>
                </div>

                <div id="result" class="t-hidden t-rounded-lg t-p-lg t-mb-lg">
                    <p id="resultText" class="t-text-lg t-font-semibold"></p>
                    <p id="errorText" class="t-text-sm t-mt-sm"></p>
                </div>

                <div class="t-rounded t-p-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Result</label>
                    <pre id="output" class="t-p-md t-rounded border bg-gray-900 text-gray-100 t-font-mono t-text-sm overflow-x-auto"></pre>
                </div>
            </div>
        </div>
    </section>

    <script>
        function validate() {
            const input = document.getElementById('input').value.trim();
            const resultDiv = document.getElementById('result');
            const resultText = document.getElementById('resultText');
            const errorText = document.getElementById('errorText');

            if (!input) {
                alert('Please enter JSON');
                return;
            }

            try {
                JSON.parse(input);
                resultDiv.className = 'rounded-xl p-6 mb-6 bg-green-100 dark:bg-green-900/30';
                resultText.textContent = '✓ Valid JSON';
                resultText.className = 'text-lg font-semibold text-green-700 dark:text-green-400';
                errorText.textContent = '';
                resultDiv.classList.remove('hidden');
            } catch (e) {
                resultDiv.className = 'rounded-xl p-6 mb-6 bg-red-100 dark:bg-red-900/30';
                resultText.textContent = '✗ Invalid JSON';
                resultText.className = 'text-lg font-semibold text-red-700 dark:text-red-400';
                errorText.textContent = e.message;
                errorText.className = 'text-sm mt-2 text-red-600 dark:text-red-400';
                resultDiv.classList.remove('hidden');
            }
        }

        function format() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            try {
                const obj = JSON.parse(input);
                document.getElementById('output').textContent = JSON.stringify(obj, null, 2);
            } catch (e) {
                document.getElementById('output').textContent = 'Error: ' + e.message;
            }
        }

        function minify() {
            const input = document.getElementById('input').value.trim();
            if (!input) return;

            try {
                const obj = JSON.parse(input);
                document.getElementById('output').textContent = JSON.stringify(obj);
            } catch (e) {
                document.getElementById('output').textContent = 'Error: ' + e.message;
            }
        }
    </script>
</body>
</html>
