<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter - 205-Tools</title>
    <meta name="description" content="Convert text between different cases">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📝 Text</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Case Converter</h1>
            <p class="text-xl text-white/90">Convert text between different cases</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Your Text</label>
                    <textarea id="textInput" rows="6" placeholder="Type or paste your text here..." class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div class="grid grid-cols-2 md:grid-cols-3 gap-4 mb-8">
                    <button onclick="convertCase('upper')" class="py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">UPPERCASE</button>
                    
                    <button onclick="convertCase('lower')" class="py-3 bg-purple-500 text-white rounded-xl font-medium hover:bg-purple-600 transition-all">lowercase</button>
                    
                    <button onclick="convertCase('title')" class="py-3 bg-pink-500 text-white rounded-xl font-medium hover:bg-pink-600 transition-all">Title Case</button>
                    
                    <button onclick="convertCase('sentence')" class="py-3 bg-blue-500 text-white rounded-xl font-medium hover:bg-blue-600 transition-all">Sentence case</button>
                    
                    <button onclick="convertCase('camel')" class="py-3 bg-green-500 text-white rounded-xl font-medium hover:bg-green-600 transition-all">camelCase</button>
                    
                    <button onclick="convertCase('kebab')" class="py-3 bg-orange-500 text-white rounded-xl font-medium hover:bg-orange-600 transition-all">kebab-case</button>
                </div>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Result</label>
                    <textarea id="resultOutput" rows="6" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600"></textarea>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">
                        Copy Result
                    </button>
                    
                    <button onclick="clearAll()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">
                        Clear All
                    </button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function convertCase(type) {
            const text = document.getElementById('textInput').value;
            let result = text;

            switch(type) {
                case 'upper':
                    result = text.toUpperCase();
                    break;
                case 'lower':
                    result = text.toLowerCase();
                    break;
                case 'title':
                    result = text.toLowerCase().replace(/\b\w/g, c => c.toUpperCase());
                    break;
                case 'sentence':
                    result = text.toLowerCase().replace(/(^|[.!?]\s+)([a-z])/g, (match, p1, p2) => p1 + p2.toUpperCase());
                    result = result.charAt(0).toUpperCase() + result.slice(1);
                    break;
                case 'camel':
                    result = text.toLowerCase().replace(/[^a-zA-Z0-9]+(.)/g, (m, chr) => chr.toUpperCase());
                    break;
                case 'kebab':
                    result = text.toLowerCase().replace(/[^a-zA-Z0-9]+/g, '-').replace(/^-+|-+$/g, '');
                    break;
            }

            document.getElementById('resultOutput').value = result;
        }

        function copyResult() {
            const output = document.getElementById('resultOutput');
            output.select();
            document.execCommand('copy');
            alert('Result copied!');
        }

        function clearAll() {
            document.getElementById('textInput').value = '';
            document.getElementById('resultOutput').value = '';
        }
    </script>
</body>
</html>
