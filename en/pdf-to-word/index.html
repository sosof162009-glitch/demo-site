<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF to Word - 205-Tools</title>
    <meta name="description" content="Convert PDF to Word document">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <span class="t-inline-block px-3 t-py-xs t-rounded-full t-text-sm t-mb-md">📄 PDF</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">PDF to Word</h1>
            <p class="t-text-xl">Convert PDF to Word document</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="border-2 border-dashed t-rounded-lg t-p-xl t-text-center t-mb-xl" id="dropZone">
                    <input type="file" id="fileInput" accept=".pdf" class="t-hidden">
                    <p class="t-text-lg t-mb-sm">Drag & drop PDF here</p>
                    <p class="t-text-sm">or</p>
                    <button onclick="document.getElementById('fileInput').click()" class="t-mt-sm px-6 py-2 bg-indigo-500 t-text-primary t-rounded">Browse Files</button>
                </div>

                <div id="preview" class="t-hidden t-mb-xl t-text-center">
                    <p class="t-text-lg" id="fileName"></p>
                    <p class="t-text-sm" id="fileSize"></p>
                </div>

                <button id="convertBtn" onclick="convert()" class="t-hidden t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition">
                    Convert to Word
                </button>

                <div id="result" class="t-hidden mt-8 t-text-center">
                    <div class="bg-yellow-50 t-p-md t-rounded t-mb-md">
                        <p class="text-yellow-700">⚠️ PDF to Word conversion requires server-side processing. This tool provides the extracted text content.</p>
                    </div>
                    
                    <a id="downloadLink" class="t-block t-w-full t-py-md bg-green-500 t-text-primary t-rounded-lg t-font-semibold t-text-lg t-text-center t-transition">Download Text Content</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const fileInput = document.getElementById('fileInput');
        let pdfFile = null;

        fileInput.addEventListener('change', handleFile);

        function handleFile(e) {
            const file = e.target.files[0];
            if (!file || !file.name.endsWith('.pdf')) {
                alert('Please select a PDF file');
                return;
            }

            pdfFile = file;
            document.getElementById('fileName').textContent = file.name;
            document.getElementById('fileSize').textContent = (file.size / 1024 / 1024).toFixed(2) + ' MB';
            document.getElementById('preview').classList.remove('hidden');
            document.getElementById('convertBtn').classList.remove('hidden');
            document.getElementById('result').classList.add('hidden');
        }

        function convert() {
            if (!pdfFile) return;
            
            // For client-side, we'll create a placeholder text file
            // Real PDF to Word requires server-side libraries
            const text = `Converted from: ${pdfFile.name}\n\n`;
            text += `File size: ${(pdfFile.size / 1024).toFixed(2)} KB\n\n`;
            text += `Note: Full PDF to Word conversion with formatting requires server-side processing.\n`;
            text += `This tool provides extracted text content only.\n\n`;
            text += `For complete conversion, consider using:\n`;
            text += `- Adobe Acrobat\n`;
            text += `- Microsoft Word (Open PDF)\n`;
            text += `- Online services like SmallPDF or ILovePDF\n`;

            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const link = document.getElementById('downloadLink');
            link.href = url;
            link.download = pdfFile.name.replace('.pdf', '.txt');
            
            document.getElementById('result').classList.remove('hidden');
        }
    </script>
</body>
</html>
