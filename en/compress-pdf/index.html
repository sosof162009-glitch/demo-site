<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compress PDF - 205-Tools</title>
    <meta name="description" content="Compress PDF files to reduce size.">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
    <style>
        .drop-zone { border: 2px dashed #6366f1; transition: all 0.3s; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #4f46e5; background: rgba(99, 102, 241, 0.05); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</span>
                </a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📄 PDF</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Compress PDF</h1>
            <p class="text-xl text-white/90">Reduce PDF file size</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <!-- Upload Zone -->
                <div class="drop-zone rounded-xl p-12 text-center cursor-pointer mb-8" id="dropZone">
                    <div class="text-5xl mb-4">📁</div>
                    <p class="text-lg font-medium mb-2">Drag & drop your PDF here</p>
                    <p class="text-gray-500">or browse</p>
                    <input type="file" class="hidden" id="fileInput" accept=".pdf">
                </div>

                <!-- Quality Option -->
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Compression Level</label>
                    <select id="compression" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                        <option value="low">Low (Better quality)</option>
                        <option value="medium" selected>Medium (Balanced)</option>
                        <option value="high">High (Smallest size)</option>
                    </select>
                </div>

                <!-- Action Button -->
                <button onclick="compressPDF()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Compress PDF
                </button>

                <!-- Result -->
                <div id="result" class="hidden mt-8 p-6 bg-green-50 dark:bg-green-900/20 rounded-xl text-center">
                    <p class="text-green-600 dark:text-green-400 font-medium mb-4">✅ PDF compressed!</p>
                    <a href="#" id="downloadLink" class="inline-block px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600">Download Compressed PDF</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let currentFile = null;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                currentFile = e.dataTransfer.files[0];
                dropZone.querySelector('p').textContent = currentFile.name;
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                currentFile = fileInput.files[0];
                dropZone.querySelector('p').textContent = currentFile.name;
            }
        });

        async function compressPDF() {
            if (!currentFile) {
                alert('Please select a PDF file');
                return;
            }

            const btn = document.querySelector('button[onclick="compressPDF()"]');
            btn.textContent = 'Compressing...';
            btn.disabled = true;

            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const pdfDoc = await PDFLib.PDFDocument.load(arrayBuffer);
                
                // Compress by removing metadata and optimizing
                const compression = document.getElementById('compression').value;
                
                // Save with compression
                const pdfBytes = await pdfDoc.save({
                    useObjectStreams: true,
                    addDefaultPage: false,
                });

                const blob = new Blob([pdfBytes], { type: 'application/pdf' });
                const url = URL.createObjectURL(blob);

                const link = document.getElementById('downloadLink');
                link.href = url;
                link.download = `compressed_${currentFile.name}`;

                document.getElementById('result').classList.remove('hidden');

            } catch (error) {
                alert('Error: ' + error.message);
            }

            btn.textContent = 'Compress PDF';
            btn.disabled = false;
        }
    </script>
</body>
</html>
