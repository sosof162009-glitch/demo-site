<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Base64 to Image Decoder - 205-Tools</title>
    <meta name="description" content="Convert Base64 strings to images">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔢 Images</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Base64 to Image</h1>
            <p class="text-xl text-white/90">Convert Base64 strings to images</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Base64 String</label>
                    <textarea id="base64Input" rows="6" placeholder="Paste Base64 data here (e.g., data:image/png;base64,iVBORw0KGgo...)" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-sm"></textarea>
                </div>

                <button onclick="decodeImage()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Decode Image
                </button>

                <div id="result" class="hidden mt-8 p-6 bg-green-50 dark:bg-green-900/20 rounded-xl text-center">
                    <p class="text-green-600 dark:text-green-400 font-medium mb-4">✅ Image decoded!</p>
                    <img id="preview" class="max-w-full mx-auto mb-4 rounded-lg shadow-lg">
                    <a href="#" id="downloadLink" class="inline-block px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600">Download Image</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        function decodeImage() {
            const base64String = document.getElementById('base64Input').value.trim();
            
            if (!base64String) {
                alert('Please paste a Base64 string');
                return;
            }

            const btn = document.querySelector('button[onclick="decodeImage()"]');
            btn.textContent = 'Decoding...';
            btn.disabled = true;

            try {
                // Validate it looks like a data URL or add prefix if needed
                let dataUrl = base64String;
                if (!base64String.startsWith('data:')) {
                    dataUrl = 'data:image/png;base64,' + base64String;
                }

                const img = new Image();
                img.onload = function() {
                    document.getElementById('preview').src = dataUrl;
                    
                    const link = document.getElementById('downloadLink');
                    link.href = dataUrl;
                    link.download = 'decoded_image.png';

                    document.getElementById('result').classList.remove('hidden');
                    btn.textContent = 'Decode Image';
                    btn.disabled = false;
                };
                img.onerror = function() {
                    alert('Invalid Base64 image data');
                    btn.textContent = 'Decode Image';
                    btn.disabled = false;
                };
                img.src = dataUrl;
            } catch (error) {
                alert('Error: ' + error.message);
                btn.textContent = 'Decode Image';
                btn.disabled = false;
            }
        }
    </script>
</body>
</html>
