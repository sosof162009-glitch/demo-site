    <script>
    // Code Editor Logic
function initCodeEditor(language) {
    const codeEditor = document.getElementById('codeEditor');
    const statusBadge = document.getElementById('statusBadge');
    const charCount = document.getElementById('charCount');
    
    codeEditor.addEventListener('input', () => {
        const len = codeEditor.value.length;
        charCount.textContent = len + ' chars';
        
        if (len > 0) {
            updateStatus('typing', 'Typing...');
        } else {
            updateStatus('ready', 'Ready');
        }
    });
    
    function updateStatus(type, message) {
        const colors = {
            ready: 'bg-gray-400',
            typing: 'bg-yellow-400',
            success: 'bg-green-400',
            error: 'bg-red-400'
        };
        
        statusBadge.innerHTML = `
            <span class="w-2 h-2 rounded-full ${colors[type] || colors.ready}"></span>
            ${message}
        `;
        statusBadge.className = 'status-badge ' + (type === 'success' ? 'success' : type === 'error' ? 'error' : '');
    }
    
    window.formatCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                const parsed = JSON.parse(code);
                codeEditor.value = JSON.stringify(parsed, null, 2);
            } else if (language === 'html') {
                codeEditor.value = formatHTML(code);
            } else if (language === 'css') {
                codeEditor.value = formatCSS(code);
            } else if (language === 'js') {
                codeEditor.value = formatJS(code);
            } else if (language === 'sql') {
                codeEditor.value = formatSQL(code);
            } else {
                codeEditor.value = code; // No formatter available
            }
            
            updateStatus('success', 'Formatted!');
            showToast('Code formatted successfully!');
        } catch (err) {
            updateStatus('error', 'Invalid ' + language.toUpperCase());
            showToast('Error: ' + err.message);
        }
    };
    
    window.minifyCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                const parsed = JSON.parse(code);
                codeEditor.value = JSON.stringify(parsed);
            } else if (language === 'html' || language === 'css' || language === 'js') {
                codeEditor.value = code
                    .replace(/\/\*[\s\S]*?\*\//g, '')
                    .replace(/\/\/.*$/gm, '')
                    .replace(/\s+/g, ' ')
                    .trim();
            } else {
                codeEditor.value = code.replace(/\s+/g, ' ').trim();
            }
            
            updateStatus('success', 'Minified!');
            showToast('Code minified successfully!');
        } catch (err) {
            updateStatus('error', 'Error');
            showToast('Error: ' + err.message);
        }
    };
    
    window.validateCode = function() {
        try {
            const code = codeEditor.value;
            if (!code.trim()) {
                showToast('Please enter some code');
                return;
            }
            
            if (language === 'json') {
                JSON.parse(code);
                updateStatus('success', 'Valid JSON!');
                showToast('Valid JSON!');
            } else {
                updateStatus('success', 'Validated!');
                showToast('Code looks good!');
            }
        } catch (err) {
            updateStatus('error', 'Invalid ' + language.toUpperCase());
            showToast('Invalid: ' + err.message);
        }
    };
    
    window.clearCode = function() {
        codeEditor.value = '';
        charCount.textContent = '0 chars';
        updateStatus('ready', 'Ready');
        showToast('Editor cleared!');
    };
    
    window.copyResult = async function() {
        try {
            await navigator.clipboard.writeText(codeEditor.value);
            showToast('Copied to clipboard!');
        } catch (err) {
            codeEditor.select();
            document.execCommand('copy');
            showToast('Copied to clipboard!');
        }
    };
    
    function showToast(message) {
        const toast = document.getElementById('toast');
        document.getElementById('toastMessage').textContent = message;
        toast.classList.remove('hidden');
        toast.classList.add('flex');
        setTimeout(() => {
            toast.classList.add('hidden');
            toast.classList.remove('flex');
        }, 2000);
    }
    
    function formatHTML(html) {
        // Simple HTML formatter
        return html.replace(/\u003e\s*\u003c/g, '>\n\u003c');
    }
    
    function formatCSS(css) {
        // Simple CSS formatter
        return css.replace(/;/g, ';\n').replace(/{/g, '{\n').replace(/}/g, '\n}');
    }
    
    function formatJS(js) {
        // Simple JS formatter
        return js.replace(/;/g, ';\n').replace(/{/g, '{\n').replace(/}/g, '\n}');
    }
    
    function formatSQL(sql) {
        // Simple SQL formatter
        const keywords = ['SELECT', 'FROM', 'WHERE', 'INSERT', 'UPDATE', 'DELETE', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'ON', 'GROUP', 'ORDER', 'BY', 'HAVING', 'LIMIT', 'AND', 'OR'];
        let formatted = sql;
        keywords.forEach(kw => {
            const regex = new RegExp('\\b' + kw + '\\b', 'gi');
            formatted = formatted.replace(regex, '\n' + kw);
        });
        return formatted.trim();
    }
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initCodeEditor('sql');
    });
  </script>

<body class="  min-h-screen">
    <header class="card shadow-sm sticky top-0 z-50">

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">

            <p class="text-xl text-white/90">Format and beautify SQL queries</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="card rounded-2xl shadow-xl p-8">
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">SQL Query</label>

                </div>

                <div class="flex gap-4 mb-6">
                    <button onclick="format()" class="flex-1 py-3 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold hover:shadow-lg transition-all">Format SQL</button>
                    
                    <button onclick="minify()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Minify</button>
                </div>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-6">
                    <label class="block text-sm font-medium mb-2">Formatted SQL</label>
                    <pre id="output" class="p-4 rounded-lg border dark:border-gray-600 bg-gray-900 text-gray-100 font-mono text-sm overflow-x-auto"></pre>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    
                    <button onclick="clearAll()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">Clear</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        const keywords = ['SELECT', 'FROM', 'WHERE', 'INSERT', 'UPDATE', 'DELETE', 'JOIN', 'LEFT', 'RIGHT', 'INNER', 'OUTER', 'ON', 'GROUP', 'BY', 'ORDER', 'HAVING', 'LIMIT', 'OFFSET', 'UNION', 'ALL', 'DISTINCT', 'AS', 'AND', 'OR', 'NOT', 'NULL', 'IS', 'IN', 'BETWEEN', 'LIKE', 'EXISTS', 'CASE', 'WHEN', 'THEN', 'ELSE', 'END', 'CREATE', 'TABLE', 'DROP', 'ALTER', 'INDEX', 'VIEW', 'PRIMARY', 'KEY', 'FOREIGN', 'REFERENCES', 'DEFAULT', 'AUTO_INCREMENT', 'VALUES', 'INTO', 'SET'];
        
        const functions = ['COUNT', 'SUM', 'AVG', 'MIN', 'MAX', 'CONCAT', 'SUBSTRING', 'LENGTH', 'UPPER', 'LOWER', 'TRIM', 'REPLACE', 'ROUND', 'FLOOR', 'CEIL', 'ABS', 'NOW', 'DATE', 'YEAR', 'MONTH', 'DAY', 'CAST', 'COALESCE', 'IFNULL'];

        function format() {
            let sql = document.getElementById('input').value.trim();
            if (!sql) return;

            // Basic formatting
            sql = sql.replace(/\s+/g, ' ');
            
            // Add newlines after keywords
            keywords.forEach(kw => {
                const regex = new RegExp(`\\b${kw}\\b`, 'gi');
                if (kw === 'SELECT' || kw === 'FROM' || kw === 'WHERE' || kw === 'GROUP' || kw === 'ORDER' || kw === 'HAVING') {
                    sql = sql.replace(regex, '\n' + kw);
                }
            });
            
            // Add newlines after commas
            sql = sql.replace(/,\s*/g, ',\n    ');
            
            // Clean up extra newlines
            sql = sql.replace(/^\n/, '');
            
            // Syntax highlighting
            sql = highlight(sql);
            
            document.getElementById('output').innerHTML = sql;
        }

        function highlight(sql) {
            let highlighted = sql
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;');
            
            // Keywords
            keywords.forEach(kw => {
                const regex = new RegExp(`\\b(${kw})\\b`, 'gi');
                highlighted = highlighted.replace(regex, '<span class="sql-keyword">$1</span>');
            });
            
            // Functions
            functions.forEach(fn => {
                const regex = new RegExp(`\\b(${fn})\\b`, 'gi');
                highlighted = highlighted.replace(regex, '<span class="sql-function">$1</span>');
            });
            
            // Strings
            highlighted = highlighted.replace(/('[^']*')/g, '<span class="sql-string">$1</span>');
            
            // Numbers
            highlighted = highlighted.replace(/\b(\d+)\b/g, '<span class="sql-number">$1</span>');
            
            // Comments
            highlighted = highlighted.replace(/(--.*$)/gm, '<span class="sql-comment">$1</span>');
            
            return highlighted;
        }

        function minify() {
            let sql = document.getElementById('input').value;
            if (!sql) return;
            
            sql = sql.replace(/\s+/g, ' ').trim();
            document.getElementById('output').textContent = sql;
        }

        function copyResult() {
            const output = document.getElementById('output');
            const text = output.textContent || output.innerText;
            if (!text) return;
            navigator.clipboard.writeText(text).then(() => alert('Copied!'));
        }

        function clearAll() {
            document.getElementById('input').value = '';
            document.getElementById('output').textContent = '';
        }
    </script>
