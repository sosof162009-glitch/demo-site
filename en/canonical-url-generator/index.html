<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canonical URL Generator - 205-Tools</title>
    <meta name="description" content="Canonical URL Generator">
        <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/assets/styles.css">

<body class="t-page-wrapper">
    <header class="t-shadow-sm t-site-header">
        <div>
            <div class="t-flex t-items-center t-justify-between">
                <a href="/en/" class="t-text-2xl t-font-bold">205-Tools</a>
                            </div>
        </div>
    </header>

    <section class="t-text-primary py-16">
        <div class="t-text-center">
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">Canonical URL Generator</h1>
            <p class="t-text-xl">SEO Tool</p>
        </div>
    </section>

    <section>
        <div>
            <div class="t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">URL</label>
                    <input type="url" id="urlInput" class="t-w-full t-p-md t-rounded border t-font-mono t-text-sm" placeholder="https://example.com/page">
                </div>

                <button onclick="generate()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-lg" id="actionBtn">
                    Generate
                </button>

                <div class="t-mb-md">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Canonical Tag</label>
                    <textarea id="result" rows="3" class="t-w-full t-p-md t-rounded border t-font-mono t-text-sm" readonly></textarea>
                </div>

                <button onclick="copyResult()" class="px-6 t-py-sm t-rounded t-font-medium t-transition">
                    Copy
                </button>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            const tag = <link rel="canonical" href="${url}" />;
            document.getElementById('result').value = tag;
        }
        
        function copyResult() {
            const result = document.getElementById('result');
            result.select();
            document.execCommand('copy');
        }
    </script>
</body>
</html>
