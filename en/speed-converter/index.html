<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Speed Converter - 205-Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📐 Units</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Speed Converter</h1>
            <p class="text-xl text-white/90">Convert between speed units</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">From</label>
                        <input type="number" id="fromValue" value="60" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 mb-2">
                        <select id="fromUnit" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                            <option value="mph" selected>Miles per Hour (mph)</option>
                            <option value="kmh">Kilometers per Hour (km/h)</option>
                            <option value="ms">Meters per Second (m/s)</option>
                            <option value="fts">Feet per Second (ft/s)</option>
                            <option value="knots">Knots</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">To</label>
                        <input type="number" id="toValue" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 mb-2 bg-gray-50">
                        <select id="toUnit" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                            <option value="mph">Miles per Hour (mph)</option>
                            <option value="kmh" selected>Kilometers per Hour (km/h)</option>
                            <option value="ms">Meters per Second (m/s)</option>
                            <option value="fts">Feet per Second (ft/s)</option>
                            <option value="knots">Knots</option>
                        </select>
                    </div>
                </div>

                <button onclick="convert()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    Convert
                </button>
            </div>
        </div>
    </section>

    <script>
        // Conversion factors to mph
        const toMph = {
            'mph': 1,
            'kmh': 0.621371,
            'ms': 2.23694,
            'fts': 0.681818,
            'knots': 1.15078
        };

        function convert() {
            const value = parseFloat(document.getElementById('fromValue').value);
            const from = document.getElementById('fromUnit').value;
            const to = document.getElementById('toUnit').value;

            if (isNaN(value)) {
                document.getElementById('toValue').value = '';
                return;
            }

            const mph = value * toMph[from];
            const result = mph / toMph[to];

            document.getElementById('toValue').value = result.toFixed(4).replace(/\.?0+$/, '');
        }

        document.getElementById('fromValue').addEventListener('input', convert);
        document.getElementById('fromUnit').addEventListener('change', convert);
        document.getElementById('toUnit').addEventListener('change', convert);

        convert();
    </script>
</body>
</html>
