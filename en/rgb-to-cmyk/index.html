<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RGB to CMYK Converter - 205-Tools</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🎨 Colors</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">RGB to CMYK Converter</h1>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="grid grid-cols-3 gap-4 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">Red (0-255)</label>
                        <input type="number" id="r" value="99" min="0" max="255" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Green (0-255)</label>
                        <input type="number" id="g" value="102" min="0" max="255" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                    <div>
                        <label class="block text-sm font-medium mb-2">Blue (0-255)</label>
                        <input type="number" id="b" value="241" min="0" max="255" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Preview</label>
                    <div id="preview" class="w-full h-24 rounded-lg border"></div>
                </div>

                <button onclick="convert()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg mb-6">
                    Convert to CMYK
                </button>

                <div class="grid grid-cols-4 gap-4">
                    <div class="bg-cyan-100 dark:bg-cyan-900 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-1">Cyan</label>
                        <input type="text" id="c" readonly class="w-full p-2 rounded border text-center font-bold">
                    </div>
                    <div class="bg-pink-100 dark:bg-pink-900 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-1">Magenta</label>
                        <input type="text" id="m" readonly class="w-full p-2 rounded border text-center font-bold">
                    </div>
                    <div class="bg-yellow-100 dark:bg-yellow-900 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-1">Yellow</label>
                        <input type="text" id="y" readonly class="w-full p-2 rounded border text-center font-bold">
                    </div>
                    <div class="bg-gray-200 dark:bg-gray-700 rounded-lg p-4">
                        <label class="block text-sm font-medium mb-1">Black</label>
                        <input type="text" id="k" readonly class="w-full p-2 rounded border text-center font-bold">
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function rgbToCmyk(r, g, b) {
            let c = 1 - (r / 255);
            let m = 1 - (g / 255);
            let y = 1 - (b / 255);
            let k = Math.min(c, Math.min(m, y));

            c = (c - k) / (1 - k) || 0;
            m = (m - k) / (1 - k) || 0;
            y = (y - k) / (1 - k) || 0;

            return {
                c: Math.round(c * 100),
                m: Math.round(m * 100),
                y: Math.round(y * 100),
                k: Math.round(k * 100)
            };
        }

        function convert() {
            const r = parseInt(document.getElementById('r').value) || 0;
            const g = parseInt(document.getElementById('g').value) || 0;
            const b = parseInt(document.getElementById('b').value) || 0;

            const cmyk = rgbToCmyk(r, g, b);
            document.getElementById('c').value = cmyk.c + '%';
            document.getElementById('m').value = cmyk.m + '%';
            document.getElementById('y').value = cmyk.y + '%';
            document.getElementById('k').value = cmyk.k + '%';
            document.getElementById('preview').style.backgroundColor = `rgb(${r},${g},${b})`;
        }

        document.querySelectorAll('input[type="number"]').forEach(input => {
            input.addEventListener('input', convert);
        });

        convert();
    </script>
</body>
</html>
