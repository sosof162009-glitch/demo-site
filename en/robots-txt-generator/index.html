<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> robots.txt Generator - 205-Tools</title>
    <meta name="description" content="Generate robots.txt file">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/en/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🔍 SEO</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">robots.txt Generator</h1>
            <p class="text-xl text-white/90">Generate robots.txt file for your website</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="space-y-6 mb-8">
                    <div>
                        <label class="block text-sm font-medium mb-2">User-agent</label>
                        <select id="userAgent" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="*">All robots (*)</option>
                            <option value="Googlebot">Googlebot</option>
                            <option value="Bingbot">Bingbot</option>
                            <option value="Slurp">Yahoo Slurp</option>
                            <option value="DuckDuckBot">DuckDuckBot</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Access</label>
                        <select id="access" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                            <option value="allow">Allow all</option>
                            <option value="disallow">Disallow all</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Disallowed Paths (one per line)</label>
                        <textarea id="disallowed" rows="4" placeholder="/admin/&#10;/private/&#10;/tmp/" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-sm"></textarea>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Sitemap URL (optional)</label>
                        <input type="url" id="sitemap" placeholder="https://example.com/sitemap.xml" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">Crawl-delay (seconds)</label>
                        <input type="number" id="crawlDelay" placeholder="10" min="0" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600">
                    </div>
                </div>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Generate robots.txt
                </button>

                <div class="bg-gray-50 dark:bg-gray-700 rounded-lg p-6 mb-8">
                    <label class="block text-sm font-medium mb-2">Generated robots.txt</label>
                    <textarea id="output" rows="12" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 font-mono text-sm"></textarea>
                </div>

                <div class="flex gap-4">
                    <button onclick="copyResult()" class="flex-1 py-3 bg-indigo-500 text-white rounded-xl font-medium hover:bg-indigo-600 transition-all">Copy</button>
                    <button onclick="downloadFile()" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-medium hover:bg-green-600 transition-all">Download robots.txt</button>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const userAgent = document.getElementById('userAgent').value;
            const access = document.getElementById('access').value;
            const disallowed = document.getElementById('disallowed').value.trim().split('\n').filter(d => d.trim());
            const sitemap = document.getElementById('sitemap').value.trim();
            const crawlDelay = document.getElementById('crawlDelay').value;

            let robots = '# robots.txt generated by 205-Tools\n';
            robots += '# Learn more: https://www.robotstxt.org/robotstxt.html\n\n';

            robots += `User-agent: ${userAgent}\n`;

            if (access === 'allow') {
                robots += 'Disallow:\n';
            } else {
                robots += 'Disallow: /\n';
            }

            if (disallowed.length > 0) {
                robots += '\n# Disallowed paths\n';
                disallowed.forEach(path => {
                    robots += `Disallow: ${path.trim()}\n`;
                });
            }

            if (crawlDelay) {
                robots += `\nCrawl-delay: ${crawlDelay}\n`;
            }

            if (sitemap) {
                robots += `\nSitemap: ${sitemap}\n`;
            }

            document.getElementById('output').value = robots;
        }

        function copyResult() {
            const output = document.getElementById('output');
            if (!output.value) return;
            output.select();
            document.execCommand('copy');
            alert('Copied!');
        }

        function downloadFile() {
            const output = document.getElementById('output').value;
            if (!output) return;
            
            const blob = new Blob([output], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'robots.txt';
            a.click();
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
