<!DOCTYPE html>
<html lang="fr" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Générateur de Lien WhatsApp - 205-Tools</title>
    <meta name="description" content="Créer des liens de discussion WhatsApp directs">
    
    <script>
    // Special Tools Logic
function initSpecialTool(type) {
    switch(type) {
        case 'whatsapp':
            initWhatsAppGenerator();
            break;
        case 'emoji-to-unicode':
            initEmojiToUnicode();
            break;
        case 'unicode-to-emoji':
            initUnicodeToEmoji();
            break;
        case 'text-to-binary':
            initTextToBinary();
            break;
        case 'binary-to-text':
            initBinaryToText();
            break;
        case 'number-to-words':
            initNumberToWords();
            break;
        case 'roman':
            initRomanConverter();
            break;
        case 'screen-resolution':
            initScreenResolution();
            break;
        case 'browser-info':
            initBrowserInfo();
            break;
        case 'speed-test':
            initSpeedTest();
            break;
    }
}

function initWhatsAppGenerator() {
    const phoneInput = document.getElementById('phone');
    const messageInput = document.getElementById('message');
    const resultDiv = document.getElementById('result');
    
    window.generateLink = function() {
        const phone = phoneInput.value.replace(/\D/g, '');
        const message = encodeURIComponent(messageInput.value || '');
        
        if (!phone) {
            alert('Please enter a phone number');
            return;
        }
        
        const link = `https://wa.me/${phone}${message ? '?text=' + message : ''}`;
        resultDiv.innerHTML = `
            <div class="p-4 bg-green-50 rounded-lg">
                <p class="font-medium mb-2">Your WhatsApp Link:</p>
                <a href="${link}" target="_blank" class="text-green-600 break-all">${link}</a>
                <button onclick="navigator.clipboard.writeText('${link}')" class="mt-2 px-4 py-2 bg-green-500 text-white rounded">Copy Link</button>
            </div>
        `;
    };
}

function initEmojiToUnicode() {
    const input = document.getElementById('emojiInput');
    const output = document.getElementById('unicodeOutput');
    
    input.addEventListener('input', () => {
        const text = input.value;
        let result = '';
        for (const char of text) {
            result += `U+${char.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')} `;
        }
        output.value = result.trim();
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initUnicodeToEmoji() {
    const input = document.getElementById('unicodeInput');
    const output = document.getElementById('emojiOutput');
    
    input.addEventListener('input', () => {
        const codes = input.value.split(/\s+/);
        let result = '';
        for (const code of codes) {
            const hex = code.replace('U+', '').replace('u+', '');
            result += String.fromCodePoint(parseInt(hex, 16));
        }
        output.value = result;
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initTextToBinary() {
    const input = document.getElementById('textInput');
    const output = document.getElementById('binaryOutput');
    
    input.addEventListener('input', () => {
        const text = input.value;
        const binary = text.split('').map(char => {
            return char.charCodeAt(0).toString(2).padStart(8, '0');
        }).join(' ');
        output.value = binary;
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initBinaryToText() {
    const input = document.getElementById('binaryInput');
    const output = document.getElementById('textOutput');
    
    input.addEventListener('input', () => {
        const binary = input.value.replace(/\s/g, '');
        let text = '';
        for (let i = 0; i < binary.length; i += 8) {
            const byte = binary.substr(i, 8);
            text += String.fromCharCode(parseInt(byte, 2));
        }
        output.value = text;
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initNumberToWords() {
    const ones = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
    const teens = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
    const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];
    
    const input = document.getElementById('numberInput');
    const output = document.getElementById('wordsOutput');
    
    function convertToWords(n) {
        if (n === 0) return 'zero';
        if (n < 10) return ones[n];
        if (n < 20) return teens[n - 10];
        if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? '-' + ones[n % 10] : '');
        if (n < 1000) return ones[Math.floor(n / 100)] + ' hundred' + (n % 100 ? ' and ' + convertToWords(n % 100) : '');
        return 'number too large';
    }
    
    input.addEventListener('input', () => {
        const num = parseInt(input.value);
        output.value = isNaN(num) ? '' : convertToWords(num);
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initRomanConverter() {
    const romanMap = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
    
    window.toRoman = function() {
        let num = parseInt(document.getElementById('numberInput').value);
        let result = '';
        for (const [roman, value] of Object.entries(romanMap)) {
            while (num >= value) {
                result += roman;
                num -= value;
            }
        }
        document.getElementById('romanOutput').value = result;
    };
    
    window.fromRoman = function() {
        const roman = document.getElementById('romanInput').value.toUpperCase();
        let result = 0;
        let i = 0;
        while (i < roman.length) {
            const twoChar = roman.substr(i, 2);
            if (romanMap[twoChar]) {
                result += romanMap[twoChar];
                i += 2;
            } else {
                result += romanMap[roman[i]] || 0;
                i++;
            }
        }
        document.getElementById('numberOutput').value = result;
    };
}

function initScreenResolution() {
    const display = document.getElementById('resolutionDisplay');
    
    function updateResolution() {
        display.innerHTML = `
            <div class="grid grid-cols-2 gap-4">
                <div class="p-4 bg-blue-50 rounded">Screen Width: ${window.screen.width}px</div>
                <div class="p-4 bg-blue-50 rounded">Screen Height: ${window.screen.height}px</div>
                <div class="p-4 bg-green-50 rounded">Window Width: ${window.innerWidth}px</div>
                <div class="p-4 bg-green-50 rounded">Window Height: ${window.innerHeight}px</div>
                <div class="p-4 bg-purple-50 rounded">Pixel Ratio: ${window.devicePixelRatio}</div>
                <div class="p-4 bg-purple-50 rounded">Color Depth: ${window.screen.colorDepth}-bit</div>
            </div>
        `;
    }
    
    updateResolution();
    window.addEventListener('resize', updateResolution);
}

function initBrowserInfo() {
    const display = document.getElementById('browserInfo');
    
    const info = {
        'Browser': navigator.userAgent.split(')')[0] + ')',
        'Language': navigator.language,
        'Platform': navigator.platform,
        'Cookies Enabled': navigator.cookieEnabled,
        'Online': navigator.onLine,
        'Screen Size': `${window.screen.width} x ${window.screen.height}`,
        'Viewport': `${window.innerWidth} x ${window.innerHeight}`,
        'Color Depth': `${window.screen.colorDepth}-bit`,
        'Touch Support': 'ontouchstart' in window ? 'Yes' : 'No'
    };
    
    let html = '<div class="space-y-2">';
    for (const [key, value] of Object.entries(info)) {
        html += `
            <div class="flex justify-between p-3 bg-gray-50 rounded">
                <span class="font-medium">${key}:</span>
                <span>${value}</span>
            </div>
        `;
    }
    html += '</div>';
    display.innerHTML = html;
}

function initSpeedTest() {
    const result = document.getElementById('speedResult');
    const btn = document.getElementById('startTest');
    
    window.startSpeedTest = async function() {
        btn.disabled = true;
        btn.textContent = 'Testing...';
        result.innerHTML = 'Testing download speed...';
        
        // Simple speed test using image load time
        const imageUrl = 'https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png';
        const startTime = performance.now();
        
        try {
            const response = await fetch(imageUrl + '?t=' + Date.now());
            const blob = await response.blob();
            const endTime = performance.now();
            
            const duration = (endTime - startTime) / 1000; // seconds
            const bitsLoaded = blob.size * 8;
            const speedBps = bitsLoaded / duration;
            const speedMbps = (speedBps / 1024 / 1024).toFixed(2);
            
            result.innerHTML = `
                <div class="p-4 bg-green-50 rounded text-center">
                    <p class="text-2xl font-bold text-green-600">${speedMbps} Mbps</p>
                    <p class="text-sm text-gray-600">Download Speed</p>
                </div>
            `;
        } catch (err) {
            result.innerHTML = '<p class="text-red-500">Test failed. Please try again.</p>';
        }
        
        btn.disabled = false;
        btn.textContent = 'Start Test';
    };
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initSpecialTool('whatsapp');
    });
      </script>

<body class="  min-h-screen">
    <header class="card shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/fr/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</span>
                </a>
                
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">💬 Spécial</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">Générateur de Lien WhatsApp</h1>
            <p class="text-xl text-white/90">Créer des liens de discussion WhatsApp</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="card rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <div class="text-6xl mb-4">💬</div>
                    <p class="text-gray-600 dark:text-gray-400">Générer des liens wa.me avec numéro de téléphone et message personnalisé</p>
                </div>
                
                <!-- Numéro de téléphone -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Numéro de Téléphone (avec indicatif)</label>
                    <input type="tel" id="phone" placeholder="ex: 33612345678" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                    <p class="text-xs text-gray-500 mt-1">Entrez le numéro sans + ou 00 (ex: 33612345678 pour la France)</p>
                </div>

                <!-- Message -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">Message Personnalisé (optionnel)</label>
                    <textarea id="message" rows="3" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700" placeholder="Entrez un message prérempli..."></textarea>
                </div>

                <!-- Bouton Générer -->
                <button onclick="generateLink()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    Générer le Lien
                </button>

                <!-- Résultat -->
                <div id="result" class="hidden">
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-6 mb-6">
                        <p class="text-sm text-gray-500 mb-2">Lien Généré</p>
                        <input type="text" id="waLink" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 text-sm font-mono">
                    </div>
                    
                    <div class="flex gap-4">
                        <button onclick="copyLink()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">
                            Copier le Lien
                        </button>
                        <a id="openLink" href="#" target="_blank" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-medium text-center hover:bg-green-600 transition-all">
                            Ouvrir dans WhatsApp
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generateLink() {
            const phone = document.getElementById('phone').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!phone) {
                alert('Veuillez entrer un numéro de téléphone');
                return;
            }

            const cleanPhone = phone.replace(/\D/g, '');
            let waUrl = `https://wa.me/${cleanPhone}`;
            if (message) {
                waUrl += `?text=${encodeURIComponent(message)}`;
            }

            document.getElementById('waLink').value = waUrl;
            document.getElementById('openLink').href = waUrl;
            document.getElementById('result').classList.remove('hidden');
        }

        function copyLink() {
            const link = document.getElementById('waLink');
            link.select();
            document.execCommand('copy');
            alert('Lien copié!');
        }
    </script>
