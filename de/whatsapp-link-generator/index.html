<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WhatsApp Link Generator - 205-Tools</title>
    <meta name="description" content="WhatsApp Chat-Links erstellen">
    
    <script>
    // Special Tools Logic
function initSpecialTool(type) {
    switch(type) {
        case 'whatsapp':
            initWhatsAppGenerator();
            break;
        case 'emoji-to-unicode':
            initEmojiToUnicode();
            break;
        case 'unicode-to-emoji':
            initUnicodeToEmoji();
            break;
        case 'text-to-binary':
            initTextToBinary();
            break;
        case 'binary-to-text':
            initBinaryToText();
            break;
        case 'number-to-words':
            initNumberToWords();
            break;
        case 'roman':
            initRomanConverter();
            break;
        case 'screen-resolution':
            initScreenResolution();
            break;
        case 'browser-info':
            initBrowserInfo();
            break;
        case 'speed-test':
            initSpeedTest();
            break;
    }
}

function initWhatsAppGenerator() {
    const phoneInput = document.getElementById('phone');
    const messageInput = document.getElementById('message');
    const resultDiv = document.getElementById('result');
    
    window.generateLink = function() {
        const phone = phoneInput.value.replace(/\D/g, '');
        const message = encodeURIComponent(messageInput.value || '');
        
        if (!phone) {
            alert('Please enter a phone number');
            return;
        }
        
        const link = `https://wa.me/${phone}${message ? '?text=' + message : ''}`;
        resultDiv.innerHTML = `
            <div class="t-p-md t-state-success-light t-rounded">
                <p class="t-font-medium t-mb-sm">Your WhatsApp Link:</p>
                <a href="${link}" target="_blank" class="t-text-success t-break-all">${link}</a>
                <button onclick="navigator.clipboard.writeText('${link}')" class="t-mt-sm t-px-md t-py-xs t-text-primary t-rounded-sm">Copy Link</button>
            </div>
        `;
    };
}

function initEmojiToUnicode() {
    const input = document.getElementById('emojiInput');
    const output = document.getElementById('unicodeOutput');
    
    input.addEventListener('input', () => {
        const text = input.value;
        let result = '';
        for (const char of text) {
            result += `U+${char.codePointAt(0).toString(16).toUpperCase().padStart(4, '0')} `;
        }
        output.value = result.trim();
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initUnicodeToEmoji() {
    const input = document.getElementById('unicodeInput');
    const output = document.getElementById('emojiOutput');
    
    input.addEventListener('input', () => {
        const codes = input.value.split(/\s+/);
        let result = '';
        for (const code of codes) {
            const hex = code.replace('U+', '').replace('u+', '');
            result += String.fromCodePoint(parseInt(hex, 16));
        }
        output.value = result;
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initTextToBinary() {
    const input = document.getElementById('textInput');
    const output = document.getElementById('binaryOutput');
    
    input.addEventListener('input', () => {
        const text = input.value;
        const binary = text.split('').map(char => {
            return char.charCodeAt(0).toString(2).padStart(8, '0');
        }).join(' ');
        output.value = binary;
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initBinaryToText() {
    const input = document.getElementById('binaryInput');
    const output = document.getElementById('textOutput');
    
    input.addEventListener('input', () => {
        const binary = input.value.replace(/\s/g, '');
        let text = '';
        for (let i = 0; i < binary.length; i += 8) {
            const byte = binary.substr(i, 8);
            text += String.fromCharCode(parseInt(byte, 2));
        }
        output.value = text;
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initNumberToWords() {
    const ones = ['', 'one', 'two', 'three', 'four', 'five', 'six', 'seven', 'eight', 'nine'];
    const teens = ['ten', 'eleven', 'twelve', 'thirteen', 'fourteen', 'fifteen', 'sixteen', 'seventeen', 'eighteen', 'nineteen'];
    const tens = ['', '', 'twenty', 'thirty', 'forty', 'fifty', 'sixty', 'seventy', 'eighty', 'ninety'];
    
    const input = document.getElementById('numberInput');
    const output = document.getElementById('wordsOutput');
    
    function convertToWords(n) {
        if (n === 0) return 'zero';
        if (n < 10) return ones[n];
        if (n < 20) return teens[n - 10];
        if (n < 100) return tens[Math.floor(n / 10)] + (n % 10 ? '-' + ones[n % 10] : '');
        if (n < 1000) return ones[Math.floor(n / 100)] + ' hundred' + (n % 100 ? ' and ' + convertToWords(n % 100) : '');
        return 'number too large';
    }
    
    input.addEventListener('input', () => {
        const num = parseInt(input.value);
        output.value = isNaN(num) ? '' : convertToWords(num);
    });
    
    window.copyResult = function() {
        navigator.clipboard.writeText(output.value);
    };
}

function initRomanConverter() {
    const romanMap = { M: 1000, CM: 900, D: 500, CD: 400, C: 100, XC: 90, L: 50, XL: 40, X: 10, IX: 9, V: 5, IV: 4, I: 1 };
    
    window.toRoman = function() {
        let num = parseInt(document.getElementById('numberInput').value);
        let result = '';
        for (const [roman, value] of Object.entries(romanMap)) {
            while (num >= value) {
                result += roman;
                num -= value;
            }
        }
        document.getElementById('romanOutput').value = result;
    };
    
    window.fromRoman = function() {
        const roman = document.getElementById('romanInput').value.toUpperCase();
        let result = 0;
        let i = 0;
        while (i < roman.length) {
            const twoChar = roman.substr(i, 2);
            if (romanMap[twoChar]) {
                result += romanMap[twoChar];
                i += 2;
            } else {
                result += romanMap[roman[i]] || 0;
                i++;
            }
        }
        document.getElementById('numberOutput').value = result;
    };
}

function initScreenResolution() {
    const display = document.getElementById('resolutionDisplay');
    
    function updateResolution() {
        display.innerHTML = `
            <div class="t-grid t-grid-2 t-gap-md">
                <div class="t-p-md t-state-info-light t-rounded-sm">Screen Width: ${window.screen.width}px</div>
                <div class="t-p-md t-state-info-light t-rounded-sm">Screen Height: ${window.screen.height}px</div>
                <div class="t-p-md t-state-success-light t-rounded-sm">Window Width: ${window.innerWidth}px</div>
                <div class="t-p-md t-state-success-light t-rounded-sm">Window Height: ${window.innerHeight}px</div>
                <div class="t-p-md t-state-purple-light t-rounded-sm">Pixel Ratio: ${window.devicePixelRatio}</div>
                <div class="t-p-md t-state-purple-light t-rounded-sm">Color Depth: ${window.screen.colorDepth}-bit</div>
            </div>
        `;
    }
    
    updateResolution();
    window.addEventListener('resize', updateResolution);
}

function initBrowserInfo() {
    const display = document.getElementById('browserInfo');
    
    const info = {
        'Browser': navigator.userAgent.split(')')[0] + ')',
        'Language': navigator.language,
        'Platform': navigator.platform,
        'Cookies Enabled': navigator.cookieEnabled,
        'Online': navigator.onLine,
        'Screen Size': `${window.screen.width} x ${window.screen.height}`,
        'Viewport': `${window.innerWidth} x ${window.innerHeight}`,
        'Color Depth': `${window.screen.colorDepth}-bit`,
        'Touch Support': 'ontouchstart' in window ? 'Yes' : 'No'
    };
    
    let html = '<div class="t-space-y-sm">';
    for (const [key, value] of Object.entries(info)) {
        html += `
            <div class="t-flex t-justify-between t-p-sm t-rounded-sm">
                <span class="t-font-medium">${key}:</span>
                <span>${value}</span>
            </div>
        `;
    }
    html += '</div>';
    display.innerHTML = html;
}

function initSpeedTest() {
    const result = document.getElementById('speedResult');
    const btn = document.getElementById('startTest');
    
    window.startSpeedTest = async function() {
        btn.disabled = true;
        btn.textContent = 'Testing...';
        result.innerHTML = 'Testing download speed...';
        
        // Simple speed test using image load time
        const imageUrl = 'https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png';
        const startTime = performance.now();
        
        try {
            const response = await fetch(imageUrl + '?t=' + Date.now());
            const blob = await response.blob();
            const endTime = performance.now();
            
            const duration = (endTime - startTime) / 1000; // seconds
            const bitsLoaded = blob.size * 8;
            const speedBps = bitsLoaded / duration;
            const speedMbps = (speedBps / 1024 / 1024).toFixed(2);
            
            result.innerHTML = `
                <div class="t-p-md t-state-success-light t-rounded-sm t-text-center">
                    <p class="t-text-2xl t-font-bold t-text-success">${speedMbps} Mbps</p>
                    <p class="t-text-sm t-text-muted">Download Speed</p>
                </div>
            `;
        } catch (err) {
            result.innerHTML = '<p class="t-text-error">Test failed. Please try again.</p>';
        }
        
        btn.disabled = false;
        btn.textContent = 'Start Test';
    };
}

    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initSpecialTool('whatsapp');
    });
      </script>

<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/de/" class="t-flex t-items-center t-space-x-sm">
                    <span class="t-text-2xl t-font-bold">205-Tools</span>
                </a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-text-center">
            <span class="t-inline-block t-px-sm t-py-xs t-rounded-full t-text-sm t-mb-md">💬 Spezial</span>
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">WhatsApp Link Generator</h1>
            <p class="t-text-xl">WhatsApp Chat-Links erstellen</p>
        </div>
    </section>

    <section class="t-py-xl">
        <div class="t-container-sm">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-text-center t-mb-xl">
                    <div class="t-text-6xl t-mb-md">💬</div>
                    <p class="t-text-muted">wa.me Links mit Telefonnummer und personalisierter Nachricht generieren</p>
                </div>
                
                <!-- Telefonnummer -->
                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Telefonnummer (mit Ländervorwahl)</label>
                    <input type="tel" id="phone" placeholder="z.B.: 491701234567" class="t-w-full t-p-sm t-rounded t-border">
                    <p class="t-text-xs t-mt-xs">Nummer ohne + oder 00 eingeben (z.B.: 491701234567 für Deutschland)</p>
                </div>

                <!-- Nachricht -->
                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">Personalisierte Nachricht (optional)</label>
                    <textarea id="message" rows="3" class="t-w-full t-p-sm t-rounded t-border" placeholder="Vorausgefüllte Nachricht eingeben..."></textarea>
                </div>

                <!-- Button Generieren -->
                <button onclick="generateLink()" class="btn">
                    Link Erstellen
                </button>

                <!-- Ergebnis -->
                <div id="result" class="t-hidden">
                    <div class="t-rounded-lg t-p-lg t-mb-lg">
                        <p class="t-text-sm t-mb-sm">Erstellter Link</p>
                        <input type="text" id="waLink" readonly class="t-w-full t-p-sm t-rounded t-border t-text-sm t-font-mono">
                    </div>
                    
                    <div class="t-flex t-gap-md">
                        <button onclick="copyLink()" class="t-flex-1 t-py-sm t-rounded-lg t-font-medium t-transition">
                            Link Kopieren
                        </button>
                        <a id="openLink" href="#" target="_blank" class="t-flex-1 t-py-sm t-text-primary t-rounded-lg t-font-medium t-text-center t-transition">
                            In WhatsApp Öffnen
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generateLink() {
            const phone = document.getElementById('phone').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!phone) {
                alert('Bitte geben Sie eine Telefonnummer ein');
                return;
            }

            const cleanPhone = phone.replace(/\D/g, '');
            let waUrl = `https://wa.me/${cleanPhone}`;
            if (message) {
                waUrl += `?text=${encodeURIComponent(message)}`;
            }

            document.getElementById('waLink').value = waUrl;
            document.getElementById('openLink').href = waUrl;
            document.getElementById('result').classList.remove('hidden');
        }

        function copyLink() {
            const link = document.getElementById('waLink');
            link.select();
            document.execCommand('copy');
            alert('Link kopiert!');
        }
    </script>
