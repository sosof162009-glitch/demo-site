        const categoryIcons = {
            images: "🖼️", pdf: "📄", text: "✍️", developer: "💻",
            colors: "🎨", math: "🔢", time: "⏱️", units: "📐",
            seo: "🌐", security: "🔐", data: "📊", special: "🎯"
        };

        const categoryCounts = {
            images: 42, pdf: 18, text: 22, developer: 28,
            colors: 15, math: 12, time: 10, units: 16,
            seo: 14, security: 8, data: 10, special: 10
        };

        let currentLang = localStorage.getItem('lang') || 'ar';
        let isDark = localStorage.getItem('darkMode') === 'true';

        function updateLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            // Update text content
            const t = translations[lang];
            document.getElementById('siteTagline').textContent = t.tagline;
            document.getElementById('searchInput').placeholder = t.searchPlaceholder;
            document.getElementById('categoriesTitle').textContent = t.categories;
            document.getElementById('allToolsTitle').textContent = t.allTools;
            document.getElementById('statTools').textContent = `205 ${t.tools}`;
            document.getElementById('statCategories').textContent = `12 ${t.categoriesCount}`;
            document.getElementById('statLanguages').textContent = `5 ${t.languages}`;
            document.getElementById('darkModeText').textContent = isDark ? t.lightMode : t.darkMode;
            
            renderCategories();
            renderTools();
        }

        function toggleDarkMode() {
            isDark = !isDark;
            localStorage.setItem('darkMode', isDark);
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            document.getElementById('darkModeText').textContent = isDark ? 
                translations[currentLang].lightMode : translations[currentLang].darkMode;
        }

        function renderCategories() {
            const container = document.getElementById('categoriesGrid');
            const cats = Object.keys(categoriesData);
            container.innerHTML = cats.map(cat => `
                <a href="category/${cat}/index.html" class="card-hover bg-white dark:bg-darkcard rounded-xl p-6 shadow-lg border border-gray-200 dark:border-gray-700 text-center group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">${categoryIcons[cat]}</div>
                    <h3 class="font-bold text-lg text-gray-800 dark:text-white mb-2">${categoriesData[cat][currentLang]}</h3>
                    <span class="text-sm text-gray-500 dark:text-gray-400">${categoryCounts[cat]} ${translations[currentLang].tools}</span>
                </a>
            `).join('');
        }

        function renderTools(searchTerm = '', lang = 'ar') {
            const container = document.getElementById('toolsGrid');
            let filtered = toolsData;
            
            if (searchTerm) {
                filtered = toolsData.filter(t => 
                    (t.name.toLowerCase().includes(searchTerm.toLowerCase()) ||
                     (t.nameAr && t.nameAr.toLowerCase().includes(searchTerm.toLowerCase())) ||
                     (t.nameFr && t.nameFr.toLowerCase().includes(searchTerm.toLowerCase())) ||
                     (t.nameEs && t.nameEs.toLowerCase().includes(searchTerm.toLowerCase())) ||
                     (t.nameDe && t.nameDe.toLowerCase().includes(searchTerm.toLowerCase()))) ||
                    categoriesData[t.category][currentLang].toLowerCase().includes(searchTerm.toLowerCase())
                );
            }
            
            container.innerHTML = filtered.map(tool => `
                <a href="tool/${tool.slug}/index.html" class="tool-card bg-white dark:bg-darkcard rounded-lg p-4 shadow-md border border-gray-200 dark:border-gray-700 flex items-center gap-4 hover:border-primary dark:hover:border-primary">
                    <div class="w-12 h-12 bg-gradient-to-br from-primary to-secondary rounded-lg flex items-center justify-center text-white text-xl font-bold shrink-0">
                        ${tool.name.charAt(0)}
                    </div>
                    <div class="flex-1 min-w-0">
                        <h4 class="font-semibold text-gray-800 dark:text-white truncate">${tool[`name${lang.charAt(0).toUpperCase() + lang.slice(1)}`] || tool.name}</h4>
                        <span class="text-xs text-gray-500 dark:text-gray-400">${categoriesData[tool.category][currentLang]}</span>
                    </div>
                    <span class="text-primary dark:text-secondary opacity-0 group-hover:opacity-100 transition-opacity">→</span>
                </a>
            `).join('');
            
            if (filtered.length === 0) {
                container.innerHTML = `<div class="col-span-full text-center py-12 text-gray-500">${currentLang === 'ar' ? 'لا توجد نتائج' : 'No results found'}</div>`;
            }
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (isDark) document.documentElement.classList.add('dark');
            updateLanguage(currentLang);
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderTools(e.target.value, currentLang);
            });
        });
    </script>
