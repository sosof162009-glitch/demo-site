            { id: 202, slug: "roman-numeral-converter", category: "special", desc: { ar: "محول الأرقام الرومانية", en: "Roman Numeral Converter", fr: "Convertisseur de chiffres romains", es: "Convertidor de números romanos", de: "Römische Zahlen Konverter" } },
            { id: 203, slug: "screen-resolution-detector", category: "special", desc: { ar: "كاشف دقة الشاشة", en: "Screen Resolution Detector", fr: "Détecteur de résolution d'écran", es: "Detector de resolución de pantalla", de: "Bildschirmauflösungsdetektor" } },
            { id: 204, slug: "browser-info-detector", category: "special", desc: { ar: "كاشف معلومات المتصفح", en: "Browser Info Detector", fr: "Détecteur d'informations de navigateur", es: "Detector de información del navegador", de: "Browser-Info-Detektor" } },

        ];

        let currentLang = localStorage.getItem('lang') || 'ar';
        let isDark = localStorage.getItem('darkMode') === 'true';

        function getToolName(toolId, lang) {
            const translations = window['toolsData' + lang.toUpperCase()];
            return translations ? translations[toolId] : null;
        }

        function updateLanguage(lang) {
            currentLang = lang;
            localStorage.setItem('lang', lang);
            document.documentElement.lang = lang;
            document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
            
            // Update text content
            const t = translations[lang];
            document.getElementById('siteTagline').textContent = t.tagline;
            document.getElementById('searchInput').placeholder = t.searchPlaceholder;
            document.getElementById('categoriesTitle').textContent = t.categories;
            document.getElementById('allToolsTitle').textContent = t.allTools;
            document.getElementById('statTools').textContent = `205 ${t.tools}`;
            document.getElementById('statCategories').textContent = `12 ${t.categoriesCount}`;
            document.getElementById('statLanguages').textContent = `5 ${t.languages}`;
            document.getElementById('darkModeText').textContent = isDark ? t.lightMode : t.darkMode;
            
            renderCategories();
            renderAllTools();
        }

        function toggleDarkMode() {
            isDark = !isDark;
            localStorage.setItem('darkMode', isDark);
            if (isDark) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            document.getElementById('darkModeText').textContent = isDark ? 
                translations[currentLang].lightMode : translations[currentLang].darkMode;
        }

        function renderCategories() {
            const container = document.getElementById('categoriesGrid');
            const cats = Object.keys(categoriesData);
            container.innerHTML = cats.map(cat => `
                <a href="#${cat}" class="card-hover bg-white dark:bg-darkcard rounded-xl p-6 shadow-lg border border-gray-200 dark:border-gray-700 text-center group">
                    <div class="text-5xl mb-4 group-hover:scale-110 transition-transform">${categoriesData[cat].icon}</div>
                    <h3 class="font-bold text-lg text-gray-800 dark:text-white mb-2">${categoriesData[cat][currentLang]}</h3>
                    <span class="text-sm text-gray-500 dark:text-gray-400">${categoriesData[cat].count} ${translations[currentLang].tools}</span>
                </a>
            `).join('');
        }

        function renderToolCard(tool, lang) {
            const toolName = getToolName(tool.id, lang) || tool.desc[lang];
            const categoryName = categoriesData[tool.category][lang];
            const firstLetter = toolName.charAt(0);
            
            return `
                <a href="tool/${tool.slug}/index.html" class="tool-card group bg-white dark:bg-darkcard rounded-lg p-4 shadow-md border border-gray-200 dark:border-gray-700 hover:border-primary dark:hover:border-primary flex flex-col h-full">
                    <div class="flex items-start gap-4 mb-3">
                        <div class="w-12 h-12 bg-gradient-to-br from-primary to-secondary rounded-lg flex items-center justify-center text-white text-xl font-bold shrink-0 group-hover:scale-110 transition-transform">
                            ${firstLetter}
                        </div>
                        <div class="flex-1 min-w-0">
                            <h4 class="font-semibold text-gray-800 dark:text-white truncate text-lg" title="${toolName}">${toolName}</h4>
                            <span class="text-xs text-gray-500 dark:text-gray-400">${categoryName}</span>
                        </div>
                    </div>
                    <p class="text-sm text-gray-600 dark:text-gray-400 line-clamp-2 mb-3 flex-grow">${tool.desc[lang]}</p>
                    <div class="flex items-center justify-between mt-auto pt-3 border-t border-gray-100 dark:border-gray-700">
                        <span class="text-xs text-gray-400">ID: ${tool.id}</span>
                        <span class="text-primary dark:text-secondary text-sm font-medium group-hover:translate-x-1 transition-transform flex items-center gap-1">
                            ${translations[lang].viewTool}
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                        </span>
                    </div>
                </a>
            `;
        }

        function renderAllTools(searchTerm = '') {
            const container = document.getElementById('allToolsGrid');
            
            let filtered = toolsData;
            if (searchTerm) {
                const term = searchTerm.toLowerCase();
                filtered = toolsData.filter(t => {
                    const nameAr = getToolName(t.id, 'ar') || '';
                    const nameEn = getToolName(t.id, 'en') || '';
                    const nameFr = getToolName(t.id, 'fr') || '';
                    const nameEs = getToolName(t.id, 'es') || '';
                    const nameDe = getToolName(t.id, 'de') || '';
                    const descAr = t.desc.ar || '';
                    const descEn = t.desc.en || '';
                    
                    return nameAr.toLowerCase().includes(term) ||
                           nameEn.toLowerCase().includes(term) ||
                           nameFr.toLowerCase().includes(term) ||
                           nameEs.toLowerCase().includes(term) ||
                           nameDe.toLowerCase().includes(term) ||
                           descAr.toLowerCase().includes(term) ||
                           descEn.toLowerCase().includes(term) ||
                           categoriesData[t.category][currentLang].toLowerCase().includes(term);
                });
            }
            
            // Group by category
            const grouped = {};
            filtered.forEach(tool => {
                if (!grouped[tool.category]) grouped[tool.category] = [];
                grouped[tool.category].push(tool);
            });
            
            // Render by category
            let html = '';
            const categoryOrder = ['images', 'pdf', 'text', 'developer', 'colors', 'math', 'time', 'units', 'seo', 'security', 'data', 'special'];
            
            categoryOrder.forEach(cat => {
                if (grouped[cat] && grouped[cat].length > 0) {
                    html += `
                        <div id="${cat}" class="category-section mb-12">
                            <div class="flex items-center gap-3 mb-6">
                                <span class="text-3xl">${categoriesData[cat].icon}</span>
                                <h3 class="text-2xl font-bold text-gray-800 dark:text-white">${categoriesData[cat][currentLang]}</h3>
                                <span class="bg-primary/10 text-primary dark:bg-primary/20 dark:text-primary px-3 py-1 rounded-full text-sm font-medium">${grouped[cat].length} ${translations[currentLang].tools}</span>
                            </div>
                            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                                ${grouped[cat].map(tool => renderToolCard(tool, currentLang)).join('')}
                            </div>
                        </div>
                    `;
                }
            });
            
            container.innerHTML = html || `<div class="text-center py-12 text-gray-500">${currentLang === 'ar' ? 'لا توجد نتائج' : 'No results found'}</div>`;
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', () => {
            if (isDark) document.documentElement.classList.add('dark');
            updateLanguage(currentLang);
            
            document.getElementById('searchInput').addEventListener('input', (e) => {
                renderAllTools(e.target.value);
            });
            
            document.getElementById('langSwitcher').value = currentLang;
        });
    </script>
</head>
