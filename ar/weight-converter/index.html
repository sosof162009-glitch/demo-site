<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محول الوزن - 205-أدوات</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/ar/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-أدوات</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">📐 وحدات</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">محول الوزن</h1>
            <p class="text-xl text-white/90">تحويل بين وحدات الوزن</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="grid md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label class="block text-sm font-medium mb-2">من</label>
                        <input type="number" id="fromValue" value="1" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 mb-2">
                        <select id="fromUnit" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                            <option value="kg" selected>كيلوجرام (كغ)</option>
                            <option value="g">جرام (غ)</option>
                            <option value="mg">مليجرام (مغ)</option>
                            <option value="lb">رطل (lb)</option>
                            <option value="oz">أونصة (oz)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm font-medium mb-2">إلى</label>
                        <input type="number" id="toValue" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 mb-2 bg-gray-50">
                        <select id="toUnit" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700">
                            <option value="kg">كيلوجرام (كغ)</option>
                            <option value="g">جرام (غ)</option>
                            <option value="mg">مليجرام (مغ)</option>
                            <option value="lb" selected>رطل (lb)</option>
                            <option value="oz">أونصة (oz)</option>
                        </select>
                    </div>
                </div>

                <button onclick="convert()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    تحويل
                </button>
            </div>
        </div>
    </section>

    <script>
        const toGrams = {
            kg: 1000, g: 1, mg: 0.001,
            lb: 453.592, oz: 28.3495
        };

        function convert() {
            const value = parseFloat(document.getElementById('fromValue').value);
            const from = document.getElementById('fromUnit').value;
            const to = document.getElementById('toUnit').value;
            if (isNaN(value)) { document.getElementById('toValue').value = ''; return; }
            const grams = value * toGrams[from];
            const result = grams / toGrams[to];
            document.getElementById('toValue').value = result.toFixed(6).replace(/\.?0+$/, '');
        }

        document.getElementById('fromValue').addEventListener('input', convert);
        document.getElementById('fromUnit').addEventListener('change', convert);
        document.getElementById('toUnit').addEventListener('change', convert);
        convert();
    </script>
</body>
</html>
