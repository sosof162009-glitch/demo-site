<body>
    <header class="t-card t-shadow-sm t-site-header">
        <div class="t-container t-container t-px-md">
            <div class="t-flex t-items-center t-justify-between">
                <a href="/ar/" class="t-text-2xl t-font-bold">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="t-text-primary t-py-2xl">
        <div class="t-container-sm t-container t-px-md t-text-center">
            <h1 class="t-text-4xl t-text-md-5xl t-font-bold t-mb-md">مولد الرابط الأساسي</h1>
            <p class="t-text-xl">SEO Tool</p>
        </div>
    </section>

    <section>
        <div class="t-container-sm t-container t-px-md">
            <div class="t-card t-rounded-xl t-shadow-lg t-p-xl">
                <div class="t-mb-lg">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">الرابط</label>
                    <input type="url" id="urlInput" class="t-w-full t-p-md t-rounded t-border t-font-mono t-text-sm" placeholder="https://example.com/page">
                </div>

                <button onclick="generate()" class="t-w-full t-py-md t-text-primary t-rounded-lg t-font-semibold t-text-lg t-hover-shadow t-transition t-mb-lg" id="actionBtn">
                    إنشاء
                </button>

                <div class="t-mb-md">
                    <label class="t-block t-text-sm t-font-medium t-mb-sm">وسم الأساسي</label>
                    <textarea id="result" rows="3" class="t-w-full t-p-md t-rounded t-border t-font-mono t-text-sm" readonly></textarea>
                </div>

                <button onclick="copyResult()" class="t-px-lg t-py-sm t-rounded t-font-medium t-transition">
                    نسخ
                </button>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            const tag = <link rel="canonical" href="${url}" />;
            document.getElementById('result').value = tag;
        }
        
        function copyResult() {
            const result = document.getElementById('result');
            result.select();
            document.execCommand('copy');
        }
    </script>
</body>
