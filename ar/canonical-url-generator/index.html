<body class="  min-h-screen">
    <header class="card shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/ar/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-Tools</a>
                
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <h1 class="text-4xl md:text-5xl font-bold mb-4">مولد الرابط الأساسي</h1>
            <p class="text-xl text-white/90">SEO Tool</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="card rounded-2xl shadow-xl p-8">
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">الرابط</label>
                    <input type="url" id="urlInput" class="w-full p-4 rounded-lg border dark:border-gray-600 dark:bg-gray-700 font-mono text-sm" placeholder="https://example.com/page">
                </div>

                <button onclick="generate()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-6" id="actionBtn">
                    إنشاء
                </button>

                <div class="mb-4">
                    <label class="block text-sm font-medium mb-2">وسم الأساسي</label>
                    <textarea id="result" rows="3" class="w-full p-4 rounded-lg border dark:border-gray-600 dark:bg-gray-700 font-mono text-sm bg-gray-50 dark:bg-gray-800" readonly></textarea>
                </div>

                <button onclick="copyResult()" class="px-6 py-3 bg-gray-200 dark:bg-gray-700 rounded-lg font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">
                    نسخ
                </button>
            </div>
        </div>
    </section>

    <script>
        function generate() {
            const url = document.getElementById('urlInput').value.trim();
            if (!url) return;
            const tag = <link rel="canonical" href="${url}" />;
            document.getElementById('result').value = tag;
        }
        
        function copyResult() {
            const result = document.getElementById('result');
            result.select();
            document.execCommand('copy');
        }
    </script>
</body>
