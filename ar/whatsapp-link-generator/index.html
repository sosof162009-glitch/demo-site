<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مولد روابط واتساب - 205-أدوات</title>
    <meta name="description" content="إنشاء روابط دردشة واتساب مباشرة بدون حفظ جهات الاتصال">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/ar/" class="flex items-center space-x-2">
                    <span class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-أدوات</span>
                </a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">💬 خاصة</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">مولد روابط واتساب</h1>
            <p class="text-xl text-white/90">إنشاء روابط دردشة مباشرة لواتساب</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="text-center mb-8">
                    <div class="text-6xl mb-4">💬</div>
                    <p class="text-gray-600 dark:text-gray-400">إنشاء روابط wa.me مع رقم الهاتف ورسالة مخصصة</p>
                </div>
                
                <!-- رقم الهاتف -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">رقم الهاتف (مع رمز الدولة)</label>
                    <input type="tel" id="phone" placeholder="مثال: 966501234567" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 text-right">
                    <p class="text-xs text-gray-500 mt-1">أدخل الرقم بدون + أو 00 (مثال: 966501234567 للسعودية)</p>
                </div>

                <!-- الرسالة -->
                <div class="mb-6">
                    <label class="block text-sm font-medium mb-2">رسالة مخصصة (اختياري)</label>
                    <textarea id="message" rows="3" class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-700 text-right" placeholder="أدخل رسالة مسبقة..."></textarea>
                </div>

                <!-- زر التوليد -->
                <button onclick="generateLink()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all mb-8">
                    إنشاء الرابط
                </button>

                <!-- النتيجة -->
                <div id="result" class="hidden">
                    <div class="bg-gray-50 dark:bg-gray-700 rounded-xl p-6 mb-6">
                        <p class="text-sm text-gray-500 mb-2">الرابط المُنشأ</p>
                        <input type="text" id="waLink" readonly class="w-full p-3 rounded-lg border dark:border-gray-600 dark:bg-gray-600 text-sm font-mono text-right" dir="ltr">
                    </div>
                    
                    <div class="flex gap-4">
                        <button onclick="copyLink()" class="flex-1 py-3 bg-gray-200 dark:bg-gray-700 rounded-xl font-medium hover:bg-gray-300 dark:hover:bg-gray-600 transition-all">
                            نسخ الرابط
                        </button>
                        <a id="openLink" href="#" target="_blank" class="flex-1 py-3 bg-green-500 text-white rounded-xl font-medium text-center hover:bg-green-600 transition-all">
                            فتح في واتساب
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script>
        function generateLink() {
            const phone = document.getElementById('phone').value.trim();
            const message = document.getElementById('message').value.trim();

            if (!phone) {
                alert('الرجاء إدخال رقم الهاتف');
                return;
            }

            // إزالة أي أحرف غير رقمية
            const cleanPhone = phone.replace(/\D/g, '');

            // بناء رابط wa.me
            let waUrl = `https://wa.me/${cleanPhone}`;
            if (message) {
                waUrl += `?text=${encodeURIComponent(message)}`;
            }

            document.getElementById('waLink').value = waUrl;
            document.getElementById('openLink').href = waUrl;
            document.getElementById('result').classList.remove('hidden');
        }

        function copyLink() {
            const link = document.getElementById('waLink');
            link.select();
            document.execCommand('copy');
            alert('تم نسخ الرابط!');
        }
    </script>
</body>
</html>
