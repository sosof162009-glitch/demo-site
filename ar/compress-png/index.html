<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ضغط PNG - 205-أدوات</title>
    <meta name="description" content="ضغط صور PNG لتقليل حجم الملف">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: { primary: '#6366f1' } } } };
    </script>
    <style>
        .drop-zone { border: 2px dashed #6366f1; transition: all 0.3s; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #4f46e5; background: rgba(99, 102, 241, 0.05); }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen">
    <header class="bg-white dark:bg-gray-800 shadow-sm sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <a href="/ar/" class="text-2xl font-bold bg-gradient-to-r from-indigo-500 to-purple-600 bg-clip-text text-transparent">205-أدوات</a>
                <button onclick="document.documentElement.classList.toggle('dark')" class="p-2 rounded-lg bg-gray-100 dark:bg-gray-700">🌙</button>
            </div>
        </div>
    </header>

    <section class="bg-gradient-to-br from-indigo-500 via-purple-500 to-pink-500 text-white py-16">
        <div class="max-w-4xl mx-auto px-4 text-center">
            <span class="inline-block px-3 py-1 bg-white/20 rounded-full text-sm mb-4">🖼️ الصور</span>
            <h1 class="text-4xl md:text-5xl font-bold mb-4">ضغط PNG</h1>
            <p class="text-xl text-white/90">تقليل حجم ملفات PNG</p>
        </div>
    </section>

    <section class="py-12">
        <div class="max-w-4xl mx-auto px-4">
            <div class="bg-white dark:bg-gray-800 rounded-2xl shadow-xl p-8">
                <div class="drop-zone rounded-xl p-12 text-center cursor-pointer mb-8" id="dropZone">
                    <div class="text-5xl mb-4">📁</div>
                    <p class="text-lg font-medium mb-2">اسحب وأفلت صورة PNG هنا</p>
                    <p class="text-gray-500">أو انقر للاختيار</p>
                    <input type="file" class="hidden" id="fileInput" accept=".png">
                </div>

                <button onclick="compressImage()" class="w-full py-4 bg-gradient-to-r from-indigo-500 to-purple-600 text-white rounded-xl font-semibold text-lg hover:shadow-lg transition-all">
                    ضغط الصورة
                </button>

                <div id="result" class="hidden mt-8 p-6 bg-green-50 dark:bg-green-900/20 rounded-xl text-center">
                    <p class="text-green-600 dark:text-green-400 font-medium mb-2">✅ تم الضغط بنجاح!</p>
                    <p class="text-sm text-gray-600 mb-4" id="sizeInfo"></p>
                    <a href="#" id="downloadLink" class="inline-block px-6 py-3 bg-green-500 text-white rounded-lg hover:bg-green-600">تحميل الصورة المضغوطة</a>
                </div>
            </div>
        </div>
    </section>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        let currentFile = null;
        let originalSize = 0;

        dropZone.addEventListener('click', () => fileInput.click());
        dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                currentFile = e.dataTransfer.files[0];
                originalSize = currentFile.size;
                dropZone.querySelector('p').textContent = currentFile.name;
            }
        });
        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) {
                currentFile = fileInput.files[0];
                originalSize = currentFile.size;
                dropZone.querySelector('p').textContent = currentFile.name;
            }
        });

        function compressImage() {
            if (!currentFile) {
                alert('الرجاء اختيار صورة PNG أولاً');
                return;
            }

            const btn = document.querySelector('button[onclick="compressImage()"]');
            btn.textContent = 'جاري الضغط...';
            btn.disabled = true;

            const reader = new FileReader();
            reader.onload = function(e) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width;
                    canvas.height = img.height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0);

                    // PNG compression with max quality (lossless)
                    const dataUrl = canvas.toDataURL('image/png');
                    
                    fetch(dataUrl)
                        .then(res => res.blob())
                        .then(blob => {
                            const url = URL.createObjectURL(blob);
                            const link = document.getElementById('downloadLink');
                            link.href = url;
                            link.download = `compressed_${currentFile.name}`;

                            const newSize = blob.size;
                            const saved = ((originalSize - newSize) / originalSize * 100).toFixed(1);
                            document.getElementById('sizeInfo').textContent = 
                                `الحجم الأصلي: ${(originalSize/1024).toFixed(1)}KB ← الحجم الجديد: ${(newSize/1024).toFixed(1)}KB (تم توفير ${saved}%)`;

                            document.getElementById('result').classList.remove('hidden');
                            btn.textContent = 'ضغط الصورة';
                            btn.disabled = false;
                        });
                };
                img.src = e.target.result;
            };
            reader.readAsDataURL(currentFile);
        }
    </script>
</body>
</html>
